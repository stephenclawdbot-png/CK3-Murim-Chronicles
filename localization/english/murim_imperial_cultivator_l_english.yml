l_english:
 murim_imperial_cultivator.0001.t: "The Emperor Discovers Cultivators"
 murim_imperial_cultivator.0001.desc: "Whispers of mortals wielding supernatural power have reached the imperial throne. A cultivator has been exposed in the court, and the Emperor must now decide whether these hidden warriors are servants to be commanded, threats to be crushed, or mysteries to be understood."
 murim_imperial_cultivator.0001.a: "They will serve the empire."
 murim_imperial_cultivator.0001.b: "Imprison this dangerous creature."
 murim_imperial_cultivator.0001.c: "Teach me their secrets in private."
 murim_imperial_cultivator.0001.d: "Pretend I saw nothing."
 murim_imperial_cultivator.0005.t: "Form the Imperial Cultivator Corps"
 murim_imperial_cultivator.0005.desc: "With several cultivators now gathered at court, the opportunity arises to forge them into an instrument of imperial power. An elite corps of martial artists sworn to the throne could reshape the balance of power -- or become a blade that turns on its wielder."
 murim_imperial_cultivator.0005.a: "Form an elite cultivator guard."
 murim_imperial_cultivator.0005.b: "Create a secret intelligence unit."
 murim_imperial_cultivator.0005.c: "Too dangerous -- disband and suppress them."
 murim_imperial_cultivator.0010.t: "Court Cultivator Exposed"
 murim_imperial_cultivator.0010.desc: "A respected court official used a cultivation technique in plain view, shattering their carefully maintained cover. Witnesses saw qi ripple through the air like heat from a forge. The court buzzes with scandal and fear."
 murim_imperial_cultivator.0010.a: "Put them on public trial."
 murim_imperial_cultivator.0010.b: "Confront them privately -- demand loyalty."
 murim_imperial_cultivator.0010.c: "Cover it up -- they are too useful."
 murim_imperial_cultivator.0015.t: "Examination Rigging Discovered"
 murim_imperial_cultivator.0015.desc: "Investigators have uncovered evidence that cultivator agents manipulated the imperial examinations. Several newly appointed officials owe their positions not to scholarship but to the hidden hand of a martial underground. The integrity of the entire system is in question."
 murim_imperial_cultivator.0015.a: "Strip them of position publicly."
 murim_imperial_cultivator.0015.b: "Investigate who orchestrated the fraud."
 murim_imperial_cultivator.0015.c: "Use this knowledge as leverage."
 murim_imperial_cultivator.0016.t: "Underground Network Discovered"
 murim_imperial_cultivator.0016.desc: "The investigation has borne dark fruit. A vast underground network of cultivators operates beneath the empire, moving agents, techniques, and resources through hidden channels. Their reach extends into every province, and their leadership remains shrouded in shadow."
 murim_imperial_cultivator.0016.a: "Launch a full imperial crackdown."
 murim_imperial_cultivator.0016.b: "Infiltrate and control from within."
 murim_imperial_cultivator.0016.c: "Strike a deal with the underground."
 murim_imperial_cultivator.0016.d: "Pretend I saw nothing."
 murim_imperial_cultivator.0020.t: "Governor Revealed as Puppet"
 murim_imperial_cultivator.0020.desc: "A provincial governor has been unmasked as a puppet of a hidden cultivator sect. Every decree, every appointment, every tax collected in that province served the interests of a shadowy puppeteer pulling strings from the darkness."
 murim_imperial_cultivator.0020.a: "Remove them and install a loyal replacement."
 murim_imperial_cultivator.0020.b: "Turn the puppet to serve me instead."
 murim_imperial_cultivator.0020.c: "Follow the strings to the puppeteer."
 murim_imperial_cultivator.0021.t: "The Puppeteer Found"
 murim_imperial_cultivator.0021.desc: "Months of investigation have finally led to the one pulling the strings. The puppet master is a cultivator of formidable power who has been manipulating imperial governance for years. Now cornered, they await judgment -- but even cornered tigers are deadly."
 murim_imperial_cultivator.0021.a: "Arrest and execute them publicly."
 murim_imperial_cultivator.0021.b: "Force them to serve the empire."
 murim_imperial_cultivator.0021.c: "The trail has gone cold."
 murim_imperial_cultivator.0025.t: "Imperial Attention on the Sanctuary"
 murim_imperial_cultivator.0025.desc: "Imperial investigators have turned their gaze toward our lands. Rumors of cultivators being sheltered here have reached the wrong ears. If the sanctuary is discovered, the consequences will be severe -- not just for the refugees, but for everyone who harbored them."
 murim_imperial_cultivator.0025.a: "Deny everything and hide them better."
 murim_imperial_cultivator.0025.b: "Turn them over to save myself."
 murim_imperial_cultivator.0025.c: "Bribe the investigators to look away."
 murim_imperial_cultivator.0030.t: "War Decided by Hidden Duel"
 murim_imperial_cultivator.0030.desc: "As armies clash on the open field, the true battle unfolds in shadow. Two cultivators of terrifying power have squared off in a hidden duel that will determine the war's outcome. Whichever side's champion falls, their army will crumble with them."
 murim_imperial_cultivator.0030.a: "Let them fight in the shadows."
 murim_imperial_cultivator.0030.b: "Keep cultivators out of this war."
 murim_imperial_cultivator.0030.c: "Deploy cultivators openly for all to see."
 murim_imperial_cultivator.0035.t: "Imperial Ban on Cultivation"
 murim_imperial_cultivator.0035.desc: "The time has come to decide the fate of all cultivators within imperial borders. A total ban would drive them underground and invite rebellion, yet unchecked cultivation threatens the very foundations of imperial authority. The brush hovers over the decree."
 murim_imperial_cultivator.0035.a: "Total ban -- harsh penalties for all."
 murim_imperial_cultivator.0035.b: "Regulated cultivation with imperial license."
 murim_imperial_cultivator.0035.c: "The risk of enforcement is too great."
 murim_imperial_cultivator.0040.t: "Underground Railroad for Persecuted Cultivators"
 murim_imperial_cultivator.0040.desc: "Cultivators fleeing the imperial ban arrive at our borders, desperate and hunted. A network of safe houses and hidden mountain paths could smuggle them to safety -- but harboring fugitives of the empire is a dangerous game with lethal stakes."
 murim_imperial_cultivator.0040.a: "Establish the underground railroad."
 murim_imperial_cultivator.0040.b: "Profit from their desperation."
 murim_imperial_cultivator.0040.c: "Report them to gain imperial favor."
 murim_imperial_cultivator.0040.d: "Stay out of it entirely."
 murim_imperial_cultivator.0045.t: "Secret Disciple Revealed as Prince"
 murim_imperial_cultivator.0045.desc: "A disciple in our sect has been hiding a staggering secret -- they carry a legitimate claim to a noble title. Royal blood flows through the veins of one who has trained beside us in the dust and sweat of the practice yard. This changes everything."
 murim_imperial_cultivator.0045.a: "Use their claim to install a cultivator ruler."
 murim_imperial_cultivator.0045.b: "Keep the secret as leverage."
 murim_imperial_cultivator.0045.c: "Protect them -- they are just a disciple."
