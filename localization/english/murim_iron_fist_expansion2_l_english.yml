l_english:
 murim_iron_fist_expansion2.0001.t: "The Adamantine Body Tempering"
 murim_iron_fist_expansion2.0001.desc: "The sect's inner sanctum houses the Thousand Hammer Forge, where masters temper their bodies beyond iron into adamantine. The process is agony incarnate — medicinal baths and relentless hammer blows designed to push bone and sinew past human limits. Few emerge whole."
 murim_iron_fist_expansion2.0001.a: "Endure the Thousand Hammer Tempering."
 murim_iron_fist_expansion2.0001.b: "Use the secret herbal bath method instead."
 murim_iron_fist_expansion2.0001.c: "Refuse. The body has limits I won't cross."
 murim_iron_fist_expansion2.0002.t: "The Legendary Blacksmith's Challenge"
 murim_iron_fist_expansion2.0002.desc: "A legendary blacksmith, scarred by decades at the forge, offers to craft a masterwork for you alone. Meteor iron, heaven-splitting steel — the rarest materials lie at his feet. But the greatest weapons demand the greatest sacrifice of coin and commitment."
 murim_iron_fist_expansion2.0002.a: "Forge the Meteor Iron Gauntlets."
 murim_iron_fist_expansion2.0002.b: "Forge the Heaven-Splitting Iron Staff."
 murim_iron_fist_expansion2.0002.c: "Forge armor for the entire clan."
 murim_iron_fist_expansion2.0003.t: "War with the Phantom Blade"
 murim_iron_fist_expansion2.0003.desc: "Phantom Blade assassins have been sighted near Iron Fist grounds. Their poisoned blades and shadow techniques are the antithesis of everything the Iron Fist stands for. Relations have soured beyond repair. The time has come to decide — do we march to war, fortify our gates, or seek allies?"
 murim_iron_fist_expansion2.0003.a: "Declare open war. Crush them with iron fists."
 murim_iron_fist_expansion2.0003.b: "Fortify our defenses. Let them come to us."
 murim_iron_fist_expansion2.0003.c: "Seek an alliance with Shaolin against them."
 murim_iron_fist_expansion2.0004.t: "The Iron Fist Offensive"
 murim_iron_fist_expansion2.0004.desc: "War drums echo across the mountains as the Iron Fist marshals its forces. The Phantom Blade's hidden stronghold has been located, nestled in the shadow of a dark ravine. The time to strike is now — but the assassins are masters of ambush and misdirection."
 murim_iron_fist_expansion2.0004.a: "Lead the charge personally."
 murim_iron_fist_expansion2.0004.b: "Send the Iron Vanguard ahead."
 murim_iron_fist_expansion2.0004.c: "Burn their supply routes. Scorched earth."
 murim_iron_fist_expansion2.0005.t: "Phantom Blade Night Assault"
 murim_iron_fist_expansion2.0005.desc: "A moonless night. Shadows slip through the darkness toward the Iron Fist fortress. The Phantom Blade has launched a night assault, their assassins scaling walls and slipping through cracks. The iron gates groan under silent pressure. Your defenses are about to be tested."
 murim_iron_fist_expansion2.0005.a: "The iron gates hold! Counterattack!"
 murim_iron_fist_expansion2.0005.b: "Spring the iron cage formation trap."
 murim_iron_fist_expansion2.0005.c: "Sacrifice the outer walls to protect the sanctum."
 murim_iron_fist_expansion2.0006.t: "Shaolin Alliance Negotiations"
 murim_iron_fist_expansion2.0006.desc: "The monks of Shaolin receive you in their austere hall. They are willing to stand beside the Iron Fist against the Phantom Blade — but they have conditions. Shaolin's ways are pure, and they find the rumors of demonic iron techniques troubling. A bargain must be struck."
 murim_iron_fist_expansion2.0006.a: "Offer our blacksmithing secrets for their support."
 murim_iron_fist_expansion2.0006.b: "They demand too much. We fight alone."
 murim_iron_fist_expansion2.0006.c: "Accept their terms and purify our techniques."
 murim_iron_fist_expansion2.0007.t: "Wounded Gate Master"
 murim_iron_fist_expansion2.0007.desc: "The Phantom Blade's ambush has left you broken and bleeding. Poison lingers in your wounds, and the clan watches with worry as their leader falters. The Iron Fist cannot appear weak — not now, not with assassins circling. You must find a way to recover, or pass the burden to another."
 murim_iron_fist_expansion2.0007.a: "Iron will. Push through the pain."
 murim_iron_fist_expansion2.0007.b: "Seek a healer from the Tang Clan."
 murim_iron_fist_expansion2.0007.c: "Pass leadership temporarily to the Second Master."
 murim_iron_fist_expansion2.0008.t: "Succession Crisis"
 murim_iron_fist_expansion2.0008.desc: "The years weigh heavy upon you. Your eldest child stands ready to inherit the Iron Fist Gate, but tradition demands that strength alone determines succession. The clan elders are divided — some want a smooth transition, others demand the old ways of trial by combat."
 murim_iron_fist_expansion2.0008.a: "Traditional succession. The eldest inherits."
 murim_iron_fist_expansion2.0008.b: "Trial by Iron. All candidates fight."
 murim_iron_fist_expansion2.0008.c: "I'm not done yet. I refuse to step down."
 murim_iron_fist_expansion2.0009.t: "Trial by Iron"
 murim_iron_fist_expansion2.0009.desc: "The succession arena is drenched in sweat and blood. The candidates have fought through rounds of brutal combat, each strike echoing the Iron Fist's legacy of raw power. The crowd holds its breath as the final blow is about to land."
 murim_iron_fist_expansion2.0009.a: "The eldest wins. Tradition holds."
 murim_iron_fist_expansion2.0009.b: "A dark horse emerges — the forgotten child."
 murim_iron_fist_expansion2.0009.c: "The trial ends in a draw. Joint leadership."
 murim_iron_fist_expansion2.0010.t: "The Iron Fist Legacy"
 murim_iron_fist_expansion2.0010.desc: "You stand at the apex of Iron Fist cultivation, your body a weapon beyond mortal reckoning. The ultimate technique lies within reach — a move that could shatter mountains and echo through the ages. How you wield this power will define the Iron Fist Gate for generations to come."
 murim_iron_fist_expansion2.0010.a: "Master the Heavenly Iron God Fist."
 murim_iron_fist_expansion2.0010.b: "Create my own technique — the Iron Tyrant's Domain."
 murim_iron_fist_expansion2.0010.c: "Pass the incomplete technique to the next generation."
