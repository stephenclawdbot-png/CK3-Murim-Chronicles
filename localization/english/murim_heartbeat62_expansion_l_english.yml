l_english:
 # ============================================================
 # TRAINING EXPANSION 2 - EVENTS 21-26 (Clan-Specific Training)
 # ============================================================

 # 21. Mount Hua Sword Dance Drill
 murim_training_exp2.0003.t: "Mount Hua Sword Dance Drill"
 murim_training_exp2.0003.desc: "The full moon rises over the Huashan cliffs. Tonight, you will perform the legendary 108 Plum Blossom Sword Forms at the cliff edge, where one misstep means death. Your drill instructor watches from the shadows, measuring every cut and thrust against the ancient standard. The cold mountain wind carries the sound of steel through the night air."
 murim_training_exp2.0003.a: "Execute all 108 forms under moonlight."
 murim_training_exp2.0003.b: "Focus on inner sword qi meditation instead."
 murim_training_exp2.0003.c: "Challenge the instructor - I have surpassed this level."

 # 22. Shaolin Iron Body Tempering
 murim_training_exp2.0004.t: "Shaolin Iron Body Tempering"
 murim_training_exp2.0004.desc: "The Iron Shirt Qi Gong training begins at dawn. You must channel internal qi through all eighteen meridian pathways while monks strike your body with iron rods. Each stage is more brutal than the last. The senior monks say that those who complete all eighteen stages gain a body harder than steel - but the risk of qi deviation is real."
 murim_training_exp2.0004.a: "Endure all 18 stages of Iron Shirt Qi Gong."
 murim_training_exp2.0004.b: "Take the gradual path - years of steady conditioning."
 murim_training_exp2.0004.c: "The risk to my qi channels is too great."

 # 23. Wudang Taiji Flow Meditation
 murim_training_exp2.0005.t: "Wudang Taiji Flow Meditation"
 murim_training_exp2.0005.desc: "Atop the Wudang Mountains, the air itself seems to breathe with the rhythm of the Dao. Your master has instructed you to perform the 72 Heavenly Taiji Forms without stopping, seeking the perfect balance between yin and yang. The morning mist parts around your movements as if nature itself acknowledges your practice."
 murim_training_exp2.0005.a: "Enter the Taiji Trance - complete all 72 forms."
 murim_training_exp2.0005.b: "Focus on martial application - pushing hands combat."
 murim_training_exp2.0005.c: "Seek the philosophical path - dao over combat."

 # 24. Tang Clan Hidden Weapon Gauntlet
 murim_training_exp2.0006.t: "Tang Clan Mechanism Corridor Gauntlet"
 murim_training_exp2.0006.desc: "Deep beneath the Tang Clan compound lies the Mechanism Corridor - 36 trap rooms filled with poison needles, blade arrays, and spring-loaded crossbows. Every Tang disciple must run this gauntlet to prove their reflexes and hidden weapon mastery. The corridor has claimed the lives of the careless and the slow."
 murim_training_exp2.0006.a: "Run the full gauntlet - all 36 mechanism traps."
 murim_training_exp2.0006.b: "Study the mechanism designs from the observation gallery."
 murim_training_exp2.0006.c: "I will design a new trap for the corridor."

 # 25. Iron Fist Breaking Boulder Trial
 murim_training_exp2.0007.t: "Iron Fist Breaking Boulder Trial"
 murim_training_exp2.0007.desc: "Five boulders stand in the Iron Fist courtyard, each harder than the last: sandstone, limestone, marble, granite, and iron ore. Every disciple who seeks promotion must shatter them in sequence with bare fists. The sound of cracking stone echoes across the compound as you prepare your stance. Your knuckles are already scarred from years of conditioning."
 murim_training_exp2.0007.a: "Attempt the Five Boulder Progression."
 murim_training_exp2.0007.b: "Condition fists through iron sand training first."
 murim_training_exp2.0007.c: "Observe others and learn from their technique."

 # 26. Beggar Sect Street Survival Training
 murim_training_exp2.0008.t: "Beggar Sect Street Survival Training"
 murim_training_exp2.0008.desc: "The Beggar Sect does not train in mountain monasteries or hidden compounds. You have been given nothing - no money, no weapons, no identification. For 30 days, you must survive on the streets of a city you have never visited, gathering intelligence, fighting for territory, and completing martial tasks assigned by hidden elder observers. This is how the Beggar Sect forges its warriors."
 murim_training_exp2.0008.a: "Embrace the streets - gather intelligence, fight for territory."
 murim_training_exp2.0008.b: "Practice the Dog Beating Staff while begging."
 murim_training_exp2.0008.c: "Give up and return to the sect early."

 # ============================================================
 # CLAN HARMONY EVENTS 1-8
 # ============================================================

 # 1. Clan Harmony Assessment
 murim_harmony.0001.t: "Clan Harmony Assessment"
 murim_harmony.0001.desc: "As clan leader, you take stock of the internal state of your sect. Whispers reach your ears - some disciples are content, others harbor resentment. The balance between loyalty and dissent is delicate. Your leadership style shapes the harmony of the entire clan."
 murim_harmony.0001.a: "Our harmony is strong - reward loyal disciples."
 murim_harmony.0001.b: "Hold an open forum to address grievances."
 murim_harmony.0001.c: "Silence the dissenters. My word is law."

 # 2. Elder Council Disagreement
 murim_harmony.0002.t: "Elder Council Disagreement"
 murim_harmony.0002.desc: "Two factions within your elder council have reached an impasse on a critical decision. [dissenting_elder.GetFirstName] leads the opposition, openly questioning your judgment before the assembled elders. The younger disciples watch nervously - a divided council weakens the entire clan."
 murim_harmony.0002.a: "Side with the dissenting elder - compromise is strength."
 murim_harmony.0002.b: "Override the elder. My word is final."
 murim_harmony.0002.c: "Challenge the elder to a duel to settle this."

 # 3. Coup Attempt - Disciple Rebellion
 murim_harmony.0003.t: "Coup Attempt!"
 murim_harmony.0003.desc: "In the dead of night, [coup_leader.GetFirstName] has rallied a faction of ambitious disciples and seized the training grounds. Armed warriors block every exit from your personal quarters. The message is clear: surrender leadership or fight. The air crackles with killing intent as you face the most dangerous moment of your tenure as clan leader."
 murim_harmony.0003.a: "Face them in single combat - the traditional way."
 murim_harmony.0003.b: "Rally loyal elders and surround the traitors."
 murim_harmony.0003.c: "Step down peacefully to avoid bloodshed."

 # 4. Betrayal From Within
 murim_harmony.0004.t: "Betrayal From Within"
 murim_harmony.0004.desc: "Your spies have confirmed the unthinkable - [traitor_elder.GetFirstName], one of your most trusted elders, has been selling clan technique manuals to outsiders. Sacred arts that took generations to develop are now in the hands of rivals. The evidence is irrefutable: intercepted letters, payments, and the testimony of a junior disciple who witnessed the exchange."
 murim_harmony.0004.a: "Execute the traitor publicly. Send a message."
 murim_harmony.0004.b: "Seal their meridians and banish them forever."
 murim_harmony.0004.c: "Show mercy - demote them under strict watch."

 # 5. Succession Crisis
 murim_harmony.0005.t: "Succession Crisis"
 murim_harmony.0005.desc: "The question can no longer be avoided. Your body is failing - whether from age, accumulated injuries, or the toll of countless battles. The clan needs a new leader, and the choice you make now will determine its future for a generation. Two candidates stand out, each with their own vision for the clan's direction."
 murim_harmony.0005.a: "Choose the strongest fighter as my successor."
 murim_harmony.0005.b: "Choose the wisest candidate for stability."
 murim_harmony.0005.c: "Hold a succession tournament - let fate decide."

 # 6. Loyalty Test
 murim_harmony.0006.t: "Loyalty Test - Disciple Tempted by Rivals"
 murim_harmony.0006.desc: "[tempted_disciple.GetFirstName], one of your most promising young warriors, was approached by a rival clan offering wealth, status, and advanced techniques. The disciple reported the approach, but you can see the temptation in their eyes. A talented martial artist is worth more than gold, and your rivals know it."
 murim_harmony.0006.a: "Confront them directly - choose loyalty or leave."
 murim_harmony.0006.b: "Promote them to counter the rival's offer."
 murim_harmony.0006.c: "Let them go. A disciple who can be bought is worthless."

 # 7. Clan Festival
 murim_harmony.0007.t: "Annual Clan Festival"
 murim_harmony.0007.desc: "The annual clan gathering approaches - a time for disciples to compete, celebrate, and strengthen the bonds that hold the clan together. Veterans share stories of past glory, young disciples test their skills in friendly matches, and the aroma of feast preparations fills the compound. It is a moment to remind everyone why they chose this clan."
 murim_harmony.0007.a: "Grand festival with internal martial tournament!"
 murim_harmony.0007.b: "Modest gathering - save resources for training."
 murim_harmony.0007.c: "Cancel the festival. Times are too dangerous."

 # 8. Faction Split Threat
 murim_harmony.0008.t: "Faction Split Threat"
 murim_harmony.0008.desc: "A dangerous rift has formed within the clan. A faction of disciples believes the clan should adopt more aggressive, unorthodox methods, while purists insist on traditional doctrine. The disagreement has gone beyond philosophical debate - disciples are refusing to train together, and there have been unauthorized duels. If left unchecked, this will tear the clan apart."
 murim_harmony.0008.a: "Unite the clan through reform - address root grievances."
 murim_harmony.0008.b: "Purge the dissenters. There is only one path."
 murim_harmony.0008.c: "Allow a controlled split - create a branch school."

 # ============================================================
 # EMERGENCY RECRUITMENT EVENTS 1-6
 # ============================================================

 # 1. Emergency Recruitment Triggered
 murim_emergency.0001.t: "Emergency: Clan Youth Crisis!"
 murim_emergency.0001.desc: "The numbers do not lie. Your clan has fewer than three young disciples. Without fresh blood, your techniques will die with the current generation. The elders gather in grim silence as you present the crisis. Every great clan that fell began with this exact scenario - an aging roster and no successors to carry the torch."
 murim_emergency.0001.a: "Send all scouts immediately! Maximum urgency!"
 murim_emergency.0001.b: "Lower recruitment standards - accept anyone with aptitude."
 murim_emergency.0001.c: "Perhaps the clan's time has come..."

 # 2. Emergency Scout Returns With Orphan Prodigies
 murim_emergency.0002.t: "Scout Returns: Orphan Prodigies Found"
 murim_emergency.0002.desc: "Your emergency scout has returned from war-torn border regions with unexpected treasures - orphaned children who have already developed nascent martial instincts through sheer survival. They are rough, undisciplined, and frightened, but the potential is unmistakable. With proper training, they could become the backbone of the next generation."
 murim_emergency.0002.a: "Accept all orphans - train them as outer disciples."
 murim_emergency.0002.b: "Only accept the most talented - quality over quantity."

 # 3. Rival Clan Poaching During Emergency
 murim_emergency.0003.t: "Rival Clan Poaching Our Youth!"
 murim_emergency.0003.desc: "Word of your clan's crisis has spread through the Murim. A rival clan has sent recruiters to approach your remaining young disciples, offering lavish promises of advancement and resources your clan cannot match. The vultures circle even before the body has fallen. You must act quickly or lose what little you have left."
 murim_emergency.0003.a: "Confront the rival scout and challenge them!"
 murim_emergency.0003.b: "Negotiate a non-aggression pact on recruitment."
 murim_emergency.0003.c: "Set an ambush for the rival scouts."

 # 4. Lowered Standards - Unexpected Prodigy
 murim_emergency.0004.t: "Hidden Prodigy Among the Recruits"
 murim_emergency.0004.desc: "Among the dozens of mediocre candidates brought in under your lowered standards, one figure stands apart. A young person with unremarkable appearance but extraordinary martial intuition - their movements during the basic assessment were faster, sharper, and more precise than disciples who have trained for years. You may have found a diamond in the rough."
 murim_emergency.0004.a: "Take them as my personal disciple - fast-track them."
 murim_emergency.0004.b: "Assign them to our best elder for proper training."
 murim_emergency.0004.c: "Test them further before committing resources."

 # 5. Goryeo Recruitment Expedition
 murim_emergency.0005.t: "Emergency: Goryeo Recruitment Expedition"
 murim_emergency.0005.desc: "With China's martial world picked clean of available talent, your advisors suggest sending an expedition to Goryeo - the secondary center of martial arts in the known world. Goryeo's martial traditions are different but compatible, and their fighters are renowned for fierce determination. The journey is long and expensive, but desperate times call for bold measures."
 murim_emergency.0005.a: "Send a senior disciple to lead the expedition."
 murim_emergency.0005.b: "Go personally - my reputation will open doors."
 murim_emergency.0005.c: "Focus on training our existing members instead."

 # 6. Emergency Recruitment Aftermath
 murim_emergency.0006.t: "Emergency Recruitment: The Aftermath"
 murim_emergency.0006.desc: "Months have passed since the emergency recruitment drive. The training halls are no longer empty, and the sound of young voices echoes through the compound once again. But the question remains - has it been enough? The numbers tell the story, and today you will know whether the clan's future is secured or if more desperate measures are needed."
 murim_emergency.0006.a: "The clan is stabilized! Celebrate the new generation!"
 murim_emergency.0006.b: "We must merge with an allied clan to survive."
 murim_emergency.0006.c: "Expand recruitment to periphery regions."

