 # Event Titles - Cultivation
cultivation.0001.t:0 "The Awakening"
cultivation.0001.desc:0 "You have meditated for seven days and seven nights. As the sun rises on the eighth morning, you feel something stir within your dantian—a spark of energy. The first step on the path.\n\nYou have broken through to the Qi Refinement Realm! Your senses sharpen, your body strengthens. The cultivation world opens before you."
cultivation.0001.a:0 "I shall become stronger!"
cultivation.0001.b:0 "I need more time to stabilize..."

cultivation.0002.t:0 "Foundation Breakthrough"
cultivation.0002.desc:0 "Five years have passed. You have refined your qi until it flows like a river within your meridians. Now, at the critical moment, you feel the energy crystallizing in your dantian.\n\nThe Foundation Realm! Your qi now has a core, a foundation upon which greater power can be built. Your martial prowess increases tenfold."
cultivation.0002.a:0 "This is only the beginning!"
cultivation.0002.b:0 "I will share this technique with my sect."

cultivation.0003.t:0 "The Nascent Soul Awakens"
cultivation.0003.desc:0 "A golden light erupts from your forehead as your spiritual sense expands beyond mortal limitations. You can see the flows of energy, the threads of fate.\n\nThe Nascent Soul Realm—a second life within you. You are now a true cultivator, respected and feared. Your clan will honor your name for generations."
cultivation.0003.a:0 "The heavens are within reach!"
cultivation.0003.b:0 "I must protect my sect..."

cultivation.0004.t:0 "The Demonic Seed"
cultivation.0004.desc:0 "In your darkest hour, when your enemies have crushed you and your sect turns away, you find an ancient manual. Its pages whisper of power at any cost.\n\nA seed of darkness takes root in your soul. The Demonic Dao offers strength, but demands much. Will you embrace this path?"
cultivation.0004.a:0 "I accept. Power above all."
cultivation.0004.b:0 "I am still righteous at heart."

cultivation.0005.t:0 "Ancient Secret Manual"
cultivation.0005.desc:0 "While exploring the ruins of a fallen temple, you discover a jade slip hidden beneath the altar. It contains the complete Sword Dao of an ancient immortal.\n\nThis secret manual holds forbidden knowledge. With study, you could master techniques thought lost to time. But such power attracts attention..."

cultivation.0006.t:0 "Heavenly Tribulation"
cultivation.0006.desc:0 "Clouds gather above your cultivation chamber—not ordinary storm clouds, but tribulation lightning. The heavens themselves test your worthiness for immortality.\n\nYou have reached the threshold. The Heavenly Tribulation will either forge you into an Immortal or reduce you to ash. Are you prepared?"
cultivation.0006.a:0 "I fear neither heaven nor earth!"
cultivation.0006.b:0 "I am not yet ready..."

cultivation.0007.t:0 "War of the Sects"
cultivation.0007.desc:0 "Tensions between your sect and the rival Azure Dragon faction have reached breaking point. Ancient enmities demand blood. Your disciples cry for war.\n\nThe battle for dominance of the region will shake the foundations of the Murim. Will you lead your sect to glory or doom?"
cultivation.0007.a:0 "We shall crush them utterly!"
cultivation.0007.b:0 "There is another way..."

cultivation.0008.t:0 "Cultivation Duel"
cultivation.0008.desc:0 "Your rival has publicly challenged you to a duel. To refuse is to lose face, to lose disciples, to lose your claim to leadership. But their cultivation is said to be equal to your own...\n\nThe duel will take place at dawn atop the Thousand Steps Peak. Life or death, honor or ruin, will be decided in a single clash."
cultivation.0008.a:0 "I accept!"
cultivation.0008.b:0 "I do not fight meaningless duels."

cultivation.0009.t:0 "Spirit Beast Encounter"
cultivation.0009.desc:0 "Deep in the forbidden forest, a great beast with scales of jade and eyes of amber blocks your path. But instead of attacking, it studies you with ancient intelligence.\n\nThis is no mere monster but a spirit beast—a companion of cultivators past. It offers you a bond, a partnership for the trials ahead."

cultivation.0010.t:0 "Meridians Sealed"
cultivation.0010.desc:0 "A sneak attack during your breakthrough has damaged your meridians permanently. Your cultivation is crippled, your power shattered.\n\nBut the spirit is not so easily broken. Alternative paths exist—alchemy, formation mastery, the way of the mind. Or perhaps revenge?"
cultivation.0010.a:0 "I will find another way."
cultivation.0010.b:0 "They will pay for this..."

