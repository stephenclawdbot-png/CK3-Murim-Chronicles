l_english:
 murim_world_history.0001.t: "Discovery of Ancient Battlefield"
 murim_world_history.0001.desc: "Beneath the overgrown ruins, you discover the remnants of a legendary battle fought centuries ago. Shattered weapons still hum with residual qi, and the earth is scorched in patterns that speak of techniques lost to time. The spirits of fallen warriors linger here, their stories carved in blood and stone."
 murim_world_history.0001.a: "Search the battlefield for relics"
 murim_world_history.0001.b: "Commune with the lingering spirits"
 murim_world_history.0001.c: "Seal the battlefield and warn others"
 murim_world_history.0002.t: "The Fallen Sect's Last Testament"
 murim_world_history.0002.desc: "Among the ashes of a destroyed sect, you uncover their final records — jade slips inscribed with desperate urgency by dying masters. Within these records lie forbidden techniques, ancestral secrets, and the truth of why they were annihilated. Knowledge is power, but some knowledge destroys its bearer."
 murim_world_history.0002.a: "Study the forbidden techniques within"
 murim_world_history.0002.b: "Return the testament to their descendants"
 murim_world_history.0002.c: "Burn the records — some knowledge should die"
 murim_world_history.0003.t: "Prophecy of the Returning Emperor"
 murim_world_history.0003.desc: "An ancient prophecy has been unearthed in crumbling ruins — it speaks of a Martial Emperor who will return to unite the martial world under one banner. The prophecy names signs and portents that match the current age with eerie precision. Ambitious sects will kill for this information."
 murim_world_history.0003.a: "Claim to be the prophesied Emperor"
 murim_world_history.0003.b: "Search for the true heir"
 murim_world_history.0003.c: "Suppress the prophecy to prevent chaos"
 murim_world_history.0004.t: "Resurrection of a Sealed Demonic Art"
 murim_world_history.0004.desc: "The seal has broken. An ancient demonic cultivation method, imprisoned beneath the earth for a thousand years by the combined might of the orthodox sects, has resurfaced. Its pages radiate a corrupting aura that twists the qi of anyone who draws near. The temptation of its power is absolute."
 murim_world_history.0004.a: "Practice the demonic art in secret"
 murim_world_history.0004.b: "Report it to the Orthodox Alliance"
 murim_world_history.0004.c: "Destroy the demonic scripture utterly"
 murim_world_history.0005.t: "The Lost City of Martial Saints"
 murim_world_history.0005.desc: "Legend speaks of a hidden city where the greatest martial artists of antiquity ascended beyond mortality. Maps drawn in fading ink suggest the city lies beyond the Endless Desert, through the Valley of Echoes, past the Gate of Forgotten Kings. Many have searched. None have returned unchanged."
 murim_world_history.0005.a: "Mount a grand expedition to find it"
 murim_world_history.0005.b: "Meditate on the legend's meaning"
 murim_world_history.0005.c: "Dismiss it as myth"
