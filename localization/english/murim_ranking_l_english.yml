 murim_fallen_from_rankings_modifier:0 "Fallen From the Rankings"
 murim_fallen_from_rankings_modifier_desc:0 "Once counted among the greatest, now forgotten. The shame lingers."
 murim_burning_determination_modifier:0 "Burning Determination"
 murim_burning_determination_modifier_desc:0 "Sworn to reclaim a lost ranking position."
 murim_bitter_fallen_fighter_modifier:0 "Bitter Fallen Fighter"
