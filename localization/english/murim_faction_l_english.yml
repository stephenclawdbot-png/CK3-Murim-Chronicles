l_english:
 murim_faction.0001.t: "The Great Divide"
 murim_faction.0001.desc_orthodox: "The Demonic Path has gone too far. Raids on orthodox schools, poisonings of elders, assassinations of promising disciples. The Murim Alliance Leader has called a Great Convergence -- all righteous sects must unite against the darkness. This war will be fought not with armies, but with fists."
 murim_faction.0001.desc_unorthodox: "The Heavenly Demon has spoken: the righteous hypocrites have suppressed us long enough. The Poison Flower Palace will cripple their supply lines. The Phantom Blade will remove their leaders. And the Heavenly Demon Sect will crush what remains. This is not war -- this is liberation."
 murim_faction.0001.desc_neutral: "The martial world trembles. Orthodox and Unorthodox have declared open conflict. Every martial artist must choose a side -- or hide."
 murim_faction.0001.a: "Sound the war drums. We stand ready."
 murim_faction.0001.b: "Seek a truce before more die"
 murim_faction.0001.c: "Guard our gates and wait"
 murim_faction.0005.t: "Peace at the Forgotten Valley"
 murim_faction.0005.desc: "You arrange a meeting at the neutral ground of the Forgotten Valley. Representatives from both factions arrive, armed but willing to talk. The Murim Alliance Leader and the Heavenly Demon's envoy sit across from each other. Decades of hatred fill the air."
 murim_faction.0005.a: "Propose a ten-year ceasefire"
 murim_faction.0005.b: "Let champions decide the war"
 murim_faction.0005.c: "Strike during negotiations"
 murim_faction.0006.t: "The Summit of Ten Thousand Swords"
 murim_faction.0006.desc: "The champions meet at the Summit of Ten Thousand Swords, the ancient dueling ground in central China. The entire martial world watches as two titans prepare to decide the fate of the faction war with a single battle."
 murim_faction.0006.a: "Volunteer as your faction's champion"
 murim_faction.0006.b: "Watch from the crowd"
 murim_faction.0010.t: "Faction War: Ambush in the Bamboo Forest"
 murim_faction.0010.desc: "The faction war rages across the martial world. In the bamboo forests of the Chinese heartland, you encounter enemy faction fighters. This is not a battlefield of armies -- it is a series of duels, ambushes, and running battles through the wilderness."
 murim_faction.0010.a: "Engage the enemy head-on"
 murim_faction.0010.b: "Ambush them from the shadows"
 murim_faction.0010.c: "Retreat and regroup"
 murim_faction.0015.t: "Captured by the Enemy"
 murim_faction.0015.desc: "You are bound and brought before the enemy faction's war council. They debate your fate. Some want you dead. Others see value in a prisoner exchange. And one voice suggests something worse -- conversion."
 murim_faction.0015.a: "Demand honorable treatment"
 murim_faction.0015.b: "Attempt a daring escape"
 murim_faction.0015.c: "Consider defecting..."
 murim_faction.0020.t: "The Defector's Choice"
 murim_faction.0020.desc_to_unorthodox: "You renounce the Righteous Path. The hollow codes, the sanctimonious elders, the endless rules about honor. The Demonic Path offers power without pretense. Your old clan will brand you a traitor. But power has no faction."
 murim_faction.0020.desc_to_orthodox: "You turn your back on the Demonic Path. The violence, the cruelty, the casual destruction -- you can stomach it no longer. The Righteous Path may be rigid, but at least they have a code. Your former allies will see this as betrayal."
 murim_faction.0020.a: "Complete the defection"
 murim_faction.0020.b: "Make it a ruse -- spy for my true side"
 murim_faction.0020.c: "Flee instead -- disappear entirely"
 murim_faction.0025.t: "Shadow in the Night"
 murim_faction.0025.desc: "A shadow moves in the darkness. Your old faction has not forgotten your betrayal. An assassin has found you -- blade drawn, qi concealed, death in their eyes."
 murim_faction.0025.a: "Fight the assassin"
 murim_faction.0025.b: "Rely on my new faction's protection"
 murim_faction.0026.t: "The Double Agent's Gamble"
 murim_faction.0026.desc: "Your cover trembles. Someone noticed your midnight messages, your too-convenient absences, your questions that cut too close to secrets. The walls are closing in."
 murim_faction.0026.a: "Fight your way out"
 murim_faction.0026.b: "Continue the mission"
 murim_faction.0030.t: "Forbidden Love Across the Divide"
 murim_faction.0030.desc: "Of all the people in the martial world, it had to be them -- a member of the enemy faction. You met during a chance encounter at a neutral inn. Your heart wars with your faction loyalty. Your clan would never approve. But the heart wants what the heart wants."
 murim_faction.0030.a: "Pursue the forbidden romance"
 murim_faction.0030.b: "Duty first. Reject these feelings."
 murim_faction.0030.c: "Use the romance for intelligence"
 murim_faction.0031.t: "The Secret Discovered"
 murim_faction.0031.desc: "Someone has seen you together. A clan brother, a suspicious elder, a Phantom Blade scout. The whispers have begun. Your clan leader will know by sunrise."
 murim_faction.0031.a: "Flee together -- abandon both clans"
 murim_faction.0031.b: "End the romance to protect them"
 murim_faction.0031.c: "Face the clan with the truth"
 murim_faction.0031.d: "Deny everything"
 murim_faction.0035.t: "Vengeance for a Murdered Heart"
 murim_faction.0035.desc: "They killed the only person who saw past your faction. Your own clan -- your so-called family -- murdered your beloved to preserve their honor. Grief burns into rage. What do you do with it?"
 murim_faction.0035.a: "Declare blood vendetta against my clan"
 murim_faction.0035.b: "Channel grief into becoming stronger"
 murim_faction.0035.c: "Honor their memory with peace"
 murim_faction.0040.t: "The Martial World United"
 murim_faction.0040.desc: "An external force threatens the entire martial world. The Murim Alliance Leader and the Heavenly Demon must put aside their hatred to survive. Orthodox and Unorthodox, righteous and demonic -- all must stand together or fall separately."
 murim_faction.0040.a: "Support the alliance"
 murim_faction.0040.b: "Exploit the chaos for power"
 murim_faction.0040.c: "Lead the combined martial force"
 murim_faction.0050.t: "Whispers of the Demonic Path"
 murim_faction.0050.desc: "A stranger with the qi signature of the Heavenly Demon Sect approaches you. They whisper an offer: power beyond what your righteous masters will ever teach. Techniques the orthodox call 'forbidden' -- not because they are dangerous, but because they are too effective."
 murim_faction.0050.a: "Show me the power they fear"
 murim_faction.0050.b: "I would rather die righteous"
 murim_faction.0050.c: "Pretend to accept -- become a spy"
 murim_faction.0050.d: "I'll... think about it"
 murim_faction.0060.t: "The Heavenly Demon's Offer"
 murim_faction.0060.desc: "The Heavenly Demon Sect Leader sends a personal envoy -- not to fight, but to talk. The message: your so-called allies in the Murim Alliance take you for granted. What if we offered you a better deal? An alliance that reshapes the martial world."
 murim_faction.0060.a: "Accept the secret alliance"
 murim_faction.0060.b: "Reject and expose the plot"
 murim_faction.0060.c: "Reject but keep it as leverage"
 murim_faction.0061.t: "The Secret Alliance Exposed"
 murim_faction.0061.desc: "The secret is out. Someone found the correspondence, or a spy reported your midnight meetings with the Heavenly Demon's envoy. The Murim Alliance is in uproar. Your clan faces expulsion -- or worse."
 murim_faction.0061.a: "Face the Alliance's judgment"
 murim_faction.0061.b: "Still secret -- continue as planned"
