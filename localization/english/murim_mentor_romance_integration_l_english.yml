l_english:
 murim_mentor_integration.0001.t: "A Critical Moment in Teaching"
 murim_mentor_integration.0001.desc: "Your disciple stands at a crossroads in their cultivation. They have mastered every technique you have shown them and now hunger for the ultimate art -- the secret technique that defines your martial lineage. Sharing it would cement your legacy, but some lessons can only be learned through suffering."
 murim_mentor_integration.0001.a: "Share your ultimate technique with them."
 murim_mentor_integration.0001.b: "Hold back -- they must earn it."
 murim_mentor_integration.0001.c: "Test them with a challenge first."
 murim_mentor_integration.0002.t: "Faction Politics Test the Bond"
 murim_mentor_integration.0002.desc: "Faction elders have moved against your disciple, accusing them of disloyalty and demanding their expulsion. The charges are politically motivated, but opposing the faction risks your own standing. Your disciple watches you from across the hall, awaiting your decision."
 murim_mentor_integration.0002.a: "Stand with my disciple against the faction."
 murim_mentor_integration.0002.b: "Let them handle it alone -- they must grow."
 murim_mentor_integration.0002.c: "Use this to teach a lesson about power."
 murim_mentor_integration.0003.t: "The Disciple Surpasses the Master"
 murim_mentor_integration.0003.desc: "During a sparring session, the truth becomes undeniable -- your disciple's qi has surpassed your own. Their movements carry a depth and power that exceeds everything you taught them. The student has become the master. How you respond to this moment will define your legacy in the martial world."
 murim_mentor_integration.0003.a: "Celebrate their achievement with pride."
 murim_mentor_integration.0003.b: "Challenge them -- the master has more to show."
 murim_mentor_integration.0003.c: "Retire from teaching -- my work is done."
 murim_mentor_integration.0010.t: "Mentor Lineage Consolidation"
 murim_mentor_integration.0010.desc: "Your martial lineage has grown into a recognized tradition. Disciples of your disciples now carry your teachings across the land, and scholars have begun recording your techniques in the annals of the martial world. The time has come to formalize your school's legacy."
 murim_mentor_integration.0010.a: "Formalize the lineage as a dynasty legacy."
 murim_mentor_integration.0010.b: "Let the teachings speak for themselves."
 murim_romance_integration.0001.t: "Romance Blossoms Between Warriors"
 murim_romance_integration.0001.desc: "What began as mutual respect between sparring partners has deepened into something more. Stolen glances during training, lingering touches after duels -- the attraction is unmistakable. Yet in the martial world, romance can be both a wellspring of strength and a dangerous vulnerability."
 murim_romance_integration.0001.a: "Pursue the relationship openly."
 murim_romance_integration.0001.b: "Reject romance -- cultivation demands focus."
 murim_romance_integration.0001.c: "Keep the relationship secret for now."
 murim_romance_integration.0002.t: "Cross-Faction Romance"
 murim_romance_integration.0002.desc: "Your beloved belongs to a rival faction, and both sides have discovered the affair. Elders demand you sever ties immediately, threatening exile if you refuse. Your partner faces the same ultimatum. The martial world watches to see whether love or loyalty will prevail."
 murim_romance_integration.0002.a: "Defy the factions -- love conquers all."
 murim_romance_integration.0002.b: "End it for the clan's sake."
 murim_romance_integration.0002.c: "Use the bond to bridge the two factions."
 murim_romance_integration.0003.t: "Dual Cultivation"
 murim_romance_integration.0003.desc: "You and your partner have discovered that your qi harmonizes in a rare and powerful way. By cultivating together, you could both achieve breakthroughs that would take years alone. The ancient art of dual cultivation is as intimate as it is potent -- a path few martial couples dare to walk."
 murim_romance_integration.0003.a: "Practice dual cultivation together."
 murim_romance_integration.0003.b: "Focus on individual cultivation instead."
 murim_romance_integration.0004.t: "Romance Tested by Betrayal"
 murim_romance_integration.0004.desc: "Your beloved has betrayed your trust. Whether coerced by their faction or acting of their own will, the sting of treachery cuts deeper than any blade. Your qi roils with conflicting emotions, threatening to destabilize your cultivation. The martial world offers no easy path through heartbreak."
 murim_romance_integration.0004.a: "Forgive and try to understand."
 murim_romance_integration.0004.b: "Seek vengeance for the betrayal."
 murim_romance_integration.0004.c: "Walk away -- let the pain fuel cultivation."
 murim_romance_integration.0005.t: "A Martial Dynasty Begins"
 murim_romance_integration.0005.desc: "Your union has produced something greater than either of you alone. Together, you and your partner possess complementary martial arts that, when combined and passed to the next generation, could establish a dynasty of warriors unlike any the murim has seen. The foundation of a great martial house is within reach."
 murim_romance_integration.0005.a: "Found a new martial dynasty together."
 murim_romance_integration.0005.b: "Train our children in both styles."
