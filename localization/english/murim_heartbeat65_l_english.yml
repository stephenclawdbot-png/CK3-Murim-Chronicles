l_english:
 # ========================================
 # HEARTBEAT 65 LOCALIZATION
 # Covers: Poison Flower Exp3, Calamity AI Exp, Custom Clan Exp2,
 # Entry Path Exp2, Faction War Exp, Shadow Politics Exp3
 # ========================================

 # === POISON FLOWER PALACE EXPANSION 3 ===
 murim_poison_flower_exp3.0001.t:0 "The Thousand Petal Trial"
 murim_poison_flower_exp3.0001.desc:0 "The most grueling test of the Poison Flower Palace awaits — exposure to one thousand different poisons in sequence. Only those with bodies tempered by years of cultivation can hope to survive. The Poison Master watches with cold, appraising eyes as the vials are prepared."
 murim_poison_flower_exp3.0001.a:0 "I will endure every petal's kiss."
 murim_poison_flower_exp3.0001.a.success:0 "Your body transcends mortal poison — you have become immune."
 murim_poison_flower_exp3.0001.a.success.toast:0 "Thousand Petal Trial — Survived!"
 murim_poison_flower_exp3.0001.a.failure:0 "The poisons overwhelm your body, leaving scars that may never heal."
 murim_poison_flower_exp3.0001.a.failure.toast:0 "Thousand Petal Trial — Failed"
 murim_poison_flower_exp3.0001.b:0 "Use a hidden antidote... no one will know."
 murim_poison_flower_exp3.0001.c:0 "I am not ready for this trial."

 murim_poison_flower_exp3.0002.t:0 "The Forbidden Garden"
 murim_poison_flower_exp3.0002.desc:0 "Behind a false wall in the deepest chamber of the Palace lies a garden that should not exist — flowers from extinct species, each carrying poisons lost to history. The Garden Keeper guards this knowledge with deadly resolve."
 murim_poison_flower_exp3.0002.a:0 "Study these forbidden flowers in secret."
 murim_poison_flower_exp3.0002.b:0 "Report this discovery to the Palace Mistress."
 murim_poison_flower_exp3.0002.c:0 "These abominations must be destroyed."

 murim_poison_flower_exp3.0003.t:0 "Palace Succession Crisis"
 murim_poison_flower_exp3.0003.desc:0 "The Palace Mistress lies dying, her body finally succumbing to decades of poison exposure. The throne of the Poison Flower Palace stands empty, and rival factions within the Palace circle like vultures. Who will claim the Petal Throne?"
 murim_poison_flower_exp3.0003.a:0 "I claim the throne by right of strength!"
 murim_poison_flower_exp3.0003.a.success:0 "The Palace bows to its new Mistress."
 murim_poison_flower_exp3.0003.a.success.toast:0 "New Palace Mistress!"
 murim_poison_flower_exp3.0003.a.failure:0 "Your bid for the throne has failed."
 murim_poison_flower_exp3.0003.a.failure.toast:0 "Succession Bid Failed"
 murim_poison_flower_exp3.0003.b:0 "Support $rival_candidate.GetFirstName$ — serve as advisor."
 murim_poison_flower_exp3.0003.c:0 "Poison them both and seize power in the chaos."

 murim_poison_flower_exp3.0004.t:0 "Flower Maiden Assassin Training"
 murim_poison_flower_exp3.0004.desc:0 "The Palace's shadow division approaches you with an offer — join the Flower Maiden assassins, the deadliest covert operatives in all of Murim. Beautiful, lethal, and utterly devoted to the Palace's interests."
 murim_poison_flower_exp3.0004.a:0 "I accept the shadow training."
 murim_poison_flower_exp3.0004.b:0 "This path is too dark for me."
 murim_poison_flower_exp3.0004.c:0 "I would rather become a poison healer."

 murim_poison_flower_exp3.0005.t:0 "First Assassination Contract"
 murim_poison_flower_exp3.0005.desc:0 "Your training is complete. The Palace has assigned your first real contract — a target who has wronged the Poison Flower Palace. This is the moment that defines whether you are truly a Flower Maiden."
 murim_poison_flower_exp3.0005.a:0 "Execute the contract flawlessly."
 murim_poison_flower_exp3.0005.a.success:0 "The target falls without ever knowing your name."
 murim_poison_flower_exp3.0005.a.success.toast:0 "Assassination Complete"
 murim_poison_flower_exp3.0005.a.failure:0 "The assassination is botched — you barely escape."
 murim_poison_flower_exp3.0005.a.failure.toast:0 "Assassination Failed"
 murim_poison_flower_exp3.0005.b:0 "Warn the target and betray the Palace."
 murim_poison_flower_exp3.0005.c:0 "Fake the death and let them escape."

 murim_poison_flower_exp3.0006.t:0 "Orthodox Alliance Declares War"
 murim_poison_flower_exp3.0006.desc:0 "The orthodox sects have formally declared the Poison Flower Palace an enemy of righteous martial arts. Their combined forces march toward the Palace. The time for hiding is over."
 murim_poison_flower_exp3.0006.a:0 "Rally the Palace for war!"
 murim_poison_flower_exp3.0006.b:0 "Seek alliance with the Heavenly Demon Sect."
 murim_poison_flower_exp3.0006.c:0 "Poison their leader as a warning."

 murim_poison_flower_exp3.0007.t:0 "Petal Rain Technique Mastery"
 murim_poison_flower_exp3.0007.desc:0 "The ultimate combat art of the Poison Flower Palace — Petal Rain transforms every movement into a cascade of poisoned flower petals that shred flesh and corrupt qi simultaneously. Only the most gifted practitioners can even attempt it."
 murim_poison_flower_exp3.0007.a:0 "Meditate in the Thousand Petal Garden."
 murim_poison_flower_exp3.0007.a.success:0 "Petals dance at your command — you are the storm."
 murim_poison_flower_exp3.0007.a.success.toast:0 "Petal Rain Mastered!"
 murim_poison_flower_exp3.0007.a.failure:0 "The technique's backlash tears through your meridians."
 murim_poison_flower_exp3.0007.a.failure.toast:0 "Petal Rain Backlash"
 murim_poison_flower_exp3.0007.b:0 "Use the Dark Petal shortcut."
 murim_poison_flower_exp3.0007.c:0 "I am not ready yet."

 murim_poison_flower_exp3.0008.t:0 "Palace Spy Network"
 murim_poison_flower_exp3.0008.desc:0 "As Palace Mistress, you have the resources to build an intelligence network spanning all nine clans. Knowledge is the deadliest poison of all."
 murim_poison_flower_exp3.0008.a:0 "Plant spies in all nine clans."
 murim_poison_flower_exp3.0008.b:0 "Focus on orthodox clans only."
 murim_poison_flower_exp3.0008.c:0 "Spy on the Heavenly Demon Sect specifically."

 murim_poison_flower_exp3.0009.t:0 "Forbidden Romance"
 murim_poison_flower_exp3.0009.desc:0 "The Palace's iron rule forbids romantic attachments — love is weakness, poison is strength. But the heart does not obey edicts. You have fallen for someone outside the Palace walls."
 murim_poison_flower_exp3.0009.a:0 "Pursue this love in secret."
 murim_poison_flower_exp3.0009.b:0 "Suppress my feelings for the Palace."
 murim_poison_flower_exp3.0009.c:0 "Leave the Palace forever — love conquers all."

 murim_poison_flower_exp3.0010.t:0 "Eternal Bloom Transcendence"
 murim_poison_flower_exp3.0010.desc:0 "The Eternal Bloom — the legendary final technique that transcends mortal poison arts entirely. The body becomes a living garden of power, each cell a flower of destruction and beauty. This is the Palace's ultimate secret."
 murim_poison_flower_exp3.0010.a:0 "Attempt the Eternal Bloom transcendence."
 murim_poison_flower_exp3.0010.a.success:0 "You bloom eternal — poison and beauty made one."
 murim_poison_flower_exp3.0010.a.success.toast:0 "Eternal Bloom Achieved!"
 murim_poison_flower_exp3.0010.a.failure:0 "The transcendence nearly kills you."
 murim_poison_flower_exp3.0010.a.failure.toast:0 "Eternal Bloom Failed"
 murim_poison_flower_exp3.0010.b:0 "Sacrifice disciples to fuel the technique."
 murim_poison_flower_exp3.0010.c:0 "Wait for natural readiness."

 # === CALAMITY AI EXPANSION ===
 murim_calamity_ai_exp.0001.t:0 "AI Clan War Escalation"
 murim_calamity_ai_exp.0001.desc:0 "The Great Calamity has unleashed primal aggression across all clans. What began as border skirmishes has escalated into total war. Enemy clan leaders arm for annihilation."
 murim_calamity_ai_exp.0001.a:0 "Declare total war on the enemy clan!"
 murim_calamity_ai_exp.0001.b:0 "Target their leader for assassination."
 murim_calamity_ai_exp.0001.b.success:0 "The enemy leader falls in shadow."
 murim_calamity_ai_exp.0001.b.failure:0 "The assassination attempt fails."
 murim_calamity_ai_exp.0001.c:0 "Betray our alliance and switch sides."

 murim_calamity_ai_exp.0002.t:0 "Mass Slaughter"
 murim_calamity_ai_exp.0002.desc:0 "The killing fields run red. The Calamity's devastation is absolute — martial artists fall by the hundreds. The old world is dying around you."
 murim_calamity_ai_exp.0002.a:0 "Bear witness to the devastation..."

 murim_calamity_ai_exp.0003.t:0 "The Emperor Falls"
 murim_calamity_ai_exp.0003.desc:0 "In the chaos of the Great Calamity, the Heavenly Demon Sect sees its ultimate opportunity — the Murim Emperor is vulnerable. Storm the Imperial Palace and end the old order forever."
 murim_calamity_ai_exp.0003.a:0 "Storm the Imperial Palace!"
 murim_calamity_ai_exp.0003.a.success:0 "The Emperor is slain — the old order crumbles."
 murim_calamity_ai_exp.0003.a.failure:0 "The Emperor's power was greater than expected."
 murim_calamity_ai_exp.0003.b:0 "Poison the Emperor instead."

 murim_calamity_ai_exp.0004.t:0 "Civilian Massacre"
 murim_calamity_ai_exp.0004.desc:0 "The unorthodox forces turn their blades on the defenseless. Entire villages of martial world civilians face annihilation."
 murim_calamity_ai_exp.0004.a:0 "Massacre the civilian population."
 murim_calamity_ai_exp.0004.b:0 "Take them as servants instead."
 murim_calamity_ai_exp.0004.c:0 "Refuse orders — protect the innocents."

 murim_calamity_ai_exp.0005.t:0 "Survivor Selection"
 murim_calamity_ai_exp.0005.desc:0 "From each clan, only the strongest survive. Fate and prowess determine who lives and who joins the mountain of corpses. One to three per clan — no more."
 murim_calamity_ai_exp.0005.a:0 "Accept the devastating losses."

 murim_calamity_ai_exp.0006.t:0 "Divine Protection"
 murim_calamity_ai_exp.0006.desc:0 "As the world burns around you, an impossible force shields your bloodline. The heavens themselves seem to intervene — your dynasty will survive this Calamity, no matter the cost."
 murim_calamity_ai_exp.0006.a:0 "The heavens have chosen us to endure."
 murim_calamity_ai_exp.0006.b:0 "Why us? Why must we survive this horror?"

 murim_calamity_ai_exp.0007.t:0 "Passing Down the Mythology"
 murim_calamity_ai_exp.0007.desc:0 "Years after the Calamity, you sit with the next generation. They need to understand what came before — but how do you tell the story?"
 murim_calamity_ai_exp.0007.a:0 "Tell the heroic version — inspire them."
 murim_calamity_ai_exp.0007.b:0 "Tell the truth — they must know the horror."
 murim_calamity_ai_exp.0007.c:0 "Say nothing — bury the past forever."

 murim_calamity_ai_exp.0008.t:0 "Rebuilding Phase"
 murim_calamity_ai_exp.0008.desc:0 "The dust has settled. The old world is ash. Now the survivors must choose — rebuild what was, or create something entirely new."
 murim_calamity_ai_exp.0008.a:0 "Rebuild my original clan from scratch."
 murim_calamity_ai_exp.0008.b:0 "Found an entirely new sect."
 murim_calamity_ai_exp.0008.c:0 "Become a wanderer — no more clan ties."

 murim_calamity_ai_exp.0009.t:0 "Signs of the Next Cycle"
 murim_calamity_ai_exp.0009.desc:0 "The patterns are unmistakable — the same tensions, the same rising hatred, the same cosmic dissonance. Another Calamity approaches. You may be the only one who can see it."
 murim_calamity_ai_exp.0009.a:0 "Warn all clans and prepare defenses."
 murim_calamity_ai_exp.0009.b:0 "Research how to prevent the cycle."
 murim_calamity_ai_exp.0009.c:0 "Keep silent — knowledge is power."

 murim_calamity_ai_exp.0010.t:0 "Dawn of a New Era"
 murim_calamity_ai_exp.0010.desc:0 "The Calamity cycle is complete. From the ashes of the old world, a new martial civilization rises. The survivors are now the elders, the legends, the founders of everything that comes next."
 murim_calamity_ai_exp.0010.a:0 "Let the new era begin."

 # === CUSTOM CLAN EXPANSION 2 ===
 murim_custom_clan_exp2.0001.t:0 "Calling the Clan Assembly"
 murim_custom_clan_exp2.0001.desc:0 "You have gathered enough supporters to form a new martial clan. The democratic path requires an assembly — let the martial artists themselves decide who shall lead."
 murim_custom_clan_exp2.0001.a:0 "Call the assembly and seek a democratic mandate."
 murim_custom_clan_exp2.0001.b:0 "Skip the vote — recruit directly."
 murim_custom_clan_exp2.0001.c:0 "Abandon the idea entirely."

 murim_custom_clan_exp2.0002.t:0 "The Clan Election"
 murim_custom_clan_exp2.0002.desc:0 "The assembled martial artists cast their votes. Your rival makes compelling arguments, but your cultivation speaks for itself. The fate of the new clan hangs in the balance."
 murim_custom_clan_exp2.0002.a:0 "Win through charisma and speeches."
 murim_custom_clan_exp2.0002.a.success:0 "The assembly chooses you — you are the founder!"
 murim_custom_clan_exp2.0002.a.success.toast:0 "Elected Clan Leader!"
 murim_custom_clan_exp2.0002.a.failure:0 "Your rival wins the vote."
 murim_custom_clan_exp2.0002.a.failure.toast:0 "Election Lost"
 murim_custom_clan_exp2.0002.b:0 "Rig the vote through bribery."
 murim_custom_clan_exp2.0002.c:0 "Concede gracefully."

 murim_custom_clan_exp2.0003.t:0 "The Clan Charter"
 murim_custom_clan_exp2.0003.desc:0 "Every great clan begins with founding principles. What will your clan stand for? This charter will define your clan's identity for generations."
 murim_custom_clan_exp2.0003.a:0 "Orthodox: Honor, righteousness, protect the weak."
 murim_custom_clan_exp2.0003.b:0 "Unorthodox: Strength above all, survival of the fittest."
 murim_custom_clan_exp2.0003.c:0 "Neutral: Balance, adaptability, pragmatism."

 murim_custom_clan_exp2.0004.t:0 "Choosing the Clan's Art"
 murim_custom_clan_exp2.0004.desc:0 "A clan is defined by its martial art. What technique will become your clan's signature — the art passed down through generations?"
 murim_custom_clan_exp2.0004.a:0 "Sword-based technique school."
 murim_custom_clan_exp2.0004.b:0 "Internal energy and qi manipulation."
 murim_custom_clan_exp2.0004.c:0 "Deception and stealth arts."
 murim_custom_clan_exp2.0004.d:0 "Hybrid — combine multiple arts."

 murim_custom_clan_exp2.0005.t:0 "Declaration of Supremacy"
 murim_custom_clan_exp2.0005.desc:0 "You will not ask permission. You will not beg for followers. Your cultivation is supreme, and the weak will follow the strong or be swept aside. This is the Supreme Path."
 murim_custom_clan_exp2.0005.a:0 "Defeat all challengers to prove supremacy."
 murim_custom_clan_exp2.0005.a.success:0 "None can stand before you — they kneel."
 murim_custom_clan_exp2.0005.a.success.toast:0 "Supreme Clan Founded!"
 murim_custom_clan_exp2.0005.a.failure:0 "Humiliated — your supremacy was an illusion."
 murim_custom_clan_exp2.0005.a.failure.toast:0 "Supreme Path Failed"
 murim_custom_clan_exp2.0005.b:0 "Demonstrate overwhelming power without fighting."

 murim_custom_clan_exp2.0006.t:0 "Forced Recruitment"
 murim_custom_clan_exp2.0006.desc:0 "The Supreme Path demands followers. Those who will not join willingly must be given... motivation."
 murim_custom_clan_exp2.0006.a:0 "Submit or die."
 murim_custom_clan_exp2.0006.a.success:0 "They submit to your overwhelming power."
 murim_custom_clan_exp2.0006.a.failure:0 "They escape your grasp."
 murim_custom_clan_exp2.0006.b:0 "Offer partnership instead."
 murim_custom_clan_exp2.0006.c:0 "Let them go."

 murim_custom_clan_exp2.0007.t:0 "Establishing a Gathering Place"
 murim_custom_clan_exp2.0007.desc:0 "A clan needs a home. The Supreme Path takes what it needs."
 murim_custom_clan_exp2.0007.a:0 "Establish a mountain training hall."
 murim_custom_clan_exp2.0007.b:0 "Claim an abandoned sect compound."
 murim_custom_clan_exp2.0007.c:0 "Build a hidden underground base."

 murim_custom_clan_exp2.0008.t:0 "First Generation Disciples"
 murim_custom_clan_exp2.0008.desc:0 "Your clan's future depends on the next generation. How will you shape them?"
 murim_custom_clan_exp2.0008.a:0 "Strict training regimen — forge steel."
 murim_custom_clan_exp2.0008.b:0 "Nurturing approach — balanced development."
 murim_custom_clan_exp2.0008.c:0 "Survival of the fittest — let them struggle."

 murim_custom_clan_exp2.0009.t:0 "Rival Clan Challenge"
 murim_custom_clan_exp2.0009.desc:0 "The established clans do not welcome newcomers. A senior clan leader has challenged your right to exist."
 murim_custom_clan_exp2.0009.a:0 "Accept the challenge and fight for legitimacy."
 murim_custom_clan_exp2.0009.a.success:0 "Your clan's right to exist is proven in blood."
 murim_custom_clan_exp2.0009.a.success.toast:0 "Clan Legitimacy Proven!"
 murim_custom_clan_exp2.0009.a.failure:0 "The challenge is lost — your clan's legitimacy is questioned."
 murim_custom_clan_exp2.0009.a.failure.toast:0 "Legitimacy Challenged"
 murim_custom_clan_exp2.0009.b:0 "Negotiate through diplomacy."
 murim_custom_clan_exp2.0009.c:0 "Ignore the challenge."

 murim_custom_clan_exp2.0010.t:0 "Clan Established"
 murim_custom_clan_exp2.0010.desc:0 "Your clan stands recognized in the martial world. From humble beginnings, a new force has emerged."
 murim_custom_clan_exp2.0010.a:0 "Grand establishment ceremony."
 murim_custom_clan_exp2.0010.b:0 "Quiet establishment — actions speak louder."
 murim_custom_clan_exp2.0010.c:0 "Establish through a martial demonstration."

 # === ENTRY PATH EXPANSION 2 ===
 murim_entry_path_exp2.0001.t:0 "Street Fight Recruitment"
 murim_entry_path_exp2.0001.desc:0 "A brawl in the streets catches the eye of a clan elder. Your raw talent shines through untrained fists — this lowborn orphan has potential."
 murim_entry_path_exp2.0001.a:0 "Accept the elder's offer — join the clan."
 murim_entry_path_exp2.0001.b:0 "Refuse — stay independent."
 murim_entry_path_exp2.0001.c:0 "Ask to be tested first."
 murim_entry_path_exp2.0001.c.success:0 "Your raw talent impresses even the elder."
 murim_entry_path_exp2.0001.c.success.toast:0 "Impressed the Elder!"
 murim_entry_path_exp2.0001.c.failure:0 "You lose, but the elder sees your spirit."
 murim_entry_path_exp2.0001.c.failure.toast:0 "Humbled but Accepted"

 murim_entry_path_exp2.0002.t:0 "Training Hell"
 murim_entry_path_exp2.0002.desc:0 "Dawn comes with bruises. The training is merciless — carrying water up mountain stairs, holding horse stance until your legs scream, practicing forms until your hands bleed."
 murim_entry_path_exp2.0002.a:0 "Endure everything — prove your worth."
 murim_entry_path_exp2.0002.b:0 "Find a clever shortcut."
 murim_entry_path_exp2.0002.c:0 "Break down — too much pressure."

 murim_entry_path_exp2.0003.t:0 "Bloodline Awakening"
 murim_entry_path_exp2.0003.desc:0 "A surge of power erupts from within — your blood carries a martial legacy you never knew existed. Your parents, or their parents, walked the martial world."
 murim_entry_path_exp2.0003.a:0 "Embrace the martial bloodline."
 murim_entry_path_exp2.0003.b:0 "Reject the martial world — stay in politics."
 murim_entry_path_exp2.0003.c:0 "Seek out the parent who hid this from you."

 murim_entry_path_exp2.0004.t:0 "Clan Inheritance Challenge"
 murim_entry_path_exp2.0004.desc:0 "Your noble blood grants you a birthright in the clan, but birthright alone is not enough. You must prove worthy before the elders and your rival."
 murim_entry_path_exp2.0004.a:0 "Prove through combat."
 murim_entry_path_exp2.0004.a.success:0 "The clan accepts you as the true heir."
 murim_entry_path_exp2.0004.a.success.toast:0 "Proven Heir!"
 murim_entry_path_exp2.0004.a.failure:0 "The challenge is lost."
 murim_entry_path_exp2.0004.a.failure.toast:0 "Heir Challenge Failed"
 murim_entry_path_exp2.0004.b:0 "Prove through scholarship."
 murim_entry_path_exp2.0004.c:0 "Renounce the inheritance."

 murim_entry_path_exp2.0005.t:0 "Ancient Scroll Discovery"
 murim_entry_path_exp2.0005.desc:0 "While traveling, you discover an ancient martial arts manual hidden in a cave. The yellowed pages contain techniques lost to time — a complete cultivation system."
 murim_entry_path_exp2.0005.a:0 "Study the scroll immediately."
 murim_entry_path_exp2.0005.b:0 "Seek a master to interpret it."
 murim_entry_path_exp2.0005.c:0 "Sell the scroll — it's worth a fortune."

 murim_entry_path_exp2.0006.t:0 "The Hermit Teacher"
 murim_entry_path_exp2.0006.desc:0 "Deep in the mountains, you find a reclusive master who has withdrawn from the martial world. Ancient, powerful, and enigmatic — this hermit could teach you everything."
 murim_entry_path_exp2.0006.a:0 "Train under the hermit."
 murim_entry_path_exp2.0006.b:0 "Learn only the basics and continue wandering."
 murim_entry_path_exp2.0006.c:0 "Challenge the hermit to a duel."
 murim_entry_path_exp2.0006.c.success:0 "Impossible — you actually defeated the hermit."
 murim_entry_path_exp2.0006.c.failure:0 "The hermit crushes you effortlessly."

 murim_entry_path_exp2.0007.t:0 "Pressed Into Service"
 murim_entry_path_exp2.0007.desc:0 "Armed martial artists surround you. They are not asking — they are taking. An unorthodox sect needs bodies for its ranks, and you have been chosen."
 murim_entry_path_exp2.0007.a:0 "Submit to conscription — survive and grow strong."
 murim_entry_path_exp2.0007.b:0 "Fight back against the conscriptors!"
 murim_entry_path_exp2.0007.b.success:0 "You break free from their grip."
 murim_entry_path_exp2.0007.b.failure:0 "They break you instead."
 murim_entry_path_exp2.0007.c:0 "Flee — run far away."

 murim_entry_path_exp2.0008.t:0 "Breaking Free"
 murim_entry_path_exp2.0008.desc:0 "Your cultivation has grown within the clan that conscripted you. Now you face a choice — escape, embrace your captors, or become something more dangerous."
 murim_entry_path_exp2.0008.a:0 "Plot an escape."
 murim_entry_path_exp2.0008.a.success:0 "Freedom — you vanish into the night."
 murim_entry_path_exp2.0008.a.failure:0 "Caught and punished."
 murim_entry_path_exp2.0008.b:0 "Embrace the clan — rise through ranks."
 murim_entry_path_exp2.0008.c:0 "Become a double agent for the orthodox."

 murim_entry_path_exp2.0009.t:0 "First Real Combat"
 murim_entry_path_exp2.0009.desc:0 "Training is over. A bandit leader blocks your path, blade drawn, intent to kill clear in his eyes. This is not a spar. This is life and death."
 murim_entry_path_exp2.0009.a:0 "Fight with everything I have!"
 murim_entry_path_exp2.0009.a.success:0 "Your first kill — the martial world is yours."
 murim_entry_path_exp2.0009.a.success.toast:0 "First Blood!"
 murim_entry_path_exp2.0009.a.failure:0 "Nearly killed — but you survive."
 murim_entry_path_exp2.0009.a.failure.toast:0 "Nearly Died"
 murim_entry_path_exp2.0009.b:0 "Use cunning instead of brute force."
 murim_entry_path_exp2.0009.c:0 "Run and live to fight another day."

 murim_entry_path_exp2.0010.t:0 "Choosing Your Martial Identity"
 murim_entry_path_exp2.0010.desc:0 "You have entered the martial world. Now you must decide who you will become — protector, seeker, shadow, or leader."
 murim_entry_path_exp2.0010.a:0 "The Protector — defend the weak."
 murim_entry_path_exp2.0010.b:0 "The Seeker — pursue ultimate power."
 murim_entry_path_exp2.0010.c:0 "The Shadow — work from the darkness."
 murim_entry_path_exp2.0010.d:0 "The Leader — build something greater."

 # === FACTION WAR EXPANSION ===
 murim_faction_war_exp.0001.t:0 "Orthodox War Council"
 murim_faction_war_exp.0001.desc:0 "The leaders of the orthodox sects gather in Shaolin's great hall. The unorthodox threat can no longer be ignored — war is inevitable. The question is: who will lead?"
 murim_faction_war_exp.0001.a:0 "I will lead the alliance offensive."
 murim_faction_war_exp.0001.b:0 "Advocate for a defensive strategy."
 murim_faction_war_exp.0001.c:0 "Propose peace negotiations instead."

 murim_faction_war_exp.0002.t:0 "First Battlefield Clash"
 murim_faction_war_exp.0002.desc:0 "The armies meet on the Crimson Plains. Orthodox banners flutter alongside Shaolin's golden standards. Across the field, the dark flags of the Heavenly Demon Sect ripple in the wind."
 murim_faction_war_exp.0002.a:0 "Lead the charge personally!"
 murim_faction_war_exp.0002.a.success:0 "Victory! The unorthodox forces retreat!"
 murim_faction_war_exp.0002.a.success.toast:0 "Faction War Victory!"
 murim_faction_war_exp.0002.a.failure:0 "Wounded — the battle is lost."
 murim_faction_war_exp.0002.a.failure.toast:0 "Battle Lost"
 murim_faction_war_exp.0002.b:0 "Command from the rear."
 murim_faction_war_exp.0002.c:0 "Send champions for one-on-one duels."

 murim_faction_war_exp.0003.t:0 "Champion Duel"
 murim_faction_war_exp.0003.desc:0 "Both sides agree to settle the battle through a champion duel. The fate of thousands rests on two blades."
 murim_faction_war_exp.0003.a:0 "I will be the orthodox champion."
 murim_faction_war_exp.0003.a.success:0 "The unorthodox champion falls — victory is ours!"
 murim_faction_war_exp.0003.a.success.toast:0 "Champion Victory!"
 murim_faction_war_exp.0003.a.failure:0 "You fall in single combat."
 murim_faction_war_exp.0003.a.failure.toast:0 "Champion Defeated"
 murim_faction_war_exp.0003.b:0 "Nominate another fighter."
 murim_faction_war_exp.0003.c:0 "Cancel and return to full war."

 murim_faction_war_exp.0004.t:0 "Unorthodox Counter-Attack"
 murim_faction_war_exp.0004.desc:0 "The Demon Lord himself leads a devastating counter-offensive. Orthodox fortifications crumble. The tide of war shifts."
 murim_faction_war_exp.0004.a:0 "Rally the defense!"
 murim_faction_war_exp.0004.b:0 "Evacuate and fall back."
 murim_faction_war_exp.0004.c:0 "Challenge the Demon Lord directly!"
 murim_faction_war_exp.0004.c.success:0 "The Demon Lord falls — the war ends!"
 murim_faction_war_exp.0004.c.failure:0 "Nearly killed by the Demon Lord."

 murim_faction_war_exp.0005.t:0 "Betrayal in Orthodox Ranks"
 murim_faction_war_exp.0005.desc:0 "Your intelligence network reveals a horrifying truth — one of your own is secretly working for the unorthodox forces."
 murim_faction_war_exp.0005.a:0 "Expose the traitor publicly."
 murim_faction_war_exp.0005.b:0 "Use them as a double agent."
 murim_faction_war_exp.0005.c:0 "Execute the traitor as an example."

 murim_faction_war_exp.0006.t:0 "Unorthodox Alliance Fracture"
 murim_faction_war_exp.0006.desc:0 "The Heavenly Demon Sect and Phantom Blade Sect cannot agree on strategy. Their alliance shows cracks."
 murim_faction_war_exp.0006.a:0 "Assert dominance — my strategy prevails."
 murim_faction_war_exp.0006.b:0 "Compromise — split the campaign."
 murim_faction_war_exp.0006.c:0 "Break the alliance — go solo."

 murim_faction_war_exp.0007.t:0 "Forced to Choose a Side"
 murim_faction_war_exp.0007.desc:0 "Envoys from both factions arrive simultaneously. Neutrality is no longer an option — you must choose."
 murim_faction_war_exp.0007.a:0 "Side with the orthodox."
 murim_faction_war_exp.0007.b:0 "Side with the unorthodox."
 murim_faction_war_exp.0007.c:0 "Refuse both — stay neutral at all costs."

 murim_faction_war_exp.0008.t:0 "Siege of Sacred Mountain"
 murim_faction_war_exp.0008.desc:0 "Unorthodox forces besiege the sacred training grounds. Generations of knowledge and artifacts are at risk."
 murim_faction_war_exp.0008.a:0 "Defend to the last breath!"
 murim_faction_war_exp.0008.b:0 "Strategic retreat — save lives."
 murim_faction_war_exp.0008.c:0 "Escape with the sacred texts through a secret passage."

 murim_faction_war_exp.0009.t:0 "Peace Talks"
 murim_faction_war_exp.0009.desc:0 "Both sides are exhausted. The war has taken too much. An enemy negotiator approaches under a white flag."
 murim_faction_war_exp.0009.a:0 "Negotiate honorable peace terms."
 murim_faction_war_exp.0009.a.success:0 "Peace is achieved — the war ends."
 murim_faction_war_exp.0009.a.failure:0 "Negotiations collapse."
 murim_faction_war_exp.0009.b:0 "Demand unconditional surrender."
 murim_faction_war_exp.0009.c:0 "Accept unfavorable terms for peace."

 murim_faction_war_exp.0010.t:0 "War Aftermath"
 murim_faction_war_exp.0010.desc:0 "The faction war is over. The martial world is scarred but surviving. What comes next depends on those who endured."
 murim_faction_war_exp.0010.a:0 "Rebuild and strengthen alliances."
 murim_faction_war_exp.0010.b:0 "Capitalize on weakened enemies."
 murim_faction_war_exp.0010.c:0 "Retire and seek personal cultivation."

 # === SHADOW POLITICS EXPANSION 3 ===
 murim_shadow_pol_exp3.0001.t:0 "The Puppet Emperor Plan"
 murim_shadow_pol_exp3.0001.desc:0 "Why fight the emperor when you can own him? The Heavenly Demon Sect's ultimate political move — install a puppet on the imperial throne and rule from the shadows."
 murim_shadow_pol_exp3.0001.a:0 "Begin the long game — infiltrate the court."
 murim_shadow_pol_exp3.0001.b:0 "Quick strike — assassinate and install now."
 murim_shadow_pol_exp3.0001.b.success:0 "The emperor falls. Your puppet takes the throne."
 murim_shadow_pol_exp3.0001.b.failure:0 "The coup fails spectacularly."
 murim_shadow_pol_exp3.0001.c:0 "Too risky — abandon the plan."

 murim_shadow_pol_exp3.0002.t:0 "Court Infiltration"
 murim_shadow_pol_exp3.0002.desc:0 "Your agents begin penetrating the imperial bureaucracy. Every position of power is a potential chess piece."
 murim_shadow_pol_exp3.0002.a:0 "Place agents in military positions."
 murim_shadow_pol_exp3.0002.b:0 "Place agents in the treasury."
 murim_shadow_pol_exp3.0002.c:0 "Place agents close to the emperor."

 murim_shadow_pol_exp3.0003.t:0 "Poisoning the Emperor"
 murim_shadow_pol_exp3.0003.desc:0 "Your agents near the emperor begin the slow, methodical work of weakening the throne's occupant."
 murim_shadow_pol_exp3.0003.a:0 "Slow poison — weaken him over months."
 murim_shadow_pol_exp3.0003.b:0 "Mind-affecting poison — make him suggestible."
 murim_shadow_pol_exp3.0003.c:0 "Wait — not the right time yet."

 murim_shadow_pol_exp3.0004.t:0 "The Puppet Takes the Throne"
 murim_shadow_pol_exp3.0004.desc:0 "The old emperor is gone. Your carefully chosen puppet sits on the Dragon Throne, and you hold every string."
 murim_shadow_pol_exp3.0004.a:0 "Take full shadow control."
 murim_shadow_pol_exp3.0004.b:0 "Share power — more sustainable."

 murim_shadow_pol_exp3.0005.t:0 "Puppet's Secret Resistance"
 murim_shadow_pol_exp3.0005.desc:0 "Your puppet develops a spine. Secret meetings, hidden correspondence, attempts to build an independent power base. The puppet pulls against its strings."
 murim_shadow_pol_exp3.0005.a:0 "Crush the resistance brutally."
 murim_shadow_pol_exp3.0005.b:0 "Negotiate — give more autonomy."
 murim_shadow_pol_exp3.0005.c:0 "Replace with a more compliant puppet."

 murim_shadow_pol_exp3.0006.t:0 "Orthodox Investigation"
 murim_shadow_pol_exp3.0006.desc:0 "Orthodox sect investigators have noticed something wrong at court. They probe closer to the truth of your shadow government."
 murim_shadow_pol_exp3.0006.a:0 "Eliminate the investigator."
 murim_shadow_pol_exp3.0006.a.success:0 "The investigator disappears permanently."
 murim_shadow_pol_exp3.0006.a.failure:0 "The investigation exposes your scheme."
 murim_shadow_pol_exp3.0006.b:0 "Frame someone else as the puppet master."
 murim_shadow_pol_exp3.0006.c:0 "Flee and regroup."

 murim_shadow_pol_exp3.0007.t:0 "Imperial Decree Manipulation"
 murim_shadow_pol_exp3.0007.desc:0 "The puppet emperor's seal is yours to command. What imperial decree will you forge?"
 murim_shadow_pol_exp3.0007.a:0 "Ban orthodox martial arts practices."
 murim_shadow_pol_exp3.0007.b:0 "Levy massive taxes on rival clans."
 murim_shadow_pol_exp3.0007.c:0 "Grant unorthodox sects official recognition."

 murim_shadow_pol_exp3.0008.t:0 "Assassination Attempt on Puppet"
 murim_shadow_pol_exp3.0008.desc:0 "Orthodox assassins strike at the puppet emperor. Your shadow government faces its first existential test."
 murim_shadow_pol_exp3.0008.a:0 "Intercept and fight the assassin."
 murim_shadow_pol_exp3.0008.a.success:0 "The assassin falls by your hand."
 murim_shadow_pol_exp3.0008.a.failure:0 "Wounded protecting the puppet."
 murim_shadow_pol_exp3.0008.b:0 "Let the puppet die — install a new one."
 murim_shadow_pol_exp3.0008.c:0 "Use the attempt to justify a crackdown."

 murim_shadow_pol_exp3.0009.t:0 "Shadow Court Inner Circle"
 murim_shadow_pol_exp3.0009.desc:0 "Your shadow government needs structure. A secret court within the court — the true power behind the Dragon Throne."
 murim_shadow_pol_exp3.0009.a:0 "Appoint Heavenly Demon members to key positions."
 murim_shadow_pol_exp3.0009.b:0 "Include talented outsiders."
 murim_shadow_pol_exp3.0009.c:0 "Keep the circle minimal — trust no one."

 murim_shadow_pol_exp3.0010.t:0 "The Puppet System's Reckoning"
 murim_shadow_pol_exp3.0010.desc:0 "After years of shadow rule, the system reaches a crisis point. External pressure and internal strain demand a final decision."
 murim_shadow_pol_exp3.0010.a:0 "Consolidate — become the eternal shadow ruler."
 murim_shadow_pol_exp3.0010.b:0 "Reveal yourself — take the throne openly."
 murim_shadow_pol_exp3.0010.c:0 "Dismantle the system — return to the shadows."

