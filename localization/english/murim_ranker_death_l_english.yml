l_english:
 murim_ranker_death.0001.t: "A Legend Has Fallen"
 murim_ranker_death.0001.desc_number_one: "The unthinkable has happened. The Number One Under Heaven has fallen. The strongest martial artist the world has ever known is dead. Every cultivator feels the void — a great presence extinguished, leaving the martial world fundamentally changed."
 murim_ranker_death.0001.desc_top_five: "A pillar of the martial world has crumbled. One of the five greatest cultivators of this era has perished. The rankings will shift, old rivalries will reignite, and ambitious warriors everywhere sense opportunity in the void left behind."
 murim_ranker_death.0001.desc_top_ten: "A top-ranked martial artist has fallen. Their name commanded respect and fear across the nine clans. Now that name belongs to history, and the rankings must be rewritten. The scramble for their vacant position has already begun."
 murim_ranker_death.0001.a: "Pay respects to the fallen legend."
 murim_ranker_death.0001.b: "Seize the opportunity — claim their rank."
 murim_ranker_death.0001.c: "Mourn in silence."
 murim_ranker_death.0002.t: "Memorial for the Fallen"
 murim_ranker_death.0002.desc: "It falls to you to honor the departed — a martial artist whose name will echo through the ages. A memorial ceremony would show the martial world that your sect values its legends. The question is how grand a tribute to offer."
 murim_ranker_death.0002.a: "Hold a grand memorial — spare no expense."
 murim_ranker_death.0002.b: "A modest but respectful ceremony."
 murim_ranker_death.0002.c: "Refuse to hold a memorial."
 murim_ranker_death.0003.t: "Hall of Legends Induction"
 murim_ranker_death.0003.desc: "Your name has been put forward for the Hall of Legends — the sacred record of the greatest martial artists who ever lived. To be inducted is the highest honor the martial world can bestow, but it also paints a target on your back for every ambitious challenger."
 murim_ranker_death.0003.a: "Accept the honor with humility."
 murim_ranker_death.0003.b: "Decline — too many rivals will target me."
 murim_ranker_death.0003.c: "Demand the number one spot in the Hall."
 murim_ranker_death.0004.t: "Power Vacuum"
 murim_ranker_death.0004.desc: "The death of a ranker has left a gap in the martial hierarchy, and you can feel the pull of it — like a whirlpool dragging everyone nearby toward the empty position. Others are already making their moves. If you want to climb, you must act now."
 murim_ranker_death.0004.a: "Challenge the next ranker above for their spot."
 murim_ranker_death.0004.b: "Wait and observe — let others exhaust themselves."
 murim_ranker_death.0004.c: "Eliminate competitors through underhanded means."
 murim_ranker_death.0005.t: "Successor Crisis"
 murim_ranker_death.0005.desc: "Your legacy weighs heavy. Among your children, several show the spark of martial genius, but only one can inherit the full weight of your teachings and position. Choosing wrong could shatter your family — or leave your life's work to wither."
 murim_ranker_death.0005.a: "Name your strongest child as successor."
 murim_ranker_death.0005.b: "Hold a tournament to decide the heir."
 murim_ranker_death.0005.c: "Let them fight it out naturally."
 murim_ranker_death.0006.t: "The Mourning Period"
 murim_ranker_death.0006.desc: "The loss reverberates through your sect like a struck bell. Disciples train with hollow eyes. Elders sit in silence where they once debated loudly. The sect needs time to grieve — but time is a luxury when rival sects sense weakness."
 murim_ranker_death.0006.a: "Full mourning — no combat for one year."
 murim_ranker_death.0006.b: "Brief mourning, then redouble training."
 murim_ranker_death.0006.c: "Exploit the mourning to strike at rivals."
 murim_ranker_death.0007.t: "Legend Claim Challenged"
 murim_ranker_death.0007.desc: "Your claim to legendary status has not gone unchallenged. A rival martial artist stands before you, fists clenched, qi surging — demanding you prove your worth or surrender your title. The martial world watches. There is no backing down without losing everything."
 murim_ranker_death.0007.a: "Accept the challenge. Prove my legend."
 murim_ranker_death.0007.b: "Refuse and accept the loss of face."
 murim_ranker_death.0007.c: "Propose a delayed duel at the next tournament."
 murim_ranker_death.0008.t: "A Child's Rebellion"
 murim_ranker_death.0008.desc: "The child you passed over for succession has not taken it well. Bitter words have become bitter actions — they gather supporters, undermine your chosen heir, and speak openly of your unfairness. A family torn apart by ambition is a blade turned inward."
 murim_ranker_death.0008.a: "Try to reconcile with your child."
 murim_ranker_death.0008.b: "Crush the rebellion with force."
 murim_ranker_death.0008.c: "Exile the rebellious child."
 murim_ranker_death.0009.t: "The Succession Tournament"
 murim_ranker_death.0009.desc: "The tournament grounds are set. Your potential successors face each other beneath your watchful gaze, each desperate to prove themselves worthy of your legacy. Steel clashes against steel, qi flares against qi, and the crowd holds its breath."
 murim_ranker_death.0009.a: "The strongest child claims victory."
 murim_ranker_death.0009.b: "An outsider wins unexpectedly."
 murim_ranker_death.0009.c: "The tournament erupts into chaos."
 murim_ranker_death.0010.t: "The World Shakes: Number One Is Dead"
 murim_ranker_death.0010.desc: "The Number One Under Heaven is dead. The shockwave ripples through every sect, every clan, every lonely cultivator on a mountain peak. An era has ended. The throne at the summit of the martial world stands empty, and every ambitious soul in creation turns their eyes upward."
 murim_ranker_death.0010.a: "The world will never be the same."
 murim_ranker_death.0010.b: "This is my chance to become Number One."
 murim_ranker_death.0010.c: "Retreat into seclusion and train harder."
