l_english:

 # === CALAMITY AI EVENTS ===
 murim_calamity_ai.0001.t: "Calamity War Declaration"
 murim_calamity_ai.0001.desc: "The Great Calamity rages. Ancient rivalries have boiled over into open warfare. As clan leader, the pressure to strike first is overwhelming. Your scouts report movement from rival clans - they are mobilizing for war."
 murim_calamity_ai.0001.a: "Declare total war on the rival clan!"
 murim_calamity_ai.0001.b: "Fortify our position and defend."
 
 murim_calamity_ai.0002.t: "Betrayal in the Calamity"
 murim_calamity_ai.0002.desc: "The alliance forged in desperation is crumbling. Your spies report that your ally's supplies are vulnerable. In the chaos of the calamity, who would know? The temptation to strike while their guard is down grows stronger by the day."
 murim_calamity_ai.0002.a: "Poison their supplies - survival demands it."
 murim_calamity_ai.0002.b: "Honor the alliance. We are not animals."
 
 murim_calamity_ai.0003.t: "Death Stalks the Martial World"
 murim_calamity_ai.0003.desc: "The Great Calamity has turned the martial world into a charnel house. Battles rage in every province. Qi storms tear across the landscape. Surviving requires not just skill but fortune itself."
 murim_calamity_ai.0003.a: "Face the chaos."
 
 murim_calamity_ai.0004.t: "The Emperor Falls"
 murim_calamity_ai.0004.desc: "The throne itself is not safe from the Great Calamity. Martial clans have turned their fury upon the imperial court. The emperor's guards have fallen. The mandate of heaven is broken."
 murim_calamity_ai.0004.a: "The throne crumbles to dust."
 
 murim_calamity_ai.0005.t: "Civilians in the Crossfire"
 murim_calamity_ai.0005.desc: "The Great Calamity spares no one. Martial artists battle in the streets, their qi blasts destroying homes and markets. Civilians flee in terror, but there is nowhere to run. The entire region has become a battlefield."
 murim_calamity_ai.0005.a: "Pray for survival."
 
 murim_calamity_ai.0006.t: "The Last of the Clan"
 murim_calamity_ai.0006.desc: "The dust settles on another devastated clan compound. Bodies of fallen martial brothers and sisters lie scattered across the training grounds. You search for survivors, but the silence is deafening."
 murim_calamity_ai.0006.a: "I still stand. The clan endures through me."
 murim_calamity_ai.0006.b: "There are too many survivors already. The calamity claims me too."
 
 murim_calamity_ai.0007.t: "Heaven's Protection"
 murim_calamity_ai.0007.desc: "As the Great Calamity rages around you, a strange calm descends. Your qi flows stronger than ever. Whether by heaven's mandate or sheer will, you will survive this apocalypse. Your dynasty must endure."
 murim_calamity_ai.0007.a: "Heaven has chosen me to rebuild."
 murim_calamity_ai.0007.b: "I survive, but at a terrible cost."
 
 murim_calamity_ai.0008.t: "Chronicles of the Fallen Era"
 murim_calamity_ai.0008.desc: "The calamity has ended, but its scars run deep. The great masters of the previous era are gone - their techniques, their rivalries, their glory all reduced to stories. Someone must write the chronicles before the memories fade."
 murim_calamity_ai.0008.a: "I will record the fallen era for future generations."
 murim_calamity_ai.0008.b: "The memories are too painful. Let them die."
 
 murim_calamity_ai.0009.t: "Rebuilding From Ashes"
 murim_calamity_ai.0009.desc: "The martial world lies in ruins. Your clan's compound is half-destroyed, its members scattered or dead. But you survived. As clan leader, the burden of rebuilding falls on your shoulders. Orphans and refugees gather at your gates."
 murim_calamity_ai.0009.a: "Rebuild the clan with new blood."
 murim_calamity_ai.0009.b: "Merge with another surviving clan."
 
 murim_calamity_ai.0010.t: "Dawn of a New Era"
 murim_calamity_ai.0010.desc: "A generation has passed since the Great Calamity. New disciples train where old masters fell. The martial world is reborn, smaller but alive. Standing at the threshold of a new era, you must decide what kind of world to build."
 murim_calamity_ai.0010.a: "The cycle ends here. I swear it."
 murim_calamity_ai.0010.b: "The cycle is eternal. I accept my fate."

 # === POISON FLOWER EXPANSION ===
 murim_poison_flower_exp.0001.t: "Poison Garden Cultivation"
 murim_poison_flower_exp.0001.desc: "The secret gardens of the Poison Flower Palace bloom with deadly beauty. Each petal carries enough toxin to kill a dozen men. The Palace Matriarch has given you access to cultivate your own section."
 murim_poison_flower_exp.0001.a: "Cultivate the Seven-Petal Death Orchid."
 murim_poison_flower_exp.0001.b: "Focus on healing antidotes instead."
 murim_poison_flower_exp.0002.t: "Seduction Assassination Mission"
 murim_poison_flower_exp.0002.desc: "The Palace has received a contract. A rival clan leader must be eliminated, and your beauty is the weapon of choice. Seduce, poison, disappear - the classic Poison Flower method."
 murim_poison_flower_exp.0002.a: "Accept the assassination contract."
 murim_poison_flower_exp.0002.b: "Refuse the mission."
 murim_poison_flower_exp.0003.t: "Seven Poisons Trial"
 murim_poison_flower_exp.0003.desc: "Every Poison Flower disciple must build immunity through the Seven Poisons Trial - ingesting increasingly lethal doses over seven days. Many die. Those who survive become virtually unkillable by poison."
 murim_poison_flower_exp.0003.a: "Begin the Seven Poisons Trial."
 murim_poison_flower_exp.0003.b: "Too dangerous. Train conventionally."
 murim_poison_flower_exp.0004.t: "Beauty as Weapon"
 murim_poison_flower_exp.0004.desc: "In the Poison Flower Palace, beauty is not vanity - it is the deadliest weapon. The Flower Enchantment technique uses qi to enhance attractiveness to supernatural levels."
 murim_poison_flower_exp.0004.a: "Master the Flower Enchantment."
 murim_poison_flower_exp.0004.b: "Focus on combat poison arts."
 murim_poison_flower_exp.0005.t: "Palace Succession"
 murim_poison_flower_exp.0005.desc: "The current Matriarch grows old. The Flower Petal Ceremony must choose a successor - the most skilled in both poison arts and palace politics."
 murim_poison_flower_exp.0005.a: "Anoint my chosen successor."
 murim_poison_flower_exp.0005.b: "I will reign until death."
 murim_poison_flower_exp.0006.t: "Orthodox Diplomatic Incident"
 murim_poison_flower_exp.0006.desc: "Relations between the Poison Flower Palace and the orthodox clans have always been... complicated. An opportunity to either provoke or reconcile has arisen."
 murim_poison_flower_exp.0006.a: "Send a poisoned gift as provocation."
 murim_poison_flower_exp.0006.b: "Propose a non-aggression pact."
 murim_poison_flower_exp.0007.t: "Soul Devouring Petal"
 murim_poison_flower_exp.0007.desc: "The forbidden art of the Palace - the Soul Devouring Petal. It grants immense power but consumes the practitioner from within. Many who attempt it go mad or die."
 murim_poison_flower_exp.0007.a: "Attempt the forbidden art."
 murim_poison_flower_exp.0007.b: "The risk is too great."
 murim_poison_flower_exp.0008.t: "Palace Internal Rivalry"
 murim_poison_flower_exp.0008.desc: "Two of the Palace's most talented disciples are at each other's throats. Their rivalry threatens to split the Palace. As Matriarch, you must intervene."
 murim_poison_flower_exp.0008.a: "Let them compete - trial by poison."
 murim_poison_flower_exp.0008.b: "Assign them different roles."

 # === IRON FIST EXPANSION 2 ===
 murim_iron_fist_exp2.0001.t: "Iron Body Perfection Trial"
 murim_iron_fist_exp2.0001.desc: "The Thousand Hammer Tempering - the ultimate test of Iron Fist body cultivation. Your entire body will be struck with qi-infused hammers for three days. Those who endure gain truly unbreakable flesh."
 murim_iron_fist_exp2.0001.a: "Endure the Thousand Hammer Tempering."
 murim_iron_fist_exp2.0001.b: "Train conventionally."
 murim_iron_fist_exp2.0002.t: "Mountain Fortress Defense"
 murim_iron_fist_exp2.0002.desc: "The Iron Fist Gate's mountain fortress is under attack. The narrow passes give defenders an advantage, but the attackers are determined. The Gate Master must decide how to respond."
 murim_iron_fist_exp2.0002.a: "Hold the mountain pass with iron discipline."
 murim_iron_fist_exp2.0002.b: "Negotiate rather than fight."
 murim_iron_fist_exp2.0002.success: "The fortress holds! The attackers retreat in shame."
 murim_iron_fist_exp2.0002.failure: "The fortress is breached!"
 murim_iron_fist_exp2.0003.t: "Iron Fist Smithing Arts"
 murim_iron_fist_exp2.0003.desc: "In the Iron Fist Gate, forging weapons is a form of meditation. The rhythm of the hammer, the heat of the forge, the shaping of steel - it mirrors the tempering of the body."
 murim_iron_fist_exp2.0003.a: "Forge a personal weapon."
 murim_iron_fist_exp2.0003.b: "Focus on body cultivation."
 murim_iron_fist_exp2.0004.t: "Gate Hierarchy Challenge"
 murim_iron_fist_exp2.0004.desc: "In the Iron Fist Gate, rank is earned through strength alone. A younger disciple with greater prowess has the right to challenge an elder for position."
 murim_iron_fist_exp2.0004.a: "Challenge the elder for position."
 murim_iron_fist_exp2.0004.b: "Wait for the right moment."
 murim_iron_fist_exp2.0005.t: "Three Peaks Endurance March"
 murim_iron_fist_exp2.0005.desc: "Young disciples must complete the Three Peaks March - crossing three mountain peaks while carrying iron weights equal to their body weight. It breaks the weak and forges the strong."
 murim_iron_fist_exp2.0005.a: "Complete the march."
 murim_iron_fist_exp2.0005.b: "Train in camp instead."
 murim_iron_fist_exp2.0006.t: "Iron vs Demon Confrontation"
 murim_iron_fist_exp2.0006.desc: "The Iron Fist Gate and the Heavenly Demon Sect represent opposing philosophies - honest strength versus dark cunning. A confrontation between their leaders is inevitable."
 murim_iron_fist_exp2.0006.a: "Challenge the Demon Lord directly."
 murim_iron_fist_exp2.0006.b: "Rally the orthodox alliance first."
 murim_iron_fist_exp2.0007.t: "Iron Fist Initiation"
 murim_iron_fist_exp2.0007.desc: "Every new disciple of the Iron Fist Gate must pass the initiation rite - breaking 10 stone slabs with bare fists. Failure means broken bones. Success means admission."
 murim_iron_fist_exp2.0007.a: "Break the stone slabs."
 murim_iron_fist_exp2.0007.b: "Ask for an alternative trial."
 murim_iron_fist_exp2.0008.t: "Gate Master's Retirement"
 murim_iron_fist_exp2.0008.desc: "The Gate Master has served for decades. Age has softened the iron, and a successor must be chosen. The strongest disciple stands ready."
 murim_iron_fist_exp2.0008.a: "Pass the Iron Seal to the strongest."
 murim_iron_fist_exp2.0008.b: "Rule until death - iron will."

 # === SHADOW POLITICS EXPANSION ===
 murim_shadow_exp.0001.t: "Install Puppet Emperor"
 murim_shadow_exp.0001.desc: "The Heavenly Demon Sect has grown powerful enough to reach for the ultimate prize - control of the imperial throne itself. A figurehead emperor, controlled by demon strings."
 murim_shadow_exp.0001.a: "Assassinate the emperor and install a puppet."
 murim_shadow_exp.0001.b: "Corrupt the emperor through bribery."
 murim_shadow_exp.0002.t: "Expanding the Spy Network"
 murim_shadow_exp.0002.desc: "With the throne under control, the Demon Sect's shadow network can expand further. Spies in every clan, informants in every market, eyes in every court."
 murim_shadow_exp.0002.a: "Plant spies in every major clan."
 murim_shadow_exp.0002.b: "Control trade routes instead."
 murim_shadow_exp.0003.t: "Blackmail Material"
 murim_shadow_exp.0003.desc: "Your spy network has uncovered a secret about an orthodox clan leader. The information could be used as leverage - or as a bridge to an unexpected alliance."
 murim_shadow_exp.0003.a: "Use the secret to force compliance."
 murim_shadow_exp.0003.b: "Offer alliance instead of blackmail."
 murim_shadow_exp.0004.t: "Imperial Decree Manipulation"
 murim_shadow_exp.0004.desc: "The puppet emperor awaits your orders. Imperial decrees carry the weight of heaven's mandate - they can ban clans, levy taxes, or declare enemies of the state."
 murim_shadow_exp.0004.a: "Issue an imperial ban on the rival clan."
 murim_shadow_exp.0004.b: "Issue a tax levy on all clans."
 murim_shadow_exp.0005.t: "Shadow Control Discovered"
 murim_shadow_exp.0005.desc: "An orthodox clan leader has discovered the truth - the emperor is a puppet of the Heavenly Demon Sect. The evidence is irrefutable. The question is what to do with it."
 murim_shadow_exp.0005.a: "Rally the orthodox clans to war!"
 murim_shadow_exp.0005.b: "Keep it secret - use it for leverage."
 murim_shadow_exp.0006.t: "Demon Sect Internal Struggle"
 murim_shadow_exp.0006.desc: "Power corrupts, and the shadow puppeteer faces a challenge from within. A rival elder within the Demon Sect wants a share of the empire's strings."
 murim_shadow_exp.0006.a: "Eliminate the rival."
 murim_shadow_exp.0006.b: "Offer them a share of power."
 murim_shadow_exp.0007.t: "Shadow Intelligence Report"
 murim_shadow_exp.0007.desc: "Your spy network has compiled its periodic report. Intelligence from across the martial world flows to your desk. Knowledge is power, and power is everything."
 murim_shadow_exp.0007.a: "Review intelligence on orthodox clans."
 murim_shadow_exp.0007.b: "Focus on the emperor's court."
 murim_shadow_exp.0008.t: "Puppet Emperor Rebellion"
 murim_shadow_exp.0008.desc: "The puppet has grown bold. Whispers of rebellion reach your ears - the figurehead emperor is gathering loyalists, planning to cut the demon strings. This cannot stand."
 murim_shadow_exp.0008.a: "Crush the rebellion."
 murim_shadow_exp.0008.b: "Replace the puppet with a new one."

 # === CUSTOM CLAN EXPANSION ===
 murim_custom_exp.0001.t: "Elder Council Convenes"
 murim_custom_exp.0001.desc: "The elders of the martial world have gathered to hear your petition. Creating a new clan requires their blessing - or their fear. Present your doctrine and pray for approval."
 murim_custom_exp.0001.a: "Present orthodox doctrine."
 murim_custom_exp.0001.b: "Present unorthodox doctrine."
 murim_custom_exp.0002.t: "Supreme Path - Dominance Challenge"
 murim_custom_exp.0002.desc: "You have chosen the path of supreme strength. No council approval, no votes - only raw power proves the right to found a clan. Defeat the strongest and claim your place."
 murim_custom_exp.0002.a: "Challenge the strongest masters."
 murim_custom_exp.0002.b: "Not ready yet - train more."
 murim_custom_exp.0003.t: "Name Your Clan"
 murim_custom_exp.0003.desc: "Your clan is approved. Now it needs a name - a name that will echo through the ages of the martial world. Choose wisely, for this name defines your legacy."
 murim_custom_exp.0003.a: "Name it after my dynasty."
 murim_custom_exp.0003.b: "Name it after my martial philosophy."
 murim_custom_exp.0003.c: "Name it after my homeland."
 murim_custom_exp.0004.t: "Found Your Signature Technique"
 murim_custom_exp.0004.desc: "Every great clan has a signature technique - a martial art unique to their lineage. As founder, you must create the art that will define your clan for generations."
 murim_custom_exp.0004.a: "Create an aggressive combat art."
 murim_custom_exp.0004.b: "Create a defensive formation art."
 murim_custom_exp.0004.c: "Create an internal cultivation method."
 murim_custom_exp.0004.d: "Create a poison/assassination art."
 murim_custom_exp.0005.t: "Prove Your Worth"
 murim_custom_exp.0005.desc: "The elders have given you a conditional approval - complete a dangerous mission to prove your clan deserves to exist. The mission is almost certainly a death trap."
 murim_custom_exp.0005.a: "Complete the mission."
 murim_custom_exp.0005.b: "Give up the dream."
 murim_custom_exp.0006.t: "Choose a Gathering Place"
 murim_custom_exp.0006.desc: "Every clan needs a place where disciples train and elders convene. Not a territory to rule — a sect is an organization, not a realm. But you need a hall, a courtyard, a place to call home."
 murim_custom_exp.0006.a: "A secluded mountain temple — isolated, perfect for cultivation."
 murim_custom_exp.0006.b: "A riverside compound — prosperous, with trade access."
 murim_custom_exp.0006.c: "A hidden hall within a city — blending into society."
 murim_custom_exp.0006.d: "No fixed hall — we meet in teahouses and inns, like the Beggar Sect."
 murim_custom_exp.0007.t: "Recruit First Disciples"
 murim_custom_exp.0007.desc: "Your clan exists on paper, but it needs people. The first generation of disciples will define the clan's character for decades to come."
 murim_custom_exp.0007.a: "Hold open trials."
 murim_custom_exp.0007.b: "Recruit from trusted families."
 murim_custom_exp.0007.c: "Recruit orphans and outcasts."
 murim_custom_exp.0008.t: "Legitimacy Challenged"
 murim_custom_exp.0008.desc: "A rival clan questions your right to exist. They demand you prove your clan's worth in combat or pay tribute. Your response will set the tone for your clan's future."
 murim_custom_exp.0008.a: "Accept the challenge."
 murim_custom_exp.0008.b: "Offer tribute to avoid conflict."

 # === ENTRY PATH EXPANSION ===
 murim_entry_exp.0001.t: "The Scout's Invitation"
 murim_entry_exp.0001.desc: "A sect scout has identified your talent. Three clans have expressed interest in taking you as a disciple. Each offers a different path into the martial world."
 murim_entry_exp.0001.a: "Join Mount Hua Sect."
 murim_entry_exp.0001.b: "Join Shaolin Temple."
 murim_entry_exp.0001.c: "Join Beggar Sect."
 murim_entry_exp.0001.d: "Refuse all - stay in normal life."
 murim_entry_exp.0002.t: "Wild Qi Awakening"
 murim_entry_exp.0002.desc: "Your near-death experience awakened dormant qi, but it flows wild and uncontrolled. Without guidance, it could consume you from within."
 murim_entry_exp.0002.a: "Seek a mentor to control it."
 murim_entry_exp.0002.b: "Try to control it alone."
 murim_entry_exp.0003.t: "Bloodline Secret"
 murim_entry_exp.0003.desc: "Research into your ancestry has revealed a shocking truth. Your bloodline carries the martial legacy of a famous figure from centuries past."
 murim_entry_exp.0003.a: "My ancestor was a transcendent master."
 murim_entry_exp.0003.b: "My ancestor was a notorious villain."
 murim_entry_exp.0004.t: "Manual Study Progress"
 murim_entry_exp.0004.desc: "The martial manual you found grows more complex with each page. The techniques described require intense concentration and perfect qi flow to master."
 murim_entry_exp.0004.a: "Study intensely - risk qi deviation."
 murim_entry_exp.0004.b: "Study carefully and slowly."
 murim_entry_exp.0005.t: "First Real Fight"
 murim_entry_exp.0005.desc: "Training and theory only go so far. Your first real fight against another martial artist will test everything you have learned."
 murim_entry_exp.0005.a: "Fight with everything I have!"
 murim_entry_exp.0005.b: "Avoid the fight."
 murim_entry_exp.0006.t: "Choose Your Specialization"
 murim_entry_exp.0006.desc: "You have proven yourself capable. Now comes the pivotal choice - what kind of martial artist will you become? Your path forward defines your fighting style forever."
 murim_entry_exp.0006.a: "External martial arts - body cultivation."
 murim_entry_exp.0006.b: "Internal cultivation - qi development."
 murim_entry_exp.0006.c: "Weapon mastery."
 murim_entry_exp.0006.d: "Poison and medicine."
 murim_entry_exp.0007.t: "Encounter with the Jianghu"
 murim_entry_exp.0007.desc: "The jianghu - the world of martial artists, bandits, heroes, and villains. Your first real encounter with its chaos arrives unexpectedly."
 murim_entry_exp.0007.a: "Help the ambushed merchant."
 murim_entry_exp.0007.b: "Mind my own business."
 murim_entry_exp.0008.t: "First Rank Breakthrough"
 murim_entry_exp.0008.desc: "Your cultivation has reached a critical point. The barrier between Unranked and Third-Rate looms before you. Breaking through requires perfect focus and a surge of qi."
 murim_entry_exp.0008.a: "Attempt the breakthrough."
 murim_entry_exp.0008.b: "Not ready - keep training."
