l_english:
 murim_beggar.0001.t: "The Beggar's Initiation"
 murim_beggar.0001.desc: "Rain-soaked and hungry, you stand before the Beggar Sect's council. To join the largest sect in the martial world, you must prove you understand poverty. Humility is not weakness here — it is the foundation of strength."
 murim_beggar.0001.a: "Live as a true beggar for thirty days."
 murim_beggar.0001.b: "Donate my wealth to the poor."
 murim_beggar.0001.c: "Prove my worth through intelligence work."
 murim_beggar.0002.t: "Dog Beating Staff Technique"
 murim_beggar.0002.desc: "The Chief's personal weapon art is laid before you — the Dog Beating Staff, passed down through generations of Beggar Sect leaders. Learning these stances marks you as a candidate for the highest office."
 murim_beggar.0002.a: "Learn the orthodox 36 stances."
 murim_beggar.0002.b: "Focus on the 12 killing stances."
 murim_beggar.0002.c: "Fuse the staff with Dragon Subduing Palms."
 murim_beggar.0003.t: "Clean Faction vs Dirty Faction"
 murim_beggar.0003.desc: "The Beggar Sect tears itself apart along its oldest fault line. The Clean Faction — wealthy donors who buy rank — faces off against the Dirty Faction, true beggars who earned every scar. You must choose your side."
 murim_beggar.0003.a: "Side with the Clean Faction."
 murim_beggar.0003.b: "Side with the Dirty Faction."
 murim_beggar.0003.c: "Unite both factions under my leadership."
 murim_beggar.0003.d: "Secretly work with the Heavenly Demon."
 murim_beggar.0004.t: "Intelligence Network Mission"
 murim_beggar.0004.desc: "A coded message arrives through the Beggar Sect's vast spy network. Your operatives have uncovered critical intelligence that could reshape the martial world. How you use this knowledge will define your place in it."
 murim_beggar.0004.a: "Uncover a demonic spy in orthodox ranks."
 murim_beggar.0004.b: "Track down a legendary martial manual."
 murim_beggar.0004.c: "Sell the intelligence to the highest bidder."
 murim_beggar.0004.d: "Use it for blackmail."
 murim_beggar.0005.t: "Eighteen Dragon Subduing Palms"
 murim_beggar.0005.desc: "The most devastating palm technique in the martial world awaits mastery. Each palm strike channels the fury of ancient dragons, and only Beggar Sect Chiefs have ever mastered all eighteen. The qi within you roars."
 murim_beggar.0005.a: "Learn all 18 palms in sequence."
 murim_beggar.0005.b: "Skip ahead to the final 6 palms."
 murim_beggar.0005.c: "Combine palms with Dog Beating Staff."
 murim_beggar.0006.t: "Beggar Disguise Infiltration"
 murim_beggar.0006.desc: "Dressed in rags that conceal deadly skill, you prepare to vanish into the shadows. The Beggar Sect's disguise network can place an operative anywhere. The question is where you will go and what risks you will accept."
 murim_beggar.0006.a: "Infiltrate the Heavenly Demon Sect."
 murim_beggar.0006.b: "Infiltrate a rival orthodox sect."
 murim_beggar.0006.c: "Infiltrate the imperial court."
 murim_beggar.0007.t: "Double Agent Crisis"
 murim_beggar.0007.desc: "The enemy sect has tried to turn you. Their offer is generous, their threats convincing. You stand between two worlds, each demanding absolute loyalty. The game of deception has become terrifyingly personal."
 murim_beggar.0007.a: "Stay loyal — feed them false intelligence."
 murim_beggar.0007.b: "Actually defect to the other side."
 murim_beggar.0007.c: "Play both sides for personal gain."
 murim_beggar.0008.t: "Beggar Sect Chief Succession"
 murim_beggar.0008.desc: "The Green Jade Staff lies empty of a master's grip. The old Chief has passed, and the Beggar Sect — the largest in all of murim — must choose a new leader. Factions converge, alliances shift, and ambitions ignite."
 murim_beggar.0008.a: "Claim the staff by martial strength."
 murim_beggar.0008.b: "Win through political maneuvering."
 murim_beggar.0008.c: "Support another candidate as kingmaker."
 murim_beggar.0008.d: "Steal the Green Jade Staff and flee."
 murim_beggar.0009.t: "The Beggar's Feast"
 murim_beggar.0009.desc: "Smoke rises from a hundred campfires as the Beggar Sect gathers for its annual feast. Beneath the laughter and wine lies serious business — intelligence shared, techniques demonstrated, and alliances tested."
 murim_beggar.0009.a: "Share intelligence with the Chief."
 murim_beggar.0009.b: "Challenge a rival to a demonstration."
 murim_beggar.0009.c: "Recruit new members."
 murim_beggar.0009.d: "Get drunk and start a brawl."
 murim_beggar.0010.t: "The Murim Intelligence Report"
 murim_beggar.0010.desc: "A comprehensive intelligence report lands in your hands — the movements of every major sect, the schemes of the demonic faction, the whispers from the imperial court. Knowledge is the Beggar Sect's true weapon."
 murim_beggar.0010.a: "Act on it — launch a preemptive strike."
 murim_beggar.0010.b: "Share with the Orthodox Alliance."
 murim_beggar.0010.c: "Keep it secret for personal advantage."
 murim_beggar.0010.d: "Leak it to the Heavenly Demon for gold."
