l_english:
 # Mount Hua Expansion 2 - Heartbeat 69
 murim_mount_hua_expansion2.0001.t:0 "Plum Blossom Sword Trial"
 murim_mount_hua_expansion2.0001.desc:0 "The petals fall like rain across the training ground as [mount_hua_elder.GetFirstName] watches with stern eyes. Today marks the Plum Blossom Sword Trial — the most sacred test of Mount Hua Sect. Only those who can cut every falling petal while maintaining perfect form will pass."
 murim_mount_hua_expansion2.0001.a:0 "Face the trial with pure sword technique!"
 murim_mount_hua_expansion2.0001.b:0 "Channel inner qi to enhance my blade..."
 murim_mount_hua_expansion2.0001.c:0 "I am not ready for this trial yet."
 murim_mount_hua_expansion2.0002.t:0 "The Nine Sword Manual Discovery"
 murim_mount_hua_expansion2.0002.desc:0 "While cleaning the ancient archive, you discover a hidden scroll behind a loose stone. The Nine Sword Manual — thought lost for generations! Its pages contain techniques so advanced they could revolutionize Mount Hua's sword arts entirely."
 murim_mount_hua_expansion2.0002.a:0 "Study the manual in secret..."
 murim_mount_hua_expansion2.0002.b:0 "Present it to the sect leader immediately."
 murim_mount_hua_expansion2.0002.c:0 "Trade it to another sect for favors."
 murim_mount_hua_expansion2.0003.t:0 "Secret Discovered!"
 murim_mount_hua_expansion2.0003.desc:0 "Your secret study of the Nine Sword Manual has been discovered! [sect_inquisitor.GetFirstName] stands before you with cold fury in their eyes. The sect demands answers for your unauthorized study of forbidden techniques."
 murim_mount_hua_expansion2.0003.a:0 "Confess and beg for forgiveness."
 murim_mount_hua_expansion2.0003.b:0 "Fight the inquisitor — I will not submit!"
 murim_mount_hua_expansion2.0003.c:0 "Flee Mount Hua before they seal my meridians!"
 murim_mount_hua_expansion2.0004.t:0 "The Sword Conference"
 murim_mount_hua_expansion2.0004.desc:0 "Representatives from every major sword sect have gathered at the annual Sword Conference. This is Mount Hua's chance to prove the superiority of the Plum Blossom Sword against the world's greatest blademasters."
 murim_mount_hua_expansion2.0004.a:0 "Enter as Mount Hua's champion!"
 murim_mount_hua_expansion2.0004.b:0 "Observe and learn from the other sects."
 murim_mount_hua_expansion2.0004.c:0 "Challenge the Wudang champion directly!"
 murim_mount_hua_expansion2.0005.t:0 "Sword vs Qi — The Internal Divide"
 murim_mount_hua_expansion2.0005.desc:0 "Mount Hua is tearing itself apart. The Sword Faction believes in raw blade mastery while the Qi Faction pushes for internal energy cultivation. Both sides demand you choose — neutrality is no longer an option."
 murim_mount_hua_expansion2.0005.a:0 "I stand with the Sword Faction — tradition above all!"
 murim_mount_hua_expansion2.0005.b:0 "I support the Qi Faction — we must evolve."
 murim_mount_hua_expansion2.0005.c:0 "I will unite both factions under one banner."
 murim_mount_hua_expansion2.0006.t:0 "Betrayal Exposed!"
 murim_mount_hua_expansion2.0006.desc:0 "The sect has discovered that you sold the secret manual to outsiders. [angry_elder.GetFirstName] and a dozen armed disciples block your path. There is no escape from the judgment of Mount Hua."
 murim_mount_hua_expansion2.0006.a:0 "Accept my punishment — I deserve this."
 murim_mount_hua_expansion2.0006.b:0 "Fight my way out of this trap!"
 murim_mount_hua_expansion2.0006.c:0 "Blame someone else — redirect their anger."
 murim_mount_hua_expansion2.0007.t:0 "The Exile's Wandering"
 murim_mount_hua_expansion2.0007.desc:0 "Cast out from Mount Hua, you wander the jianghu alone. The road stretches before you with neither destination nor purpose. But perhaps this exile is the beginning of something new."
 murim_mount_hua_expansion2.0007.a:0 "Seek a new master in another sect."
 murim_mount_hua_expansion2.0007.b:0 "Become a lone wolf swordsman — I need no sect."
 murim_mount_hua_expansion2.0007.c:0 "Seek redemption and return to Mount Hua someday."
 murim_mount_hua_expansion2.0008.t:0 "The Redemption Trial"
 murim_mount_hua_expansion2.0008.desc:0 "After years of wandering, you have returned to Mount Hua's gates. [redemption_judge.GetFirstName] looks down at you from the stone steps. 'You wish to return? Then prove your worth has not diminished.'"
 murim_mount_hua_expansion2.0008.a:0 "Complete 100 acts of service to atone."
 murim_mount_hua_expansion2.0008.b:0 "Defeat three sect challenges to prove my strength."
 murim_mount_hua_expansion2.0008.c:0 "I reject redemption — I embrace the exile path."
 murim_mount_hua_expansion2.0009.t:0 "Sect Leader Succession"
 murim_mount_hua_expansion2.0009.desc:0 "The current sect leader has announced retirement. The elders call for a succession contest — only the most worthy disciple shall lead Mount Hua into its next era. Your name is among the candidates."
 murim_mount_hua_expansion2.0009.a:0 "Challenge for leadership through combat!"
 murim_mount_hua_expansion2.0009.b:0 "Gain support through diplomacy and alliances."
 murim_mount_hua_expansion2.0009.c:0 "Support another candidate — be the kingmaker."
 murim_mount_hua_expansion2.0010.t:0 "Plum Blossom Sword God"
 murim_mount_hua_expansion2.0010.desc:0 "After decades of mastery, you sense the final barrier. The Plum Blossom Sword God technique — the ultimate form that transcends mortal swordsmanship. If you succeed, your name will echo for eternity. If you fail, you may lose everything."
 murim_mount_hua_expansion2.0010.a:0 "Attempt the forbidden final form!"
 murim_mount_hua_expansion2.0010.b:0 "Meditate for ten years first to prepare."
 murim_mount_hua_expansion2.0010.c:0 "I am not worthy of this power."

 # Shaolin Expansion 2 - Heartbeat 69
 murim_shaolin_expansion2.0001.t:0 "The 72 Arts — Choose Your Path"
 murim_shaolin_expansion2.0001.desc:0 "In the great hall of Shaolin Temple, [shaolin_abbot.GetFirstName] presents the three pillars of martial training. Each path leads to mastery, but only one can be your foundation. Choose wisely, for this choice shapes your entire journey."
 murim_shaolin_expansion2.0001.a:0 "Iron Body Arts — the path of unbreakable defense."
 murim_shaolin_expansion2.0001.b:0 "Finger Arts — the path of precision strikes."
 murim_shaolin_expansion2.0001.c:0 "Internal Arts — the path of qi and meditation."
 murim_shaolin_expansion2.0002.t:0 "Meditation Under the Bodhi Tree"
 murim_shaolin_expansion2.0002.desc:0 "The ancient Bodhi tree in the inner courtyard calls to you. Monks who have meditated beneath its branches have achieved enlightenment — or been driven mad by visions of the void."
 murim_shaolin_expansion2.0002.a:0 "Begin the 49-day meditation — full commitment."
 murim_shaolin_expansion2.0002.b:0 "A short meditation — safer but less powerful."
 murim_shaolin_expansion2.0002.c:0 "Skip meditation — combat training instead."
 murim_shaolin_expansion2.0003.t:0 "Warrior Monks vs Scholar Monks"
 murim_shaolin_expansion2.0003.desc:0 "The temple is divided. Warrior monks demand more combat training and active engagement with the martial world. Scholar monks insist on contemplation, scripture study, and detachment. The tension has reached a breaking point."
 murim_shaolin_expansion2.0003.a:0 "Side with the warrior monks — action over words!"
 murim_shaolin_expansion2.0003.b:0 "Side with the scholar monks — wisdom over violence."
 murim_shaolin_expansion2.0003.c:0 "Mediate between both factions."
 murim_shaolin_expansion2.0004.t:0 "The Forbidden Scripture Theft"
 murim_shaolin_expansion2.0004.desc:0 "The Yi Jin Jing — Shaolin's most sacred scripture — has been stolen from the inner sanctum! The thief has fled into the night. Without it, Shaolin's deepest martial arts knowledge is lost."
 murim_shaolin_expansion2.0004.a:0 "Chase the thief personally!"
 murim_shaolin_expansion2.0004.b:0 "Track the thief with intelligence networks."
 murim_shaolin_expansion2.0004.c:0 "Let it go — attachment is suffering."
 murim_shaolin_expansion2.0005.t:0 "The Iron Monk Tournament"
 murim_shaolin_expansion2.0005.desc:0 "Shaolin's internal ranking tournament begins. The Iron Monk title goes to the strongest — a brutal test of endurance and skill where monks fight until one cannot continue."
 murim_shaolin_expansion2.0005.a:0 "Enter the tournament!"
 murim_shaolin_expansion2.0005.b:0 "Serve as referee instead."
 murim_shaolin_expansion2.0005.c:0 "Protest the violence — monks should not fight."
 murim_shaolin_expansion2.0006.t:0 "Demons at the Gate!"
 murim_shaolin_expansion2.0006.desc:0 "Heavenly Demon Sect warriors have launched a surprise assault on Shaolin Temple! Flames rise from the outer halls as dark-clad assassins pour through the gates. The temple's very existence is at stake."
 murim_shaolin_expansion2.0006.a:0 "Defend with the 18 Luohan Formation!"
 murim_shaolin_expansion2.0006.b:0 "Evacuate the scripture library!"
 murim_shaolin_expansion2.0006.c:0 "Ring the emergency bell — call all orthodox sects!"
 murim_shaolin_expansion2.0007.t:0 "The Orthodox Alliance Responds"
 murim_shaolin_expansion2.0007.desc:0 "Swords and banners fill the horizon. Mount Hua, Wudang, and others have answered the call. The combined orthodox forces are ready to push back the demon invasion. Someone must lead this allied army."
 murim_shaolin_expansion2.0007.a:0 "Lead the combined orthodox army!"
 murim_shaolin_expansion2.0007.b:0 "Serve as strategic advisor."
 murim_shaolin_expansion2.0007.c:0 "Negotiate peace with the demons."
 murim_shaolin_expansion2.0008.t:0 "Abbot Succession"
 murim_shaolin_expansion2.0008.desc:0 "The position of Shaolin Abbot — the most revered title in the orthodox martial world — is now vacant. Only a monk of supreme skill, wisdom, and virtue may claim this mantle."
 murim_shaolin_expansion2.0008.a:0 "Present myself as candidate."
 murim_shaolin_expansion2.0008.b:0 "Support my rival instead."
 murim_shaolin_expansion2.0008.c:0 "Leave to start a branch temple."
 murim_shaolin_expansion2.0009.t:0 "Diamond Sutra Body"
 murim_shaolin_expansion2.0009.desc:0 "The ultimate art of Shaolin — the Diamond Sutra Body transforms flesh into something beyond human. Those who succeed become virtually indestructible. But the process is agonizing and the failure rate is legendary."
 murim_shaolin_expansion2.0009.a:0 "Begin the Diamond Sutra transformation!"
 murim_shaolin_expansion2.0009.b:0 "Defer to the next generation."
 murim_shaolin_expansion2.0009.c:0 "Seek Bodhidharma's cave first."
 murim_shaolin_expansion2.0010.t:0 "Passing Down the Art"
 murim_shaolin_expansion2.0010.desc:0 "Your years grow long and your body slows. But your knowledge — accumulated over a lifetime of training, battle, and meditation — is priceless. It is time to choose how your legacy continues."
 murim_shaolin_expansion2.0010.a:0 "Choose the most talented student."
 murim_shaolin_expansion2.0010.b:0 "Write my teachings in a manual."
 murim_shaolin_expansion2.0010.c:0 "Take the knowledge to my grave."

 # Wudang Expansion 2 - Heartbeat 69
 murim_wudang_expansion2.0001.t:0 "Taiji Sword Initiation"
 murim_wudang_expansion2.0001.desc:0 "Atop Wudang Mountain, where clouds part before the ancient temple, [wudang_master.GetFirstName] begins the Taiji Sword initiation. 'The soft overcomes the hard. The yielding conquers the rigid. This is the Way of Wudang.'"
 murim_wudang_expansion2.0001.a:0 "Embrace the soft-overcomes-hard philosophy."
 murim_wudang_expansion2.0001.b:0 "Focus on the explosive hidden power within Taiji."
 murim_wudang_expansion2.0001.c:0 "Study Taoist alchemy instead of swordplay."
 murim_wudang_expansion2.0002.t:0 "The Mountain Spirit"
 murim_wudang_expansion2.0002.desc:0 "During midnight meditation, a luminous figure appears in the mist — a mountain spirit of ancient power. It speaks in whispers that resonate with your qi meridians, offering wisdom from before the age of men."
 murim_wudang_expansion2.0002.a:0 "Accept the spirit's wisdom."
 murim_wudang_expansion2.0002.b:0 "Reject it as superstition."
 murim_wudang_expansion2.0002.c:0 "Try to trap the spirit for power!"
 murim_wudang_expansion2.0003.t:0 "Yin-Yang Balance Crisis"
 murim_wudang_expansion2.0003.desc:0 "Your internal energy has fallen dangerously out of balance. Yin and Yang war within your meridians, causing searing pain and erratic qi flow. Without correction, you risk permanent damage or qi deviation."
 murim_wudang_expansion2.0003.a:0 "Meditation retreat to restore balance."
 murim_wudang_expansion2.0003.b:0 "Seek a dual-cultivation partner."
 murim_wudang_expansion2.0003.c:0 "Embrace the imbalance — walk the dark Taiji path."
 murim_wudang_expansion2.0004.t:0 "Pill Furnace Explosion!"
 murim_wudang_expansion2.0004.desc:0 "BOOM! The pill furnace erupts in a cloud of acrid smoke and shattered ceramic. Your latest alchemical experiment has gone catastrophically wrong. Through the haze, you can see... something in the wreckage."
 murim_wudang_expansion2.0004.a:0 "Salvage what I can from the wreckage."
 murim_wudang_expansion2.0004.b:0 "Rebuild and try again with safer methods."
 murim_wudang_expansion2.0004.c:0 "Abandon alchemy — return to sword training."
 murim_wudang_expansion2.0005.t:0 "Wudang vs Mount Hua"
 murim_wudang_expansion2.0005.desc:0 "A Mount Hua swordsman has arrived at Wudang's gates, claiming their sword style is superior. The ancient rivalry between Taiji and Plum Blossom sword arts demands a response."
 murim_wudang_expansion2.0005.a:0 "Debate the philosophy — words before swords."
 murim_wudang_expansion2.0005.b:0 "Settle it with a friendly sword duel!"
 murim_wudang_expansion2.0005.c:0 "Propose alliance instead of rivalry."
 murim_wudang_expansion2.0006.t:0 "Wudang Sect Leader Election"
 murim_wudang_expansion2.0006.desc:0 "The Wudang elders gather in the Cloud Hall. The sect needs new leadership. Two candidates stand before the council — will you be one of them?"
 murim_wudang_expansion2.0006.a:0 "Stand as candidate — demonstrate Taiji mastery."
 murim_wudang_expansion2.0006.b:0 "Support the other candidate."
 murim_wudang_expansion2.0006.c:0 "Withdraw to hermitage on the peak."
 murim_wudang_expansion2.0007.t:0 "Heavenly Sword Formation"
 murim_wudang_expansion2.0007.desc:0 "Wudang's legendary group combat technique — the Heavenly Sword Formation — requires each member to master a specific role. The formation can defeat opponents far above any individual member's level."
 murim_wudang_expansion2.0007.a:0 "Master the Crane role — graceful defense."
 murim_wudang_expansion2.0007.b:0 "Take the Tiger role — overwhelming offense."
 murim_wudang_expansion2.0007.c:0 "Become the formation coordinator."
 murim_wudang_expansion2.0008.t:0 "The Immortality Quest"
 murim_wudang_expansion2.0008.desc:0 "You have walked the Taoist path for decades. Now the ultimate question presents itself — is true immortality achievable through martial arts and alchemy? The ancient texts hint at a method, but the cost may be beyond mortal reckoning."
 murim_wudang_expansion2.0008.a:0 "Attempt the Taoist longevity ritual."
 murim_wudang_expansion2.0008.b:0 "Accept mortality — it is the true Tao."
 murim_wudang_expansion2.0008.c:0 "Seek the legendary Peach of Immortality."
 murim_wudang_expansion2.0009.t:0 "The Peach Quest Returns"
 murim_wudang_expansion2.0009.desc:0 "After a long journey, you return from your search for the Immortal Peach. The road was difficult and enlightening, though the mythical fruit remained elusive."
 murim_wudang_expansion2.0009.a:0 "I found a rare herb — not immortality, but power."
 murim_wudang_expansion2.0009.b:0 "Found nothing, but gained priceless wisdom."
 murim_wudang_expansion2.0009.c:0 "Was ambushed by bandits during the search."
 murim_wudang_expansion2.0010.t:0 "Pure Yang Infinite Sword"
 murim_wudang_expansion2.0010.desc:0 "The Pure Yang Infinite Sword — Wudang's ultimate technique. It merges the practitioner's qi completely with the blade, transforming them into a living sword. Only the greatest Taoist martial artists have ever attempted it."
 murim_wudang_expansion2.0010.a:0 "Attempt the ultimate transcendence!"
 murim_wudang_expansion2.0010.b:0 "Pass the technique to a worthy student."
 murim_wudang_expansion2.0010.c:0 "Seal the technique — too dangerous for this world."

 # Tang Clan Expansion 2 - Heartbeat 69
 murim_tang_clan_expansion2.0001.t:0 "Hidden Weapon Initiation"
 murim_tang_clan_expansion2.0001.desc:0 "In the underground training hall of the Tang Clan compound, [tang_elder.GetFirstName] presents three specialization paths. 'Every Tang must master at least one of the three arts. Choose your path — needles, mechanisms, or poison.'"
 murim_tang_clan_expansion2.0001.a:0 "Rainstorm Pear Blossom Needles — the hidden killer."
 murim_tang_clan_expansion2.0001.b:0 "Mechanism trap building — the architect of death."
 murim_tang_clan_expansion2.0001.c:0 "Poison arts — the silent destroyer."
 murim_tang_clan_expansion2.0002.t:0 "The Hundred Poison Garden Trial"
 murim_tang_clan_expansion2.0002.desc:0 "The Hundred Poison Garden — a maze of lethal plants, venomous insects, and toxic fungi. Every Tang must walk through it to build immunity. Many do not emerge. Those who do are forever changed."
 murim_tang_clan_expansion2.0002.a:0 "Walk through the garden — build true immunity."
 murim_tang_clan_expansion2.0002.b:0 "Study poisons from scrolls instead."
 murim_tang_clan_expansion2.0002.c:0 "Refuse — this is too dangerous."
 murim_tang_clan_expansion2.0003.t:0 "First Mechanism — Build Your Trap"
 murim_tang_clan_expansion2.0003.desc:0 "The workshop is filled with gears, springs, and razor-sharp components. Your first assignment as a mechanism specialist: design and build a functioning trap that could protect the clan compound."
 murim_tang_clan_expansion2.0003.a:0 "Build a defensive crossbow trap."
 murim_tang_clan_expansion2.0003.b:0 "Build a poison gas mechanism."
 murim_tang_clan_expansion2.0003.c:0 "Build an elaborate maze trap."
 murim_tang_clan_expansion2.0004.t:0 "The Assassination Contract"
 murim_tang_clan_expansion2.0004.desc:0 "A hooded figure arrives at your door with a scroll — an assassination contract worth a fortune. The target is a corrupt magistrate, but contract killing stains the soul regardless of the target's sins."
 murim_tang_clan_expansion2.0004.a:0 "Accept the contract."
 murim_tang_clan_expansion2.0004.b:0 "Refuse — Tang Clan has honor."
 murim_tang_clan_expansion2.0004.c:0 "Double-cross the contractor."
 murim_tang_clan_expansion2.0005.t:0 "The Weapon Trade Empire"
 murim_tang_clan_expansion2.0005.desc:0 "Tang Clan's hidden weapons and mechanisms are in high demand across the martial world. A business opportunity presents itself — but to whom you sell shapes your clan's reputation forever."
 murim_tang_clan_expansion2.0005.a:0 "Sell to orthodox sects only — maintain our honor."
 murim_tang_clan_expansion2.0005.b:0 "Sell to everyone — profit above allegiance."
 murim_tang_clan_expansion2.0005.c:0 "Sell exclusively to unorthodox sects at premium."
 murim_tang_clan_expansion2.0006.t:0 "Rival Family Attack!"
 murim_tang_clan_expansion2.0006.desc:0 "An enemy clan has breached the outer walls! Arrows fly and screams echo through the compound. The Tang Clan's compound defenses are about to be tested for real."
 murim_tang_clan_expansion2.0006.a:0 "Activate the compound's trap defenses!"
 murim_tang_clan_expansion2.0006.b:0 "Meet the attackers in personal combat!"
 murim_tang_clan_expansion2.0006.c:0 "Unleash poison smoke — drive them back!"
 murim_tang_clan_expansion2.0007.t:0 "Secret Recipe Stolen!"
 murim_tang_clan_expansion2.0007.desc:0 "The clan's most guarded poison recipes have been stolen from the vault. This is catastrophic — those formulas in enemy hands could devastate the martial world."
 murim_tang_clan_expansion2.0007.a:0 "Investigate the theft personally."
 murim_tang_clan_expansion2.0007.b:0 "Blame the prime suspect immediately."
 murim_tang_clan_expansion2.0007.c:0 "Change all recipes to bait the real thief."
 murim_tang_clan_expansion2.0008.t:0 "Tang Clan Head Succession"
 murim_tang_clan_expansion2.0008.desc:0 "The position of Tang Clan Head requires mastery of all three arts — needles, mechanisms, and poison. Only the most complete martial artist may lead. The succession contest begins."
 murim_tang_clan_expansion2.0008.a:0 "Demonstrate mastery of all three Tang arts."
 murim_tang_clan_expansion2.0008.b:0 "Win through political maneuvering."
 murim_tang_clan_expansion2.0008.c:0 "Support another candidate, gain influence."
 murim_tang_clan_expansion2.0009.t:0 "The Annihilation Crossbow"
 murim_tang_clan_expansion2.0009.desc:0 "The ultimate mechanism weapon — a crossbow that fires 100 bolts simultaneously in a devastating cone of death. The blueprints exist only in legend. You believe you can build it."
 murim_tang_clan_expansion2.0009.a:0 "Build the legendary weapon!"
 murim_tang_clan_expansion2.0009.b:0 "Seal the blueprints — too destructive."
 murim_tang_clan_expansion2.0009.c:0 "Sell the blueprints to the highest bidder."
 murim_tang_clan_expansion2.0010.t:0 "The Thousand Mechanisms Codex"
 murim_tang_clan_expansion2.0010.desc:0 "Your life's work in mechanism design, poison formulation, and hidden weapon crafting fills volumes. This knowledge must be preserved — but how?"
 murim_tang_clan_expansion2.0010.a:0 "Write the complete codex for future generations."
 murim_tang_clan_expansion2.0010.b:0 "Encode it so only Tang bloodline can read it."
 murim_tang_clan_expansion2.0010.c:0 "Destroy it all — knowledge this dangerous must die."

 # Beggar Sect Expansion 2 - Heartbeat 69
 murim_beggar_sect_expansion2.0001.t:0 "Dog Beating Staff Initiation"
 murim_beggar_sect_expansion2.0001.desc:0 "[beggar_chief.GetFirstName] plants the legendary Dog Beating Staff before you. 'This staff has been passed through generations. It fights the corrupt, protects the weak, and humbles the arrogant. Learn its ways.'"
 murim_beggar_sect_expansion2.0001.a:0 "Learn the 36 Dog Beating Staff moves."
 murim_beggar_sect_expansion2.0001.b:0 "Focus on Eighteen Dragon Subduing Palms."
 murim_beggar_sect_expansion2.0001.c:0 "Specialize in intelligence gathering."
 murim_beggar_sect_expansion2.0002.t:0 "First Intelligence Assignment"
 murim_beggar_sect_expansion2.0002.desc:0 "The Beggar Sect's true power is not in combat — it is in knowing everything about everyone. Your first intel assignment has arrived. Time to prove your worth as an information gatherer."
 murim_beggar_sect_expansion2.0002.a:0 "Infiltrate a corrupt official's household."
 murim_beggar_sect_expansion2.0002.b:0 "Gather street-level intelligence."
 murim_beggar_sect_expansion2.0002.c:0 "Set up a merchant front for intel."
 murim_beggar_sect_expansion2.0003.t:0 "Bag System Promotion"
 murim_beggar_sect_expansion2.0003.desc:0 "The Beggar Sect's rank is determined by the number of bags you carry. Earning a higher bag rank means greater authority, more resources, and a wider intelligence network under your command."
 murim_beggar_sect_expansion2.0003.a:0 "Earn the rank through combat achievement."
 murim_beggar_sect_expansion2.0003.b:0 "Earn it through intelligence contributions."
 murim_beggar_sect_expansion2.0003.c:0 "Earn it through recruitment of new members."
 murim_beggar_sect_expansion2.0004.t:0 "Demon Spy in Our Ranks!"
 murim_beggar_sect_expansion2.0004.desc:0 "Your intelligence network has identified a Heavenly Demon Sect spy embedded within the Beggar Sect! This infiltrator has been feeding secrets to the enemy for months."
 murim_beggar_sect_expansion2.0004.a:0 "Expose the spy publicly!"
 murim_beggar_sect_expansion2.0004.b:0 "Turn the spy into a double agent."
 murim_beggar_sect_expansion2.0004.c:0 "Feed false information through the spy."
 murim_beggar_sect_expansion2.0005.t:0 "The Annual Assembly"
 murim_beggar_sect_expansion2.0005.desc:0 "Thousands of Beggar Sect members gather from across the land for the annual grand assembly. It is a time of celebration, competition, and political maneuvering."
 murim_beggar_sect_expansion2.0005.a:0 "Present my intelligence findings."
 murim_beggar_sect_expansion2.0005.b:0 "Challenge for a higher rank in combat!"
 murim_beggar_sect_expansion2.0005.c:0 "Network with other sect leaders present."
 murim_beggar_sect_expansion2.0006.t:0 "Famine Response"
 murim_beggar_sect_expansion2.0006.desc:0 "A terrible famine grips the land. The common people starve while corrupt officials hoard grain. The Beggar Sect, champions of the downtrodden, must respond."
 murim_beggar_sect_expansion2.0006.a:0 "Organize food redistribution from the rich."
 murim_beggar_sect_expansion2.0006.b:0 "Use the crisis to recruit new members."
 murim_beggar_sect_expansion2.0006.c:0 "Expose the corrupt officials causing this."
 murim_beggar_sect_expansion2.0007.t:0 "Chief Election"
 murim_beggar_sect_expansion2.0007.desc:0 "The Beggar Sect Chief — leader of the largest sect in the martial world. The election draws candidates from across the land. Only the one who embodies the sect's ideals of justice, skill, and compassion may lead."
 murim_beggar_sect_expansion2.0007.a:0 "Demonstrate Dragon Subduing Palms mastery!"
 murim_beggar_sect_expansion2.0007.b:0 "Win through popular vote of the members."
 murim_beggar_sect_expansion2.0007.c:0 "Step aside for the other candidate."
 murim_beggar_sect_expansion2.0008.t:0 "The Great Intelligence Operation"
 murim_beggar_sect_expansion2.0008.desc:0 "An opportunity to launch the largest intelligence operation in Beggar Sect history. The potential targets range from mapping the entire Heavenly Demon network to building a continental information trading empire."
 murim_beggar_sect_expansion2.0008.a:0 "Map the entire Heavenly Demon network."
 murim_beggar_sect_expansion2.0008.b:0 "Build an information trading network."
 murim_beggar_sect_expansion2.0008.c:0 "Create a propaganda network."
 murim_beggar_sect_expansion2.0009.t:0 "Dragon Subduing Palm Perfection"
 murim_beggar_sect_expansion2.0009.desc:0 "The Eighteen Dragon Subduing Palms — the mightiest external martial art in existence. No one alive has mastered all eighteen. You stand at the threshold of attempting what legends failed to achieve."
 murim_beggar_sect_expansion2.0009.a:0 "Attempt all 18 palms in sequence!"
 murim_beggar_sect_expansion2.0009.b:0 "Master 12 of 18 — the safe approach."
 murim_beggar_sect_expansion2.0009.c:0 "Pass the art to a successor."
 murim_beggar_sect_expansion2.0010.t:0 "The Network Lives On"
 murim_beggar_sect_expansion2.0010.desc:0 "Your years have been long and full. The intelligence network you built spans the continent. The arts you mastered inspire a new generation. It is time to decide your legacy."
 murim_beggar_sect_expansion2.0010.a:0 "Pass down the Dog Beating Staff."
 murim_beggar_sect_expansion2.0010.b:0 "Formalize the intelligence network."
 murim_beggar_sect_expansion2.0010.c:0 "Retire and live as a true beggar."

 # Calamity Cycle Expansion 3 - Heartbeat 69
 murim_calamity_cycle_expansion3.0001.t:0 "Blood Moon Omen"
 murim_calamity_cycle_expansion3.0001.desc:0 "The moon turns red as blood. Across the martial world, every qi cultivator feels the disturbance — a tremor in the heavenly meridians that signals the approach of the Great Calamity. The cycle is turning again."
 murim_calamity_cycle_expansion3.0001.a:0 "Warn the orthodox alliance!"
 murim_calamity_cycle_expansion3.0001.b:0 "Prepare my clan in secret."
 murim_calamity_cycle_expansion3.0001.c:0 "Dismiss it as superstition."
 murim_calamity_cycle_expansion3.0002.t:0 "War is Declared!"
 murim_calamity_cycle_expansion3.0002.desc:0 "The Great Calamity has begun. Fear and madness grip the martial world as the strongest clan leaders declare war on each other. Alliances shatter. Former brothers draw swords. The age of destruction is here."
 murim_calamity_cycle_expansion3.0002.a:0 "All-out war — destroy the rival clan!"
 murim_calamity_cycle_expansion3.0002.b:0 "Defensive posture — fortify and wait."
 murim_calamity_cycle_expansion3.0002.c:0 "Seek alliance against the aggressor."
 murim_calamity_cycle_expansion3.0003.t:0 "Betrayal in the Calamity!"
 murim_calamity_cycle_expansion3.0003.desc:0 "[betrayer.GetFirstName] has betrayed us! In the chaos of the Great Calamity, those we trusted have turned their blades against us. The traitor stands exposed before you."
 murim_calamity_cycle_expansion3.0003.a:0 "Execute the betrayer publicly!"
 murim_calamity_cycle_expansion3.0003.b:0 "Imprison and interrogate."
 murim_calamity_cycle_expansion3.0003.c:0 "Show mercy — the calamity drives everyone mad."
 murim_calamity_cycle_expansion3.0004.t:0 "Mass Casualty"
 murim_calamity_cycle_expansion3.0004.desc:0 "The death toll is catastrophic. Seventy percent of all martial artists are dead. The streets run with blood. The great sects that stood for centuries are reduced to a handful of survivors. The world you knew is gone."
 murim_calamity_cycle_expansion3.0004.a:0 "Rally the survivors — we rebuild from here."
 murim_calamity_cycle_expansion3.0004.b:0 "Mourn the dead — they deserve our tears."
 murim_calamity_cycle_expansion3.0004.c:0 "Harden yourself — survival is all that matters."
 murim_calamity_cycle_expansion3.0005.t:0 "The Emperor Falls!"
 murim_calamity_cycle_expansion3.0005.desc:0 "The Emperor is dead! Imperial power collapses as the throne sits empty. Without the emperor's authority, the last remnants of order in the martial world dissolve. Chaos is now absolute."
 murim_calamity_cycle_expansion3.0005.a:0 "Seize imperial power in the chaos!"
 murim_calamity_cycle_expansion3.0005.b:0 "Let the empire fall — focus on my clan."
 murim_calamity_cycle_expansion3.0005.c:0 "Try to restore order."
 murim_calamity_cycle_expansion3.0006.t:0 "Civilian Massacre"
 murim_calamity_cycle_expansion3.0006.desc:0 "The calamity has spilled beyond the martial world. Innocent civilians are caught in the crossfire of clan wars. Villages burn. Families flee. The suffering is beyond measure."
 murim_calamity_cycle_expansion3.0006.a:0 "Protect the civilians at personal cost."
 murim_calamity_cycle_expansion3.0006.b:0 "Focus military resources on clan survival."
 murim_calamity_cycle_expansion3.0006.c:0 "Evacuate as many as possible."
 murim_calamity_cycle_expansion3.0007.t:0 "Dynasty Protection"
 murim_calamity_cycle_expansion3.0007.desc:0 "Through blood and fire, your bloodline endures. The Great Calamity claims everyone else, but fate has determined that your dynasty will survive to see the next era. How you face this truth defines your character."
 murim_calamity_cycle_expansion3.0007.a:0 "Fight through the apocalypse with my blade!"
 murim_calamity_cycle_expansion3.0007.b:0 "Hide and survive with cunning."
 murim_calamity_cycle_expansion3.0007.c:0 "Protect others — become a beacon of hope."
 murim_calamity_cycle_expansion3.0008.t:0 "The Old World Becomes Legend"
 murim_calamity_cycle_expansion3.0008.desc:0 "The great masters who fell in the calamity are already becoming legends. Their techniques are whispered about as if they were gods. The previous era fades into mythology, as it always does when the cycle turns."
 murim_calamity_cycle_expansion3.0008.a:0 "Record the true history before it is lost."
 murim_calamity_cycle_expansion3.0008.b:0 "Let the legends grow — they give people hope."
 murim_calamity_cycle_expansion3.0008.c:0 "Use the mythology to consolidate my power."
 murim_calamity_cycle_expansion3.0009.t:0 "Rebuilding From Ashes"
 murim_calamity_cycle_expansion3.0009.desc:0 "The calamity is over. The survivors emerge from hiding. The world is scarred but not broken. It is time to rebuild — new sects, new alliances, new hope rising from the ashes of the old."
 murim_calamity_cycle_expansion3.0009.a:0 "Rebuild the old sect from ashes."
 murim_calamity_cycle_expansion3.0009.b:0 "Found an entirely new sect!"
 murim_calamity_cycle_expansion3.0009.c:0 "Wander alone — the age of sects is over."
 murim_calamity_cycle_expansion3.0010.t:0 "The Wheel Turns Again"
 murim_calamity_cycle_expansion3.0010.desc:0 "The cycle resets. In 150 years, another generation will face the Great Calamity. The wheel of destruction and rebirth turns eternal. What will you do with this knowledge?"
 murim_calamity_cycle_expansion3.0010.a:0 "Vow to prevent the next calamity!"
 murim_calamity_cycle_expansion3.0010.b:0 "Accept the cycle as inevitable."
 murim_calamity_cycle_expansion3.0010.c:0 "Prepare my descendants for the next one."
