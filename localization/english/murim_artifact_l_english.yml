l_english:
 murim_artifact.0001.t: "Ancient Weapon Discovered"
 murim_artifact.0001.desc: "Deep within crumbling ruins, half-buried in centuries of dust, your fingers close around a weapon of terrifying beauty. The blade hums with residual qi, its edge still impossibly sharp. This is no ordinary steel -- it is a relic from the golden age of cultivation."
 murim_artifact.0001.a: "Claim it. This weapon is mine."
 murim_artifact.0001.b: "Study it carefully before acting."
 murim_artifact.0001.c: "Sell it to the highest bidder."
 murim_artifact.0001.d: "Offer it to my sect as tribute."
 murim_artifact.0002.t: "The Weapon Is Cursed"
 murim_artifact.0002.desc: "Dark veins have begun spreading across your arm where you grip the weapon. Nightmares plague your sleep -- visions of the blade's previous masters, each consumed by madness. The ancient weapon carries a terrible curse, and it has already begun to take root within you."
 murim_artifact.0002.a: "Purify the weapon through cultivation."
 murim_artifact.0002.b: "Embrace the curse for its dark power."
 murim_artifact.0002.c: "Destroy the weapon before it destroys me."
 murim_artifact.0002.d: "Seek an elder's help to break the curse."
 murim_artifact.0003.t: "A Rival Covets Your Weapon"
 murim_artifact.0003.desc: "Your rival's eyes burn with naked greed as they confront you, hand resting on their own blade. They want the legendary weapon you carry, and they are willing to fight -- or bargain -- to claim it. Possession of such artifacts always invites bloodshed."
 murim_artifact.0003.a: "Accept the duel. The weapon stays with me."
 murim_artifact.0003.b: "Negotiate a trade instead."
 murim_artifact.0003.c: "Refuse. Let them plot in frustration."
 murim_artifact.0004.t: "Artifact Resonance"
 murim_artifact.0004.desc: "During meditation, the weapon at your side begins to vibrate with an unearthly hum. Its qi resonates with your cultivation base, amplifying your inner energy in ways you have never experienced. This could be the catalyst for a breakthrough -- or a devastating qi deviation."
 murim_artifact.0004.a: "Meditate with the artifact to seek breakthrough."
 murim_artifact.0004.b: "Study the resonance pattern carefully."
 murim_artifact.0004.c: "Suppress the resonance. Too dangerous."
 murim_artifact.0005.t: "Legendary Technique Scroll"
 murim_artifact.0005.desc: "The scroll is ancient, its silk yellowed and fragile, but the techniques inscribed within are unmistakable -- this is one half of a legendary cultivation manual thought lost for centuries. Even incomplete, its secrets could elevate your martial arts to terrifying heights."
 murim_artifact.0005.a: "Learn what I can from this half."
 murim_artifact.0005.b: "Launch an expedition to find the other half."
 murim_artifact.0005.c: "Sell the scroll on the black market."
 murim_artifact.0006.t: "Alchemy Cauldron Discovered"
 murim_artifact.0006.desc: "A bronze cauldron of exquisite craftsmanship sits in a forgotten chamber, its interior still stained with the residue of ancient pill refinement. With the right ingredients and knowledge, this cauldron could produce medicines that heal, empower, or kill."
 murim_artifact.0006.a: "Refine healing pills."
 murim_artifact.0006.b: "Attempt breakthrough pills."
 murim_artifact.0006.c: "Brew deadly poison pills."
 murim_artifact.0006.d: "Sell the cauldron for gold."
 murim_artifact.0007.t: "Spirit Beast Egg"
 murim_artifact.0007.desc: "The egg is warm to the touch, pulsing with a faint inner light that matches your heartbeat. Within this shell slumbers a spirit beast of unknown species -- a companion that could fight beside you, a treasure to sell, or raw power to consume. The choice defines your path."
 murim_artifact.0007.a: "Hatch it and raise a spirit companion."
 murim_artifact.0007.b: "Sell the egg for a fortune."
 murim_artifact.0007.c: "Offer it to my sect as tribute."
 murim_artifact.0007.d: "Consume the egg for raw power."
 murim_artifact.0008.t: "Forbidden Scripture"
 murim_artifact.0008.desc: "The scripture is bound in black leather and sealed with blood-red wax. Its pages whisper promises of unimaginable power -- techniques that defy heaven itself, purchased at the cost of one's humanity. Every righteous sect in the world hunts those who dare read these words."
 murim_artifact.0008.a: "Read the full scripture. Embrace the dark path."
 murim_artifact.0008.b: "Study only the safe sections."
 murim_artifact.0008.c: "Destroy the scripture. No one should have this."
 murim_artifact.0008.d: "Hide it for later consideration."
