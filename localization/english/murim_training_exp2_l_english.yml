l_english:
 murim_training_exp2.0001.t: "Forbidden Training Ground Discovery"
 murim_training_exp2.0001.desc: "While traversing a remote mountain pass, you stumble upon the remnants of an ancient training ground sealed behind crackling formation arrays. The air hums with concentrated spirit qi older than any living sect. Whatever martial secrets lie within have been locked away for centuries."
 murim_training_exp2.0001.a: "Enter and train in the concentrated spirit qi."
 murim_training_exp2.0001.b: "Study the formation arrays instead."
 murim_training_exp2.0001.c: "Seal it and report to the sect."
 murim_training_exp2.0002.t: "Training Under a Waterfall of Spirit Qi"
 murim_training_exp2.0002.desc: "A hidden waterfall pulses with ancient spirit qi, its waters glowing faintly in the moonlight. Standing beneath its crushing flow would temper both body and meridians beyond ordinary limits. But seven days and nights of such punishment could break a cultivator as easily as forge one."
 murim_training_exp2.0002.a: "Endure the full seven days and nights."
 murim_training_exp2.0002.b: "Meditate beside the waterfall instead."
 murim_training_exp2.0002.c: "Leave -- it is too dangerous."
 murim_training_exp2.0003.t: "Mount Hua Sword Dance Drill"
 murim_training_exp2.0003.desc: "The full moon rises over the Huashan cliffs. Tonight, you will perform the legendary 108 Plum Blossom Sword Forms at the cliff edge, where one misstep means death. Your drill instructor watches from the shadows, measuring every cut and thrust against the ancient standard."
 murim_training_exp2.0003.a: "Execute all 108 forms under moonlight."
 murim_training_exp2.0003.b: "Focus on inner sword qi meditation instead."
 murim_training_exp2.0003.c: "Challenge the instructor -- I have surpassed this."
 murim_training_exp2.0004.t: "Shaolin Iron Body Tempering"
 murim_training_exp2.0004.desc: "The Iron Shirt Qi Gong training begins at dawn. You must channel internal qi through all eighteen meridian pathways while monks strike your body with iron rods. Those who complete all eighteen stages gain a body harder than steel, but the risk of qi deviation is real."
 murim_training_exp2.0004.a: "Endure all 18 stages of Iron Shirt Qi Gong."
 murim_training_exp2.0004.b: "Take the gradual path of steady conditioning."
 murim_training_exp2.0004.c: "The risk to my qi channels is too great."
 murim_training_exp2.0005.t: "Wudang Taiji Flow Meditation"
 murim_training_exp2.0005.desc: "Atop the Wudang Mountains, the air breathes with the rhythm of the Dao. Your master instructs you to perform the 72 Heavenly Taiji Forms without stopping, seeking perfect balance between yin and yang. The morning mist parts around your movements as if nature itself acknowledges your practice."
 murim_training_exp2.0005.a: "Enter the Taiji Trance -- complete all 72 forms."
 murim_training_exp2.0005.b: "Focus on pushing hands combat application."
 murim_training_exp2.0005.c: "Seek the philosophical path -- dao over combat."
 murim_training_exp2.0006.t: "Tang Clan Mechanism Corridor Gauntlet"
 murim_training_exp2.0006.desc: "Deep beneath the Tang Clan compound lies the Mechanism Corridor -- 36 trap rooms filled with poison needles, blade arrays, and spring-loaded crossbows. Every Tang disciple must run this gauntlet to prove their reflexes and hidden weapon mastery. The corridor has claimed the careless and the slow."
 murim_training_exp2.0006.a: "Run the full gauntlet -- all 36 traps."
 murim_training_exp2.0006.b: "Study the mechanisms from the gallery."
 murim_training_exp2.0006.c: "I will design a new trap instead."
 murim_training_exp2.0007.t: "Iron Fist Breaking Boulder Trial"
 murim_training_exp2.0007.desc: "Five boulders stand in the Iron Fist courtyard, each harder than the last: sandstone, limestone, marble, granite, and iron ore. Every disciple seeking promotion must shatter them in sequence with bare fists. Your knuckles are already scarred from years of conditioning."
 murim_training_exp2.0007.a: "Attempt the Five Boulder Progression."
 murim_training_exp2.0007.b: "Condition fists through iron sand training first."
 murim_training_exp2.0007.c: "Observe others and learn from their technique."
 murim_training_exp2.0008.t: "Beggar Sect Street Survival Training"
 murim_training_exp2.0008.desc: "The Beggar Sect does not train in mountain monasteries. You have been given nothing -- no money, no weapons, no name. For 30 days you must survive on the streets of a strange city, gathering intelligence, fighting for influence, and completing tasks from hidden elder observers."
 murim_training_exp2.0008.a: "Embrace the streets -- fight for influence."
 murim_training_exp2.0008.b: "Practice the Dog Beating Staff while begging."
 murim_training_exp2.0008.c: "Give up and return to the sect early."
