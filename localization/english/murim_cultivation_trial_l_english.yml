l_english:
 murim_trial.0001.t: "Qi Deviation"
 murim_trial.0001.desc: "During an intense cultivation session, your internal qi suddenly surges out of control. Energy rampages through your meridians like a wild beast. Your vision blurs, your body trembles. If you cannot regain control, the damage to your cultivation base could be permanent."
 murim_trial.0001.a: "Force the qi back under control"
 murim_trial.0001.b: "Slowly guide it through meditation"
 murim_trial.0001.c: "Seek an elder's help immediately"

 murim_trial.0002.t: "The Bottleneck"
 murim_trial.0002.desc: "You've been stuck at the edge of a breakthrough for months. Your qi circles endlessly at the same level, unable to break through the invisible barrier. Other cultivators at your level have already advanced. Doubt creeps in — are you simply not talented enough?"
 murim_trial.0002.a: "Train harder — shatter the wall through force"
 murim_trial.0002.b: "Seek wisdom from a master or hermit"
 murim_trial.0002.c: "Try a different approach — find a catalyst"

 murim_trial.0003.t: "Breakthrough!"
 murim_trial.0003.desc: "The barrier shatters! Qi floods through your meridians with renewed vigor, reaching depths you never imagined possible. The world looks different — you can sense the flow of natural energy around you, feel the heartbeat of the earth itself. You have ascended to a new realm."
 murim_trial.0003.a: "Consolidate my new power through combat"
 murim_trial.0003.b: "Stabilize my foundation through meditation"
 murim_trial.0003.c: "Share the moment with those close to me"

 murim_trial.0004.t: "Heavenly Tribulation"
 murim_trial.0004.desc: "The sky darkens. Thunder rolls across a cloudless horizon. A pillar of divine lightning descends toward you — the Heavenly Tribulation, the ultimate test for those who dare to transcend mortal limits. To advance, you must endure heaven's wrath itself."
 murim_trial.0004.a: "Face the tribulation head-on!"
 murim_trial.0004.b: "Wait for a more auspicious moment"
 murim_trial.0004.c: "Use protective talismans and formations"

 murim_trial.0005.t: "Moment of Enlightenment"
 murim_trial.0005.desc: "While meditating beneath a waterfall, watching a leaf spin endlessly in the current, something clicks. The movements of nature, the flow of water, the dance of the wind — they mirror the principles of qi itself. Understanding floods your mind like sunrise illuminating a dark valley."
 murim_trial.0005.a: "Apply this insight to my martial arts"
 murim_trial.0005.b: "Share this wisdom with others"
 murim_trial.0005.c: "Use this understanding for personal gain"

 murim_trial.0006.t: "Body Tempering Trial"
 murim_trial.0006.desc: "To advance your physical cultivation, you must temper your body in extreme conditions — sitting beneath a glacial waterfall, bathing in medicinal lava pools, or enduring the pressure of deep mountain caves. The pain will be excruciating, but the rewards profound."
 murim_trial.0006.a: "Endure the full trial — no shortcuts"
 murim_trial.0006.b: "Use medicinal herbs to ease the process"
 murim_trial.0006.c: "Focus on mental cultivation instead"

 murim_trial.0007.t: "The Forbidden Shortcut"
 murim_trial.0007.desc: "A dark manual surfaces, promising rapid cultivation advancement at a terrible cost. It requires absorbing the life force of others — a forbidden technique that would mark you as a demonic cultivator forever. But the power it offers could catapult you past years of training in days."
 murim_trial.0007.a: "Use the forbidden technique"
 murim_trial.0007.b: "Destroy the manual — this path is evil"
 murim_trial.0007.c: "Study it without practicing — knowledge is power"

 murim_trial.0008.t: "Pill Refinement"
 murim_trial.0008.desc: "You've gathered the rare ingredients needed to attempt crafting a breakthrough pill — Crimson Flame Flower, Jade Spirit Root, and a drop of Lightning Serpent venom. The refinement process is delicate; one mistake could cause an explosion. Or worse."
 murim_trial.0008.a: "Attempt the refinement yourself"
 murim_trial.0008.b: "Find an experienced alchemist to help"
 murim_trial.0008.c: "Save the ingredients for later"

 murim_trial.0009.t: "Dual Cultivation Harmony"
 murim_trial.0009.desc: "Your partner proposes dual cultivation — a practice where two cultivators synchronize their qi, each strengthening the other's meridians. The technique requires absolute trust and emotional harmony. If your bond is strong enough, both of you could advance together."
 murim_trial.0009.a: "Cultivate together — strengthen our bond"
 murim_trial.0009.b: "Focus on your individual path instead"
 murim_trial.0009.c: "Appreciate the offer but train separately"

 murim_trial.0010.t: "Ancient Qi Formation"
 murim_trial.0010.desc: "Hidden deep within a mountain, you discover an ancient qi gathering formation — a vast array of carved runes that concentrates natural energy into a single point. The formation still functions, its power undimmed by centuries. Cultivating here could accelerate your growth dramatically."
 murim_trial.0010.a: "Use it for personal cultivation"
 murim_trial.0010.b: "Share the location with your sect"
 murim_trial.0010.c: "Sell the coordinates to the highest bidder"
