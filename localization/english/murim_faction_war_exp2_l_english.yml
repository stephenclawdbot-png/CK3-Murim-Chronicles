l_english:
 murim_faction_war_exp2.0001.t: "Declaration of Holy War"
 murim_faction_war_exp2.0001.desc: "The unorthodox sects have pushed too far. Assassinations, poison, demonic arts — the righteous path demands a response. The orthodox leaders gather beneath the banner of heaven's justice, debating whether to declare a holy war that will consume the entire martial world."
 murim_faction_war_exp2.0001.a: "Declare a holy purge on all unorthodox sects."
 murim_faction_war_exp2.0001.b: "Target only one unorthodox clan."
 murim_faction_war_exp2.0001.c: "Propose a peace summit instead."
 murim_faction_war_exp2.0001.d: "Stay neutral. Let others fight."
 murim_faction_war_exp2.0002.t: "Unorthodox Counter-Alliance"
 murim_faction_war_exp2.0002.desc: "The orthodox sects have declared war. For the unorthodox, this is an existential threat — the righteous have the numbers, the reputation, and the moral high ground. Survival demands unity among clans that have never trusted one another. The enemy of my enemy must become my ally."
 murim_faction_war_exp2.0002.a: "Form the Dark Alliance. Unite all unorthodox."
 murim_faction_war_exp2.0002.b: "Fight alone. Prove unorthodox superiority."
 murim_faction_war_exp2.0002.c: "Infiltrate the orthodox ranks from within."
 murim_faction_war_exp2.0002.d: "Flee to the borderlands."
 murim_faction_war_exp2.0003.t: "The Peace Summit"
 murim_faction_war_exp2.0003.desc: "Representatives from both factions gather at a neutral temple, the air thick with suspicion. Every attendee carries hidden weapons. The summit could end the war before it truly begins — or it could become the bloodiest ambush in Murim history."
 murim_faction_war_exp2.0003.a: "Spring the trap. Ambush the unorthodox delegates."
 murim_faction_war_exp2.0003.b: "Negotiate in good faith."
 murim_faction_war_exp2.0003.c: "Demand unconditional surrender."
 murim_faction_war_exp2.0003.d: "Propose a champion duel to decide the war."
 murim_faction_war_exp2.0003.d.success: "Your blade settles the war in a single stroke."
 murim_faction_war_exp2.0003.d.failure: "The unorthodox champion proves the stronger fighter."
 murim_faction_war_exp2.0004.t: "Burning of the Headquarters"
 murim_faction_war_exp2.0004.desc: "The orthodox army stands before the unorthodox headquarters, torches blazing. Inside, the last defenders prepare for a final stand. The screams of the wounded fill the air as smoke rises toward heaven. Total destruction is within reach — but so is mercy."
 murim_faction_war_exp2.0004.a: "Burn everything. Total destruction."
 murim_faction_war_exp2.0004.b: "Capture and imprison the leaders."
 murim_faction_war_exp2.0004.c: "Offer mercy to those who convert."
 murim_faction_war_exp2.0005.t: "Infiltrator Discovered"
 murim_faction_war_exp2.0005.desc: "Your infiltration of the orthodox ranks has given you unprecedented access. Their battle plans, their secret techniques, their internal disputes — all laid bare. But every day you spend among them increases the risk of exposure. The moment to strike is now."
 murim_faction_war_exp2.0005.a: "Sabotage from within. Poison their leaders."
 murim_faction_war_exp2.0005.b: "Steal their secret techniques."
 murim_faction_war_exp2.0005.c: "Recruit defectors to the unorthodox side."
 murim_faction_war_exp2.0006.t: "The Great Purge"
 murim_faction_war_exp2.0006.desc: "The war is won, but the prisoners remain. Hundreds of captured unorthodox martial artists await judgment in iron cages. The orthodox alliance debates their fate — execution, re-education, exile, or mercy. Your decision will define the new order of the martial world."
 murim_faction_war_exp2.0006.a: "Execute all captured unorthodox."
 murim_faction_war_exp2.0006.b: "Re-education camps. Reform their ways."
 murim_faction_war_exp2.0006.c: "Exile them to the borderlands."
 murim_faction_war_exp2.0006.d: "End this madness. The purge is wrong."
 murim_faction_war_exp2.0007.t: "Unorthodox Last Stand"
 murim_faction_war_exp2.0007.desc: "Backed into a mountain pass with nowhere left to run, the last unorthodox warriors prepare for their final battle. Behind you are the ashes of your sect, your home, your way of life. Before you stands the orthodox army, their banners bright with righteous fury. This is the end — or a new beginning."
 murim_faction_war_exp2.0007.a: "Fight to the death."
 murim_faction_war_exp2.0007.a.success: "Against impossible odds, you carve a legend in blood."
 murim_faction_war_exp2.0007.a.failure: "The orthodox host overwhelms you. You fall fighting."
 murim_faction_war_exp2.0007.b: "Tactical retreat. Live to fight another day."
 murim_faction_war_exp2.0007.c: "Sacrifice myself to save the clan."
 murim_faction_war_exp2.0007.d: "Surrender and beg for mercy."
 murim_faction_war_exp2.0008.t: "War Profiteering"
 murim_faction_war_exp2.0008.desc: "The Tang Clan watches the war from the sidelines, their warehouses full of weapons, poisons, and medicines that both sides desperately need. War is tragedy for the martial world, but for the Tang Clan, it is opportunity. The only question is who to supply — and at what price."
 murim_faction_war_exp2.0008.a: "Sell weapons to both sides."
 murim_faction_war_exp2.0008.b: "Supply only the orthodox side."
 murim_faction_war_exp2.0008.c: "Supply the unorthodox. Higher risk, higher reward."
 murim_faction_war_exp2.0008.d: "Refuse to profit from war."
 murim_faction_war_exp2.0009.t: "Beggar Sect Intelligence"
 murim_faction_war_exp2.0009.desc: "The Beggar Sect's network of informants spans every city, every village, every back alley in the martial world. In wartime, this intelligence is worth more than gold. Both sides have come knocking — the orthodox offering prestige, the unorthodox offering coin. Information is power, and you hold it all."
 murim_faction_war_exp2.0009.a: "Sell intelligence to the orthodox side."
 murim_faction_war_exp2.0009.b: "Sell intelligence to the unorthodox side."
 murim_faction_war_exp2.0009.c: "Play both sides for maximum profit."
 murim_faction_war_exp2.0009.d: "Use our intel to broker peace."
 murim_faction_war_exp2.0010.t: "The New Order"
 murim_faction_war_exp2.0010.desc: "The war is over. The martial world lies exhausted, its greatest warriors dead or broken. From the ashes, a new order must rise. You stand among the victors, tasked with shaping the future of Murim. What rises from the blood-soaked earth is yours to decide."
 murim_faction_war_exp2.0010.a: "Establish orthodox supremacy."
 murim_faction_war_exp2.0010.b: "Create a unified Murim council."
 murim_faction_war_exp2.0010.c: "The war never ends. Eternal conflict."
 murim_faction_war_exp2.0010.d: "Dissolve all factions. Individual freedom."
