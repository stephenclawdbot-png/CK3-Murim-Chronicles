l_english:
 murim_shadow_pol_exp6.0001.t: "The Shadow Endgame Begins"
 murim_shadow_pol_exp6.0001.desc: "The puppet emperor sits upon a gilded throne, unknowing that every decree bears the Heavenly Demon's invisible seal. But the arrangement grows unstable — orthodox leaders grow suspicious, and the puppet's usefulness wanes. It is time to decide the final shape of the shadow empire."
 murim_shadow_pol_exp6.0001.a: "Escalate. Begin the shadow emperor endgame."
 murim_shadow_pol_exp6.0001.b: "Consolidate. Tighten control over the puppet."
 murim_shadow_pol_exp6.0001.c: "Withdraw. Take the gold and disappear."
 murim_shadow_pol_exp6.0002.t: "Seizing the Imperial Throne"
 murim_shadow_pol_exp6.0002.desc: "The puppet emperor has served his purpose. The question now is whether to dispose of him and take the throne yourself, replace him with a fresh puppet, or simply tighten the strings until he can barely breathe without your permission."
 murim_shadow_pol_exp6.0002.a: "Kill the puppet. I am the emperor now."
 murim_shadow_pol_exp6.0002.b: "Replace the puppet with a younger one."
 murim_shadow_pol_exp6.0002.c: "Keep this puppet but as supreme master."
 murim_shadow_pol_exp6.0003.t: "Orthodox Outrage"
 murim_shadow_pol_exp6.0003.desc: "Word has spread that the Heavenly Demon sits upon the imperial throne. Shaolin monks abandon their meditation, Wudang swordsmen descend their mountain, Mount Hua disciples unsheathe their blades. The orthodox world seethes with righteous fury. The storm approaches."
 murim_shadow_pol_exp6.0003.a: "Let them come. Prepare for their crusade."
 murim_shadow_pol_exp6.0003.b: "Diplomacy. Offer concessions to calm them."
 murim_shadow_pol_exp6.0003.c: "Launch a preemptive purge of orthodox leaders."
 murim_shadow_pol_exp6.0004.t: "The Orthodox Crusade"
 murim_shadow_pol_exp6.0004.desc: "The orthodox coalition marches upon the capital, their combined armies a river of righteous steel. At their head stands a champion of legendary prowess, sworn to tear the demon from the throne. The final battle for the fate of Murim draws near."
 murim_shadow_pol_exp6.0004.a: "Face their champion in single combat."
 murim_shadow_pol_exp6.0004.a.win: "The orthodox champion falls. Their crusade crumbles."
 murim_shadow_pol_exp6.0004.a.lose: "The champion's blade pierces your defenses. You fall."
 murim_shadow_pol_exp6.0004.b: "Negotiate from a position of strength."
 murim_shadow_pol_exp6.0004.c: "Flee with my wealth. Live to fight another day."
 murim_shadow_pol_exp6.0005.t: "The Great Purge"
 murim_shadow_pol_exp6.0005.desc: "Orthodox resistance continues to smolder throughout the realm. You hold the power to extinguish it completely — a systematic purge of every martial artist who clings to the old ways. But such cruelty may poison the very realm you seek to rule."
 murim_shadow_pol_exp6.0005.a: "Complete the purge. Leave none standing."
 murim_shadow_pol_exp6.0005.b: "A selective purge. Only the leaders."
 murim_shadow_pol_exp6.0005.c: "Show mercy. End the purge entirely."
 murim_shadow_pol_exp6.0006.t: "Underground Resistance"
 murim_shadow_pol_exp6.0006.desc: "Despite your iron grip, pockets of resistance persist in the shadows — your shadows. Old-era loyalists meet in hidden cellars, training in secret, passing down forbidden orthodox techniques. Their leader is a formidable martial artist who refuses to kneel."
 murim_shadow_pol_exp6.0006.a: "Hunt the resistance down."
 murim_shadow_pol_exp6.0006.b: "Ignore them. They are insignificant."
 murim_shadow_pol_exp6.0006.c: "Infiltrate their ranks with double agents."
 murim_shadow_pol_exp6.0007.t: "The Resistance Champion"
 murim_shadow_pol_exp6.0007.desc: "The underground resistance has rallied behind a champion of terrifying skill. This warrior carries the hopes of every martial artist who dreams of the old ways. They have called you out by name, demanding a reckoning before heaven and earth."
 murim_shadow_pol_exp6.0007.a: "Face the resistance champion in battle."
 murim_shadow_pol_exp6.0007.a.win: "The champion falls. The resistance dies with them."
 murim_shadow_pol_exp6.0007.a.lose: "The champion's fury overwhelms you."
 murim_shadow_pol_exp6.0007.b: "Offer a truce. Enough blood has been spilled."
 murim_shadow_pol_exp6.0008.t: "Internal Conspiracy"
 murim_shadow_pol_exp6.0008.desc: "Even within the Heavenly Demon Sect, not all are loyal. A vassal within your own ranks conspires in secret, perhaps to seize the throne for themselves, perhaps to sell information to the orthodox remnants. Trust is a luxury the demon emperor cannot afford."
 murim_shadow_pol_exp6.0008.a: "Execute the conspirator. Make an example."
 murim_shadow_pol_exp6.0008.b: "Offer amnesty. Bring them back into the fold."
 murim_shadow_pol_exp6.0008.c: "Watch and wait. Monitor them paranoidly."
 murim_shadow_pol_exp6.0009.t: "The Demon Dynasty's Future"
 murim_shadow_pol_exp6.0009.desc: "The years have carved their mark upon you, but your power remains absolute. The question of legacy looms — will the Heavenly Demon's throne pass to a new generation, or will you seek to transcend the mortal limitation of time itself? Every dynasty must answer this question eventually."
 murim_shadow_pol_exp6.0009.a: "Found a Demon Dynasty. My children shall rule."
 murim_shadow_pol_exp6.0009.b: "Abdicate. Let the martial world find its own balance."
 murim_shadow_pol_exp6.0009.c: "Seek immortality. I will rule forever."
 murim_shadow_pol_exp6.0010.t: "The Dark Age of Murim"
 murim_shadow_pol_exp6.0010.desc: "The orthodox sects are crushed. The Heavenly Demon sits unchallenged upon the imperial throne. An era of absolute demon rule stretches before the martial world like an endless night. You hold the power to shape this age — will it be one of terror, of peace, or of reform?"
 murim_shadow_pol_exp6.0010.a: "Rule with an iron fist. Absolute domination."
 murim_shadow_pol_exp6.0010.b: "Rule benevolently. Bring peace to all."
 murim_shadow_pol_exp6.0010.c: "Reform the system. Balance orthodox and unorthodox."
