l_english:
 murim_wander.0001.t: "Whispers in the Tea House"
 murim_wander.0001.desc: "While resting at a tea house along the jianghu road, you overhear travelers speaking of a hidden cave in the mountains — one that supposedly contains the cultivation manual of a long-dead grandmaster. The information seems genuine, but you're not the only one listening."
 murim_wander.0001.a: "Follow the lead personally"
 murim_wander.0001.b: "Buy the travelers drinks for more details"
 murim_wander.0001.c: "Interesting, but not worth the risk"

 murim_wander.0002.t: "The Hidden Cave"
 murim_wander.0002.desc: "After days of searching through treacherous mountain paths, you find the cave entrance hidden behind a waterfall. Strange qi emanates from within — it could be a treasure trove of ancient knowledge, or a trap left by the grandmaster to test the worthy."
 murim_wander.0002.a: "Enter the cave boldly"
 murim_wander.0002.b: "Study the entrance carefully first"
 murim_wander.0002.c: "The risk is too great — turn back"

 murim_wander.0003.t: "The Mountain Hermit"
 murim_wander.0003.desc: "Deep in the mountains, you encounter an elderly cultivator living in complete solitude. Their qi is unfathomably deep — this person has clearly reached heights of cultivation you can barely imagine. They observe you silently, then speak: 'You have potential. I could teach you... if you have the humility to learn.'"
 murim_wander.0003.a: "Accept humbly and train under them"
 murim_wander.0003.b: "Challenge them to test their power"
 murim_wander.0003.c: "Share a meal and exchange stories"

 murim_wander.0004.t: "Ambush on the Mountain Road"
 murim_wander.0004.desc: "Bandits emerge from the treeline, blocking your path. But these are no ordinary thieves — their stances suggest formal martial training. They bear the marks of a fallen sect, desperate and dangerous. Their leader steps forward with killing intent."
 murim_wander.0004.a: "Fight them head-on"
 murim_wander.0004.b: "Surrender your valuables and pass"
 murim_wander.0004.c: "Use the terrain to outmaneuver them"

 murim_wander.0005.t: "The Poisoned Spring"
 murim_wander.0005.desc: "You discover a mountain spring that local villagers have been drinking from — but your trained senses detect traces of dark qi in the water. Someone has deliberately contaminated it with a slow-acting poison. The villagers show early symptoms."
 murim_wander.0005.a: "Purify the water with your qi"
 murim_wander.0005.b: "Track down whoever poisoned the spring"
 murim_wander.0005.c: "Warn the villagers and move on"

 murim_wander.0006.t: "The Traveling Merchant"
 murim_wander.0006.desc: "A mysterious merchant with a covered wagon approaches you on the road. They claim to carry rare cultivation pills — 'Essence of the Crimson Dragon,' capable of accelerating qi refinement tenfold. The price is steep, but if genuine, this could change everything."
 murim_wander.0006.a: "Buy the premium pill"
 murim_wander.0006.b: "Negotiate — offer to test it first"
 murim_wander.0006.c: "Too good to be true — decline"

 murim_wander.0007.t: "The Drunken Master"
 murim_wander.0007.desc: "In a rural wine house, a disheveled old man sits drinking jar after jar. When a group of thugs harasses the owner, the drunk stumbles to his feet — and dispatches all five with a single flowing motion. His 'Drunken Immortal Fist' is legendary. He notices you watching."
 murim_wander.0007.a: "Ask to learn from him"
 murim_wander.0007.b: "Challenge him to a friendly spar"
 murim_wander.0007.c: "Buy him another drink and listen to his stories"

 murim_wander.0008.t: "The Bridge Guardian"
 murim_wander.0008.desc: "A lone warrior stands at the center of a narrow bridge, their weapon drawn. 'None shall pass without proving their worth,' they declare. Behind you, other travelers wait nervously. This is an old jianghu tradition — the bridge challenge."
 murim_wander.0008.a: "Accept the challenge and fight"
 murim_wander.0008.b: "Pay the toll and cross peacefully"
 murim_wander.0008.c: "Talk your way across"

 murim_wander.0009.t: "Abandoned Sect Ruins"
 murim_wander.0009.desc: "You stumble upon the ruins of a once-great sect. The training grounds are overgrown, the halls collapsed — but the underground vault may still be intact. Faint traces of residual qi suggest powerful artifacts or manuals might remain. The ruins also emanate a disturbing darkness."
 murim_wander.0009.a: "Explore the underground vault"
 murim_wander.0009.b: "Salvage what's accessible on the surface"
 murim_wander.0009.c: "Pay respects and leave the dead in peace"

 murim_wander.0010.t: "The Refugee Caravan"
 murim_wander.0010.desc: "A long caravan of refugees stretches along the road — families displaced by a sect war. Children cry, the elderly stumble. They have nowhere to go. A mother approaches you: 'Please, honored cultivator, we need protection on the road ahead. Bandits prey on the weak.'"
 murim_wander.0010.a: "Escort them and provide supplies"
 murim_wander.0010.b: "Investigate which sect caused this"
 murim_wander.0010.c: "Wish them well but move on"

 murim_wander.0011.t: "Moonlight Challenge"
 murim_wander.0011.desc: "A letter appears pinned to your door by a throwing knife: 'Meet me at the old willow bridge at midnight. Come alone.' The handwriting is elegant, the paper expensive. This is either a trap or an honorable challenge from a skilled warrior seeking to test themselves against you."
 murim_wander.0011.a: "Accept — face them under the moonlight"
 murim_wander.0011.b: "Refuse — it's clearly a trap"
 murim_wander.0011.c: "Go, but bring hidden backup"

 murim_wander.0012.t: "The Hidden Herb Garden"
 murim_wander.0012.desc: "Behind a concealed ravine, you discover a garden of rare medicinal herbs — Blood Lotus, Jade Spirit Grass, and even a century-old Ginseng King. These herbs could fuel months of cultivation advancement. The garden seems untended, though someone planted it long ago."
 murim_wander.0012.a: "Harvest carefully and use for cultivation"
 murim_wander.0012.b: "Harvest everything and sell it"
 murim_wander.0012.c: "Share the location with your sect"
