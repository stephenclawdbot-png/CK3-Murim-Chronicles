 murim_ledger.0010.t: "The Martial Rankings -- Top 50"
 murim_ledger.0010.desc_header: "The rankings are determined by accumulated combat reputation, prowess, tournament victories, and the judgments of clan elders. They shift constantly as new challengers rise and old masters fade."
