l_english:
 murim_interact.0001.t: "Sparring Match"
 murim_interact.0001.desc: "You face your sparring partner on the training ground, feet planted in the worn earth where countless martial artists have tested their skills. The air hums with anticipation. How far will you push this exchange?"
 murim_interact.0001.a: "Light sparring -- friendly exchange"
 murim_interact.0001.b: "Intense sparring -- hold nothing back"
 murim_interact.0001.c: "Escalate to a death match"
 murim_interact.0010.t: "Master-Disciple Training"
 murim_interact.0010.desc: "Your disciple stands before you, eyes bright with eagerness to learn. The bond between master and student is the bedrock of the martial world -- through this sacred relationship, techniques are preserved and the art endures across generations."
 murim_interact.0010.a: "Guide them through today's lesson"
 murim_interact.0020.t: "Seeking Instruction"
 murim_interact.0020.desc: "You present yourself before a respected practitioner, requesting the honor of their teaching. The path of cultivation is long, and even the proudest warrior must sometimes humble themselves before greater knowledge."
 murim_interact.0020.a: "Study with humility"
 murim_interact.0020.b: "Challenge the teacher to prove worth"
 murim_interact.1001.t: "Death Match"
 murim_interact.1001.desc: "This is no sparring match. The killing intent is real, the stakes absolute. Two martial artists face each other with lethal purpose, surrounded by witnesses who will remember this day. Only one will walk away whole."
 murim_interact.1001.a: "All-out lethal assault"
 murim_interact.1001.b: "Try to negotiate mercy"
 murim_interact.1004.t: "Word Spreads"
 murim_interact.1004.desc: "News of the death match spreads through the martial world like wildfire. Courtiers whisper your name with a mixture of awe and fear. Your reputation as a fighter has been forged in blood."
 murim_interact.1004.a: "Bask in the glory"
 murim_interact.1004.b: "Reflect on the violence"
 murim_interact.1005.t: "A Coward Unmasked"
 murim_interact.1005.desc: "Your opponent refused the death match. Word spreads quickly -- in the martial world, declining a formal challenge is a stain that never fully fades. Their reputation crumbles while yours grows stronger."
 murim_interact.1005.a: "Celebrate their cowardice publicly"
 murim_interact.1005.b: "Show magnanimity in victory"
 murim_interact.2001.t: "Technique Theft -- Infiltration"
 murim_interact.2001.desc: "Under cover of darkness, you approach your target's training grounds. Their secret techniques -- the product of generations of refinement -- lie within reach. One night's work could grant you power that takes a lifetime to earn honestly."
 murim_interact.2001.a: "Sneak into their training grounds"
 murim_interact.2001.b: "Bribe a disciple for the manual"
 murim_interact.2001.c: "Abort -- this is too risky"
 murim_interact.2002.t: "Stolen Knowledge"
 murim_interact.2002.desc: "Success. The technique scroll is in your hands, its secrets laid bare before your eyes. The stolen knowledge flows into your meridians like illicit wine -- sweet, potent, and tinged with guilt."
 murim_interact.2002.a: "Revel in the stolen knowledge"
 murim_interact.2003.t: "Caught in the Act"
 murim_interact.2003.desc: "A hand seizes your wrist in an iron grip. You have been discovered -- your victim's eyes burn with fury and betrayal. The consequences of being caught stealing a martial art's most sacred techniques are severe."
 murim_interact.2003.a: "Flee before they attack"
 murim_interact.2003.b: "Stand and fight"
 murim_interact.2003.c: "Beg for forgiveness"
 murim_interact.2010.t: "Technique Theft by Force"
 murim_interact.2010.desc: "You stand over your target, your qi flaring with undeniable superiority. There is no subtlety here -- you will beat the technique out of them if necessary. Teach me, or suffer."
 murim_interact.2010.a: "Beat them until they teach you"
 murim_interact.2010.b: "Intimidate without fighting"
 murim_interact.3001.t: "Qi Transfer Healing"
 murim_interact.3001.desc: "Your patient lies before you, their meridians damaged and qi flow disrupted. By channeling your own qi into their body, you can mend what is broken -- but the process risks destabilizing your own cultivation."
 murim_interact.3001.a: "Gentle qi transfer -- safe but slow"
 murim_interact.3001.b: "Forceful qi flood -- fast but risky"
 murim_interact.4001.t: "Sect Rivalry Declaration"
 murim_interact.4001.desc: "A rival sect leader has sent a formal declaration of rivalry. Their disciples eye your territory with hungry ambition. The gauntlet has been thrown -- how you respond will determine whether your sect endures or crumbles."
 murim_interact.4001.a: "Accept the challenge -- prepare for war"
 murim_interact.4001.b: "Seek allies against the aggressor"
 murim_interact.4001.c: "Submit to avoid conflict"
 murim_interact.4010.t: "Sect Rivalry Escalates"
 murim_interact.4010.desc: "The rivalry between your sects festers like an open wound. Raids, ambushes, and assassinations have become routine. The martial world watches to see which sect will break first."
 murim_interact.4010.a: "Send a raiding party"
 murim_interact.4010.b: "Attempt assassination of their elder"
 murim_interact.4010.c: "Seek peace and end the rivalry"
 murim_interact.5001.t: "Protection Contract"
 murim_interact.5001.desc: "Your charge goes about their daily life under your watchful eye. The protection contract is simple -- keep them alive, receive payment. But the enemies circling in the shadows make nothing simple in the martial world."
 murim_interact.5001.a: "Routine patrol -- all quiet"
 murim_interact.5001.b: "Assassin attack! Defend your charge!"
 murim_interact.5001.c: "End the protection contract"
