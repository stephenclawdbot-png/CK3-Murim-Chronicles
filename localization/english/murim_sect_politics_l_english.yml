l_english:
 murim_sect_politics.0001.t: "Outer Disciple Promotion Trial"
 murim_sect_politics.0001.desc: "The elders have called your name. After years toiling as an outer disciple -- sweeping courtyards, carrying water, enduring the scorn of inner disciples -- you finally have a chance to prove your worth. The promotion trial awaits."
 murim_sect_politics.0001.a: "Take the formal trial"
 murim_sect_politics.0001.b: "Ask a senior to vouch for me"
 murim_sect_politics.0001.c: "Decline -- I am not yet ready"
 murim_sect_politics.0001.d: "Challenge the strongest inner disciple"
 murim_sect_politics.0002.t: "Elder Nomination"
 murim_sect_politics.0002.desc: "The sect council has nominated you for the rank of Elder. Years of loyal service, countless battles fought, wisdom earned through suffering -- all have led to this moment. The council of existing elders will vote on your ascension."
 murim_sect_politics.0002.a: "Accept the nomination graciously"
 murim_sect_politics.0002.b: "Decline -- my duty as disciple matters more"
 murim_sect_politics.0002.c: "Demand immediate promotion"
 murim_sect_politics.0003.t: "The Vice Leader's Seat"
 murim_sect_politics.0003.desc: "The position of Vice Leader stands vacant. The sect holds its breath as ambitious elders eye the empty chair -- second only to the Sect Leader in authority. Power, prestige, and the right to shape the sect's future all hang in the balance."
 murim_sect_politics.0003.a: "Challenge for the position by force"
 murim_sect_politics.0003.b: "Build alliances among the elders"
 murim_sect_politics.0003.c: "Call for a sect-wide vote"
 murim_sect_politics.0003.d: "Eliminate the rival candidate"
 murim_sect_politics.0004.t: "Succession Crisis"
 murim_sect_politics.0004.desc: "The Sect Leader is gone. Whether by death, retirement, or disappearance, the highest seat in the sect now stands empty. The sect teeters on the edge of chaos as factions form and old grudges resurface. Someone must claim leadership -- or the sect will tear itself apart."
 murim_sect_politics.0004.a: "Claim leadership as Vice Leader"
 murim_sect_politics.0004.b: "Enter the contest as a dark horse"
 murim_sect_politics.0004.c: "Support another candidate"
 murim_sect_politics.0004.d: "Seize power by force"
 murim_sect_politics.0005.t: "Peaceful Succession"
 murim_sect_politics.0005.desc: "The sect accepts your claim with surprising grace. Elders bow, disciples kneel, and the ancestral hall fills with the scent of incense. For the first time in generations, leadership changes hands without bloodshed. The sect's harmony endures."
 murim_sect_politics.0005.a: "Accept the mantle with honor"
 murim_sect_politics.0005.b: "Refuse -- I am not worthy"
 murim_sect_politics.0006.t: "Contested Succession"
 murim_sect_politics.0006.desc: "Two candidates stand before the assembled sect, neither willing to yield. The air crackles with tension as disciples take sides. This contest will be settled one way or another -- by fist, by politics, or by fracture."
 murim_sect_politics.0006.a: "Settle it with a formal duel"
 murim_sect_politics.0006.b: "Build a political coalition"
 murim_sect_politics.0006.c: "Let the sect split"
 murim_sect_politics.0006.d: "Step aside for the strongest"
 murim_sect_politics.0007.t: "Coup d'Etat"
 murim_sect_politics.0007.desc: "Torches blaze in the dead of night. Armed disciples storm the sect leader's quarters. A coup is underway -- the ambitious have decided that patience is for the weak, and power belongs to those bold enough to seize it."
 murim_sect_politics.0007.a: "Support the coup"
 murim_sect_politics.0007.b: "Defend the current order"
 murim_sect_politics.0007.c: "Stay neutral and wait"
 murim_sect_politics.0007.d: "Flee the sect in the chaos"
 murim_sect_politics.0008.t: "A Golden Age Dawns"
 murim_sect_politics.0008.desc: "Under your leadership, the sect flourishes. Disciples train with purpose, elders collaborate instead of scheming, and the sect's reputation spreads across the martial world. This is a golden age -- a rare period of harmony and growth."
 murim_sect_politics.0008.a: "Invest in training for all members"
 murim_sect_politics.0008.b: "Recruit aggressively -- expand the sect"
 murim_sect_politics.0008.c: "Build the sect's diplomatic prestige"
 murim_sect_politics.0009.t: "Seeds of Discord"
 murim_sect_politics.0009.desc: "Whispers in the training halls. Glares across the dinner table. The sect's harmony frays like old rope. Grievances fester, alliances splinter, and the once-unified disciples divide into hostile camps. If nothing is done, the sect will devour itself."
 murim_sect_politics.0009.a: "Call emergency council"
 murim_sect_politics.0009.b: "Purge the dissidents"
 murim_sect_politics.0009.c: "Let it burn"
 murim_sect_politics.0009.d: "Resign leadership to restore harmony"
 murim_sect_politics.0010.t: "The Temptation to Betray"
 murim_sect_politics.0010.desc: "The thought creeps in unbidden: what if you left? Took the sect's secrets with you, sold them to a rival clan, used them to carve your own path? The sect has given you much, but it has also held you back. The moment of decision arrives."
 murim_sect_politics.0010.a: "Steal secret techniques and flee"
 murim_sect_politics.0010.b: "Sabotage from within"
 murim_sect_politics.0010.c: "Defect openly and honestly"
 murim_sect_politics.0010.d: "The moment passes. I stay loyal."
 murim_sect_politics.0011.t: "Betrayal Discovered"
 murim_sect_politics.0011.desc: "A traitor has been discovered within the sect. Stolen scrolls, missing intelligence, compromised techniques -- the evidence is damning. The sect leadership must decide how to respond to this violation of sacred trust."
 murim_sect_politics.0011.a: "Hunt the traitor -- send assassins"
 murim_sect_politics.0011.b: "Exile them with formal banishment"
 murim_sect_politics.0011.c: "Forgive if they return"
 murim_sect_politics.0011.d: "Declare vendetta on all who aid them"
 murim_sect_politics.0012.t: "A Mole Among Us"
 murim_sect_politics.0012.desc: "Something is wrong. Intelligence leaks to rival sects. Training schedules appear in enemy hands. Someone within the sect is feeding information to outsiders. The mole must be found before irreparable damage is done."
 murim_sect_politics.0012.a: "Investigate quietly"
 murim_sect_politics.0012.b: "Set a trap with false information"
 murim_sect_politics.0012.c: "Ignore the signs"
 murim_sect_politics.0012.d: "Purge everyone suspicious"
 murim_sect_politics.0013.t: "Call of the Heavenly Demon"
 murim_sect_politics.0013.desc: "The Heavenly Demon Sect reaches out from the shadows, offering a path of unlimited power to those willing to abandon the righteous way. Their messenger speaks of techniques that shatter orthodox limitations, of freedom from the suffocating rules of righteous sects."
 murim_sect_politics.0013.a: "Embrace the dark path fully"
 murim_sect_politics.0013.b: "Refuse the dark temptation"
 murim_sect_politics.0013.c: "Pretend to defect -- spy for my sect"
 murim_sect_politics.0013.d: "Report the approach to the sect leader"
 murim_sect_politics.0014.t: "The Returning Traitor"
 murim_sect_politics.0014.desc: "A familiar figure kneels at the sect gates, head bowed in the rain. It is the one who betrayed you -- the traitor who stole secrets and fled into the night. Now they have returned, older and broken, begging for forgiveness and a second chance."
 murim_sect_politics.0014.a: "Accept them back -- redemption is possible"
 murim_sect_politics.0014.b: "Once a traitor, always a traitor"
 murim_sect_politics.0014.c: "Accept but test them first"
 murim_sect_politics.0014.d: "Execute them as a message"
