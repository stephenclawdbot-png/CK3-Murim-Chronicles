l_english:
 # ===========================
 # CONTINENTAL WAR LOCALIZATION
 # ===========================
 murim_declare_continental_war_decision: "Declare Continental War"
 murim_declare_continental_war_decision_desc: "As a faction leader, you have the authority to plunge the martial world into all-out war. This decision cannot be undone."
 murim_declare_continental_war_decision_tooltip: "Declare war between martial factions"
 murim_declare_continental_war_tt: "Continental War will begin. All martial artists must choose a side or go neutral."
 murim_join_orthodox_alliance_decision: "Join the Orthodox Alliance"
 murim_join_orthodox_alliance_decision_desc: "Stand with the righteous sects — Shaolin, Wudang, Mount Hua, and their allies — against the darkness."
 murim_join_orthodox_alliance_decision_tooltip: "Fight for the orthodox factions"
 murim_join_orthodox_tt: "You will fight for the orthodox alliance in the Continental War."
 murim_join_unorthodox_league_decision: "Join the Unorthodox League"
 murim_join_unorthodox_league_decision_desc: "The old order has failed. Join the unorthodox sects and tear down the hypocritical establishment."
 murim_join_unorthodox_league_decision_tooltip: "Fight for the unorthodox league"
 murim_join_unorthodox_tt: "You will fight for the unorthodox league in the Continental War."
 murim_war_neutral_path_decision: "Stay Neutral — Profit from Both Sides"
 murim_war_neutral_path_decision_desc: "While fools fight, the clever profit. Stay neutral and exploit the chaos."
 murim_war_neutral_path_decision_tooltip: "Remain neutral during the war"
 murim_broker_peace_decision: "Broker Peace"
 murim_broker_peace_decision_desc: "The war has gone on long enough. Use your influence and diplomacy to bring both sides to the negotiating table."
 murim_broker_peace_decision_tooltip: "Attempt to end the Continental War"

 murim_continental_war.0001.t: "The Drums of War"
 murim_continental_war.0001.desc: "The tension that has simmered for decades finally boils over. A faction leader has declared Continental War — the largest martial conflict in living memory. Every cultivator must choose: fight, flee, or profit from the chaos."
 murim_continental_war.0001.a: "Rally the orthodox sects!"
 murim_continental_war.0001.b: "Unleash the unorthodox!"
 murim_continental_war.0001.c: "The Emperor demands submission!"
 murim_continental_war.0005.t: "War Comes to Murim"
 murim_continental_war.0005.desc: "Continental War has been declared. Messenger pigeons carry the news to every sect, clan, and hidden valley. The martial world is splitting apart, and neutrality may not be an option."
 murim_continental_war.0005.a: "Join the Orthodox Alliance"
 murim_continental_war.0005.b: "Join the Unorthodox League"
 murim_continental_war.0005.c: "Stay neutral — profit from both sides"
 murim_continental_war.0005.d: "Flee and hide"

 murim_continental_war.0010.t: "The Battle Rages"
 murim_continental_war.0010.desc: "Qi techniques illuminate the battlefield like lightning. Disciples clash in coordinated formations while masters duel in the sky above. The ground trembles with the force of combat."
 murim_continental_war.0010.a: "Lead from the front"
 murim_continental_war.0010.b: "Command from behind"
 murim_continental_war.0010.c: "Use guerrilla tactics"

 murim_continental_war.0020.t: "Siege of the Sect"
 murim_continental_war.0020.desc: "Enemy forces have surrounded a major sect headquarters. The walls are reinforced with qi-hardened stone, but the attackers are relentless. The fate of an entire clan hangs in the balance."
 murim_continental_war.0020.a: "Storm the walls"
 murim_continental_war.0020.b: "Defend the compound"
 murim_continental_war.0020.c: "Negotiate a surrender"

 murim_continental_war.0035.t: "The Shadow War"
 murim_continental_war.0035.desc: "While armies clash in the open, the real war is fought in shadows. An opportunity arises to strike at the enemy's leadership — or to betray your own side for personal gain."
 murim_continental_war.0035.a: "Assassinate the enemy leader"
 murim_continental_war.0035.b: "Betray your faction — switch sides"
 murim_continental_war.0035.c: "Report the plot to your leader"

 murim_continental_war.0040.t: "Forbidden Arts on the Battlefield"
 murim_continental_war.0040.desc: "The war has reached a desperate point. Your forbidden techniques could turn the tide — but using them in open warfare will change how the world sees you forever."
 murim_continental_war.0040.a: "Unleash forbidden arts"
 murim_continental_war.0040.b: "Hold back — some lines shouldn't be crossed"

 murim_continental_war.0050.t: "The Profiteer's Game"
 murim_continental_war.0050.desc: "While the righteous and the wicked bleed, you operate in the spaces between. Both sides need supplies, information, and safe passage — and you provide all three, for a price."
 murim_continental_war.0050.a: "Sell weapons to both sides"
 murim_continental_war.0050.b: "Spy for the highest bidder"
 murim_continental_war.0050.c: "Smuggle refugees to safety"
 murim_continental_war.0050.d: "Extract resources from abandoned territories"

 murim_continental_war.0070.t: "The War Ends"
 murim_continental_war.0070.desc: "After years of blood, the Continental War finally concludes. The martial world is scarred but not broken. Now comes the harder task: rebuilding."
 murim_continental_war.0070.a: "Claim the spoils of war"
 murim_continental_war.0070.b: "Help rebuild the martial world"
 murim_continental_war.0070.c: "Raid the weakened sects"
 murim_continental_war.0075.t: "Influence Redistribution"
 murim_continental_war.0075.desc: "With the war over, spheres of influence are being redistributed among the victorious factions."
 murim_continental_war.0075.a: "Expand your faction's influence"
 murim_continental_war.0075.b: "Advocate for fair distribution"
 murim_continental_war.0076.t: "Prisoner Exchange"
 murim_continental_war.0076.desc: "Captured martial artists from both sides await exchange. Their fates rest in the hands of the negotiators."
 murim_continental_war.0076.a: "Negotiate a fair exchange"
 murim_continental_war.0076.b: "Demand ransom instead"
 murim_continental_war.0080.t: "Peace Negotiations"
 murim_continental_war.0080.desc: "Representatives from all factions gather at a neutral site. The air is thick with tension, distrust, and exhaustion. Everyone wants peace — the question is at what price."
 murim_continental_war.0080.a: "Propose a grand ceasefire"
 murim_continental_war.0080.b: "Demand unconditional surrender"
 murim_continental_war.0080.c: "The war must continue"
 murim_continental_war.0090.t: "Rising Tensions"
 murim_continental_war.0090.desc: "An incident between orthodox and unorthodox cultivators has inflamed tensions. A disciple was injured, accusations fly, and both sides are mobilizing."
 murim_continental_war.0090.a: "Escalate the incident"
 murim_continental_war.0090.b: "De-escalate"
 murim_continental_war.0090.c: "Use it for personal advantage"

 # ===========================
 # TRIBUNAL LOCALIZATION
 # ===========================
 murim_seek_tribunal_nomination_decision: "Seek Tribunal Nomination"
 murim_seek_tribunal_nomination_decision_desc: "The Heavenly Tribunal governs Murim law. Seek a seat among its seven judges."
 murim_seek_tribunal_nomination_decision_tooltip: "Pursue a seat on the Heavenly Tribunal"
 murim_seek_tribunal_nomination_tt: "Begin the nomination process for the Heavenly Tribunal."
 murim_summon_to_tribunal_decision: "Issue Tribunal Summons"
 murim_summon_to_tribunal_decision_desc: "As a Tribunal judge, summon an offender to face Murim justice."
 murim_summon_to_tribunal_decision_tooltip: "Summon someone before the Tribunal"
 murim_tribunal_judge_desc: "A seated judge of the Heavenly Tribunal — one of seven who govern Murim law."
 murim_tribunal_exile_desc: "Exiled by the Heavenly Tribunal. Barred from holding any position of authority in the martial world."

 murim_tribunal_system.0001.t: "The Tribunal's Gate"
 murim_tribunal_system.0001.desc: "The Heavenly Tribunal sits in judgment over the martial world. Its seven seats are held by the most respected and powerful cultivators alive. To join their number is to wield immense authority — and bear crushing responsibility."
 murim_tribunal_system.0001.a: "Present your case to the elders"
 murim_tribunal_system.0001.b: "Challenge a current judge"
 murim_tribunal_system.0001.c: "Withdraw nomination"
 murim_tribunal_system.0010.t: "Tribunal in Session"
 murim_tribunal_system.0010.desc: "The seven judges gather in the Hall of Judgment. Cases await review — forbidden technique users, clan disputes, and violations of Murim law."
 murim_tribunal_system.0010.a: "Summon a forbidden technique user"
 murim_tribunal_system.0010.b: "Summon a clan for overstepping"
 murim_tribunal_system.0010.c: "No summons this cycle"
 murim_tribunal_system.0015.t: "The Verdict"
 murim_tribunal_system.0015.desc: "The evidence has been heard, the arguments made. As a judge of the Heavenly Tribunal, you must now render judgment."
 murim_tribunal_system.0015.a: "Exile the offender"
 murim_tribunal_system.0015.b: "Seal their cultivation"
 murim_tribunal_system.0015.c: "Show mercy — forced apprenticeship"
 murim_tribunal_system.0015.d: "Execution"
 murim_tribunal_system.0020.t: "Summoned Before the Tribunal"
 murim_tribunal_system.0020.desc: "A solemn messenger arrives bearing the Tribunal's seal. You have been summoned to appear before the seven judges. Refusing carries its own consequences."
 murim_tribunal_system.0020.a: "Appear before the Tribunal"
 murim_tribunal_system.0020.b: "Resist the summons"
 murim_tribunal_system.0030.t: "Offered a Tribunal Seat"
 murim_tribunal_system.0030.desc: "The Heavenly Tribunal has a vacancy, and your name has been put forward. This is the highest honor the martial world can bestow."
 murim_tribunal_system.0030.a: "Accept the honor"
 murim_tribunal_system.0030.b: "Decline"
 murim_tribunal_system.0040.t: "The Briber's Offer"
 murim_tribunal_system.0040.desc: "A hooded figure approaches you after the session. Gold glints beneath their cloak. They want a specific verdict — and they're willing to pay handsomely."
 murim_tribunal_system.0040.a: "Accept the bribe"
 murim_tribunal_system.0040.b: "Reject and expose them"
 murim_tribunal_system.0040.c: "Take the gold, judge fairly anyway"
 murim_tribunal_system.0050.t: "The Emperor's Demand"
 murim_tribunal_system.0050.desc: "The Emperor has sent an edict demanding the Tribunal submit to imperial authority. The seven judges must decide: bow to the throne, or stand as an independent body."
 murim_tribunal_system.0050.a: "Stand firm — Murim governs itself"
 murim_tribunal_system.0050.b: "Compromise with the Emperor"
 murim_tribunal_system.0050.c: "Side with the Emperor"

 # ===========================
 # IMPERIAL COURT LOCALIZATION
 # ===========================
 murim_serve_emperor_decision: "Enter Imperial Service"
 murim_serve_emperor_decision_desc: "Serve the Emperor as a martial arts enforcer, diplomat, or spy. The pay is good, the prestige real — but you answer to the throne."
 murim_serve_emperor_decision_tooltip: "Serve the imperial court"
 murim_rebel_against_emperor_decision: "Rebel Against the Emperor"
 murim_rebel_against_emperor_decision_desc: "The Emperor's grip on the martial world has gone too far. Rally Murim against the throne."
 murim_rebel_against_emperor_decision_tooltip: "Begin a martial rebellion"

 murim_imperial_court.0001.t: "Imperial Service Begins"
 murim_imperial_court.0001.desc: "You kneel before the Dragon Throne and accept the Emperor's commission. As a martial enforcer, you will carry out the imperial will across the realm."
 murim_imperial_court.0001.a: "Serve as enforcer — hunt rogue cultivators"
 murim_imperial_court.0001.b: "Serve as diplomat — negotiate with sects"
 murim_imperial_court.0001.c: "Serve as spy — infiltrate networks"
 murim_imperial_court.0010.t: "Imperial Edict"
 murim_imperial_court.0010.desc: "The Emperor has issued a new edict affecting the martial world. Gatherings of more than ten cultivators are now banned without imperial permission."
 murim_imperial_court.0010.a: "Comply with the edict"
 murim_imperial_court.0010.b: "Defy the edict publicly"
 murim_imperial_court.0010.c: "Comply publicly, defy secretly"
 murim_imperial_court.0020.t: "Imperial Conscription"
 murim_imperial_court.0020.desc: "The Emperor's armies march to war, and martial artists are being conscripted. Your cultivation makes you a prized military asset."
 murim_imperial_court.0020.a: "Accept conscription"
 murim_imperial_court.0020.b: "Refuse and go into hiding"
 murim_imperial_court.0020.c: "Negotiate better terms"
 murim_imperial_court.0030.t: "The Imperial Spy Network"
 murim_imperial_court.0030.desc: "A soft-spoken court official approaches you with an offer: serve as the Emperor's eyes and ears within the martial world. The compensation is generous."
 murim_imperial_court.0030.a: "Accept — become an imperial spy"
 murim_imperial_court.0030.b: "Refuse and expose the network"
 murim_imperial_court.0030.c: "Accept as a double agent"
 murim_imperial_court.0040.t: "The Emperor's Vault"
 murim_imperial_court.0040.desc: "Deep beneath the imperial palace lies a vault containing forbidden techniques confiscated over centuries. Security is tight — but not impenetrable."
 murim_imperial_court.0040.a: "Attempt the heist"
 murim_imperial_court.0040.b: "Too risky — walk away"
 murim_imperial_court.0040.c: "Report the vault to your sect"
 murim_imperial_court.0050.t: "Revolution!"
 murim_imperial_court.0050.desc: "You have raised the banner of rebellion. Martial artists across the realm must choose: support the throne, or join you in tearing it down."
 murim_imperial_court.0050.a: "Rally Murim against the throne"
 murim_imperial_court.0050.b: "Use guerrilla tactics"
 murim_imperial_court.0050.c: "Negotiate from strength"
 murim_imperial_court.0060.t: "The Emperor's Tournament"
 murim_imperial_court.0060.desc: "The Emperor hosts a grand martial tournament in the capital. The prize: a boon from the Dragon Throne itself."
 murim_imperial_court.0060.a: "Enter the tournament"
 murim_imperial_court.0060.b: "Attend as a spectator"
 murim_imperial_court.0060.c: "Boycott the Emperor's games"
 murim_imperial_court.0070.t: "Imperial Marriage Proposal"
 murim_imperial_court.0070.desc: "The Emperor proposes a political marriage to bind your clan to the throne. It would bring wealth and protection — but also obligations."
 murim_imperial_court.0070.a: "Accept the proposal"
 murim_imperial_court.0070.b: "Refuse — Murim does not bow"
 murim_imperial_court.0070.c: "Accept as leverage"
