l_english:
 murim_renown.0001.t: "Your Name Spreads"
 murim_renown.0001.desc: "Stories of your martial prowess have spread across the jianghu like wildfire. Travelers speak your name in tea houses, young cultivators dream of meeting you, and rival sects take note. How you handle this growing fame will shape your path forward."
 murim_renown.0001.a: "Let them fear my name"
 murim_renown.0001.b: "Stay humble — fame is fleeting"
 murim_renown.0001.c: "Retreat into quiet cultivation"

 murim_renown.0002.t: "The Shadow of Infamy"
 murim_renown.0002.desc: "Your reputation has taken a dark turn. Whispers follow you everywhere — of cruelty, of ruthlessness, of enemies who simply... disappeared. Merchants close their doors when you approach. Children are pulled inside. Even other cultivators keep their distance."
 murim_renown.0002.a: "Good — let them tremble"
 murim_renown.0002.b: "Perform acts of charity to restore your name"
 murim_renown.0002.c: "Use the fear to your advantage quietly"

 murim_renown.0003.t: "The Challenger"
 murim_renown.0003.desc: "A young cultivator has arrived at your doorstep, blade drawn. 'I've heard of your fame,' they declare. 'I've traveled a thousand li to test myself against you. Fight me, or admit your reputation is hollow!' A crowd is already gathering."
 murim_renown.0003.a: "Accept — crush them publicly"
 murim_renown.0003.b: "Decline — I have nothing to prove"
 murim_renown.0003.c: "Invite them in for tea instead"

 murim_renown.0004.t: "An Offer You Cannot Refuse"
 murim_renown.0004.desc: "A messenger arrives bearing the seal of one of the great sects. They've taken notice of your growing reputation and wish to recruit you — not as a common disciple, but as an honored guest elder. The position comes with resources, influence, and protection."
 murim_renown.0004.a: "Accept the prestigious position"
 murim_renown.0004.b: "Decline — I walk my own path"
 murim_renown.0004.c: "Negotiate for better terms first"

 murim_renown.0005.t: "The Assassin's Shadow"
 murim_renown.0005.desc: "You wake to find a poisoned needle embedded in your pillow — inches from where your head lay. Someone has hired a professional assassin. Your fame has made you a target. The needle bears a familiar marking, but whose?"
 murim_renown.0005.a: "Hunt the assassin down personally"
 murim_renown.0005.b: "Investigate who ordered the hit"
 murim_renown.0005.c: "Hire bodyguards and increase security"

 murim_renown.0006.t: "The Chronicle of Deeds"
 murim_renown.0006.desc: "A traveling scholar approaches you with ink-stained hands and bright eyes. 'I am writing a chronicle of the greatest cultivators of our era. Your deeds are remarkable — may I document your story? The jianghu deserves to know the truth behind the legend.'"
 murim_renown.0006.a: "Share your story openly"
 murim_renown.0006.b: "Share a curated version of events"
 murim_renown.0006.c: "Refuse — my story is my own"

 murim_renown.0007.t: "Disciples at the Gate"
 murim_renown.0007.desc: "Word of your mastery has spread far. This morning, you find dozens of aspiring cultivators camped outside your residence, all begging to become your disciple. Some have traveled for months. Their eyes burn with desperate hope."
 murim_renown.0007.a: "Accept the most promising ones"
 murim_renown.0007.b: "Charge tuition — knowledge has a price"
 murim_renown.0007.c: "Send them all away — I'm no teacher"

 murim_renown.0008.t: "Whispers of Slander"
 murim_renown.0008.desc: "Someone has been spreading malicious lies about you throughout the jianghu — that your techniques were stolen, that your victories were rigged, that you murdered your own master. The rumors are gaining traction. Several old allies have become suspiciously distant."
 murim_renown.0008.a: "Find the slanderer and confront them"
 murim_renown.0008.b: "Let your deeds speak louder than words"
 murim_renown.0008.c: "Launch a counter-information campaign"

 murim_renown.0009.t: "The Emperor's Summons"
 murim_renown.0009.desc: "An imperial eunuch arrives with a golden scroll: the Emperor himself has heard of your martial prowess and wishes an audience. This is an extraordinary honor — or perhaps a gilded cage. The imperial court is a world of intrigue where martial masters often become pawns."
 murim_renown.0009.a: "Accept the summons with honor"
 murim_renown.0009.b: "Respectfully decline — I serve no throne"
 murim_renown.0009.c: "Attend but gather intelligence"

 murim_renown.0010.t: "What Will They Remember?"
 murim_renown.0010.desc: "As the years weigh upon you, you find yourself reflecting on your legacy. What have you built? What will remain when you're gone? The martial world is unforgiving — legends rise and fall like waves. But a true legacy... that is eternal."
 murim_renown.0010.a: "Create an ultimate technique to pass down"
 murim_renown.0010.b: "Establish a school of thought"
 murim_renown.0010.c: "Build alliances that will outlast you"
