l_english:
 # Court Connection Events
 murim_court.0001.t: "A Martial Expert Offers Service"
 murim_court.0001.desc: "A figure of considerable martial prowess has approached our court. [scope:martial_advisor.GetFirstName], a warrior of the jianghu — the hidden martial world that exists beneath the surface of our realm — has offered to serve as an informal advisor.\n\nThey claim to bring knowledge of threats no ordinary spy could uncover, fighting techniques that could strengthen our guard, and connections to a shadow world of powerful sects and cultivators.\n\nThe martial world operates by its own rules, outside our authority. But having an insider at court could prove... invaluable."
 murim_court.0001.a: "Welcome them. A martial advisor could prove most useful."
 murim_court.0001.b: "We have no need of jianghu vagabonds at this court."

 murim_court.0002.t: "The Martial Advisor's Counsel"
 murim_court.0002.desc: "Our martial advisor [scope:advisor.GetFirstName] requests a private audience. They say they have intelligence from the jianghu that may interest us.\n\n\"The martial world stirs, my lord. I can offer you different kinds of counsel — knowledge of hidden threats, training methods for your personal guard, or whispers from the shadows that even your spymaster hasn't heard.\""
 murim_court.0002.a: "Tell me about threats to my realm."
 murim_court.0002.b: "Train my personal guard in martial techniques."
 murim_court.0002.c: "What whispers have you heard from the shadows?"

 murim_court.0003.t: "A Sect Leader Seeks an Audience"
 murim_court.0003.desc: "[scope:sect_leader.GetFirstName], leader of a powerful martial sect, has sent word requesting a formal audience. In the jianghu — the hidden martial world — sect leaders command armies of skilled fighters, control secret techniques, and wield influence that rivals our own.\n\nThis is unusual. The martial world typically operates in the shadows, ignoring the authority of rulers. For a sect leader to approach us directly suggests they want something... or they're offering something we can't refuse.\n\nHow shall we receive them?"
 murim_court.0003.a: "Grant them a place at court. A powerful ally in the jianghu is worth having."
 murim_court.0003.b: "They will serve us... whether they know it or not. Use them as a shadow enforcer."
 murim_court.0003.c: "We want nothing to do with the martial world. Decline the audience."

 murim_court.0004.t: "Host a Martial Tournament?"
 murim_court.0004.desc: "Our advisors have proposed hosting a grand martial tournament — an exhibition of fighting arts that would draw warriors from across the jianghu. The martial world's greatest fighters would compete under our banner, bringing prestige to our court and potentially attracting skilled warriors to our service.\n\nThe cost would be significant, but the rewards could reshape how the martial world views our authority."
 murim_court.0004.a: "Spare no expense! A grand tournament worthy of our name."
 murim_court.0004.b: "A modest exhibition will suffice. Let us test the waters."
 murim_court.0004.c: "We have no interest in attracting these vagabonds."

 murim_court.0005.t: "Martial World Crisis Reaches the Realm"
 murim_court.0005.desc: "Troubling reports reach us from across the realm. A conflict in the martial world — the hidden jianghu that exists beneath our authority — has spilled into our domain. Villagers report strange battles in the night, sect warriors clashing in our towns, and mysterious figures moving through our territory.\n\nThe martial world usually keeps its conflicts contained, but this time the violence threatens our people and our authority. We must respond."
 murim_court.0005.a: "Deploy troops to restore order. This is still our realm."
 murim_court.0005.b: "Send envoys to negotiate with martial world leaders."
 murim_court.0005.c: "Seal the borders and let them destroy each other."

 murim_court.0006.t: "The Shadow Behind the Throne"
 murim_court.0006.desc: "A disturbing revelation: [scope:shadow_master.GetFirstName], a powerful martial world figure, has been quietly influencing affairs at our court. Through loyal courtiers, carefully placed bribes, and subtle manipulation, this jianghu master has been steering decisions in their sect's favor.\n\nThe martial world's shadow extends further than we realized. The question is — do we fight it, exploit it, or submit to it?"
 murim_court.0006.a: "Expose their scheming! We answer to no shadow master."
 murim_court.0006.b: "Interesting. Perhaps we can use this to our advantage..."
 murim_court.0006.c: "Purge every trace of their influence from our court."

 murim_court.0007.t: "Seeking Influence at Court"
 murim_court.0007.desc: "Our position in the martial world is strong, but true power requires influence beyond the jianghu. The rulers of this land command armies, taxes, and the loyalty of millions. If we could place ourselves within their court — or manipulate them from the shadows — our sect's position would be unassailable."
 murim_court.0007.a: "Offer our service openly. A trusted position at court serves us well."
 murim_court.0007.b: "Work from the shadows. True power is unseen."
 murim_court.0007.c: "The martial world is where we belong. Leave the court to politicians."

 murim_court.0008.t: "Whispers of the Martial World"
 murim_court.0008.desc: "Rumors have reached our ears of a hidden world existing beneath the surface of our realm — the jianghu, a shadow society of martial artists, cultivators, and warrior sects. These people possess fighting abilities far beyond ordinary soldiers, practice mysterious arts of qi cultivation, and answer to their own leaders rather than any crown.\n\nSome say their greatest masters could defeat an entire army alone. Others say they're just common outlaws with inflated reputations.\n\nThis hidden world exists whether we acknowledge it or not. The question is how we choose to engage with it."
 murim_court.0008.a: "Fascinating. Have our scholars investigate this further."
 murim_court.0008.b: "Recruit these martial artists into our service. Such power should serve the crown."
 murim_court.0008.c: "These outlaws operate outside our authority? Unacceptable. Suppress them."

 # Modifier Localizations
 murim_martial_advisor_at_court: "Martial Advisor at Court"
