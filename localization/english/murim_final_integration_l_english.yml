l_english:

 # Final Integration Events
 murim_final_integration.0001.t:0 "The Murim World Watches"
 murim_final_integration.0001.desc:0 "Word has spread across every sect and clan — [ascension_candidate.GetName] has declared the Immortal Ascension Trial. Masters, elders, and warriors from every corner of the martial world have stopped their training to bear witness. This is a once-in-a-generation event. How we respond will shape our legacy."
 murim_final_integration.0001.a:0 "We support [ascension_candidate.GetName]'s ascension"
 murim_final_integration.0001.b:0 "Only the worthy should ascend — I challenge them!"
 murim_final_integration.0001.c:0 "We will observe from the shadows"

 murim_final_integration.0002.t:0 "Reconstruction Summit"
 murim_final_integration.0002.desc:0 "The Great Calamity has finally passed, leaving the Murim world scarred but not broken. The surviving masters and sect leaders gather for an unprecedented summit. The question is simple: who will lead the reconstruction? Trade routes must be restored, alliances reforged, and the dead mourned."
 murim_final_integration.0002.a:0 "We will lead the reconstruction — unite all factions"
 murim_final_integration.0002.b:0 "Seize power in the chaos — the strong shall rule"
 murim_final_integration.0002.c:0 "Focus on rebuilding our own sect first"

 murim_final_integration.0003.t:0 "The Tournament of the Ages"
 murim_final_integration.0003.desc:0 "The time has come for the greatest martial tournament ever held. Champions from every clan, disciples from every sect, wandering masters, and even shadow sect warriors have answered the call. This tournament will determine the supreme martial artist of the age and reshape the Murim power hierarchy."
 murim_final_integration.0003.a:0 "Host the Tournament of the Ages"
 murim_final_integration.0003.b:0 "Enter the tournament ourselves — glory awaits!"

 murim_final_integration.0004.t:0 "A Murim Golden Age Dawns"
 murim_final_integration.0004.desc:0 "Everything aligns. Our intelligence networks are strong. Our blood oath alliances hold firm. Trade routes flow with wealth. No calamity darkens the horizon. For the first time in memory, the Murim world knows genuine peace and prosperity. The masters train freely, disciples flourish, and even old rivalries grow quiet."
 murim_final_integration.0004.a:0 "Declare a Murim Golden Age!"
 murim_final_integration.0004.b:0 "Remain vigilant — golden ages attract predators"

 murim_final_integration.0005.t:0 "Ascension Challenge Duel"
 murim_final_integration.0005.desc:0 "We face [ascension_candidate.GetName] in combat before the assembled Murim world. If we prevail, we prove the candidate unworthy of transcendence. If we fail, we only burnish their legend further. The duel begins."
 murim_final_integration.0005.a:0 "Fight with everything we have!"
 murim_final_integration.0005.a.success:0 "Our martial prowess overcomes the candidate. They are not yet worthy of immortality."
 murim_final_integration.0005.a.failure:0 "The candidate's power is beyond us. Perhaps they truly deserve to ascend."

 murim_final_integration.0006.t:0 "Bonds Forged in Calamity"
 murim_final_integration.0006.desc:0 "Having survived the Great Calamity together, a deep bond has formed between the survivors. One warrior in particular has proven their loyalty beyond any doubt. The time has come to seal this bond with a blood oath — a promise that transcends any sect or clan affiliation."
 murim_final_integration.0006.a:0 "Swear the blood oath — we are brothers in survival"
 murim_final_integration.0006.b:0 "The calamity is over — we walk alone again"

 murim_final_integration.0007.t:0 "Resistance to the New Order"
 murim_final_integration.0007.desc:0 "Not everyone accepts our claim to power in the aftermath of the calamity. A coalition of dissatisfied martial artists has formed, openly challenging our authority. They call us opportunists who exploited tragedy for personal gain."
 murim_final_integration.0007.a:0 "Crush the resistance with overwhelming force"
 murim_final_integration.0007.b:0 "Negotiate — their concerns may have merit"

 # Cross-System Modifier Localization
 murim_shadow_intel_synergy_modifier:0 "Shadow Intelligence Synergy"
 murim_shadow_intel_synergy_modifier_desc:0 "Our shadow sect contacts and spy network operate in perfect coordination, revealing secrets hidden from all others."
 murim_compromised_network_modifier:0 "Compromised Network"
 murim_compromised_network_modifier_desc:0 "Our intelligence network has been infiltrated. Enemy agents feed us false information while our secrets pour out."
 murim_tribunal_martial_law_modifier:0 "Tribunal Martial Law"
 murim_tribunal_martial_law_modifier_desc:0 "Under Tribunal authority, martial law governs all disputes. Order is maintained through force."
 murim_tribunal_condemned_modifier:0 "Condemned by the Tribunal"
 murim_tribunal_condemned_modifier_desc:0 "The Heavenly Tribunal has pronounced judgment against us. Every sect and clan shuns our name."
 murim_expedition_glory_modifier:0 "Expedition Glory"
 murim_expedition_glory_modifier_desc:0 "Our continental expedition returned triumphant, bearing tales of victory and treasures from distant lands."
 murim_expedition_disaster_modifier:0 "Expedition Disaster"
 murim_expedition_disaster_modifier_desc:0 "Our expedition met catastrophe in foreign lands. The survivors limp home bearing scars and bitter lessons."
 murim_blood_oath_betrayed_modifier:0 "Blood Oath Betrayed"
 murim_blood_oath_betrayed_modifier_desc:0 "A sworn brother has broken the blood oath. The wound cuts deeper than any blade."
 murim_blood_oath_calamity_pact_modifier:0 "Calamity Survival Pact"
 murim_blood_oath_calamity_pact_modifier_desc:0 "Bonds forged in the fires of the Great Calamity. Those who survived together fight together."
 murim_forbidden_vault_power_modifier:0 "Forbidden Vault Power"
 murim_forbidden_vault_power_modifier_desc:0 "Ancient techniques from the forbidden vault course through our veins — power at the cost of corruption."
 murim_forbidden_corruption_modifier:0 "Forbidden Technique Corruption"
 murim_forbidden_corruption_modifier_desc:0 "The forbidden arts consume body and mind. Raw power grows even as humanity fades."
 murim_vault_alchemy_discovery_modifier:0 "Vault Alchemy Discovery"
 murim_vault_alchemy_discovery_modifier_desc:0 "Ancient alchemical formulae recovered from the forbidden vault yield remarkable healing and cultivation aids."
 murim_ascension_failed_modifier:0 "Failed Ascension"
 murim_ascension_failed_modifier_desc:0 "The immortal ascension trial has failed. Body and spirit are shattered, and the Murim world mourns a fallen legend."
 murim_ascension_succeeded_modifier:0 "Immortal Transcendence"
 murim_ascension_succeeded_modifier_desc:0 "Having transcended mortality, we stand beyond the reach of ordinary martial artists. A living legend walks the earth."
 murim_trade_route_secured_modifier:0 "Trade Route Secured"
 murim_trade_route_secured_modifier_desc:0 "Martial escorts protect the trade caravans, and wealth flows freely through our territory."
 murim_trade_route_contested_modifier:0 "Trade Route Contested"
 murim_trade_route_contested_modifier_desc:0 "Rival martial factions contest our trade routes. Commerce suffers as blood is spilled on merchant roads."
 murim_merchant_martial_alliance_modifier:0 "Merchant-Martial Alliance"
 murim_merchant_martial_alliance_modifier_desc:0 "An alliance between merchant guilds and martial sects brings wealth and military strength in equal measure."
 murim_all_systems_harmony_modifier:0 "Murim Golden Age"
 murim_all_systems_harmony_modifier_desc:0 "All systems of the Murim world align in perfect harmony. Peace, prosperity, and martial excellence define this era."
 murim_murim_world_in_chaos_modifier:0 "Murim World in Chaos"
 murim_murim_world_in_chaos_modifier_desc:0 "The martial world descends into chaos. Power vacuums, broken alliances, and unchecked ambition tear at the fabric of order."
 murim_black_market_intel_modifier:0 "Black Market Intelligence"
 murim_black_market_intel_modifier_desc:0 "Underground dealers feed us intelligence from the criminal underworld — effective but morally compromising."
 murim_exposed_spy_network_modifier:0 "Exposed Spy Network"
 murim_exposed_spy_network_modifier_desc:0 "Our entire spy network has been exposed. Every agent is a target, every safe house compromised."
 murim_calamity_survivor_network_modifier:0 "Calamity Survivor Network"
 murim_calamity_survivor_network_modifier_desc:0 "Those who survived the Great Calamity share an unbreakable bond. Together, they rebuild and protect."
 murim_post_calamity_rebuilding_modifier:0 "Post-Calamity Rebuilding"
 murim_post_calamity_rebuilding_modifier_desc:0 "Leading the reconstruction of the Murim world after the Great Calamity. Development grows but resources are strained."

 # Opinion Modifiers
 supports_ascension:0 "Supports Ascension"
 blood_oath_bond:0 "Blood Oath Bond"
