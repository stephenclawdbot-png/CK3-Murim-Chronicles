l_english:
 # ========================================
 # GREAT CALAMITY LOCALIZATION
 # Phase 0: Omens | Phase 1: Gathering Storm | Phase 2: Great War
 # Phase 3: The Silence | Phase 4: The Renewal
 # ========================================

 # --- PHASE 0: OMENS ---
 murim_calamity.0001.t:0 "The Qi Trembles"
 murim_calamity.0001.desc:0 "During meditation, you feel it — a shudder in the very fabric of the world's qi. Not an earthquake, not a technique. Something deeper. The meridians of heaven and earth themselves are... wrong. Other martial artists report the same sensation. The birds have gone silent on the mountain."
 murim_calamity.0001.desc_seer:0 "You have felt the signs before, in dreams and visions. But now it is real. The qi of heaven and earth screams in silence. The Great Calamity your visions foretold is no longer a distant possibility — it is a certainty. The only question is when."
 murim_calamity.0001.a:0 "Meditate deeply on this disturbance..."
 murim_calamity.0001.b:0 "It was just a tremor. Nothing more."
 murim_calamity.0001.c:0 "Warn every martial artist I can reach!"

 murim_calamity.0002.t:0 "A Warning From the Jianghu"
 murim_calamity.0002.desc:0 "A fellow martial artist has sent word: something is wrong with the world's qi. They speak of tremors in the earth veins, animals fleeing sacred mountains, and strange lights in the sky above the Kunlun range. They urge you to prepare for the worst."
 murim_calamity.0002.a:0 "Heed the warning and begin preparations."
 murim_calamity.0002.b:0 "Superstitious nonsense."

 murim_calamity.0003.t:0 "The Animals Flee"
 murim_calamity.0003.desc:0 "Your people report something troubling. The deer have left the forests. The fish have vanished from the rivers. Even the insects have gone silent. The old stories speak of this — when the beasts of the earth sense what human eyes cannot see. Something is coming."
 murim_calamity.0003.a:0 "Stockpile food and resources immediately."
 murim_calamity.0003.b:0 "Animals are fickle. This means nothing."

 murim_calamity.0004.t:0 "Vision of the End"
 murim_calamity.0004.desc:0 "In a dream so vivid it burns, you see the Murim world consumed in fire and blood. Sect headquarters crumble. Masters fall. The Heavenly Demon laughs as orthodox and unorthodox alike are consumed. And then — silence. Absolute, perfect silence. In the ashes, a single flower grows. You wake drenched in sweat, the dream seared into your memory like a brand."
 murim_calamity.0004.a:0 "The heavens have shown me the truth. I must prepare."
 murim_calamity.0004.b:0 "I refuse to accept this fate. I will find a way to prevent it."

 # --- PHASE 1: GATHERING STORM ---
 murim_calamity.0010.t:0 "The Gathering Storm"
 murim_calamity.0010.desc:0 "It has begun. After years of omens and warnings, the fractures in the Murim world can no longer be ignored. Old alliances crumble. Forgotten grudges resurface with murderous intensity. The Orthodox sects eye the Unorthodox with renewed suspicion. The Heavenly Demon Sect grows bolder by the day. Border skirmishes erupt across every province. The Jianghu has not seen tension like this in living memory. War is coming — not a small war between two sects, but a war that will consume everything."
 murim_calamity.0010.a:0 "Rally our clan. We fight for survival."
 murim_calamity.0010.b:0 "Seek alliances. We cannot face this alone."
 murim_calamity.0010.c:0 "Prepare to survive. Hide. Wait. Endure."
 murim_calamity.0010.d:0 "Pray to the heavens for deliverance."

 murim_calamity.0011.t:0 "Aggressive Posturing"
 murim_calamity.0011.desc:0 "AI clan leader takes aggressive action during the Gathering Storm."
 murim_calamity.0011.a:0 "Strike first."

 murim_calamity.0012.t:0 "Shadow Maneuvering"
 murim_calamity.0012.desc:0 "AI clan leader engages in cunning political maneuvering."
 murim_calamity.0012.a:0 "Move in the shadows."

 murim_calamity.0013.t:0 "Diplomatic Effort"
 murim_calamity.0013.desc:0 "AI clan leader attempts diplomacy before the storm breaks."
 murim_calamity.0013.a:0 "Seek peace."

 murim_calamity.0014.t:0 "Border Skirmish"
 murim_calamity.0014.desc:0 "Scouts report a hostile force approaching your territory. Warriors bearing the colors of a rival sect have crossed the boundary markers. This is not a raid — it is a statement. The Gathering Storm has reached your doorstep."
 murim_calamity.0014.a:0 "Meet them blade to blade!"
 murim_calamity.0014.a.success:0 "Victory! The enemy retreats."
 murim_calamity.0014.a.success.toast:0 "Skirmish Won"
 murim_calamity.0014.a.failure:0 "Defeated... forced to retreat."
 murim_calamity.0014.b:0 "Fall back to defensible ground."
 murim_calamity.0014.c:0 "Send an envoy to negotiate."

 # --- PHASE 2: THE GREAT WAR ---
 murim_calamity.0019.t:0 "The Great War Begins"
 murim_calamity.0019.desc:0 "The dam has broken. What began as border skirmishes has erupted into total war. The Orthodox Alliance marches against the Heavenly Demon Sect. The Beggar Sect's intelligence network has collapsed under the weight of conflicting loyalties. Mount Hua burns. The Tang Clan's hidden weapons have been unleashed. The Emperor's generals defect to whichever side offers survival. There is no neutrality now. There is no peace. There is only war — and the death it brings."
 murim_calamity.0019.a:0 "Fight for our clan until the bitter end."
 murim_calamity.0019.b:0 "Protect the innocent. That is our duty."
 murim_calamity.0019.c:0 "Flee to the mountains. Survival above all."

 murim_calamity.0020.t:0 "Calamity Combat"
 murim_calamity.0020.desc:0 "The Great War rages on. Through smoke and blood and the screams of the dying, an enemy warrior emerges from the chaos. There is no time for words. No time for mercy. Only the strongest will see tomorrow."
 murim_calamity.0020.a:0 "Fight!"
 murim_calamity.0020.victory:0 "Your blade finds its mark."
 murim_calamity.0020.defeat:0 "The enemy's technique overwhelms you."

 murim_calamity.0021.t:0 "Death Comes"
 murim_calamity.0021.desc:0 "The war has found you. Surrounded by the fallen, bleeding from wounds you can no longer count, you face the end. The smoke burns your eyes. The screams have faded to a ringing silence. This is it. The Great Calamity claims another soul."
 murim_calamity.0021.a:0 "Face death with my blade drawn."
 murim_calamity.0021.b:0 "Try to escape — crawl if you must."

 murim_calamity.0022.t:0 "The War Reaches the Common People"
 murim_calamity.0022.desc:0 "The martial artists' war has spilled beyond the sects and into your lands. Villages burn. Refugees flood the roads. Your soldiers are no match for cultivators who can shatter walls with their bare hands. The old order is collapsing, and you are caught in the wreckage."
 murim_calamity.0022.a:0 "Barricade the castle. Hold the line."
 murim_calamity.0022.b:0 "Abandon everything and flee."

 murim_calamity.0023.t:0 "Emergency Succession"
 murim_calamity.0023.desc:0 "The leader of your clan has fallen in the Great War. The elders are dead. The headquarters is ash. And somehow, impossibly, you are the one still standing. The remnants of your clan look to you with desperate eyes. You are not ready for this. No one could be ready for this."
 murim_calamity.0023.a:0 "I will carry this burden. For them."
 murim_calamity.0023.b:0 "The clan is already dead. We are just ghosts."

 murim_calamity.0024.t:0 "A Clan Falls Forever"
 murim_calamity.0024.desc:0 "The news spreads through the surviving martial artists like poison. An entire clan — their techniques, their history, their bloodlines, their legacy — is gone. Extinct. The last member has fallen, and with them, centuries of accumulated knowledge vanish from the world forever. Some techniques will never be performed again. Some stories will never be told. The Murim world is diminished."
 murim_calamity.0024.a:0 "Mourn them. Remember their names."
 murim_calamity.0024.b:0 "Their techniques must be preserved somehow!"

 murim_calamity.0025.t:0 "The Emperor Under Siege"
 murim_calamity.0025.desc:0 "The imperial palace burns. The Emperor's personal guard — martial artists sworn to the throne — have been overwhelmed. The great jade gates lie shattered. Inside, the Son of Heaven faces the impossible: the martial world he sought to control has consumed itself, and now it has come for him. The Dragon Throne cracks."
 murim_calamity.0025.a:0 "Defend the throne to the last breath!"
 murim_calamity.0025.b:0 "Abdicate. Flee. Live to rebuild."
 murim_calamity.0025.c:0 "Negotiate with the attackers."

 murim_calamity.0026.t:0 "War-Forged Breakthrough"
 murim_calamity.0026.desc:0 "In the crucible of the Great War, surrounded by death and destruction, something breaks inside you — and something new is born. The boundary between life and death, between victory and defeat, becomes a door. You step through it. Your cultivation advances in a single, violent instant, forged in blood and desperation."
 murim_calamity.0026.a:0 "Embrace this power born of war."
 murim_calamity.0026.b:0 "This power is tainted with blood. I reject it."

 # --- PHASE 3: THE SILENCE ---
 murim_calamity.0030.t:0 "The Silence"
 murim_calamity.0030.desc:0 "It is over. Not because someone won — because there is no one left to fight. The battlefields are graveyards. The sect headquarters are ruins. The rivers run red for miles. And then, slowly, a silence falls over the world. Not peace. Not calm. Emptiness. The Murim world that existed for centuries is gone. Erased. As if the heavens themselves reached down and wiped the slate clean."
 murim_calamity.0030.a:0 "Close your eyes. Accept the end."
 murim_calamity.0030.b:0 "NO. One last desperate fight for survival!"

 murim_calamity.0031.t:0 "You Survived"
 murim_calamity.0031.desc:0 "You open your eyes. The world is grey. Ash covers everything — the trees, the roads, the bodies. The silence is absolute. No birdsong. No wind. No voices. You are alive. You should not be, but you are. Slowly, painfully, you stand. You are the bearer of ashes now. Everything that was — the techniques, the rivalries, the glory, the shame — lives only in you. The question is: what will you do with it?"
 murim_calamity.0031.a:0 "Carry the legacy forward. Rebuild."
 murim_calamity.0031.b:0 "The old world deserved to burn."

 # --- PHASE 4: THE RENEWAL ---
 murim_calamity.0040.t:0 "The Renewal"
 murim_calamity.0040.desc:0 "Months have passed since the Silence. Green things grow again. Water runs clear. Survivors emerge from mountain caves, from hidden valleys, from the ruins of fallen sects. They find each other — scarred, broken, but alive. The Murim world is dead. Long live the Murim world. A new era begins, built on the ashes of the old."
 murim_calamity.0040.a:0 "Rebuild our clan from the ashes."
 murim_calamity.0040.b:0 "Found a new sect. A new beginning."
 murim_calamity.0040.c:0 "Wander the land as a sage. Teach the next generation."

 murim_calamity.0041.t:0 "AI Rebuild Path"
 murim_calamity.0041.desc:0 "Survivor chooses rebuild path."
 murim_calamity.0041.a:0 "Begin rebuilding."

 murim_calamity.0042.t:0 "The Next Generation"
 murim_calamity.0042.desc:0 "In the quiet of the new world, life continues. A child is born — the first of a new generation that will never know the old Murim world except through stories. Will you raise them in the martial ways? Will you teach them the techniques that nearly destroyed everything? Or will you let them find their own path in this strange, empty, beautiful world?"
 murim_calamity.0042.a:0 "Train them in the old ways. The legacy must continue."
 murim_calamity.0042.b:0 "Let them find their own path."
 murim_calamity.0042.c:0 "The old ways died with the old world."

 # ========================================
 # CALAMITY TRAIT DESCRIPTIONS
 # ========================================
 trait_murim_fate_blessed:0 "Fate-Blessed"
 trait_murim_fate_blessed_desc:0 "The heavens have marked this soul for survival. When the Great Calamity comes, they will endure."
 trait_murim_fate_doomed:0 "Fate-Doomed"
 trait_murim_fate_doomed_desc:0 "The heavens have marked this soul for death. The Great Calamity will claim them."
 trait_murim_omen_seer:0 "Omen Seer"
 trait_murim_omen_seer_desc:0 "Possesses the rare ability to read the signs of heaven. Foresaw the Great Calamity before others."
 trait_murim_omen_denier:0 "Omen Denier"
 trait_murim_omen_denier_desc:0 "Refused to believe the warnings. Dismissed the omens as superstition until it was too late."
 trait_murim_heaven_touched:0 "Heaven-Touched"
 trait_murim_heaven_touched_desc:0 "Has been granted a vision by the heavens themselves. Carries the weight of knowing what is to come."
 trait_murim_calamity_survivor:0 "Calamity Survivor"
 trait_murim_calamity_survivor_desc:0 "Survived the Great Calamity — the apocalyptic war that destroyed the old Murim world. Carries the weight of all who fell."
 trait_murim_bearer_of_ashes:0 "Bearer of Ashes"
 trait_murim_bearer_of_ashes_desc:0 "Carries the legacy of the fallen world. The techniques, the memories, the grudges — all that remains of the old era lives in them."
 trait_murim_calamity_accelerator:0 "Calamity Accelerator"
 trait_murim_calamity_accelerator_desc:0 "Chose to hasten the Great Calamity rather than prevent it. Believed destruction was necessary for renewal."
 trait_murim_calamity_peacemaker:0 "Calamity Peacemaker"
 trait_murim_calamity_peacemaker_desc:0 "Tried to prevent the Great Calamity through diplomacy and unity. Failed, but the effort was noble."
 trait_murim_child_of_renewal:0 "Child of Renewal"
 trait_murim_child_of_renewal_desc:0 "Born after the Great Calamity. Has never known the old Murim world. Carries the hope of a new era."
 trait_murim_last_of_shaolin:0 "Last of Shaolin"
 trait_murim_last_of_shaolin_desc:0 "The final living member of the Shaolin Temple. All others perished in the Great Calamity. The Buddha Palm technique lives only in their hands."
 trait_murim_last_of_wudang:0 "Last of Wudang"
 trait_murim_last_of_wudang_desc:0 "The final living member of the Wudang Sword Sect. The Tai Chi Sword and Pure Yang Qi survive only through them."
 trait_murim_last_of_mount_hua:0 "Last of Mount Hua"
 trait_murim_last_of_mount_hua_desc:0 "The final living member of the Mount Hua Sect. The Plum Blossom Swordplay exists only in their muscle memory."
 trait_murim_last_of_beggar_sect:0 "Last of the Beggar Sect"
 trait_murim_last_of_beggar_sect_desc:0 "The final living member of the Beggar Sect. The Eighteen Dragon Subduing Palms and the intelligence network are gone. Only the Dog Beating Staff remains."
 trait_murim_last_of_iron_fist:0 "Last of Iron Fist Gate"
 trait_murim_last_of_iron_fist_desc:0 "The final living member of Iron Fist Gate. The Iron Body Art and Vajra Fist survive only through their scarred flesh."
 trait_murim_last_of_tang:0 "Last of the Tang Clan"
 trait_murim_last_of_tang_desc:0 "The final living member of the Tang Clan. The hidden weapon techniques and poison formulas are locked in their memory alone."
 trait_murim_last_of_heavenly_demon:0 "Last of the Heavenly Demon Sect"
 trait_murim_last_of_heavenly_demon_desc:0 "The final living member of the Heavenly Demon Sect. The Dark Qi cultivation and forbidden arts survive only through them."
 trait_murim_last_of_poison_flower:0 "Last of Poison Flower Palace"
 trait_murim_last_of_poison_flower_desc:0 "The final living member of Poison Flower Palace. The Thousand Poison Hand and Bewitching Arts exist only in their knowledge."
 trait_murim_last_of_phantom_blade:0 "Last of the Phantom Blade Sect"
 trait_murim_last_of_phantom_blade_desc:0 "The final living member of the Phantom Blade Sect. The Phantom Step and blade communion techniques survive only through them."

