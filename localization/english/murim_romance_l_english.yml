l_english:
 # ============================================================
 # ROMANCE EVENT LOCALIZATION
 # ============================================================

 # Event 1: Dual Cultivation Proposal
 murim_romance.0001.t:0 "Dual Cultivation Proposal"
 murim_romance.0001.desc:0 "A fellow cultivator with complementary qi approaches you with an intriguing proposition. They believe that by harmonizing your energies through dual cultivation, both of you could achieve breakthroughs that would take years of solo practice.\n\nTheir eyes hold sincerity -- and perhaps something more. The qi between you resonates like two halves of a whole."
 murim_romance.0001.a:0 "Let us cultivate together... and see where the dao leads."
 murim_romance.0001.b:0 "I appreciate the offer, but I walk the dao alone."
 murim_romance.0001.c:0 "[Deceitful] Agree... but study their technique for myself."
 murim_romance.0001.c.success:0 "Your deception succeeds -- you memorize their cultivation insights while they are vulnerable."
 murim_romance.0001.c.failure:0 "They sense your treachery! Their qi lashes out in fury."

 # Event 2: Forbidden Love - Rival Sect Romance
 murim_romance.0002.t:0 "Forbidden Love"
 murim_romance.0002.desc:0 "Fate is cruel. Of all the cultivators in the martial world, your heart has chosen one from a rival sect -- one your elders call enemy. Secret meetings under moonlight, stolen glances across tournament grounds... but such love cannot stay hidden forever.\n\nThe jianghu has eyes everywhere. Every moment together risks everything you have built."
 murim_romance.0002.a:0 "Love is stronger than sect politics. I will find a way."
 murim_romance.0002.b:0 "My sect comes first. I must bury these feelings."
 murim_romance.0002.c:0 "[Deceitful] Use this romance to infiltrate their sect."

 # Event 3: Dual Cultivation Deepens
 murim_romance.0003.t:0 "Soulmate Resonance"
 murim_romance.0003.desc:0 "Months of dual cultivation have brought you closer than you ever imagined. Your qi flows in perfect harmony, your thoughts align, your hearts beat as one. This is no mere romance -- it is a spiritual bond that transcends mortal love.\n\nYou stand at a crossroads: deepen this bond into a true soulmate connection, or pull back before you lose yourself entirely."
 murim_romance.0003.a:0 "Our souls are meant to be one. Form the Soulmate Bond."
 murim_romance.0003.b:0 "I cherish what we have, but I must walk my own path."

 # Event 4: Marriage Duel Challenge
 murim_romance.0004.t:0 "Marriage Duel!"
 murim_romance.0004.desc:0 "A powerful martial artist has arrived at your doorstep with a bold challenge: a formal marriage duel for the hand of your beloved! In the murim world, such challenges carry the weight of tradition.\n\nRefusal means dishonor. Acceptance means risking your life. Your beloved watches with anxious eyes."
 murim_romance.0004.a:0 "I accept! No one takes my beloved without facing my blade!"
 murim_romance.0004.a.victory:0 "Your blade strikes true! The challenger falls, defeated. Your beloved rushes to your side."
 murim_romance.0004.a.defeat:0 "The challenger's technique overwhelms you. You fall to your knees, wounded and humiliated."
 murim_romance.0004.b:0 "Let us resolve this through negotiation, not bloodshed."
 murim_romance.0004.c:0 "Forget honor -- we flee together tonight!"

 # Event 5: Romantic Rival Confrontation
 murim_romance.0005.t:0 "Romantic Rival"
 murim_romance.0005.desc:0 "Another cultivator has made their intentions toward your beloved painfully clear. They mock you openly, claiming you are unworthy. Their cultivation is formidable, and they clearly seek to provoke you into a fight.\n\nYour beloved looks between you both with concern."
 murim_romance.0005.a:0 "You dare?! Draw your weapon!"
 murim_romance.0005.a.win:0 "Your righteous fury empowers your strikes. The rival staggers back, defeated."
 murim_romance.0005.a.lose:0 "The rival's technique is superior. You taste dirt and shame."
 murim_romance.0005.b:0 "Let us settle this in the tournament arena, publicly."
 murim_romance.0005.c:0 "I have nothing to prove. Let my beloved choose freely."

 # Event 6: Sect Demands You Choose
 murim_romance.0006.t:0 "Love or Loyalty?"
 murim_romance.0006.desc:0 "Your forbidden romance has been discovered. The sect elders stand before you, their faces carved from stone. The verdict is clear: abandon your lover, or abandon your sect.\n\nYour beloved waits outside, unaware of the storm about to break. There is no middle ground."
 murim_romance.0006.a:0 "I choose love. The sect can find another disciple."
 murim_romance.0006.b:0 "I choose the sect. Forgive me... my love."
 murim_romance.0006.c:0 "[Brave] I choose NEITHER! We fight our way out!"
 murim_romance.0006.c.result:0 "Steel clashes against steel as you and your beloved fight through the sect guards."

 # Event 7: Kidnapping of Beloved
 murim_romance.0007.t:0 "Beloved Kidnapped!"
 murim_romance.0007.desc:0 "Your worst nightmare has come true. A villain from the jianghu underworld has taken your beloved captive! A blood-stained letter demands your surrender -- or your beloved pays the price.\n\nRage and fear war within you. Every moment of hesitation is a moment of suffering for the one you love."
 murim_romance.0007.a:0 "I storm their stronghold alone! Love gives me strength!"
 murim_romance.0007.a.victory:0 "With unstoppable fury, you tear through the villain's defenses. Your beloved is freed!"
 murim_romance.0007.a.defeat:0 "The villain's trap closes around you. You fall, bloodied and broken."
 murim_romance.0007.b:0 "Gather allies first. A coordinated rescue has better odds."
 murim_romance.0007.b.success:0 "Your allies breach the stronghold from multiple angles. The rescue succeeds!"
 murim_romance.0007.b.partial:0 "The rescue succeeds, but not without casualties and wounds."
 murim_romance.0007.c:0 "Pay the ransom. Their life is worth any price."

 # Event 8: Cultivation Partner Betrayal
 murim_romance.0008.t:0 "Betrayed by Love"
 murim_romance.0008.desc:0 "You awaken to find your cultivation partner gone -- along with the secret technique manual you shared during your most intimate dual cultivation sessions. The bed is cold, the manual missing, and your heart shattered.\n\nThey used your love as a weapon. The technique you spent decades perfecting is now in their hands."
 murim_romance.0008.a:0 "They will pay for this betrayal with blood!"
 murim_romance.0008.a.victory:0 "Your fury is righteous. The betrayer cannot withstand your wrath."
 murim_romance.0008.a.defeat:0 "They turn your own technique against you. The irony cuts deeper than any blade."
 murim_romance.0008.b:0 "Train in solitude. Develop a counter-technique through bitter resolve."
 murim_romance.0008.c:0 "Forgive and release. True strength lies in letting go."

 # Event 9: Joint Cultivation Breakthrough
 murim_romance.0009.t:0 "Harmonized Breakthrough!"
 murim_romance.0009.desc:0 "As you and your soulmate meditate together, your combined qi begins to spiral upward in a magnificent double helix. The energy of heaven and earth flows through you both simultaneously.\n\nThis is the legendary Dual Breakthrough -- a feat so rare that the martial world speaks of it in hushed reverence. Your power surges beyond all limits!"
 murim_romance.0009.a:0 "Push through together! Break all limits!"
 murim_romance.0009.b:0 "Slow and steady. Stabilize before ascending further."

 # Event 10: Love Triangle
 murim_romance.0010.t:0 "Heart of the Storm"
 murim_romance.0010.desc:0 "Two cultivators of considerable power have declared their affections for you. One is bold and passionate, a warrior who would carve their name across the heavens. The other is gentle and wise, a healer whose cultivation brings peace wherever they go.\n\nBoth are sincere. Both are powerful. The jianghu watches to see who you will choose."
 murim_romance.0010.a:0 "I choose the bold warrior. Passion fuels the dao!"
 murim_romance.0010.b:0 "I choose the gentle cultivator. Harmony is the true path."
 murim_romance.0010.c:0 "I reject them both. The cultivation path is mine alone."
 murim_romance.0010.d:0 "Let them duel for my hand! The strongest shall be my partner."
 murim_romance.0010.d.one_wins:0 "The bold warrior's blade sings through the air! Victory!"
 murim_romance.0010.d.two_wins:0 "The gentle cultivator's patience proves stronger! Victory!"

