 murim_rank_stay_humble_tt:0 "Stay humble and focus on training. Gain a focused training modifier."
 murim_rank_political_leverage_tt:0 "Use your martial rank for political influence. Gain a political modifier."
 murim_rank_swear_reclaim_tt:0 "Swear an oath to reclaim your ranking position. Gain a determination modifier."
 murim_rank_accept_gracefully_tt:0 "Accept your fall from the rankings with grace and dignity."
 murim_rank_become_bitter_tt:0 "Become bitter about losing your rank. Risk gaining negative traits."
 murim_rank_honor_fallen_tt:0 "Pay respects to the fallen ranked fighter."
 murim_rank_seize_opportunity_tt:0 "See the death of a ranked fighter as an opportunity to advance."
 murim_rank_supreme_declaration_tt:0 "Declare yourself the supreme martial artist before the entire realm."
 murim_rank_lonely_summit_tt:0 "Reflect on the loneliness of standing at the very top."
 murim_rank_accept_challenge_tt:0 "Accept the ranking challenge and fight for your position."
 murim_rank_decline_challenge_tt:0 "Decline the challenge. You will lose prestige and face."
 murim_rank_yearly_acknowledge_tt:0 "Acknowledge your current ranking position."
 murim_rank_yearly_train_tt:0 "Resolve to train harder to improve your ranking."
 murim_rank_newcomer_interesting_tt:0 "Take note of this emerging talent."
 murim_rank_challenge_newcomer_tt:0 "Challenge this newcomer to test their mettle."
 murim_rank_recruit_newcomer_tt:0 "Attempt to recruit this promising fighter."

 # ---------------------
 # NOTIFICATIONS
 # ---------------------
 murim_rank_new_entry_notification:0 "New Ranked Fighter"
 murim_rank_new_entry_notification_desc:0 "A fighter in your realm has entered the Top 50 martial rankings."
 murim_rank_new_number_one_notification:0 "New Supreme Martial Artist!"
 murim_rank_new_number_one_notification_desc:0 "A new Number One has been declared in the martial rankings!"

 # ---------------------
 # DUEL RESULT DESCRIPTIONS
 # ---------------------
 murim_rank_challenge_win_desc:0 "Your martial arts prove superior! The challenger staggers back, defeated, as the crowd roars."
