l_english:
 murim_training_exp.0001.t: "Midnight Training Regime"
 murim_training_exp.0001.desc: "The moon hangs low as you stand in the empty courtyard, the silence broken only by the whisper of wind through bamboo. Your muscles ache for the test of darkness — to train when the senses are stripped bare, when only instinct and qi can guide your strikes."
 murim_training_exp.0001.a: "Train through the night — push my limits"
 murim_training_exp.0001.b: "Pace myself with steady practice"
 murim_training_exp.0001.c: "Rest instead — my body needs recovery"
 murim_training_exp.0002.t: "Weighted Clothing Training"
 murim_training_exp.0002.desc: "Iron chains and lead-lined robes sit before you, instruments of body tempering passed down through generations. The weight will grind your muscles and bones into something harder, faster — or shatter them entirely. Many who attempted this training never walked the same again."
 murim_training_exp.0002.a: "Wear the full iron weights for months"
 murim_training_exp.0002.b: "Use lighter weights — a balanced approach"
 murim_training_exp.0002.c: "Decline — the risk is not worth it"
 murim_training_exp.0003.t: "Poison Resistance Training"
 murim_training_exp.0003.desc: "A row of small vials glimmers on the table, each containing a carefully measured dose of deadly toxin. The ancient method of the Gu poison masters demands you ingest them over weeks, building an immunity that could one day save your life — or end it prematurely."
 murim_training_exp.0003.a: "Ingest small doses to build immunity"
 murim_training_exp.0003.b: "Study poison theory without ingesting"
 murim_training_exp.0003.c: "Avoid poison entirely"
 murim_training_exp.0004.t: "Blindfolded Combat Training"
 murim_training_exp.0004.desc: "Your sparring partner [blindfold_sparring_partner.GetFirstName] waits across the training hall, blindfold already tied. The premise is simple: fight without sight, learn to sense qi directly. The bruises will be real, but the insight gained could elevate your combat awareness beyond mortal limits."
 murim_training_exp.0004.a: "Accept the blindfolded challenge"
 murim_training_exp.0004.b: "Practice blindfolded forms alone"
 murim_training_exp.0004.c: "Decline the unusual training"
 murim_training_exp.0005.t: "Mountain Endurance Run"
 murim_training_exp.0005.desc: "The mountain trail stretches upward into mist and stone, a punishing ascent that has broken the spirit of countless disciples. Boulders await to be carried, cliffs demand to be scaled. Those who conquer the peak return with legs of iron and lungs that never tire."
 murim_training_exp.0005.a: "Sprint up carrying boulders"
 murim_training_exp.0005.b: "Steady jog at moderate pace"
 murim_training_exp.0005.c: "Skip it today"
 murim_training_exp.0006.t: "Qi Channeling Drill"
 murim_training_exp.0006.desc: "You settle into the lotus position and turn your awareness inward. The meridian pathways hum with energy, some flowing freely, others still blocked or sluggish. A focused drill could accelerate your cultivation — but forcing qi through unprepared channels risks a devastating deviation."
 murim_training_exp.0006.a: "Intensive qi circulation through all meridians"
 murim_training_exp.0006.b: "Gentle circulation with meditation focus"
 murim_training_exp.0006.c: "Skip the drill"
 murim_training_exp.0007.t: "Weapon Forging Training"
 murim_training_exp.0007.desc: "The forge fire roars as a master weaponsmith gestures toward ingots of star iron and cloud steel. To forge your own weapon is to pour your spirit into the metal, to create an extension of your martial will. The process demands gold, sweat, and a steady hand — but the result could be legendary."
 murim_training_exp.0007.a: "Forge a personal weapon with qi-infused metal"
 murim_training_exp.0007.b: "Study weapon design theory instead"
 murim_training_exp.0007.c: "Not interested in forging"
 murim_training_exp.0008.t: "Partner Meditation Training"
 murim_training_exp.0008.desc: "You and [meditation_partner.GetFirstName] sit facing each other, palms almost touching, the air between you shimmering with the mingled currents of your qi. Dual meditation can harmonize energy flows and deepen cultivation — but if your frequencies clash, both will suffer the backlash."
 murim_training_exp.0008.a: "Deep partner meditation — synchronize qi"
 murim_training_exp.0008.b: "Meditate nearby but independently"
 murim_training_exp.0008.c: "Decline partner meditation"
