l_english:
 # ===========================
 # DEMONIC INVASION LOCALIZATION
 # ===========================
 murim_demonic_invasion.0001.t: "The Demonic Breach"
 murim_demonic_invasion.0001.desc: "The barrier between the mortal realm and the demon realm tears open. Dark qi pours through the breach like a river of shadow, corrupting everything it touches. The martial world has never faced a threat like this — orthodox and unorthodox must unite or perish separately."
 murim_demonic_invasion.0001.a: "Rally all sects — we must unite!"
 murim_demonic_invasion.0001.b: "Fight them alone — glory awaits"
 murim_demonic_invasion.0001.c: "Flee to safety"

 murim_demonic_invasion.0010.t: "The United Front"
 murim_demonic_invasion.0010.desc: "For the first time in living memory, orthodox and unorthodox cultivators fight side by side. Shaolin monks guard the flanks of Heavenly Demon disciples. Wudang Taoists channel qi alongside Phantom Blade assassins. The demons must be pushed back."
 murim_demonic_invasion.0010.a: "Lead the combined assault"
 murim_demonic_invasion.0010.b: "Hold the defensive line"
 murim_demonic_invasion.0010.c: "Protect the civilians"

 murim_demonic_invasion.0020.t: "Solo Combat — Demon Lord"
 murim_demonic_invasion.0020.desc: "A Demon Lord has emerged from the breach. Its power dwarfs any mortal cultivator's. Someone must face it alone to buy time for the others to seal the breach. This is likely a one-way journey."
 murim_demonic_invasion.0020.a: "I will face the Demon Lord"
 murim_demonic_invasion.0020.b: "Coordinate a group attack instead"
 murim_demonic_invasion.0020.c: "Use forbidden techniques to match its power"

 murim_demonic_invasion.0030.t: "Corruption Spreads"
 murim_demonic_invasion.0030.desc: "The demonic qi from the breach is seeping into the land. Cultivators near the breach find their meridians tainted, their techniques warping. Some embrace the corruption for power; others desperately try to purge it."
 murim_demonic_invasion.0030.a: "Attempt to purge the corruption"
 murim_demonic_invasion.0030.b: "Absorb the demonic qi — power at any cost"
 murim_demonic_invasion.0030.c: "Retreat from the corrupted zone"

 # ===========================
 # CALAMITY ESCALATION LOCALIZATION
 # ===========================
 murim_calamity_escalation.0001.t: "Mysterious Deaths"
 murim_calamity_escalation.0001.desc: "Cultivators are dying in their sleep, their meridians shattered from within. No external wounds, no trace of poison. The deaths follow no pattern — young and old, orthodox and unorthodox. Something is very wrong in the martial world."
 murim_calamity_escalation.0001.a: "Investigate the deaths"
 murim_calamity_escalation.0001.b: "Warn the sects"
 murim_calamity_escalation.0001.c: "Ignore it — not your problem"

 murim_calamity_escalation.0010.t: "Sect Raids Begin"
 murim_calamity_escalation.0010.desc: "Unknown forces are raiding sect compounds under cover of night. Technique scrolls are stolen, elders assassinated, disciples kidnapped. The raids seem coordinated, but no one claims responsibility."
 murim_calamity_escalation.0010.a: "Fortify your sect's defenses"
 murim_calamity_escalation.0010.b: "Hunt the raiders"
 murim_calamity_escalation.0010.c: "Use the chaos to raid a rival"

 murim_calamity_escalation.0020.t: "Faction Tensions Ignite"
 murim_calamity_escalation.0020.desc: "Orthodox sects blame the unorthodox for the raids. Unorthodox sects accuse the orthodox of using the crisis as a power grab. Accusations fly, alliances crack, and the martial world polarizes."
 murim_calamity_escalation.0020.a: "Mediate between factions"
 murim_calamity_escalation.0020.b: "Fan the flames — war profits the bold"
 murim_calamity_escalation.0020.c: "Focus on finding the real threat"

 murim_calamity_escalation.0030.t: "The Threshold is Crossed"
 murim_calamity_escalation.0030.desc: "The signs are unmistakable. The ancient prophecies warned of this: when the sky turns blood-red and qi currents reverse their flow, the Great Calamity has begun. There is no stopping it now — only surviving it."
 murim_calamity_escalation.0030.a: "Prepare for the worst"
 murim_calamity_escalation.0030.b: "Gather allies while you still can"
 murim_calamity_escalation.0030.c: "Seek ancient knowledge of past calamities"

 # ===========================
 # REFUGEE MECHANICS LOCALIZATION
 # ===========================
 murim_calamity_refugee.0001.t: "Refugees at the Gate"
 murim_calamity_refugee.0001.desc: "Hundreds of displaced cultivators and civilians stream toward your territory. Their sects destroyed, their homes consumed by the calamity. They beg for shelter, food, and protection."
 murim_calamity_refugee.0001.a: "Welcome them — shelter all who come"
 murim_calamity_refugee.0001.b: "Accept only cultivators — we need fighters"
 murim_calamity_refugee.0001.c: "Turn them away — we can barely feed ourselves"

 murim_calamity_refugee.0010.t: "A Clanless Wanderer"
 murim_calamity_refugee.0010.desc: "Among the refugees, one stands out. A powerful cultivator with no clan affiliation. Their techniques are unusual, their origins mysterious. They could be a great asset — or a terrible threat."
 murim_calamity_refugee.0010.a: "Recruit them into your sect"
 murim_calamity_refugee.0010.b: "Observe them carefully first"
 murim_calamity_refugee.0010.c: "Drive them out — too dangerous"

 murim_calamity_refugee.0020.t: "Finding a New Home"
 murim_calamity_refugee.0020.desc: "Your sect was destroyed in the calamity. You wander the martial world as a refugee, seeking a new home. Several sects are willing to take you in — but each comes with strings attached."
 murim_calamity_refugee.0020.a: "Join an orthodox sect — stability"
 murim_calamity_refugee.0020.b: "Join an unorthodox sect — freedom"
 murim_calamity_refugee.0020.c: "Found a new sect from the ashes"

 murim_calamity_refugee.0030.t: "Power Vacuum"
 murim_calamity_refugee.0030.desc: "A major sect has been annihilated by the calamity. Their territory, techniques, and remaining disciples are up for grabs. It's a brutal opportunity — seize it, or someone else will."
 murim_calamity_refugee.0030.a: "Claim the territory for your sect"
 murim_calamity_refugee.0030.b: "Rescue the survivors — honor above power"
 murim_calamity_refugee.0030.c: "Raid the ruins for techniques"

 # ===========================
 # CALAMITY EXPANSION MODIFIERS
 # ===========================
 murim_demon_invasion_rally_desc: "Fighting alongside all martial artists against the demonic invasion. Orthodox and unorthodox united."
 murim_demon_slayer_desc: "Recognized demon slayer. Your name is spoken with reverence across the martial world."
 murim_refugee_shelter_desc: "Your generosity toward calamity refugees has earned deep loyalty and respect."
 murim_calamity_survivor_desc: "You survived the Great Calamity. The scars remain — physical and spiritual."
 murim_demonic_corruption_spread_desc: "Demonic qi is spreading through your meridians, warping your cultivation."
 murim_calamity_escalation_tension_desc: "The rising threat of calamity weighs on every cultivator's mind."
 murim_power_vacuum_opportunist_desc: "You seized opportunities left by the calamity's destruction. Effective, but morally questionable."

