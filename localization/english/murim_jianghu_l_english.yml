l_english:

 # ==========================================
 # MURIM CHRONICLES - PHASE 4 JIANGHU LOCALIZATION
 # Underground, Imperial Cultivator, Wulin Alliance
 # ==========================================

 # ---------------------
 # JIANGHU TRAITS
 # ---------------------
 trait_shadow_broker:0 "Shadow Broker"
 trait_shadow_broker_desc:0 "This individual commands a vast network of informants, black market contacts, and hidden safehouses. They trade in secrets the way merchants trade in silk."
 trait_sect_spy:0 "Sect Spy"
 trait_sect_spy_desc:0 "Trained in deception and infiltration, this agent has embedded themselves within a rival sect, feeding intelligence back to their true masters."
 trait_jianghu_enforcer:0 "Jianghu Enforcer"
 trait_jianghu_enforcer_desc:0 "The iron fist of the underground. When debts go unpaid and oaths are broken, the enforcer collects -- with interest."
 trait_wulin_alliance_member:0 "Wulin Alliance Member"
 trait_wulin_alliance_member_desc:0 "A sworn member of the Wulin Alliance, the loose confederation of orthodox sects that maintains order in the martial world."
 trait_black_market_dealer:0 "Black Market Dealer"
 trait_black_market_dealer_desc:0 "Forbidden pills, stolen techniques, cursed weapons -- all available for the right price. This dealer moves goods that no legitimate merchant would touch."
 trait_forbidden_text_smuggler:0 "Forbidden Text Smuggler"
 trait_forbidden_text_smuggler_desc:0 "Ancient scrolls sealed by imperial decree, demonic cultivation manuals, lost sect archives -- this smuggler ensures forbidden knowledge survives."
 trait_underground_fighter:0 "Underground Fighter"
 trait_underground_fighter_desc:0 "A veteran of the blood pits and hidden arenas where cultivators fight without rules, honor, or mercy."
 trait_information_broker:0 "Information Broker"
 trait_information_broker_desc:0 "Knowledge is the most dangerous weapon. This broker knows who betrayed whom, which sect is weakening, and where the ancient tombs lie."
 trait_protection_racketeer:0 "Protection Racketeer"
 trait_protection_racketeer_desc:0 "Pay for protection or face the consequences. This cultivator has built an empire of fear among the common folk and lesser practitioners."
 trait_underground_alchemist:0 "Underground Alchemist"
 trait_underground_alchemist_desc:0 "Refining forbidden pills, brewing qi-enhancing elixirs from banned ingredients, and selling potency beyond what orthodox alchemists dare create."
 trait_puppet_master:0 "Puppet Master"
 trait_puppet_master_desc:0 "Through blackmail, bribery, and soul-binding oaths, this cultivator controls officials, merchants, and even rival sect leaders from the shadows."
 trait_bounty_hunter:0 "Bounty Hunter"
 trait_bounty_hunter_desc:0 "For the right price, this tracker will find anyone -- rogue cultivators, escaped prisoners, or sect traitors who thought they could disappear."
 trait_treasure_seeker:0 "Treasure Seeker"
 trait_treasure_seeker_desc:0 "Driven by legends of ancient inheritance grounds, hidden cave dwellings of long-dead immortals, and artifacts of immeasurable power."
 trait_poison_master:0 "Poison Master"
 trait_poison_master_desc:0 "A master of the Ten Thousand Poisons art. Their touch can corrode meridians, their breath can paralyze, and their smile means someone is already dying."
 trait_body_double:0 "Body Double"
 trait_body_double_desc:0 "Through face-changing techniques and qi manipulation, this individual impersonates powerful figures for purposes of espionage and deception."
 trait_oath_breaker:0 "Oath Breaker"
 trait_oath_breaker_desc:0 "Having broken the most sacred vows of the martial world, this person is hunted by all righteous sects and trusted by none."
 trait_jianghu_veteran:0 "Jianghu Veteran"
 trait_jianghu_veteran_desc:0 "Decades of navigating the treacherous currents of the martial underworld have forged an unshakeable survivor."
 trait_hidden_identity:0 "Hidden Identity"
 trait_hidden_identity_desc:0 "This person's true identity is concealed behind layers of false names, disguises, and misdirection. Even their closest allies may not know who they truly are."
 trait_imperial_cultivator_hunter:0 "Imperial Cultivator Hunter"
 trait_imperial_cultivator_hunter_desc:0 "Appointed by the throne to track down and neutralize cultivators who threaten imperial stability."
 trait_court_cultivator:0 "Court Cultivator"
 trait_court_cultivator_desc:0 "Officially recognized by the imperial court, this cultivator serves the dynasty in exchange for resources, protection, and political influence."
 trait_rogue_cultivator:0 "Rogue Cultivator"
 trait_rogue_cultivator_desc:0 "Beholden to no sect, no alliance, no emperor. A lone wolf walking their own path through the martial world."

 # ---------------------
 # JIANGHU DECISIONS
 # ---------------------
 murim_establish_underground_network_decision:0 "Establish Underground Network"
 murim_establish_underground_network_decision_desc:0 "Lay the foundations of a shadow network spanning multiple provinces. Informants, safehouses, and dead drops will extend your reach far beyond what any sect can see."
 murim_establish_underground_network_decision_tooltip:0 "Begin building your underground empire."
 murim_rig_imperial_examination_decision:0 "Rig the Imperial Examination"
 murim_rig_imperial_examination_decision_desc:0 "Place your agents among the examination candidates. With the right bribes and switched papers, you can ensure your people rise to official positions."
 murim_rig_imperial_examination_decision_tooltip:0 "Install your agents as imperial officials."
 murim_install_puppet_governor_decision:0 "Install Puppet Governor"
 murim_install_puppet_governor_decision_desc:0 "Through blackmail, debt, or soul-binding oath, place a governor under your complete control. The province will serve your interests while appearing loyal to the throne."
 murim_install_puppet_governor_decision_tooltip:0 "Seize hidden control of a province."
 murim_seize_trade_route_decision:0 "Seize Trade Route"
 murim_seize_trade_route_decision_desc:0 "Eliminate the current controllers and install your enforcers along a major trade route. Tolls, smuggling fees, and 'protection' payments will flow directly to you."
 murim_seize_trade_route_decision_tooltip:0 "Take control of a profitable trade route."
 murim_call_wulin_assembly_decision:0 "Call Wulin Assembly"
 murim_call_wulin_assembly_decision_desc:0 "Summon the leaders of all major sects to a grand assembly. Alliance pacts, grievances, and challenges will be resolved -- or erupt into open war."
 murim_call_wulin_assembly_decision_tooltip:0 "Convene the martial world's leaders."
 murim_launch_underground_tournament_decision:0 "Launch Underground Tournament"
 murim_launch_underground_tournament_decision_desc:0 "Host a secret tournament where cultivators fight without sect restrictions. The winner claims a legendary technique scroll. The losers may not leave alive."
 murim_launch_underground_tournament_decision_tooltip:0 "Host a deadly secret fighting tournament."
 murim_issue_bounty_decision:0 "Issue Bounty"
 murim_issue_bounty_decision_desc:0 "Place a price on someone's head. Every bounty hunter, mercenary cultivator, and desperate rogue in the jianghu will come hunting."
 murim_issue_bounty_decision_tooltip:0 "Put a bounty on your enemy."
 murim_expose_corruption_decision:0 "Expose Corruption"
 murim_expose_corruption_decision_desc:0 "Reveal a rival's hidden crimes to the public. Puppet governors, rigged exams, assassination contracts -- let the world see what they truly are."
 murim_expose_corruption_decision_tooltip:0 "Publicly reveal a rival's dark secrets."
 murim_cultivator_underground_railroad_decision:0 "Establish Cultivator Underground Railroad"
 murim_cultivator_underground_railroad_decision_desc:0 "Create a network of safe passages and hidden sanctuaries for cultivators persecuted by the imperial cultivation ban."
 murim_cultivator_underground_railroad_decision_tooltip:0 "Shelter persecuted cultivators from imperial hunters."

 # ---------------------
 # JIANGHU INTERACTIONS
 # ---------------------
 murim_bribe_imperial_official_interaction:0 "Bribe Imperial Official"
 murim_bribe_imperial_official_interaction_desc:0 "Offer gold, favors, or forbidden pills to an imperial official in exchange for looking the other way."
 murim_plant_spy_in_sect_interaction:0 "Plant Spy in Rival Sect"
 murim_plant_spy_in_sect_interaction_desc:0 "Insert a loyal agent into a rival sect's inner circle to steal techniques and report on their movements."
 murim_rig_exam_for_agent_interaction:0 "Rig Examination for Agent"
 murim_rig_exam_for_agent_interaction_desc:0 "Ensure your agent passes the imperial examination and secures an official post."
 murim_hire_assassin_interaction:0 "Commission Assassination"
 murim_hire_assassin_interaction_desc:0 "Contract a shadow guild assassin to eliminate a target. Payment on completion. Silence guaranteed -- usually."
 murim_claim_territory_interaction:0 "Claim Underground Influence"
 murim_claim_territory_interaction_desc:0 "Extend your control over a district's underground operations. Other operators: submit or be removed."
 murim_extort_merchant_interaction:0 "Extort Merchant"
 murim_extort_merchant_interaction_desc:0 "Demand regular 'protection payments' from a wealthy merchant. Resistance will be... discouraged."
 murim_smuggle_forbidden_goods_interaction:0 "Smuggle Forbidden Goods"
 murim_smuggle_forbidden_goods_interaction_desc:0 "Move banned cultivation materials, forbidden texts, or cursed artifacts through your underground network."
 murim_recruit_to_underground_interaction:0 "Recruit to Underground"
 murim_recruit_to_underground_interaction_desc:0 "Offer a cultivator a place in your shadow network. Power, resources, and protection -- in exchange for loyalty."
 murim_blackmail_official_interaction:0 "Blackmail Official"
 murim_blackmail_official_interaction_desc:0 "You have evidence of their crimes. They can cooperate, or they can be exposed."
 murim_demand_sect_tribute_interaction:0 "Demand Sect Tribute"
 murim_demand_sect_tribute_interaction_desc:0 "As the dominant force in the region, demand resources from a lesser sect."
 murim_negotiate_trade_route_interaction:0 "Negotiate Trade Route Access"
 murim_negotiate_trade_route_interaction_desc:0 "Propose shared access to a controlled trade route. Profits split. Or war."
 murim_challenge_tournament_entry_interaction:0 "Challenge for Tournament Entry"
 murim_challenge_tournament_entry_interaction_desc:0 "Fight for the right to enter a prestigious underground tournament."
 murim_administer_poison_interaction:0 "Secretly Administer Poison"
 murim_administer_poison_interaction_desc:0 "Apply a slow-acting meridian poison to an unsuspecting target during a banquet or meeting."
 murim_forge_identity_interaction:0 "Forge Identity Documents"
 murim_forge_identity_interaction_desc:0 "Create false identity papers for yourself or an agent to infiltrate imperial institutions."
 murim_install_puppet_interaction:0 "Install as Puppet"
 murim_install_puppet_interaction_desc:0 "Through leverage and coercion, bind this person to serve your interests while maintaining their public position."
 murim_sabotage_sect_interaction:0 "Sabotage Rival Sect"
 murim_sabotage_sect_interaction_desc:0 "Poison their pill supply, corrupt their technique scrolls, or spread dissent among their disciples."
 murim_arrange_political_marriage_interaction:0 "Arrange Political Marriage"
 murim_arrange_political_marriage_interaction_desc:0 "Unite two families through marriage to seal an underground alliance."
 murim_infiltrate_sect_interaction:0 "Infiltrate Sect Leadership"
 murim_infiltrate_sect_interaction_desc:0 "Place yourself or an agent in a position of authority within a rival sect."
 murim_expose_agent_interaction:0 "Expose Hidden Agent"
 murim_expose_agent_interaction_desc:0 "Reveal a rival's spy embedded in your organization -- publicly, for maximum damage."
 murim_offer_sanctuary_interaction:0 "Offer Sanctuary"
 murim_offer_sanctuary_interaction_desc:0 "Provide shelter to a persecuted cultivator in exchange for future loyalty."
 murim_betray_alliance_interaction:0 "Betray Alliance"
 murim_betray_alliance_interaction_desc:0 "Secretly switch sides during a critical moment, devastating your former allies."
 murim_defect_from_sect_interaction:0 "Defect from Sect"
 murim_defect_from_sect_interaction_desc:0 "Abandon your current sect and join a rival, bringing stolen secrets as a gift."
 murim_challenge_for_wulin_seat_interaction:0 "Challenge for Wulin Alliance Seat"
 murim_challenge_for_wulin_seat_interaction_desc:0 "Issue a formal challenge for a leadership position within the Wulin Alliance."

 # ---------------------
 # IMPERIAL CULTIVATOR EVENTS
 # ---------------------
 murim_imperial_cultivator.0002.t:0 "Imperial Cultivator Corps Founded"
 murim_imperial_cultivator.0002.desc:0 "The Emperor has decreed the formation of an elite Imperial Cultivator Corps. Cultivators who swear loyalty to the throne will receive resources and protection. Those who refuse may find themselves hunted."
 murim_imperial_cultivator.0003.t:0 "Court Cultivator Exposed"
 murim_imperial_cultivator.0003.desc:0 "A respected court official has been revealed as a secret cultivator. The court erupts in scandal. Factions demand punishment while others argue for tolerance."
 murim_imperial_cultivator.0004.t:0 "Imperial Examination Fraud Discovered"
 murim_imperial_cultivator.0004.desc:0 "Investigators have uncovered evidence that cultivator agents manipulated the imperial examinations. Several new officials are suspected plants."
 murim_imperial_cultivator.0006.t:0 "Shadow Duel Decides the War"
 murim_imperial_cultivator.0006.desc:0 "Two legendary cultivators have agreed to settle a political conflict through single combat. The fate of armies and provinces hangs on a single fight."
 murim_imperial_cultivator.0007.t:0 "Imperial Cultivation Ban"
 murim_imperial_cultivator.0007.desc:0 "The Emperor has issued a decree banning all cultivation practice within imperial territory. Cultivators must disband their sects, destroy their techniques, and submit to imperial authority -- or be declared enemies of the state."
 murim_imperial_cultivator.0008.t:0 "Underground Railroad for Cultivators"
 murim_imperial_cultivator.0008.desc:0 "In response to the cultivation ban, a secret network has emerged to smuggle persecuted cultivators to safety. Hidden paths through mountains and forests connect a chain of safe houses."
 murim_imperial_cultivator.0009.t:0 "The Secret Cultivator Prince"
 murim_imperial_cultivator.0009.desc:0 "Shocking news: a member of the imperial family has been secretly cultivating. They have reached a formidable level of power. The court is torn between awe and terror."

 # ---------------------
 # BREAKTHROUGH EVENTS
 # ---------------------
 murim_breakthrough.0002.t:0 "The Tribulation Descends"
 murim_breakthrough.0002.desc:0 "Heaven's judgment arrives. Lightning splits the sky, spiritual pressure crushes down upon you, and your very soul is tested. This is the tribulation that separates those who ascend from those who fall."
 murim_breakthrough.0003.t:0 "Breakthrough Achieved!"
 murim_breakthrough.0003.desc:0 "The wall shatters. Qi floods through newly opened meridian channels like a river breaking through a dam. Your cultivation base stabilizes at a new realm. The world feels... smaller."
 murim_breakthrough.0004.t:0 "Qi Deviation!"
 murim_breakthrough.0004.desc:0 "Something goes wrong. Your qi reverses course, tearing through meridians like fire through paper. Pain beyond description wracks your body as your cultivation base destabilizes."
 murim_breakthrough.0005.t:0 "Bottleneck -- Stuck at the Threshold"
 murim_breakthrough.0005.desc:0 "Despite your best efforts, the wall holds firm. Your qi retreats, and the opportunity passes. You remain at your current realm, the breakthrough eluding you."
 murim_breakthrough.0006.t:0 "Rival Interrupts Breakthrough"
 murim_breakthrough.0006.desc:0 "At your most vulnerable moment -- mid-breakthrough, qi exposed and defenses down -- a rival cultivator strikes. They knew exactly when to attack."
 murim_breakthrough.0007.t:0 "Master Guides the Breakthrough"
 murim_breakthrough.0007.desc:0 "Your master places a hand on your back, channeling their own qi to stabilize yours. 'Focus. Let the energy flow naturally. I will guard your meridians.' With their guidance, the breakthrough becomes vastly safer."

 # ---------------------
 # SECT EVENTS
 # ---------------------
 murim_sect.0001.t:0 "Sect Recruitment Offer"
 murim_sect.0001.desc:0 "A senior disciple approaches with an invitation: their sect has observed your potential and wishes to offer formal membership. Training grounds, technique libraries, and the protection of the sect name -- all could be yours."
 murim_sect.0002.t:0 "Sect Initiation Trial"
 murim_sect.0002.desc:0 "Before you can be accepted, you must prove your worth. The sect elders have prepared a trial: survive three days in the Forbidden Mountain, or defeat five inner disciples in succession."
 murim_sect.0003.t:0 "Promoted to Inner Disciple"
 murim_sect.0003.desc:0 "Your contributions and cultivation progress have been recognized. The Sect Master personally announces your promotion to Inner Disciple -- granting access to restricted technique scrolls and the inner cultivation chambers."
 murim_sect.0004.t:0 "Sect Betrayal Discovered"
 murim_sect.0004.desc:0 "A spy has been uncovered within the sect. They've been feeding information to a rival organization for months. The Sect Master's fury is terrible to behold."
 murim_sect.0006.t:0 "Sect War Declared"
 murim_sect.0006.desc:0 "War drums sound across the mountain. Your sect has formally declared war against a rival. All disciples are called to arms. There will be blood."

 # ---------------------
 # DUEL EVENTS
 # ---------------------
 murim_duel.0001.t:0 "Formal Duel Challenge"
 murim_duel.0001.desc:0 "A martial artist approaches with cupped fists and cold eyes. 'I challenge you to a formal duel under the laws of the martial world. Do you accept, or forfeit your honor?'"
 murim_duel.0002.t:0 "Death Match Challenge"
 murim_duel.0002.desc:0 "This is no ordinary challenge. 'One enters. One leaves.' A death match has been called, and refusing means eternal shame."
 murim_duel.0003.t:0 "Sect Ranking Fight"
 murim_duel.0003.desc:0 "The annual sect ranking tournament has begun. Your position among the disciples will be decided by combat. Higher rank means better resources, techniques, and the elders' attention."
 murim_duel.0004.t:0 "Tournament Grand Final"
 murim_duel.0004.desc:0 "You have fought your way to the final match of the grand tournament. Thousands watch. The prize: a legendary technique scroll said to contain the key to immortality."
 murim_duel.0005.t:0 "Ambush Attack!"
 murim_duel.0005.desc:0 "Shadows move in the darkness. You've been ambushed on a lonely mountain path. Masked cultivators strike from all directions -- this is no honorable duel."
 murim_duel.0006.t:0 "Revenge Duel"
 murim_duel.0006.desc:0 "They've come for vengeance. A cultivator whose master/disciple/ally you defeated now demands satisfaction. The cycle of revenge continues."
 murim_duel.0007.t:0 "Master vs Disciple Sparring"
 murim_duel.0007.desc:0 "Your master invites you to spar. 'Show me how far you've come.' This is both a test and a lesson -- your master will reveal weaknesses you didn't know you had."

 # ---------------------
 # PENALTY MODIFIERS
 # ---------------------
 murim_qi_deviation_mild:0 "Mild Qi Deviation"
 murim_qi_deviation_mild_desc:0 "Your qi flows erratically through damaged meridian pathways. Concentration is difficult and martial prowess suffers."
 murim_qi_deviation_moderate:0 "Moderate Qi Deviation"
 murim_qi_deviation_moderate_desc:0 "Significant meridian damage has destabilized your cultivation base. Without treatment, this could worsen."
 murim_meridian_damage_light:0 "Light Meridian Damage"
 murim_meridian_damage_light_desc:0 "Minor meridian blockages impede qi circulation. Cultivation speed is reduced."
 murim_meridian_damage_heavy:0 "Heavy Meridian Damage"
 murim_meridian_damage_heavy_desc:0 "Major meridian channels are torn. Cultivation is severely impaired and combat ability diminished."
 murim_meridian_damage_crippling:0 "Crippling Meridian Damage"
 murim_meridian_damage_crippling_desc:0 "Your meridian system is destroyed. Without a miracle pill or legendary healer, you will never cultivate again."
 murim_shattered_reputation:0 "Shattered Reputation"
 murim_shattered_reputation_desc:0 "Your name is mud in the martial world. Sects refuse you, masters ignore you, and even ordinary folk avert their eyes."
 murim_sect_exile_shame:0 "Sect Exile Shame"
 murim_sect_exile_shame_desc:0 "Cast out from your sect in disgrace. The sect brand burns on your back as a warning to all who would take you in."
 murim_demonic_cultivation_taint:0 "Demonic Cultivation Taint"
 murim_demonic_cultivation_taint_desc:0 "Dark energy seeps from your pores. Orthodox cultivators sense the taint immediately. Demonic sects, however, may find you... interesting."
 murim_forbidden_technique_backlash:0 "Forbidden Technique Backlash"
 murim_forbidden_technique_backlash_desc:0 "The forbidden technique extracts its price. Your body ages rapidly, your mind fragments, and dark whispers echo in your consciousness."
 murim_duel_humiliation:0 "Duel Humiliation"
 murim_duel_humiliation_desc:0 "Defeated publicly and thoroughly. The martial world remembers, and challengers who once feared you now see weakness."
 murim_broken_oath_mark:0 "Broken Oath Mark"
 murim_broken_oath_mark_desc:0 "You swore on your martial honor and broke your word. A spiritual mark brands your soul, visible to all cultivators of sufficient level."

