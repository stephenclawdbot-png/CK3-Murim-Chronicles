l_english:
 murim_recruit.0001.t: "The Clan Needs Young Blood"
 murim_recruit.0001.desc.generic: "Our clan withers. The training halls echo with too few footsteps, and the youngest disciples can be counted on one hand. If we do not find fresh talent soon, our lineage will fade into memory. The elders have authorized a scouting mission to seek promising youth."
 murim_recruit.0001.desc.mount_hua: "Mount Hua's plum blossom gardens grow quiet. Too few young voices recite the morning oaths, too few wooden swords clash in the practice yard. Our proud sect must find new disciples or watch our sword arts die with us."
 murim_recruit.0001.desc.shaolin: "The meditation halls of Shaolin sit half-empty. Our ancient lineage demands continuation. The Abbot has decreed that scouts be sent beyond the temple walls to find youth with the Buddha-nature suited to our path."
 murim_recruit.0001.desc.demon: "The Heavenly Demon Sect demands strength in numbers. Our ranks have thinned, and weakness invites the so-called righteous to test our borders. Fresh blood must be found -- willing or otherwise."
 murim_recruit.0001.desc.tang: "The Tang Clan's bloodline is its greatest weapon, but even we require associates and outer disciples to maintain our strength. Our scouts must search for youth with the nerve to handle poison and the precision to wield hidden weapons."
 murim_recruit.0001.desc.wudang: "The Taoist masters of Wudang seek disciples who possess inner stillness and natural affinity for the Dao. Our scouts must find such rare souls before the other sects claim them."
 murim_recruit.0001.desc.beggar: "The Beggar Sect has always found its strength among the forgotten. Orphans, outcasts, the discarded children of a cruel world -- they are our lifeblood. Time to walk the roads and find the next generation."
 murim_recruit.0001.a: "Send scouts to nearby regions."
 murim_recruit.0001.b: "Send scouts across the known world."
 murim_recruit.0001.c: "Lower our standards -- accept anyone."
 murim_recruit.0002.t: "A Promising Candidate Found"
 murim_recruit.0002.desc: "Our scout returns with excitement in their eyes. They have found a youth of remarkable potential -- natural meridian alignment, quick reflexes, and a hunger in their gaze that cannot be taught. This one could become something extraordinary, given proper training."
 murim_recruit.0002.a: "Approach their family formally."
 murim_recruit.0002.b: "Test the candidate first."
 murim_recruit.0003.t: "Your Child Has Been Scouted"
 murim_recruit.0003.desc: "A martial sect has come calling. Their scout, a weathered fighter with knowing eyes, has identified your child as possessing extraordinary potential. They offer a place in their sect -- training, purpose, and a future beyond anything you could provide. But the martial world is dangerous, and you may never see your child again."
 murim_recruit.0003.a: "Accept proudly. My child is destined for this."
 murim_recruit.0003.b: "Accept reluctantly. It tears my heart."
 murim_recruit.0003.c: "Negotiate terms and compensation."
 murim_recruit.0003.d: "Refuse politely."
 murim_recruit.0003.e: "Over my dead body."
 murim_recruit.0004.t: "AI Parent Decides"
 murim_recruit.0004.desc: "A parent weighs the fate of their child against the promises of a martial sect."
 murim_recruit.0005.t: "Arrival at the Clan"
 murim_recruit.0005.desc.local: "The gates of the sect loom before you, larger than anything you have ever seen. Disciples in matching robes move with fluid precision through courtyards that smell of incense and sweat. This is your new home. These strangers are your new family. Everything you knew before this moment is behind you."
 murim_recruit.0005.desc.foreign: "Everything here is alien -- the language, the food, the customs. The other disciples stare at you with open curiosity or barely concealed disdain. You are the outsider, the foreigner, the one who does not belong. You will have to fight twice as hard for half the respect."
 murim_recruit.0005.a: "Adapt quickly. Embrace this new life."
 murim_recruit.0005.b: "Struggle, but train harder than anyone."
 murim_recruit.0005.c: "Cry for home, but endure."
 murim_recruit.0005.d: "Try to flee back home."
 murim_recruit.0006.t: "The Foreign Recruit at the Tournament"
 murim_recruit.0006.desc: "The Young Dragon Tournament pits the sect's youth against one another, and you -- the outsider -- must fight among them. The other competitors eye you with suspicion. Some sneer openly. They do not believe a foreigner belongs in their sacred competition. This is your chance to prove them wrong."
 murim_recruit.0006.a: "Prove myself through raw skill."
 murim_recruit.0006.b: "Win hearts through humility."
 murim_recruit.0006.c: "Surprise them with foreign techniques."
 murim_recruit.0007.t: "Scouting Rivalry"
 murim_recruit.0007.desc: "Disaster -- another clan has identified the same prodigy. Their scout arrived only days after ours, and now two sects compete for a single extraordinary talent. The family watches both offers with calculating eyes, aware that their child's future has become a bidding war."
 murim_recruit.0007.a: "Outbid the rival clan."
 murim_recruit.0007.b: "Challenge the rival scout to a duel."
 murim_recruit.0007.c: "Let them have this one."
 murim_recruit.0007.d: "Sabotage the rival's reputation."
 murim_recruit.0008.t: "Scouting Mission Failed"
 murim_recruit.0008.desc: "Our scouts return empty-handed, their faces drawn with frustration. Every promising candidate was already claimed, too old, or simply unwilling. The clan's need for young blood remains urgent, and each passing season without new disciples weakens us further."
 murim_recruit.0008.a: "Try again next year."
 murim_recruit.0008.b: "Lower our standards immediately."
 murim_recruit.0008.c: "Poach from a rival clan."
 murim_recruit.0008.d: "Accept the decline."
 murim_recruit.0009.t: "Coming of Age"
 murim_recruit.0009.desc: "Years of grueling training have transformed the frightened child who first walked through the sect gates into a capable young martial artist. The outer disciple trials are complete. Now comes the moment of truth: will this recruit stay loyal, or has the pull of home grown too strong to resist?"
 murim_recruit.0009.a: "Stay loyal to the clan."
 murim_recruit.0009.b: "Return home as the clan's ambassador."
 murim_recruit.0009.c: "Leave and forge my own path."
 murim_recruit.0009.d: "Defect with stolen clan secrets."
 murim_recruit.0010.t: "Homecoming"
 murim_recruit.0010.desc: "After years away, you return to the place where you were born. The village looks smaller than you remember. Your parents look older. The children who once played beside you are now strangers with families of their own. You carry a sword on your back and calluses on your hands that mark you as someone from another world."
 murim_recruit.0010.a: "Reunite with family."
 murim_recruit.0010.b: "Realize you no longer belong here."
 murim_recruit.0010.c: "Scout local talent for the clan."
 murim_recruit.0010.d: "Never return to the martial world."
 murim_recruit.0020.t: "A Promising Local Talent"
 murim_recruit.0020.desc.generic: "While observing the local populace, a clan elder notices a youth of remarkable natural ability. Their movements possess an unconscious grace, their body carries untapped potential. With proper training, this one could bring honor to the sect."
 murim_recruit.0020.desc.mount_hua: "A Mount Hua elder observes a village youth practicing sword forms with a bamboo stick -- crude, untrained, yet possessing an instinctive understanding of blade geometry that cannot be taught. The plum blossom style would suit this one perfectly."
 murim_recruit.0020.desc.shaolin: "A Shaolin monk watches a young farmhand carrying impossible loads without complaint, their body naturally channeling strength in ways that suggest dormant meridian potential. The Buddha smiles on such natural endurance."
 murim_recruit.0020.desc.demon: "A Heavenly Demon scout spots a youth with cold, calculating eyes and the speed of a striking snake. This one has the ruthless instinct that the Demonic Path prizes above all else."
 murim_recruit.0020.desc.tang: "A Tang Clan associate notices a local youth with extraordinarily steady hands and an intuitive understanding of chemistry. The precision required for hidden weapons and poison craft is rare."
 murim_recruit.0020.desc.wudang: "A Wudang elder senses unusual qi resonance from a youth meditating by a mountain stream. Their natural inner stillness is remarkable -- the Dao flows through them without resistance."
 murim_recruit.0020.desc.beggar: "A Beggar Sect elder finds a street urchin who fights with desperate cunning and unbreakable spirit. Hungry, dirty, and fearless -- exactly the kind of raw material the Beggar Sect transforms into legends."
 murim_recruit.0020.a: "Extend a formal invitation."
 murim_recruit.0020.b: "Make a casual, no-pressure offer."
 murim_recruit.0020.c: "Test them before offering membership."
 murim_recruit.0020.d: "Not interested enough. Pass."
 murim_recruit.0021.t: "An Invitation to Join"
 murim_recruit.0021.desc: "A martial sect has approached you directly with an offer of membership. They see potential in you -- a chance to transcend ordinary life, to learn arts that can shatter stone and defy gravity. The path will be grueling, the discipline absolute, but the reward is power beyond imagination."
 murim_recruit.0021.a: "Accept eagerly!"
 murim_recruit.0021.b: "Negotiate the terms first."
 murim_recruit.0021.c: "Decline politely."
 murim_recruit.0021.d: "Decline rudely."
 murim_recruit.0022.t: "The Recruitment Trial"
 murim_recruit.0022.desc: "Before the sect will accept you, you must pass a trial. The testing ground awaits -- a gauntlet of physical challenges, combat tests, and mental endurance designed to separate the worthy from the merely willing. Your future in the martial world begins or ends here."
 murim_recruit.0022.a: "Face the trial with courage."
 murim_recruit.0022.b: "Use cunning instead of strength."
 murim_recruit.0022.c: "Refuse -- walk away."
 murim_recruit.0030.t: "A Generational Talent Emerges"
 murim_recruit.0030.desc: "The martial world watches in astonishment as a recruited nobody rises to extraordinary heights. Their cultivation speed shatters records, their technique mastery defies their years. The elders whisper of a once-in-a-generation talent -- the kind of prodigy who reshapes the entire balance of power."
 murim_recruit.0030.a: "Embrace my destiny."
 murim_recruit.0030.b: "Stay humble. Keep training quietly."
 murim_recruit.0031.t: "A Rising Star"
 murim_recruit.0031.desc: "Word spreads through the martial world like wildfire: an unknown recruit has emerged as a prodigy of terrifying potential. Every sect watches, every rival calculates. A new power is rising, and the balance of the murim shifts."
 murim_recruit.0031.a: "Noted."
 murim_recruit.0040.t: "Washing Out"
 murim_recruit.0040.desc: "Despite years of effort, the harsh truth is undeniable: you are falling behind. The other disciples advance while you struggle with fundamentals. The elders exchange pitying glances. The sect's standards are absolute, and you are not meeting them. The shadow of expulsion looms."
 murim_recruit.0040.a: "Train harder. One more chance."
 murim_recruit.0040.b: "Accept expulsion gracefully."
 murim_recruit.0040.c: "Beg to stay in any role."
 murim_recruit.0040.d: "Leave and prove them all wrong."
 murim_recruit.0050.t: "Spy Recruit Unmasked"
 murim_recruit.0050.desc: "The truth emerges like a blade from the dark: one of our recruits was a spy planted by a rival clan. They have been feeding our training methods, our strength assessments, and our strategic plans to the enemy. The betrayal stings, but the real question is what we do with them now."
 murim_recruit.0050.a: "Execute the spy."
 murim_recruit.0050.b: "Turn them into a double agent."
 murim_recruit.0050.c: "Expel them publicly."
 murim_recruit.0050.d: "Forgive them -- they have become loyal."
