l_english:
 cultivation.0001.t: "The Awakening"
 cultivation.0001.desc: "A tremor runs through your meridians like the first crack of ice in spring. Qi -- the invisible breath of heaven and earth -- stirs within you for the first time. Your senses sharpen, the world brightens, and you feel the vast ocean of energy that flows through all living things. The path of cultivation opens before you."
 cultivation.0001.a: "Walk the path with patience"
 cultivation.0001.b: "Throw myself into relentless training"
 cultivation.0002.t: "Foundation Establishment"
 cultivation.0002.desc: "After years of tireless cultivation, you feel the qi in your meridians condense and solidify. Your foundation is taking shape -- the bedrock upon which all future power will be built. The breakthrough fills the air with visible qi, and those nearby feel the surge of your transformation."
 cultivation.0002.a: "Forge a martial foundation of iron"
 cultivation.0002.b: "Build a foundation of wisdom"
 cultivation.0003.t: "The Nascent Soul Emerges"
 cultivation.0003.desc: "The heavens themselves take notice. Within your dantian, a second self takes shape -- a nascent soul, a reflection of your very essence distilled into pure qi. The transformation sends shockwaves through the martial world. You have ascended beyond what most cultivators dare to dream."
 cultivation.0003.a: "Embrace overwhelming power"
 cultivation.0003.b: "Walk the spiritual path of enlightenment"
 cultivation.0004.t: "The Demonic Seed"
 cultivation.0004.desc: "A dark whisper coils through your cultivation. You sense it -- a shortcut, a faster path to power that bypasses the slow orthodox grind. The demonic seed pulses with seductive energy, promising strength beyond measure. All it asks is that you abandon the righteous way."
 cultivation.0004.a: "Embrace the darkness within"
 cultivation.0004.b: "Resist the corruption with all your will"
 cultivation.0005.t: "The Secret Manual"
 cultivation.0005.desc: "Behind a loose stone in an ancient wall, your fingers close around a scroll wrapped in oilskin. The characters within describe techniques lost to time -- cultivation methods that could accelerate your progress by decades. How you use this knowledge will define your path."
 cultivation.0005.a: "Study the manual in seclusion"
 cultivation.0005.b: "Share it with the sect and dynasty"
 cultivation.0005.c: "Sell it to the highest bidder"
 cultivation.0006.t: "Heavenly Tribulation"
 cultivation.0006.desc: "Storm clouds gather from a clear sky. Lightning arcs between heaven and earth, and the very dao takes notice of your hubris. You have cultivated to the peak of mortal possibility -- now heaven itself descends to test whether you are worthy of transcendence. This is the Heavenly Tribulation."
 cultivation.0006.a: "Face the tribulation head-on"
 cultivation.0006.b: "Postpone -- the risk is too great"
 cultivation.0007.t: "Sect War Erupts"
 cultivation.0007.desc: "The fragile peace between sects shatters. A neighboring cultivator of rival doctrine has pushed too far, and now the martial world descends into open conflict. Qi clashes echo across the mountains as sect fights sect in a war that will reshape the balance of power."
 cultivation.0007.a: "Lead the war effort"
 cultivation.0007.b: "Mediate for peace"
 cultivation.0007.c: "Exploit the chaos for personal gain"
 cultivation.0008.t: "The Pill Cauldron Glows"
 cultivation.0008.desc: "Your alchemy cauldron hums with contained energy as rare ingredients simmer within. The breakthrough pill you are attempting could accelerate your cultivation by years -- or the cauldron could explode, leaving you scarred and broken. The flame flickers, awaiting your decision."
 cultivation.0008.a: "Attempt the breakthrough pill"
 cultivation.0008.b: "Steady refinement -- safe but slow"
 cultivation.0009.t: "The Wandering Sage"
 cultivation.0009.desc: "An old figure in threadbare robes sits beneath a pine tree, radiating qi so subtle and refined that only a trained cultivator would notice. This is no ordinary wanderer -- this is a sage whose cultivation has touched the heavens. They regard you with ancient, knowing eyes."
 cultivation.0009.a: "Accept the sage's orthodox teaching"
 cultivation.0009.b: "Ask about forbidden techniques"
 cultivation.0009.c: "Rob the sage of their treasures"
 cultivation.0009.d: "Decline politely and move on"
 cultivation.0010.t: "The Forbidden Library"
 cultivation.0010.desc: "Behind a waterfall in the deepest mountain valley, you discover a chamber carved from living rock, its walls lined with thousands of scrolls. This is a forbidden library -- a repository of knowledge both orthodox and heretical, accumulated over centuries by cultivators who came before."
 cultivation.0010.a: "Study the orthodox texts carefully"
 cultivation.0010.b: "Delve into the forbidden techniques"
 cultivation.0010.c: "Seal the library to protect others"
 cultivation.0011.t: "Qi Deviation Crisis"
 cultivation.0011.desc: "Your qi turns against you. The energy in your meridians spirals out of control, searing pathways that took years to open. Blood seeps from your eyes and ears as your own cultivation threatens to tear you apart from the inside. Every breath is agony."
 cultivation.0011.a: "Fight through with sheer willpower"
 cultivation.0011.b: "Emergency meditation -- disperse the qi"
 cultivation.0011.c: "Seek emergency help from an ally"
 cultivation.0012.t: "The Dao Heart Trial"
 cultivation.0012.desc: "In the silence of deep meditation, your inner demons manifest. Every fear, every regret, every dark impulse takes shape before you in the theater of your mind. This is the Dao Heart Trial -- the spiritual crucible that determines whether your cultivation path remains pure."
 cultivation.0012.a: "Face inner demons with compassion"
 cultivation.0012.b: "Conquer them with martial will"
 cultivation.0012.c: "Accept them as part of yourself"
 cultivation.0012.d: "Succumb to the inner demons"
 cultivation.0013.t: "Master's Final Teaching"
 cultivation.0013.desc: "Your master's qi flickers like a candle in the wind. Their body is failing, but their eyes burn with decades of accumulated wisdom. With trembling hands, they reach for yours. 'I have one last thing to teach you,' they whisper. 'Everything I am, everything I know -- take it.'"
 cultivation.0013.a: "Honor the master's orthodox legacy"
 cultivation.0013.b: "Combine their teaching with innovation"
 cultivation.0013.c: "The burden is too great to bear"
 cultivation.0014.t: "The Hidden Realm"
 cultivation.0014.desc: "A rift in space reveals itself -- a pocket dimension where qi flows thick as water and time moves differently. Within this hidden realm, a year of cultivation could yield the progress of a decade. But the realm is unstable, and those who enter may not return."
 cultivation.0014.a: "Enter alone for maximum benefit"
 cultivation.0014.b: "Send disciples to explore first"
 cultivation.0014.c: "Seal the entrance"
 cultivation.0015.t: "Dual Cultivation Proposal"
 cultivation.0015.desc: "Your spouse's qi resonates with your own in perfect harmony. The ancient texts describe dual cultivation -- a practice where two cultivators merge their qi flows, accelerating both their paths. It requires absolute trust and spiritual vulnerability."
 cultivation.0015.a: "Begin dual cultivation together"
 cultivation.0015.b: "Focus on spiritual connection instead"
 cultivation.0015.c: "Cultivation is a solitary path"
