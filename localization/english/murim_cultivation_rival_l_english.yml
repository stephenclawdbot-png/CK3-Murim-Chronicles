l_english:
 # ==========================================
 # MURIM CULTIVATION RIVAL EVENTS LOCALIZATION
 # Rival acquisition, breakthroughs, sabotage,
 # alliances, and final confrontations
 # ==========================================

 # --- EVENT 1: Acquiring a Rival ---
 murim_rival.0001.t:0 "An Equal Appears"
 murim_rival.0001.desc:0 "In the vast world of cultivation, true equals are rarer than spirit herbs. Yet here, on the road between sects or in the midst of a tournament's third match, you have found one. Their qi reads almost identically to yours — same rank, same burning ambition, and eyes that measure you the same way you measure them. The martial world is not big enough for two cultivators walking the same path."
 murim_rival.0001.desc_advanced:0 "At your level, few can claim to be peers. Yet this one has matched your pace for years, advancing when you advanced, faltering when you faltered. It is no coincidence. They have been watching you as long as you have been watching them. The acknowledgment between rivals of this caliber is not spoken — it is felt in the qi."
 murim_rival.0001.a:0 "Acknowledge them. The rivalry is real."
 murim_rival.0001.b:0 "Challenge them immediately. No equal — only who is ahead."
 murim_rival.0001.c:0 "Dismiss them. You have no equal in this age."
 murim_rival_accepted_tt:0 "The rival is acknowledged. Their existence sharpens your cultivation instincts."
 murim_rival_challenge_immediately_tt:0 "The challenge is issued before words can soften it. The rivalry begins at its most intense."
 murim_rival_dismissed_tt:0 "Your arrogance may cost you. The dismissed rival nurses a deeper grudge."

 # --- EVENT 2: Rival Breakthrough ---
 murim_rival.0002.t:0 "News from the Mountain: Your Rival Has Advanced"
 murim_rival.0002.desc:0 "The message arrives through a third party — a wandering merchant who saw it happen, or a sect disciple who was there. Your rival has broken through. They stand one realm above you now, and the gap that was once a rivalry of equals has become something else. Something more uncomfortable. The question is what you do with that feeling."
 murim_rival.0002.desc_bitter:0 "You felt it before the messenger arrived. A shift in the world's qi — a small, distant surge that you recognized instantly. Your rival has broken through. After everything. After all the years of trading blows and matching each other step for step, they have taken the step you could not. The bitterness is real. Use it."
 murim_rival.0002.a:0 "Train harder. This changes nothing — only the timeline."
 murim_rival.0002.b:0 "Take a risky shortcut to catch up immediately."
 murim_rival.0002.c:0 "Send congratulations. Their advancement honors the rivalry."
 murim_rival_breakthrough_motivated_tt:0 "Righteous fury becomes fuel. Cultivation accelerates under the pressure of competition."
 murim_rival_shortcut_success_tt:0 "The shortcut pays off. You close the gap faster than anyone expected."
 murim_rival_shortcut_fail_tt:0 "Pushing too hard without proper foundation causes a painful setback."
 murim_rival_breakthrough_gracious_tt:0 "The gesture is noted across the jianghu. Gracious rivals are respected — and feared more than bitter ones."

 # --- EVENT 3: Rival Sabotage ---
 murim_rival.0003.t:0 "Shadows in the Meditation Chamber"
 murim_rival.0003.desc:0 "Someone has been interfering with your cultivation. Herb shipments have been contaminated. Your training grounds bear traces of a foreign qi pattern. The servants whisper. You know who is behind it — or you strongly suspect. The rivalry has crossed a line. This is no longer honorable competition. This is war fought in the dark."
 murim_rival.0003.a:0 "Investigate and expose the saboteur."
 murim_rival.0003.b:0 "Retaliate in kind."
 murim_rival.0003.c:0 "Endure it. Adversity is a teacher."
 murim_rival_sabotage_exposed_tt:0 "The saboteur is exposed before the sect. Your rival loses face while yours soars."
 murim_rival_sabotage_failed_tt:0 "The investigation turns up nothing concrete. You look paranoid, and cultivation suffers."
 murim_rival_sabotage_retaliate_tt:0 "Your countermeasures hit their mark. Your rival's cultivation is disrupted."
 murim_rival_sabotage_retaliate_fail_tt:0 "Your retaliation is traced back to you. Both parties lose face."
 murim_rival_sabotage_endure_tt:0 "You cultivate through the interference. The hardship forges a stronger will."

 # --- EVENT 4: Rival Asks for Help ---
 murim_rival.0004.t:0 "The Hand Extended Across the Rivalry"
 murim_rival.0004.desc:0 "Word reaches you that your rival is in a desperate state — injured from a failed breakthrough, or crushed by losses in the political arena. They have sent a discreet message. Not a demand. Not a challenge. A request. They need help and, against all pride, they have come to you. The martial world will be watching how you answer."
 murim_rival.0004.a:0 "Help them fully. Rivalry ends here — let it become something greater."
 murim_rival.0004.b:0 "Lend aid, but the rivalry remains. Respect is not friendship."
 murim_rival.0004.c:0 "Refuse. Weakness is their problem, not yours."
 murim_rival_helped_became_friend_tt:0 "You help without condition. The rival becomes a friend — and a far more valuable ally than enemy."
 murim_rival_helped_respect_tt:0 "You aid them, and they know it. The rivalry softens into something approaching respect."
 murim_rival_refused_help_tt:0 "You turn them away. They survive alone and remember the refusal for the rest of their life."

 # --- EVENT 5: Final Confrontation ---
 murim_rival.0005.t:0 "The Rivalry Must End"
 murim_rival.0005.desc:0 "Years of parallel cultivation. Years of matching each step, trading victories, and sharpening each other like two blades honed against one another. The world is not wide enough for both of you to keep climbing indefinitely without deciding who stands higher. The time has come for a reckoning."
 murim_rival.0005.desc_intense:0 "The rivalry has long since left the realm of competition. Sabotage. Near-death encounters. Old wounds that have not healed. Whatever this is now, it is not a friendly contest between martial artists. One of you must end this — and end it completely."
 murim_rival.0005.a:0 "End it in a legendary duel. One bout settles everything."
 murim_rival.0005.b:0 "Transcend the rivalry. Let Heaven judge who walked the higher path."
 murim_rival.0005.c:0 "Destroy them through schemes. No need for a fair fight."
 murim_rival_final_duel_tt:0 "The legendary duel is called. The jianghu will speak of this confrontation for generations."
 murim_rival_transcended_tt:0 "You rise above the rivalry. Your cultivation advances dramatically, freed from years of obsessive comparison."
 murim_rival_destroyed_schemes_tt:0 "Your rival is broken — not in combat but in everything else. They will not recover."
 murim_rival_scheme_failed_tt:0 "The scheme unravels. Your rival knows what you attempted and will never forgive it."

 # --- OPINION MODIFIER NAMES ---
 murim_rival_respect_opinion:0 "Rival's Respect"
 murim_rival_exposed_opinion:0 "Exposed by Rival"
