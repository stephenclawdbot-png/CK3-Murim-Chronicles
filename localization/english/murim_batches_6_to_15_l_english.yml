l_english:
 # ============================================================
 # BATCH 6: DISCOVERY EVENTS 5001-5002
 # ============================================================
 murim_discover.5001.t:0 "A Duel Worth Witnessing"
 murim_discover.5001.desc:0 "At the edge of your training yard, two figures you have never seen before are locked in combat. Not brawling — this is something else entirely. The smaller of the two moves like water around the other's attacks, their footwork tracing patterns you can almost read but not quite. When the match ends, you realise you have been holding your breath. Whatever this is, it is not ordinary martial practice."
 murim_discover.5001.a:0 "This is what I want. Find someone to teach me."
 murim_discover.5001.b:0 "Commission a master directly. Money talks in the martial world."
 murim_discover.5001.c:0 "Witness but do not enter — this world is not mine."

 murim_discover.5002.t:0 "The Mad Beggar's Riddle"
 murim_discover.5002.desc:0 "A beggar approaches you on the road with eyes too sharp for someone in rags. 'Sit,' he says — not asks. Something in his voice makes you comply. He speaks for an hour in riddles about breathing, about the space between heartbeats, about the weight of air before a storm. None of it makes sense until, halfway through, it all suddenly does."
 murim_discover.5002.a:0 "Listen carefully. The riddles are unfolding into something real."
 murim_discover.5002.b:0 "Offer food and sit with them in patience."
 murim_discover.5002.c:0 "Walk away. The wandering mad are everywhere."

 # ============================================================
 # BATCH 7: COMBAT EVENTS 0007-0008
 # ============================================================
 murim_combat.0007.t:0 "The Blade's Hunger"
 murim_combat.0007.desc:0 "The battle is over, but something in you has not stopped. You stand among the aftermath and feel it clearly: a sharpness behind your eyes that was not there before. Your qi has taken on an edge — not corrupted exactly, but altered. Battle has changed your internal circulation. You can feel your killing intent crystallising into something almost tangible. This could be a gift or a curse depending on how you handle it."
 murim_combat.0007.a:0 "Embrace it. Let the killing intent become your blade's edge."
 murim_combat.0007.b:0 "Suppress it. Channel the energy into purity rather than violence."
 murim_combat.0007.c:0 "Accept it as part of the martial path — neither embrace nor suppress."

 murim_combat.0008.t:0 "The Still Point Between Blows"
 murim_combat.0008.desc:0 "It happened in the space between one heartbeat and the next — a moment of absolute clarity in the chaos of battle. For a single instant you could see everything: the trajectories of weapons, the qi circulation of every opponent nearby, the geometric truth underlying all martial movement. The moment passed, but it left something behind. You are not the same cultivator you were before the battle."
 murim_combat.0008.a:0 "Let the insight crystallise — attempt a breakthrough while it's fresh."
 murim_combat.0008.a.breakthrough:0 "The battlefield enlightenment was enough. A breakthrough follows naturally."
 murim_combat.0008.a.deep_gain:0 "Not a full breakthrough, but a deep and permanent advancement."
 murim_combat.0008.b:0 "Record the insight in detail — this must not be lost."

 # ============================================================
 # BATCH 8: HARMONY EVENTS 0009-0010
 # ============================================================
 murim_harmony.0009.t:0 "The Inner Sect Ranking Duel"
 murim_harmony.0009.desc:0 "Within any sect, hierarchy must be earned and re-earned. Your disciples and fellow clan members have been talking — some old tensions over ranking and seniority have been bubbling. It may be time to settle things the traditional way: with blades, witnessed by the full sect, on the training ground."
 murim_harmony.0009.a:0 "Host a formal competition. Let the strongest rise."
 murim_harmony.0009.b:0 "Hold a personal sparring session instead."
 murim_harmony.0009.c:0 "Let the disciples sort out their own hierarchy."

 murim_harmony.0010.t:0 "The Elder Council Convenes"
 murim_harmony.0010.desc:0 "The elders of your sect rarely all gather at once — their cultivation retreats, their personal researches, their individual paths keep them apart. But today they have come together, and their purpose is clear: they have selected you as the one who should carry their combined wisdom forward. The opportunity is singular."
 murim_harmony.0010.a:0 "Receive the collective wisdom. Let it transform you."
 murim_harmony.0010.b:0 "Ask them to teach the entire inner sect — knowledge belongs to all."

 # ============================================================
 # BATCH 9: TECHNIQUE MASTERY EVENTS 0006-0007
 # ============================================================
 murim_technique_mastery.0006.t:0 "Two Arts Become One"
 murim_technique_mastery.0006.desc:0 "You have been sitting with it for months now — the faint resonance between two of your mastered techniques. They were designed by different masters, from different schools, for different purposes. And yet there is something in their deep structure that rhymes. You believe you can merge them. The attempt will either produce something extraordinary or shatter both techniques beyond recovery."
 murim_technique_mastery.0006.a:0 "Force the fusion. Raw cultivation pressure will bridge the gap."
 murim_technique_mastery.0006.a.success:0 "The techniques merge perfectly. Something new and powerful emerges."
 murim_technique_mastery.0006.a.partial:0 "A partial fusion — the result is good, though not perfect."
 murim_technique_mastery.0006.a.failure:0 "The techniques fight each other. Your qi circuits buckle under the strain."
 murim_technique_mastery.0006.b:0 "Meditative synthesis — slow and careful. Let them find each other."

 murim_technique_mastery.0007.t:0 "The Variant in the Ruins"
 murim_technique_mastery.0007.desc:0 "In the ruins of a destroyed training hall — burned, by the looks of it, in some old purge — you find a wooden box buried under collapsed beams. Inside is a fragment of a manual, perhaps thirty pages, the calligraphy older than your sect's founding. This is a variant form of your primary technique, one that diverged centuries ago. Your lineage always believed this variant was lost."
 murim_technique_mastery.0007.a:0 "Restore the lost variant. Carry this branch of the lineage forward."
 murim_technique_mastery.0007.b:0 "Sell it. Another sect will pay extraordinarily well."
 murim_technique_mastery.0007.c:0 "Preserve it in the sect archive — knowledge belongs to the lineage."

 # ============================================================
 # BATCH 11: SECT POLITICS EVENTS 0015-0016
 # ============================================================
 murim_sect_politics.0015.t:0 "The Heresy Trial"
 murim_sect_politics.0015.desc:0 "They come in the traditional way: three elders, formal robes, a written accusation sealed with the orthodox assembly mark. You are being formally accused of practising demonic arts. The evidence, they say, is compelling. You have three days to prepare your response. The martial world is watching."
 murim_sect_politics.0015.a:0 "Deny all charges. Rely on reputation and allies."
 murim_sect_politics.0015.a.cleared:0 "The tribunal finds the evidence inconclusive. You are cleared."
 murim_sect_politics.0015.a.guilty:0 "The tribunal rules against you. Your position in the sect is forfeit."
 murim_sect_politics.0015.b:0 "Confess and submit to purification. Accept the cost."
 murim_sect_politics.0015.c:0 "Flee the sect before the trial concludes."

 murim_sect_politics.0016.t:0 "A Proposal of Unity"
 murim_sect_politics.0016.desc:0 "The messenger arrives bearing the emblem of another sect — one that has seen better days. Their numbers are depleted, their treasury strained, their strongest cultivators lost to illness and battle. They are offering something few sects have the humility to offer: a merger. Their lineage and yours, combined under a single roof. The jianghu will take note either way."
 murim_sect_politics.0016.a:0 "Accept the merger. Combined strength serves both lineages."
 murim_sect_politics.0016.b:0 "Refuse. Our lineage remains pure and independent."
 murim_sect_politics.0016.c:0 "Counter-propose: they join our sect, not merge equally."

 # ============================================================
 # BATCH 12: CHARACTER INTERACTIONS
 # ============================================================
 murim_qi_exchange_interaction_desc:0 "Transfer a portion of your cultivated qi to strengthen another martial artist. The process weakens you temporarily but can dramatically accelerate a promising disciple's development."
 murim_challenge_training_spar_interaction_desc:0 "Challenge another martial artist to a friendly cultivation exchange duel. Both parties gain cultivation experience from the clash, and neither is expected to hold back completely."
 murim_gift_herbs_interaction_desc:0 "Gift a portion of your spirit herb stockpile to another cultivator. Herbs are difficult to acquire — this gesture carries significant weight in the martial world."

