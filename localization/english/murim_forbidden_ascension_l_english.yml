l_english:
 # ===========================
 # FORBIDDEN TECHNIQUE LOCALIZATION
 # ===========================

 # Decisions
 murim_seek_forbidden_knowledge_decision: "Seek Forbidden Knowledge"
 murim_seek_forbidden_knowledge_decision_desc: "Venture into the shadows of the martial world to seek techniques that have been banned, sealed, or hidden away. The power is immense — the cost may be greater."
 murim_seek_forbidden_knowledge_decision_tooltip: "Search for forbidden martial techniques"
 murim_seek_forbidden_knowledge_tt: "You will begin searching for forbidden techniques. Discovery is not guaranteed, and what you find may change you forever."
 murim_purge_corruption_decision: "Purge Corruption"
 murim_purge_corruption_decision_desc: "Undergo a painful purification ritual to cleanse the dark qi that taints your meridians. The process is excruciating but may save your soul."
 murim_purge_corruption_decision_tooltip: "Attempt to remove corruption from forbidden techniques"
 murim_purge_corruption_tt: "Begin the purification ritual. You will lose some power but regain your humanity."
 murim_seal_forbidden_technique_decision: "Seal a Forbidden Technique"
 murim_seal_forbidden_technique_decision_desc: "Lock away one of your forbidden techniques, reducing its corruption at the cost of losing its power."
 murim_seal_forbidden_technique_decision_tooltip: "Seal one forbidden technique"
 murim_seal_forbidden_technique_tt: "You will permanently lose access to one forbidden technique but reduce your corruption."
 murim_visit_knowledge_broker_decision: "Visit the Knowledge Broker"
 murim_visit_knowledge_broker_decision_desc: "In the darkest corners of the jianghu, there are those who trade in forbidden knowledge. For the right price, they can procure techniques, intelligence, and secrets."
 murim_visit_knowledge_broker_decision_tooltip: "Visit the forbidden knowledge black market"

 # Traits
 murim_corruption_stage_1_desc: "Your qi has been tainted by forbidden techniques. A faint darkness lingers in your meridians."
 murim_corruption_stage_2_desc: "Dark meridians pulse visibly beneath your skin. Orthodox cultivators sense the corruption in your qi signature."
 murim_corruption_stage_3_desc: "The Heart Demon has awakened within you. Your personality shifts between moments of clarity and terrifying darkness."
 murim_corruption_stage_4_desc: "You have become more demon than human. Your power is immense but your humanity is nearly gone."
 murim_soul_devouring_palm_desc: "A forbidden palm technique that drains the life force of opponents on contact."
 murim_blood_reversal_art_desc: "Turns the target's own blood against them, causing internal hemorrhaging with a touch."
 murim_void_breathing_method_desc: "Absorbs ambient qi from the environment, creating dead zones where nothing can cultivate."
 murim_heaven_defying_sutra_desc: "The ultimate act of rebellion against the heavenly order. Grants tremendous power at the cost of inviting Heaven's wrath."
 murim_asura_body_technique_desc: "Transforms the body into a living weapon, fusing bone with qi-hardened tissue at the cost of human appearance."
 murim_soul_splitting_art_desc: "Creates qi clones capable of independent action, but each clone fragments the original soul."
 murim_death_qi_cultivation_desc: "Cultivates power from death energy — the remains of fallen cultivators fuel your advancement."
 murim_eternal_damnation_sutra_desc: "The most forbidden of all techniques. Grants power beyond mortality but damns the soul eternally."

 # Events 0001-0080
 murim_forbidden_technique.0001.t: "Whispers of Forbidden Knowledge"
 murim_forbidden_technique.0001.desc: "In a hidden chamber beneath an abandoned temple, you discover ancient scrolls sealed with blood-red wax. These are the forbidden techniques — martial arts banned by the Heavenly Tribunal for the devastation they wreak upon both practitioner and victim. Power beyond imagination lies within, but the cost..."
 murim_forbidden_technique.0001.a: "Study the Soul Devouring Palm"
 murim_forbidden_technique.0001.b: "Study the Blood Reversal Art"
 murim_forbidden_technique.0001.c: "Study the Void Breathing Method"
 murim_forbidden_technique.0001.d: "Study the Heaven Defying Sutra"
 murim_forbidden_technique.0001.e: "Walk away — this path leads to darkness"

 murim_forbidden_technique.0010.t: "The Soul Devouring Palm"
 murim_forbidden_technique.0010.desc: "The scroll unfurls to reveal the Soul Devouring Palm — a technique that drains the life force from living beings through physical contact. To master it, you must first practice on a living victim. The technique is devastatingly effective, but each use darkens your meridians further."
 murim_forbidden_technique.0010.a: "Commit to learning — drain your first victim's qi"
 murim_forbidden_technique.0010.b: "Study the theory only"
 murim_forbidden_technique.0010.c: "Destroy the scroll"

 murim_forbidden_technique.0020.t: "The Blood Reversal Art"
 murim_forbidden_technique.0020.desc: "This technique manipulates the blood flow within a target's body, causing it to reverse direction. The result is catastrophic internal damage. Masters of this art can kill with a single touch by rupturing every blood vessel simultaneously."
 murim_forbidden_technique.0020.a: "Learn the Blood Reversal Art"
 murim_forbidden_technique.0020.b: "Study but don't practice"
 murim_forbidden_technique.0020.c: "Reject this dark art"

 murim_forbidden_technique.0030.t: "The Void Breathing Method"
 murim_forbidden_technique.0030.desc: "Unlike other techniques that generate power, the Void Breathing Method absorbs it — pulling qi from everything around you. Plants wither, animals flee, and other cultivators feel their energy draining away. The void hungers endlessly."
 murim_forbidden_technique.0030.a: "Absorb the ambient qi and learn"
 murim_forbidden_technique.0030.b: "Too dangerous — the void stares back"

 murim_forbidden_technique.0040.t: "The Heaven Defying Sutra"
 murim_forbidden_technique.0040.desc: "This is not merely a technique — it is a declaration of war against the heavenly order itself. The Heaven Defying Sutra grants power that rivals the gods, but to learn it is to paint a target on your soul. Heaven does not forget. Heaven does not forgive."
 murim_forbidden_technique.0040.a: "Defy heaven itself"
 murim_forbidden_technique.0040.b: "The price is too high"
 murim_forbidden_technique.0040.c: "Seal it for future generations"

 murim_forbidden_technique.0050.t: "The Asura Body Technique"
 murim_forbidden_technique.0050.desc: "This technique transforms the practitioner's body into a living weapon. Bones harden, muscles fuse with qi, and the body becomes nearly indestructible — but increasingly inhuman."
 murim_forbidden_technique.0050.a: "Transform your body"
 murim_forbidden_technique.0050.b: "Reject this monstrous art"

 murim_forbidden_technique.0060.t: "The Soul Splitting Art"
 murim_forbidden_technique.0060.desc: "By fragmenting your own soul, you can create qi clones capable of independent thought and action. Each clone is weaker than the original, but their coordination is devastating. The cost: each split makes the original soul more fragile."
 murim_forbidden_technique.0060.a: "Split your soul to gain power"
 murim_forbidden_technique.0060.b: "Your soul is not currency to be spent"

 murim_forbidden_technique.0070.t: "Death Qi Cultivation"
 murim_forbidden_technique.0070.desc: "Where others cultivate from sunlight, meditation, and breathing, this technique draws power from death itself. Battlefields, graveyards, and sites of massacre become wellsprings of energy. The power is immense, but it reeks of the grave."
 murim_forbidden_technique.0070.a: "Embrace the power of death"
 murim_forbidden_technique.0070.b: "The dead should rest in peace"

 murim_forbidden_technique.0080.t: "The Eternal Damnation Sutra"
 murim_forbidden_technique.0080.desc: "This is the end of all forbidden paths — the technique that consumes everything. The Eternal Damnation Sutra grants power beyond comprehension, but it requires sacrificing every shred of your former self. Those who complete it are no longer human in any meaningful sense."
 murim_forbidden_technique.0080.a: "Embrace eternal damnation"
 murim_forbidden_technique.0080.b: "No. Even power has its price."
 murim_forbidden_technique.0080.c: "Destroy it forever"

 # Events 0100-0600
 murim_forbidden_technique.0100.t: "The Purification Ritual"
 murim_forbidden_technique.0100.desc: "In a sacred cave blessed by ancient Daoist masters, you begin the purification ritual. Incense burns, sutras echo off stone walls, and slowly — painfully — the dark qi begins to seep from your pores."
 murim_forbidden_technique.0100.a: "Full purge — endure the agony"
 murim_forbidden_technique.0100.b: "Partial purge — reduce one stage"
 murim_forbidden_technique.0100.c: "Abandon the ritual"

 murim_forbidden_technique.0200.t: "Sealing the Forbidden"
 murim_forbidden_technique.0200.desc: "Using ancient sealing techniques, you prepare to lock away your forbidden knowledge. The process will destroy your access to the technique but weaken corruption's hold on your soul."
 murim_forbidden_technique.0200.a: "Seal the most dangerous technique"
 murim_forbidden_technique.0200.b: "Keep the power — accept the corruption"
 murim_forbidden_technique.0200.c: "Seal ALL forbidden techniques"

 murim_forbidden_technique.0300.t: "The Forbidden Knowledge Broker"
 murim_forbidden_technique.0300.desc: "Down an alley that doesn't appear on any map, behind a door that only opens at midnight, sits the Broker. They deal in forbidden knowledge, stolen techniques, and dark secrets. Everything has a price."
 murim_forbidden_technique.0300.a: "Buy a forbidden technique scroll"
 murim_forbidden_technique.0300.b: "Sell information about a rival"
 murim_forbidden_technique.0300.c: "Trade a technique for intelligence"
 murim_forbidden_technique.0300.d: "Leave — this place reeks of treachery"

 murim_forbidden_technique.0400.t: "Corruption Flare"
 murim_forbidden_technique.0400.desc: "The dark qi in your meridians surges without warning, sending pain lancing through your body. Your vision darkens at the edges, and for a moment, you hear the Heart Demon whispering."
 murim_forbidden_technique.0400.a: "Endure the pain"
 murim_forbidden_technique.0400.b: "Channel it into power"

 murim_forbidden_technique.0410.t: "The Darkness Within"
 murim_forbidden_technique.0410.desc: "Your corruption erupts in a violent episode. Dark qi explodes from your body in visible waves, cracking the ground beneath your feet. For terrifying moments, you are not yourself."
 murim_forbidden_technique.0410.a: "Fight for control of your mind"
 murim_forbidden_technique.0410.b: "Surrender to the darkness momentarily"

 murim_forbidden_technique.0500.t: "The Orthodox Hunters"
 murim_forbidden_technique.0500.desc: "A group of orthodox martial artists has tracked you down. They sense the corruption in your qi and have come to deliver justice — or vengeance. Blades gleam in the moonlight."
 murim_forbidden_technique.0500.a: "Stand and fight"
 murim_forbidden_technique.0500.b: "Flee and hide"
 murim_forbidden_technique.0500.c: "Surrender and accept judgment"

 murim_forbidden_technique.0600.t: "Clash of Forbidden Arts"
 murim_forbidden_technique.0600.desc: "Two wielders of forbidden techniques face each other. The air between you crackles with dark energy. Normal martial artists flee as the ground splits and the sky darkens. This is not a duel — this is a cataclysm."
 murim_forbidden_technique.0600.a: "Unleash everything"
 murim_forbidden_technique.0600.b: "Fight with orthodox techniques only"
 murim_forbidden_technique.0600.c: "Withdraw — too dangerous"

 # ===========================
 # ASCENSION LOCALIZATION
 # ===========================

 # Decisions
 murim_attempt_half_immortal_decision: "Attempt Half-Immortal Ascension"
 murim_attempt_half_immortal_decision_desc: "Your cultivation has reached the peak of mortal limits. Beyond lies the realm of immortals — power that transcends flesh and time. The attempt may kill you."
 murim_attempt_half_immortal_decision_tooltip: "Begin the ascension breakthrough"
 murim_attempt_half_immortal_tt: "You will undergo a 30-day trial. Success grants Half-Immortal status. Failure may cripple your cultivation permanently."
 murim_attempt_true_immortal_decision: "Attempt True Immortal Ascension"
 murim_attempt_true_immortal_decision_desc: "As a Half-Immortal, you stand at the threshold of true transcendence. The final step is the most dangerous — but the reward is eternity."
 murim_attempt_true_immortal_decision_tooltip: "Attempt the final ascension"
 murim_attempt_true_immortal_tt: "A 60-day trial awaits. Only the strongest, wisest, and most determined succeed."
 murim_face_heavens_tribulation_decision: "Face Heaven's Tribulation"
 murim_face_heavens_tribulation_decision_desc: "Heaven has noticed your cultivation. Lightning tribulation approaches — face it now on your terms, or wait until it strikes without warning."
 murim_face_heavens_tribulation_decision_tooltip: "Confront Heaven's lightning trial"
 murim_create_legacy_technique_decision: "Create a Legacy Technique"
 murim_create_legacy_technique_decision_desc: "As an immortal, you have the power to create techniques that will outlive dynasties. Leave your mark on the martial world for eternity."
 murim_create_legacy_technique_decision_tooltip: "Create an immortal-level technique"

 # Traits
 murim_half_immortal_desc: "Has touched the boundary between mortal and immortal. Aging has slowed dramatically and power exceeds mortal limits."
 murim_true_immortal_desc: "A True Immortal — ageless, transcendent, and wielding power that reshapes the world. Only a handful have achieved this in all of history."
 murim_ascension_failed_desc: "The ascension attempt failed catastrophically, leaving permanent damage to cultivation foundations."

 # Events
 murim_ascension.0001.t: "The Threshold of Immortality"
 murim_ascension.0001.desc: "The heavens darken. Thunder rolls across a clear sky. Every cultivator within a thousand li feels your qi surge as you stand at the boundary between mortal and immortal. The entire martial world holds its breath."
 murim_ascension.0001.a: "Face Heaven's judgment"
 murim_ascension.0001.b: "Postpone — prepare further"
 murim_ascension.0001.c: "Abandon the attempt"

 murim_ascension.0005.t: "An Ascension Attempt!"
 murim_ascension.0005.desc: "Word spreads like wildfire — someone is attempting to ascend to immortality. The sky itself responds, clouds swirling into impossible patterns. Whatever happens next will reshape the martial world."
 murim_ascension.0005.a: "Support their ascension"
 murim_ascension.0005.b: "This threatens the balance"
 murim_ascension.0005.c: "Observe and learn"

 murim_ascension.0010.t: "The Three Trials of True Immortality"
 murim_ascension.0010.desc: "To become a True Immortal, you must pass three trials: Strength to overcome all opposition, Wisdom to comprehend the Dao, and Will to endure what no mortal can. Choose your path."
 murim_ascension.0010.a: "Begin with the Trial of Strength"
 murim_ascension.0010.b: "Begin with the Trial of Wisdom"
 murim_ascension.0010.c: "Not ready — retreat"

 murim_ascension.0011.t: "Trial of Strength"
 murim_ascension.0011.desc: "A barrier of pure heavenly energy stands before you — visible only to those who have reached this level. It radiates power that would instantly kill any mortal. To pass, you must shatter it with raw force."
 murim_ascension.0011.a: "Shatter the barrier"
 murim_ascension.0011.b: "Pull back"

 murim_ascension.0012.t: "Trial of Wisdom"
 murim_ascension.0012.desc: "The Dao manifests before you as an infinitely complex tapestry of cause and effect, fate and free will. To pass this trial, you must unravel its secrets — not with force, but with understanding."
 murim_ascension.0012.a: "Unravel the Dao"
 murim_ascension.0012.b: "The answer eludes you"

 murim_ascension.0020.t: "Heaven's Tribulation"
 murim_ascension.0020.desc: "Nine bolts of heavenly lightning descend from a sky that moments ago was clear. Each bolt is stronger than the last. The ground shatters, trees ignite, and the very air screams. This is Heaven's response to mortal ambition."
 murim_ascension.0020.a: "Face the nine bolts head-on"
 murim_ascension.0020.b: "Use a protective formation"
 murim_ascension.0020.c: "Flee — forfeit the breakthrough"

 murim_ascension.0030.t: "Creating a Legacy"
 murim_ascension.0030.desc: "As an immortal, your understanding of martial arts transcends mortal comprehension. You have the ability to create entirely new techniques — arts that will be practiced for millennia."
 murim_ascension.0030.a: "Create an offensive legacy technique"
 murim_ascension.0030.b: "Create a defensive/healing technique"
 murim_ascension.0030.c: "Create a cultivation method"

 murim_ascension.0040.t: "Clash of Immortals"
 murim_ascension.0040.desc: "The heavens can only bear so many immortals. Another being of transcendent power challenges your right to exist in this realm. Mountains crack, rivers boil, and the mortal world trembles."
 murim_ascension.0040.a: "Accept the challenge"
 murim_ascension.0040.b: "Propose coexistence"
 murim_ascension.0040.c: "Retreat to another realm"

 murim_ascension.0050.t: "The Weight of Eternity"
 murim_ascension.0050.desc: "Immortality brings clarity — and loneliness. The mortals around you age and die while you remain unchanged. Perhaps it is time to pass your knowledge to a new generation."
 murim_ascension.0050.a: "Take a personal disciple"
 murim_ascension.0050.b: "Scatter teachings across the world"
 murim_ascension.0050.c: "Guard your knowledge"

 murim_ascension.0060.t: "Time Stands Still"
 murim_ascension.0060.desc: "Another year passes, and while those around you grow grey and frail, you remain as you were. Your immortal cultivation sustains your body against the ravages of time."
 murim_ascension.0060.a: "Eternity stretches before me"
