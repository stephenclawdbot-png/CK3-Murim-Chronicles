l_english:
 murim_combat.0001.t: "The Nine Peaks Tournament"
 murim_combat.0001.desc: "The legendary Nine Peaks Tournament has opened its gates. Cultivators from across the realm gather at the mountain arena, their qi crackling with barely contained power. To enter is to risk everything -- to triumph is to carve your name into martial immortality."
 murim_combat.0001.a: "Enter the tournament and fight my way up."
 murim_combat.0001.b: "Fight cautiously and preserve my strength."
 murim_combat.0001.c: "Challenge the champion directly!"
 murim_combat.0002.t: "Forbidden Technique Awakening"
 murim_combat.0002.desc: "The forbidden power slumbering within your meridians stirs, demanding release. Dark qi crackles along your fingertips, promising devastation beyond mortal limits. To master it requires iron discipline -- to unleash it without control means consuming everything around you."
 murim_combat.0002.a: "Channel it with careful discipline."
 murim_combat.0002.b: "Unleash it upon a living target."
 murim_combat.0002.c: "Seal the power away permanently."
 murim_combat.0002.d: "Sacrifice myself to destroy it utterly."
 murim_combat.0003.t: "Weapon Spirit Awakening"
 murim_combat.0003.desc: "Your weapon shudders in your grip as a sentient consciousness within it stirs to life. The weapon spirit reaches out to your mind, testing your resolve, demanding either partnership or subjugation. The bond you forge here will define your martial path forever."
 murim_combat.0003.a: "Commune peacefully to form a bond."
 murim_combat.0003.b: "Dominate the spirit by force of will."
 murim_combat.0003.c: "Release the spirit and let it go free."
 murim_combat.0003.d: "Merge completely -- body, weapon, and soul."
 murim_combat.0004.t: "Sect Under Siege"
 murim_combat.0004.desc: "Enemy cultivators pour through the shattered gate of your sect compound. Disciples fall in the courtyard as formations collapse under the assault. As sect master, the survival of everything you have built depends on the choices you make in the next heartbeat."
 murim_combat.0004.a: "Rally disciples and hold the formations."
 murim_combat.0004.b: "Challenge their leader to single combat."
 murim_combat.0004.c: "Activate the sect's defensive formations."
 murim_combat.0004.d: "Abandon the sect and flee."
 murim_combat.0005.t: "Death Match Challenge"
 murim_combat.0005.desc: "A blood-sealed challenge letter lies before you. Another cultivator demands a death match -- no rules, no mercy, no surrender. Only one walks away. Your opponent's reputation is fearsome, but refusing means eternal shame in the eyes of the martial world."
 murim_combat.0005.a: "Accept the death match with honor."
 murim_combat.0005.b: "Use a forbidden technique to guarantee victory."
 murim_combat.0005.c: "Sacrifice myself to empower my heir."
 murim_combat.0006.t: "Massacre at the Valley"
 murim_combat.0006.desc: "Screams echo through the mountain valley as a demonic sect rampages through a peaceful settlement. Bodies litter the streets and smoke chokes the sky. You have arrived at the scene of a massacre in progress -- every moment of hesitation costs innocent lives."
 murim_combat.0006.a: "Charge in and protect the survivors!"
 murim_combat.0006.b: "Retreat and swear vengeance for later."
 murim_combat.0006.c: "Join the massacre for dark power."
 murim_combat.0006.d: "Manipulate events from the shadows."
