l_english:
 murim_orthodox.0001.t: "The Thousand Buddha Palm"
 murim_orthodox.0001.desc: "During morning meditation in the Great Hall, the golden Buddha statues seem to glow. As you perform the Thousand Buddha Palm forms, each movement resonates with centuries of accumulated Buddhist qi. You feel the technique opening paths in your meridians that pure martial training never could."
 murim_orthodox.0001.a: "Train the palm technique to perfection"
 murim_orthodox.0001.b: "Meditate on the Buddhist principles behind it"
 murim_orthodox.0001.c: "Teach the basics to junior monks"

 murim_orthodox.0002.t: "Heresy in the Temple"
 murim_orthodox.0002.desc: "A senior monk has been secretly studying forbidden Shaolin techniques — the ones sealed in the Sutra Pavilion's restricted section. Worse, they've been teaching selected disciples in secret. The techniques are powerful but violate the temple's fundamental principles."
 murim_orthodox.0002.a: "Enforce temple law strictly"
 murim_orthodox.0002.b: "Hear them out — perhaps the rules need updating"
 murim_orthodox.0002.c: "Study the forbidden techniques yourself first"

 murim_orthodox.0003.t: "Tai Chi Epiphany at Dawn"
 murim_orthodox.0003.desc: "As mist swirls around Wudang's peaks at dawn, you perform the Tai Chi forms on the edge of a cliff. Suddenly, the movements of clouds, the flow of water down the mountain, the gentle push of wind — they all mirror the Tai Chi principle. Yin and yang dance before your eyes."
 murim_orthodox.0003.a: "Integrate this insight into my cultivation"
 murim_orthodox.0003.b: "Develop a new technique from this epiphany"
 murim_orthodox.0003.c: "Simply... be. Let the moment exist perfectly"

 murim_orthodox.0004.t: "The Purity Debate"
 murim_orthodox.0004.desc: "Wudang's council convenes to debate a divisive question: should the sect maintain strict Taoist orthodoxy, or adapt to the changing jianghu? Modernizers argue for practical alliances and new techniques. Traditionalists insist the old ways preserve Wudang's spiritual power."
 murim_orthodox.0004.a: "Defend tradition — our identity is our strength"
 murim_orthodox.0004.b: "Mediate — find the Middle Way"
 murim_orthodox.0004.c: "Push for reform — study all available knowledge"

 murim_orthodox.0005.t: "Sword Dance Under Peach Blossoms"
 murim_orthodox.0005.desc: "On Mount Hua's legendary Sword Terrace, peach blossoms fall like pink snow around you as you practice. Each petal that touches your blade is cut cleanly in two. Your sword art has never felt sharper, never more precise. The mountain itself seems to guide your hand."
 murim_orthodox.0005.a: "Push the sword art to its limits"
 murim_orthodox.0005.b: "Contemplate the beauty — art informs martial skill"
 murim_orthodox.0005.c: "Share this perfect moment with a fellow disciple"

 murim_orthodox.0006.t: "The Sword-Qi Schism"
 murim_orthodox.0006.desc: "Mount Hua is fracturing. The Sword faction believes in external martial perfection — faster, deadlier bladework. The Qi faction insists that internal cultivation and qi projection is the true path. Disciples are choosing sides. The sect's unity hangs by a thread."
 murim_orthodox.0006.a: "Champion the Sword faction — skill is everything"
 murim_orthodox.0006.b: "Champion the Qi faction — internal power transcends"
 murim_orthodox.0006.c: "Unite both sides — true mastery is both"

 murim_orthodox.0007.t: "Eyes and Ears Everywhere"
 murim_orthodox.0007.desc: "The Beggar Sect's greatest weapon isn't martial arts — it's information. Your network of beggars, street urchins, and wanderers stretches across every city and village. Today, they bring you intelligence that could shift the balance of power in the entire jianghu."
 murim_orthodox.0007.a: "Use the intelligence for our sect's advantage"
 murim_orthodox.0007.b: "Share it to prevent an injustice"
 murim_orthodox.0007.c: "Sell the information to interested parties"

 murim_orthodox.0008.t: "The Dog Beating Staff"
 murim_orthodox.0008.desc: "The legendary Dog Beating Staff — symbol of Beggar Sect leadership — must pass to a new generation. As a senior member, you have a say in who wields it next. The staff isn't just a weapon; it represents the sect's soul. Choose wrongly, and the Beggar Sect crumbles."
 murim_orthodox.0008.a: "Claim the staff for yourself"
 murim_orthodox.0008.b: "Support the most worthy candidate"
 murim_orthodox.0008.c: "Maneuver your preferred candidate into position"

 murim_orthodox.0009.t: "The Wooden Dummy Gauntlet"
 murim_orthodox.0009.desc: "Shaolin's legendary training hall contains 108 bronze mechanical dummies — each armed with spinning arms, jabbing poles, and swinging chains. To earn the Iron Arhat rank, a monk must fight through all 108 without stopping. Many have tried. Few have succeeded without serious injury."
 murim_orthodox.0009.a: "Attempt the full 108-dummy gauntlet"
 murim_orthodox.0009.b: "Train in stages — build up gradually"
 murim_orthodox.0009.c: "Focus on meditation instead of physical trials"

 murim_orthodox.0010.t: "Pilgrimage to Song Mountain"
 murim_orthodox.0010.desc: "The abbot has declared a sacred pilgrimage to Song Mountain's peak — walking barefoot, meditating at each of the seven shrines, and fasting for the entire journey. Those who complete the pilgrimage return with deepened spiritual cultivation and clearer qi channels."
 murim_orthodox.0010.a: "Complete the full pilgrimage with devotion"
 murim_orthodox.0010.b: "Travel the route but engage with people along the way"
 murim_orthodox.0010.c: "Use the journey to gather intelligence"

 murim_orthodox.0011.t: "Raiders at the Temple Gates"
 murim_orthodox.0011.desc: "A band of demonic cultivators has attacked Shaolin's outer gates. The younger monks look to you as the temple burns. The raiders are skilled and numerous, but Shaolin has never fallen. You must decide how to defend the sacred grounds your order has protected for centuries."
 murim_orthodox.0011.a: "Lead the counterattack personally"
 murim_orthodox.0011.b: "Negotiate — ask what they want"
 murim_orthodox.0011.c: "Set traps and use the temple's defenses"

 murim_orthodox.0012.t: "The Yin-Yang Sword Formation"
 murim_orthodox.0012.desc: "Wudang's legendary paired sword technique requires two cultivators in perfect harmony — one wielding the Yang sword of aggressive strikes, the other the Yin sword of flowing defense. A fellow disciple approaches you to master this formation together. The technique is devastating when perfected."
 murim_orthodox.0012.a: "Train the formation — become an unstoppable pair"
 murim_orthodox.0012.b: "Partner up and strengthen the bond"
 murim_orthodox.0012.c: "Study the theory through meditation first"

 murim_orthodox.0013.t: "Taoist Alchemy Experiment"
 murim_orthodox.0013.desc: "The Wudang alchemical tradition runs deep. You've gathered rare ingredients for an experimental longevity elixir — Jade Dew Mushroom, Celestial Cloud Root, and water from the Seven Stars Spring. The refinement process is delicate. Success could extend your cultivation prime by decades."
 murim_orthodox.0013.a: "Attempt the refinement with full concentration"
 murim_orthodox.0013.b: "Sell the ingredients to fund other pursuits"
 murim_orthodox.0013.c: "Store them for when I'm more experienced"

 murim_orthodox.0014.t: "The Mountain Hermit's Challenge"
 murim_orthodox.0014.desc: "An ancient Taoist hermit — said to be over 200 years old — descends from the peaks above Wudang. He challenges you to a philosophical debate: 'If the Tao that can be told is not the eternal Tao, how can you teach martial arts at all?' Your answer will shape your understanding."
 murim_orthodox.0014.a: "Engage the debate with humility"
 murim_orthodox.0014.b: "Challenge them to demonstrate through combat"
 murim_orthodox.0014.c: "Listen quietly and absorb their wisdom"

 murim_orthodox.0015.t: "The Cliff Face Trial"
 murim_orthodox.0015.desc: "Mount Hua's most dangerous trial: climbing the sheer cliff face known as the Heavenly Ladder — a vertical ascent of bare rock with nothing but qi-enhanced grip and iron will. At the top waits a hidden cultivation cave where the sect's founder once meditated."
 murim_orthodox.0015.a: "Climb it — prove my worth"
 murim_orthodox.0015.b: "Prepare extensively before attempting"
 murim_orthodox.0015.c: "There's no shame in waiting until I'm stronger"

 murim_orthodox.0016.t: "Hosting the Sword Conference"
 murim_orthodox.0016.desc: "Mount Hua has been chosen to host this decade's Sword Conference — a gathering where the greatest sword cultivators from every sect demonstrate their arts. As a representative, your performance will define Mount Hua's reputation for the next ten years."
 murim_orthodox.0016.a: "Showcase our most powerful sword techniques"
 murim_orthodox.0016.b: "Focus on diplomacy and building connections"
 murim_orthodox.0016.c: "Use the gathering to scout rival sects"

 murim_orthodox.0017.t: "The Lost Technique Scroll"
 murim_orthodox.0017.desc: "While repairing the sect's ancient library after a storm, you discover a hidden compartment containing a scroll sealed with the founding master's personal sigil. The scroll contains a sword technique thought to have been destroyed — the legendary Plum Blossom Swordsmanship's final form."
 murim_orthodox.0017.a: "Study and master the lost technique"
 murim_orthodox.0017.b: "Present it to the sect for everyone's benefit"
 murim_orthodox.0017.c: "Sell copies to fund the sect's recovery"

 murim_orthodox.0018.t: "The Grand Gathering"
 murim_orthodox.0018.desc: "The Beggar Sect's annual Grand Gathering brings thousands of members from across the land. Elders, branch leaders, and wandering beggars all converge. It's a time for settling disputes, sharing intelligence, and deciding the sect's direction for the coming year."
 murim_orthodox.0018.a: "Take a leadership role in the proceedings"
 murim_orthodox.0018.b: "Focus on charity and community building"
 murim_orthodox.0018.c: "Use the gathering to trade information"

 murim_orthodox.0019.t: "The Eighteen Dragon Subduing Palms"
 murim_orthodox.0019.desc: "The Beggar Sect's supreme technique — the Eighteen Dragon Subduing Palms — has been passed down to only the most worthy leaders. The current keeper offers to teach you the first nine forms. Each palm channels qi in patterns that mimic a dragon's movements, devastating in their power."
 murim_orthodox.0019.a: "Train relentlessly to master all nine forms"
 murim_orthodox.0019.b: "Study the theory before practicing"
 murim_orthodox.0019.c: "Share the training opportunity with others"

 murim_orthodox.0020.t: "Defending the Common Folk"
 murim_orthodox.0020.desc: "Villagers rush to your camp with desperate pleas — a local warlord's cultivators are extorting entire villages, seizing harvests and kidnapping young people with cultivation potential. The Beggar Sect has always been the people's protector. They're counting on you."
 murim_orthodox.0020.a: "Mobilize the sect to confront the warlord"
 murim_orthodox.0020.b: "Gather intelligence and plan a covert operation"
 murim_orthodox.0020.c: "Rally other sects to join the cause"
