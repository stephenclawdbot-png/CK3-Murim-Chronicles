l_english:
 # =============================================
 # MENTOR EXPANSION LOCALIZATION
 # =============================================
 murim_mentor_exp.0001.t:0 "Master's Hidden Past"
 murim_mentor_exp.0001.desc:0 "Whispers in the jianghu have reached your ears - your master, the one who trained you with such patience, was once known as a feared killer. The Blood Shadow, they called them. Dozens fell to their blade before they renounced violence and took you as a disciple."
 murim_mentor_exp.0001.a:0 "Everyone deserves redemption. I stand by my master."
 murim_mentor_exp.0001.b:0 "I demand the truth - face me, Master!"
 murim_mentor_exp.0001.b.win:0 "Your master nods with respect as you match their blade."
 murim_mentor_exp.0001.b.draw:0 "Neither of you can gain the upper hand."
 murim_mentor_exp.0001.b.lose:0 "Your master's killing intent floods the clearing."
 murim_mentor_exp.0001.c:0 "The authorities should know about this criminal."

 murim_mentor_exp.0002.t:0 "Graduation Ceremony"
 murim_mentor_exp.0002.desc:0 "After years of grueling training, your master stands before you with a solemn expression. 'There is nothing more I can teach you,' they say, their voice carrying both pride and sadness. 'It is time for you to walk your own path in the martial world.'"
 murim_mentor_exp.0002.a:0 "I will carry your teachings with honor, Master."
 murim_mentor_exp.0002.b:0 "Let us have one final duel - I will surpass you!"
 murim_mentor_exp.0002.b.surpass:0 "Your blade sings past your master's guard. They smile."
 murim_mentor_exp.0002.b.close:0 "Blow for blow, neither can claim victory."
 murim_mentor_exp.0002.b.humbled:0 "Your master's final lesson: humility."
 murim_mentor_exp.0002.c:0 "I am not ready. Let me stay a while longer."

 murim_mentor_exp.0003.t:0 "Master's Sacrifice"
 murim_mentor_exp.0003.desc:0 "The assassin's blade was meant for you. But your master moved faster than you have ever seen them move before - and took the blow in your place. As they lie in your arms, blood pooling beneath them, they whisper their final technique into your ear."
 murim_mentor_exp.0003.a:0 "I will find them. I will kill them. I SWEAR IT!"
 murim_mentor_exp.0003.b:0 "I will honor your memory through peaceful cultivation."
 murim_mentor_exp.0003.c:0 "The martial world took everything... I am done."

 murim_mentor_exp.0004.t:0 "Temptation of Forbidden Scrolls"
 murim_mentor_exp.0004.desc:0 "Your master's private study stands open. Inside, you can see the forbidden technique scrolls - the ones they swore they would never teach anyone. The Heaven-Rending Palm. The Soul-Severing Blade Art. Knowledge that could make you the strongest in the martial world... if you dare take it."
 murim_mentor_exp.0004.a:0 "Take the scrolls. Power is all that matters."
 murim_mentor_exp.0004.a.success:0 "The scrolls are yours. Such power..."
 murim_mentor_exp.0004.a.partial:0 "You grab what you can before the alarms sound."
 murim_mentor_exp.0004.a.caught:0 "Your master's hand clamps on your wrist. 'Traitor.'"
 murim_mentor_exp.0004.b:0 "No. My master's trust means more than any technique."
 murim_mentor_exp.0004.c:0 "Perhaps if I ask respectfully, they will teach me."

 murim_mentor_exp.0005.t:0 "The Legacy Weapon"
 murim_mentor_exp.0005.desc:0 "Before you lies your master's most treasured possession - the weapon that carved their legend across the martial world. Whether through graduation, sacrifice, or the passing of time, the weapon has come to you. Its weight carries the history of every battle your master ever fought."
 murim_mentor_exp.0005.a:0 "I swear on this blade to uphold my master's honor."
 murim_mentor_exp.0005.b:0 "I will reforge it - a new weapon for a new era."
 murim_mentor_exp.0005.c:0 "Seal it away. This weapon is too dangerous for the world."

 # =============================================
 # ROMANCE EXPANSION LOCALIZATION
 # =============================================
 murim_romance_exp.0001.t:0 "Love Letter Intercepted"
 murim_romance_exp.0001.desc:0 "A servant rushes in, breathless. Your private love letter - the one you wrote to your forbidden beloved from the rival sect - has been intercepted by the sect elders. They are demanding an explanation. Your relationship, once safely secret, is now exposed for all to judge."
 murim_romance_exp.0001.a:0 "It was nothing. A forgery to discredit me."
 murim_romance_exp.0001.b:0 "I love them. I will declare it before the entire sect."
 murim_romance_exp.0001.c:0 "Perhaps... it is time to end this relationship."

 murim_romance_exp.0002.t:0 "Dual Cultivation Catastrophe"
 murim_romance_exp.0002.desc:0 "The dual cultivation session was going perfectly - your qi flowing in harmony with your partner's, both of you ascending to new heights of power. Then something went wrong. A dissonance in your meridians. Your partner's qi is spiraling out of control, threatening to destroy you both."
 murim_romance_exp.0002.a:0 "Sacrifice my own cultivation to stabilize them!"
 murim_romance_exp.0002.b:0 "We contain this together, or we fall together."
 murim_romance_exp.0002.c:0 "Sever the connection. Save yourself."

 murim_romance_exp.0003.t:0 "Romantic Rival's Ultimate Challenge"
 murim_romance_exp.0003.desc:0 "They stand before you in the moonlit courtyard, blade drawn. The other suitor - the one who has coveted your beloved for years. 'Enough games,' they snarl. 'We settle this the way all things are settled in the martial world. Whoever survives claims their heart.'"
 murim_romance_exp.0003.a:0 "Draw steel. Let fate decide who is worthy."
 murim_romance_exp.0003.a.win:0 "Your rival falls. The path to your beloved is clear."
 murim_romance_exp.0003.a.lose:0 "The world spins. Your rival stands triumphant."
 murim_romance_exp.0003.b:0 "This is madness. Love is not a prize to be won."
 murim_romance_exp.0003.c:0 "Let them have this fight. I will pursue another path."

 murim_romance_exp.0004.t:0 "Kidnapping Rescue Mission"
 murim_romance_exp.0004.desc:0 "A blood-stained note arrives: your beloved has been taken. The kidnappers demand the Heaven-Splitting Scripture in exchange. You have three days. The trail leads deep into the forbidden mountains where even the strongest cultivators fear to tread."
 murim_romance_exp.0004.a:0 "I ride alone. No one else risks their life for my love."
 murim_romance_exp.0004.b:0 "Gather allies. We storm their stronghold together."
 murim_romance_exp.0004.c:0 "Pay the ransom. The scripture is not worth their life."

 murim_romance_exp.0005.t:0 "Cultivation Partner's Betrayal"
 murim_romance_exp.0005.desc:0 "The truth hits you like a strike to the chest. Your cultivation partner - your beloved - has been feeding your cultivation insights to a rival sect all along. Every breakthrough you shared, every technique you demonstrated during dual cultivation, has been recorded and sold. Your love was a weapon aimed at your heart."
 murim_romance_exp.0005.a:0 "Confront them. Demand the truth from their own lips."
 murim_romance_exp.0005.b:0 "Feed them false techniques. Two can play this game."
 murim_romance_exp.0005.c:0 "Sever all ties. Walk away before it destroys you."

 # =============================================
 # ARTIFACT EXPANSION LOCALIZATION
 # =============================================
 murim_artifact_exp.0001.t:0 "Spirit Beast Encounter"
 murim_artifact_exp.0001.desc:0 "A rare spirit beast has been sighted in your territory - a creature of immense qi that could become a powerful companion or a deadly foe. Its roar shakes the trees, and its eyes glow with ancient intelligence. The beast regards you with a predator's calculus."
 murim_artifact_exp.0001.a:0 "Overwhelm it with raw qi pressure. Submit, beast!"
 murim_artifact_exp.0001.b:0 "Use the ancient beast-taming technique from an old scroll."
 murim_artifact_exp.0001.c:0 "Set an alchemical trap. Cunning over force."

 murim_artifact_exp.0002.t:0 "Ancient Formation Blueprint"
 murim_artifact_exp.0002.desc:0 "Hidden among crumbling archives, you discover blueprints for a legendary protective formation. The diagrams show complex arrays of qi channels that, when activated, could shield an entire territory from attack. The calligraphy is thousands of years old, yet the ink still pulses with residual energy."
 murim_artifact_exp.0002.a:0 "Attempt to activate the formation immediately."
 murim_artifact_exp.0002.b:0 "Study the blueprint carefully over years."
 murim_artifact_exp.0002.c:0 "Sell the blueprint to a wealthy sect."
 murim_artifact_exp.0002.d:0 "Destroy it. This power is too dangerous for anyone."

 murim_artifact_exp.0003.t:0 "The Legendary Forge"
 murim_artifact_exp.0003.desc:0 "Deep beneath the mountains, you find it - the forge of the legendary weaponsmith Heavenly Iron Master. The anvil still radiates heat after millennia. The formation arrays carved into the walls hum with dormant power. With the right materials and enough qi, this forge could create weapons that rival the divine."
 murim_artifact_exp.0003.a:0 "Feed it my blood and qi. Forge a soul-bound weapon."
 murim_artifact_exp.0003.b:0 "Forge weapons for my sect's elite warriors."
 murim_artifact_exp.0003.c:0 "Seal the forge. No one should wield such power."
 murim_artifact_exp.0003.d:0 "Sell the forge's location to the highest bidder."

 murim_artifact_exp.0004.t:0 "The Cursed Scripture"
 murim_artifact_exp.0004.desc:0 "The scripture writhes with visible demonic qi, dark tendrils of energy lashing out at anyone who draws near. Within its pages lie techniques of devastating power - but the demonic corruption has claimed the sanity of every cultivator who has attempted to read it. A purification ritual might cleanse it... or might unleash something worse."
 murim_artifact_exp.0004.a:0 "Begin the purification ritual with righteous qi."
 murim_artifact_exp.0004.b:0 "Study it from a safe distance. Knowledge without risk."
 murim_artifact_exp.0004.c:0 "Burn it. No technique is worth demonic corruption."
 murim_artifact_exp.0004.d:0 "Embrace the darkness. Practice the demonic arts within."

 murim_artifact_exp.0005.t:0 "Underground Artifact Auction"
 murim_artifact_exp.0005.desc:0 "Through jianghu whisper networks, you learn of a secret auction deep in the underground. Legendary weapons, forbidden scrolls, rare spirit pills - all available to the highest bidder. The location changes each time, the attendees wear masks, and the security is handled by some of the deadliest fighters in the martial world."
 murim_artifact_exp.0005.a:0 "Bid on a legendary weapon. Power through steel."
 murim_artifact_exp.0005.b:0 "Bid on a forbidden cultivation manual."
 murim_artifact_exp.0005.c:0 "Bid on rare spirit pills and elixirs."
 murim_artifact_exp.0005.d:0 "Rob the auction. Take everything by force."

 # =============================================
 # SECT ADVANCED LOCALIZATION
 # =============================================
 murim_sect_adv.0001.t:0 "Elder Council Assassination Plot"
 murim_sect_adv.0001.desc:0 "Late at night, you overhear whispers that chill your blood. A conspiracy is forming within the sect to assassinate the elder council. The plotters have names you recognize - ambitious inner disciples, a disgruntled former elder, and someone from the outside funding it all. The attack is planned for the next full moon."
 murim_sect_adv.0001.a:0 "Warn the elders immediately. I will protect the sect."
 murim_sect_adv.0001.b:0 "Join the conspiracy. It is time for new leadership."
 murim_sect_adv.0001.c:0 "Hold this information close. Knowledge is power."
 murim_sect_adv.0001.d:0 "Flee before the blood starts flowing."

 murim_sect_adv.0002.t:0 "Sect Treasury Breached"
 murim_sect_adv.0002.desc:0 "Alarm bells shatter the dawn. The sect's sacred treasury - containing ancestral weapons, forbidden technique manuals, and centuries of accumulated spirit pills - has been broken into. The formation barriers were bypassed from the inside. This was no common thief. Someone within the sect opened the way."
 murim_sect_adv.0002.a:0 "Lead the pursuit! We track them down before they escape."
 murim_sect_adv.0002.b:0 "This was an inside job. I will find the traitor."
 murim_sect_adv.0002.c:0 "In this chaos... perhaps I can help myself to something."
 murim_sect_adv.0002.d:0 "Strengthen our defenses. Prevent this from happening again."

 murim_sect_adv.0003.t:0 "The Sect Reform Movement"
 murim_sect_adv.0003.desc:0 "A growing faction of disciples demands radical change. They want the sect's secret techniques taught to all disciples, not hoarded by elders. They want the rigid hierarchy abolished. Some even demand a merger with allied sects. The reformers grow bolder by the day, and the traditionalists sharpen their blades in response."
 murim_sect_adv.0003.a:0 "Support the reformers. The sect must evolve to survive."
 murim_sect_adv.0003.b:0 "Defend tradition. The hierarchy exists for good reason."
 murim_sect_adv.0003.c:0 "Propose a compromise. Both sides have valid points."
 murim_sect_adv.0003.d:0 "Use the chaos to form my own breakaway faction."

 murim_sect_adv.0004.t:0 "Inner Disciple Grand Tournament"
 murim_sect_adv.0004.desc:0 "Once every decade, the sect holds its grand tournament. The arena fills with cheering disciples as the strongest inner members prepare to fight for the ultimate prize: the right to learn the sect's supreme technique. The Patriarch watches from the highest seat, and the martial world has sent observers. This is your chance to make a name."
 murim_sect_adv.0004.a:0 "Enter the tournament. I will fight my way to the top."
 murim_sect_adv.0004.b:0 "Serve as a judge. Observe and learn from every fight."
 murim_sect_adv.0004.c:0 "Place bets on the outcomes. Profit from their struggle."
 murim_sect_adv.0004.d:0 "Skip the spectacle. Train alone while they waste energy."

 murim_sect_adv.0005.t:0 "Betrayal at the Wulin Congress"
 murim_sect_adv.0005.desc:0 "The Wulin Congress was supposed to be a gathering of allies - a show of unity against the growing threat of the unorthodox factions. Instead, in the middle of the Martial Alliance Leader's speech, the delegates of the Azure Cloud Sect draw their weapons. They were never allies. They have been colluding with the enemy all along. Blood sprays across the congress hall as chaos erupts."
 murim_sect_adv.0005.a:0 "Rally the remaining allies! We fight back NOW!"
 murim_sect_adv.0005.b:0 "Wait - perhaps they were coerced. Let me negotiate."
 murim_sect_adv.0005.c:0 "In chaos, opportunity. Time to eliminate my rivals."
 murim_sect_adv.0005.d:0 "Escape through the back. Survival first."
