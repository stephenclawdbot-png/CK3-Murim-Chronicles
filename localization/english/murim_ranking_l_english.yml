 # ---------------------
 # EVENT DESCRIPTIONS
 # ---------------------
 murim_rank.0001.desc_top_10:0 "Word has spread like wildfire through the martial world -- [ROOT.GetFirstName] has been recognized among the top ten martial artists in the known world! Sect leaders whisper your name with a mixture of respect and fear. Wandering swordsmen step aside when you pass. Your very presence commands the attention of every cultivator within a hundred li."
 murim_rank.0001.desc_top_20:0 "The martial world has taken notice. [ROOT.GetFirstName] has climbed into the ranks of the top twenty fighters -- a remarkable achievement that marks you as someone to be reckoned with. Sect recruiters seek your favor, and young disciples speak your name with awe."
 murim_rank.0001.desc_top_50:0 "Through years of training, countless duels, and relentless cultivation, [ROOT.GetFirstName] has finally been recognized among the Top 50 martial artists of the realm. The Wulin rankings are not given lightly -- every name on that list was carved in blood and sweat."

 murim_rank.0002.desc:0 "[ROOT.GetFirstName] has fallen from the martial rankings. Whether through injury, defeat, or the simple passage of time as younger warriors rise, the world no longer counts you among its greatest fighters. The teahouses that once buzzed with tales of your exploits now speak other names."

 murim_rank.0003.desc:0 "News arrives that a ranked martial artist has met their end. The martial rankings shift as the fallen warrior's position is vacated, and the next in line steps up. Such is the way of the Wulin -- the rankings are written in blood, and death is the ultimate demotion."

 murim_rank.0004.desc:0 "The martial world trembles with the announcement -- [ROOT.GetFirstName] now stands at the absolute pinnacle. Number One. The Supreme Martial Artist. Every sword saint, every hidden master, every ambitious young cultivator now measures themselves against you. Your name will echo through the ages... or until someone stronger comes along."

 murim_rank.0005.desc:0 "A challenger approaches! [scope:rank_challenger.GetFirstName] has formally issued a ranking challenge, seeking to claim your position in the martial rankings through combat. The rules of the Wulin are clear -- a ranking challenge cannot be ignored without consequence. The entire martial world watches."

 murim_rank.0006.desc_elite:0 "The annual martial rankings have been tallied. [ROOT.GetFirstName] stands among the elite top five -- a position that brings immense prestige but also paints an enormous target on your back. Every ambitious fighter in the realm dreams of taking your place."
 murim_rank.0006.desc_high:0 "The yearly ranking recalculation is complete. [ROOT.GetFirstName] holds a strong position in the top twenty. Respected by many, envied by more -- your rank reflects years of dedicated cultivation and proven combat ability."
 murim_rank.0006.desc_ranked:0 "Another year, another ranking. [ROOT.GetFirstName] maintains a position within the Top 50 martial artists. It is an honor to be counted among the best, though the competition grows fiercer each season."
 murim_rank.0006.desc_unranked:0 "The annual martial rankings have been announced, and [ROOT.GetFirstName]'s name is notably absent. The Top 50 is reserved for the truly exceptional. Perhaps next year will bring the breakthroughs needed to join their ranks."

 murim_rank.0007.desc:0 "A previously unknown martial artist has burst onto the scene! Through a stunning display of power at a recent tournament, [scope:rising_star.GetFirstName] has been recognized and added to the martial rankings. The established fighters eye this newcomer with a mixture of curiosity and wariness."

 murim_rank.0010.desc:0 "The Grand Martial Tournament is upon us! Every five years, the greatest fighters in the realm gather to test their skills in formal competition. The tournament offers a chance to rise dramatically in the rankings, win legendary artifacts, and earn eternal glory. Sects send their champions, lone wanderers arrive from distant mountains, and the teahouses overflow with spectators."

 # ---------------------
 # EVENT OPTIONS
 # ---------------------
 murim_rank.0001.a:0 "Let the world know my name!"
 murim_rank.0001.b:0 "I must train even harder."
 murim_rank.0001.c:0 "This fame can be useful..."

 murim_rank.0002.a:0 "I will reclaim my rank!"
 murim_rank.0002.b:0 "Perhaps it is for the best."
 murim_rank.0002.c:0 "I will forge a new path."

 murim_rank.0003.a:0 "Such is the way of martial artists."
 murim_rank.0003.b:0 "Their legacy lives on."

 murim_rank.0004.a:0 "The heavens have acknowledged me!"
 murim_rank.0004.b:0 "Heavy is the head that wears the crown."

 murim_rank.0005.a:0 "I accept! Prepare yourself!"
 murim_rank.0005.b:0 "Let me consider..."
 murim_rank.0005.c:0 "I refuse this challenge."

 murim_rank.0006.a:0 "My strength continues to grow."
 murim_rank.0006.b:0 "I must push harder next year."

 murim_rank.0007.a:0 "An interesting development..."
 murim_rank.0007.b:0 "This one bears watching."

 murim_rank.0010.a:0 "I shall enter the tournament!"
 murim_rank.0010.b:0 "I will observe from the sidelines."
 murim_rank.0010.c:0 "Send my best disciple instead."

