l_english:
 central_china.0001.t: "Sect Leadership Challenge"
 central_china.0001.desc: "Word has spread that you seek to claim leadership of your sect. The current master stands ready to defend their position, and the elders have sanctioned a formal duel at the sect's proving grounds. All eyes in the martial world are upon you."
 central_china.0001.a: "Challenge the Sect Leader to a duel!"
 central_china.0001.b: "Bide my time and cultivate further."
 central_china.0002.t: "Mandate of Heaven Resonance"
 central_china.0002.desc: "The heavens themselves seem to stir at your presence. Your cultivation has reached a level where the celestial qi responds to your will, and whispers in the jianghu say you may be worthy of the Mandate of Heaven -- the divine blessing that marks a true sovereign of the martial world."
 central_china.0002.a: "Reach out to the heavens and claim the Mandate!"
 central_china.0002.b: "Meditate on my worthiness first."
 central_china.0003.t: "Imperial Examiner's Visit"
 central_china.0003.desc: "An examiner dispatched by the Imperial Court has arrived to evaluate the caliber of martial artists under your care. This is a rare opportunity to earn recognition and resources from the throne, but a poor showing could bring shame upon your entire sect."
 central_china.0003.a: "Present my best disciples for examination."
 central_china.0003.b: "Politely decline the examination."
 central_china.0004.t: "Celestial Herb Market"
 central_china.0004.desc: "A rare herb market has appeared in the central plains, drawing alchemists and cultivators from across the land. Merchants display spirit roots, thousand-year ginseng, and exotic elixir ingredients -- but prices are steep, and counterfeits abound among the genuine treasures."
 central_china.0004.a: "Purchase rare cultivation herbs."
 central_china.0004.b: "Buy alchemy ingredients instead."
 central_china.0004.c: "Too expensive. Leave the market."
 central_china.0005.t: "Five Poisons Sect Ambush"
 central_china.0005.desc: "Assassins from the Five Poisons Sect have set an ambush along your path. Their weapons gleam with toxic coatings, and the air itself carries the faint sweetness of paralytic venom. You must decide quickly -- fight, negotiate, or flee before the poison mist closes in."
 central_china.0005.a: "Draw your weapon and fight through!"
 central_china.0005.b: "Attempt to negotiate with the assassins."
 central_china.0005.c: "Flee before the poison takes hold!"
 goryeo.0001.t: "Blade Tournament of Goryeo"
 goryeo.0001.desc: "The annual Blade Tournament is underway in the highlands of Goryeo. Warriors from every province gather to test their swordsmanship in honorable combat. Victory brings glory, gold, and the attention of powerful masters seeking worthy disciples."
 goryeo.0001.a: "Enter the tournament and fight!"
 goryeo.0001.b: "Watch from the stands as a spectator."
 goryeo.0002.t: "Hwarang Warrior Induction"
 goryeo.0002.desc: "The Hwarang -- Goryeo's elite brotherhood of martial artists and scholar-warriors -- have extended an invitation for you to join their ranks. Induction would grant you powerful allies and rigorous training, but it demands lifelong loyalty to the brotherhood's code."
 goryeo.0002.a: "Accept the induction with honor."
 goryeo.0002.b: "Decline -- I will follow my own path."
 goryeo.0003.t: "Mountain Hermit Encounter"
 goryeo.0003.desc: "Deep in the mist-shrouded peaks of Goryeo, you encounter an ancient hermit whose qi radiates with terrifying depth. He speaks in riddles and seems to perceive the very flow of your meridians. This reclusive master may hold secrets that could transform your cultivation -- if you can earn his favor."
 goryeo.0003.a: "Ask humbly to study under the hermit."
 goryeo.0003.b: "Challenge the hermit to a friendly spar."
 goryeo.0003.c: "Bow respectfully and take your leave."
 goryeo.0004.t: "Royal Court Martial Display"
 goryeo.0004.desc: "The royal court of Goryeo has invited you to demonstrate your martial arts before the king and his ministers. A spectacular performance could win you royal patronage and lasting prestige, but failure before such an audience would be a humiliation difficult to overcome."
 goryeo.0004.a: "Perform my most impressive techniques."
 goryeo.0004.b: "Politely decline the invitation."
 goryeo.0005.t: "Vengeful Spirit of a Fallen Warrior"
 goryeo.0005.desc: "In the dead of night, a spectral presence disturbs your meditation. The restless spirit of a warrior you once defeated -- or one slain by your hand -- manifests before you, radiating grief and fury. The qi disturbance sends chills through your meridians as the ghost demands reckoning."
 goryeo.0005.a: "Confront the spirit with your qi."
 goryeo.0005.b: "Perform proper funeral rites."
 goryeo.0005.c: "Ignore it -- spirits are mere superstition."
