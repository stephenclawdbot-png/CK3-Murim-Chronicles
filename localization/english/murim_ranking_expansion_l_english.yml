l_english:
 murim_ranking.0001.t: "A New Ranker Rises"
 murim_ranking.0001.desc: "Your cultivation and martial prowess have drawn the attention of the ranking elders. A formal announcement is to be made -- your name will be inscribed upon the Murim Rankings for all to see."
 murim_ranking.0001.a: "Accept with humble gratitude."
 murim_ranking.0001.b: "Use the fame to attract disciples."
 murim_ranking.0001.c: "Challenge the ranker above me."
 murim_ranking.0003.t: "Ranking Challenge Issued"
 murim_ranking.0003.desc: "Your challenge echoes through the martial world. The ranker above you has received your declaration, and the sect elders have set the date. Win or lose, the world will remember this day."
 murim_ranking.0003.a: "Accept and prepare for battle."
 murim_ranking.0003.b: "Withdraw -- not worth the risk."
 murim_ranking.0005.t: "Defending Your Rank"
 murim_ranking.0005.desc: "A bold challenger steps forward, intent on claiming your position in the rankings. Their eyes burn with ambition as they present their formal challenge before the assembled masters. Your reputation hangs in the balance."
 murim_ranking.0005.a: "Crush them decisively."
 murim_ranking.0005.b: "Show mercy to the challenger."
 murim_ranking.0005.c: "Refuse the challenge entirely."
 murim_ranking.0010.t: "Annual Ranking Ceremony"
 murim_ranking.0010.desc: "The annual Murim Ranking Ceremony draws cultivators from every corner of the martial world. Names rise and fall on the great stone tablets as the elders assess the past year's achievements."
 murim_ranking.0010.a: "Attend the ceremony."
 murim_ranking.0100.t: "Legendary Rank Achieved"
 murim_ranking.0100.desc: "Your name has been inscribed among the legends of the martial world. The Murim Rankings now list you among the supreme masters whose power transcends mortal understanding. Songs will be sung of this day for generations."
 murim_ranking.0100.a: "Let my legend resound."
 murim_ranking_events.0001.t: "Ranking Matters"
 murim_ranking_events.0001.desc: "The Murim Ranking Board has been updated, and the ripple effects spread through every sect and clan. Alliances shift, grudges deepen, and ambitious cultivators sharpen their resolve."
 murim_ranking_events.0001.a: "Note the changes carefully."
 murim_ranking_integration.0001.t: "Rank and Cultivation"
 murim_ranking_integration.0001.desc: "Your rising rank in the Murim Rankings has drawn attention to your cultivation methods. Other martial artists seek to learn from your approach, while rivals study your techniques for weaknesses."
 murim_ranking_integration.0001.a: "Let cultivation guide my ascent."
 murim_ranking_integration.0001.b: "Focus on martial refinement."
 murim_ranking_integration.0002.t: "The Weight of Rank"
 murim_ranking_integration.0002.desc: "Holding a position in the rankings brings both honor and burden. Challengers appear at your door, disciples beg for instruction, and the pressure to maintain your standing never relents."
 murim_ranking_integration.0002.a: "Bear the weight proudly."
 murim_ranking_integration.0002.b: "Find peace despite the pressure."
 murim_ranking_integration.0003.t: "Rank and Reputation"
 murim_ranking_integration.0003.desc: "Your ranking position has become inseparable from your reputation in the martial world. Every action you take is scrutinized, every word weighed by those who watch the rankings with envious eyes."
 murim_ranking_integration.0003.a: "Let reputation speak for itself."
 murim_ranking_integration.0003.b: "Deepen my understanding quietly."
 murim_ranking_integration.0010.t: "Peak Ranker Recognition"
 murim_ranking_integration.0010.desc: "The ranking elders formally recognize your extraordinary position among the martial world's elite. A grand ceremony is held in your honor, attended by sect leaders and clan patriarchs from across the land."
 murim_ranking_integration.0010.a: "Accept this supreme recognition."
 murim_cultivation.0001.t: "The First Step"
 murim_cultivation.0001.desc: "You sit cross-legged beneath an ancient tree, drawing your first conscious breath of qi. The energy of heaven and earth flows through your body like a gentle stream. The path of cultivation stretches endlessly before you."
 murim_cultivation.0001.a: "Follow the orthodox path."
 murim_cultivation.0001.b: "Push to my absolute limits."
 murim_cultivation.0001.c: "Seek a master's guidance."
 murim_cultivation.0020.t: "Meridian Opening"
 murim_cultivation.0020.desc: "Your qi has accumulated enough to attempt opening a new meridian. The blocked channel pulses with potential, but forcing it could cause devastating backlash. Patience or boldness -- the choice is yours."
 murim_cultivation.0020.a: "Force it open with pure qi."
 murim_cultivation.0020.b: "Follow the natural flow."
 murim_cultivation.0021.t: "Qi Deviation Warning"
 murim_cultivation.0021.desc: "Your qi flow has become erratic and unstable. Dark energy swirls within your dantian, threatening to tear your meridians apart. This is the dreaded qi deviation -- cultivators have been destroyed by less."
 murim_cultivation.0021.a: "Stabilize through meditation."
 murim_cultivation.0021.b: "Push through the danger."
 murim_cultivation.0022.t: "Dantian Formation"
 murim_cultivation.0022.desc: "The moment has arrived. Your accumulated qi begins to condense within your lower dantian, forming the golden core that will serve as the foundation for all future cultivation. The world holds its breath."
 murim_cultivation.0022.a: "Condense the golden core."
 murim_cultivation.0100.t: "Cultivation Mastery"
 murim_cultivation.0100.desc: "Your cultivation has reached a realm that few mortals dare to dream of. The qi within you flows like a mighty river, and the boundary between heaven and earth grows thin beneath your feet. A new era of power begins."
 murim_cultivation.0100.a: "Ascend to a new realm entirely."
 murim_cultivation_events.0001.t: "Cultivation Progress"
 murim_cultivation_events.0001.desc: "Your daily cultivation practice yields steady results. Each session deepens your understanding of qi circulation, and you can feel your internal energy growing stronger with every passing day."
 murim_cultivation_events.0001.a: "Continue the steady practice."
 murim_technique.0401.t: "Palm Technique Mastery"
 murim_technique.0401.desc: "Through relentless practice, you have mastered an advanced palm technique. Your strikes now carry the weight of mountains, and the qi channeled through your palms can shatter stone."
 murim_technique.0401.a: "Refine the technique further."
 murim_technique.0401.b: "Demonstrate it publicly."
 murim_technique.0402.t: "Finger Technique Refinement"
 murim_technique.0402.desc: "Your finger technique has reached a new level of precision. Each strike targets vital pressure points with surgical accuracy, and the qi concentrated at your fingertips can pierce through defenses like needles through silk."
 murim_technique.0402.a: "Perfect the deadly precision."
 murim_technique.0402.b: "Showcase the technique."
 murim_technique.0501.t: "Body Tempering Breakthrough"
 murim_technique.0501.desc: "Through brutal physical conditioning, your body has undergone a fundamental transformation. Your skin is tougher than leather, your bones denser than iron. Pain that once crippled you now barely registers."
 murim_technique.0501.a: "Push the tempering further."
 murim_technique.0501.b: "Balance body and technique."
 murim_technique.0700.t: "Qinggong -- Lightness Technique"
 murim_technique.0700.desc: "You have unlocked the secrets of Qinggong. Your feet barely touch the ground as you move, and you can traverse rooftops and treetops as easily as a bird. The wind itself seems to carry you."
 murim_technique.0700.a: "Master the art of flight."
 murim_technique.0700.b: "Integrate it into combat."
 murim_technique.0800.t: "Internal Energy Circulation"
 murim_technique.0800.desc: "Your internal energy circulation has achieved a new level of efficiency. Qi flows through your meridians in a perfect cycle, nourishing every cell and strengthening your foundation with each revolution."
 murim_technique.0800.a: "Deepen the circulation."
 murim_technique.0800.b: "Channel it into raw power."
 murim_technique.0900.t: "Weapon Forging Art"
 murim_technique.0900.desc: "You have learned the ancient art of forging weapons infused with qi. The metal sings beneath your hammer as you channel cultivation energy into the blade, creating a weapon that resonates with your martial spirit."
 murim_technique.0900.a: "Forge a masterwork weapon."
 murim_technique.0900.b: "Display the forging mastery."
 murim_technique.1100.t: "Formation Combat"
 murim_technique.1100.desc: "You have unlocked the secrets of formation combat -- coordinating multiple fighters into a devastating array that multiplies their combined power. When your disciples move as one, they can challenge opponents far above their rank."
 murim_technique.1100.a: "Drill the formation relentlessly."
 murim_technique.1100.b: "Teach formation leadership."
 murim_technique.1400.t: "Forbidden Technique Discovered"
 murim_technique.1400.desc: "Hidden within an ancient tomb, you discover a scroll containing a technique sealed away by the founders themselves. The power within is immense, but the warnings etched into the stone speak of madness and death."
 murim_technique.1400.a: "Study the forbidden technique."
 murim_technique.1400.b: "Destroy it immediately."
 murim_technique.1400.c: "Seal it away for safekeeping."
 murim_technique_events.0001.t: "Technique Practice"
 murim_technique_events.0001.desc: "Daily technique practice yields incremental improvements. Each repetition burns the movements deeper into muscle memory, and your qi responds more readily to your martial intent."
 murim_technique_events.0001.a: "Continue dedicated practice."
 murim_duel.0005.t: "A Formal Challenge"
 murim_duel.0005.desc: "A martial artist of considerable skill has issued a formal duel challenge, delivered by messenger on crimson paper according to tradition. The terms are set, the location chosen. The martial world watches."
 murim_duel.0005.a: "Accept the challenge."
 murim_duel.0005.b: "Decline honorably."
 murim_duel.0005.c: "Set a trap instead."
 murim_duel.0100.t: "The Duel"
 murim_duel.0100.desc: "Steel meets steel beneath an open sky. Your opponent's killing intent crashes against your own like waves upon rock. Every breath, every movement, every flicker of qi could decide life or death."
 murim_duel.0100.a: "Claim decisive victory."
 murim_duel.0100.b: "Win through superior technique."
 murim_duel.0100.c: "Accept an honorable draw."
 murim_duel.0200.t: "Death Match Challenge"
 murim_duel.0200.desc: "This is no ordinary duel -- it is a death match. The challenger has invoked the ancient rite of mortal combat, where only one walks away. The crowd parts in solemn silence as killing intent fills the arena."
 murim_duel.0200.a: "Fight to the death."
 murim_duel.0200.b: "Refuse this madness."
 murim_duel.0200.c: "Propose first blood only."
 murim_duel_events.0001.t: "Echoes of Battle"
 murim_duel_events.0001.desc: "The aftermath of recent duels ripples through the martial world. Reputations are forged and shattered in the crucible of single combat, and every outcome reshapes the balance of power."
 murim_duel_events.0001.a: "Reflect on the outcomes."
 murim_tournament.0020.t: "Tournament Advancement"
 murim_tournament.0020.desc: "You have advanced to the next round of the grand tournament. Your previous opponents lie defeated behind you, but the fighters ahead grow ever more dangerous. The crowd roars your name."
 murim_tournament.0020.a: "Advance with aggression."
 murim_tournament.0020.b: "Play it safe and conserve qi."
 murim_tournament.0050.t: "The Semi-Finals"
 murim_tournament.0050.desc: "Only four warriors remain. The semi-final arena is packed with spectators from across the martial world. Each combatant here possesses the power to shake mountains. Glory awaits the victor."
 murim_tournament.0050.a: "Unleash everything I have."
 murim_tournament.0050.b: "Fight with measured precision."
 murim_tournament.0060.t: "The Grand Final"
 murim_tournament.0060.desc: "This is it -- the final bout. Two warriors face each other across the arena, the culmination of weeks of brutal combat. The entire martial world holds its breath. Only one will be crowned champion."
 murim_tournament.0060.a: "Give everything -- win or die!"
 murim_tournament.0060.b: "Fight with calculated precision."
 murim_training_events.0001.t: "Daily Training"
 murim_training_events.0001.desc: "The training grounds echo with the sounds of martial practice. Sweat and determination fill the air as you push through another demanding session, building the foundation for future breakthroughs."
 murim_training_events.0001.a: "Complete the training session."
