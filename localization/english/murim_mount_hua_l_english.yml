l_english:
 murim_mount_hua.0001.t: "Plum Blossom Tournament"
 murim_mount_hua.0001.desc: "Petals drift like pink snow across the dueling grounds as Mount Hua's finest swordsmen gather. The annual Plum Blossom Tournament is both celebration and crucible — where blades sing and reputations are forged."
 murim_mount_hua.0001.a: "Enter as a competitor."
 murim_mount_hua.0001.b: "Judge the tournament as an elder."
 murim_mount_hua.0001.c: "Invite rival sects to observe."
 murim_mount_hua.0001.d: "Skip it — focus on cultivation."
 murim_mount_hua.0002.t: "The Sword Conference"
 murim_mount_hua.0002.desc: "Swordsmen from across the land converge for the great Sword Conference. Blades of every style and tradition glint in the morning sun. This is where legends cross steel and new rivalries are born."
 murim_mount_hua.0002.a: "Demonstrate the Plum Blossom Sword Art."
 murim_mount_hua.0002.b: "Challenge a foreign sword master."
 murim_mount_hua.0002.c: "Exchange techniques peacefully."
 murim_mount_hua.0002.d: "Observe silently — scout their styles."
 murim_mount_hua.0003.t: "Righteous Alliance Meeting"
 murim_mount_hua.0003.desc: "The leaders of the orthodox sects gather in the great hall, their faces grave. The Heavenly Demon Sect grows bolder by the day. Mount Hua must decide whether to lead the righteous world to war or seek another way."
 murim_mount_hua.0003.a: "Push for war against the Heavenly Demon."
 murim_mount_hua.0003.b: "Propose a diplomatic solution."
 murim_mount_hua.0003.c: "Strengthen the sect internally first."
 murim_mount_hua.0003.d: "Resign from alliance leadership."
 murim_mount_hua.0004.t: "The Scripture Debate"
 murim_mount_hua.0004.desc: "Scholars and swordsmen alike gather in the Mountain Hall to debate the essence of martial philosophy. Is sword intent the highest path? Can scholarly understanding surpass raw combat prowess? Words clash as fiercely as blades."
 murim_mount_hua.0004.a: "Argue for sword intent as supreme."
 murim_mount_hua.0004.b: "Debate the harmony of sword and scholar."
 murim_mount_hua.0004.c: "Challenge the debater to prove it with swords."
 murim_mount_hua.0004.d: "Listen and learn from all sides."
 murim_mount_hua.0005.t: "Sect Restoration"
 murim_mount_hua.0005.desc: "Mount Hua's glory has faded. Fewer disciples fill the halls, and rival sects whisper of decline. Yet the plum blossoms still bloom on the mountain. Something must be done before the sect's flame gutters out entirely."
 murim_mount_hua.0005.a: "Seek the lost Violet Mist Divine Art."
 murim_mount_hua.0005.b: "Train the next generation intensively."
 murim_mount_hua.0005.c: "Form an alliance with Wudang."
 murim_mount_hua.0005.d: "Accept decline — preserve what remains."
 murim_mount_hua.0006.t: "Friendly Rivalry with Wudang"
 murim_mount_hua.0006.desc: "A delegation from Wudang arrives on Mount Hua, their white robes pristine against the mountain path. The age-old rivalry between plum blossom sword and tai chi blade stirs in every heart. Friends they may be, but pride demands a test."
 murim_mount_hua.0006.a: "Challenge Wudang's best to a friendly duel."
 murim_mount_hua.0006.b: "Share tea and philosophy instead."
 murim_mount_hua.0006.c: "Propose a joint training exercise."
 murim_mount_hua.0006.d: "Decline — maintain sect independence."
 murim_mount_hua.0007.t: "Demonic Sect Provocation"
 murim_mount_hua.0007.desc: "A figure wreathed in dark qi blocks the mountain path, radiating killing intent. A demonic fighter has come to challenge Mount Hua directly. Their laughter echoes off the cliff walls, mocking the righteous path."
 murim_mount_hua.0007.a: "Face the demon head-on in an honor duel."
 murim_mount_hua.0007.b: "Refuse to fight — it is a trap."
 murim_mount_hua.0007.c: "Try to convert them to righteousness."
 murim_mount_hua.0007.d: "Send disciples to investigate."
 murim_mount_hua.0008.t: "Secret Plum Blossom Technique"
 murim_mount_hua.0008.desc: "Behind a loose stone in the founder's chamber, you discover a scroll sealed with ancient wax. The technique within predates Mount Hua's founding — a lost art of devastating swordsmanship that could restore the sect's prestige."
 murim_mount_hua.0008.a: "Master it immediately — risk qi deviation."
 murim_mount_hua.0008.b: "Study gradually over months."
 murim_mount_hua.0008.c: "Share with the entire sect."
 murim_mount_hua.0008.d: "Hide it — too dangerous to share."
 murim_mount_hua.0009.t: "The Temptation of Worldly Life"
 murim_mount_hua.0009.desc: "Below the mountain, the world glitters with warmth and color. A chance encounter has stirred something long buried beneath your martial discipline. The heart yearns for what the sword path forbids."
 murim_mount_hua.0009.a: "Leave the sect for love."
 murim_mount_hua.0009.b: "Resist — strengthen the dao heart."
 murim_mount_hua.0009.c: "Pursue a secret relationship."
 murim_mount_hua.0009.d: "Channel the emotion into sword intent."
 murim_mount_hua.0010.t: "Passing the Torch"
 murim_mount_hua.0010.desc: "The mountain wind carries the scent of plum blossoms as you contemplate the twilight of your years. A lifetime of swordsmanship has brought glory to Mount Hua. Now the question remains — what will you leave behind?"
 murim_mount_hua.0010.a: "Pass the mantle to your best student."
 murim_mount_hua.0010.b: "Write a scripture for future generations."
 murim_mount_hua.0010.c: "Seek one last legendary fight."
 murim_mount_hua.0010.d: "Retreat to the peak — die in meditation."
