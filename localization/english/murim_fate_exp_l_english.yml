l_english:
 murim_fate_exp.0001.t: "Star Alignment Revelation"
 murim_fate_exp.0001.desc: "The night sky blazes with an alignment not seen in centuries — seven stars forming the shape of the Heavenly Sword constellation. Your meridians resonate with the cosmic energy, singing with a frequency that transcends mortal understanding. This is a once-in-a-lifetime chance to touch the infinite."
 murim_fate_exp.0001.a: "Meditate under the alignment — seek cosmic insight"
 murim_fate_exp.0001.b: "Observe the stars without channeling energy"
 murim_fate_exp.0001.c: "Ignore the celestial event"
 murim_fate_exp.0002.t: "Past Life Echo"
 murim_fate_exp.0002.desc: "Memories that are not your own flood your mind — a different face in the mirror, different hands gripping a sword, a different war beneath a different sky. The past life surges forward, demanding recognition. These are the echoes of who you were before this incarnation."
 murim_fate_exp.0002.a: "Embrace and integrate the memories"
 murim_fate_exp.0002.b: "Seal the memories away — too dangerous"
 murim_fate_exp.0002.c: "Seek a master to interpret the visions"
 murim_fate_exp.0003.t: "Fated Meeting"
 murim_fate_exp.0003.desc: "You lock eyes with [fated_stranger.GetFirstName] across a crowded marketplace, and the world falls silent. A thread of destiny connects you — you feel it in your bones, in the hum of your qi, in the sudden quickening of your heartbeat. Heaven has woven your paths together for a reason."
 murim_fate_exp.0003.a: "Recognize the bond — become sworn siblings"
 murim_fate_exp.0003.b: "Accept them as a fated rival"
 murim_fate_exp.0003.c: "Ignore the feeling — mere coincidence"
 murim_fate_exp.0004.t: "Karmic Trial"
 murim_fate_exp.0004.desc: "The weight of accumulated karma bears down upon you like a mountain of iron. Every life taken, every oath broken, every dark technique practiced — all debts come due. The universe demands balance, and you are called before a trial that no cultivation can circumvent."
 murim_fate_exp.0004.a: "Face the karmic trial head-on"
 murim_fate_exp.0004.b: "Seek a temple to atone through meditation"
 murim_fate_exp.0004.c: "Ignore the karmic warnings"
 murim_fate_exp.0005.t: "Defying Fate"
 murim_fate_exp.0005.desc: "The prophecy hangs over you like a executioner's blade — your death, your defeat, your destiny written in the stars before you were born. But you are a martial artist, one who has broken through impossible barriers before. If fate says you must fall, then fate itself must be broken."
 murim_fate_exp.0005.a: "Defy the prophecy — forge my own path"
 murim_fate_exp.0005.b: "Accept the prophecy and walk the destined path"
 murim_fate_exp.0005.c: "Study the prophecy further before acting"
 murim_fate_exp.0006.t: "Heaven's Wrath Unleashed"
 murim_fate_exp.0006.desc: "The sky opens above you and divine lightning descends in pillars of white-hot destruction. Heaven itself has judged you wanting — for your sins, your ambition, your defiance of the natural order. The ground cracks beneath your feet as the first bolt strikes. There is nowhere to run."
 murim_fate_exp.0006.a: "Stand and endure the heavenly lightning"
 murim_fate_exp.0006.b: "Redirect the lightning into my cultivation"
 murim_fate_exp.0006.c: "Flee from the heavenly wrath"
