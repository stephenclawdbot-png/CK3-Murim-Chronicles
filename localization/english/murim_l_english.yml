 # ---------------------
 # CHARACTER INTERACTIONS
 # ---------------------
 challenge_to_duel_interaction:0 "Challenge to Duel"
 challenge_to_duel_interaction_desc:0 "Formally challenge [TARGET.GetFirstName] to an honorable martial duel. Victory brings prestige and ranking advancement. Defeat may bring injury, shame, or worse."
 request_teaching_interaction:0 "Request Teaching"
 request_teaching_interaction_desc:0 "Humbly request [TARGET.GetFirstName] to share their martial knowledge with you. A generous master may agree to mentor you in their techniques."
 offer_discipleship_interaction:0 "Offer Discipleship"
 offer_discipleship_interaction_desc:0 "Offer to take [TARGET.GetFirstName] as your personal disciple, training them in your martial arts and cultivation methods."
 trade_techniques_interaction:0 "Trade Techniques"
 trade_techniques_interaction_desc:0 "Propose a mutual exchange of martial knowledge with [TARGET.GetFirstName]. Both parties benefit from sharing cultivation insights."
 joint_cultivation_interaction:0 "Joint Cultivation"
 joint_cultivation_interaction_desc:0 "Invite [TARGET.GetFirstName] to cultivate together. Dual cultivation can accelerate breakthroughs for both parties, though it requires deep trust."
 poison_rival_interaction:0 "Poison Rival"
 poison_rival_interaction_desc:0 "Secretly poison [TARGET.GetFirstName]'s qi circulation using alchemical toxins. A coward's method, but devastatingly effective if undetected."
 steal_technique_interaction:0 "Steal Technique"
 steal_technique_interaction_desc:0 "Attempt to observe and steal [TARGET.GetFirstName]'s martial techniques through deception. If caught, the consequences will be severe."

 # ---------------------
 # CULTIVATION EVENT TITLES (murim_cultivation namespace)
 # ---------------------
 murim_cultivation.0001.t:0 "The Awakening"
 murim_cultivation.0001.desc:0 "You have meditated for seven days and seven nights. As the sun rises on the eighth morning, you feel something stir within your dantian -- a spark of energy. The first step on the path.\n\nYou have broken through to the Qi Refinement Realm! Your senses sharpen, your body strengthens. The cultivation world opens before you."
 murim_cultivation.0001.a:0 "I shall become stronger!"
 murim_cultivation.0001.b:0 "I need more time to stabilize..."

 murim_cultivation.0002.t:0 "Foundation Breakthrough"
 murim_cultivation.0002.desc:0 "Five years have passed. You have refined your qi until it flows like a river within your meridians. Now, at the critical moment, you attempt to establish your Foundation -- the bedrock upon which all higher cultivation is built.\n\nYour dantian expands, your spiritual roots deepen. Success or deviation hangs in the balance."
 murim_cultivation.0002.a:0 "Push through with all my strength!"
 murim_cultivation.0002.b:0 "Stabilize carefully first."
 murim_cultivation.0002.c:0 "Abandon the attempt -- too risky."

 murim_cultivation.0003.t:0 "The Hidden Manual"
 murim_cultivation.0003.desc:0 "While exploring an old library, you discover a hidden scroll tucked behind a shelf. The manual describes an ancient cultivation technique long thought lost to the world."
 murim_cultivation.0003.a:0 "Study the technique immediately!"
 murim_cultivation.0003.b:0 "Show it to a senior cultivator first."
 murim_cultivation.0003.c:0 "Sell the manual to the highest bidder."

 murim_cultivation.0004.t:0 "Core Formation Tribulation"
 murim_cultivation.0004.desc:0 "Your golden core shimmers with barely contained power. The time has come to condense it fully -- but the heavens demand a price. Dark clouds gather overhead, and lightning begins to crackle."
 murim_cultivation.0004.a:0 "Face the tribulation head-on!"
 murim_cultivation.0004.b:0 "Use a protective formation."
 murim_cultivation.0004.c:0 "Delay -- I am not ready."

 murim_cultivation.0005.t:0 "Nascent Soul Emergence"
 murim_cultivation.0005.desc:0 "After decades of cultivation, your consciousness separates from your physical form. A miniature version of yourself -- your nascent soul -- hovers above your body, glowing with ethereal light."
 murim_cultivation.0005.a:0 "Merge with the Dao!"
 murim_cultivation.0005.b:0 "Stabilize the nascent soul carefully."

 # ---------------------
 # DUEL EVENT TITLES (murim_duel namespace)
 # ---------------------
 murim_duel.0001.t:0 "Honor Duel"
 murim_duel.0001.desc:0 "The duel ground has been prepared. Your opponent stands across from you, weapon drawn. The rules are clear -- first blood, or until one yields. Honor demands you face this challenge."

 murim_duel.0002.a:0 "Fight to the death!"
 murim_duel.0002.b:0 "Try to end it quickly."

 murim_duel.0003.a:0 "Fight back with everything!"
 murim_duel.0003.b:0 "Flee into the darkness."
 murim_duel.0003.c:0 "Try to negotiate."

 murim_duel.0004.a:0 "Hold nothing back."
 murim_duel.0004.b:0 "Show respect -- fight defensively."

 murim_duel.0005.t:0 "The Revenge Duel"
 murim_duel.0005.desc:0 "The one who wronged you stands before you at last. Years of hatred fuel your qi. This moment was inevitable."
 murim_duel.0005.a:0 "Destroy them utterly!"
 murim_duel.0005.b:0 "Show mercy -- prove you are better."

 # ---------------------
 # TRAINING EVENT TITLES
 # ---------------------
 murim_training.0001.t:0 "Training Montage"
 murim_training.0001.desc:0 "Day after day, you push your body beyond its limits. Muscles tear and reform. Calluses layer upon calluses. Slowly, painfully, you grow stronger."
 murim_training.0001.a:0 "Push even harder!"
 murim_training.0001.b:0 "Rest and recover."

 # ---------------------
 # SECT EVENT TITLES
 # ---------------------
 murim_sect.0001.t:0 "Sect Recruitment"
 murim_sect.0001.desc:0 "A messenger arrives with an invitation bearing the seal of a powerful martial sect. They have heard of your potential and wish to offer you a place among their disciples."
 murim_sect.0001.a:0 "Accept the invitation!"
 murim_sect.0001.b:0 "Decline politely."

 murim_sect.0002.a:0 "Rally the disciples!"
 murim_sect.0002.b:0 "Seek a peaceful resolution."

 murim_sect.0003.t:0 "Inner Disciple Promotion"
 murim_sect.0003.desc:0 "The Sect Master has recognized your contributions and talent. You are to be promoted from outer disciple to inner disciple -- a great honor that comes with access to the sect's secret techniques."

