l_english:
 # Sect Competition Events
 murim_sect_competition.0001.t: "Challenge for the Elder Seat"
 murim_sect_competition.0001.desc: "A martial artist from within your sect has publicly declared a challenge for your position as Elder. [scope.elder_challenger.GetName] stands at the center of the training grounds, sword drawn, surrounded by curious disciples. Their eyes burn with ambition. 'Your time has passed, Elder,' they declare. 'The sect needs new blood — stronger blood.' The gathered crowd watches in tense silence. Your authority hangs in the balance."
 murim_sect_competition.0001.a: "I accept your challenge. Draw your weapon."
 murim_sect_competition.0001.a.victory: "You decisively defeat the challenger. Your position is secure."
 murim_sect_competition.0001.a.defeat: "The challenger bests you in combat. You must yield the Elder position."
 murim_sect_competition.0001.b: "I will not entertain this foolishness. Guards, escort them out."
 murim_sect_competition.0001.c: "Perhaps it is time to pass the mantle."

 murim_sect_competition.0002.t: "Challenge for the Sect Master Throne"
 murim_sect_competition.0002.desc: "The drumbeat echoes across the mountain. [scope.master_challenger.GetName] has invoked the ancient rite of succession — a formal challenge to your position as Sect Master. They stand at the peak of the training grounds, their qi radiating outward like a furnace. 'I challenge you for the right to lead,' they announce, voice carrying across the valley. 'The strong lead. The weak follow. That is the way of the martial world.' Every disciple, every elder, every servant watches. This challenge cannot be ignored."
 murim_sect_competition.0002.a: "Face me in formal combat, then."
 murim_sect_competition.0002.a.victory: "Your martial supremacy is proven. The challenger falls before you."
 murim_sect_competition.0002.a.defeat: "You are defeated. The sect has a new master."
 murim_sect_competition.0002.b: "Let us settle this through cultivation — not violence."
 murim_sect_competition.0002.c: "I offer you the position of co-leader. Share my burden."

 murim_sect_competition.0003.t: "Whispers of Usurpation"
 murim_sect_competition.0003.desc: "Your spy among the disciples brings alarming news. [scope.clan_usurper.GetName] has been meeting in secret with discontented members of the clan, whispering promises of change under new leadership. They've been gathering support for months — bribing elders, winning over young disciples with demonstrations of superior technique, and spreading rumors about your weaknesses. The scheme is nearly ripe. If you don't act now, you may wake to find your own disciples pointing blades at your throat."
 murim_sect_competition.0003.a: "Expose their treachery before the entire sect."
 murim_sect_competition.0003.b: "Counter-scheme. Turn their own allies against them."
 murim_sect_competition.0003.c: "Offer them a position. Better a loyal subordinate than a bitter enemy."

 murim_sect_competition.0004.t: "The Grand Challenge"
 murim_sect_competition.0004.desc: "The jade token has been cast at your feet before the assembled leaders of every sect. [scope.alliance_challenger.GetName] stands tall, their cultivation pressure pressing down on everyone present. 'I invoke the Grand Challenge,' they declare. 'The Wulin Alliance deserves a leader worthy of the title. Face me — or surrender the seat.' This is the highest challenge in the martial world. Refusing means eternal shame. Accepting means risking everything. The entire Jianghu holds its breath."
 murim_sect_competition.0004.a: "I accept the Grand Challenge."
 murim_sect_competition.0004.a.victory: "Your overwhelming victory silences all doubt. You are the undisputed leader of the alliance."
 murim_sect_competition.0004.a.defeat: "You fall before the challenger. The Wulin Alliance has a new leader."
 murim_sect_competition.0004.b: "Call for a council vote instead. Let the sects decide."
 murim_sect_competition.0004.c: "I step down. Let there be no bloodshed over a title."
