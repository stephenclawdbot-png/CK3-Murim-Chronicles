l_english:
 # ==========================================
 # MURIM CHRONICLES - DECISION LOCALIZATION
 # All decision title, description, and tooltip keys
 # Heartbeat #57: Complete coverage for all martial decisions
 # ==========================================

 # ---------------------
 # MURIM LEDGER DECISION
 # ---------------------
 open_murim_ledger_decision_title:0 "Open the Murim Ledger"
 open_murim_ledger_decision_desc:0 "Consult the records of the martial world. The Murim Ledger contains rankings, clan information, your martial profile, recent events, and upcoming tournaments. Maintained by the information networks of the nine great clans and updated by wandering scribes."
 open_murim_ledger_decision_tooltip:0 "Open the Murim Ledger to view the state of the martial world."

 # ---------------------
 # CUSTOM CLAN CREATION DECISION
 # ---------------------
 murim_create_custom_clan_decision_title:0 "Found a New Martial Clan"
 murim_create_custom_clan_decision_desc:0 "Your martial prowess has reached legendary heights. You may establish your own martial clan, creating a legacy that will endure for generations. If you are the #1 ranked martial artist, you may simply declare your clan's founding. Otherwise, you must gather the support of at least six of the nine existing clan leaders."

 # ---------------------
 # BEGIN TRAINING DECISION
 # ---------------------
 murim_begin_training_decision_title:0 "Begin Martial Training"
 murim_begin_training_decision_desc:0 "Dedicate yourself to intensive martial training. For the next year, your body and mind will be pushed to their limits as you refine your techniques and strengthen your cultivation base."

 # ---------------------
 # SEEK MURIM ENTRY DECISION
 # ---------------------
 murim_seek_entry_decision_title:0 "Seek Entry to the Martial World"
 murim_seek_entry_decision_desc:0 "You have heard whispers of the martial world -- a hidden society of cultivators, warriors, and clan politics that exists alongside the mundane world. Whether through ambition, curiosity, or fate, you wish to take your first steps on the martial path."

 # ---------------------
 # CHALLENGE RANKING DECISION
 # ---------------------
 murim_challenge_ranking_decision_title:0 "Challenge for Martial Ranking"
 murim_challenge_ranking_decision_desc:0 "Issue a formal challenge to a higher-ranked martial artist. Victory will elevate your position in the rankings; defeat will bring shame and possibly injury. The martial world watches every ranking duel with keen interest."
 murim_challenge_ranked_decision_title:0 "Challenge a Ranked Martial Artist"
 murim_challenge_ranked_decision_desc:0 "Issue a formal challenge to someone in the martial rankings. If they accept, a duel will be arranged. If you win, you take their rank. If you lose, you drop in the rankings and gain a reputation for ambition -- or foolishness."

 # ---------------------
 # CLAN MEMBERSHIP DECISION
 # ---------------------
 murim_request_clan_membership_decision_title:0 "Seek Clan Membership"
 murim_request_clan_membership_decision_desc:0 "Approach one of the nine great martial clans to request membership. Your prowess, reputation, and alignment will determine which clans are willing to accept you. Orthodox clans value honor and righteousness; unorthodox clans respect power and ambition."

 # ---------------------
 # ENTER SECLUSION DECISION
 # ---------------------
 murim_enter_seclusion_decision_title:0 "Enter Martial Seclusion"
 murim_enter_seclusion_decision_desc:0 "Withdraw from worldly affairs to focus entirely on cultivation. In seclusion, your learning and spiritual insight grow rapidly, but you become isolated from court and clan matters. Many breakthroughs have been achieved in the solitude of mountain caves and remote temples."

 # ---------------------
 # RANKING DUEL NOTIFICATION KEYS
 # ---------------------
 murim_rank_challenge_winner_desc:0 "The challenger emerges victorious! A new name rises in the martial rankings."
 murim_rank_ai_duel_winner_notification:0 "Ranking Duel Result"
 murim_rank_ai_duel_winner_desc:0 "A ranking duel has concluded in our realm. The martial rankings have shifted."
 murim_rank_ai_duel_loser_desc:0 "The defender held their ground. The challenger retreats in defeat."

 # ---------------------
 # LEDGER EVENT KEYS
 # ---------------------
 murim_ledger.0001.t:0 "The Murim Ledger"
 murim_ledger.0001.desc:0 "You open the Murim Ledger, a vast compendium of martial world knowledge maintained by the scribes of the nine great clans. Its pages contain rankings, clan rosters, tournament records, and the deeds of martial artists across the world."
 murim_ledger.0001.a:0 "View the Rankings"
 murim_ledger.0001.b:0 "View Clan Information"
 murim_ledger.0001.c:0 "View My Martial Profile"
 murim_ledger.0001.d:0 "View Recent Events"
 murim_ledger.0001.e:0 "View Tournament Schedule"
 murim_ledger.0001.f:0 "Close the Ledger"

 # ---------------------
 # CLAN RECRUITMENT EVENT KEYS
 # ---------------------
 murim_clan_recruit.0001.t:0 "Seeking a Clan"
 murim_clan_recruit.0001.desc:0 "You have decided to seek membership in one of the nine great martial clans. Word of your intent spreads through the jianghu. Which clan will you approach?"
 murim_clan_recruit.0001.a:0 "Approach an Orthodox clan (Mount Hua, Shaolin, Wudang, Tang Clan, Beggar Sect)"
 murim_clan_recruit.0001.b:0 "Approach an Unorthodox clan (Heavenly Demon Sect, Poison Flower Palace, Phantom Blade Sect)"
 murim_clan_recruit.0001.c:0 "Approach Iron Fist Gate (neutral)"
 murim_clan_recruit.0001.d:0 "On second thought, I will walk alone."

