l_english:
 # ============================================
 # TOURNAMENT EXPANSION EVENTS (murim_tourney_exp)
 # ============================================
 murim_tourney_exp.0001.t:0 "Inter-Clan Exhibition Match"
 murim_tourney_exp.0001.desc:0 "The tournament grounds buzz with anticipation as two clans arrange a formal exhibition match. Banners of both sects flutter in the wind as representatives step forward. This is not a fight to the death, but a display of skill -- yet the stakes for clan prestige could not be higher."
 murim_tourney_exp.0001.a:0 "Fight with honor -- hold back the killing moves."
 murim_tourney_exp.0001.a.win:0 "Your controlled strikes and elegant footwork earn thunderous applause from the assembled martial artists. A clean victory that elevates your clan's name."
 murim_tourney_exp.0001.a.lose:0 "Your opponent's technique proves superior, but you lose with grace. The crowd respects your composure in defeat."
 murim_tourney_exp.0001.b:0 "Go all out -- show them the true power of our clan."
 murim_tourney_exp.0001.b.win:0 "Your devastating assault shatters the exhibition's genteel atmosphere. Your opponent lies broken on the ground. The crowd is stunned -- some in awe, others in horror."
 murim_tourney_exp.0001.b.lose:0 "Despite fighting with everything you have, your opponent outclasses you and leaves you humiliated on the tournament floor."
 murim_tourney_exp.0001.c:0 "Decline the exhibition politely."

 murim_tourney_exp.0002.t:0 "Dark Horse Upset"
 murim_tourney_exp.0002.desc:0 "You have trained in the shadows, unranked and unknown. Now, at the tournament, you spot a ranked fighter -- someone whose name appears on the Murim Ledger. Your blood burns with the desire to prove yourself. One victory here could change everything."
 murim_tourney_exp.0002.a:0 "Challenge them openly on the tournament stage!"
 murim_tourney_exp.0002.a.upset:0 "The crowd erupts in disbelief! An unknown fighter has defeated a ranked warrior! Your name will be whispered across every teahouse in the martial world by nightfall."
 murim_tourney_exp.0002.a.crushed:0 "The ranked fighter's power is overwhelming. They demonstrate exactly why they hold their position, leaving you broken and humbled on the arena floor."
 murim_tourney_exp.0002.b:0 "Wait for a better opportunity -- patience is a weapon too."

 murim_tourney_exp.0003.t:0 "Tournament Rigging Discovered"
 murim_tourney_exp.0003.desc:0 "While wandering behind the tournament grounds, you stumble upon evidence of foul play. Poisoned water skins, bribed judges' notes, and a hidden cache of qi-disrupting powder. Someone has been rigging the tournament outcomes. The evidence points to a shadowy figure..."
 murim_tourney_exp.0003.a:0 "Expose the rigging publicly -- honor demands it!"
 murim_tourney_exp.0003.b:0 "Blackmail the rigger -- profit from their silence."
 murim_tourney_exp.0003.c:0 "Ignore it -- not my problem."

 murim_tourney_exp.0004.t:0 "Clan Scout Approaches at Tournament"
 murim_tourney_exp.0004.desc:0 "After witnessing the incredible displays of martial prowess at the tournament, you feel a tap on your shoulder. A weathered figure with keen eyes studies you carefully. 'You have potential,' they say. 'I represent a clan that could help you realize it. Would you like to walk the martial path?'"
 murim_tourney_exp.0004.a:0 "Join an Orthodox sword school -- Mount Hua, Shaolin, or Wudang."
 murim_tourney_exp.0004.a.mount_hua_tt:0 "You join the Mount Hua Sect, renowned for their elegant sword techniques."
 murim_tourney_exp.0004.a.shaolin_tt:0 "You join the Shaolin Temple, masters of body cultivation and Buddhist martial arts."
 murim_tourney_exp.0004.a.wudang_tt:0 "You join the Wudang Sect, practitioners of Taoist internal arts."
 murim_tourney_exp.0004.b:0 "Join an Orthodox specialist clan -- Tang, Beggar Sect, or Iron Fist."
 murim_tourney_exp.0004.b.tang_tt:0 "You join the Tang Clan, masters of hidden weapons and poisons."
 murim_tourney_exp.0004.b.beggar_tt:0 "You join the Beggar Sect, the largest intelligence network in the martial world."
 murim_tourney_exp.0004.b.iron_fist_tt:0 "You join the Iron Fist Gate, forging your body into an unbreakable weapon."
 murim_tourney_exp.0004.c:0 "Walk the dark path -- Heavenly Demon, Poison Flower, or Phantom Blade."
 murim_tourney_exp.0004.c.demon_tt:0 "You join the Heavenly Demon Sect, embracing the dark qi arts."
 murim_tourney_exp.0004.c.poison_tt:0 "You join the Poison Flower Palace, learning the deadly art of toxins."
 murim_tourney_exp.0004.c.phantom_tt:0 "You join the Phantom Blade Sect, masters of assassination and shadow arts."
 murim_tourney_exp.0004.d:0 "Decline -- return to normal life."

 murim_tourney_exp.0005.t:0 "Champion's Retirement Ceremony"
 murim_tourney_exp.0005.desc:0 "The years have taken their toll. Your joints ache, your reactions have slowed, and younger fighters now match your once-peerless skill. As a top-ranked champion, you must decide: retire gracefully and pass the mantle, or cling to the title that has defined your life."
 murim_tourney_exp.0005.a:0 "Formal retirement -- pass the mantle with ceremony."
 murim_tourney_exp.0005.b:0 "One last fight -- go out in glory!"
 murim_tourney_exp.0005.b.old_wins:0 "Age and experience triumph over youth! The old champion's final display of skill silences every doubter in the arena. A legend's last roar."
 murim_tourney_exp.0005.b.youth_prevails:0 "The young successor fights with burning determination, and in the end, the old champion's body cannot keep pace with their spirit. A torch is passed in combat."
 murim_tourney_exp.0005.c:0 "Refuse to retire -- I am still the strongest!"

 murim_tourney_exp.0006.t:0 "Legacy Challenge -- Clan Recruitment"
 murim_tourney_exp.0006.desc:0 "Word of your tournament victory has spread. A high-ranking clan elder approaches with an offer of recruitment. But they want to test you first -- not just your fists, but your character."
 murim_tourney_exp.0006.a:0 "Accept the clan elder's offer."
 murim_tourney_exp.0006.b:0 "Challenge the recruiter to prove your worth first!"
 murim_tourney_exp.0006.b.win:0 "You defeat the elder in a stunning display. They laugh, impressed. 'You have fire in you. Welcome to the family.'"
 murim_tourney_exp.0006.b.lose:0 "The elder's vast experience overwhelms you. Still, they nod approvingly. 'You have courage, if not yet skill.'"
 murim_tourney_exp.0006.c:0 "Walk your own path -- refuse all clans."

 # ============================================
 # PHANTOM BLADE EXPANSION EVENTS (murim_phantom_exp)
 # ============================================
 murim_phantom_exp.0001.t:0 "Blade Naming Ceremony"
 murim_phantom_exp.0001.desc:0 "You have risen to Inner Disciple rank within the Phantom Blade Sect. By ancient tradition, you now have the right to name your blade -- a sacred rite that binds weapon and wielder in purpose. The sect elders gather in the moonlit courtyard as you hold your blade before you."
 murim_phantom_exp.0001.a:0 "Name it after a predator -- 'Moonlit Fang.'"
 murim_phantom_exp.0001.b:0 "Name it after the void -- 'Silent Absence.'"
 murim_phantom_exp.0001.c:0 "Name it after someone you lost -- a memorial blade."

 murim_phantom_exp.0002.t:0 "Phantom Chase -- Orthodox Hunters"
 murim_phantom_exp.0002.desc:0 "The sound of footsteps behind you. Multiple sets. The Orthodox faction has dispatched hunters to bring you to justice for the Phantom Blade Sect's recent activities. Their leader is a formidable martial artist with righteous fury in their eyes."
 murim_phantom_exp.0002.a:0 "Use Phantom Step to vanish -- melt into the shadows."
 murim_phantom_exp.0002.a.escape:0 "Your body flickers and dissolves into moonlit shadow. The hunters slash at empty air, cursing as you reappear three rooftops away, already running."
 murim_phantom_exp.0002.a.caught:0 "Your Phantom Step falters -- the hunter anticipated your escape route and cut you off!"
 murim_phantom_exp.0002.b:0 "Stand and fight -- a Phantom Blade never runs."
 murim_phantom_exp.0002.b.victory:0 "Your blade sings through the darkness, painting crimson arcs. The orthodox hunter falls, their righteous fury no match for your deadly precision."
 murim_phantom_exp.0002.b.defeat:0 "The hunter's righteous techniques overpower your shadow arts. You fall, tasting blood and bitter defeat."
 murim_phantom_exp.0002.c:0 "Negotiate -- offer information for freedom."

 murim_phantom_exp.0003.t:0 "Cornered -- No Escape"
 murim_phantom_exp.0003.desc:0 "They found you. The orthodox hunter blocks your only escape route, blade drawn, qi radiating righteous intent. There is nowhere to run. This ends here."
 murim_phantom_exp.0003.a:0 "Unleash the forbidden blade technique -- all or nothing!"
 murim_phantom_exp.0003.a.win:0 "Dark qi erupts from your blade in a devastating wave. The forbidden technique tears through the hunter's defenses like paper."
 murim_phantom_exp.0003.a.lose:0 "The forbidden technique fails to break through. Your overextension leaves you open, and the hunter's counterstrike is merciless."
 murim_phantom_exp.0003.b:0 "Surrender to orthodox justice."

 murim_phantom_exp.0004.t:0 "Blade School Rivalry"
 murim_phantom_exp.0004.desc:0 "A martial artist from another blade-focused school has issued a public challenge to the Phantom Blade Sect. They claim their sword techniques are superior to your shadow blade arts. The entire martial world watches to see who will answer."
 murim_phantom_exp.0004.a:0 "Accept the blade duel -- prove Phantom Blade supremacy!"
 murim_phantom_exp.0004.a.win:0 "Your phantom strikes weave through their defenses like smoke through fingers. The rival blade school acknowledges Phantom Blade's superiority."
 murim_phantom_exp.0004.a.lose:0 "Their clean, direct swordsmanship pierces through your shadow techniques. Perhaps the Phantom Blade arts still need refinement."
 murim_phantom_exp.0004.b:0 "Study their technique first -- delayed response."
 murim_phantom_exp.0004.c:0 "Ignore the challenge -- it is beneath us."

 murim_phantom_exp.0005.t:0 "Shadow Market Arms Deal"
 murim_phantom_exp.0005.desc:0 "The Phantom Blade Sect maintains connections to the underground shadow markets where rare weapons and forbidden materials change hands. As an elder, you have access to deals that most martial artists never see."
 murim_phantom_exp.0005.a:0 "Purchase a legendary blade -- spare no expense."
 murim_phantom_exp.0005.b:0 "Trade sect intelligence for weapons."
 murim_phantom_exp.0005.c:0 "Set up your own shadow market branch."

 murim_phantom_exp.0006.t:0 "Blade Inheritance -- Elder's Death"
 murim_phantom_exp.0006.desc:0 "An elder of the Phantom Blade Sect has passed, and their legendary named blade must find a new owner. The sect tradition demands that worthy claimants compete for the right to inherit the weapon. You are among the candidates."
 murim_phantom_exp.0006.a:0 "Claim the blade through the sect rite of combat!"
 murim_phantom_exp.0006.a.win:0 "Your technique proves superior. The elder's blade hums with recognition as you grasp it -- as if the weapon itself chose you."
 murim_phantom_exp.0006.a.lose:0 "Your rival's strikes are sharper, faster. The blade passes to another. You watch your clan-mate claim the inheritance you coveted."
 murim_phantom_exp.0006.b:0 "Yield the blade -- honor the elder's wishes."
 murim_phantom_exp.0006.c:0 "Destroy the blade -- no one should wield it."

 # ============================================
 # HEAVENLY DEMON EXPANSION EVENTS (murim_demon_exp)
 # ============================================
 murim_demon_exp.0001.t:0 "Dark Qi Corruption Spreads"
 murim_demon_exp.0001.desc:0 "Your mastery of demonic arts has reached a dangerous threshold. The dark qi flowing through your meridians has begun to leak outward, subtly corrupting those who spend time near you. A promising young martial artist from another clan seems particularly susceptible..."
 murim_demon_exp.0001.a:0 "Actively corrupt them -- recruit to the dark path."
 murim_demon_exp.0001.a.success:0 "The corruption takes hold. Their eyes darken, their qi shifts. They abandon their former clan and kneel before you, reborn as a disciple of the Heavenly Demon."
 murim_demon_exp.0001.a.resist:0 "They resist the corruption, but the dark qi leaves scars. They stagger away, weakened and horrified by what almost happened."
 murim_demon_exp.0001.a.backfire:0 "The dark qi rebounds violently! Your attempt to corrupt them backfires, and the target immediately reports you to their clan elders."
 murim_demon_exp.0001.b:0 "Contain the dark qi -- prevent uncontrolled spread."
 murim_demon_exp.0001.c:0 "Embrace the chaos -- let the dark qi spread freely."

 murim_demon_exp.0002.t:0 "Demon Lord Coronation"
 murim_demon_exp.0002.desc:0 "The throne of the Heavenly Demon Lord stands empty. The previous lord has fallen, and the sect's elders and vice leaders gather in the Demonic Throne Hall deep within their mountain fortress. As a senior elder, you have the right to claim the title -- but you are not the only one."
 murim_demon_exp.0002.a:0 "Challenge for the throne through ritual combat!"
 murim_demon_exp.0002.a.crowned:0 "Your dark qi erupts in a pillar of black flame as you strike down your rival. The elders bow. The Demonic Throne is yours. You are the new Heavenly Demon Lord."
 murim_demon_exp.0002.a.defeated:0 "Your rival's demonic arts overwhelm you. As you fall, they ascend the throne. The sect has its new lord -- and it is not you."
 murim_demon_exp.0002.b:0 "Political maneuvering -- secure votes from elders."
 murim_demon_exp.0002.b.political_win:0 "Through careful manipulation, promises, and veiled threats, you secure the support of the majority of elders. The coronation proceeds without bloodshed -- this time."
 murim_demon_exp.0002.b.political_loss:0 "Your rival proves a more skilled politician. The elders' votes fall against you, and you watch from the shadows as another claims the throne."
 murim_demon_exp.0002.c:0 "Step aside -- I am not ready for this burden."

 murim_demon_exp.0003.t:0 "Heretic Inquisition"
 murim_demon_exp.0003.desc:0 "Alarm bells ring through the martial world. The Orthodox Alliance has declared a formal Heretic Inquisition targeting practitioners of demonic arts. Elite hunters from Shaolin, Wudang, and Mount Hua coordinate a systematic purge. They are coming for you."
 murim_demon_exp.0003.a:0 "Fight the inquisition head-on!"
 murim_demon_exp.0003.a.survive:0 "Your demonic arts prove too powerful for the inquisitor. They retreat, bloodied and humbled. The purge falters -- for now."
 murim_demon_exp.0003.a.captured:0 "The inquisitor's righteous techniques overwhelm your dark qi. You are captured, or worse."
 murim_demon_exp.0003.b:0 "Go into hiding -- use shadow techniques."
 murim_demon_exp.0003.b.hidden:0 "You vanish into the shadows, adopting a new identity. The inquisitors search in vain."
 murim_demon_exp.0003.b.found:0 "Despite your best efforts, the inquisitors track you down. A brief, violent confrontation ensues."
 murim_demon_exp.0003.c:0 "Rally the Unorthodox -- call for united defense!"

 murim_demon_exp.0004.t:0 "Demonic Artifact Awakening"
 murim_demon_exp.0004.desc:0 "Deep in the Heavenly Demon Sect's forbidden vault, an ancient artifact pulses with malevolent energy. The Demon Heart Jade -- sealed for generations -- has begun to awaken. Its dark qi calls to you, promising unimaginable power... at a terrible price."
 murim_demon_exp.0004.a:0 "Bond with the artifact -- embrace the power!"
 murim_demon_exp.0004.b:0 "Seal it again -- too dangerous even for us."
 murim_demon_exp.0004.c:0 "Offer it to the Demon Lord as tribute."

 murim_demon_exp.0005.t:0 "Shadow Disciple Betrayal"
 murim_demon_exp.0005.desc:0 "A trusted disciple of the Heavenly Demon Sect has vanished in the night. Intelligence reports they have defected to the Orthodox Alliance, carrying with them knowledge of your sect's secret techniques and hidden bases. This betrayal threatens everything."
 murim_demon_exp.0005.a:0 "Hunt them down personally!"
 murim_demon_exp.0005.a.caught:0 "You catch the betrayer before they reach orthodox territory. They beg for mercy, but the laws of the sect are clear."
 murim_demon_exp.0005.a.escaped:0 "The betrayer slips through your grasp and disappears behind the walls of an orthodox sect, now sheltered from your reach."
 murim_demon_exp.0005.b:0 "Send Phantom Blade assassins after them."
 murim_demon_exp.0005.b.assassinated:0 "A Phantom Blade operative intercepts the traitor. By morning, the betrayer is found dead, a single precise wound through the heart."
 murim_demon_exp.0005.b.failed:0 "The assassination fails. The betrayer now has proof of the Heavenly Demon Sect's methods, and they share it with the Orthodox Alliance."
 murim_demon_exp.0005.c:0 "Let them go -- the sect is stronger without traitors."

 murim_demon_exp.0006.t:0 "Demon Sect Schism"
 murim_demon_exp.0006.desc:0 "A fundamental disagreement has split the Heavenly Demon Sect. Traditionalists demand strict adherence to the ancient demonic arts, while reformers argue for incorporating other techniques and seeking detente with the Orthodox. The schism threatens to tear the sect apart."
 murim_demon_exp.0006.a:0 "Side with the traditionalists -- preserve demon arts purity."
 murim_demon_exp.0006.b:0 "Side with the reformers -- modernize the sect."
 murim_demon_exp.0006.c:0 "Unite both factions by force -- crush dissent!"
 murim_demon_exp.0006.c.unite:0 "Your overwhelming power silences all debate. Both factions bow before you, united by fear and respect. The schism ends -- by your fist."
 murim_demon_exp.0006.c.fail:0 "Your attempt to force unity backfires. The opposing faction leader defeats you, deepening the divide and weakening your position."
