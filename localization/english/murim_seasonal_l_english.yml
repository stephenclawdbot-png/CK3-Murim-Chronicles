l_english:
 # ==========================================
 # MURIM SEASONAL CULTIVATION EVENTS LOCALIZATION
 # Spring, Summer, Autumn, Winter, Equinox
 # ==========================================

 # --- EVENT 1: Spring Awakening ---
 murim_seasonal.0001.t:0 "The Spring Qi Awakening"
 murim_seasonal.0001.desc:0 "The first warmth of spring stirs the qi in the world like a great tide returning to shore. You can feel it in your meridians — a gentle pressure, an invitation. Heaven is offering its hand. The cultivators who reach out to meet it will carry that momentum through the rest of the year."
 murim_seasonal.0001.desc_attuned:0 "Spring arrives, and this time you feel it before the first blossom opens. Years of seasonal attunement have made you sensitive to Heaven's rhythms. The qi surge hits you like a warm wave — fuller than most will ever experience. Your body knows how to receive it."
 murim_seasonal.0001.a:0 "Open the meridians fully. Absorb the spring tide."
 murim_seasonal.0001.b:0 "Use the flowing qi to begin mastering a new technique."
 murim_seasonal.0001.c:0 "Guide the sect through the spring surge together."
 murim_seasonal_spring_meditate_tt:0 "Spring qi absorption advances cultivation and eases stress."
 murim_seasonal_spring_technique_tt:0 "The free-flowing spring qi makes technique study unusually efficient."
 murim_seasonal_spring_share_tt:0 "Guiding disciples through the spring surge strengthens the sect's cultivation as a whole."

 # --- EVENT 2: Summer Lightning ---
 murim_seasonal.0002.t:0 "Heaven's Fire Descends"
 murim_seasonal.0002.desc:0 "The summer storm rolls in from the eastern mountains, bringing with it the crackling fury of heaven's lightning. Older cultivators call this the Tempering Season — when the bold stand in the open and invite the lightning to strike. The pain is immense. The gains, for those who survive, are greater still."
 murim_seasonal.0002.desc_tempered:0 "Your body has been forged in previous storms. When the summer lightning begins to fall, you feel something close to anticipation rather than dread. The skin remembers the electricity; the meridians have been widened by past strikes. This time will push you further still."
 murim_seasonal.0002.a:0 "Stand in the open. Let the lightning strike."
 murim_seasonal.0002.b:0 "Meditate beneath the storm, absorbing the ambient lightning-qi."
 murim_seasonal.0002.c:0 "Spend the summer in hard sparring against your strongest disciples."
 murim_seasonal_summer_lightning_success_tt:0 "The lightning strikes true. Your body tempering advances and cultivation surges forward."
 murim_seasonal_summer_lightning_fail_tt:0 "The lightning is more than you can absorb. You survive, but barely."
 murim_seasonal_summer_meditate_tt:0 "Ambient storm qi enriches your cultivation without the body risk."
 murim_seasonal_summer_sparring_tt:0 "Intense summer sparring sharpens combat reflexes and builds cultivation steadily."

 # --- EVENT 3: Autumn Harvest ---
 murim_seasonal.0003.t:0 "The Qi Harvest Moon"
 murim_seasonal.0003.desc:0 "As leaves turn gold and the nights lengthen, the qi in the earth concentrates — drawn inward like blood to a fist. Alchemists speak of autumn as the year's best herb-gathering window. Cultivators speak of it as the season of consolidation: reaping what spring and summer planted. The harvest moon hangs round and heavy over the mountains."
 murim_seasonal.0003.a:0 "Gather spirit herbs while the qi concentration is at its peak."
 murim_seasonal.0003.b:0 "Use the dense qi to consolidate and stabilize your current realm."
 murim_seasonal.0003.c:0 "Host a seasonal cultivation gathering to draw the region's martial artists."
 murim_seasonal_autumn_harvest_tt:0 "The spiritual herb yield is exceptional. Herb stores replenished."
 murim_seasonal_autumn_consolidate_tt:0 "Autumn qi consolidation deepens your foundation. Health and cultivation both improve."
 murim_seasonal_autumn_gathering_tt:0 "The gathering draws respected guests and dramatically raises your standing. Seasonal attunement deepens."

 # --- EVENT 4: Winter Solstice Seclusion ---
 murim_seasonal.0004.t:0 "The Deepest Night"
 murim_seasonal.0004.desc:0 "The winter solstice arrives — the longest night of the year, when yin qi reaches its absolute peak and the veil between the mortal world and the higher realms grows thin. Some cultivators fear this time. Others wait all year for it. The cave at the mountain's heart is warm only from the residual qi that has been gathering there for months. You have prepared. The question is how deep you dare go."
 murim_seasonal.0004.desc_attuned:0 "Three or more seasons of cultivation harmony have opened something in you. As the solstice night descends, the qi in your meridians shifts in ways you have never felt before — as if a door in a dark hallway has swung ajar and revealed a blinding light beyond. You know what this means. The breakthrough is within reach."
 murim_seasonal.0004.a:0 "Enter absolute seclusion. Attempt a breakthrough."
 murim_seasonal.0004.b:0 "Simple winter meditation. Restore and preserve."
 murim_seasonal.0004.c:0 "Spend the solstice studying ancient texts."
 murim_seasonal_winter_breakthrough_tt:0 "Heaven's gates open! A cultivation realm breakthrough is achieved during the solstice night."
 murim_seasonal_winter_progress_tt:0 "Tremendous cultivation progress made. The next breakthrough draws significantly closer."
 murim_seasonal_winter_deviation_tt:0 "The yin qi overwhelms your defenses. A painful qi deviation sets back your cultivation."
 murim_seasonal_winter_rest_tt:0 "Restful winter meditation restores health and strips away accumulated stress."
 murim_seasonal_winter_study_tt:0 "Ancient wisdom absorbed during the long solstice night accelerates future cultivation."

 # --- EVENT 5: Equinox Balance ---
 murim_seasonal.0005.t:0 "The Still Point Between Seasons"
 murim_seasonal.0005.desc:0 "Twice a year the world holds its breath. Day equals night; yin and yang touch each other in perfect balance. For cultivators, this equinox moment is spoken of in old texts as the Still Point — when the qi of Heaven and Earth aligns in a harmony rarely achieved even by the greatest masters. Those who meditate through this window often emerge changed."
 murim_seasonal.0005.a:0 "Align with the equinox. Meditate from dusk to dawn."
 murim_seasonal.0005.b:0 "Challenge a rival to a duel while Heaven watches in balance."
 murim_seasonal_equinox_align_tt:0 "Perfect balance achieved. Cultivation accelerates and seasonal attunement deepens significantly."
 murim_seasonal_equinox_duel_tt:0 "Dueling under an equinox sky, both combatants at their purest — the clash is legendary. Win or lose, your name spreads further."
