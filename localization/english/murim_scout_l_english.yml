l_english:
 murim_scout.0001.t: "Scout Arrives at New Region"
 murim_scout.0001.desc.goryeo: "You cross the border into Goryeo. The martial traditions here are strong, cousins to those of the Middle Kingdom. Students practice in temple courtyards and village squares. There may be talent worth bringing home."
 murim_scout.0001.desc.japan: "The island nation across the sea. Their sword arts are refined but different -- shorter blades, tighter footwork. You observe from the shadows, looking for anyone whose talent transcends their local style."
 murim_scout.0001.desc.india: "The subcontinent stretches before you. Warriors here fight with flowing movements, grappling holds, and breathing techniques unknown in the Middle Kingdom. Different, but sometimes different is exactly what the clan needs."
 murim_scout.0001.desc.persia: "Persian warriors blend horsemanship with blade work. Their court martial traditions are ancient and proud. You must tread carefully -- these people do not welcome foreign meddling in their youth."
 murim_scout.0001.desc.frontier: "You have traveled far from the Middle Kingdom. These lands are wild, their fighting styles raw and unrefined. But raw talent is still talent. A diamond in the rough could become the clan's greatest asset."
 murim_scout.0001.a: "Survey the local courts for talent"
 murim_scout.0001.b: "Gather intelligence on local martial arts"
 murim_scout.0001.c: "Too dangerous -- move on quickly"
 murim_scout.0002.t: "A Promising Candidate"
 murim_scout.0002.desc: "You have been observing the candidate for several days. Your trained eye sees extraordinary potential -- the kind of raw talent that, properly refined, could bring honor to the clan for generations."
 murim_scout.0002.a: "Approach them directly with an offer"
 murim_scout.0002.b: "Test them first -- arrange a trial"
 murim_scout.0002.c: "Not quite right. Keep searching."
 murim_scout.0003.t: "A Clan Scout Wants Your Child"
 murim_scout.0003.desc: "A mysterious stranger from the East has arrived at your court. They represent one of the great martial clans of the Middle Kingdom. 'Your child has rare talent,' they say. 'We would hone it into something extraordinary. In return, they would join our clan and become part of something far greater.'"
 murim_scout.0003.a: "Go, my child. Make us proud."
 murim_scout.0003.b: "I suppose this is for the best..."
 murim_scout.0003.c: "My child's talent has a price"
 murim_scout.0003.d: "No. My child stays with me."
 murim_scout.0003.e: "Get out, or face my wrath"
 murim_scout.0004.t: "A Clan Offers You a New Life"
 murim_scout.0004.desc: "A representative of a great martial clan approaches you directly. 'We have watched you. Your talent is wasted here. Come to the Middle Kingdom. Train with us. Become something greater.'"
 murim_scout.0004.a: "I accept. Take me to the clan."
 murim_scout.0004.b: "What's in it for me?"
 murim_scout.0004.c: "I walk my own path"
 murim_scout.0004.d: "Leave before I lose my temper"
 murim_scout.0005.t: "The Recruitment Trial"
 murim_scout.0005.desc: "The stranger does not introduce themselves. Instead, they throw a wooden sword at your feet. 'Show me,' they say simply. This is not a conversation -- it is a test, and the stakes are your entire future."
 murim_scout.0005.a: "Accept the trial with confidence"
 murim_scout.0005.b: "I don't perform tricks for strangers"
 murim_scout.0005.c: "Ask questions first -- who are you?"
 murim_scout.0006.t: "Negotiating Terms"
 murim_scout.0006.desc: "You have leverage and you know it. The scout's clan wants this recruit badly enough to negotiate. 'What does your clan offer in return for such talent?' you ask. The scout considers carefully."
 murim_scout.0006.a: "Demand gold -- talent has a price"
 murim_scout.0006.b: "Demand a future favor from the clan"
 murim_scout.0006.c: "Demand a formal alliance"
 murim_scout.0006.d: "Your terms are too low. Deal's off."
 murim_scout.0007.t: "Your Child Has Run Away"
 murim_scout.0007.desc: "Your child is gone. Their bed is empty, their things packed. A note reads: 'I'm sorry. I have to do this. The clan scout told me about a world beyond these walls, and I must see it for myself. Please don't hate me.'"
 murim_scout.0007.a: "Send riders to bring them back!"
 murim_scout.0007.b: "Let them go. It is their destiny."
 murim_scout.0007.c: "Curse that scout and their clan!"
 murim_scout.0008.t: "No Worthy Candidates"
 murim_scout.0008.desc: "You have searched this region thoroughly. The people here are strong in their own way, but none possess the spark your clan seeks. Perhaps the next region will yield better results -- or perhaps standards must be lowered."
 murim_scout.0008.a: "Move on. Standards remain."
 murim_scout.0008.b: "Lower standards -- recruit anyone viable"
 murim_scout.0008.c: "Search the countryside more thoroughly"
 murim_scout.0009.t: "Rival Scouts"
 murim_scout.0009.desc: "You are not the only one hunting for talent here. A scout from a rival clan stands across the market square, watching the same prospect you have been evaluating. Your eyes meet. Both of you know what this means."
 murim_scout.0009.a: "Approach diplomatically -- share the region"
 murim_scout.0009.b: "Challenge the rival -- this one is mine"
 murim_scout.0009.c: "Sabotage the rival with rumors"
 murim_scout.0009.d: "Withdraw -- find another candidate"
 murim_scout.0010.t: "Return to the Middle Kingdom"
 murim_scout.0010.desc: "After years traveling the world, you have returned to the Middle Kingdom. The familiar mountains of the clan's territory rise before you like old friends. The elders gather to evaluate your finds and hear your report."
 murim_scout.0010.a: "Present the recruits to the elders"
 murim_scout.0010.b: "Report failure -- no worthy candidates"
 murim_scout.0011.t: "Foreign Style Intelligence"
 murim_scout.0011.desc: "Your scout has brought back more than recruits. They describe martial techniques from distant lands unlike anything the clan has seen -- foreign grappling holds, unfamiliar blade techniques, breathing methods that defy orthodox understanding."
 murim_scout.0011.a: "Study and integrate foreign techniques"
 murim_scout.0011.b: "Our traditional ways are superior"
 murim_scout.0011.c: "Share this knowledge with allied clans"
 murim_scout.0012.t: "Scout Captured Abroad"
 murim_scout.0012.desc: "Word reaches clan headquarters: your scout has been imprisoned by a foreign ruler. The charge is espionage -- the ruler discovered the scout was evaluating subjects for recruitment to a foreign martial organization. The scout awaits judgment in a foreign dungeon."
 murim_scout.0012.a: "Pay the ransom -- their life is worth it"
 murim_scout.0012.b: "Send a rescue party"
 murim_scout.0012.c: "The scout knew the risks"
 murim_scout.0013.t: "Escape from Captivity"
 murim_scout.0013.desc: "Against all odds, you escape. The foreign jail could not hold a trained martial artist forever. You slip through the walls under cover of night, fighting past guards with nothing but bare hands and iron will. The journey home will be long -- but you are alive."
 murim_scout.0013.a: "Return to the clan. Duty is duty."
 murim_scout.0013.b: "The clan abandoned me. I owe nothing."
 murim_scout.0013.c: "Defect to the clan's enemies"
