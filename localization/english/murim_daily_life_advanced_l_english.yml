l_english:
 murim_daily_life.0011.t: "Scholar of Martial Arts"
 murim_daily_life.0011.desc: "A wandering scholar approaches with ink-stained fingers and bright, curious eyes. They are compiling a comprehensive history of martial techniques and wish to document yours. Allowing this would spread your fame, but also reveal your secrets to the world."
 murim_daily_life.0011.a: "Allow them to observe and record freely."
 murim_daily_life.0011.b: "Refuse. My techniques are secret."
 murim_daily_life.0011.c: "Share only basic knowledge, guard the rest."
 murim_daily_life.0012.t: "Poisoned Wine"
 murim_daily_life.0012.desc: "The wine's fragrance is slightly off -- a note of bitter almond beneath the plum blossom aroma that only a cultivator's refined senses would detect. Someone at this banquet has laced the communal wine with poison. Every cup raised could be someone's last."
 murim_daily_life.0012.a: "Warn everyone and expose the plot!"
 murim_daily_life.0012.b: "Quietly swap cups and investigate later."
 murim_daily_life.0012.c: "Drink it to build poison resistance."
 murim_daily_life.0013.t: "Orphan with Martial Talent"
 murim_daily_life.0013.desc: "A street urchin darts between the market stalls with supernatural agility, unknowingly channeling qi through their movements. Dirt-smeared and starving, this child possesses raw martial talent that most cultivators train decades to approach. Without guidance, it will be wasted -- or worse, exploited."
 murim_daily_life.0013.a: "Take them as my personal disciple."
 murim_daily_life.0013.b: "Send them to my sect for proper training."
 murim_daily_life.0013.c: "Ignore them. The jianghu is harsh."
 murim_daily_life.0014.t: "Ancient Tomb Discovery"
 murim_daily_life.0014.desc: "A landslide has exposed the entrance to an ancient cultivator's tomb, its stone doors carved with warnings in a dead language. The qi emanating from within is staggering -- whoever lies entombed here was a master of extraordinary power. Treasures and traps await in equal measure."
 murim_daily_life.0014.a: "Enter the tomb alone."
 murim_daily_life.0014.b: "Gather a team to explore safely."
 murim_daily_life.0014.c: "Report it to the local sect."
 murim_daily_life.0015.t: "The Bridge Guardian"
 murim_daily_life.0015.desc: "A lone martial artist stands in the center of a stone bridge, arms crossed, radiating challenge. None may pass without defeating them or earning their respect. Travelers crowd both banks, too afraid to cross. The guardian's eyes fix on you with predatory interest."
 murim_daily_life.0015.a: "Accept the challenge and fight."
 murim_daily_life.0015.b: "Find another way around."
 murim_daily_life.0015.c: "Befriend them through conversation."
 murim_daily_life.0016.t: "Spirit Beast in the Mountains"
 murim_daily_life.0016.desc: "Villagers flee in terror as a spirit beast of terrible power descends from the mountain peaks. Its roar shatters windows and its qi suppresses all who draw near. The creature is a force of nature given form -- hunting it would be glory or suicide in equal measure."
 murim_daily_life.0016.a: "Hunt the spirit beast alone."
 murim_daily_life.0016.b: "Tame it through spiritual resonance."
 murim_daily_life.0016.c: "Report it and let the local sect handle it."
 murim_daily_life.0016.d: "Avoid the mountains entirely."
 murim_daily_life.0017.t: "Calligraphy Master's Insight"
 murim_daily_life.0017.desc: "An elderly calligraphy master demonstrates their art with hypnotic grace. As brush meets paper, you perceive something extraordinary -- hidden within each fluid stroke are the movements of a supreme martial technique. The pen truly is mightier than the sword."
 murim_daily_life.0017.a: "Study the brush strokes intently."
 murim_daily_life.0017.b: "Ask the master to teach me directly."
 murim_daily_life.0017.c: "Simply enjoy the art for its beauty."
 murim_daily_life.0018.t: "Flood Threatens the Village"
 murim_daily_life.0018.desc: "The river has swollen beyond its banks after days of torrential rain. A village of hundreds lies directly in the floodwaters' path, their crude dam cracking under the pressure. A cultivator's qi could reinforce the barrier -- but the strain might shatter your own meridians."
 murim_daily_life.0018.a: "Use my qi to reinforce the dam."
 murim_daily_life.0018.b: "Organize an evacuation instead."
 murim_daily_life.0018.c: "The village is not my responsibility."
 murim_daily_life.0019.t: "Mysterious Night Music"
 murim_daily_life.0019.desc: "Haunting flute music drifts from the forest on the evening wind, its melody weaving through the trees like a living thing. The notes resonate with your qi in unsettling harmony. Something in those dark woods is calling to you -- something ancient, powerful, and unknown."
 murim_daily_life.0019.a: "Follow the music into the forest."
 murim_daily_life.0019.b: "Meditate to the music from a safe distance."
 murim_daily_life.0019.c: "Block my ears and avoid the forest."
 murim_daily_life.0020.t: "The Retired Grandmaster's Garden"
 murim_daily_life.0020.desc: "An unassuming elder tends a modest garden on the outskirts of town, their movements carrying the unhurried grace of one who has transcended all worldly concerns. But your cultivator's senses scream a warning -- this gentle gardener's qi is deeper than the ocean itself."
 murim_daily_life.0020.a: "Humbly ask for guidance."
 murim_daily_life.0020.b: "Challenge them to test my strength."
 murim_daily_life.0020.c: "Help tend the garden and enjoy the peace."
