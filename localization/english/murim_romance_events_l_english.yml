l_english:
 murim_romance.0001.t: "A Chance Encounter"
 murim_romance.0001.desc: "Beneath cherry blossoms at the spring festival, your eyes meet those of a stranger whose grace stops your breath. But as you draw closer, the emblem on their robe tells a dangerous truth -- they belong to a rival faction. The heart wants what the sword forbids."
 murim_romance.0001.a: "Pursue this forbidden love."
 murim_romance.0001.b: "Admire from afar, but do not pursue."
 murim_romance.0001.c: "Steel my heart. Duty comes first."
 murim_romance.0002.t: "Moonlit Rendezvous"
 murim_romance.0002.desc: "The plum garden is silver under moonlight as you slip through the shadows to your secret meeting place. Your beloved waits by the ancient stone, their silhouette achingly familiar. Every stolen moment together risks everything you both hold dear."
 murim_romance.0002.a: "Confess my feelings openly."
 murim_romance.0002.b: "Exchange secret tokens of affection."
 murim_romance.0002.c: "End this before we go too far."
 murim_romance.0003.t: "Discovered by the Elders"
 murim_romance.0003.desc: "The worst has happened. An elder of your faction stands before you, face twisted with fury, proof of your forbidden romance clutched in their hand. The entire sect watches, waiting for your response. Your beloved's safety hangs by a thread."
 murim_romance.0003.a: "Defy them. I choose love."
 murim_romance.0003.b: "Agree to end the romance publicly."
 murim_romance.0003.c: "Challenge the elder's authority by force."
 murim_romance.0004.t: "Elope Together"
 murim_romance.0004.desc: "With both clans turning against you, only one path remains for your love to survive. Under cover of night, you and your beloved prepare to flee together -- leaving behind everything you have ever known for the uncertain promise of a life shared in exile."
 murim_romance.0004.a: "Flee to the frontier together."
 murim_romance.0004.b: "Marry in secret within the sect."
 murim_romance.0004.c: "Part ways. The world is too cruel."
 murim_romance.0005.t: "Frontier Life"
 murim_romance.0005.desc: "Far from the politics of the martial world, you and your beloved have built a small haven at the edge of civilization. Morning mist clings to the valley as you spar together in the courtyard. Here, love and martial arts intertwine in peaceful harmony."
 murim_romance.0005.a: "Establish a hidden training ground."
 murim_romance.0005.b: "Live peacefully as healers."
 murim_romance.0005.c: "Plot to reunite the clans through our union."
 murim_romance.0006.t: "Secret Marriage Discovered"
 murim_romance.0006.desc: "Someone has learned the truth about your hidden marriage. Whether through careless whispers or deliberate investigation, the secret that protected your union is unraveling. The discoverer watches you with knowing eyes, weighing their next move."
 murim_romance.0006.a: "Bribe them to keep silent."
 murim_romance.0006.b: "Reveal the marriage and own it."
 murim_romance.0006.c: "Deny everything and frame them."
 murim_romance.0007.t: "A Rival Suitor"
 murim_romance.0007.desc: "A dashing martial artist from a powerful clan has appeared, openly courting your beloved with gifts, poetry, and demonstrations of terrifying martial prowess. Their intentions are clear, and your beloved seems... uncertain. The flames of jealousy burn hotter than qi."
 murim_romance.0007.a: "Duel the rival for my beloved's heart."
 murim_romance.0007.b: "Win through devotion and lavish gifts."
 murim_romance.0007.c: "Let my beloved choose freely."
 murim_romance.0008.t: "Peace Through Love"
 murim_romance.0008.desc: "Your cross-faction marriage has become a symbol. Where hatred once festered between clans, your union offers a fragile bridge. Clan leaders from both sides have agreed to hear your petition -- love may yet heal what generations of bloodshed could not."
 murim_romance.0008.a: "Present our union as a bridge between factions."
 murim_romance.0008.b: "Accept exile but maintain hope for the future."
 murim_romance.0009.t: "Death of a Beloved"
 murim_romance.0009.desc: "They are gone. The one whose smile could quiet the storm in your heart, whose touch could mend your shattered meridians -- gone forever. The world turns grey as grief threatens to consume you whole. Only rage, sorrow, or iron will can carry you forward now."
 murim_romance.0009.a: "Swear vengeance upon those responsible."
 murim_romance.0009.b: "Withdraw from the world in grief."
 murim_romance.0009.c: "Channel my grief into supreme cultivation."
 murim_romance.0010.t: "The Vengeance Path"
 murim_romance.0010.desc: "You have tracked the one responsible for your beloved's death to their stronghold. Every fiber of your being screams for retribution. Your blade trembles with purpose as you stand at the threshold of vengeance -- or perhaps, of letting go."
 murim_romance.0010.a: "Confront them in single combat."
 murim_romance.0010.b: "Strike from the shadows with poison."
 murim_romance.0010.c: "Release my hatred and find peace."
 murim_romance.0011.t: "Children of Forbidden Love"
 murim_romance.0011.desc: "Your child has come of age, born of the union between two rival clans. In their veins flows the qi of both factions -- a blessing or a curse depending on how it is cultivated. The martial world watches with fascination and suspicion alike."
 murim_romance.0011.a: "Train them in both clans' techniques."
 murim_romance.0011.b: "Let them choose their own path."
 murim_romance.0011.c: "Hide their dual heritage from the world."
 murim_romance.0012.t: "Legacy of Love"
 murim_romance.0012.desc: "What began as a forbidden romance has blossomed into something far greater. Cross-faction marriages are no longer unthinkable, and your story is whispered as proof that love can bridge even the deepest divides of the martial world."
 murim_romance.0012.a: "Propose a grand marriage alliance of all nine clans."
 murim_romance.0012.b: "Let alliances form through strength alone."
 murim_romance.0012.c: "Use marriage ties as intelligence networks."
