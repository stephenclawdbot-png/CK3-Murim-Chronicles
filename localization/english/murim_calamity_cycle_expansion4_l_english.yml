l_english:
 murim_calamity_cycle_expansion4.0001.t: "The Blood Tide Rises"
 murim_calamity_cycle_expansion4.0001.desc: "The Calamity has reached its zenith. Across the martial world, clan leaders draw their weapons not against the cataclysm, but against each other. The blood tide has risen — an unstoppable wave of violence as every sect fights for survival in a world coming apart at the seams."
 murim_calamity_cycle_expansion4.0001.a: "Bear witness to the blood tide."
 murim_calamity_cycle_expansion4.0001.b: "Try to unite the clans against the calamity."
 murim_calamity_cycle_expansion4.0002.t: "War Declaration in the Calamity"
 murim_calamity_cycle_expansion4.0002.desc: "Your rival stands across the battlefield, their clan arrayed behind them. In the shadow of the Calamity, old grudges have become killing matters. The time for words has passed — only steel and qi will decide which clan survives the apocalypse."
 murim_calamity_cycle_expansion4.0002.a: "Launch a full assault on the enemy clan."
 murim_calamity_cycle_expansion4.0002.b: "Challenge their leader to single combat."
 murim_calamity_cycle_expansion4.0003.t: "Duel Amid the Apocalypse"
 murim_calamity_cycle_expansion4.0003.desc: "Two clan leaders meet on neutral ground as the world crumbles around them. No seconds, no rules, no mercy. The winner's clan survives. The loser's name becomes ash on the wind. This is what the martial world has been reduced to — single combat for the right to exist."
 murim_calamity_cycle_expansion4.0003.a: "Fight to the death."
 murim_calamity_cycle_expansion4.0003.b: "Accept mutual exhaustion — both clans stand down."
 murim_calamity_cycle_expansion4.0004.t: "The Emperor Falls"
 murim_calamity_cycle_expansion4.0004.desc: "The unthinkable has happened. As the Calamity reaches its peak, an assassin — wreathed in demonic qi — has struck at the Murim Emperor himself. The pillar that held the martial world together is about to shatter. Without the Emperor, there is no order, no authority, no center."
 murim_calamity_cycle_expansion4.0004.a: "The Emperor falls. Chaos reigns."
 murim_calamity_cycle_expansion4.0004.b: "Rush to protect the Emperor!"
 murim_calamity_cycle_expansion4.0005.t: "Emergency Alliance Summit"
 murim_calamity_cycle_expansion4.0005.desc: "You have called the surviving clan leaders together for an emergency summit. The blood tide threatens to consume everyone — orthodox and unorthodox alike. If the clans cannot set aside their hatred now, there will be no clans left when the Calamity passes."
 murim_calamity_cycle_expansion4.0005.a: "Call the emergency summit — all remaining leaders."
 murim_calamity_cycle_expansion4.0005.b: "The calamity cannot be stopped. Fortify your own."
 murim_calamity_cycle_expansion4.0006.t: "Defending the Emperor"
 murim_calamity_cycle_expansion4.0006.desc: "You rush toward the Emperor's chambers, qi blazing through your meridians. The assassin is already inside — a figure of terrible power, moving with the killing grace of one who has embraced the darkest martial arts. You have seconds to act."
 murim_calamity_cycle_expansion4.0006.a: "Intercept the assassin personally."
 murim_calamity_cycle_expansion4.0006.b: "Send your best disciples to shield the Emperor."
 murim_calamity_cycle_expansion4.0007.t: "Response to the Summit"
 murim_calamity_cycle_expansion4.0007.desc: "An urgent summons has arrived — a clan leader calls for an emergency ceasefire amid the Calamity's devastation. The blood tide has claimed too many already. But ceasefire means trusting those who were trying to kill you yesterday. Can such trust exist in the apocalypse?"
 murim_calamity_cycle_expansion4.0007.a: "Accept the ceasefire."
 murim_calamity_cycle_expansion4.0007.b: "Refuse — the war continues."
 murim_calamity_cycle_expansion4.0008.t: "The Ceasefire Betrayed"
 murim_calamity_cycle_expansion4.0008.desc: "It was too good to last. Someone has broken the ceasefire — attacking during the summit itself, when guards were lowered and weapons sheathed. The fragile peace shatters like porcelain on stone, and the Calamity's fury intensifies as if feeding on the betrayal."
 murim_calamity_cycle_expansion4.0008.a: "The ceasefire is shattered."
 murim_calamity_cycle_expansion4.0008.b: "Expose the betrayer before they strike."
 murim_calamity_cycle_expansion4.0009.t: "Civilian Massacre"
 murim_calamity_cycle_expansion4.0009.desc: "The clan wars have spilled beyond the martial world. Villages burn. Markets run red. The civilians who have no qi, no techniques, no defenses — they die in droves as collateral damage of battles between cultivators who have forgotten what they were supposed to protect."
 murim_calamity_cycle_expansion4.0009.a: "There is nothing to be done. War consumes all."
 murim_calamity_cycle_expansion4.0009.b: "Shelter the civilians in your territory."
 murim_calamity_cycle_expansion4.0010.t: "Dynasty's Last Stand"
 murim_calamity_cycle_expansion4.0010.desc: "Your dynasty is on the brink of extinction. The Calamity has claimed nearly everyone who shares your blood. But you still draw breath, and where there is life, there is the possibility of continuation. The question is how — through hiding, through fighting, or through legacy."
 murim_calamity_cycle_expansion4.0010.a: "Hide in a mountain refuge — survive in secret."
 murim_calamity_cycle_expansion4.0010.b: "Fight through the calamity. Refuse to hide."
 murim_calamity_cycle_expansion4.0010.c: "Seal your martial arts in a manual for the next era."
