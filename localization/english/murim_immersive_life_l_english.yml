l_english:
 # ===========================
 # IMMERSIVE LIFE EVENTS
 # Personal stories & relationships
 # ===========================

 # --- Master-Disciple ---
 murim_life.0001.t: "The Forbidden Student"
 murim_life.0001.desc: "You discover that your most promising disciple has been secretly studying forbidden techniques. The dark qi in their meridians is unmistakable. They look at you with fear and defiance."
 murim_life.0001.a: "Confront them with compassion"
 murim_life.0001.b: "Expel them immediately"
 murim_life.0001.c: "Help them purge the corruption secretly"

 murim_life.0002.t: "Surpassed by the Student"
 murim_life.0002.desc: "Your disciple's cultivation has surpassed yours. The student has become the master. Pride and jealousy war within you as they achieve what you never could."
 murim_life.0002.a: "Celebrate their achievement with pride"
 murim_life.0002.b: "Push yourself harder to reclaim superiority"
 murim_life.0002.c: "Accept it gracefully — this is a master's purpose"

 murim_life.0003.t: "The Dying Master"
 murim_life.0003.desc: "Your master lies on their deathbed, cultivation spent. With their last breaths, they must pass on their legacy technique — but they have multiple disciples. Only one can receive it."
 murim_life.0003.a: "Plead your worthiness"
 murim_life.0003.b: "Defer to master's wisdom"
 murim_life.0003.c: "Suggest sharing the technique"

 murim_life.0004.t: "The Betrayer Returns"
 murim_life.0004.desc: "Your former disciple — the one who betrayed you and fled to a rival sect — has returned. They're stronger now, and they've come with an offer: reunion, or confrontation."
 murim_life.0004.a: "Welcome them back"
 murim_life.0004.b: "Fight them — betrayal demands blood"
 murim_life.0004.c: "Hear them out, guard raised"

 murim_life.0005.t: "The Impossible Test"
 murim_life.0005.desc: "Your master assigns you a quest that seems impossible: retrieve a rare herb from the heart of a demonic territory, alone, within one month. Failure means expulsion."
 murim_life.0005.a: "Accept without question"
 murim_life.0005.b: "Question the wisdom of this test"
 murim_life.0005.c: "Secretly bring backup"

 murim_life.0006.t: "The Enemy Returns"
 murim_life.0006.desc: "Your former disciple stands across from you in the tournament arena. Their techniques are twisted versions of what you taught them, corrupted by their new masters. This is personal."
 murim_life.0006.a: "Fight with everything you have"
 murim_life.0006.b: "Hold back — they're still your student"
 murim_life.0006.c: "Forfeit — you can't fight them"

 murim_life.0007.t: "Political Disagreement"
 murim_life.0007.desc: "Your master wants the sect to ally with the imperial court. You believe this is a mistake — the court will absorb your sect's identity. The debate turns heated."
 murim_life.0007.a: "Argue your position passionately"
 murim_life.0007.b: "Defer to master's experience"
 murim_life.0007.c: "Quietly build support for your view"

 murim_life.0008.t: "Master's Dark Past"
 murim_life.0008.desc: "You discover a terrible truth: your master was once a demonic cultivator. They changed their name, hid their past, and founded your sect on a lie. Everything you believed is shaken."
 murim_life.0008.a: "Confront your master"
 murim_life.0008.b: "Keep the secret — the past is the past"
 murim_life.0008.c: "Report them to the Tribunal"

 # --- Friendship & Brotherhood ---
 murim_life.0010.t: "A Brother's Call"
 murim_life.0010.desc: "Your sworn brother sends an urgent message: they're trapped behind enemy lines during the faction war, surrounded and outnumbered. Coming to their aid would mean crossing into hostile territory."
 murim_life.0010.a: "Go to their aid immediately"
 murim_life.0010.b: "Send help but stay behind"
 murim_life.0010.c: "It's too dangerous — pray for their survival"

 murim_life.0011.t: "Corruption Claims a Friend"
 murim_life.0011.desc: "Your best friend has fallen to forbidden technique corruption. Their personality is changing — the warm, loyal person you knew is being consumed by darkness. They refuse to seek help."
 murim_life.0011.a: "Force them to accept help"
 murim_life.0011.b: "Fight them if you must — save their soul"
 murim_life.0011.c: "Give them space and hope"

 murim_life.0012.t: "Childhood Friend, New Rival"
 murim_life.0012.desc: "The child you grew up training with in another sect has become your sect's greatest rival. Meetings that were once joyful reunions are now tense standoffs. The friendship strains."
 murim_life.0012.a: "Try to maintain the friendship"
 murim_life.0012.b: "Accept it — duty over friendship"
 murim_life.0012.c: "Work together behind the scenes"

 murim_life.0013.t: "Blood Brother Ceremony"
 murim_life.0013.desc: "After surviving a desperate battle together, your companion proposes a blood oath ceremony. Once sworn, you'll be bound for life — sharing triumph and tragedy equally."
 murim_life.0013.a: "Swear the oath"
 murim_life.0013.b: "Decline gently — oaths are chains"
 murim_life.0013.c: "Propose a lesser bond instead"

 murim_life.0014.t: "The Imperial Spy Friend"
 murim_life.0014.desc: "Your closest friend in the martial world has been revealed as an imperial spy. They've been reporting on you for years. The betrayal cuts deeper than any blade."
 murim_life.0014.a: "Confront them with fury"
 murim_life.0014.b: "Try to understand why"
 murim_life.0014.c: "Cut them off completely"

 murim_life.0015.t: "More Than Friends"
 murim_life.0015.desc: "Long sparring sessions have evolved into something more. Your training partner looks at you differently now, and you catch yourself doing the same. This could change everything."
 murim_life.0015.a: "Acknowledge the feelings"
 murim_life.0015.b: "Keep it professional"
 murim_life.0015.c: "Distance yourself"

 murim_life.0016.t: "The Ultimate Sacrifice"
 murim_life.0016.desc: "During the calamity's darkest hour, your friend pushes you out of the way of a lethal attack. They take the blow meant for you. As they fall, they smile. 'Live well,' they whisper."
 murim_life.0016.a: "Swear to honor their sacrifice"
 murim_life.0016.b: "Channel the grief into rage"
 murim_life.0016.c: "Carry their legacy forward"

 # --- Romantic Arcs ---
 murim_life.0020.t: "Forbidden Love"
 murim_life.0020.desc: "They're from an unorthodox sect. You're orthodox. Your love is forbidden by centuries of tradition and hatred. Yet when you're together, the martial world's rules feel meaningless."
 murim_life.0020.a: "Pursue the love in secret"
 murim_life.0020.b: "End it before anyone discovers"
 murim_life.0020.c: "Defy tradition openly"

 murim_life.0021.t: "The Kidnapping"
 murim_life.0021.desc: "Your beloved has been taken by a rival sect — kidnapped as leverage against your clan. The ransom demands are impossible. But you'd storm hell itself to get them back."
 murim_life.0021.a: "Launch a rescue mission"
 murim_life.0021.b: "Pay whatever they ask"
 murim_life.0021.c: "Challenge their sect leader to single combat"

 murim_life.0022.t: "Duty vs Heart"
 murim_life.0022.desc: "Your clan has arranged a political marriage that would secure a powerful alliance. But your heart belongs to another — someone who brings no political advantage, only love."
 murim_life.0022.a: "Follow your heart"
 murim_life.0022.b: "Accept the arranged marriage"
 murim_life.0022.c: "Try to have both"

 murim_life.0023.t: "Dual Cultivation"
 murim_life.0023.desc: "You and your lover have discovered that cultivating together amplifies both your powers. The dual cultivation technique is rare and intimate, but it makes you vulnerable if the bond is ever broken."
 murim_life.0023.a: "Practice dual cultivation"
 murim_life.0023.b: "The risk is too great"
 murim_life.0023.c: "Research safeguards first"

 murim_life.0024.t: "The Love Triangle"
 murim_life.0024.desc: "Two rivals compete for your affection — one from your own sect, one from another. Both are talented, both are genuine. Your choice will create an ally and an enemy."
 murim_life.0024.a: "Choose the one from your sect"
 murim_life.0024.b: "Choose the outsider"
 murim_life.0024.c: "Choose neither — freedom first"

 murim_life.0025.t: "Dark Secret Revealed"
 murim_life.0025.desc: "Your lover discovers you've been practicing forbidden techniques. The horror in their eyes is unmistakable. They love you — but can they love what you're becoming?"
 murim_life.0025.a: "Beg for understanding"
 murim_life.0025.b: "Promise to purge the corruption"
 murim_life.0025.c: "If they can't accept me, we're over"

 murim_life.0026.t: "Reunion"
 murim_life.0026.desc: "After years of separation — war, exile, or simply time — you find your lost love again. They're different now. Older, scarred, changed by their own journey. But the spark remains."
 murim_life.0026.a: "Try to rebuild what was lost"
 murim_life.0026.b: "You've both changed too much"
 murim_life.0026.c: "Start fresh — new people, same love"

 murim_life.0027.t: "The War Widow"
 murim_life.0027.desc: "Your beloved fell in the Continental War. The grief is a physical weight on your chest. Vengeance calls, but so does peace. Your loved one would want you to live, not to burn."
 murim_life.0027.a: "Swear vengeance against the ones who killed them"
 murim_life.0027.b: "Honor their memory by living well"
 murim_life.0027.c: "Throw yourself into cultivation to forget"

 murim_life.0028.t: "Secret Heir"
 murim_life.0028.desc: "A young cultivator appears at your doorstep claiming to be your child — born from a relationship you thought ended years ago. They have your eyes and your qi signature."
 murim_life.0028.a: "Acknowledge them and begin training"
 murim_life.0028.b: "Deny it — too dangerous for them"
 murim_life.0028.c: "Verify the claim first"

 # --- Personal Crises ---
 murim_life.0030.t: "The Blank Slate"
 murim_life.0030.desc: "A cultivation deviation has wiped your memories. You wake in an unfamiliar place with unfamiliar people who call you by a name you don't recognize. Your power remains — but who are you?"
 murim_life.0030.a: "Search for your identity"
 murim_life.0030.b: "Embrace the fresh start"
 murim_life.0030.c: "Trust the people who found you"

 murim_life.0031.t: "The Slow Poison"
 murim_life.0031.desc: "Someone has poisoned you with a slow-acting meridian toxin. You have months, not years. The poison is rare — only a Poison Flower specialist or the Tang Clan could have made it."
 murim_life.0031.a: "Seek a cure from Poison Flower Sect"
 murim_life.0031.b: "Hunt the poisoner"
 murim_life.0031.c: "Use remaining time to settle all debts"

 murim_life.0032.t: "Framed"
 murim_life.0032.desc: "Evidence has been planted linking you to a shadow politics assassination. The victim's sect demands justice. The Tribunal is issuing a summons. You didn't do this — but who did?"
 murim_life.0032.a: "Clear your name through investigation"
 murim_life.0032.b: "Flee and prove innocence from hiding"
 murim_life.0032.c: "Face the Tribunal and trust in justice"

 murim_life.0033.t: "The Impossible Duel"
 murim_life.0033.desc: "You've been challenged by a cultivator three ranks above you. Declining is seen as cowardice. Accepting is likely suicide. But sometimes miracles happen in the arena."
 murim_life.0033.a: "Accept — fight with everything"
 murim_life.0033.b: "Decline and endure the shame"
 murim_life.0033.c: "Negotiate different terms"

 murim_life.0034.t: "Foundation of Lies"
 murim_life.0034.desc: "Ancient records reveal that your clan's founding technique was stolen from another sect generations ago. Your entire martial identity is built on theft. If this gets out, your clan is finished."
 murim_life.0034.a: "Destroy the evidence"
 murim_life.0034.b: "Return the technique — honor demands it"
 murim_life.0034.c: "Renegotiate — offer to share going forward"

 murim_life.0035.t: "The Prophecy's Weight"
 murim_life.0035.desc: "An ancient prophecy has been found that names you — or someone matching your description exactly — as the pivotal figure in the coming calamity. The weight of destiny settles on your shoulders."
 murim_life.0035.a: "Accept the burden of destiny"
 murim_life.0035.b: "Reject it — prophecies are superstition"
 murim_life.0035.c: "Prepare, but on your own terms"

 murim_life.0036.t: "Powerless"
 murim_life.0036.desc: "A devastating technique has sealed your cultivation. You're mortal now — no qi, no techniques, no supernatural abilities. Just a person in a world of gods. You must survive or find a cure."
 murim_life.0036.a: "Desperately seek a cure"
 murim_life.0036.b: "Learn to survive as a mortal"
 murim_life.0036.c: "Find allies to protect you"

 murim_life.0037.t: "Ghost of the Past"
 murim_life.0037.desc: "During meditation, you're confronted by the spirit of someone you killed — perhaps in a duel, perhaps in war. They demand an answer: was their death justified?"
 murim_life.0037.a: "Defend your actions"
 murim_life.0037.b: "Accept responsibility and atone"
 murim_life.0037.c: "Banish the spirit with force"

 murim_life.0038.t: "The Devil's Bargain"
 murim_life.0038.desc: "A mysterious entity offers you a bargain: unlimited cultivation potential in exchange for betraying your sect, your friends, your principles. Everything you ever wanted — for everything you ever were."
 murim_life.0038.a: "Accept — power is everything"
 murim_life.0038.b: "Refuse absolutely"
 murim_life.0038.c: "Negotiate — there must be a middle ground"

 # --- Sect/Clan Life ---
 murim_life.0040.t: "The Prodigy Arrives"
 murim_life.0040.desc: "A young cultivator with extraordinary natural talent has joined your sect. Their potential is once-in-a-generation. Every elder wants to claim them as their personal disciple."
 murim_life.0040.a: "Claim them for yourself"
 murim_life.0040.b: "Assign them to the best teacher"
 murim_life.0040.c: "Let them choose their own master"

 murim_life.0041.t: "Empty Coffers"
 murim_life.0041.desc: "The clan treasury is nearly empty. Cultivation resources are running out. Your disciples grow restless. You need income — through trade, tournaments, mercenary work, or more questionable means."
 murim_life.0041.a: "Take mercenary contracts"
 murim_life.0041.b: "Open trade with the jianghu"
 murim_life.0041.c: "Raid a wealthy rival sect"

 murim_life.0042.t: "The Faction Within"
 murim_life.0042.desc: "A group of inner disciples has been meeting in secret. They believe the current leadership is weak and outdated. They haven't moved yet — but they're gathering support."
 murim_life.0042.a: "Crush the faction before it grows"
 murim_life.0042.b: "Address their concerns publicly"
 murim_life.0042.c: "Infiltrate the faction to monitor it"

 murim_life.0043.t: "Merger Proposal"
 murim_life.0043.desc: "A rival clan proposes a merger. They're strong where you're weak, and vice versa. Together you'd be formidable. But one clan's identity would be absorbed into the other's."
 murim_life.0043.a: "Accept — strength through unity"
 murim_life.0043.b: "Refuse — our identity matters"
 murim_life.0043.c: "Counter-propose an alliance instead"

 murim_life.0044.t: "The Stolen Treasure"
 murim_life.0044.desc: "Your sect's most sacred artifact has been stolen during the night. The guards saw nothing. The artifact is irreplaceable — its loss could unravel your sect's core techniques."
 murim_life.0044.a: "Launch a full investigation"
 murim_life.0044.b: "Hire jianghu trackers"
 murim_life.0044.c: "Announce a reward for its return"

 murim_life.0045.t: "The Conference Goes Wrong"
 murim_life.0045.desc: "The annual clan meeting has devolved into shouting. The elder council is split, disciples are taking sides, and your sect is on the verge of fracturing along generational lines."
 murim_life.0045.a: "Assert authority and restore order"
 murim_life.0045.b: "Let them air their grievances"
 murim_life.0045.c: "Call for a recess and work behind scenes"

 murim_life.0046.t: "Elder vs Leader"
 murim_life.0046.desc: "The elder council has formally opposed your latest decision. Their combined cultivation dwarfs yours, and tradition gives them significant power. This is a test of your authority."
 murim_life.0046.a: "Overrule them with force of will"
 murim_life.0046.b: "Compromise — find middle ground"
 murim_life.0046.c: "Defer — pick your battles"

 murim_life.0047.t: "Corruption in the Sacred Grounds"
 murim_life.0047.desc: "Dark qi has seeped into your sect's sacred cultivation grounds. Meditating there now risks corruption. The source must be found and purged before your sect's cultivation is permanently damaged."
 murim_life.0047.a: "Lead the purification yourself"
 murim_life.0047.b: "Hire outside experts"
 murim_life.0047.c: "Investigate the source first"

 murim_life.0048.t: "Trespassing Accusation"
 murim_life.0048.desc: "A neighboring sect accuses your disciples of trespassing on their territory and stealing cultivation herbs. Your disciples deny it. The evidence is circumstantial but damning."
 murim_life.0048.a: "Investigate your disciples"
 murim_life.0048.b: "Deny everything and stand firm"
 murim_life.0048.c: "Offer compensation to keep peace"

