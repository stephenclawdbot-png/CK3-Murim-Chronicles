l_english:
 # ==========================================
 # MURIM CHRONICLES - NEW SYSTEMS LOCALIZATION
 # Heartbeat #56: Tournament, Entry Path, Clan Traits, Decisions, Modifiers
 # ==========================================

 # ---------------------
 # TOURNAMENT EVENTS
 # ---------------------
 murim_tournament.0001.t:0 "The Young Dragon Tournament"
 murim_tournament.0001.desc:0 "Word has spread across the martial world -- the Young Dragon Tournament begins! Every five years, the greatest young martial artists under thirty gather to test their skills. Clan scouts fill the stands, watching for talent. Your name is on the roster."
 murim_tournament.0001.a:0 "I will fight with everything I have!"
 murim_tournament.0001.a.victory:0 "Your strikes flow like water, your footwork impeccable. [ROOT.GetFirstName] defeats [tournament_opponent.GetFirstName] and advances!"
 murim_tournament.0001.a.defeat:0 "[tournament_opponent.GetFirstName]'s technique overwhelms you. You fall to the arena floor, eliminated."
 murim_tournament.0001.b:0 "I forfeit. My body is not ready."

 murim_tournament.0002.t:0 "Young Dragon Semi-Finals"
 murim_tournament.0002.desc:0 "Only four fighters remain. The crowd roars as you step into the arena for the semi-final. Your opponent is a proven fighter -- this will not be easy."
 murim_tournament.0002.a:0 "Face the challenge head-on!"
 murim_tournament.0002.a.victory:0 "A decisive blow sends your opponent staggering. [ROOT.GetFirstName] reaches the finals!"
 murim_tournament.0002.a.defeat:0 "So close, yet so far. You fought well, but the semi-final proves to be your limit."

 murim_tournament.0003.t:0 "Young Dragon Finals"
 murim_tournament.0003.desc:0 "This is it. The final match. Two young dragons, one title. The leaders of all nine clans watch from the VIP pavilion. Mount Hua, Shaolin, Wudang, Tang Clan, Beggar Sect, Iron Fist Gate -- even the Heavenly Demon Sect, Poison Flower Palace, and Phantom Blade Sect have sent observers."
 murim_tournament.0003.a:0 "For glory! For the martial world!"
 murim_tournament.0003.a.victory:0 "YOUNG DRAGON CHAMPION! [ROOT.GetFirstName] stands victorious as the crowd erupts! Every clan in the martial world takes notice."
 murim_tournament.0003.a.defeat:0 "Agonizing defeat in the final. You fought magnificently, but the title goes to another."

 murim_tournament.0004.t:0 "The Grand Tournament"
 murim_tournament.0004.desc:0 "Once every decade, the Grand Tournament gathers the mightiest martial artists from across the world. No age limit, no mercy. Orthodox and unorthodox clash freely. The winner earns the title of Grand Champion."
 murim_tournament.0004.a:0 "Enter the Grand Tournament!"
 murim_tournament.0004.a.victory:0 "Your martial arts prove superior! [ROOT.GetFirstName] advances in the Grand Tournament!"
 murim_tournament.0004.a.defeat:0 "The Grand Tournament proves too fierce. You are eliminated."
 murim_tournament.0004.b:0 "Observe from the stands."

 murim_tournament.0005.t:0 "Grand Tournament Finals"
 murim_tournament.0005.desc:0 "The arena shakes with anticipation. Two titans of the martial world face each other in the Grand Tournament Finals. The Orthodox and Unorthodox factions hold their breath -- this fight will determine which side claims bragging rights for the next decade."
 murim_tournament.0005.a:0 "This is my moment of ascension!"
 murim_tournament.0005.a.victory:0 "GRAND CHAMPION! [ROOT.GetFirstName] has won the Grand Tournament! The martial world will remember this day for generations!"
 murim_tournament.0005.a.defeat:0 "A worthy battle, but the Grand Champion title eludes you. You fought a legend."

 murim_tournament.0006.t:0 "Champion's Coronation"
 murim_tournament.0006.desc:0 "The nine clan leaders bow in acknowledgment. You are crowned Grand Champion of the martial world. What will you do with this power?"
 murim_tournament.0006.a:0 "I accept this honor with humility."
 murim_tournament.0006.b:0 "This is only the beginning. I aim for the peak."

 murim_tournament.0010.t:0 "Clan Scouts Approach"
 murim_tournament.0010.desc:0 "After your impressive tournament showing, scouts from multiple clans approach you. Each offers membership and training in their unique martial arts."
 murim_tournament.0010.a:0 "I will join Mount Hua Sect."
 murim_tournament.0010.b:0 "Shaolin's discipline calls to me."
 murim_tournament.0010.c:0 "The Wudang path of balance is mine."
 murim_tournament.0010.d:0 "Iron Fist Gate respects raw power."
 murim_tournament.0010.e:0 "The Heavenly Demon whispers promises of true strength..."
 murim_tournament.0010.f:0 "The Phantom Blade's shadow arts intrigue me."
 murim_tournament.0010.g:0 "I walk my own path."

 murim_tournament.0011.t:0 "Every Clan Wants the Champion"
 murim_tournament.0011.desc:0 "As Young Dragon Champion, every clan in the martial world sends their most persuasive elders to recruit you. This is the bidding war of a generation."
 murim_tournament.0011.a:0 "Mount Hua's legacy is worthy of me."
 murim_tournament.0011.b:0 "The Beggar Sect fights for the people."
 murim_tournament.0011.c:0 "Poison Flower Palace offers... unique opportunities."
 murim_tournament.0011.d:0 "I bow to no clan. I AM the new power."

 # ---------------------
 # ENTRY PATH EVENTS
 # ---------------------
 murim_entry.0001.t:0 "A Wanderer's Discovery"
 murim_entry.0001.desc:0 "You have nothing -- no lands, no title, no future. But on a dusty road outside a nameless village, you witness something impossible. Two figures clash mid-air, their strikes splitting the earth. The martial world exists, and it could be your way out."
 murim_entry.0001.a:0 "I have nothing to lose. I will learn the way of the fist."
 murim_entry.0001.b:0 "The martial world is not for me."

 murim_entry.0002.t:0 "Martial Arts in My Court"
 murim_entry.0002.desc:0 "One of your courtiers moves with unnatural grace. Their reflexes defy explanation. When pressed, they reveal the truth -- they are a martial artist, part of a hidden world of cultivators and warriors that exists alongside your feudal domain."
 murim_entry.0002.a:0 "Teach me. I wish to understand this hidden world."
 murim_entry.0002.b:0 "I will watch from the shadows. Knowledge is power."
 murim_entry.0002.c:0 "These martial artists are a threat to my authority."

 murim_entry.0003.t:0 "The Courtier's Curiosity"
 murim_entry.0003.desc:0 "You've seen your liege's guest move through sword forms at dawn. Each motion is impossibly precise, almost supernatural. They notice your watching and smile. 'Would you like to learn?'"
 murim_entry.0003.a:0 "Master, please accept me as your student."
 murim_entry.0003.b:0 "My place is in the court, not on the battlefield."

 murim_entry.0004.t:0 "A Fateful Encounter"
 murim_entry.0004.desc:0 "Deep in the mountains, you stumble upon something extraordinary -- a lone warrior meditating atop a waterfall, their body surrounded by visible qi energy. They open one eye and regard you calmly. 'Fate has brought you here, traveler.'"
 murim_entry.0004.a:0 "Something about this warrior draws me. I must follow."
 murim_entry.0004.b:0 "I saw nothing. This never happened."

 murim_entry.0010.t:0 "A Master's Offer"
 murim_entry.0010.desc:0 "A wandering master has taken notice of your determination. They offer to guide your first steps into the martial world -- but the path you choose will shape your entire future."
 murim_entry.0010.a:0 "Join Mount Hua Sect and learn the Plum Blossom Sword."
 murim_entry.0010.b:0 "The Heavenly Demon Sect welcomes the hungry."
 murim_entry.0010.c:0 "I walk my own path."

 murim_entry.0011.t:0 "Iron Fist Gate Recruiters"
 murim_entry.0011.desc:0 "A group of muscular martial artists approach you in the market. Their fists are wrapped in iron bands. 'Show us your fists,' the leader says. 'If they're strong enough, you're in.'"
 murim_entry.0011.a:0 "Let me show you what I can do."
 murim_entry.0011.b:0 "I seek a different path."

 murim_entry.0012.t:0 "A Shadow in the Alley"
 murim_entry.0012.desc:0 "A figure materializes from the darkness. You didn't see them move. 'We've been watching you,' they whisper. 'The Phantom Blade Sect could use someone with your... potential.'"
 murim_entry.0012.a:0 "A blade in the dark... I can be that blade."
 murim_entry.0012.b:0 "I want nothing to do with assassins."

 murim_entry.0013.t:0 "The Poison Flower's Invitation"
 murim_entry.0013.desc:0 "A beautiful stranger approaches you with a flower that shimmers with unusual colors. 'The Poison Flower Palace sees the art in everything,' they say. 'Even in you. Would you like to learn the dance of toxins?'"
 murim_entry.0013.a:0 "Beauty and poison walk hand in hand. I will learn both."
 murim_entry.0013.b:0 "Poison is not my way."

 murim_entry.0020.t:0 "A Noble's Training Begins"
 murim_entry.0020.desc:0 "In the privacy of your study, your martial teacher lays out two paths. The gentle meditation of Wudang or the iron discipline of Shaolin. Your noble status gives you the luxury of choice."
 murim_entry.0020.a:0 "The Wudang way of balance suits a ruler."
 murim_entry.0020.b:0 "The Shaolin monks teach body and mind as one."
 murim_entry.0020.c:0 "A ruler bows to no sect. I train alone."

 murim_entry.0030.t:0 "The Courtier's First Lesson"
 murim_entry.0030.desc:0 "Your master has agreed to teach you. Now comes the crucial choice: which martial path will you walk?"
 murim_entry.0030.a:0 "The Beggar Sect teaches survival first."
 murim_entry.0030.b:0 "Mount Hua's sword dances are legendary."
 murim_entry.0030.c:0 "I will learn the basics and find my own way."

 murim_entry.0040.t:0 "The Mountain's Secrets"
 murim_entry.0040.desc:0 "The mountains hold ancient secrets. Hidden caves, forgotten manuals, the echoes of masters long dead. What you find here could change your destiny."
 murim_entry.0040.a:0 "These poison manuals bear the Tang Clan seal..."
 murim_entry.0040.b:0 "I will train here, alone with the wind and stone."
 murim_entry.0040.c:0 "I've seen enough. Time to find a real teacher."

