 # ==========================================
 # CHARACTER MODIFIERS
 # ==========================================

 murim_meditation_focus:0 "Meditation Focus"
 murim_meditation_focus_desc:0 "A period of deep meditation has cleared the mind and aligned the qi pathways."
 murim_body_tempering_recovery:0 "Body Tempering Recovery"
 murim_body_tempering_recovery_desc:0 "The body aches from a recent tempering session, but grows stronger with each passing day."
 murim_sparring_fatigue:0 "Sparring Fatigue"
 murim_sparring_fatigue_desc:0 "Bruised and battered from an intense sparring bout, but the experience was invaluable."
 murim_closed_door_cultivation:0 "Closed Door Cultivation"
 murim_closed_door_cultivation_desc:0 "Secluded in closed-door cultivation, cut off from the world to pursue a breakthrough."
 murim_studying_manual:0 "Studying a Manual"
 murim_studying_manual_desc:0 "Poring over the dense texts of a cultivation manual, deciphering its hidden meanings."
 murim_tribulation_aftermath:0 "Tribulation Aftermath"
 murim_tribulation_aftermath_desc:0 "The body and spirit still reel from enduring heavenly tribulation."
 murim_qi_exchange_given:0 "Qi Depleted"
 murim_qi_exchange_given_desc:0 "Having shared vital qi with another, the reserves are temporarily diminished."
 murim_qi_exchange_received:0 "Qi Infused"
 murim_qi_exchange_received_desc:0 "Foreign qi circulates through the meridians, bolstering vitality and accelerating recovery."
 murim_new_sect_master:0 "New Sect Master"
 murim_new_sect_master_desc:0 "The prestige and burden of being recognized as a sect master weighs upon the shoulders."

 # ==========================================
 # GRIND EVENTS
 # ==========================================

 # 0001 - Solo Meditation
 murim_grind.0001.t:0 "Meditation of the Still Mind"
 murim_grind.0001.desc:0 "The world fades as you settle into the lotus position, drawing breath in rhythm with the pulse of the earth. Qi flows through your meridians like a gentle stream, carrying away impurities and sharpening your inner sight. The temptation to push deeper beckons..."
 murim_grind.0001.a:0 "Light meditation -- steady and safe."
 murim_grind.0001.b:0 "Push deeper into the trance."
 murim_grind.0001.c:0 "Abandon the session. I have other matters."

 # 0010 - Body Tempering
 murim_grind.0010.t:0 "Tempering the Mortal Vessel"
 murim_grind.0010.desc:0 "You plunge your fists into scalding herbal solution, feeling the medicinal qi seep into your bones. Every nerve screams as your body is broken down and rebuilt, each layer harder than the last. The pain is exquisite -- a crucible that separates true cultivators from pretenders."
 murim_grind.0010.a:0 "Endure the standard tempering regimen."
 murim_grind.0010.b:0 "Push beyond the limits -- risk everything."
 murim_grind.0010.c:0 "The pain is too great. Cease the tempering."

 # 0020 - Qi Circulation
 murim_grind.0020.t:0 "Circulating the Heavenly Cycle"
 murim_grind.0020.desc:0 "You guide your internal qi through the great meridian cycle, feeling it surge through each gate and channel. The energy builds with each revolution, pressing against the walls of your cultivation base like a river straining against a dam. One wrong turn could shatter everything."
 murim_grind.0020.a:0 "Follow the orthodox circulation path."
 murim_grind.0020.b:0 "Attempt the reverse circulation -- dangerous but potent."
 murim_grind.0020.c:0 "Halt the circulation before it spirals."

 # 0030 - Forbidden Study
 murim_grind.0030.t:0 "Whispers of the Forbidden Path"
 murim_grind.0030.desc:0 "The ancient text pulses with a dark allure as you trace its forbidden characters. Each word etches itself into your consciousness, offering power that the orthodox sects sealed away for good reason. You feel something stir in the shadows of your soul -- hungry, patient, waiting."
 murim_grind.0030.a:0 "Study cautiously, taking only fragments."
 murim_grind.0030.b:0 "Embrace the darkness fully."
 murim_grind.0030.c:0 "Seal the text away. This path is too dangerous."

 # 0040 - Breakthrough Attempt
 murim_grind.0040.t:0 "Shattering the Heavenly Barrier"
 murim_grind.0040.desc:0 "The moment has come. Your cultivation base trembles at the threshold of the next realm, qi roaring through every meridian like a tempest. The barrier looms before your inner eye -- a wall of crystallized heavenly law that must be shattered or endured. Everything you have cultivated leads to this instant."
 murim_grind.0040.a:0 "Strike with everything I have!"
 murim_grind.0040.b:0 "Approach with patience and precision."
 murim_grind.0040.c:0 "Retreat. I am not ready."
 murim_grind.0040.d:0 "Use forbidden power to force the breakthrough."

 # 0050 - Tribulation
 murim_grind.0050.t:0 "Heavenly Tribulation Descends"
 murim_grind.0050.desc:0 "The sky darkens. Thunder rolls across a cloudless heaven as bolts of tribulation lightning gather overhead, drawn by the audacity of a mortal who dares to defy the natural order. This is the price of power -- the heavens themselves demand an accounting. Stand or fall."
 murim_grind.0050.a:0 "Face the tribulation head-on!"
 murim_grind.0050.b:0 "Use a defensive formation to endure."
 murim_grind.0050.c:0 "Attempt to flee the tribulation zone."

 # 0060 - Closed Door Cultivation
 murim_grind.0060.t:0 "Entering Closed Door Cultivation"
 murim_grind.0060.desc:0 "You seal the chamber doors, inscribing protective formations along the walls. The outside world ceases to exist. There is only you, your cultivation base, and the endless pursuit of the Dao. Days will blur into weeks, weeks into months -- however long it takes to grasp the insight that hovers just beyond reach."
 murim_grind.0060.a:0 "Begin the seclusion. Do not disturb me."
 murim_grind.0060.b:0 "Set a time limit -- I cannot disappear forever."
 murim_grind.0060.c:0 "Perhaps this is not the right time."

 # ==========================================
 # INTERACTION EVENTS
 # ==========================================

 # 0001 - Sparring
 murim_interact.0001.t:0 "A Challenge Between Warriors"
 murim_interact.0001.desc:0 "[ROOT.GetFirstNameNoTooltip] and [scope:recipient.GetFirstNameNoTooltip] face each other in the training grounds, fists raised and qi surging. The air crackles with martial intent as both cultivators prepare to test their skills in honorable combat. This is not a battle to the death -- but neither will hold back."
 murim_interact.0001.a:0 "Fight with full force!"
 murim_interact.0001.b:0 "Focus on technique over power."
 murim_interact.0001.c:0 "Test their defenses carefully."

 # 0010 - Take Disciple
 murim_interact.0010.t:0 "Taking a Disciple"
 murim_interact.0010.desc:0 "[scope:recipient.GetFirstNameNoTooltip] kneels before [ROOT.GetFirstNameNoTooltip], offering tea with both hands in the ancient rite of discipleship. The young one's meridians are unrefined but brimming with potential -- raw jade waiting to be carved by a master's hand."
 murim_interact.0010.a:0 "Accept the tea. You are now my disciple."

 # 0020 - Request Teaching
 murim_interact.0020.t:0 "Seeking a Master's Guidance"
 murim_interact.0020.desc:0 "[ROOT.GetFirstNameNoTooltip] approaches [scope:recipient.GetFirstNameNoTooltip] with humble bearing, requesting instruction in the martial arts. The gap between their cultivation bases is vast -- but perhaps that gap can be bridged with patience and dedication."
 murim_interact.0020.a:0 "Please accept me as your student."

 # 0030 - Declare Rivalry
 murim_interact.0030.t:0 "Declaration of Eternal Rivalry"
 murim_interact.0030.desc:0 "[ROOT.GetFirstNameNoTooltip] stands before [scope:recipient.GetFirstNameNoTooltip], qi flaring with undisguised challenge. 'From this day forward, we walk as rivals. Neither shall rest until one stands above the other!' The declaration echoes through the jianghu like a thunderclap."
 murim_interact.0030.a:0 "So be it. We are rivals unto death."

 # 0040 - Steal Technique
 murim_interact.0040.t:0 "The Art of Stealing Secrets"
 murim_interact.0040.desc:0 "Under cover of darkness, [ROOT.GetFirstNameNoTooltip] infiltrates the private cultivation chamber of [scope:recipient.GetFirstNameNoTooltip]. Scattered manuals and practice formations reveal the secrets of techniques that were never meant for outside eyes. The temptation is overwhelming."
 murim_interact.0040.a:0 "Copy the technique scrolls and flee."

 # 0050 - Technique Theft (discovered consequence)
 murim_interact.0050.t:0 "Theft Discovered!"
 murim_interact.0050.desc:0 "The theft has been uncovered! [scope:recipient.GetFirstNameNoTooltip] confronts [ROOT.GetFirstNameNoTooltip] with fury burning in their eyes. 'You dare steal my life's work?!' The consequences of this betrayal will echo through the jianghu for years to come."
 murim_interact.0050.a:0 "Face the consequences."

 # 0060 - Qi Exchange
 murim_interact.0060.t:0 "The Rite of Qi Exchange"
 murim_interact.0060.desc:0 "[ROOT.GetFirstNameNoTooltip] and [scope:recipient.GetFirstNameNoTooltip] sit in the lotus position, palms pressed together. Pure qi flows between them like a golden river, mending wounds and bolstering depleted reserves. This act of trust is sacred among cultivators -- to share one's qi is to share one's very life force."
 murim_interact.0060.a:0 "Channel my qi to aid them."
 murim_interact.0060.b:0 "Draw upon their offered qi gratefully."

 # ==========================================
 # CHARACTER INTERACTION NAMES
 # ==========================================

 murim_spar_interaction:0 "Spar"
 murim_spar_interaction_desc:0 "Challenge this martial artist to an honorable sparring match to test your skills and earn mutual respect."
 murim_take_disciple_interaction:0 "Take as Disciple"
 murim_take_disciple_interaction_desc:0 "Offer to take this promising young cultivator under your wing as a formal disciple in the martial arts."
 murim_request_teaching_interaction:0 "Request Teaching"
 murim_request_teaching_interaction_desc:0 "Humbly request instruction from this more experienced cultivator to advance your own martial path."
 murim_declare_rivalry_interaction:0 "Declare Martial Rivalry"
 murim_declare_rivalry_interaction_desc:0 "Formally declare this warrior as your eternal rival, binding both of you to a path of relentless competition."
 murim_steal_technique_interaction:0 "Steal Technique"
 murim_steal_technique_interaction_desc:0 "Attempt to covertly observe and copy this cultivator's secret techniques through espionage and cunning."
 murim_qi_exchange_interaction:0 "Exchange Qi"
 murim_qi_exchange_interaction_desc:0 "Offer to exchange vital qi energy with this fellow cultivator, mending wounds and replenishing reserves through mutual trust."

 # ==========================================
 # MISC LOCALIZATION
 # ==========================================

 murim_max_cultivation_rank_reached:0 "Has already reached the pinnacle of cultivation."
