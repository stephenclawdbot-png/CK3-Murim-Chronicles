 modifier_murim_intelligence_gathered_desc:0 "Spies and informants report on enemy movements and intentions."
 modifier_murim_assassination_prepared:0 "Assassination Prepared"
 modifier_murim_assassination_prepared_desc:0 "A target has been identified and the blade is ready."
 modifier_murim_orthodox_coalition_builder:0 "Orthodox Coalition Builder"
 modifier_murim_orthodox_coalition_builder_desc:0 "Working to unite the Orthodox sects against the coming storm."
 modifier_murim_reluctant_warrior:0 "Reluctant Warrior"
 modifier_murim_reluctant_warrior_desc:0 "Diplomacy has failed. Forced to prepare for war against their nature."
 modifier_murim_skirmish_wounded:0 "Skirmish Wound"
 modifier_murim_skirmish_wounded_desc:0 "Wounded in a border skirmish during the Gathering Storm."
 modifier_murim_negotiated_truce:0 "Negotiated Truce"
 modifier_murim_negotiated_truce_desc:0 "Brokered a temporary ceasefire through skilled diplomacy."
 modifier_murim_great_war_raging:0 "The Great War Rages"
 modifier_murim_great_war_raging_desc:0 "The apocalyptic war consumes all. Normal life has ceased."
 modifier_murim_frontline_warrior:0 "Frontline Warrior"
 modifier_murim_frontline_warrior_desc:0 "Fighting on the front lines of the Great War."
 modifier_murim_protector_of_the_weak:0 "Protector of the Weak"
 modifier_murim_protector_of_the_weak_desc:0 "Choosing to shield civilians and the powerless during the Great War."
 modifier_murim_mountain_fugitive:0 "Mountain Fugitive"
 modifier_murim_mountain_fugitive_desc:0 "Fled to the mountains to survive the Great War. Coward or survivor — history will decide."
 modifier_murim_war_refugee:0 "War Refugee"
 modifier_murim_war_refugee_desc:0 "Escaped the Great War but lost everything in the process."
 modifier_murim_siege_survivor:0 "Siege Survivor"
 modifier_murim_siege_survivor_desc:0 "Survived a siege during the Great War. The walls held... barely."
 modifier_murim_emergency_clan_leader:0 "Emergency Clan Leader"
 modifier_murim_emergency_clan_leader_desc:0 "Thrust into leadership after the clan leader fell. Unready but unbroken."
 modifier_murim_clan_despair:0 "Clan Despair"
 modifier_murim_clan_despair_desc:0 "The clan is destroyed. Hope is ash. Only grief remains."
 modifier_murim_technique_preservationist:0 "Technique Preservationist"
 modifier_murim_technique_preservationist_desc:0 "Dedicated to preserving the martial techniques of fallen clans."
 modifier_murim_throne_defender:0 "Throne Defender"
 modifier_murim_throne_defender_desc:0 "Defended the Emperor's throne during the Great War. A hero of the old world."
 modifier_murim_puppet_emperor:0 "Puppet Emperor"
 modifier_murim_puppet_emperor_desc:0 "Negotiated survival by surrendering true power. An emperor in name only."
 modifier_murim_war_forged:0 "War-Forged"
 modifier_murim_war_forged_desc:0 "Achieved a cultivation breakthrough during the Great War. Power born of bloodshed."
 modifier_murim_clan_rebuilder:0 "Clan Rebuilder"
 modifier_murim_clan_rebuilder_desc:0 "Rebuilding a fallen clan from the ashes. A new beginning rooted in old legacy."
 modifier_murim_new_sect_founder:0 "New Sect Founder"
 modifier_murim_new_sect_founder_desc:0 "Founded a new sect in the aftermath of the Great Calamity. The old world is gone — this is something new."
 modifier_murim_wandering_sage:0 "Wandering Sage"
 modifier_murim_wandering_sage_desc:0 "Roams the ruined world teaching survivors. The last keeper of old knowledge."
 modifier_murim_ruin_guardian:0 "Ruin Guardian"
 modifier_murim_ruin_guardian_desc:0 "Guards the ruins of a fallen sect, preserving what remains for future generations."

