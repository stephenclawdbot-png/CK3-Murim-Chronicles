l_english:

 # ==========================================
 # MURIM CHRONICLES - MODIFIER LOCALIZATION
 # All character_modifier description keys
 # ==========================================

 # ---------------------
 # CULTIVATION MODIFIERS
 # ---------------------
 murim_qi_circulation_boost_desc:0 "Your qi flows smoothly through all major meridians, enhancing your body's natural vitality and martial prowess."
 murim_qi_deviation_recovery_desc:0 "You are recovering from a dangerous qi deviation. Your internal energy is chaotic and unstable, weakening your body."
 murim_breakthrough_euphoria_desc:0 "The ecstasy of a successful breakthrough fills your being. Your cultivation base has advanced, and the world seems brighter."
 murim_meridian_opening_strain_desc:0 "The strain of forcing open new meridian pathways has left your body weakened and aching."
 murim_cultivation_seclusion_desc:0 "You have withdrawn from worldly affairs to focus entirely on cultivation. Your insight grows, but you are isolated from court."
 murim_qi_stagnation_desc:0 "Your cultivation has hit a bottleneck. No matter how you meditate, your qi refuses to advance further."
 murim_heavenly_tribulation_survivor_desc:0 "You have endured the wrath of the heavens and emerged victorious. Lightning scars mark your flesh, but your spirit is unbreakable."
 murim_heavenly_tribulation_scarred_desc:0 "The heavenly tribulation left deep scars on your body and soul. You survived, but the marks of heaven's fury remain."
 murim_dual_cultivation_harmony_desc:0 "Through dual cultivation with your partner, your qi flows in perfect harmony. Both body and spirit are nourished."
 murim_core_formation_radiance_desc:0 "A golden core has formed within your dantian, radiating spiritual energy that others can sense. You have transcended mortal limits."
 murim_nascent_soul_presence_desc:0 "Your nascent soul projects an aura of overwhelming spiritual pressure. Lesser cultivators instinctively bow before your presence."
 murim_recent_breakthrough_attempt_desc:0 "You recently attempted a cultivation breakthrough. Your body and spirit need time to recover before trying again."
 murim_recent_tribulation_desc:0 "You recently faced a heavenly tribulation. The aftereffects still linger in your body."
 murim_dual_meridian_harmony_desc:0 "Two opposing meridian systems have achieved perfect balance within your body, granting extraordinary power and insight."
 murim_forbidden_technique_mastered_desc:0 "You have mastered a forbidden technique. Its dark power courses through you, feared by the orthodox and coveted by the unorthodox."

 # ---------------------
 # COMBAT MODIFIERS
 # ---------------------
 murim_battle_scarred_veteran_desc:0 "Countless battles have hardened your body and sharpened your instincts. Each scar tells a story of survival."
 murim_duel_champion_fame_desc:0 "Your name is spoken in every tea house and martial hall. A champion of duels whose reputation precedes them."
 murim_crippling_wound_lingering_desc:0 "A devastating wound from battle refuses to fully heal, leaving you permanently weakened."
 murim_killing_intent_aura_desc:0 "Years of lethal combat have imbued you with a palpable killing intent that makes others uneasy in your presence."
 murim_combat_meditation_focus_desc:0 "Through meditation on your combat experiences, you have achieved a deeper understanding of martial arts."
 murim_defeat_shame_desc:0 "The sting of a public defeat weighs heavily on your spirit. Others whisper about your loss."
 murim_deathly_combat_survivor_desc:0 "You survived a battle where death was certain. The experience has changed you in ways both visible and invisible."
 murim_ambush_trauma_desc:0 "The memory of being ambushed haunts you. You are more vigilant now, but the fear lingers."
 murim_revenge_obsession_desc:0 "A burning need for revenge consumes your thoughts. You can think of little else until the score is settled."
 murim_recent_duel_cooldown_desc:0 "You recently fought a formal duel and need time to recover before accepting another challenge."
 murim_strongest_under_heaven_desc:0 "You stand at the absolute pinnacle of martial might. The Strongest Under Heaven. Every living warrior measures themselves against your legend."
 murim_tournament_champion_desc:0 "You emerged victorious from a grand martial tournament, defeating all challengers and claiming the championship."

 # ---------------------
 # RANKING MODIFIERS
 # ---------------------
 murim_ranked_top_50_modifier_desc:0 "Recognized as one of the Top 50 martial artists in the known world. Your name appears on the Wulin Rankings."
 murim_fallen_from_rankings_modifier_desc:0 "You have fallen from the Wulin Rankings. The shame of losing your position weighs heavily on your spirit."

 # ---------------------
 # SECT & POLITICS MODIFIERS
 # ---------------------
 murim_sect_contribution_fame_desc:0 "Your contributions to the sect have earned you widespread recognition and respect among fellow disciples."
 murim_sect_betrayal_shame_desc:0 "You betrayed your sect, breaking the most sacred bond in the martial world. Former brothers and sisters curse your name."
 murim_sect_elder_authority_desc:0 "As a recognized elder of your sect, you command respect and authority among the younger generation."
 murim_martial_alliance_member_desc:0 "You are a member of the Martial Alliance, the coalition of orthodox sects that maintains order in the Wulin."
 murim_wulin_congress_delegate_desc:0 "You represent your sect at the Wulin Congress, participating in the governance of the entire martial world."
 murim_sect_war_veteran_desc:0 "You fought in a devastating sect war and lived to tell the tale. The experience hardened you."

 # ---------------------
 # JIANGHU MODIFIERS
 # ---------------------
 murim_underground_tournament_victor_desc:0 "You won an underground tournament where rules meant nothing and mercy was weakness. The underworld respects your strength."
 murim_bounty_hunter_reputation_desc:0 "Known throughout the jianghu as a bounty hunter who always collects. Fugitives fear your name."
 murim_black_market_connections_desc:0 "You have established connections in the martial world's black market, granting access to forbidden goods and information."
 murim_poison_master_notoriety_desc:0 "Your mastery of poisons is well-known and feared. Others are careful about what they eat and drink in your presence."
 murim_assassin_reputation_desc:0 "Your reputation as an assassin precedes you. People avoid dark alleys when they know you are in town."
 murim_bounty_target_desc:0 "A bounty has been placed on your head. Bounty hunters and ambitious warriors seek to claim the reward."
 murim_hidden_identity_desc:0 "You move through the martial world under a false identity, hiding your true strength and allegiances."

 # ---------------------
 # TRAINING & MENTOR MODIFIERS
 # ---------------------
 murim_intensive_training_regime_desc:0 "You have committed to a grueling training regime that pushes your body to its limits every day."
 murim_master_disciple_bond_desc:0 "The sacred bond between master and disciple strengthens both your cultivation and your spirit."
 murim_training_ground_enlightenment_desc:0 "Training at a legendary ground has granted you insights that years of normal practice could not provide."
 murim_mentor_blessing_desc:0 "Your mentor has imparted their wisdom and blessing upon you, accelerating your growth on the martial path."

 # ---------------------
 # FATE & DESTINY MODIFIERS
 # ---------------------
 murim_karmic_imbalance_desc:0 "Your actions have created a karmic imbalance. The weight of past deeds presses upon your cultivation."
 murim_destined_hero_desc:0 "Fate has marked you as a hero of the martial world. Others sense your destiny and are drawn to your cause."
 murim_prophetic_vision_desc:0 "You have experienced a prophetic vision that revealed glimpses of the future. The knowledge both enlightens and burdens you."
 murim_karmic_burden_desc:0 "Heavy karmic debt weighs upon your soul, hindering your cultivation and bringing misfortune."

 # ---------------------
 # DAILY LIFE & SOCIAL MODIFIERS
 # ---------------------
 murim_tea_house_information_desc:0 "Gossip from the tea houses has given you valuable intelligence about the movements and plans of others."
 murim_wandering_martial_artist_desc:0 "You wander the martial world freely, unbound by sect or alliance. The open road is your home."
 murim_festival_blessing_desc:0 "The blessings received during a martial arts festival invigorate your body and spirit."

 # ---------------------
 # ROMANCE MODIFIERS
 # ---------------------
 murim_forbidden_love_passion_desc:0 "A forbidden love burns within your heart. The passion fuels your strength, but the secrecy eats at your soul."
 murim_romantic_rival_fury_desc:0 "A romantic rival has appeared, competing for the affections of your beloved. Jealousy clouds your judgment."
