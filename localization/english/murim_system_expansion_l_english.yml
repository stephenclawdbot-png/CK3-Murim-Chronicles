 murim_cultivation.0001.t: "First Steps on the Martial Path"
 murim_cultivation.0001.desc: "You feel qi stirring within your body for the first time — a warmth that begins in the dantian and spreads through your meridians like liquid fire. This is the beginning of your journey as a martial artist. The path ahead is long and dangerous, but the first step has been taken."
 murim_cultivation.0001.a: "Begin orthodox cultivation — slow and steady"
 murim_cultivation.0001.b: "Push my body to its limits"






