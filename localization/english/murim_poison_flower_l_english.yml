l_english:
 murim_poison_flower.0001.t: "The Garden of Ten Thousand Poisons"
 murim_poison_flower.0001.desc: "A garden of impossible beauty stretches before you, every petal and leaf glistening with lethal dew. To become a disciple of Poison Flower Palace, you must walk through this paradise of death and emerge alive."
 murim_poison_flower.0001.a: "Walk through slowly, building resistance."
 murim_poison_flower.0001.b: "Use a secret antidote beforehand."
 murim_poison_flower.0001.c: "Deliberately inhale the strongest poisons."
 murim_poison_flower.0002.t: "Thousand Poison Hand Cultivation"
 murim_poison_flower.0002.desc: "Your hands tingle with toxic qi as the Thousand Poison Hand technique takes root. Every strike will now carry venom. The question is what form your poisoned touch will take."
 murim_poison_flower.0002.a: "Learn the standard Five Poison Strike."
 murim_poison_flower.0002.b: "Specialize in the Heartbreak Needle."
 murim_poison_flower.0002.c: "Develop the forbidden Poison Mist Cloud."
 murim_poison_flower.0003.t: "The Bewitching Arts"
 murim_poison_flower.0003.desc: "The elder's voice drops to a whisper as she reveals the Palace's second path — the Bewitching Arts. Seduction and mental manipulation, controversial even among the Palace's own. Beauty weaponized beyond mere poison."
 murim_poison_flower.0003.a: "Learn the Enchanting Voice technique."
 murim_poison_flower.0003.b: "Master the Alluring Fragrance."
 murim_poison_flower.0003.c: "Develop the forbidden Soul Binding Gaze."
 murim_poison_flower.0003.d: "Refuse — stay on the pure poison path."
 murim_poison_flower.0004.t: "Gu Cultivation: The Living Poison"
 murim_poison_flower.0004.desc: "A writhing mass of venomous insects awaits in a jade vessel. Gu cultivation — raising a poison insect within your own body — is the Palace's darkest art. The gu will enhance your power, but it must be fed."
 murim_poison_flower.0004.a: "Raise a Heart Devouring Gu."
 murim_poison_flower.0004.b: "Attempt the legendary Golden Silkworm Gu."
 murim_poison_flower.0004.c: "Refuse gu cultivation — too cruel."
 murim_poison_flower.0005.t: "Palace Power Struggle"
 murim_poison_flower.0005.desc: "The Palace Mistress rules with an iron hand wrapped in silk. But the Elder Council grows restless, whispering of reform and shared power. The scent of intrigue mingles with the ever-present perfume of lethal flowers."
 murim_poison_flower.0005.a: "Support the Palace Mistress."
 murim_poison_flower.0005.b: "Support the Elder Council."
 murim_poison_flower.0005.c: "Attempt to overthrow the Mistress."
 murim_poison_flower.0005.d: "Play both sides as information broker."
 murim_poison_flower.0006.t: "The Flower Petal Blade Dance"
 murim_poison_flower.0006.desc: "Razor-thin blades hidden within silk flower petals — the Palace's most elegant killing art. When performed, it appears as a beautiful dance. When it ends, only the dancer remains standing."
 murim_poison_flower.0006.a: "Master the Falling Petal technique."
 murim_poison_flower.0006.b: "Combine blade dance with poison coating."
 murim_poison_flower.0006.c: "Develop the Blood Blossom variant."
 murim_poison_flower.0007.t: "The Seduction Mission"
 murim_poison_flower.0007.desc: "The Palace Mistress assigns you a target — seduce them, extract their secrets, and dispose of them as needed. The mission is clear. But the heart has its own designs, and duty may war with desire."
 murim_poison_flower.0007.a: "Complete the mission professionally."
 murim_poison_flower.0007.b: "Fall in love with the target."
 murim_poison_flower.0007.c: "Assassinate the target instead."
 murim_poison_flower.0007.d: "Refuse the mission entirely."
 murim_poison_flower.0008.t: "Palace Mistress Succession"
 murim_poison_flower.0008.desc: "The Palace Mistress has no heir, and the throne of poisons sits empty. Candidates must prove themselves in a poison resistance tournament — survive the deadliest toxins, and the Palace is yours to command."
 murim_poison_flower.0008.a: "Win the poison resistance tournament."
 murim_poison_flower.0008.b: "Poison all rival candidates first."
 murim_poison_flower.0008.c: "Form an alliance with the Elder Council."
 murim_poison_flower.0008.d: "Refuse and leave the Palace entirely."
 murim_poison_flower.0009.t: "The Male Exception"
 murim_poison_flower.0009.desc: "A male martial artist kneels before the Palace gates, begging admission. The Poison Flower Palace has been all-female since its founding. Traditionalists rage; progressives see potential. The decision falls to you."
 murim_poison_flower.0009.a: "Accept him — break with tradition."
 murim_poison_flower.0009.b: "Reject him — tradition stands."
 murim_poison_flower.0009.c: "Accept him secretly as my disciple."
 murim_poison_flower.0009.d: "Use him as an expendable weapon."
 murim_poison_flower.0010.t: "The Poison Empress Ascends"
 murim_poison_flower.0010.desc: "You have mastered every poison art the Palace possesses. The Golden Silkworm Gu hums within your body, your touch is death, and your beauty is a weapon beyond compare. The martial world trembles at the name: Poison Empress."
 murim_poison_flower.0010.a: "Declare yourself and demand recognition."
 murim_poison_flower.0010.b: "Rule from the shadows as puppet master."
 murim_poison_flower.0010.c: "Use your mastery to cure all poisons."
