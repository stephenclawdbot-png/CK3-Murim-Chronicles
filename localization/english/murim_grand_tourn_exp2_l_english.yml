l_english:
 murim_grand_tourn_exp2.0001.t: "Grand Tournament Opening Ceremony"
 murim_grand_tourn_exp2.0001.desc: "Banners of a hundred sects snap in the wind above the tournament grounds. Thousands of martial artists have gathered from across the realm, their qi radiating like a sea of invisible fire. The gong sounds, and the greatest spectacle in the martial world begins."
 murim_grand_tourn_exp2.0001.a: "Enter as my clan's representative"
 murim_grand_tourn_exp2.0001.b: "Enter as an independent challenger"
 murim_grand_tourn_exp2.0001.c: "Enter in disguise"
 murim_grand_tourn_exp2.0001.d: "Attend as a spectator and scout talent"
 murim_grand_tourn_exp2.0002.t: "First Round Match"
 murim_grand_tourn_exp2.0002.desc: "The arena roars as your name is called for the first round. Your opponent steps forward, circling with measured footwork. The crowd holds its breath. Every technique you reveal will be analyzed by a thousand watching eyes — but holding back could cost you the match."
 murim_grand_tourn_exp2.0002.a: "Fight with full power from the start"
 murim_grand_tourn_exp2.0002.b: "Test the opponent first — defensive stance"
 murim_grand_tourn_exp2.0002.c: "Unleash a secret technique to end it fast"
 murim_grand_tourn_exp2.0003.t: "Semi-Finals"
 murim_grand_tourn_exp2.0003.desc: "Only four remain. Your next opponent is a veteran of countless battles, their reputation forged in blood and broken bones. The semi-final crowd presses against the barriers, sensing that what comes next will be spoken of for generations."
 murim_grand_tourn_exp2.0003.a: "All-out attack — hold nothing back"
 murim_grand_tourn_exp2.0003.b: "Exploit their weakness with strategy"
 murim_grand_tourn_exp2.0003.c: "Forfeit — save strength for what matters"
 murim_grand_tourn_exp2.0004.t: "The Grand Finals"
 murim_grand_tourn_exp2.0004.desc: "Two fighters stand alone in the center of the arena as the entire martial world watches. This is the moment that legends are born — or shattered forever. Your opponent's qi blazes like a furnace, and you can feel the weight of destiny pressing down upon both of you."
 murim_grand_tourn_exp2.0004.a: "Fight with everything I have"
 murim_grand_tourn_exp2.0004.b: "Use a forbidden technique to win at any cost"
 murim_grand_tourn_exp2.0004.c: "Offer a draw — mutual respect"
 murim_grand_tourn_exp2.0004.d: "Reveal my true identity"
 murim_grand_tourn_exp2.0005.t: "Champion's Reward"
 murim_grand_tourn_exp2.0005.desc: "The tournament master bows before you, presenting the champion's prizes upon a silk cushion. The crowd chants your name, and sect leaders vie for your favor. You have earned the right to claim any reward the martial world can offer."
 murim_grand_tourn_exp2.0005.a: "Claim the legendary weapon"
 murim_grand_tourn_exp2.0005.b: "Claim gold and territory"
 murim_grand_tourn_exp2.0005.c: "Claim the right to challenge any clan leader"
 murim_grand_tourn_exp2.0005.d: "Reject the reward — glory is enough"
 murim_grand_tourn_exp2.0006.t: "Spectator Scouts a Prodigy"
 murim_grand_tourn_exp2.0006.desc: "From your vantage point in the stands, one young fighter catches your eye. Their movements are raw but brilliant, a diamond waiting to be polished. With the right guidance, this prodigy could become the greatest martial artist of their generation."
 murim_grand_tourn_exp2.0006.a: "Recruit the prodigy to my clan"
 murim_grand_tourn_exp2.0006.b: "Sponsor their training"
 murim_grand_tourn_exp2.0006.c: "Report the prodigy to rival clans"
 murim_grand_tourn_exp2.0007.t: "Tournament Rigging Exposed"
 murim_grand_tourn_exp2.0007.desc: "Hushed voices behind the tournament pavilion reveal a sinister truth — someone has been rigging the brackets, drugging fighters, and paying off judges. The corruption runs deep. What you do with this knowledge could reshape the tournament's legacy."
 murim_grand_tourn_exp2.0007.a: "Expose the riggers publicly"
 murim_grand_tourn_exp2.0007.b: "Use the rigging to my advantage"
 murim_grand_tourn_exp2.0007.c: "Blackmail the riggers"
 murim_grand_tourn_exp2.0008.t: "Young Dragon vs Grand Master"
 murim_grand_tourn_exp2.0008.desc: "The martial world holds its breath as youth meets experience in a matchup the ages will remember. One fighter burns with the fierce, untested fire of youth. The other moves with the quiet certainty of decades of mastery. When they clash, the world will learn whether vigor or wisdom prevails."
 murim_grand_tourn_exp2.0008.a: "Fight the legendary battle"
 murim_grand_tourn_exp2.0008.b: "Decline — show mutual respect"
 murim_grand_tourn_exp2.0008.c: "Train together instead of fighting"
