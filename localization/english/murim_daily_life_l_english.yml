l_english:
 murim_daily_life.0001.t: "Tea House Rumors"
 murim_daily_life.0001.desc: "Steam rises from your cup as the tea house buzzes with whispered conversations. A patron at the next table leans close, eyes darting, and speaks of secrets that could change the course of the jianghu. In the martial world, the right rumor is worth more than a sword."
 murim_daily_life.0001.desc.paranoid: "Every whisper in this tea house could be a trap. You clutch your cup tightly, scanning the room for threats. A patron leans close with a conspiratorial air. Trust no one -- but even paranoid men must listen."
 murim_daily_life.0001.a: "A hidden artifact, you say? Tell me more."
 murim_daily_life.0001.b: "A powerful wandering master? Where?"
 murim_daily_life.0001.c: "Sect conflict brewing? This is valuable."
 murim_daily_life.0001.d: "Ignore the gossip and enjoy the tea."
 murim_daily_life.0002.t: "The Traveling Merchant"
 murim_daily_life.0002.desc: "An exotic merchant has set up shop at the crossroads, their wagon laden with curious wares wrapped in oiled silk. Cultivation manuals, rare herbs, and darker items glint in the lamplight. Their prices are steep, but so are their promises."
 murim_daily_life.0002.a: "Buy a mysterious cultivation manual."
 murim_daily_life.0002.b: "Purchase rare medicinal herbs."
 murim_daily_life.0002.c: "Browse the black market poisons."
 murim_daily_life.0002.d: "Decline and move on."
 murim_daily_life.0003.t: "Street Performance"
 murim_daily_life.0003.desc: "A crowd has gathered in the marketplace, transfixed by a street performer whose martial display defies belief. Their movements blur between forms you have never seen -- too refined for a common entertainer. This person is hiding extraordinary skill behind a humble facade."
 murim_daily_life.0003.a: "Challenge them to a friendly spar."
 murim_daily_life.0003.b: "Offer to become their patron."
 murim_daily_life.0003.c: "Study their technique from the crowd."
 murim_daily_life.0003.d: "Walk away. Just a street show."
 murim_daily_life.0004.t: "The Hidden Beggar Master"
 murim_daily_life.0004.desc: "A pitiful beggar huddles by the roadside, seemingly broken by the world. But something catches your cultivator's eye -- the way they breathe, the subtle tension in their frame. Beneath those rags may lurk a dragon in disguise."
 murim_daily_life.0004.desc.compassionate: "Your heart aches at the sight of the wretched figure by the road. No one should suffer so. You reach for your coin purse, unaware that your compassion may have just opened a door to something extraordinary."
 murim_daily_life.0004.desc.arrogant: "A filthy beggar dares to sit in your path. You almost step over them without a glance, until something -- a flicker of controlled qi -- freezes you mid-stride."
 murim_daily_life.0004.a: "Share my meal with them in kindness."
 murim_daily_life.0004.b: "Test them -- flick a coin with qi force."
 murim_daily_life.0004.c: "Kick them out of the way."
 murim_daily_life.0004.d: "Ignore them and walk past."
 murim_daily_life.0005.t: "Martial Arts Festival"
 murim_daily_life.0005.desc: "Banners snap in the wind above a grand festival ground alive with the clash of steel and the roar of spectators. The region's greatest martial gathering has begun, drawing cultivators, merchants, and schemers from every corner of the jianghu."
 murim_daily_life.0005.a: "Enter the open tournament."
 murim_daily_life.0005.b: "Attend as a spectator and scout talent."
 murim_daily_life.0005.c: "Set up a merchant stall for profit."
 murim_daily_life.0005.d: "Host a private gathering of elites."
 murim_daily_life.0006.t: "The Wandering Master"
 murim_daily_life.0006.desc: "A mysterious figure passes through your lands -- their gait unhurried, their presence vast as a mountain. Every cultivator who crosses their path freezes in instinctive deference. This is no ordinary traveler. A wandering master of immense power has graced your domain."
 murim_daily_life.0006.desc.humble: "You recognize the quiet confidence of supreme power immediately. This wandering stranger carries themselves with the effortless grace of one who has transcended mortal struggle. You bow your head before even thinking."
 murim_daily_life.0006.desc.arrogant: "Another wanderer dares cross your territory without permission. But as you prepare to confront them, a wave of spiritual pressure washes over you like an ocean -- this is no common drifter."
 murim_daily_life.0006.a: "Bow respectfully and request teaching."
 murim_daily_life.0006.b: "Challenge the master to prove my worth."
 murim_daily_life.0006.c: "Offer hospitality -- food and shelter."
 murim_daily_life.0006.d: "Ignore the stranger."
 murim_daily_life.0007.t: "The Night Market"
 murim_daily_life.0007.desc: "Lanterns cast shifting shadows over a market that exists only after dark. Masked figures trade in forbidden scrolls, poisoned blades, and secrets that could topple sects. The air reeks of incense and danger. In the night market, everything has a price."
 murim_daily_life.0007.a: "Browse the forbidden martial scrolls."
 murim_daily_life.0007.b: "Visit the information broker."
 murim_daily_life.0007.c: "Enter the underground pit fights."
 murim_daily_life.0007.d: "Leave before trouble finds me."
 murim_daily_life.0008.t: "Fortune Teller's Prophecy"
 murim_daily_life.0008.desc: "A blind fortune teller sits cross-legged at the roadside, their milky eyes seeming to pierce through you nonetheless. They beckon with a gnarled finger and speak in a voice that resonates with the weight of destiny. The words they offer could shape the course of your life."
 murim_daily_life.0008.a: "A great tribulation approaches..."
 murim_daily_life.0008.b: "Your destiny lies with the one you least expect..."
 murim_daily_life.0008.c: "Your hands will shape the fate of the martial world..."
 murim_daily_life.0008.d: "Dismiss the charlatan and move on."
 murim_daily_life.0009.t: "The Beggar Master Revealed"
 murim_daily_life.0009.desc: "In a burst of qi that shakes the very earth, the beggar casts aside their rags to reveal a figure of towering martial presence. Their eyes blaze with power that puts sect patriarchs to shame. You stand before a supreme master who has tested your character -- and found you worthy of attention."
 murim_daily_life.0009.a: "Kneel and beg for their teaching."
 murim_daily_life.0009.b: "Ask for just one pointer."
 murim_daily_life.0009.c: "Challenge the master out of pride."
 murim_daily_life.0010.t: "Herb Gathering Expedition"
 murim_daily_life.0010.desc: "The spirit mountains beckon with the promise of rare cultivation herbs that bloom only once a decade. The paths are treacherous, guarded by beasts and bandits alike, but the rewards could accelerate your cultivation by years -- if you survive the journey."
 murim_daily_life.0010.a: "Venture deep into the mountains alone."
 murim_daily_life.0010.b: "Hire local guides and go as a group."
 murim_daily_life.0010.c: "Search specifically for a legendary herb."
 murim_daily_life.0010.d: "Stay home. Too dangerous."
