l_english:
 # =============================================
 # TRAINING EXPANSION 3 LOCALIZATION
 # Iron Body, Mountain Seclusion, Sparring Gauntlet,
 # Night Training, Qi Deviation Recovery
 # =============================================
 murim_training_exp3.0001.t:0 "Iron Body Conditioning"
 murim_training_exp3.0001.desc:0 "A traveling body-refining master has arrived, offering the legendary Iron Body Conditioning technique. The process is brutal - submerging in cauldrons of boiling medicinal herbs, striking iron posts until bones fracture and reform, and enduring the searing pain of qi-infused forging hammers against your flesh. Those who survive emerge with bodies harder than steel."
 murim_training_exp3.0001.a:0 "Full commitment. Submerge me in the herbal vats and let the forging begin."
 murim_training_exp3.0001.b:0 "I will take the herbal baths only - a safer approach."
 murim_training_exp3.0001.c:0 "My body is fine as it is. I refuse this madness."

 murim_training_exp3.0002.t:0 "Mountain Seclusion Retreat"
 murim_training_exp3.0002.desc:0 "The call of the mountain reaches you like a whisper on the wind. A remote peak, shrouded in clouds, where the spirit qi is dense and pure. Many legendary cultivators achieved their greatest breakthroughs in mountain seclusion - meditating above the clouds, breathing the essence of heaven and earth, far from the distractions of the mortal world."
 murim_training_exp3.0002.a:0 "I will commit to a full three-year seclusion on the peak."
 murim_training_exp3.0002.b:0 "A single season of mountain meditation will suffice."
 murim_training_exp3.0002.c:0 "My responsibilities prevent me from leaving. The mountain will wait."

 murim_training_exp3.0003.t:0 "The Sparring Gauntlet"
 murim_training_exp3.0003.desc:0 "A grand sparring gauntlet has been organized - ten fighters, each stronger than the last, awaiting challengers in sequence. The rules are simple: fight until you fall or sweep them all. Past champions have risen to the top of the martial rankings. Past failures have been carried out on stretchers, their martial careers ended."
 murim_training_exp3.0003.a:0 "I will face all ten. Let the gauntlet begin!"
 murim_training_exp3.0003.b:0 "I will enter but withdraw after five rounds - no need to risk everything."
 murim_training_exp3.0003.c:0 "I will watch from the sidelines and study their techniques."

 murim_training_exp3.0004.t:0 "Night Training Under Moonlight"
 murim_training_exp3.0004.desc:0 "Tonight the moon hangs full and silver-white above the training grounds. Ancient texts speak of the Lunar Cultivation Technique - a method of absorbing yin qi from moonlight to balance one's internal energies. The alignment is perfect, occurring only once every seven years. The concentrated lunar essence can accelerate cultivation... or shatter an unprepared body."
 murim_training_exp3.0004.a:0 "Perform the full lunar cultivation ritual through the night."
 murim_training_exp3.0004.b:0 "Meditate briefly under the moonlight - don't push my limits."
 murim_training_exp3.0004.c:0 "Moonlight cultivation is superstitious nonsense. I will sleep."

 murim_training_exp3.0005.t:0 "Qi Deviation Recovery"
 murim_training_exp3.0005.desc:0 "Your qi channels are damaged, your internal energy in turmoil. Every attempt to circulate qi sends spasms of pain through your meridians. Without proper recovery, you may never cultivate again. Three paths lie before you: seek a master healer, attempt self-recovery through meditation, or force through the pain with sheer willpower."
 murim_training_exp3.0005.a:0 "Seek a master healer - I need professional treatment."
 murim_training_exp3.0005.b:0 "Self-recovery through meditation and herbal remedies."
 murim_training_exp3.0005.c:0 "Force through the pain! I will train harder to overcome this!"

 # =============================================
 # JIANGHU EXPANSION LOCALIZATION
 # Bounty Hunter, Black Market, Assassination Guild,
 # Info Broker, Evil Alliance Summit
 # =============================================
 murim_jianghu_exp.0001.t:0 "Bounty Hunter Contract"
 murim_jianghu_exp.0001.desc:0 "A bloodstained notice has been pinned to the wall of a remote inn. The bounty is staggering - three hundred gold taels for the head of a rogue cultivator who destroyed an entire sect's treasury. The target is dangerous, a prowess-20 monster who has already killed six bounty hunters. But the reward... the reward could change your life."
 murim_jianghu_exp.0001.a:0 "Accept the contract. The hunt begins."
 murim_jianghu_exp.0001.b:0 "Report this illegal bounty to the local authorities."
 murim_jianghu_exp.0001.c:0 "Not worth the risk. Let someone else die for gold."

 murim_jianghu_exp.0002.t:0 "Black Market Technique Auction"
 murim_jianghu_exp.0002.desc:0 "Through a network of whispers and coded messages, you have been invited to a black market auction hidden beneath a tea house in the merchant district. Forbidden technique scrolls, stolen artifact weapons, and rare cultivation pills are all on offer. The attendees wear masks. The rules are simple: bid, buy, and never speak of this place."
 murim_jianghu_exp.0002.a:0 "Bid on a forbidden technique scroll - power beyond measure."
 murim_jianghu_exp.0002.b:0 "Bid on the rare artifact weapon instead."
 murim_jianghu_exp.0002.c:0 "Forget bidding - I will raid this auction by force!"
 murim_jianghu_exp.0002.d:0 "Leave quietly. This underworld is too dangerous for me."

 murim_jianghu_exp.0003.t:0 "Assassination Guild Recruitment"
 murim_jianghu_exp.0003.desc:0 "A black envelope appears under your door. Inside, a single card with a crescent moon emblem and three words: 'We see you.' The Shadow Crescent Guild - the most feared assassination organization in the jianghu - is offering you membership. Their blades have ended dynasties. Their poisons have toppled sects. And now they want you among their ranks."
 murim_jianghu_exp.0003.a:0 "Accept. I will become a Shadow Blade."
 murim_jianghu_exp.0003.b:0 "Decline, but gather intelligence about their operations."
 murim_jianghu_exp.0003.c:0 "Report them to the martial alliance immediately."

 murim_jianghu_exp.0004.t:0 "The Information Broker"
 murim_jianghu_exp.0004.desc:0 "A figure in a hooded cloak approaches you in the crowded marketplace, speaking in hushed tones. They claim to be part of the Thousand Eyes Network - information brokers who know every secret in the martial world. For a price, they can tell you your rival's hidden weakness, the location of buried treasures, or the identity of the person who murdered your master."
 murim_jianghu_exp.0004.a:0 "Buy intelligence on my rival's secret weakness."
 murim_jianghu_exp.0004.b:0 "Establish my own counter-intelligence network."
 murim_jianghu_exp.0004.c:0 "Feed them false information to test their loyalty."

 murim_jianghu_exp.0005.t:0 "Evil Alliance Summit"
 murim_jianghu_exp.0005.desc:0 "Deep in the Forbidden Valley, the unorthodox factions gather. The Blood Sect, the Poison Flower Palace, the Soul-Devouring Cave, and a dozen other dark organizations have called a summit. Their purpose: to unite under a single banner and crush the orthodox martial world once and for all. An invitation has reached you - whether as a potential ally or an infiltrator is your choice."
 murim_jianghu_exp.0005.a:0 "Attend and join the dark alliance. Power awaits."
 murim_jianghu_exp.0005.b:0 "Attend as a spy for the orthodox alliance."
 murim_jianghu_exp.0005.c:0 "Refuse all involvement. I walk my own path."
