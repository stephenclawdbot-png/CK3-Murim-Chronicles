l_english:
 murim_interact.0001.t: "Sparring Match"
 murim_interact.0001.desc: "You and your sparring partner face each other on the training grounds, feet planted in the packed earth. The air hums with restrained qi. A spar between martial artists is more than exercise -- it is a conversation spoken in fists and footwork."
 murim_interact.0001.a: "Light sparring -- learn and bond"
 murim_interact.0001.b: "Intense sparring -- push our limits"
 murim_interact.0001.c: "This ends only when one falls"
 murim_interact.0010.t: "Master-Disciple Training"
 murim_interact.0010.desc: "Your disciple kneels before you, eyes bright with determination. The training hall is quiet save for the whisper of wind through open shutters. This is the sacred bond of master and student -- the chain through which martial arts survive the centuries."
 murim_interact.0010.a: "Guide them through the fundamentals"
 murim_interact.0020.t: "Seeking the Master's Wisdom"
 murim_interact.0020.desc: "You approach a renowned master with humble intent, seeking the wisdom that only years of cultivation can bestow. They regard you with measuring eyes, deciding whether you are worthy of their time and knowledge."
 murim_interact.0020.a: "Study humbly at their feet"
 murim_interact.0020.b: "Challenge the teacher to prove my worth"
 murim_interact.1001.t: "Death Match"
 murim_interact.1001.desc: "There is no referee. No rules. No mercy. Two martial artists stand beneath an indifferent sky, and only one will walk away. The death match is the ultimate expression of the martial path -- where skill, cultivation, and the will to survive are all that matter."
 murim_interact.1001.a: "All-out lethal assault"
 murim_interact.1001.b: "Try to negotiate mercy"
 murim_interact.1004.t: "Word Spreads of the Death Match"
 murim_interact.1004.desc: "News of the death match ripples through the martial world like a stone cast into still water. Those who witnessed it speak in hushed tones. Those who did not demand every detail. Your name is on every lip."
 murim_interact.1004.a: "Bask in the glory"
 murim_interact.1004.b: "Reflect on the violence"
 murim_interact.1005.t: "A Coward Refuses the Challenge"
 murim_interact.1005.desc: "Your opponent has refused the death match. Word travels fast in the martial world -- a challenged fighter who declines earns contempt from warriors and pity from none. Your reputation swells while theirs crumbles."
 murim_interact.1005.a: "Mock their cowardice publicly"
 murim_interact.1005.b: "Show magnanimity in their weakness"
 murim_interact.2001.t: "Stealing Forbidden Knowledge"
 murim_interact.2001.desc: "Under cover of darkness, you prepare to steal the closely guarded techniques of another martial artist. Their training scrolls, their secret manuals -- knowledge that took a lifetime to accumulate, yours for the taking if your hands are quick enough."
 murim_interact.2001.a: "Infiltrate their training grounds"
 murim_interact.2001.b: "Bribe a disciple for their manual"
 murim_interact.2001.c: "Abort the plan"
 murim_interact.2002.t: "The Stolen Technique"
 murim_interact.2002.desc: "Success. The stolen scroll sits heavy in your hands, its characters revealing techniques that were never meant for your eyes. Knowledge flows into you like water filling a vessel -- forbidden, exhilarating, and tinged with guilt."
 murim_interact.2002.a: "Revel in the stolen knowledge"
 murim_interact.2003.t: "Caught in the Act"
 murim_interact.2003.desc: "A hand seizes your wrist. Eyes burn with fury in the darkness. You have been caught attempting to steal their techniques -- the gravest offense in the martial world. The word 'thief' carries a weight that can end a cultivator's reputation forever."
 murim_interact.2003.a: "Flee before they attack"
 murim_interact.2003.b: "Stand and fight"
 murim_interact.2003.c: "Beg for forgiveness"
 murim_interact.2010.t: "Taking Techniques by Force"
 murim_interact.2010.desc: "There is no subtlety here. You stand before your victim, qi flaring, intent unmistakable. You will beat the technique out of them if you must. In the martial world, the strong take from the weak -- that is the law of the jianghu."
 murim_interact.2010.a: "Beat them and force them to teach"
 murim_interact.2010.b: "Intimidate without fighting"
 murim_interact.3001.t: "Qi Transfer Healing"
 murim_interact.3001.desc: "Your patient lies before you, meridians shattered, qi in chaos. Only a direct transfer of your own life energy can save them -- but channeling qi into another's broken body is like pouring water into a cracked vessel. The healer risks their own cultivation."
 murim_interact.3001.a: "Gentle qi transfer -- slow but safe"
 murim_interact.3001.b: "Forceful qi flood -- fast but risky"
 murim_interact.4001.t: "Sect Rivalry Declared"
 murim_interact.4001.desc: "A rival sect leader has declared open hostility against your sect. Their envoy delivers the challenge with cold formality -- from this day forward, your two sects are enemies. The martial world watches to see how you respond."
 murim_interact.4001.a: "Accept the challenge -- prepare for war"
 murim_interact.4001.b: "Seek allies against the aggressor"
 murim_interact.4001.c: "Submit to avoid conflict"
 murim_interact.4010.t: "Sect Rivalry: Ongoing Hostilities"
 murim_interact.4010.desc: "The rivalry between your sects continues to simmer. Skirmishes along disputed territories, raids on outer disciples, assassination attempts against elders -- the low-grade war grinds on without resolution."
 murim_interact.4010.a: "Send a raiding party"
 murim_interact.4010.b: "Attempt to assassinate their elder"
 murim_interact.4010.c: "Seek peace and end the rivalry"
 murim_interact.5001.t: "Protection Contract"
 murim_interact.5001.desc: "You stand guard over your charge, qi senses extended like invisible threads into the surrounding darkness. Protection work is the bread and butter of wandering martial artists -- dull when nothing happens, lethal when something does."
 murim_interact.5001.a: "Routine patrol -- collect payment"
 murim_interact.5001.b: "Assassin attack! Defend your charge!"
 murim_interact.5001.c: "End the protection contract"
