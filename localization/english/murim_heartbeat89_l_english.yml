l_english:

 # ========================================
 # MURIM BLACK MARKET LOCALIZATION
 # ========================================

 murim_black_market.0001.t:0 "Whispers of the Underground"
 murim_black_market.0001.desc:0 "In the shadowy back alleys of the market district, [ROOT.GetFirstName] notices a figure beckoning from a hidden doorway. The air smells of exotic herbs and forbidden substances. A network of underground dealings exists beneath the respectable facade of the martial world -- and someone wants to show you the way in."
 murim_black_market.0001.a:0 "Lead me into the underground market."
 murim_black_market.0001.b:0 "Report this to the Orthodox Alliance immediately."
 murim_black_market.0001.c:0 "Pay me for my silence, or I'll crush this den myself."

 murim_black_market.0002.t:0 "The Shadow's Revenge"
 murim_black_market.0002.desc:0 "The black market contact you reported has not forgotten your betrayal. Whispers in the underworld speak of retribution being planned against [ROOT.GetFirstName]. The shadows have long memories, and those who cross them rarely sleep soundly."
 murim_black_market.0002.a:0 "I must be vigilant."

 murim_black_market.0003.t:0 "Death in the Shadows"
 murim_black_market.0003.desc:0 "A blade flashes in the moonlight! An assassin from the black market has come for [ROOT.GetFirstName]. The killer moves with practiced precision -- this is no amateur. You have only moments to react."
 murim_black_market.0003.a:0 "Draw my weapon and fight!"
 murim_black_market.0003.b:0 "Use lightfoot technique to escape into the night."
 murim_black_market.0003.c:0 "Offer gold to turn this assassin into my agent."

 murim_black_market.0004.t:0 "The Underground Auction"
 murim_black_market.0004.desc:0 "Deep beneath an innocuous teahouse, the underground auction is about to begin. Masked figures from across the Murim gather around a raised platform where forbidden items are displayed under flickering lantern light. [ROOT.GetFirstName] recognizes several prominent martial artists despite their disguises."
 murim_black_market.0004.a:0 "Bid aggressively -- I must have that item!"
 murim_black_market.0004.b:0 "Observe quietly and gather intelligence."
 murim_black_market.0004.c:0 "Rob the auction by force!"
 murim_black_market.0004.d:0 "Leave quietly before I'm recognized."

 murim_black_market.0005.t:0 "Forbidden Prize Acquired"
 murim_black_market.0005.desc:0 "[ROOT.GetFirstName] has won the auction! The forbidden item is now in your possession. Its power radiates with an unmistakable aura. What will you do with such a dangerous treasure?"
 murim_black_market.0005.a:0 "Study and master its secrets."
 murim_black_market.0005.b:0 "Sell it for a handsome profit."
 murim_black_market.0005.c:0 "Destroy it -- such things should not exist."

 murim_black_market.0006.t:0 "The Smuggler's Proposition"
 murim_black_market.0006.desc:0 "A shrewd merchant approaches [ROOT.GetFirstName] with a dangerous proposition: establish a smuggling network through the territories, moving forbidden goods between the nine clans. The profits would be enormous, but the risks are equally great."
 murim_black_market.0006.a:0 "Establish the smuggling network."
 murim_black_market.0006.b:0 "Use the network for intelligence gathering only."
 murim_black_market.0006.c:0 "I want no part of this criminal enterprise."

 murim_black_market.0007.t:0 "The Orthodox Raid!"
 murim_black_market.0007.desc:0 "The doors burst open! Warriors of the Orthodox Alliance storm into the underground market, their righteous fury unmistakable. [ROOT.GetFirstName] is caught in the middle of the crackdown. The raid leader's eyes scan the crowd, searching for known faces."
 murim_black_market.0007.a:0 "Fight through the raiders and escape!"
 murim_black_market.0007.b:0 "Use the secret escape tunnel."
 murim_black_market.0007.c:0 "Surrender and cooperate."

 murim_black_market.0008.t:0 "The Poison Trade"
 murim_black_market.0008.desc:0 "With medical knowledge and access to the smuggling network, [ROOT.GetFirstName] faces a lucrative but morally complex opportunity. The demand for both poisons and medicines in the martial world is insatiable."
 murim_black_market.0008.a:0 "Manufacture and sell deadly poisons."
 murim_black_market.0008.b:0 "Sell medicinal herbs and healing pills."
 murim_black_market.0008.c:0 "Create both -- double the profit."

 murim_black_market.0009.t:0 "Crucial Intelligence"
 murim_black_market.0009.desc:0 "Your informant network has uncovered vital intelligence about a rival martial artist. This information could shift the balance of power in the Murim. [ROOT.GetFirstName] must decide how to use this knowledge."
 murim_black_market.0009.a:0 "Use it for blackmail."
 murim_black_market.0009.b:0 "Sell it to the highest bidder."
 murim_black_market.0009.c:0 "Share it with my allies for trust."
 murim_black_market.0009.d:0 "Keep it for personal advantage."

 murim_black_market.0010.t:0 "Underground Power Struggle"
 murim_black_market.0010.desc:0 "Two smuggling empires cannot coexist in the same area of operations. [ROOT.GetFirstName] and a rival market controller must settle who rules the underworld. The tension is palpable as both sides prepare for a confrontation."
 murim_black_market.0010.a:0 "Challenge them to an underworld duel."
 murim_black_market.0010.b:0 "Propose a cartel alliance."
 murim_black_market.0010.c:0 "Sabotage their operation in secret."

 murim_black_market.0011.t:0 "The Underground Fighting Pit"
 murim_black_market.0011.desc:0 "In a hidden cavern beneath the city, the roar of the crowd echoes off stone walls. The underground fighting pit draws the strongest and most desperate martial artists. [ROOT.GetFirstName] feels the blood lust in the air as a massive champion steps into the ring."
 murim_black_market.0011.a:0 "Enter the pit and fight!"
 murim_black_market.0011.b:0 "Bet on the fights instead."
 murim_black_market.0011.c:0 "Recruit the champion for my cause."

 murim_black_market.0012.t:0 "The Great Crackdown"
 murim_black_market.0012.desc:0 "The Orthodox Alliance has declared total war on the underground market. Every tunnel is being searched, every contact interrogated. [ROOT.GetFirstName] must decide quickly how to survive this purge."
 murim_black_market.0012.a:0 "Go completely underground."
 murim_black_market.0012.b:0 "Bribe the authorities to look the other way."
 murim_black_market.0012.c:0 "Turn yourself in for leniency."
 murim_black_market.0012.d:0 "Flee to unorthodox territory."

 # ========================================
 # MURIM ESPIONAGE NETWORK LOCALIZATION
 # ========================================

 murim_espionage.0001.t:0 "The Web of Shadows"
 murim_espionage.0001.desc:0 "In the world of the Nine Clans, information is the deadliest weapon. [ROOT.GetFirstName] has identified a capable agent who could infiltrate a rival clan. The question is not whether to spy, but how deep the deception should go."
 murim_espionage.0001.a:0 "Plant a deep cover spy in their ranks."
 murim_espionage.0001.b:0 "Send a saboteur to undermine them."
 murim_espionage.0001.c:0 "Use diplomatic channels instead -- spying is beneath me."

 murim_espionage.0002.t:0 "Intelligence Report"
 murim_espionage.0002.desc:0 "A coded message arrives from your deep cover agent. The intelligence gathered could change everything -- military secrets, technique scrolls, alliance plans. [ROOT.GetFirstName] reads the report with growing anticipation."
 murim_espionage.0002.a:0 "Act on this intelligence immediately."
 murim_espionage.0002.b:0 "Store it for the perfect moment."
 murim_espionage.0002.c:0 "Recall the spy -- it's too dangerous."

 murim_espionage.0003.t:0 "A Mole in Our Midst!"
 murim_espionage.0003.desc:0 "Suspicious activity has been detected within the sect. Someone is feeding information to enemies. [ROOT.GetFirstName] has identified a suspect, but are they truly the spy, or an innocent caught in the web of paranoia?"
 murim_espionage.0003.a:0 "Interrogate the suspect immediately."
 murim_espionage.0003.b:0 "Set a trap with false information."
 murim_espionage.0003.c:0 "Execute the suspect as a warning."
 murim_espionage.0003.d:0 "Perhaps I'm being paranoid."

 murim_espionage.0004.t:0 "Sabotage Strikes!"
 murim_espionage.0004.desc:0 "Your saboteur agent has completed their mission against the rival clan. Reports of chaos and confusion filter back through the intelligence network."
 murim_espionage.0004.a:0 "Press the advantage now!"
 murim_espionage.0004.b:0 "Cover our tracks and withdraw."
 murim_espionage.0004.c:0 "Escalate to a full attack while they're weak."

 murim_espionage.0005.t:0 "The Trap Springs"
 murim_espionage.0005.desc:0 "The counter-intelligence trap has been set. False information was carefully planted, and now [ROOT.GetFirstName] waits to see if the real spy takes the bait."
 murim_espionage.0005.a:0 "The spy network is exposed!"
 murim_espionage.0005.b:0 "The trap failed -- the spy remains hidden."

 murim_espionage.0006.t:0 "The Double Agent"
 murim_espionage.0006.desc:0 "The captured spy sits before [ROOT.GetFirstName], terrified but valuable. Rather than execution, a more cunning option presents itself: turn them into a double agent and feed misinformation back to the enemy."
 murim_espionage.0006.a:0 "Turn them into our double agent."
 murim_espionage.0006.b:0 "Extract all information, then execute."
 murim_espionage.0006.c:0 "Release them as a warning."

 murim_espionage.0007.t:0 "Misinformation Campaign"
 murim_espionage.0007.desc:0 "The double agent has successfully delivered false intelligence to the enemy. Reports indicate they're making decisions based on fabricated information, leaving them vulnerable."
 murim_espionage.0007.a:0 "Exploit the confusion immediately."
 murim_espionage.0007.b:0 "Maintain cover and keep feeding false intel."
 murim_espionage.0007.c:0 "Burn the double agent for one devastating strike."

 murim_espionage.0008.t:0 "The Stolen Scroll"
 murim_espionage.0008.desc:0 "Through the spy network, [ROOT.GetFirstName] has obtained a copy of another clan's secret technique scroll. The stolen knowledge could revolutionize your martial arts, but using it risks exposure and inter-clan war."
 murim_espionage.0008.a:0 "Study the forbidden technique."
 murim_espionage.0008.b:0 "Sell the technique scroll."
 murim_espionage.0008.c:0 "Return it for diplomatic leverage."
 murim_espionage.0008.d:0 "Destroy it -- too dangerous for anyone."

 murim_espionage.0009.t:0 "The Rumor Mill"
 murim_espionage.0009.desc:0 "[ROOT.GetFirstName] has the intelligence network and the means to wage a different kind of war -- one fought with whispers, rumors, and carefully placed lies. Reputations are fragile in the martial world."
 murim_espionage.0009.a:0 "Spread rumors of their weakness."
 murim_espionage.0009.b:0 "Spread rumors of their corruption."
 murim_espionage.0009.c:0 "Boost my own reputation instead."

 murim_espionage.0010.t:0 "Network Collapse!"
 murim_espionage.0010.desc:0 "Disaster! Multiple agents have been compromised simultaneously. The entire spy network is unraveling. [ROOT.GetFirstName] faces the nightmare scenario of total intelligence failure."
 murim_espionage.0010.a:0 "Burn all assets and rebuild from scratch."
 murim_espionage.0010.b:0 "Double down -- invest more resources!"
 murim_espionage.0010.c:0 "Abandon espionage entirely."

 murim_espionage.0011.t:0 "The Intelligence Summit"
 murim_espionage.0011.desc:0 "A rare gathering of spymasters from multiple clans convenes in a neutral location. Every person here runs their own web of agents and secrets. The irony of spies meeting openly is not lost on anyone."
 murim_espionage.0011.a:0 "Propose an intelligence sharing alliance."
 murim_espionage.0011.b:0 "Spy on the other spymasters."
 murim_espionage.0011.c:0 "Expose all spy networks publicly!"

 murim_espionage.0012.t:0 "Activate the Sleepers"
 murim_espionage.0012.desc:0 "War has come, and the time for subtlety is over. [ROOT.GetFirstName] holds the key to activating sleeper agents embedded deep within enemy ranks. One command could turn the tide of battle."
 murim_espionage.0012.a:0 "Activate all sleeper agents now!"
 murim_espionage.0012.b:0 "Activate selectively to preserve the network."
 murim_espionage.0012.c:0 "Hold them in reserve for a greater threat."

 # ========================================
 # MURIM CROSS-FACTION ROMANCE LOCALIZATION
 # ========================================

 murim_romance.0001.t:0 "Love Across the Divide"
 murim_romance.0001.desc:0 "Across a crowded martial arts tournament, [ROOT.GetFirstName]'s eyes meet those of a warrior from a rival faction. Time seems to stop. Their form is graceful, their spirit fierce, and something stirs in your heart that no amount of cultivation training prepared you for."
 murim_romance.0001.a:0 "Pursue this forbidden attraction."
 murim_romance.0001.b:0 "Admire them from afar but do nothing."
 murim_romance.0001.c:0 "Duty over love. Suppress these feelings."

 murim_romance.0002.t:0 "Moonlight Rendezvous"
 murim_romance.0002.desc:0 "Under the silver moonlight beside a quiet mountain stream, [ROOT.GetFirstName] meets their forbidden love in secret. The night is warm, the stars bright, and for a moment the feuds between clans seem like distant dreams."
 murim_romance.0002.a:0 "Confess my feelings openly."
 murim_romance.0002.b:0 "Exchange secret tokens of affection."
 murim_romance.0002.c:0 "End this before it goes too far."

 murim_romance.0003.t:0 "The Elders Know!"
 murim_romance.0003.desc:0 "The worst has happened. The clan elders have discovered the forbidden romance. An angry elder storms into the chamber, their eyes burning with righteous fury. 'You dare dishonor our sect with this... this liaison?!'"
 murim_romance.0003.a:0 "I choose love over your approval!"
 murim_romance.0003.b:0 "You're right. I'll end it."
 murim_romance.0003.c:0 "I'll fight anyone who stands in our way!"

 murim_romance.0004.t:0 "The Great Escape"
 murim_romance.0004.desc:0 "With both clans turning against them, [ROOT.GetFirstName] and their beloved face an impossible choice. The world of the Nine Clans has no place for their love. But perhaps the frontier does."
 murim_romance.0004.a:0 "Elope to the frontier -- start a new life!"
 murim_romance.0004.b:0 "Secret marriage within the sect."
 murim_romance.0004.c:0 "Part ways -- the world is too cruel for us."

 murim_romance.0005.t:0 "A New Beginning"
 murim_romance.0005.desc:0 "Far from the politics of the Nine Clans, [ROOT.GetFirstName] and their beloved build a life together on the frontier. The air is clean, the mountains beautiful, and for the first time, peace feels possible."
 murim_romance.0005.a:0 "Establish a hidden training ground."
 murim_romance.0005.b:0 "Live peacefully as medicine practitioners."
 murim_romance.0005.c:0 "Plot to reunite the clans through our union."

 murim_romance.0006.t:0 "The Secret Exposed"
 murim_romance.0006.desc:0 "Someone has discovered the secret marriage! [ROOT.GetFirstName]'s carefully hidden double life threatens to crumble. A figure approaches with knowing eyes and a dangerous smile."
 murim_romance.0006.a:0 "Bribe them to keep silent."
 murim_romance.0006.b:0 "Reveal the marriage publicly and own it."
 murim_romance.0006.c:0 "Deny everything and frame the discoverer."

 murim_romance.0007.t:0 "A Rival for Love"
 murim_romance.0007.desc:0 "A dashing young martial artist has appeared, openly courting [ROOT.GetFirstName]'s beloved. They bring gifts, display their martial prowess, and make no secret of their intentions. The love triangle threatens to destroy everything."
 murim_romance.0007.a:0 "Duel the rival for my beloved's heart!"
 murim_romance.0007.b:0 "Win through gifts and unwavering devotion."
 murim_romance.0007.c:0 "Let my beloved choose freely."

 murim_romance.0008.t:0 "Bridge Between Worlds"
 murim_romance.0008.desc:0 "Perhaps the love between [ROOT.GetFirstName] and their partner can serve a greater purpose. If the clans can see that love transcends faction lines, maybe -- just maybe -- peace is possible."
 murim_romance.0008.a:0 "Present our union as a bridge between factions."
 murim_romance.0008.b:0 "Accept exile but maintain hope for the future."

 murim_romance.0009.t:0 "Love Lost"
 murim_romance.0009.desc:0 "The unthinkable has happened. [ROOT.GetFirstName]'s beloved is gone. The world feels empty, the colors drained from everything. All that remains is grief, and perhaps... the burning desire for vengeance."
 murim_romance.0009.a:0 "I will destroy those responsible!"
 murim_romance.0009.b:0 "Withdraw from the world in grief."
 murim_romance.0009.c:0 "Channel this grief into becoming the greatest martial artist alive."

 murim_romance.0010.t:0 "The Path of Vengeance"
 murim_romance.0010.desc:0 "[ROOT.GetFirstName] has tracked down those believed responsible for their beloved's death. The blade trembles with barely contained rage. Justice -- or vengeance -- is finally within reach."
 murim_romance.0010.a:0 "Confront them and duel to the death."
 murim_romance.0010.b:0 "Use poison and subterfuge."
 murim_romance.0010.c:0 "Let go of vengeance -- find peace."

 murim_romance.0011.t:0 "Children of Two Worlds"
 murim_romance.0011.desc:0 "The child of [ROOT.GetFirstName]'s cross-faction union has come of age. Born of two martial traditions, they carry the blood of rival clans. Their potential is enormous, but so is the danger of conflicting qi."
 murim_romance.0011.a:0 "Train them in both clans' techniques."
 murim_romance.0011.b:0 "Let them choose their own path."
 murim_romance.0011.c:0 "Hide their dual heritage."

 murim_romance.0012.t:0 "Love Conquers All"
 murim_romance.0012.desc:0 "What began as one forbidden love story has inspired others. Cross-faction marriages are becoming more common, and the rigid walls between the Nine Clans are showing cracks. Perhaps love truly can change the Murim."
 murim_romance.0012.a:0 "Propose a grand marriage alliance between all nine clans."
 murim_romance.0012.b:0 "Alliances should be built on strength, not love."
 murim_romance.0012.c:0 "Use these marriages as intelligence tools."

 # ========================================
 # MURIM DEMONIC CULTIVATION LOCALIZATION
 # ========================================

 murim_demonic.0001.t:0 "The Dark Path Beckons"
 murim_demonic.0001.desc:0 "A figure cloaked in shadow approaches [ROOT.GetFirstName] with an offer that sends chills down the spine. 'I can give you power beyond imagination. The orthodox path is slow and limiting. The demonic arts offer shortcuts... for those brave enough to pay the price.'"
 murim_demonic.0001.a:0 "I accept. Give me the power of darkness."
 murim_demonic.0001.b:0 "I'll study the knowledge but resist corruption."
 murim_demonic.0001.c:0 "Begone, demon! I walk the righteous path."

 murim_demonic.0002.t:0 "Blood Qi Awakening"
 murim_demonic.0002.desc:0 "The first demonic technique requires blood. [ROOT.GetFirstName] feels dark qi surging through their meridians, powerful and intoxicating. The sensation is unlike anything orthodox cultivation ever offered -- raw, primal, dangerous."
 murim_demonic.0002.a:0 "Practice on captured enemies."
 murim_demonic.0002.b:0 "Meditate on the dark qi patterns."
 murim_demonic.0002.c:0 "Seek forbidden demonic scriptures."

 murim_demonic.0003.t:0 "The Soul Devourer"
 murim_demonic.0003.desc:0 "The most terrifying technique of the demonic path: absorbing the martial soul of another cultivator. [ROOT.GetFirstName] feels the hunger growing, the dark qi demanding more and more sustenance."
 murim_demonic.0003.a:0 "Devour their martial soul!"
 murim_demonic.0003.b:0 "Use the technique on beasts instead."
 murim_demonic.0003.c:0 "Resist the urge -- control the power!"

 murim_demonic.0004.t:0 "Transformation"
 murim_demonic.0004.desc:0 "The dark qi has changed [ROOT.GetFirstName] physically. Dark veins pulse beneath the skin, eyes flash with crimson light, and an aura of dread surrounds you. The transformation is becoming visible to all."
 murim_demonic.0004.a:0 "Embrace the transformation fully."
 murim_demonic.0004.b:0 "Seek balance between human and demon."
 murim_demonic.0004.c:0 "Fight the transformation with willpower!"

 murim_demonic.0005.t:0 "Spreading the Corruption"
 murim_demonic.0005.desc:0 "Dark qi naturally seeks to corrupt others. [ROOT.GetFirstName] recognizes a courtier who might be susceptible to the call of demonic power. One whispered promise could gain a new disciple."
 murim_demonic.0005.a:0 "Corrupt them with promises of power."
 murim_demonic.0005.b:0 "Use a blood ritual to force the transformation."
 murim_demonic.0005.c:0 "Leave them uncorrupted."

 murim_demonic.0006.t:0 "Demon Lord Ascension"
 murim_demonic.0006.desc:0 "The current Demon Lord stands before [ROOT.GetFirstName], dark power radiating from every pore. Only one can rule the demonic cultivators. The challenge is spoken, and the air itself trembles with anticipation."
 murim_demonic.0006.a:0 "I challenge you for the throne of darkness!"
 murim_demonic.0006.b:0 "I serve you, Dark Lord."
 murim_demonic.0006.c:0 "I'll build my own dark faction."

 murim_demonic.0007.t:0 "The Righteous Hunt"
 murim_demonic.0007.desc:0 "They've come for [ROOT.GetFirstName]. Orthodox demon hunters, their weapons blessed with holy qi, their eyes burning with zealous determination. The hunt for the demonic cultivator has begun."
 murim_demonic.0007.a:0 "Stand and fight -- I fear no righteous fool!"
 murim_demonic.0007.b:0 "Flee using shadow techniques."
 murim_demonic.0007.c:0 "Surrender and beg for purification."
 murim_demonic.0007.d:0 "Use hostages to force their retreat."

 murim_demonic.0008.t:0 "The Blood Shadow Sect"
 murim_demonic.0008.desc:0 "[ROOT.GetFirstName] has gathered enough dark cultivators to form a proper sect. The Blood Shadow Sect will carve its name into the history of the Murim with terror and power."
 murim_demonic.0008.a:0 "Establish the Blood Shadow Sect!"
 murim_demonic.0008.b:0 "Create a hidden demonic academy instead."
 murim_demonic.0008.c:0 "I work alone."

 murim_demonic.0009.t:0 "The Light Within"
 murim_demonic.0009.desc:0 "A compassionate elder approaches [ROOT.GetFirstName] with gentle eyes and an outstretched hand. 'It is not too late, child. The darkness can be purged. Will you let me help you find the light again?'"
 murim_demonic.0009.a:0 "I accept the purification ritual."
 murim_demonic.0009.b:0 "I will seek redemption through good deeds."
 murim_demonic.0009.c:0 "There is no going back. I am what I am."

 murim_demonic.0010.t:0 "Redemption's Price"
 murim_demonic.0010.desc:0 "The path of redemption demands sacrifice. [ROOT.GetFirstName] must give up something precious to atone for the lives destroyed by the demonic arts. The question is: what price is worth a clean soul?"
 murim_demonic.0010.a:0 "Sacrifice my demonic power entirely."
 murim_demonic.0010.b:0 "Use my dark power one last time to save others."
 murim_demonic.0010.c:0 "I'm not ready yet."

 murim_demonic.0011.t:0 "Qi Deviation: Dark Storm"
 murim_demonic.0011.desc:0 "The demonic qi rebels! [ROOT.GetFirstName] convulses as dark energy surges uncontrollably through every meridian. The pain is excruciating, and the power threatens to consume everything nearby."
 murim_demonic.0011.a:0 "Channel it outward!"
 murim_demonic.0011.b:0 "Seal it within through meditation!"
 murim_demonic.0011.c:0 "Absorb nearby qi to stabilize!"

 murim_demonic.0012.t:0 "The Demon Lord's Choice"
 murim_demonic.0012.desc:0 "The Great Calamity rages across the Murim. As Demon Lord, [ROOT.GetFirstName] stands at the crossroads of destiny. The dark power could consume the world or save it. Even demons must choose."
 murim_demonic.0012.a:0 "Use the calamity to seize ultimate power!"
 murim_demonic.0012.b:0 "Unite with the orthodox to survive."
 murim_demonic.0012.c:0 "Sacrifice myself to stop the calamity."

 # ========================================
 # MURIM DIVINE WEAPON FORGING LOCALIZATION
 # ========================================

 murim_weapon.0001.t:0 "The Quest for a Divine Weapon"
 murim_weapon.0001.desc:0 "Every legendary martial artist wields a legendary weapon. [ROOT.GetFirstName] has heard tales of a reclusive master blacksmith who can forge weapons that sing with qi. The time has come to seek the ultimate blade."
 murim_weapon.0001.a:0 "Commission a divine weapon."
 murim_weapon.0001.b:0 "Seek an ancient weapon from the past."
 murim_weapon.0001.c:0 "My fists are my weapons."

 murim_weapon.0002.t:0 "Gathering the Materials"
 murim_weapon.0002.desc:0 "The master smith needs rare materials for the divine weapon. Meteorite iron from the Heavenly Peaks, dragon bone from ancient tombs, jade crystal from sacred springs -- the quest for materials is a journey unto itself."
 murim_weapon.0002.a:0 "Lead the expedition personally!"
 murim_weapon.0002.b:0 "Send trusted agents to gather them."
 murim_weapon.0002.c:0 "Buy from the black market."

 murim_weapon.0003.t:0 "The Forging Ceremony"
 murim_weapon.0003.desc:0 "The forge blazes with supernatural heat. The master smith hammers the rare materials while [ROOT.GetFirstName] channels qi into the forming blade. This is the moment of creation -- pour everything into it."
 murim_weapon.0003.a:0 "Pour my full qi into the weapon!"
 murim_weapon.0003.b:0 "Careful, measured qi infusion."
 murim_weapon.0003.c:0 "Let the master handle the qi work."

 murim_weapon.0004.t:0 "The Blade Awakens"
 murim_weapon.0004.desc:0 "A voice whispers from the weapon! The divine blade has developed a spirit of its own, a consciousness forged from the rare materials and [ROOT.GetFirstName]'s own qi. The weapon is alive."
 murim_weapon.0004.a:0 "Bond with the weapon spirit."
 murim_weapon.0004.b:0 "Dominate the spirit with my will."
 murim_weapon.0004.c:0 "Seal the spirit for safety."

 murim_weapon.0005.t:0 "The Ancient Tomb"
 murim_weapon.0005.desc:0 "The entrance to an ancient martial master's tomb yawns before [ROOT.GetFirstName] like the mouth of a beast. Inside lies a weapon of legend -- but also traps, guardians, and curses laid down centuries ago."
 murim_weapon.0005.a:0 "Explore the tomb alone."
 murim_weapon.0005.b:0 "Enter with companions."
 murim_weapon.0005.c:0 "Hire mercenaries to clear the way."

 murim_weapon.0006.t:0 "The Cursed Blade"
 murim_weapon.0006.desc:0 "The ancient weapon pulses with malevolent energy. [ROOT.GetFirstName] can feel it whispering dark temptations, feeding on anger and bloodlust. This weapon is powerful beyond measure -- and hungry for souls."
 murim_weapon.0006.a:0 "Embrace the curse for its power."
 murim_weapon.0006.b:0 "Seek a way to purify the weapon."
 murim_weapon.0006.c:0 "Destroy this abomination."

 murim_weapon.0007.t:0 "The Divine Weapon Stolen!"
 murim_weapon.0007.desc:0 "[ROOT.GetFirstName] reaches for the familiar weight of their divine weapon and finds... nothing. It's gone! Someone has stolen the most precious possession a martial artist can own."
 murim_weapon.0007.a:0 "Hunt down the thief personally!"
 murim_weapon.0007.b:0 "Hire trackers and spies."
 murim_weapon.0007.c:0 "Forge a new weapon to replace it."

 murim_weapon.0008.t:0 "Clash of Divine Weapons"
 murim_weapon.0008.desc:0 "The Nine-Clan Signature Weapon Competition draws the greatest weapon masters from across the Murim. Divine blades ring against each other as their wielders demonstrate the pinnacle of martial arts."
 murim_weapon.0008.a:0 "Enter the competition!"
 murim_weapon.0008.b:0 "Judge the competition wisely."
 murim_weapon.0008.c:0 "Display my weapon with dignity."

 murim_weapon.0009.t:0 "Passing Down the Blade"
 murim_weapon.0009.desc:0 "Age weighs upon [ROOT.GetFirstName], and the divine weapon grows heavy. The time has come to choose an heir for the legendary blade. Who is worthy of carrying its legacy?"
 murim_weapon.0009.a:0 "Pass it to my most worthy child."
 murim_weapon.0009.b:0 "Let my children compete for it."
 murim_weapon.0009.c:0 "I'll be buried with my weapon."
 murim_weapon.0009.d:0 "Give it to my most talented disciple."

 murim_weapon.0010.t:0 "The Succession Duel"
 murim_weapon.0010.desc:0 "Two heirs face each other across the training ground, each determined to prove themselves worthy of the divine weapon. [ROOT.GetFirstName] watches as the succession battle begins."
 murim_weapon.0010.a:0 "Let them duel for the right."
 murim_weapon.0010.b:0 "Cancel the duel -- I'll decide."

 murim_weapon.0011.t:0 "The Blade Shatters!"
 murim_weapon.0011.desc:0 "In the heat of battle, the impossible happens. [ROOT.GetFirstName]'s divine weapon cracks, then shatters into pieces. The companion of countless battles lies broken on the ground."
 murim_weapon.0011.a:0 "Reforge it -- make it stronger!"
 murim_weapon.0011.b:0 "Fight with bare hands from now on."
 murim_weapon.0011.c:0 "Seek a new legendary weapon."

 murim_weapon.0012.t:0 "The Weapon of Heaven's Will"
 murim_weapon.0012.desc:0 "As the Great Calamity tears the world apart, a weapon of unimaginable power reveals itself to [ROOT.GetFirstName]. The Weapon of Heaven's Will -- said to be forged by the gods themselves. But can any mortal truly wield such power?"
 murim_weapon.0012.a:0 "I will wield the Weapon of Heaven!"
 murim_weapon.0012.b:0 "Guard it for a worthy successor."
 murim_weapon.0012.c:0 "Destroy it before it falls into the wrong hands."

 # ========================================
 # MURIM WANDERING CULTIVATOR LOCALIZATION
 # ========================================

 murim_wanderer.0001.t:0 "The Road Calls"
 murim_wanderer.0001.desc:0 "The sect walls feel like a prison. The rigid hierarchy, the political games, the endless rules -- [ROOT.GetFirstName] yearns for the open road. The wind carries stories of wandering swordsmen who answer to no one."
 murim_wanderer.0001.a:0 "I walk the wanderer's path."
 murim_wanderer.0001.b:0 "Just a temporary journey -- I'll return."
 murim_wanderer.0001.c:0 "Stay and face my problems."

 murim_wanderer.0002.t:0 "The Tavern Encounter"
 murim_wanderer.0002.desc:0 "A roadside tavern offers warmth, cheap wine, and interesting company. [ROOT.GetFirstName] spots a stranger whose bearing suggests martial training. Every wanderer knows: tavern encounters can change your life."
 murim_wanderer.0002.a:0 "Share stories and drink together."
 murim_wanderer.0002.b:0 "Challenge them to a friendly spar."
 murim_wanderer.0002.c:0 "Keep to myself."

 murim_wanderer.0003.t:0 "Bandits on the Road!"
 murim_wanderer.0003.desc:0 "The mountain pass narrows, and suddenly figures emerge from the treeline. Bandits, armed and desperate, block the path. Their leader sneers at [ROOT.GetFirstName]. 'Leave your valuables and your life may be spared.'"
 murim_wanderer.0003.a:0 "You dare threaten a martial artist?!"
 murim_wanderer.0003.b:0 "Show them my martial aura -- they'll flee."
 murim_wanderer.0003.c:0 "Take a different path."

 murim_wanderer.0004.t:0 "The Hidden Master"
 murim_wanderer.0004.desc:0 "In a remote mountain clearing, [ROOT.GetFirstName] discovers an elderly figure practicing martial arts of breathtaking beauty and power. This is no ordinary hermit -- this is a hidden master, someone who has transcended the common martial world."
 murim_wanderer.0004.a:0 "Beg to become their disciple."
 murim_wanderer.0004.b:0 "Challenge them to test my skills."
 murim_wanderer.0004.c:0 "Observe quietly and learn from afar."

 murim_wanderer.0005.t:0 "The Master's Trial"
 murim_wanderer.0005.desc:0 "The hidden master has agreed to test [ROOT.GetFirstName]. 'Words are wind. Show me your resolve, your wisdom, and your heart. Only then will I decide if you are worthy.' The trial begins at dawn."
 murim_wanderer.0005.a:0 "Face the trial with everything I have."
 murim_wanderer.0005.b:0 "Use cleverness to find shortcuts."
 murim_wanderer.0005.c:0 "This trial isn't for me."

 murim_wanderer.0006.t:0 "Village Under Threat"
 murim_wanderer.0006.desc:0 "A small village sits under the shadow of oppression. The villagers' faces are gaunt with fear. [ROOT.GetFirstName] sees the marks of violence and exploitation. Someone powerful is terrorizing these people."
 murim_wanderer.0006.a:0 "I'll defend this village!"
 murim_wanderer.0006.b:0 "I'll train the villagers to fight back."
 murim_wanderer.0006.c:0 "Not my problem. Keep walking."

 murim_wanderer.0007.t:0 "Mountain Hermitage"
 murim_wanderer.0007.desc:0 "The mountain peak is wreathed in clouds, the air thin and pure. [ROOT.GetFirstName] finds the perfect spot for cultivation -- a natural qi gathering point where heaven and earth meet."
 murim_wanderer.0007.a:0 "Meditate here for an extended retreat."
 murim_wanderer.0007.b:0 "Practice combat techniques against nature."
 murim_wanderer.0007.c:0 "Explore the mountain for hidden secrets."

 murim_wanderer.0008.t:0 "The Wandering Healer"
 murim_wanderer.0008.desc:0 "A sick person lies by the roadside, their family weeping. [ROOT.GetFirstName]'s knowledge of qi and the body could save this life. The martial arts are not just for destruction -- they can also heal."
 murim_wanderer.0008.a:0 "Use qi knowledge to heal them."
 murim_wanderer.0008.b:0 "Teach them self-healing techniques."
 murim_wanderer.0008.c:0 "Healing is not my calling."

 murim_wanderer.0009.t:0 "Come Home, Wanderer"
 murim_wanderer.0009.desc:0 "A messenger from an organized sect has tracked [ROOT.GetFirstName] down. 'Your reputation precedes you, wanderer. Our sect leader extends a personal invitation. We could use someone of your caliber.'"
 murim_wanderer.0009.a:0 "Accept -- it's time to belong somewhere."
 murim_wanderer.0009.b:0 "The road is my sect."
 murim_wanderer.0009.c:0 "I'll join, but on my own terms."

 murim_wanderer.0010.t:0 "Legend of the Road"
 murim_wanderer.0010.desc:0 "Stories of [ROOT.GetFirstName] have spread across the Nine Clans. The wandering swordsman who fears nothing, who helps the weak, who answers to no master. A living legend walks among us."
 murim_wanderer.0010.a:0 "Accept the mantle of legend."
 murim_wanderer.0010.b:0 "Establish a wandering school."
 murim_wanderer.0010.c:0 "Disappear into myth."

 murim_wanderer.0011.t:0 "The Wanderer's War"
 murim_wanderer.0011.desc:0 "The Great Calamity spares no one -- not even those who walk alone. [ROOT.GetFirstName] must decide: fight for all of Murim, fight alone, or protect the innocent who cannot protect themselves."
 murim_wanderer.0011.a:0 "Rally scattered warriors!"
 murim_wanderer.0011.b:0 "Fight alone against the calamity."
 murim_wanderer.0011.c:0 "Guide civilians to safety."

 murim_wanderer.0012.t:0 "The Wanderer's End"
 murim_wanderer.0012.desc:0 "The road has been long and rich with experience. [ROOT.GetFirstName] feels the weight of years and countless adventures. Every scar tells a story, every technique carries a memory. The wanderer's journey must find its final destination."
 murim_wanderer.0012.a:0 "Settle down and pass on my knowledge."
 murim_wanderer.0012.b:0 "One last journey into the unknown."
 murim_wanderer.0012.c:0 "Die on the road -- a true wanderer's end."

 # ========================================
 # MURIM CLAN BETRAYAL LOCALIZATION
 # ========================================

 murim_betrayal.0001.t:0 "Seeds of Discontent"
 murim_betrayal.0001.desc:0 "Resentment festers in [ROOT.GetFirstName]'s heart. Passed over for promotion, disrespected by elders, constrained by rigid clan rules -- the frustration builds. A whisper from a rival clan suggests there might be a better life elsewhere."
 murim_betrayal.0001.a:0 "Begin plotting my defection."
 murim_betrayal.0001.b:0 "Voice my complaints openly."
 murim_betrayal.0001.c:0 "Suppress my feelings -- loyalty above all."

 murim_betrayal.0002.t:0 "The Traitor's Bargain"
 murim_betrayal.0002.desc:0 "The rival clan has made their offer. Gold, position, forbidden techniques, protection -- everything [ROOT.GetFirstName] ever wanted, in exchange for secrets and loyalty to a new master."
 murim_betrayal.0002.a:0 "Accept and defect with all our clan secrets."
 murim_betrayal.0002.b:0 "Accept, but secretly remain loyal as a double agent."
 murim_betrayal.0002.c:0 "I can't do this. I'm staying."

 murim_betrayal.0003.t:0 "Traitor in Our Midst!"
 murim_betrayal.0003.desc:0 "The unthinkable has happened. One of our own has defected to a rival clan, carrying with them the secrets of our techniques and our defenses. [ROOT.GetFirstName] burns with betrayal and fury."
 murim_betrayal.0003.a:0 "Send assassins after the traitor!"
 murim_betrayal.0003.b:0 "Publicly denounce and exile them."
 murim_betrayal.0003.c:0 "Initiate a loyalty purge of all members."

 murim_betrayal.0004.t:0 "A Traitor's New Life"
 murim_betrayal.0004.desc:0 "[ROOT.GetFirstName] looks around the new clan's training grounds. Everything is different -- the techniques, the culture, the faces. The price of betrayal is living as a permanent outsider, always suspected, never fully trusted."
 murim_betrayal.0004.a:0 "Share every secret to prove my loyalty."
 murim_betrayal.0004.b:0 "Keep some secrets as insurance."
 murim_betrayal.0004.c:0 "I already regret this decision."

 murim_betrayal.0005.t:0 "The Loyalty Purge"
 murim_betrayal.0005.desc:0 "Suspicion hangs over the sect like a funeral shroud. Every member is being watched, questioned, tested. [ROOT.GetFirstName] has identified another suspect. But are they truly a traitor?"
 murim_betrayal.0005.a:0 "Execute them immediately as a warning."
 murim_betrayal.0005.b:0 "Interrogate them thoroughly first."
 murim_betrayal.0005.c:0 "Release them with a warning."

 murim_betrayal.0006.t:0 "The Double Game"
 murim_betrayal.0006.desc:0 "[ROOT.GetFirstName] lives two lives. To one side, a loyal defector sharing intelligence. To the other, a faithful agent sending reports home. The double agent's game is the most dangerous in all the Murim."
 murim_betrayal.0006.a:0 "Send intelligence back to my original clan."
 murim_betrayal.0006.b:0 "Go silent -- too much heat right now."
 murim_betrayal.0006.c:0 "Abandon the double agent role."

 murim_betrayal.0007.t:0 "Betrayal on the Battlefield"
 murim_betrayal.0007.desc:0 "The armies clash, and in the chaos of battle, an opportunity presents itself. [ROOT.GetFirstName] could switch sides right now, dealing a devastating blow. But betrayal in war is the most unforgivable sin."
 murim_betrayal.0007.a:0 "Switch sides in the heat of battle!"
 murim_betrayal.0007.b:0 "Never. I stand with my brothers."
 murim_betrayal.0007.c:0 "Flee the battlefield entirely."

 murim_betrayal.0008.t:0 "The Prodigal Return"
 murim_betrayal.0008.desc:0 "Regret weighs upon [ROOT.GetFirstName] like a mountain. The new clan was never home. The faces of betrayed former comrades haunt every dream. Perhaps... perhaps forgiveness is still possible."
 murim_betrayal.0008.a:0 "Return and beg for forgiveness."
 murim_betrayal.0008.b:0 "Offer valuable intelligence as a peace offering."
 murim_betrayal.0008.c:0 "Accept exile and move on."

 murim_betrayal.0009.t:0 "Mass Defection Crisis"
 murim_betrayal.0009.desc:0 "Multiple members have followed the traitor's example. The sect hemorrhages talent and secrets. [ROOT.GetFirstName] faces a crisis that threatens to destroy everything."
 murim_betrayal.0009.a:0 "Declare martial law in the sect."
 murim_betrayal.0009.b:0 "Reform the sect to address grievances."
 murim_betrayal.0009.c:0 "Accept the losses and rebuild."

 murim_betrayal.0010.t:0 "The Traitor's Child"
 murim_betrayal.0010.desc:0 "The sins of the parent visit the child. [ROOT.GetFirstName] has come of age bearing the stigma of a traitor's legacy. Every eye watches with suspicion, every whisper carries the parent's shame."
 murim_betrayal.0010.a:0 "I'll prove I'm nothing like my parent."
 murim_betrayal.0010.b:0 "My parent was right to leave."
 murim_betrayal.0010.c:0 "Change my name and start fresh."

 murim_betrayal.0011.t:0 "Betrayal in the Calamity"
 murim_betrayal.0011.desc:0 "The Great Calamity tests every soul. As destruction rains down, [ROOT.GetFirstName] faces the ultimate moral test: betray allies to survive, or stand together even if it means death?"
 murim_betrayal.0011.a:0 "Betray my allies to save myself."
 murim_betrayal.0011.b:0 "Stand together, no matter what."
 murim_betrayal.0011.c:0 "Sacrifice myself for the others."

 murim_betrayal.0012.t:0 "The Ultimate Betrayal"
 murim_betrayal.0012.desc:0 "An opportunity presents itself to sell out the entire Murim Alliance. Every clan, every secret, every weakness -- delivered to the enemy for unimaginable reward. [ROOT.GetFirstName] holds the fate of the martial world."
 murim_betrayal.0012.a:0 "Sell out everyone. Take the gold."
 murim_betrayal.0012.b:0 "Even I have limits."
 murim_betrayal.0012.c:0 "Pretend to betray, then save everyone."

 # ========================================
 # MURIM COURT OF ELDERS LOCALIZATION
 # ========================================

 murim_elders.0001.t:0 "The Elder Council Convenes"
 murim_elders.0001.desc:0 "The most senior members of the sect gather in the great hall. Gray beards and weathered faces reflect decades of martial wisdom. [ROOT.GetFirstName] presides over the council as important matters demand attention."
 murim_elders.0001.a:0 "Follow the elders' consensus."
 murim_elders.0001.b:0 "Override the elders with my authority."
 murim_elders.0001.c:0 "Propose a compromise."

 murim_elders.0002.t:0 "Who Leads Next?"
 murim_elders.0002.desc:0 "Time waits for no one, not even the most powerful sect leader. [ROOT.GetFirstName] must secure the future of the sect by choosing a worthy successor. Two candidates stand out, each with different strengths."
 murim_elders.0002.a:0 "Name the strongest martial artist."
 murim_elders.0002.b:0 "Name the wisest diplomat."
 murim_elders.0002.c:0 "Let the elders decide through a tournament."
 murim_elders.0002.d:0 "Fate will decide when the time comes."

 murim_elders.0003.t:0 "The Succession Tournament"
 murim_elders.0003.desc:0 "The candidates face each other in the training ground. The future of the sect will be decided by skill and determination. Every elder watches with bated breath."
 murim_elders.0003.a:0 "Accept the tournament result."
 murim_elders.0003.b:0 "Contest the result -- something was wrong."
 murim_elders.0003.c:0 "Add additional trials beyond combat."

 murim_elders.0004.t:0 "Elder Corruption"
 murim_elders.0004.desc:0 "An elder has been using their position to line their pockets. Sect funds diverted, disciples exploited, justice perverted. [ROOT.GetFirstName] has uncovered the truth about someone who was supposed to be above reproach."
 murim_elders.0004.a:0 "Expose and remove the corrupt elder."
 murim_elders.0004.b:0 "Blackmail them for personal control."
 murim_elders.0004.c:0 "Turn a blind eye."

 murim_elders.0005.t:0 "Young Blood Rebels"
 murim_elders.0005.desc:0 "The younger generation is growing restless. Led by an ambitious young martial artist, they demand change: new techniques, new alliances, new ways of thinking. The elders dismiss them as impetuous fools."
 murim_elders.0005.a:0 "Hear out the young generation."
 murim_elders.0005.b:0 "Suppress the rebellion firmly."
 murim_elders.0005.c:0 "Create a youth advisory council."

 murim_elders.0006.t:0 "Emergency War Council"
 murim_elders.0006.desc:0 "The Great Calamity approaches. Every elder sits grim-faced around the war table. This is no ordinary meeting -- the survival of the sect and perhaps all of the Murim hangs in the balance."
 murim_elders.0006.a:0 "Consolidate all power under one leader."
 murim_elders.0006.b:0 "Form a unified war council of all nine clans."
 murim_elders.0006.c:0 "Evacuate and preserve the sect."

 murim_elders.0007.t:0 "Winds of Change"
 murim_elders.0007.desc:0 "[ROOT.GetFirstName] believes the old ways must evolve. The rigid traditions that once served the sect well now hold it back. But reform is a dangerous word in the halls of tradition."
 murim_elders.0007.a:0 "Allow cross-clan marriages officially."
 murim_elders.0007.b:0 "Open technique sharing between clans."
 murim_elders.0007.c:0 "Maintain our sacred traditions."

 murim_elders.0008.t:0 "Vote of No Confidence"
 murim_elders.0008.desc:0 "The elders have called an emergency session. Their faces are stone, their message clear: [ROOT.GetFirstName] has lost the confidence of the council. The sect demands new leadership."
 murim_elders.0008.a:0 "Step down gracefully."
 murim_elders.0008.b:0 "I refuse. This sect is mine."
 murim_elders.0008.c:0 "Propose reforms to address their concerns."

 murim_elders.0009.t:0 "The Nine-Clan Grand Assembly"
 murim_elders.0009.desc:0 "For the first time in a generation, all nine clan leaders gather under one roof. The Grand Assembly is a moment of historic significance. [ROOT.GetFirstName] must represent the sect with wisdom and strength."
 murim_elders.0009.a:0 "Propose the formation of the Murim Alliance."
 murim_elders.0009.b:0 "Demand territorial concessions."
 murim_elders.0009.c:0 "Call for peace and non-aggression."

 murim_elders.0010.t:0 "A New Dawn for the Elders"
 murim_elders.0010.desc:0 "The Great Calamity has passed, and the Murim lies scarred but alive. From the ashes, [ROOT.GetFirstName] must build a new order. The old ways failed to prevent catastrophe. What comes next will define the Murim for generations."
 murim_elders.0010.a:0 "Establish a democratic elder council."
 murim_elders.0010.b:0 "Restore the old traditions."
 murim_elders.0010.c:0 "Create something entirely new."

 # ========================================
 # MURIM HB89 MODIFIER LOCALIZATION
 # ========================================

 murim_black_market_access:0 "Black Market Access"
 murim_black_market_access_desc:0 "You know the way to the underground market."
 murim_smuggling_network_active:0 "Smuggling Network"
 murim_smuggling_network_active_desc:0 "A profitable smuggling operation runs through your area of influence."
 murim_smuggling_income:0 "Smuggling Profits"
 murim_smuggling_income_desc:0 "Monthly gold from underground trade."
 murim_intelligence_network:0 "Intelligence Network"
 murim_intelligence_network_desc:0 "A web of informants provides valuable intelligence."
 murim_spy_network_active:0 "Active Spy Network"
 murim_spy_network_active_desc:0 "Agents embedded in rival clans report back regularly."
 murim_forbidden_love_bloom:0 "Forbidden Love"
 murim_forbidden_love_bloom_desc:0 "A secret romance blossoms across faction lines."
 murim_star_crossed_lovers:0 "Star-Crossed Lovers"
 murim_star_crossed_lovers_desc:0 "Bound by love that defies clan boundaries."
 murim_demonic_qi_awakening:0 "Demonic Qi Awakening"
 murim_demonic_qi_awakening_desc:0 "Dark power courses through your meridians."
 murim_demon_lord_ascended:0 "Demon Lord Ascended"
 murim_demon_lord_ascended_desc:0 "You have claimed the throne of darkness."
 murim_divine_weapon_wielder:0 "Divine Weapon Wielder"
 murim_divine_weapon_wielder_desc:0 "A legendary weapon of immense power is bonded to you."
 murim_freedom_of_the_road:0 "Freedom of the Road"
 murim_freedom_of_the_road_desc:0 "The wanderer's life brings peace and growth."
 murim_hidden_master_disciple:0 "Hidden Master's Disciple"
 murim_hidden_master_disciple_desc:0 "Trained by a reclusive master of unmatched skill."
 murim_secret_defector:0 "Plotting Defection"
 murim_secret_defector_desc:0 "Secretly planning to betray your clan."
 murim_elder_approved_leader:0 "Elder-Approved Leader"
 murim_elder_approved_leader_desc:0 "The council of elders supports your leadership."
 murim_nine_clan_war_council:0 "Nine-Clan War Council"
 murim_nine_clan_war_council_desc:0 "United leadership of all nine clans against a common threat."