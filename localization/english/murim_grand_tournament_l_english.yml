 murim_supreme_champion:0 "Supreme Champion"
 murim_supreme_champion_desc:0 "Crowned Supreme Champion of the Grand Tournament — the undisputed pinnacle of the martial world."
 murim_arrogant_champion:0 "Arrogant Champion"
 murim_arrogant_champion_desc:0 "Your arrogant declaration of supremacy at the Grand Tournament offended the orthodox clans but impressed the unorthodox."
 murim_tournament_honorable_defeat:0 "Honorable Tournament Defeat"
 murim_tournament_honorable_defeat_desc:0 "Fought to the semi-finals of the Grand Tournament before falling. An honorable showing."
 murim_clan_representative:0 "Clan Representative"
 murim_clan_representative_desc:0 "Selected by your clan's elders to represent them in the Grand Tournament. A great honor."
 murim_lingering_injury:0 "Lingering Tournament Injury"
 murim_lingering_injury_desc:0 "Wounds sustained in the Grand Tournament have not fully healed."
 murim_qi_disruption:0 "Qi Disruption"
 murim_qi_disruption_desc:0 "Failed medical treatment has disrupted your qi meridians."
 murim_meditation_recovery:0 "Meditation Recovery"
 murim_meditation_recovery_desc:0 "Healing wounds through internal qi circulation and deep meditation."
 murim_battle_scarred_veteran:0 "Battle-Scarred Veteran"
 murim_battle_scarred_veteran_desc:0 "Your tournament scars tell the story of a true martial warrior."
 murim_inspired_by_champion:0 "Inspired by the Champion"
 murim_inspired_by_champion_desc:0 "Studying the techniques of the Grand Tournament champion has broadened your martial understanding."
 murim_in_seclusion:0 "In Seclusion"
 murim_in_seclusion_desc:0 "Deep in cultivation seclusion — isolated from the world, focused entirely on martial advancement."
 murim_seclusion_cooldown:0 "Recently Emerged from Seclusion"
 murim_seclusion_cooldown_desc:0 "Recently completed a period of seclusion training. Your body needs time before another deep cultivation cycle."
 murim_mentor_cooldown:0 "Recently Assigned Mentor"
 murim_mentor_cooldown_desc:0 "Currently under the guidance of a mentor. Focus on their teachings before seeking another."

