l_english:

 # ==========================================
 # CLAN MEMBERSHIP TRAIT NAMES & DESCRIPTIONS
 # ==========================================

 # Mount Hua Sect (Orthodox)
 mount_hua_disciple:0 "Mount Hua Disciple"
 mount_hua_disciple_desc:0 "A disciple of the Mount Hua Sect, practitioners of the legendary Plum Blossom Sword Art. Known for elegant swordsmanship that combines beauty with lethal precision. Mount Hua disciples uphold righteous values and are among the most respected in the Orthodox martial world."

 # Wudang Sect (Orthodox)
 wudang_disciple:0 "Wudang Disciple"
 wudang_disciple_desc:0 "A disciple of the Wudang Sect, masters of internal cultivation and flowing sword arts rooted in Taoist philosophy. Wudang disciples seek harmony between body and spirit, using soft techniques to overcome hard force. Their longevity and wisdom are legendary."

 # Shaolin Temple (Orthodox)
 shaolin_monk:0 "Shaolin Monk"
 shaolin_monk_desc:0 "A monk of the legendary Shaolin Temple, the birthplace of martial arts. Shaolin monks train their bodies to supernatural toughness through the 72 Consummate Arts. Their iron body cultivation and staff techniques are feared across the martial world."

 # Tang Clan (Orthodox - Special)
 tang_clan_member:0 "Tang Clan Blood Member"
 tang_clan_member_desc:0 "Born with Tang blood, inheriting the clan's legendary knowledge of poisons, hidden weapons, and assassination arts. Tang Clan blood members carry the ancestral legacy regardless of which clan they formally serve. Their poison arts are both feared and coveted."

 tang_clan_associate:0 "Tang Clan Associate"
 tang_clan_associate_desc:0 "An ally trained in basic Tang Clan techniques without being a blood member. Associates learn fundamental poison identification and hidden weapon use, gaining valuable skills while maintaining their own clan allegiances."

 tang_clan_disciple:0 "Tang Clan Disciple"
 tang_clan_disciple_desc:0 "A fully trained disciple of the Tang Clan, mastering their legendary poison arts and hidden weapon techniques. Though not born of Tang blood, they have earned the clan's trust and been taught their carefully guarded secrets."

 # Beggar Sect (Orthodox)
 beggar_sect_member:0 "Beggar Sect Member"
 beggar_sect_member_desc:0 "A member of the vast Beggar Sect, the largest intelligence network in the martial world. Beggar Sect members master the Dog Beating Staff and Eighteen Dragon-Subduing Palm while maintaining an unparalleled web of informants across the land."

 # Iron Fist Gate (Orthodox)
 iron_fist_disciple:0 "Iron Fist Disciple"
 iron_fist_disciple_desc:0 "A disciple of Iron Fist Gate, practitioners of devastating external martial arts. Their iron body cultivation and crushing fist techniques trade subtlety for raw, overwhelming power. Iron Fist fighters are the heavy infantry of the martial world."

 # Heavenly Demon Sect (Unorthodox)
 heavenly_demon_disciple:0 "Heavenly Demon Disciple"
 heavenly_demon_disciple_desc:0 "A disciple of the feared Heavenly Demon Sect, the most powerful Unorthodox faction. They practice the forbidden Heavenly Demon Divine Art, gaining immense power at the cost of humanity. The sect's shadow politics extend into the imperial court itself."

 # Poison Flower Palace (Unorthodox)
 poison_flower_disciple:0 "Poison Flower Disciple"
 poison_flower_disciple_desc:0 "A disciple of Poison Flower Palace, masters of botanical poisons and seductive martial arts. Their beauty conceals lethal skill with toxins that can kill with a touch. The Palace's garden contains the deadliest plants in the world."

 # Phantom Blade Sect (Unorthodox)
 phantom_blade_disciple:0 "Phantom Blade Disciple"
 phantom_blade_disciple_desc:0 "A disciple of the Phantom Blade Sect, assassins who strike from shadows and vanish like ghosts. Their blade techniques are designed for swift, silent kills. The sect sells their services to the highest bidder, making them both valuable and dangerous."

 # Base Martial Traits
 martial_artist:0 "Martial Artist"
 martial_artist_desc:0 "A practitioner of the martial arts, having entered the cultivation world and begun walking the path of power. Whether through orthodox training, demonic arts, or self-taught desperation, they have awakened their qi."

 demonic_cultivator:0 "Demonic Cultivator"
 demonic_cultivator_desc:0 "Practices forbidden demonic cultivation methods that offer rapid power gains at the cost of physical health and moral standing. Demonic cultivators are feared and despised by the Orthodox martial world."

 cultivation_prodigy:0 "Cultivation Prodigy"
 cultivation_prodigy_desc:0 "Born with exceptional spiritual roots and natural talent for cultivation. Progress through martial ranks comes faster, and insights arrive with unusual frequency."
