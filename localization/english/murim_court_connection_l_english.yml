 murim_imperial_tournament_champion: "Imperial Tournament Champion"
 murim_imperial_tournament_champion_desc: "Won a tournament hosted by a ruler, earning both martial and political prestige."
 murim_realm_protector: "Realm Protector"
 murim_realm_protector_desc: "Deployed forces to protect the realm from martial world violence."
 murim_diplomatic_bridge: "Diplomatic Bridge"
 murim_diplomatic_bridge_desc: "Successfully negotiated with martial world leaders to resolve a crisis peacefully."
 murim_isolationist_ruler: "Isolationist Ruler"
 murim_isolationist_ruler_desc: "Chose to ignore the martial world's problems, earning resentment from those affected."
 murim_exposed_shadow_influence: "Exposed Shadow Influence"
 murim_exposed_shadow_influence_desc: "Uncovered and exposed a martial sect's covert influence over the court."
 murim_shadow_alliance_benefit: "Shadow Alliance"
 murim_shadow_alliance_benefit_desc: "Maintains a secret alliance with a martial world figure, benefiting from their shadow network."
 murim_purged_martial_influence: "Purged Martial Influence"
 murim_purged_martial_influence_desc: "Ruthlessly eliminated all martial world influence from the court."
 murim_court_influence_seeker: "Seeking Court Influence"
 murim_court_influence_seeker_desc: "Actively working to gain influence within a ruler's court."
 murim_pure_martial_focus: "Pure Martial Focus"
 murim_pure_martial_focus_desc: "Chose to focus on the martial world rather than political intrigue."
 murim_curious_about_jianghu: "Curious About the Jianghu"
 murim_curious_about_jianghu_desc: "Has recently learned about the martial world and is investigating further."
 murim_martial_recruiter_ruler: "Martial Recruiter"
 murim_martial_recruiter_ruler_desc: "Actively seeking to recruit martial artists into court service."
 murim_martial_world_suppressor: "Martial World Suppressor"
 murim_martial_world_suppressor_desc: "Views the martial world as a threat and actively works to suppress it."
