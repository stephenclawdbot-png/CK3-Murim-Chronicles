l_english:
 murim_shaolin.0001.t: "The Bodhi Tree Meditation"
 murim_shaolin.0001.desc: "Beneath the ancient bodhi tree, senior monks gather in silent communion. The scent of incense mingles with mountain air as you settle into the lotus position. Enlightenment beckons — but so does the restless world."
 murim_shaolin.0001.a: "Sink into deep meditation."
 murim_shaolin.0001.b: "Struggle against worldly attachments."
 murim_shaolin.0001.c: "Reject meditation — choose the martial path."
 murim_shaolin.0002.t: "The 72 Consummate Arts Trial"
 murim_shaolin.0002.desc: "The Hall of Martial Monks stands open before you. Within these walls, generations have forged their bodies into living weapons through the legendary 72 Arts. Each art demands years of suffering. Failure can cripple — success makes you elite."
 murim_shaolin.0002.a: "Attempt the Iron Shirt technique."
 murim_shaolin.0002.b: "Attempt the Prajna Palm."
 murim_shaolin.0002.c: "Attempt the Staff of Dharma."
 murim_shaolin.0002.d: "Decline — I am not ready yet."
 murim_shaolin.0003.t: "Abbot vs Martial Hall"
 murim_shaolin.0003.desc: "The scholarly Abbot wishes to reduce martial training in favor of scripture study. The Martial Hall vehemently disagrees — Shaolin's strength lies in its fists, they argue. The temple divides along this ancient fault line."
 murim_shaolin.0003.a: "Side with the Abbot's scholarly path."
 murim_shaolin.0003.b: "Side with the Martial Hall."
 murim_shaolin.0003.c: "Mediate between both factions."
 murim_shaolin.0004.t: "The Relic of Bodhidharma"
 murim_shaolin.0004.desc: "A sealed chamber within the temple has been breached by time itself. Inside lies an ancient relic attributed to Bodhidharma, the founder of Shaolin. Its power radiates through the stone, promising revelation — or madness."
 murim_shaolin.0004.a: "Study the relic for enlightenment."
 murim_shaolin.0004.b: "Seal the relic away — too dangerous."
 murim_shaolin.0004.c: "Study it alone in secret."
 murim_shaolin.0005.t: "Wandering Monk Mission"
 murim_shaolin.0005.desc: "The Abbot calls you before the great Buddha. Shaolin sends its monks into the jianghu to protect the weak and uphold righteousness. Your mission awaits beyond the temple gates."
 murim_shaolin.0005.a: "Walk the path of compassion."
 murim_shaolin.0005.b: "Use the mission to train in combat."
 murim_shaolin.0005.c: "Investigate unorthodox activity."
 murim_shaolin.0005.d: "Refuse — stay in the temple."
 murim_shaolin.0006.t: "The Diamond Body Awakening"
 murim_shaolin.0006.desc: "Years of Iron Shirt training have tempered your body beyond mortal limits. Your skin gleams like burnished bronze, and strikes that would shatter stone barely leave a mark. The legendary Diamond Body is within reach."
 murim_shaolin.0006.a: "Push through the transformation."
 murim_shaolin.0006.b: "Stabilize at Iron Shirt — do not risk it."
 murim_shaolin.0006.c: "Use forbidden demonic qi shortcuts."
 murim_shaolin.0007.t: "Defending the Temple Gates"
 murim_shaolin.0007.desc: "War drums echo through the mountain pass. Unorthodox forces have come to challenge Shaolin directly, their banners dark against the dawn sky. The ancient gates must hold, or a thousand years of legacy will burn."
 murim_shaolin.0007.a: "Lead the defense from the front."
 murim_shaolin.0007.b: "Protect the relics and scriptures."
 murim_shaolin.0007.c: "Negotiate with the attackers."
 murim_shaolin.0008.t: "The Theft Discovered"
 murim_shaolin.0008.desc: "A senior monk's knowing eyes meet yours across the meditation hall. Your nocturnal visits to the sealed relic chamber have been noticed. The weight of discovery settles upon your shoulders like iron chains."
 murim_shaolin.0008.a: "Confess and accept punishment."
 murim_shaolin.0008.b: "Lie and frame another monk."
 murim_shaolin.0008.c: "Flee the temple with the knowledge."
 murim_shaolin.0009.t: "Abbot Succession"
 murim_shaolin.0009.desc: "The old Abbot's breathing grows shallow, each exhale a whisper of sutras. Shaolin must have a new guiding hand. The monks gather in the great hall, and the air thickens with ambition and reverence alike."
 murim_shaolin.0009.a: "Nominate myself as Abbot."
 murim_shaolin.0009.b: "Support another worthy elder."
 murim_shaolin.0009.c: "Sabotage all candidates secretly."
 murim_shaolin.0010.t: "The Fallen Monk's Return"
 murim_shaolin.0010.desc: "A ragged figure kneels at the temple gates, forehead pressed to stone. A former brother who abandoned Shaolin for unorthodox ways now begs for redemption. His eyes carry the hollow light of genuine regret."
 murim_shaolin.0010.a: "Accept him with open arms."
 murim_shaolin.0010.b: "Accept, but assign harsh penance."
 murim_shaolin.0010.c: "Reject — once fallen, forever fallen."
