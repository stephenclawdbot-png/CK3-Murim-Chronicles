l_english:
 murim_realm.0001.t: "The Portal Opens"
 murim_realm.0001.desc: "The air shimmers and tears apart, revealing a gateway to another dimension — a Secret Realm, a pocket of space created by an ancient cultivator of unimaginable power. These realms contain treasures beyond mortal comprehension... and dangers to match. The portal won't stay open forever."
 murim_realm.0001.a: "Enter alone — the rewards are mine"
 murim_realm.0001.b: "Organize a joint expedition with allies"
 murim_realm.0001.c: "Let others take the risk — I'll pass"

 murim_realm.0002.t: "Wonders Within"
 murim_realm.0002.desc: "The secret realm defies natural law. Spirit herbs grow from crystal soil, qi flows visibly through the air like luminous rivers, and the remnants of the ancient cultivator's power permeate everything. Time itself seems to flow differently here. Every direction holds both promise and peril."
 murim_realm.0002.a: "Seek the realm's core — the greatest treasures lie within"
 murim_realm.0002.b: "Carefully catalog and harvest what's here"
 murim_realm.0002.c: "Take everything portable and get out fast"

 murim_realm.0003.t: "The Treasure Map"
 murim_realm.0003.desc: "A worn parchment falls from a book you purchased at a market — a treasure map drawn in faded ink. It marks the location of a 'Celestial Repository' deep in the mountains. The map could be genuine... or an elaborate trap. Others have died following such maps."
 murim_realm.0003.a: "Follow the map — fortune favors the bold"
 murim_realm.0003.b: "Sell the map to an interested buyer"
 murim_realm.0003.c: "Share the map with trusted allies"

 murim_realm.0004.t: "The Ancestral Vault"
 murim_realm.0004.desc: "Hidden beneath your ancestral home, you discover a sealed vault that predates living memory. Inside: cultivation manuals from your most illustrious ancestors, spirit stones of extraordinary purity, and a letter addressed to 'the worthy descendant who finds this.' It was meant for you."
 murim_realm.0004.a: "Study the manuals and absorb their wisdom"
 murim_realm.0004.b: "Share the discovery with your sect"
 murim_realm.0004.c: "Sell the treasures for immediate wealth"

 murim_realm.0005.t: "The Realm Collapses"
 murim_realm.0005.desc: "The secret realm is coming apart. Cracks spread across the sky, the ground heaves, and spatial storms tear through the landscape. You have moments to find an exit before this dimension collapses entirely — taking everything and everyone inside with it."
 murim_realm.0005.a: "Blast through to the exit with raw power"
 murim_realm.0005.b: "Navigate using qi-sense to find stable paths"
 murim_realm.0005.c: "Sacrifice a treasure to force a spatial tear"

 murim_realm.0006.t: "The Relic Race"
 murim_realm.0006.desc: "News of an unearthed relic site has spread too fast. When you arrive, three other factions are already there — swords drawn, qi flaring. The ruins contain enough treasures for one faction, maybe two. Not four. Negotiations have failed. What remains is competition."
 murim_realm.0006.a: "Fight for supremacy — take it all"
 murim_realm.0006.b: "Propose a fair division before blood is spilled"
 murim_realm.0006.c: "Let them fight and scavenge the leftovers"

 murim_realm.0007.t: "The Inheritance Trial"
 murim_realm.0007.desc: "You stand before the sealed door of an ancient master's trial chamber. A spirit projection materializes: 'Only the worthy may inherit my legacy. You must pass three trials — of strength, wisdom, and heart. Fail any, and you leave with nothing. Cheat, and you leave in pieces.'"
 murim_realm.0007.a: "Face the trials — prove your strength"
 murim_realm.0007.b: "Face the trials — prove your wisdom"
 murim_realm.0007.c: "Decline — share the location with a worthy student"

 murim_realm.0008.t: "The Forbidden Zone"
 murim_realm.0008.desc: "You've reached the edge of a Forbidden Zone — an area where the laws of qi are broken. Techniques fail unpredictably, cultivation can reverse, and spatial distortions trap the unwary. But those who've returned speak of unparalleled cultivation opportunities at its center."
 murim_realm.0008.a: "Venture to the center — risk everything"
 murim_realm.0008.b: "Explore the edges cautiously"
 murim_realm.0008.c: "Mark it on the map and leave"
