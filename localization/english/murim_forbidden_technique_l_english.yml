l_english:
 murim_forbidden_technique.0001.t: "Whispers of the Forbidden Path"
 murim_forbidden_technique.0001.desc: "In the deepest reaches of a forgotten cave, you discover ancient scrolls sealed with blood. The characters writhe on the page as if alive, each stroke pulsing with dark qi. These are the forbidden arts -- techniques outlawed by every righteous sect for the devastation they bring upon both wielder and victim."
 murim_forbidden_technique.0001.a: "Study the Soul Devouring Palm"
 murim_forbidden_technique.0001.b: "Pursue the Blood Reversal Art"
 murim_forbidden_technique.0001.c: "Seek the Void Breathing Method"
 murim_forbidden_technique.0001.d: "Reach for the Heaven Defying Sutra"
 murim_forbidden_technique.0001.e: "Walk away from this darkness"
 murim_forbidden_technique.0010.t: "The Soul Devouring Palm"
 murim_forbidden_technique.0010.desc: "The scroll unfurls before you, revealing the Soul Devouring Palm -- a technique that drains the living qi from another's meridians. To master it, you must first practice on a living victim. The scroll's margins are stained with the tears of its previous owners."
 murim_forbidden_technique.0010.a: "Drain your first victim's qi"
 murim_forbidden_technique.0010.b: "Study the theory only"
 murim_forbidden_technique.0010.c: "Destroy the accursed scroll"
 murim_forbidden_technique.0020.t: "The Blood Reversal Art"
 murim_forbidden_technique.0020.desc: "This technique reverses the flow of blood qi through the body, turning the practitioner's own life force into a weapon. The scroll warns that prolonged use corrodes the soul, yet promises power beyond any orthodox technique."
 murim_forbidden_technique.0020.a: "Learn the Blood Reversal Art"
 murim_forbidden_technique.0020.b: "Study without practicing"
 murim_forbidden_technique.0020.c: "Reject this vile art"
 murim_forbidden_technique.0030.t: "The Void Breathing Method"
 murim_forbidden_technique.0030.desc: "Where other cultivators draw qi from heaven and earth, the Void Breathing Method draws from the space between -- the emptiness that separates existence from oblivion. Those who master it can unmake qi itself, but the void is hungry, and it stares back."
 murim_forbidden_technique.0030.a: "Breathe the void into your meridians"
 murim_forbidden_technique.0030.b: "The void stares back. Refuse."
 murim_forbidden_technique.0040.t: "The Heaven Defying Sutra"
 murim_forbidden_technique.0040.desc: "This is no mere forbidden technique -- it is an affront to the natural order. The Heaven Defying Sutra allows a cultivator to steal the mandate of heaven itself, rewriting the laws of qi that govern all martial arts. The price of failure is annihilation."
 murim_forbidden_technique.0040.a: "Defy heaven itself"
 murim_forbidden_technique.0040.b: "The price is too high"
 murim_forbidden_technique.0040.c: "Seal it for future generations"
 murim_forbidden_technique.0050.t: "The Asura Body Technique"
 murim_forbidden_technique.0050.desc: "An ancient technique surfaces from the demonic path -- the Asura Body Technique. It transforms the practitioner's flesh into something inhuman, granting terrifying physical power at the cost of one's connection to orthodox cultivation."
 murim_forbidden_technique.0050.a: "Transform your body with asura qi"
 murim_forbidden_technique.0050.b: "Reject this monstrous art"
 murim_forbidden_technique.0060.t: "The Soul Splitting Art"
 murim_forbidden_technique.0060.desc: "A technique whispered of in the darkest corners of the jianghu -- the Soul Splitting Art fractures the practitioner's consciousness, allowing them to exist in multiple states simultaneously. Masters of deception prize it above all other forbidden arts."
 murim_forbidden_technique.0060.a: "Split your soul and multiply"
 murim_forbidden_technique.0060.b: "Keep your soul intact"
 murim_forbidden_technique.0070.t: "Death Qi Cultivation"
 murim_forbidden_technique.0070.desc: "Where living cultivators channel the qi of life, this technique draws power from death itself. Battlefields, graveyards, places of suffering -- all become wellsprings of terrible strength. The death qi seeps into your meridians like cold poison."
 murim_forbidden_technique.0070.a: "Embrace the qi of the dead"
 murim_forbidden_technique.0070.b: "The dead should rest in peace"
 murim_forbidden_technique.0080.t: "The Eternal Damnation Sutra"
 murim_forbidden_technique.0080.desc: "The ultimate forbidden technique. The Eternal Damnation Sutra transcends all other dark arts, merging their principles into a single devastating path. Those who complete it cease to be mortal in any meaningful sense -- but they also cease to be human."
 murim_forbidden_technique.0080.a: "Embrace eternal damnation"
 murim_forbidden_technique.0080.b: "Even power has its limits"
 murim_forbidden_technique.0080.c: "Destroy it forever"
 murim_forbidden_technique.0100.t: "The Purging Ritual"
 murim_forbidden_technique.0100.desc: "The corruption gnaws at your meridians like black fire. An elder of the righteous path has agreed to perform the purging ritual -- a process of agonizing spiritual cleansing that burns the dark qi from your body. It will be excruciating, but it may save your soul."
 murim_forbidden_technique.0100.a: "Endure the full purge"
 murim_forbidden_technique.0100.b: "Partial purge only"
 murim_forbidden_technique.0100.c: "Abandon the ritual"
 murim_forbidden_technique.0200.t: "Sealing the Forbidden Arts"
 murim_forbidden_technique.0200.desc: "The forbidden techniques pulse within your meridians like caged serpents. A moment of clarity pierces through the dark qi -- you could seal these arts away, diminishing your power but reclaiming a piece of your humanity. The choice weighs heavy."
 murim_forbidden_technique.0200.a: "Seal the most dangerous technique"
 murim_forbidden_technique.0200.b: "Keep the power. Accept corruption."
 murim_forbidden_technique.0200.c: "Seal ALL forbidden techniques"
 murim_forbidden_technique.0300.t: "The Forbidden Knowledge Broker"
 murim_forbidden_technique.0300.desc: "In a lantern-lit cellar beneath a teahouse, a figure in black robes deals in the martial world's darkest secrets. Forbidden technique scrolls, intelligence on rival cultivators, information that could topple sects -- all available for the right price."
 murim_forbidden_technique.0300.a: "Buy a forbidden technique scroll"
 murim_forbidden_technique.0300.b: "Sell information about a rival"
 murim_forbidden_technique.0300.c: "Trade a technique for intelligence"
 murim_forbidden_technique.0300.d: "Leave this den of treachery"
 murim_forbidden_technique.0400.t: "Corruption Flare"
 murim_forbidden_technique.0400.desc: "The dark qi in your meridians surges without warning, sending waves of agony through your body. Black veins pulse beneath your skin as the corruption fights for dominance over your will. You must endure -- or channel the pain into something useful."
 murim_forbidden_technique.0400.a: "Endure the pain"
 murim_forbidden_technique.0400.b: "Channel it into raw power"
 murim_forbidden_technique.0410.t: "Severe Corruption Episode"
 murim_forbidden_technique.0410.desc: "Your vision fractures. Shadows move at the edges of your sight. The corruption has reached a critical threshold -- your own qi wars against the dark arts embedded in your meridians. If you lose this battle, the darkness may consume you entirely."
 murim_forbidden_technique.0410.a: "Fight for control of your mind"
 murim_forbidden_technique.0410.b: "Surrender to the darkness"
 murim_forbidden_technique.0500.t: "The Orthodox Hunters"
 murim_forbidden_technique.0500.desc: "They found you. A team of orthodox cultivators -- righteous avengers sworn to purge forbidden technique users from the martial world. Their qi signatures burn with holy fury as they surround you. There is no reasoning with zealots."
 murim_forbidden_technique.0500.a: "Stand and fight the hunters"
 murim_forbidden_technique.0500.b: "Flee into the shadows"
 murim_forbidden_technique.0500.c: "Surrender and accept judgment"
 murim_forbidden_technique.0600.t: "Clash of Forbidden Arts"
 murim_forbidden_technique.0600.desc: "Another wielder of forbidden techniques has crossed your path. You sense their corrupted qi before you see them -- a mirror of your own darkness. When two forbidden art practitioners clash, the heavens themselves tremble. This fight will reshape the landscape."
 murim_forbidden_technique.0600.a: "Unleash everything"
 murim_forbidden_technique.0600.b: "Fight with orthodox techniques only"
 murim_forbidden_technique.0600.c: "Withdraw -- too dangerous"
