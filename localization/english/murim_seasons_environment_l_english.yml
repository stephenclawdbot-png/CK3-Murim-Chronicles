l_english:
 murim_season.0001.t: "Spring Awakening"
 murim_season.0001.desc: "As winter thaws and the first flowers bloom, you feel a surge of vitality in your qi. The natural energy of spring flows through the earth, rejuvenating all living things. Cultivators across the land report accelerated breakthroughs. The world itself seems to be cultivating."
 murim_season.0001.a: "Seize this moment for intensive cultivation"
 murim_season.0001.b: "Gather spring herbs for alchemy"
 murim_season.0001.c: "Host a spring gathering for fellow cultivators"

 murim_season.0002.t: "The Summer Crucible"
 murim_season.0002.desc: "An oppressive heatwave blankets the land. The sun beats down mercilessly, testing the endurance of even the strongest cultivators. But extreme heat can forge the body like a furnace — those who endure will emerge stronger. Those who don't may not emerge at all."
 murim_season.0002.a: "Train under the blazing sun — forge my body"
 murim_season.0002.b: "Seek cool mountain caves for meditation"
 murim_season.0002.c: "Rest and wait for the heat to break"

 murim_season.0003.t: "Autumn Harvest Festival"
 murim_season.0003.desc: "The annual Autumn Harvest Festival draws cultivators from across the land. Martial arts demonstrations, technique exchanges, and competitive bouts fill the festival grounds. It's a time of celebration, connection, and no small amount of rivalry between sects."
 murim_season.0003.a: "Demonstrate your techniques publicly"
 murim_season.0003.b: "Network and trade with other cultivators"
 murim_season.0003.c: "Observe others and gather intelligence"

 murim_season.0004.t: "Winter Seclusion"
 murim_season.0004.desc: "As snow blankets the mountains and the world grows still, many cultivators enter winter seclusion — months of isolated meditation and internal cultivation. The silence of winter offers perfect conditions for introspection and breakthrough."
 murim_season.0004.a: "Enter deep seclusion for months"
 murim_season.0004.b: "Train in the snow — sharpen body and mind"
 murim_season.0004.c: "Spend winter strengthening bonds with allies"

 murim_season.0005.t: "Celestial Alignment"
 murim_season.0005.desc: "The stars align in a configuration not seen in centuries. Ancient texts speak of this moment — when heaven and earth connect and qi flows freely between the mortal and celestial realms. This rare opportunity could catalyze extraordinary breakthroughs."
 murim_season.0005.a: "Cultivate under the celestial light"
 murim_season.0005.b: "Perform ancient rituals to channel the energy"
 murim_season.0005.c: "Gather cultivators for a communal ceremony"

 murim_season.0006.t: "The Earth Trembles"
 murim_season.0006.desc: "A powerful earthquake shakes the region. Buildings collapse, mountainsides crumble, and underground spirit veins shift. Amidst the destruction, villagers cry for help. But the disrupted earth also reveals hidden caves, buried treasures, and long-sealed spirit stone deposits."
 murim_season.0006.a: "Help the victims — rescue and rebuild"
 murim_season.0006.b: "Invest in recovery — it builds goodwill"
 murim_season.0006.c: "Explore the newly exposed underground"

 murim_season.0007.t: "The Spirit Beast"
 murim_season.0007.desc: "A legendary spirit beast has been sighted in the mountains — a creature of immense power whose very presence distorts the qi of the surrounding area. Ancient texts say that defeating such a creature grants extraordinary cultivation benefits. But many who've tried never returned."
 murim_season.0007.a: "Hunt the beast for its power"
 murim_season.0007.b: "Observe and learn from its qi patterns"
 murim_season.0007.c: "Capture it alive — sell to the highest bidder"

 murim_season.0008.t: "Ley Line Convergence"
 murim_season.0008.desc: "Deep beneath the earth, the ancient ley lines — channels of pure natural qi — have converged at a single point near your territory. The ground hums with power, plants grow at unnatural rates, and the air itself crackles with energy. This convergence could sustain cultivation for decades."
 murim_season.0008.a: "Claim the nexus for personal cultivation"
 murim_season.0008.b: "Share the nexus with your sect"
 murim_season.0008.c: "Sell access to the nexus for wealth"
