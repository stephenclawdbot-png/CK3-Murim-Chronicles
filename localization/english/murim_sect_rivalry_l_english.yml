l_english:
 murim_rivalry.0001.t: "The Border Dispute"
 murim_rivalry.0001.desc: "A neighboring sect has laid claim to the fertile valley between your territories — land that has sustained your sect's herb gardens for generations. Their disciples patrol the borders in force. Tensions are rising, and your own members demand action."
 murim_rivalry.0001.a: "Send warriors to secure the territory"
 murim_rivalry.0001.b: "Negotiate a shared arrangement"
 murim_rivalry.0001.c: "Quietly stake our claim through subterfuge"

 murim_rivalry.0002.t: "Alliance Proposal"
 murim_rivalry.0002.desc: "An envoy from a powerful neighboring sect arrives bearing gifts and a formal alliance proposal. They offer mutual defense, shared cultivation resources, and joint tournament participation. The terms seem favorable, but alliances in the jianghu always come with hidden expectations."
 murim_rivalry.0002.a: "Accept the alliance"
 murim_rivalry.0002.b: "Politely decline — we stand alone"
 murim_rivalry.0002.c: "Accept but prepare contingencies"

 murim_rivalry.0003.t: "The Spy Among Us"
 murim_rivalry.0003.desc: "Your intelligence network has uncovered a spy — one of your trusted inner disciples has been passing sect secrets to a rival for months. Technique manuals, cultivation methods, defensive positions — all compromised. The spy awaits your judgment."
 murim_rivalry.0003.a: "Execute them as a warning"
 murim_rivalry.0003.b: "Feed them false information instead"
 murim_rivalry.0003.c: "Exile them with mercy"

 murim_rivalry.0004.t: "Spirit Stone Mine"
 murim_rivalry.0004.desc: "Scouts have discovered a rich spirit stone mine in unclaimed territory. But your rival sect's scouts found it too — their flags already dot the ridge above. These spirit stones could fund years of cultivation advancement. Neither side will back down willingly."
 murim_rivalry.0004.a: "Seize the mine by force"
 murim_rivalry.0004.b: "Propose joint mining rights"
 murim_rivalry.0004.c: "Secretly mine at night while negotiating by day"

 murim_rivalry.0005.t: "Poaching Our Disciples"
 murim_rivalry.0005.desc: "Three of your most talented inner disciples have defected to a rival sect, lured by promises of better cultivation resources and techniques. The loss is humiliating — and the knowledge they carry with them is dangerous. More may follow."
 murim_rivalry.0005.a: "Demand their return — threaten war"
 murim_rivalry.0005.b: "Improve conditions to retain remaining disciples"
 murim_rivalry.0005.c: "Send a counter-agent to poach their best"

 murim_rivalry.0006.t: "The Honor Duel"
 murim_rivalry.0006.desc: "The leader of a rival sect has issued a formal challenge — a duel at the Martial Summit, before all the great sects. Your honor, your sect's reputation, and territorial rights are at stake. Refusing would be seen as weakness throughout the jianghu."
 murim_rivalry.0006.a: "Accept and fight with everything I have"
 murim_rivalry.0006.b: "Refuse — I won't dance to their tune"
 murim_rivalry.0006.c: "Accept but propose modified terms"

 murim_rivalry.0007.t: "The Great Sect Summit"
 murim_rivalry.0007.desc: "A crisis has prompted the convening of a Great Sect Summit — all major factions sending representatives. As a sect leader, your voice carries weight. The summit could reshape the balance of power in the entire jianghu. Every word matters."
 murim_rivalry.0007.a: "Take the lead — propose a united front"
 murim_rivalry.0007.b: "Use the chaos to expand your influence"
 murim_rivalry.0007.c: "Observe quietly and form secret alliances"

 murim_rivalry.0008.t: "Betrayal of the Alliance"
 murim_rivalry.0008.desc: "Your allied sect has turned against you. Without warning, they've joined your enemies, shared your secrets, and are now mobilizing against you. The alliance you trusted was a lie — carefully orchestrated to weaken you from within."
 murim_rivalry.0008.a: "Strike first — show them the cost of betrayal"
 murim_rivalry.0008.b: "Regroup and form new alliances"
 murim_rivalry.0008.c: "Expose their treachery to the jianghu"

 murim_rivalry.0009.t: "The Marriage Alliance"
 murim_rivalry.0009.desc: "To end generations of conflict, a neighboring sect proposes a marriage between their heir and a member of your clan. Such unions have united great houses throughout history. But they can also be traps — a way to plant influence deep within your sect."
 murim_rivalry.0009.a: "Accept — peace through unity"
 murim_rivalry.0009.b: "Reject — we don't need their blood"
 murim_rivalry.0009.c: "Accept but with political safeguards"

 murim_rivalry.0010.t: "The Grand Exhibition"
 murim_rivalry.0010.desc: "An annual martial arts exhibition brings all the sects together in a display of technique and power. This year, your sect's performance will be judged against your greatest rival's. Victory brings prestige and new recruitment, defeat brings shame."
 murim_rivalry.0010.a: "Go all-out — showcase our best techniques"
 murim_rivalry.0010.b: "Focus on artistry over raw power"
 murim_rivalry.0010.c: "Hold back our best — let them underestimate us"
