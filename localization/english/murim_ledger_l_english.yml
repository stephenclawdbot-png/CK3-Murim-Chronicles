 murim_ledger.0010.desc_rank10: "#10: [global_var:murim_rank_10_holder.GetName] -- Prowess [global_var:murim_rank_10_holder.GetProwess]"
 murim_ledger.0010.desc_summary: "Ranks 11-50 include a mix of clan elders, independent masters, wandering swordsmen, and rising young talents. The lower ranks shift frequently as new challengers emerge from tournaments and reputation-building duels."
 murim_ledger.0010.desc_your_rank: "Your current ranking: #[ROOT.Var('murim_ranking_position').GetValue|0]."
 murim_ledger.0010.desc_unranked: "You are currently unranked. Win ranked duels or perform impressively in tournaments to earn a position."
 murim_ledger.0010.a: "Challenge a ranked fighter"
 murim_ledger.0010.b: "Study a ranked fighter's style"
 murim_ledger.0010.c: "Back to main menu"
 murim_ledger.0020.t: "The Six Great Clans"
 murim_ledger.0020.desc_header: "The six pillars of the martial world. Their rivalries, alliances, and internal politics shape the fate of every martial artist alive."
 murim_ledger.0020.desc_mount_hua: "MOUNT HUA SECT -- The Righteous Sword\nSpecialty: Plum Blossom Swordsmanship"
 murim_ledger.0020.desc_shaolin: "SHAOLIN TEMPLE -- The Iron Fist of Buddhism\nSpecialty: 72 Arts of Shaolin, Buddhist Palm"
 murim_ledger.0020.desc_heavenly_demon: "HEAVENLY DEMON SECT -- The Dark Throne\nSpecialty: Heavenly Demon Divine Art, Soul-Reaping Techniques"
 murim_ledger.0020.desc_tang: "TANG CLAN -- The Poison Dynasty\nSpecialty: Hidden Weapons, Poison Arts, Alchemy"
 murim_ledger.0020.desc_wudang: "WUDANG SECT -- The Scholar's Blade\nSpecialty: Tai Chi Sword, Internal Energy Cultivation"
 murim_ledger.0020.desc_beggar: "BEGGAR SECT -- The People's Army\nSpecialty: Dog-Beating Staff, Dragon-Subduing Palm, Intelligence Network"
 murim_ledger.0020.a: "Request to join a clan"
 murim_ledger.0020.b: "View my clan's details"
 murim_ledger.0020.c: "Back to main menu"
 murim_ledger.0030.t: "My Martial Profile"
 murim_ledger.0030.desc_header: "Your personal record in the martial world."
 murim_ledger.0030.desc_cultivation: "Your cultivation continues to advance along the martial path. Progress steadily through diligent training and breakthrough attempts."
 murim_ledger.0030.desc_clan: "You serve your clan with dedication, building reputation through deeds and loyalty."
 murim_ledger.0030.desc_clanless: "Clan: None (Independent martial artist). You walk your own path. Some admire your independence. Others see you as prey."
 murim_ledger.0030.desc_ranking: "Your ranking position reflects your standing among the martial world's elite fighters."
 murim_ledger.0030.desc_fights: "Your fight record chronicles every duel, tournament, and battle that has shaped your martial journey."
 murim_ledger.0030.desc_techniques: "Your known techniques represent the culmination of years of study, practice, and hard-won insight."
 murim_ledger.0030.desc_relationships: "The bonds between master and disciple form the backbone of martial tradition."
 murim_ledger.0030.desc_injuries: "Scars and old wounds mark your body -- each one a lesson paid for in blood and pain."
 murim_ledger.0030.desc_foreign: "Your foreign origins set you apart, carrying the traditions of two worlds within your martial arts."
 murim_ledger.0030.a: "Train"
 murim_ledger.0030.b: "Challenge someone"
 murim_ledger.0030.c: "Back to main menu"
 murim_ledger.0040.t: "Recent Martial Events"
 murim_ledger.0040.desc_header: "The martial world never sleeps. Here are the most significant events of the last five years, as recorded by the wandering scribes."
 murim_ledger.0040.desc_event_1: "[global_var:murim_recent_event_1.GetDescription]"
 murim_ledger.0040.desc_event_2: "[global_var:murim_recent_event_2.GetDescription]"
 murim_ledger.0040.desc_event_3: "[global_var:murim_recent_event_3.GetDescription]"
 murim_ledger.0040.desc_event_4: "[global_var:murim_recent_event_4.GetDescription]"
 murim_ledger.0040.desc_event_5: "[global_var:murim_recent_event_5.GetDescription]"
 murim_ledger.0040.desc_no_events: "The scribes have not yet begun recording. As the martial world awakens, events will be chronicled here."
 murim_ledger.0040.a: "Investigate an event"
 murim_ledger.0040.b: "Back to main menu"
 murim_ledger.0050.t: "Tournament Schedule"
 murim_ledger.0050.desc_header: "The tournament circuit is the heartbeat of the martial world. Here you will find the schedule of upcoming events and your eligibility status."
 murim_ledger.0050.desc_youth: "YOUNG DRAGON TOURNAMENT (Ages 8-15)\nFormat: Single-elimination, non-lethal. Open to all martial youth -- clan-affiliated or independent. Clans use this as their primary scouting ground."
 murim_ledger.0050.desc_qualifier: "REGIONAL QUALIFIERS (Ages 16+)\nFormat: Round-robin groups, top performers advance. Winners earn the right to compete in the Grand Tournament."
 murim_ledger.0050.desc_grand: "GRAND TOURNAMENT (Ages 16+, Qualified)\nFormat: Bracket elimination, best of 3. The pinnacle of martial competition. Winners earn ranking jumps, clan prestige, and the attention of every master in the world."
 murim_ledger.0050.desc_champions: "CHAMPIONS BATTLE (Top 10 Ranked Only)\nFormat: Challenge-style exhibition matches. The rarest tournament. Only the 10 strongest martial artists alive are invited."
 murim_ledger.0050.desc_recruitment_note: "NOTE: After every tournament, clan scouts approach top performers who are not yet affiliated. Expect recruitment offers if you or your children perform well."
 murim_ledger.0050.a: "Begin training for next tournament"
 murim_ledger.0050.b: "Register for the next qualifier"
 murim_ledger.0050.c: "Register my child for the Young Dragon"
 murim_ledger.0050.d: "Back to main menu"
