 murim_top_10_martial_artist:0 "Top 10 Martial Artist"
 murim_top_10_martial_artist_desc:0 "One of the ten greatest martial artists in the known world. Their name is spoken with reverence and fear across every sect and school."
 murim_supreme_martial_artist:0 "Supreme Martial Artist"
 murim_supreme_martial_artist_desc:0 "The Number One. The Strongest Under Heaven. No living being can match their martial prowess."

