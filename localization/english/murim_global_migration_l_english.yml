l_english:

 # Event 0001 - Rumors of the Rankings
 murim_migration.0001.t: "Whispers of the Heavenly Rankings"
 murim_migration.0001.desc: "Travelers from the East speak of a legendary ranking — the Top 50 Martial Artists of the World. The strongest fighters across the land battle for position, their names echoing through the jianghu. As a warrior who has mastered the arts of [ROOT.Char.GetCulture.GetName], I wonder... could I claim a place among them?"
 murim_migration.0001.a: "I will journey east and prove my worth!"
 murim_migration.0001.b: "I must train more before I am ready."
 murim_migration.0001.c: "Foreign rankings mean nothing to me."

 # Event 0002 - Arrival in the Murim Heartland
 murim_migration.0002.t: "The Gates of the Martial World"
 murim_migration.0002.desc: "After months of travel, I have arrived in the heartland of the murim. The air itself feels different here — charged with qi. Martial artists openly display their skills in teahouses and on mountain paths. [scope_local_master.GetName], a local master, regards me with curiosity. An outsider with martial skill is rare in these parts."
 murim_migration.0002.a: "I challenge you! Let my fists speak for me!"
 murim_migration.0002.b: "I seek a sect to join. Will you guide me?"
 murim_migration.0002.c: "I will observe and learn before I act."
 murim_migration.0002.victory: "Victory! The local master acknowledges my strength."
 murim_migration.0002.defeat: "Defeated... but I have learned much."

 # Event 0003 - Seeking a Master After Defeat
 murim_migration.0003.t: "Lessons in Humility"
 murim_migration.0003.desc: "My defeat has taught me that raw strength alone is not enough. The martial artists of this land cultivate their qi in ways I never imagined. I must decide — do I abandon my old techniques and learn theirs, or find a way to blend both traditions into something new?"
 murim_migration.0003.a: "I will train under a local master and learn their ways."
 murim_migration.0003.b: "I will fuse my foreign arts with their techniques."
 murim_migration.0003.c: "This was a mistake. I return home."

 # Event 0004 - Seeking the Rankings
 murim_migration.0004.t: "Challenge for the Rankings"
 murim_migration.0004.desc: "Word of my skills has spread through the jianghu. [scope_ranked_fighter.GetName], a ranked fighter in the Top 50, has agreed to a formal challenge. If I win, I earn a place in the rankings — the first foreigner to do so. The stakes could not be higher."
 murim_migration.0004.a: "For glory! I challenge for your ranking!"
 murim_migration.0004.b: "I need more training before I challenge a ranker."
 murim_migration.0004.victory: "I have done it! A foreigner among the ranked!"
 murim_migration.0004.defeat: "Not strong enough... not yet."

 # Event 0005 - Foreign Master Joins a Sect
 murim_migration.0005.t: "Seeking a Place Among the Sects"
 murim_migration.0005.desc: "The great sects of the murim are legendary — each with centuries of accumulated martial wisdom. As a foreigner, joining one would be unprecedented. Some sects are more welcoming than others. The Beggar Sect accepts all, while the proud Mount Hua may reject an outsider."
 murim_migration.0005.a: "I seek the sword arts of Mount Hua Sect."
 murim_migration.0005.b: "I seek the discipline of Shaolin Temple."
 murim_migration.0005.c: "I seek the brotherhood of the Beggar Sect."
 murim_migration.0005.d: "I will forge my own path — no sect needed."

 # Event 0006 - Tournament Attracts Foreign Fighters
 murim_migration.0006.t: "A Foreign Challenger Approaches"
 murim_migration.0006.desc: "News of the tournament has traveled far. A foreign martial artist has arrived, bearing the fighting traditions of distant lands. [scope_foreign_challenger.GetName] stands at the arena gates, eager to test their skills against the best the murim has to offer."
 murim_migration.0006.a: "Welcome, warrior! Let us test our arts!"
 murim_migration.0006.b: "Impressive. Join my court instead."
 murim_migration.0006.c: "Outsiders are not welcome here."
 murim_migration.0006.victory: "My arts prevail over the foreigner's technique!"
 murim_migration.0006.defeat: "The foreigner's exotic arts proved superior..."

 # Event 0007 - Word Spreads to Distant Lands
 murim_migration.0007.t: "A Wandering Master at the Gates"
 murim_migration.0007.desc: "A mysterious traveler has arrived at court — a wandering martial master from distant lands. [scope_wandering_master.GetName] demonstrates extraordinary physical prowess, shattering stones with bare hands and moving with impossible speed. They speak of an entire hidden world of martial artists."
 murim_migration.0007.a: "Welcome! Serve as my martial advisor."
 murim_migration.0007.b: "Teach me these arts! I wish to learn."
 murim_migration.0007.c: "Fascinating, but I have a realm to rule."

 # Event 0008 - AI Foreign Master Auto-Migration
 murim_migration.0008.t: "The Call of the East"
 murim_migration.0008.desc: "The legends of the murim heartland call to me. The greatest martial artists in the world gather there — testing their skills, climbing the rankings, forging legacies. As a master of my own tradition, I feel the pull to journey east and prove myself."
 murim_migration.0008.a: "The time has come. I journey east."
 murim_migration.0008.b: "Not yet. I will train more here."

