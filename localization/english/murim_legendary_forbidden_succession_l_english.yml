 # =============================================
 # LEGENDARY DUELS, FORBIDDEN ARTS, SUCCESSION CRISIS
 # Heartbeat #50 - Final Build Phase Localization
 # =============================================

 # =============================================
 # LEGENDARY DUEL EVENTS
 # =============================================

 # --- Event 1: Challenge of the Heavenly Sword ---
 murim_legendary_duel.0001.t:0 "Challenge of the Heavenly Sword"
 murim_legendary_duel.0001.desc:0 "A figure appears at the gates of your domain, qi radiating like a storm. They are [legendary_challenger.GetName], ranked among the top twenty martial artists in the world. Their eyes burn with ambition as they issue a formal challenge - a battle to determine who stands higher in the martial hierarchy. The entire jianghu watches. To refuse is to lose everything. To accept is to risk your life."
 murim_legendary_duel.0001.a:0 "I accept! Let the heavens witness our battle!"
 murim_legendary_duel.0001.a.success:0 "Your sword sings through the air and your opponent falls. Victory is yours."
 murim_legendary_duel.0001.a.success.toast:0 "Legendary Victory!"
 murim_legendary_duel.0001.a.failure:0 "Their technique was beyond what you expected. You fall to your knees, defeated."
 murim_legendary_duel.0001.a.failure.toast:0 "Legendary Defeat..."
 murim_legendary_duel.0001.b:0 "I propose we stake our most prized artifacts on this battle."
 murim_legendary_duel.0001.b.tt:0 "The duel will be delayed while artifact stakes are arranged. Both fighters wager their most powerful martial treasures."
 murim_legendary_duel.0001.c:0 "I... I am not ready for this challenge. [craven]"
 
 # --- Event 2: Artifact-Staked Showdown ---
 murim_legendary_duel.0002.t:0 "Artifact-Staked Showdown"
 murim_legendary_duel.0002.desc:0 "The arena has been prepared. Both you and [legendary_challenger.GetName] have placed your most powerful martial artifacts on the line. Rare weapons, ancient scrolls, spirit-forged armaments - the winner takes all. Thousands have gathered to witness this historic clash. There is no turning back now."
 murim_legendary_duel.0002.a:0 "Fight with everything I have - full power unleashed!"
 murim_legendary_duel.0002.a.success:0 "Your opponent's weapon shatters as your final strike connects. Their artifacts are yours."
 murim_legendary_duel.0002.a.success.toast:0 "Artifacts Won!"
 murim_legendary_duel.0002.a.failure:0 "You stumble, blood dripping from your wounds. Your precious artifacts change hands."
 murim_legendary_duel.0002.a.failure.toast:0 "Artifacts Lost..."
 murim_legendary_duel.0002.b:0 "Unleash my forbidden technique - victory at any cost!"
 murim_legendary_duel.0002.c:0 "Withdraw before the fight begins. Forfeit the stakes."

 # --- Event 3: Battle at the Summit of Heaven ---
 murim_legendary_duel.0003.t:0 "Battle at the Summit of Heaven"
 murim_legendary_duel.0003.desc:0 "Atop the highest peak of the martial world, where heaven meets earth, two titans prepare to clash. You and [summit_rival.GetName] - the two strongest martial artists alive - face each other as wind howls around the summit. This is a once-in-a-generation battle that will determine who truly deserves the title 'Strongest Under Heaven.' The clouds part as your qi flares."
 murim_legendary_duel.0003.a:0 "This battle will echo through eternity. Let us begin!"
 murim_legendary_duel.0003.a.victory:0 "Heaven itself seems to bow as your final technique overwhelms your rival."
 murim_legendary_duel.0003.a.victory.toast:0 "Strongest Under Heaven!"
 murim_legendary_duel.0003.a.defeat:0 "Your rival's palm strikes your chest. The sky spins as you collapse."
 murim_legendary_duel.0003.a.defeat.toast:0 "Defeated at the Summit..."
 murim_legendary_duel.0003.b:0 "Why must we destroy each other? Let us cultivate together instead."
 murim_legendary_duel.0003.b.tt:0 "Instead of battle, you propose mutual cultivation at the summit. Both warriors may achieve a breakthrough through sharing insights."
 murim_legendary_duel.0003.c:0 "I am not yet at my peak. I must train more before this battle."

 # --- Event 4: Ghost of the Fallen Master ---
 murim_legendary_duel.0004.t:0 "Ghost of the Fallen Master"
 murim_legendary_duel.0004.desc:0 "A young martial artist blocks your path, eyes burning with hatred and grief. They are [vengeance_disciple.GetName], the last disciple of a master you once defeated - or killed. They have trained for years in seclusion, honing their skills for this single moment of vengeance. Their qi pulses with barely contained rage. 'You took everything from me,' they whisper. 'Today, I take it back.'"
 murim_legendary_duel.0004.a:0 "I will face your vengeance with honor. Come."
 murim_legendary_duel.0004.a.victory:0 "The disciple falls, their vengeance unfulfilled."
 murim_legendary_duel.0004.a.victory.toast:0 "Vengeance Thwarted"
 murim_legendary_duel.0004.a.defeat:0 "The disciple's blade finds its mark. Their master is avenged."
 murim_legendary_duel.0004.a.defeat.toast:0 "Vengeance Fulfilled..."
 murim_legendary_duel.0004.b:0 "Wait - let me explain what truly happened that day."
 murim_legendary_duel.0004.b.tt:0 "You attempt to reason with the grieving disciple. The truth may calm their rage... or inflame it further."
 murim_legendary_duel.0004.c:0 "Eliminate this threat before it grows stronger. [sadistic]"

 # --- Event 5: The Unranked Prodigy ---
 murim_legendary_duel.0005.t:0 "The Unranked Prodigy"
 murim_legendary_duel.0005.desc:0 "An unknown young martial artist has appeared from nowhere. No sect affiliation. No ranking. No known master. Yet their qi pressure is suffocating - it rivals your own. They stand before you with quiet confidence and issue a simple challenge: 'Fight me.' The jianghu buzzes with excitement. Who is this mysterious prodigy?"
 murim_legendary_duel.0005.a:0 "Very well, prodigy. Show me what you can do."
 murim_legendary_duel.0005.a.victory:0 "The prodigy is talented, but experience prevails. You stand victorious."
 murim_legendary_duel.0005.a.victory.toast:0 "Prodigy Defeated"
 murim_legendary_duel.0005.a.defeat:0 "Impossible... this unknown fighter has surpassed you."
 murim_legendary_duel.0005.a.defeat.toast:0 "Defeated by Unknown Prodigy!"
 murim_legendary_duel.0005.b:0 "Before we fight, tell me - who trained you?"
 murim_legendary_duel.0005.b.tt:0 "You engage the prodigy in conversation first. Their background may reveal whether they are a genuine talent, a hidden sect weapon, or an assassin in disguise."
 murim_legendary_duel.0005.c:0 "Send the sect disciples to handle this upstart."

 # =============================================
 # FORBIDDEN ARTS EVENTS
 # =============================================

 # --- Event 1: Demonic Qi Awakening ---
 murim_forbidden_arts.0001.t:0 "Demonic Qi Awakening"
 murim_forbidden_arts.0001.desc:0 "In your darkest moment - broken, wounded, desperate - something ancient stirs within your dantian. A wellspring of power so vast it makes your current cultivation seem like a candle before the sun. But this power is wrong. It pulses with malice, hunger, and corruption. The demonic qi has awakened, offering unlimited power in exchange for your humanity."
 murim_forbidden_arts.0001.a:0 "I embrace this power! Let the dark qi flow through me!"
 murim_forbidden_arts.0001.b:0 "I will take only a portion - enough to survive, no more."
 murim_forbidden_arts.0001.c:0 "No! I will purge this corruption no matter the cost!"

 # --- Event 2: Blood Refining Ritual ---
 murim_forbidden_arts.0002.t:0 "Blood Refining Ritual"
 murim_forbidden_arts.0002.desc:0 "An ancient scroll describes the Blood Refining Ritual - a technique that uses the vital essence of others to forcibly advance one's cultivation. The altar is prepared, the formations are drawn in crimson. The ritual promises a guaranteed cultivation breakthrough... but the price is measured in human lives."
 murim_forbidden_arts.0002.a:0 "Begin the ritual. Use the captured enemies as fuel."
 murim_forbidden_arts.0002.b:0 "Modify the ritual to use only my own blood."
 murim_forbidden_arts.0002.c:0 "Destroy this vile knowledge. No one should have this power."

 # --- Event 3: Soul Devouring Technique ---
 murim_forbidden_arts.0003.t:0 "Soul Devouring Technique"
 murim_forbidden_arts.0003.desc:0 "Your prisoner, [soul_devour_victim.GetName], kneels before you in chains. A powerful martial artist, their cultivation base represents decades of accumulated power. The Soul Devouring Technique whispers to you - a forbidden art that can strip the martial prowess from another's very soul and add it to your own. Their eyes widen in terror as dark qi coils around your fingers."
 murim_forbidden_arts.0003.a:0 "Devour their martial soul completely. Their power becomes mine."
 murim_forbidden_arts.0003.b:0 "Take only a portion. Leave them alive... but broken."
 murim_forbidden_arts.0003.c:0 "Release them. I will not become this monster."

 # --- Event 4: Heavenly Demon Transformation ---
 murim_forbidden_arts.0004.t:0 "Heavenly Demon Transformation"
 murim_forbidden_arts.0004.desc:0 "You stand at the precipice of the ultimate forbidden technique. The Heavenly Demon Transformation - a ritual that has been attempted perhaps a dozen times in all of martial history. Those who succeed become beings of godlike power, transcending mortal limits entirely. Those who fail are destroyed body and soul, erased from existence itself. Your demonic cultivation has reached the threshold. The choice is yours."
 murim_forbidden_arts.0004.a:0 "I will become the Heavenly Demon! Transform!"
 murim_forbidden_arts.0004.a.tt:0 "Attempt the ultimate forbidden transformation. Success means godlike power. Failure means annihilation."
 murim_forbidden_arts.0004.b:0 "First, I must find the Ancient Demon Seal to control the transformation."
 murim_forbidden_arts.0004.b.tt:0 "Delay the transformation and search for an artifact that can stabilize the process."
 murim_forbidden_arts.0004.c:0 "No. I reject this path. I choose to be human."

 # --- Event 5: Yin-Yang Inversion Calamity ---
 murim_forbidden_arts.0005.t:0 "Yin-Yang Inversion Calamity"
 murim_forbidden_arts.0005.desc:0 "Your body convulses as the orthodox and demonic energies within your meridians suddenly clash. Fire and ice, light and dark, yin and yang - all colliding in a devastating internal war. Your skin alternates between deathly pale and burning crimson. Blood seeps from your pores. If you cannot resolve this contradiction, your body will tear itself apart from within."
 murim_forbidden_arts.0005.a:0 "Force balance through sheer willpower! I will harmonize yin and yang!"
 murim_forbidden_arts.0005.a.tt:0 "Attempt to balance both energies through meditation and willpower alone. High risk, highest reward."
 murim_forbidden_arts.0005.b:0 "My beloved... I need your help. Dual cultivation can stabilize me."
 murim_forbidden_arts.0005.c:0 "Seal everything. Become mortal. End this suffering forever."

 # =============================================
 # SUCCESSION CRISIS EVENTS
 # =============================================

 # --- Event 1: The Sect Master Falls ---
 murim_succession.0001.t:0 "The Sect Master Falls"
 murim_succession.0001.desc:0 "The sect master is dead. The news sends shockwaves through every hall and training ground. Without clear succession, the sect threatens to tear itself apart. Multiple factions have already begun positioning themselves. [succession_rival.GetName] stands as your primary rival for the leadership seat. The elders watch silently, waiting to see who will seize control."
 murim_succession.0001.a:0 "I claim leadership through martial might! Challenge the rival!"
 murim_succession.0001.a.victory:0 "Your sword speaks louder than any debate. The sect is yours to lead."
 murim_succession.0001.a.victory.toast:0 "New Sect Master!"
 murim_succession.0001.a.defeat:0 "Your rival's technique proves superior. The leadership slips from your grasp."
 murim_succession.0001.a.defeat.toast:0 "Succession Lost..."
 murim_succession.0001.b:0 "Rally the elder council. Diplomacy, not bloodshed."
 murim_succession.0001.b.tt:0 "Attempt to win the elders' support through political maneuvering rather than combat."
 murim_succession.0001.c:0 "This sect has nothing left for me. I forge my own path."

 # --- Event 2: Elder Council Betrayal ---
 murim_succession.0002.t:0 "Elder Council Betrayal"
 murim_succession.0002.desc:0 "Reports reach you in the dead of night - [traitor_elder.GetName], one of your most trusted elders, has been conspiring against you. Secret meetings with rival sects. Poison acquisition. Assassination plots. The betrayal cuts deep - this elder once swore loyalty before the entire sect. Now they seek to take everything from you."
 murim_succession.0002.a:0 "Confront the traitor directly! Let my fists deliver justice!"
 murim_succession.0002.a.victory:0 "The traitor's schemes crumble before your overwhelming martial power."
 murim_succession.0002.a.victory.toast:0 "Rebellion Crushed!"
 murim_succession.0002.a.defeat:0 "The traitor was prepared. Their hidden allies emerge as you fall."
 murim_succession.0002.a.defeat.toast:0 "Deposed by Traitor..."
 murim_succession.0002.b:0 "Expose the conspiracy to the entire sect publicly."
 murim_succession.0002.b.tt:0 "Present evidence of the betrayal before all sect members. If the evidence is convincing, the traitor will be expelled. If not..."
 murim_succession.0002.c:0 "Perhaps we can reach an... arrangement. Share power."
 murim_succession.0002.c.tt:0 "Offer the traitor a co-leadership position. This may buy time, but creates long-term instability."

 # --- Event 3: The Disciple's Challenge ---
 murim_succession.0003.t:0 "The Disciple's Challenge"
 murim_succession.0003.desc:0 "Your most talented senior disciple, [challenging_disciple.GetName], kneels before you with ceremonial respect, then rises with fire in their eyes. 'Master, I have reached my limit under your shadow. I formally challenge you for the position of Sect Master.' The words echo through the great hall. By ancient sect law, a formal challenge must be answered."
 murim_succession.0003.a:0 "I accept your challenge with honor, disciple."
 murim_succession.0003.a.victory:0 "Your disciple fights valiantly but cannot yet overcome their master."
 murim_succession.0003.a.victory.toast:0 "Leadership Defended"
 murim_succession.0003.a.defeat:0 "Your disciple has surpassed you. The student becomes the master."
 murim_succession.0003.a.defeat.toast:0 "Surpassed by Disciple..."
 murim_succession.0003.b:0 "You must pass my three trials first. Only then may we fight."
 murim_succession.0003.b.tt:0 "Set a series of impossible trials for the challenger. They may grow stronger... or be destroyed in the attempt."
 murim_succession.0003.c:0 "You have earned this. The sect is yours, my student."

 # --- Event 4: Inheritance of the Secret Manual ---
 murim_succession.0004.t:0 "Inheritance of the Secret Manual"
 murim_succession.0004.desc:0 "Hidden within a secret chamber beneath the sect's ancestral hall, you discover it - the previous sect master's personal cultivation manual. Pages filled with techniques never taught to any disciple, insights that could elevate the entire sect's martial power by a generation. But as you read deeper, you realize some techniques cross into forbidden territory."
 murim_succession.0004.a:0 "Study the manual myself. This power will secure my leadership."
 murim_succession.0004.b:0 "Share the manual with the entire sect. We rise together."
 murim_succession.0004.c:0 "Destroy it. These forbidden techniques must never be practiced."

 # --- Event 5: The Founding of a New Sect ---
 murim_succession.0005.t:0 "The Founding of a New Sect"
 murim_succession.0005.desc:0 "You stand alone on a mountain peak, surveying a vast valley below. No sect claims this land. No master commands your loyalty. Your cultivation is strong, your reputation forged in countless battles. The thought crystallizes: why follow another's path when you can forge your own? Here, in this unclaimed territory, you could build something new - a sect that follows your martial philosophy."
 murim_succession.0005.a:0 "Found an orthodox sect devoted to righteous martial arts."
 murim_succession.0005.b:0 "Found an unorthodox sect that walks its own path."
 murim_succession.0005.c:0 "Found a hidden sect deep in the mountains, away from worldly conflict."
 murim_succession.0005.d:0 "The martial world has enough sects. I walk alone."

