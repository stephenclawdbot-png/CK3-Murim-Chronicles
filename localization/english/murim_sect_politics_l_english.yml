l_english:
 murim_sect_politics.0001.t: "The Promotion Trial"
 murim_sect_politics.0001.desc: "The sect elders have announced the next round of promotion trials. As an outer disciple who has served faithfully, you are eligible to test for inner disciple rank. The trial hall awaits -- stone pillars carved with the names of those who passed before you."
 murim_sect_politics.0001.a: "Take the formal combat trial"
 murim_sect_politics.0001.b: "Ask a senior to vouch for me"
 murim_sect_politics.0001.c: "Decline -- I am not yet ready"
 murim_sect_politics.0001.d: "Challenge the strongest inner disciple"
 murim_sect_politics.0002.t: "Elder Nomination"
 murim_sect_politics.0002.desc: "Your years of service and martial prowess have not gone unnoticed. The council of elders has nominated you for elevation to elder rank -- a position of authority, wisdom, and responsibility within the sect. The decision now lies before you."
 murim_sect_politics.0002.a: "Accept the nomination graciously"
 murim_sect_politics.0002.b: "Decline -- my duty as disciple matters more"
 murim_sect_politics.0002.c: "Demand immediate promotion"
 murim_sect_politics.0003.t: "The Vice Leader's Seat"
 murim_sect_politics.0003.desc: "The position of vice leader stands vacant. This is the second most powerful seat in the sect -- the one who speaks with the leader's authority and stands as heir to the sect's future. Ambitious eyes turn toward the empty chair."
 murim_sect_politics.0003.a: "Challenge for the position in combat"
 murim_sect_politics.0003.b: "Build alliances among the elders"
 murim_sect_politics.0003.c: "Call for a sect-wide vote"
 murim_sect_politics.0003.d: "Eliminate the rival candidate"
 murim_sect_politics.0004.t: "Succession Crisis"
 murim_sect_politics.0004.desc: "The sect leader is gone. Whether by death, retirement, or disappearance, the highest seat stands empty. The sect teeters on the edge of fracture as factions form behind rival candidates. What happens next will define the sect for a generation."
 murim_sect_politics.0004.a: "Claim leadership as vice leader"
 murim_sect_politics.0004.b: "Enter the contest as an elder"
 murim_sect_politics.0004.c: "Support another candidate"
 murim_sect_politics.0004.d: "Seize power by force"
 murim_sect_politics.0005.t: "Peaceful Succession"
 murim_sect_politics.0005.desc: "The sect stands united behind you. In a rare moment of harmony, the elders, disciples, and servants all bow in acknowledgment. The mantle of leadership passes to you without bloodshed -- a testament to your character and the sect's strength."
 murim_sect_politics.0005.a: "Accept the mantle with honor"
 murim_sect_politics.0005.b: "Refuse -- I am not worthy"
 murim_sect_politics.0006.t: "Contested Succession"
 murim_sect_politics.0006.desc: "Two or more candidates refuse to yield. The succession has become a contest of strength, politics, and will. The sect's training grounds are cleared for what may be a formal duel, a political campaign, or something far worse -- a schism."
 murim_sect_politics.0006.a: "Settle it with a duel for leadership"
 murim_sect_politics.0006.b: "Build a political coalition"
 murim_sect_politics.0006.c: "Let the sect split if it must"
 murim_sect_politics.0006.d: "Step aside and play kingmaker"
 murim_sect_politics.0007.t: "Coup Attempt"
 murim_sect_politics.0007.desc: "Under cover of night, an ambitious faction within the sect makes its move. Armed disciples loyal to the usurper block the training hall gates. The clash of steel echoes through corridors that have known only peace for decades. The sect's fate hangs on a knife's edge."
 murim_sect_politics.0007.a: "Support the coup"
 murim_sect_politics.0007.b: "Defend the current order"
 murim_sect_politics.0007.c: "Stay neutral -- wait and see"
 murim_sect_politics.0007.d: "Flee during the chaos"
 murim_sect_politics.0008.t: "Golden Age of the Sect"
 murim_sect_politics.0008.desc: "Under your leadership, the sect flourishes. Disciples train with renewed vigor, harvests are plentiful, and the sect's reputation draws talent from across the martial world. This is a golden age -- a time to invest in the future."
 murim_sect_politics.0008.a: "Invest in training for all members"
 murim_sect_politics.0008.b: "Recruit aggressively -- expand the sect"
 murim_sect_politics.0008.c: "Build diplomatic prestige"
 murim_sect_politics.0009.t: "Discord Within the Sect"
 murim_sect_politics.0009.desc: "Cracks form in the sect's unity. Disciples whisper grievances. Elders argue behind closed doors. Factions crystallize around petty disputes that mask deeper resentments. If left unchecked, this discord will tear the sect apart."
 murim_sect_politics.0009.a: "Call emergency council to address it"
 murim_sect_politics.0009.b: "Purge the dissidents -- iron fist"
 murim_sect_politics.0009.c: "Let it burn -- focus on myself"
 murim_sect_politics.0009.d: "Resign leadership to restore harmony"
 murim_sect_politics.0010.t: "Temptation of Betrayal"
 murim_sect_politics.0010.desc: "The thought creeps in unbidden -- what if you left? Took the sect's secrets with you? A rival sect has made overtures, and the grass looks greener beyond the walls that raised you. The moment of doubt crystallizes into a choice."
 murim_sect_politics.0010.a: "Steal secret techniques and leave"
 murim_sect_politics.0010.b: "Sabotage from within as a spy"
 murim_sect_politics.0010.c: "Defect openly -- an honest departure"
 murim_sect_politics.0010.d: "The doubt passes. I remain loyal."
 murim_sect_politics.0011.t: "Betrayal Discovered"
 murim_sect_politics.0011.desc: "A traitor has been unmasked. The evidence is undeniable -- stolen scrolls, secret correspondence with rival sects, missing technique manuals. The sect demands justice, and as a leader, you must decide the traitor's fate."
 murim_sect_politics.0011.a: "Hunt the traitor -- send assassins"
 murim_sect_politics.0011.b: "Formal banishment from the sect"
 murim_sect_politics.0011.c: "Forgive them if they return"
 murim_sect_politics.0011.d: "Declare vendetta on all who aided them"
 murim_sect_politics.0012.t: "A Mole Among Us"
 murim_sect_politics.0012.desc: "Something is wrong. Information leaks to rival sects before decisions are even announced. A double agent operates within your ranks -- but who? Suspicion poisons every interaction, and trust becomes a luxury you cannot afford."
 murim_sect_politics.0012.a: "Investigate quietly -- find the mole"
 murim_sect_politics.0012.b: "Set a trap with false information"
 murim_sect_politics.0012.c: "Ignore the signs -- paranoia is worse"
 murim_sect_politics.0012.d: "Purge everyone suspicious"
 murim_sect_politics.0013.t: "The Heavenly Demon's Invitation"
 murim_sect_politics.0013.desc: "A message arrives bearing the seal of the Heavenly Demon Sect. Not a threat -- an invitation. They offer power, freedom from the rigid codes of the righteous path, and a place among those who embrace strength without hypocrisy. The dark path beckons."
 murim_sect_politics.0013.a: "Embrace the dark path -- defect"
 murim_sect_politics.0013.b: "Refuse the temptation"
 murim_sect_politics.0013.c: "Pretend to defect -- spy for my sect"
 murim_sect_politics.0013.d: "Report the approach to my sect leader"
 murim_sect_politics.0014.t: "The Returning Traitor"
 murim_sect_politics.0014.desc: "A figure kneels at the sect gates, head bowed, hands empty. It is a former member -- one who betrayed the sect years ago. They have returned, weathered by exile and hardship, begging for a second chance. The disciples watch, waiting for your judgment."
 murim_sect_politics.0014.a: "Accept them back -- redemption is possible"
 murim_sect_politics.0014.b: "Reject them -- traitors stay exiled"
 murim_sect_politics.0014.c: "Accept on probation -- they must prove it"
 murim_sect_politics.0014.d: "Execute them as a warning"
