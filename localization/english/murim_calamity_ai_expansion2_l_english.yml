l_english:
 murim_calamity_ai_exp2.0001.t: "Temptation of Betrayal"
 murim_calamity_ai_exp2.0001.desc: "The Calamity strips away pretense. Your ally fights beside you, but their resources — their gold, their disciples, their territory — could mean the difference between your survival and your extinction. The thought is poison, but in desperate times, poison can be medicine."
 murim_calamity_ai_exp2.0001.a: "Betray your ally and seize their resources."
 murim_calamity_ai_exp2.0001.b: "Stand by your ally through the storm."
 murim_calamity_ai_exp2.0001.c: "Abandon the alliance and go it alone."
 murim_calamity_ai_exp2.0002.t: "The Betrayer's Reckoning"
 murim_calamity_ai_exp2.0002.desc: "Your treachery during the Calamity has not been forgotten. The one you betrayed — or their avenger — has found you. Vengeance burns in their eyes with a fury that rivals the Calamity itself. The reckoning has come."
 murim_calamity_ai_exp2.0002.a: "Face the avenger in combat."
 murim_calamity_ai_exp2.0002.b: "Buy forgiveness with gold and contrition."
 murim_calamity_ai_exp2.0002.c: "Flee before they can reach you."
 murim_calamity_ai_exp2.0003.t: "The Last Stand"
 murim_calamity_ai_exp2.0003.desc: "The Calamity has driven you to the edge of a cliff — literally and figuratively. Behind you, nothing. Before you, an army of chaos. Your qi surges with the desperate clarity of one who has nothing left to lose. If this is the end, let it be remembered."
 murim_calamity_ai_exp2.0003.a: "Make a legendary last stand."
 murim_calamity_ai_exp2.0003.b: "Execute a tactical retreat."
 murim_calamity_ai_exp2.0003.c: "Switch to guerrilla warfare tactics."
 murim_calamity_ai_exp2.0004.t: "Guerrilla in the Ruins"
 murim_calamity_ai_exp2.0004.desc: "You have become a shadow in the ruins, striking from the wreckage and vanishing before retaliation can find you. The guerrilla path is lonely and brutal, but it keeps you alive. Now a critical opportunity presents itself — risk everything, or maintain your hidden war."
 murim_calamity_ai_exp2.0004.a: "Strike hard at a critical target."
 murim_calamity_ai_exp2.0004.b: "Stay hidden — the risk is too great."
 murim_calamity_ai_exp2.0004.c: "Rally other guerrilla fighters into a network."
 murim_calamity_ai_exp2.0005.t: "Alliance with the Unthinkable"
 murim_calamity_ai_exp2.0005.desc: "The Calamity makes strange bedfellows. Your bitterest rival — the one whose name you swore to carve from the martial world — now stands as the only ally who could help you survive. Pride or pragmatism? The choice may determine whether either of you sees tomorrow."
 murim_calamity_ai_exp2.0005.a: "Forge an impossible alliance with your rival."
 murim_calamity_ai_exp2.0005.b: "Survive alone. Trust no one."
 murim_calamity_ai_exp2.0005.c: "Build an underground survivor network."
 murim_calamity_ai_exp2.0006.t: "Mourning Amid the Storm"
 murim_calamity_ai_exp2.0006.desc: "A friend has fallen. Not to the Calamity's impersonal destruction, but to violence — cut down by another martial artist in the chaos. Their face haunts your meditation. In a world that demands you keep moving, grief is a luxury that may cost your life."
 murim_calamity_ai_exp2.0006.a: "Swear a vengeance oath over their body."
 murim_calamity_ai_exp2.0006.b: "Honor their memory with prayer and reflection."
 murim_calamity_ai_exp2.0006.c: "Bury your grief. Become cold to survive."
 murim_calamity_ai_exp2.0007.t: "Rebuilding from the Ashes"
 murim_calamity_ai_exp2.0007.desc: "The Calamity has passed, leaving a world of rubble and weeping. But you survived, and so did others. The question now is not survival but governance — who will lead what remains? The old order is gone. The new one is yours to shape, if you have the will."
 murim_calamity_ai_exp2.0007.a: "Form a council of survivors to rebuild together."
 murim_calamity_ai_exp2.0007.b: "Seize control by martial force."
 murim_calamity_ai_exp2.0007.c: "Retreat to seclusion. Let others rebuild."
 murim_calamity_ai_exp2.0008.t: "The New Alliance"
 murim_calamity_ai_exp2.0008.desc: "The rebuild council has convened. Survivors from shattered clans, lone wanderers, and broken sect remnants all look to you for direction. The decisions made in this hall will determine the shape of the martial world for generations to come."
 murim_calamity_ai_exp2.0008.a: "Forge a new Murim Alliance from the survivors."
 murim_calamity_ai_exp2.0008.b: "Let the clans compete — strength decides."
 murim_calamity_ai_exp2.0008.c: "Pursue isolationism — each clan for itself."
 murim_calamity_ai_exp2.0009.t: "Recording the Calamity"
 murim_calamity_ai_exp2.0009.desc: "The memories are fading. Already, young martial artists speak of the Calamity as though it were ancient history rather than lived experience. If someone does not record what happened — truly, accurately, without embellishment — the truth will be lost to myth."
 murim_calamity_ai_exp2.0009.a: "Write a meticulous historical record."
 murim_calamity_ai_exp2.0009.b: "Craft it into grand mythology and legend."
 murim_calamity_ai_exp2.0009.c: "Let it be forgotten. Move on."
 murim_calamity_ai_exp2.0010.t: "The Sage of the Calamity"
 murim_calamity_ai_exp2.0010.desc: "You have grown old — impossibly, miraculously old for a survivor of the Calamity. Young martial artists make pilgrimages to hear you speak. Your words carry the weight of a lost era. The time has come to decide what final shape your legacy will take."
 murim_calamity_ai_exp2.0010.a: "Become a venerated sage of the martial world."
 murim_calamity_ai_exp2.0010.b: "Declare a new era and name yourself its founder."
 murim_calamity_ai_exp2.0010.c: "Pass the torch to your most worthy child."
