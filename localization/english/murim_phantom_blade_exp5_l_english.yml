l_english:
 murim_phantom_blade_exp5.0001.t: "The Blood Contract"
 murim_phantom_blade_exp5.0001.desc: "A blood-stained scroll is placed before you, the sect's crimson seal still wet. To sign is to become an elite assassin of the Phantom Blade — bound by blood oath to kill whoever the sect commands. The rewards are immense, but so is the cost to your soul."
 murim_phantom_blade_exp5.0001.a: "Sign the Blood Contract in my own blood."
 murim_phantom_blade_exp5.0001.b: "Refuse and face the consequences."
 murim_phantom_blade_exp5.0001.c: "Negotiate modified terms."
 murim_phantom_blade_exp5.0001.d: "Challenge the contract giver for leadership."
 murim_phantom_blade_exp5.0001.d.success: "Your blade sings true. The grandmaster falls."
 murim_phantom_blade_exp5.0001.d.failure: "The grandmaster's skill far exceeds yours. You fall."
 murim_phantom_blade_exp5.0002.t: "First Assassination Target"
 murim_phantom_blade_exp5.0002.desc: "Your first contract arrives. A name, a location, and a deadline. The target is a ruler of some renown — well-guarded, vigilant, surrounded by loyal retainers. How you approach the kill will define what kind of assassin you become."
 murim_phantom_blade_exp5.0002.a: "Strike from the shadows. Stealth kill."
 murim_phantom_blade_exp5.0002.a.success: "The target never sees the blade that ends them."
 murim_phantom_blade_exp5.0002.a.failure: "The guards spot you. The assassination fails."
 murim_phantom_blade_exp5.0002.b: "Use poison. A subtle, untraceable death."
 murim_phantom_blade_exp5.0002.c: "Challenge them openly. An honorable kill."
 murim_phantom_blade_exp5.0002.c.success: "Your blade proves swifter in honest combat."
 murim_phantom_blade_exp5.0002.c.failure: "The target fights harder than expected. You fall."
 murim_phantom_blade_exp5.0002.d: "Refuse the contract entirely."
 murim_phantom_blade_exp5.0003.t: "Hunted by the Orthodox"
 murim_phantom_blade_exp5.0003.desc: "Your refusal of the Blood Contract has left you vulnerable. Without the sect's protection, orthodox hunters have caught your scent. A warrior from the righteous sects bars your path, sword drawn, demanding you answer for the Phantom Blade's crimes."
 murim_phantom_blade_exp5.0003.a: "Stand and fight the hunter."
 murim_phantom_blade_exp5.0003.a.success: "Your blade work proves superior. The hunter falls."
 murim_phantom_blade_exp5.0003.a.failure: "The hunter's righteousness fuels their strength. You are defeated."
 murim_phantom_blade_exp5.0003.b: "Flee into hiding."
 murim_phantom_blade_exp5.0003.c: "Betray the Phantom Blade to save myself."
 murim_phantom_blade_exp5.0003.d: "Negotiate a truce."
 murim_phantom_blade_exp5.0004.t: "Blade Inheritance Ritual"
 murim_phantom_blade_exp5.0004.desc: "In a hidden chamber beneath the sect headquarters, the Legacy Blade rests upon a black altar. Forged from shadow iron and quenched in the blood of a hundred masters, it has passed through generations of Phantom Blade grandmasters. Now it awaits your hand."
 murim_phantom_blade_exp5.0004.a: "Accept the Legacy Blade."
 murim_phantom_blade_exp5.0004.b: "Forge my own blade instead."
 murim_phantom_blade_exp5.0004.c: "Destroy the Legacy Blade to end the cycle."
 murim_phantom_blade_exp5.0005.t: "Shadow War Begins"
 murim_phantom_blade_exp5.0005.desc: "The orthodox sects have united under Heaven's Sword banner, and war is inevitable. Mount Hua's disciples sharpen their blades while Shaolin chants echo through the valleys. The Phantom Blade must decide how to meet this existential threat — with shadow, with alliance, or with a single decisive strike."
 murim_phantom_blade_exp5.0005.a: "Launch a shadow offensive."
 murim_phantom_blade_exp5.0005.b: "Defend — protect the clan first."
 murim_phantom_blade_exp5.0005.c: "Seek alliance with other unorthodox clans."
 murim_phantom_blade_exp5.0005.d: "Assassinate the orthodox leader before war starts."
 murim_phantom_blade_exp5.0005.d.success: "The orthodox leader falls before war is declared."
 murim_phantom_blade_exp5.0005.d.failure: "The assassination fails. Now war is certain."
 murim_phantom_blade_exp5.0006.t: "Phantom Blade Vengeance"
 murim_phantom_blade_exp5.0006.desc: "The Phantom Blade does not forget betrayal. Assassins materialize from the darkness, their blades gleaming with killing intent. You who betrayed the sect must now face its wrath. There is no mercy in the shadow — only the cold edge of retribution."
 murim_phantom_blade_exp5.0006.a: "Face the blade assassins head-on."
 murim_phantom_blade_exp5.0006.a.success: "Against all odds, you survive the onslaught."
 murim_phantom_blade_exp5.0006.a.failure: "The assassins' blades find their mark. Darkness claims you."
 murim_phantom_blade_exp5.0006.b: "Beg for mercy."
 murim_phantom_blade_exp5.0006.c: "Call upon my orthodox protectors."
 murim_phantom_blade_exp5.0007.t: "Shadow War: Key Engagement"
 murim_phantom_blade_exp5.0007.desc: "The shadow war has reached a critical juncture. Intelligence reports reveal an opening — the orthodox camp is vulnerable under cover of night. A decisive strike here could turn the tide of the entire conflict, but failure would leave your forces exposed and shattered."
 murim_phantom_blade_exp5.0007.a: "Lead the night raid personally."
 murim_phantom_blade_exp5.0007.a.success: "The night raid succeeds. The orthodox camp burns."
 murim_phantom_blade_exp5.0007.a.failure: "They were prepared. The raid turns into a rout."
 murim_phantom_blade_exp5.0007.b: "Sabotage their supply lines instead."
 murim_phantom_blade_exp5.0007.c: "Negotiate a ceasefire."
 murim_phantom_blade_exp5.0008.t: "The Void Blade Technique"
 murim_phantom_blade_exp5.0008.desc: "In the deepest vault of the Phantom Blade sect lies a scroll sealed with nine chains. The Void Blade — the ultimate technique that cuts through space itself, leaving wounds that cannot heal. The previous master who attempted it was consumed by the void. Only the greatest may dare."
 murim_phantom_blade_exp5.0008.a: "Learn the Void Blade technique."
 murim_phantom_blade_exp5.0008.b: "Modify the technique to my own style."
 murim_phantom_blade_exp5.0008.c: "Seal it away. The technique is too dangerous."
 murim_phantom_blade_exp5.0009.t: "Phantom Blade Succession War"
 murim_phantom_blade_exp5.0009.desc: "Two powers cannot share one shadow. A rival of equal rank within the Phantom Blade challenges your authority, their network of assassins rivaling your own. The sect cannot endure a divided leadership — this struggle for supremacy must end, one way or another."
 murim_phantom_blade_exp5.0009.a: "Challenge them for leadership in open combat."
 murim_phantom_blade_exp5.0009.a.success: "Your rival falls. The Phantom Blade is yours."
 murim_phantom_blade_exp5.0009.a.failure: "Your rival's blade proves faster. You are defeated."
 murim_phantom_blade_exp5.0009.b: "Assassinate the rival secretly."
 murim_phantom_blade_exp5.0009.c: "Propose dual leadership."
 murim_phantom_blade_exp5.0009.d: "Step aside and become the shadow advisor."
 murim_phantom_blade_exp5.0010.t: "The Last Blade"
 murim_phantom_blade_exp5.0010.desc: "You have walked the path of the blade longer than any before you. Every technique mastered, every shadow explored, every contract fulfilled. Now, standing at the end of this road, the ultimate question remains: will you transcend mortality through your art, or lay down the blade at last?"
 murim_phantom_blade_exp5.0010.a: "Transcend mortality through blade arts."
 murim_phantom_blade_exp5.0010.b: "Pass the blade to a worthy successor."
 murim_phantom_blade_exp5.0010.c: "Destroy all blade techniques. End the legacy."
 murim_phantom_blade_exp5.0010.d: "Merge with the Heavenly Demon's power."
