 # ============================================================
 # FORBIDDEN ARTS EVENTS - New Events 0006-0007
 # ============================================================

 # --- EVENT 6: The Qi Hunger ---
 murim_forbidden_arts.0006.t:0 "The Hunger Awakens"
 murim_forbidden_arts.0006.desc:0 "The dark qi within you stirs with a familiar, terrible hunger. Demonic cultivation does not sustain itself — it demands tribute. The power you embraced now asserts its own needs, gnawing at the edges of your mind with cold, patient malice. You must choose how to answer it."
 murim_forbidden_arts.0006.a:0 "Find a weakened cultivator... and take what you need."
 murim_forbidden_arts.0006.b:0 "Seal the hunger within through meditation."
 murim_forbidden_arts.0006.c:0 "Offer your own life force — let it feed on me."

 # --- EVENT 7: Ancient Demonic Manual ---
 murim_forbidden_arts.0007.t:0 "A Manual Written in Blood"
 murim_forbidden_arts.0007.desc:0 "While searching through the ruins of an old hermit's cave, your hand brushes against a lacquered box wedged behind loose stones. Inside, wrapped in oilskin, is a manual. The calligraphy is unfamiliar — not any orthodox sect's style. The characters seem to pulse faintly in the darkness. This is a text from a destroyed demonic sect, one the Orthodox Assembly paid in blood to erase from history. It should not exist."
 murim_forbidden_arts.0007.a:0 "Study it immediately. Knowledge is power."
 murim_forbidden_arts.0007.a.safe:0 "The techniques are potent. Your meridians expand without damage."
 murim_forbidden_arts.0007.a.qidev:0 "The techniques fight back. Your qi circuits buckle under the alien methodology."
 murim_forbidden_arts.0007.a.demonic:0 "Something in the text resonates with a darkness you never knew you carried."
 murim_forbidden_arts.0007.b:0 "Seal it and report its existence to the jianghu."
 murim_forbidden_arts.0007.c:0 "Hide it. Study it in secret, piece by piece."

 # --- MODIFIER NAMES ---
 murim_demonic_qi_hunger:0 "Demonic Qi Hunger"
 murim_demonic_qi_hunger_desc:0 "The dark power within demands tribute. Every day without feeding it weakens you further."
 murim_ancient_demonic_wisdom:0 "Ancient Demonic Insight"
 murim_ancient_demonic_wisdom_desc:0 "Forbidden knowledge burns in your mind, granting unorthodox understanding of qi manipulation."
 murim_demonic_qi_satiated:0 "Demonic Qi Satiated"
 murim_demonic_qi_satiated_desc:0 "The dark power within is temporarily sated. Your abilities are at their peak — but at what cost?"
