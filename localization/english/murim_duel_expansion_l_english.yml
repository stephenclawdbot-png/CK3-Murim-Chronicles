l_english:
 murim_duel.3050.t: "Ambush on the Mountain Road"
 murim_duel.3050.desc: "The attack comes without warning. One moment you walk the mountain path in peace — the next, a blade whistles from the treeline. Your old enemy has been waiting for this moment, patient as a viper. They step from the shadows with murder in their eyes.\n\nThere is no ceremony here. No witnesses. Just you, your enemy, and the cold mountain air."
 murim_duel.3050.a: "Fight back with everything I have!"
 murim_duel.3050.b: "Feign weakness — then strike when they overcommit."
 murim_duel.3100.t: "The Debt of Blood"
 murim_duel.3100.desc: "You have found the one who wronged you. Across a crowded market square, your eyes lock with theirs, and the world narrows to just the two of you. Every sleepless night, every bitter oath of vengeance — it all led to this moment.\n\nThey see the recognition in your gaze. They know why you're here."
 murim_duel.3100.a: "Draw your weapon. Today, the debt is paid in blood."
 murim_duel.3100.b: "Follow them. Strike when the moment is perfect."
 murim_duel.3200.t: "Master and Disciple"
 murim_duel.3200.desc: "Your former master stands before you — the one who taught you everything you know. But knowledge is a blade that cuts both ways. You have surpassed their teachings, or perhaps they have grown weak with age. Either way, only one of you can claim the title of true master.\n\nTheir stance is the same one they drilled into you a thousand times. You know every weakness."
 murim_duel.3200.a: "I will surpass you, master. Forgive me."
 murim_duel.3200.b: "I cannot raise my hand against my teacher."
 murim_duel.3200.c: "Propose a test of technique instead of a true fight."
 murim_duel.3300.t: "Street Fight"
 murim_duel.3300.desc: "It starts with a shove. A spilled drink. A wrong look at the wrong person. But in the jianghu, even a tavern brawl can turn deadly when both fighters know how to kill with their bare hands.\n\nChairs splinter. Tables flip. The crowd scatters as qi-enhanced fists crack stone walls."
 murim_duel.3300.a: "Show them what a real martial artist can do!"
 murim_duel.3300.b: "End this quickly before someone dies."
 murim_duel.3400.t: "The Poisoned Duel"
 murim_duel.3400.desc: "Your opponent's blade glistens with an oily sheen that has nothing to do with proper maintenance. Poison. The coward has laced their weapon with something that makes your instincts scream danger.\n\nEvery cut, every scratch could be fatal. You must fight with perfect precision — or not at all."
 murim_duel.3400.a: "I'll end this before the poison matters — one decisive strike!"
 murim_duel.3400.b: "Fight defensively. Avoid all contact with that blade."
 murim_duel.3500.t: "Midnight Assassin"
 murim_duel.3500.desc: "A shadow detaches from the wall of your room. The glint of a blade. The whisper of silk against skin. An assassin has come for you in the dead of night, moving with the practiced silence of someone who has killed many times before.\n\nYour training saves you — you roll from bed just as the blade splits your pillow."
 murim_duel.3500.a: "Counterattack in the darkness!"
 murim_duel.3500.b: "Escape through the window — fight on better ground."
 murim_duel.3600.t: "Honor Duel to the Death"
 murim_duel.3600.desc: "The arena is silent. Thousands watch as you and your opponent stand at opposite ends, weapons drawn. This is no sparring match — this is a duel to the death, witnessed by the entire martial world. The loser's name will be forgotten. The winner's will echo through generations.\n\nThere is no turning back now."
 murim_duel.3600.a: "Attack with overwhelming force — end this decisively!"
 murim_duel.3600.b: "Fight with patient precision. Let them make the first mistake."
