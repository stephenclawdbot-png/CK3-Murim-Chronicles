l_english:
 # =============================================
 # CULTIVATION EXPANSION LOCALIZATION
 # Inner Demons, Pill Refining, Dual Meridian,
 # Forbidden Technique, Qi Sea Expansion
 # =============================================

 # --- Event 1: Inner Demon Tribulation ---
 murim_cult_exp.0001.t:0 "Inner Demon Tribulation"
 murim_cult_exp.0001.desc:0 "During deep meditation, the darkness within your soul takes form. Your inner demons - born from every sin, every fear, every unchecked desire - manifest as a spiritual trial. They wear the faces of those you've wronged, speak with the voices of your deepest regrets. To advance your cultivation, you must face them. To fail is to lose yourself entirely."
 murim_cult_exp.0001.a:0 "I will face my demons head-on. My will is iron!"
 murim_cult_exp.0001.a.success:0 "The demons shatter like glass before your indomitable spirit."
 murim_cult_exp.0001.a.failure:0 "The demons overwhelm you, dragging you into darkness..."
 murim_cult_exp.0001.b:0 "Master, I need your guidance to weather this storm."
 murim_cult_exp.0001.c:0 "I will absorb the demon's power through forbidden means."
 murim_cult_exp.0001.d:0 "I am not ready. I must retreat from this tribulation."

 # --- Event 2: Pill Refining Catastrophe ---
 murim_cult_exp.0002.t:0 "Pill Refining Catastrophe"
 murim_cult_exp.0002.desc:0 "The medicinal cauldron begins to shake violently. Cracks spider across its surface as unstable qi erupts from within. Your attempt to refine a breakthrough pill has gone catastrophically wrong - the volatile spiritual herbs are about to detonate with enough force to level a building. You have mere seconds to act."
 murim_cult_exp.0002.a:0 "Channel my qi to contain the explosion!"
 murim_cult_exp.0002.a.success:0 "You wrestle the chaotic energy into submission - a perfect pill forms."
 murim_cult_exp.0002.a.failure:0 "The cauldron explodes in your face with devastating force."
 murim_cult_exp.0002.b:0 "Shield the disciples! I'll absorb the blast myself!"
 murim_cult_exp.0002.c:0 "Run! Save yourself - the lab is lost!"

 # --- Event 3: Dual Meridian Awakening ---
 murim_cult_exp.0003.t:0 "Dual Meridian Awakening"
 murim_cult_exp.0003.desc:0 "An unprecedented phenomenon occurs within your body. Two dormant meridian pathways - one of fire, one of ice - have awakened simultaneously. They war against each other, sending waves of agony through your spiritual body. If you can harmonize them, you will gain power beyond your current realm. If they clash unchecked, they will tear you apart from within."
 murim_cult_exp.0003.a:0 "Force both meridians open at once! All or nothing!"
 murim_cult_exp.0003.a.success:0 "Fire and ice merge into a perfect yin-yang harmony within your body."
 murim_cult_exp.0003.a.failure:0 "The meridians clash and your body convulses in agony."
 murim_cult_exp.0003.b:0 "Suppress one path and stabilize the other safely."
 murim_cult_exp.0003.c:0 "Seek emergency help from a meridian healer."

 # --- Event 4: Forbidden Technique Backlash ---
 murim_cult_exp.0004.t:0 "Forbidden Technique Backlash"
 murim_cult_exp.0004.desc:0 "The price of forbidden power has come due. The dark technique you practiced in secret is now eating you from the inside - your veins darken, your qi turns corrosive, and waves of murderous intent leak from your body uncontrollably. If you do not act soon, the technique will consume you entirely."
 murim_cult_exp.0004.a:0 "Endure through sheer willpower! I will master this power!"
 murim_cult_exp.0004.a.success:0 "Through iron will, the forbidden energy submits to your control."
 murim_cult_exp.0004.a.failure:0 "The dark energy rampages through your meridians..."
 murim_cult_exp.0004.b:0 "Purge the forbidden energy completely. Start over."
 murim_cult_exp.0004.c:0 "Seek a forbidden arts master in the jianghu underworld."

 # --- Event 5: Qi Sea Expansion Ritual ---
 murim_cult_exp.0005.t:0 "Qi Sea Expansion Ritual"
 murim_cult_exp.0005.desc:0 "You have found it - an ancient sacred cultivation ground, where the earth's spiritual veins converge. The air itself thrums with dense qi. Legend says that performing the Qi Sea Expansion Ritual here can permanently multiply one's spiritual capacity. But the ritual is dangerous - many cultivators have had their qi seas rupture attempting it."
 murim_cult_exp.0005.a:0 "Perform the full ancient ritual. Risk everything for power."
 murim_cult_exp.0005.a.success:0 "Your qi sea expands like an ocean swallowing rivers!"
 murim_cult_exp.0005.a.failure:0 "Your qi sea cracks under the pressure..."
 murim_cult_exp.0005.b:0 "Perform a partial ritual - safer, but lesser results."
 murim_cult_exp.0005.c:0 "Simply meditate here. The spiritual energy itself is enough."
 murim_cult_exp.0005.d:0 "Sell the location to the highest bidder."

 # =============================================
 # POLITICS EXPANSION 2 LOCALIZATION
 # Wulin Congress, Martial Law, Secret Alliance,
 # Defector Asylum, Grand Elder Succession
 # =============================================

 # --- Event 1: Wulin Congress Emergency Vote ---
 murim_politics_exp2.0001.t:0 "Wulin Congress Emergency Vote"
 murim_politics_exp2.0001.desc:0 "The great hall of the Martial Alliance erupts in chaos. Representatives from every major sect have gathered for an emergency congress - the unorthodox factions grow bolder by the day, and a decision must be made. War or diplomacy? The vote you cast today will shape the future of the entire murim world."
 murim_politics_exp2.0001.a:0 "Vote for total war! The orthodox must crush the unorthodox!"
 murim_politics_exp2.0001.b:0 "Propose a grand tournament to settle this peacefully."
 murim_politics_exp2.0001.c:0 "Secretly vote to protect my sect's interests above all."

 # --- Event 2: Martial Law Declaration ---
 murim_politics_exp2.0002.t:0 "Martial Law Declaration"
 murim_politics_exp2.0002.desc:0 "The situation has deteriorated beyond political solutions. Attacks on your sect's outer disciples, poisoned supply lines, missing elders - someone is waging a shadow war against you. As sect leader, you must decide how to respond. Martial law would secure your operations but breed resentment. Inaction may invite further aggression."
 murim_politics_exp2.0002.a:0 "Declare full martial law! Lock down all operations!"
 murim_politics_exp2.0002.b:0 "Selective crackdown - target only the suspected dissidents."
 murim_politics_exp2.0002.c:0 "Demonstrate my personal strength publicly to deter attackers."
 murim_politics_exp2.0002.c.success:0 "Your devastating display of power silences all doubters."
 murim_politics_exp2.0002.c.failure:0 "Your technique falters before the assembled crowd..."

 # --- Event 3: Secret Alliance Treaty ---
 murim_politics_exp2.0003.t:0 "The Shadow Envoy"
 murim_politics_exp2.0003.desc:0 "Under cover of night, an envoy from a rival sect appears at your doorstep. They bear no weapons, only a sealed scroll containing a proposal: a secret non-aggression pact, or perhaps even a hidden alliance against a greater common threat. The question is whether this is genuine... or a trap."
 murim_politics_exp2.0003.a:0 "Accept the secret alliance. We need allies in these dark times."
 murim_politics_exp2.0003.b:0 "Reject and expose their treachery to the world!"
 murim_politics_exp2.0003.c:0 "Pretend to accept... while planning a counter-scheme."

 # --- Event 4: Defector Asylum Crisis ---
 murim_politics_exp2.0004.t:0 "The Defector at the Gate"
 murim_politics_exp2.0004.desc:0 "A battered figure collapses at your sect's gates, bearing wounds from both blade and qi attacks. They claim to be a former inner disciple of a rival sect, carrying knowledge of secret techniques and internal plots. They beg for asylum. Granting it means gaining intelligence but also making enemies. Refusing may mean their death."
 murim_politics_exp2.0004.a:0 "Grant full asylum. Their knowledge will strengthen us."
 murim_politics_exp2.0004.b:0 "Extract their knowledge, then send them on their way."
 murim_politics_exp2.0004.c:0 "Return them to their sect for a handsome reward."
 murim_politics_exp2.0004.d:0 "They must prove their worth in combat first."
 murim_politics_exp2.0004.d.win:0 "The defector fights well - they have earned their place."
 murim_politics_exp2.0004.d.lose:0 "The defector's blade sends you stumbling back..."

 # --- Event 5: Grand Elder Succession Crisis ---
 murim_politics_exp2.0005.t:0 "Grand Elder Succession Crisis"
 murim_politics_exp2.0005.desc:0 "The Grand Elder of the Martial Alliance lies on their deathbed. For decades, their authority held the fragile peace between orthodox sects. Now, with their passing imminent, every ambitious sect leader eyes the throne. The succession will be decided by vote, by combat, or by cunning - and you must choose how to position yourself in this pivotal moment."
 murim_politics_exp2.0005.a:0 "I will declare my candidacy for Grand Elder!"
 murim_politics_exp2.0005.b:0 "Better to be the kingmaker than the king. Support another."
 murim_politics_exp2.0005.c:0 "Sabotage every candidate and seize power in the chaos."
 murim_politics_exp2.0005.d:0 "This is not my battle. I will watch from the sidelines."

