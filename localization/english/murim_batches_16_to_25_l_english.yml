l_english:
 # ============================================================
 # BATCH 17: WORLD HISTORY EVENTS 0006-0007
 # ============================================================
 murim_world_history.0006.t:0 "The Sealed Tomb"
 murim_world_history.0006.desc:0 "The burial mound sits apart from the road, surrounded by withered trees that have not grown in a century. The formations carved into the stone are not ornamental — they are functional, pulsing faintly with residual qi even now. Whatever was sealed inside was sealed deliberately, by someone who wanted it to stay that way."
 murim_world_history.0006.a:0 "Break the seal. Enter the tomb."
 murim_world_history.0006.b:0 "Study the formations from outside."
 murim_world_history.0006.c:0 "Reseal it and walk away."

 murim_world_history.0007.t:0 "The Last Disciple"
 murim_world_history.0007.desc:0 "The figure is ancient in a way that goes beyond age — blind eyes, a walking staff worn smooth by centuries of use, and a presence that makes the air around them feel heavier. They introduce themselves as the final living disciple of a sect that was destroyed five hundred years ago. They carry the complete lineage in their memory. And they have been looking for someone worthy to give it to."
 murim_world_history.0007.a:0 "Accept the inheritance. Carry the lineage forward."
 murim_world_history.0007.b:0 "Listen but decline — this burden is not mine."
 murim_world_history.0007.c:0 "Refer them to a disciple more suited to this calling."

 # ============================================================
 # BATCH 18: FATE EVENTS 0011-0012
 # ============================================================
 murim_fate.0011.t:0 "Destiny Bond"
 murim_fate.0011.desc:0 "It happened during meditation — a thread of qi, faint as a spider's silk, connecting your cultivation path to another's. You have encountered threads like this in text before, dismissed them as metaphor. This is not metaphor. You can feel their cultivation when you close your eyes. Their breakthroughs resonate in your own meridians. The heavens have woven your fates together."
 murim_fate.0011.a:0 "Accept the bond — walk the shared path willingly."
 murim_fate.0011.b:0 "Resist it — force your cultivation back to independence."
 murim_fate.0011.c:0 "Seek a fate-reader to understand what the bond means."

 murim_fate.0012.t:0 "Fate Divergence"
 murim_fate.0012.desc:0 "The vision comes without warning — two paths branching before you, written in characters of light. One path climbs toward dominance: every step a conquest, the heavens themselves made to yield. The other descends toward harmony: deep, quiet power, walking with the flow of things rather than against it. The heavens are offering you a choice. This offer will not come again."
 murim_fate.0012.a:0 "The Path of Dominance — forge your will against heaven itself."
 murim_fate.0012.b:0 "The Path of Harmony — walk with the heavens, not against them."
 murim_fate.0012.c:0 "Reject both. Chart a third path no one has walked before."

 # ============================================================
 # BATCH 20: DAILY LIFE EVENTS 0011-0012
 # ============================================================
 murim_daily_life.0011.t:0 "The Wandering Physician"
 murim_daily_life.0011.desc:0 "They have set up between the market stalls and the gate — a wooden bench, a battered case of instruments, and a line of common folk waiting in patient silence. The physician moves with an efficiency that speaks of decades, maybe more. When they glance at you, there is recognition in their eyes that has nothing to do with your face."
 murim_daily_life.0011.a:0 "Seek a consultation about my cultivation ailments."
 murim_daily_life.0011.b:0 "Donate to their work — support the free healing."
 murim_daily_life.0011.c:0 "Observe their diagnostic technique in silence."

 murim_daily_life.0012.t:0 "Festival of the Ascending Sword"
 murim_daily_life.0012.desc:0 "Once a generation the jianghu declares a truce from its rivalries and gathers not to compete but to celebrate. The Festival of the Ascending Sword fills three days with demonstrations, storytelling, technique exchanges, and the kind of casual conversation that only happens when no one is trying to kill anyone. The air smells like incense and competition all the same."
 murim_daily_life.0012.a:0 "Compete in the open demonstrations — show your art."
 murim_daily_life.0012.b:0 "Find a stranger willing to trade techniques."
 murim_daily_life.0012.c:0 "Simply observe and absorb everything."

 # ============================================================
 # BATCH 21: ARTIFACT EVENTS 0009-0010
 # ============================================================
 murim_artifact.0009.t:0 "The Resonant Core"
 murim_artifact.0009.desc:0 "It sits in a hollow in the rock, faintly glowing — not carved, not placed, not crafted. A natural formation of pure qi, crystallised over centuries in this precise spot where ley lines converge. Its pulse matches your heartbeat almost exactly. You have read about these. Most cultivators spend a lifetime without ever seeing one."
 murim_artifact.0009.a:0 "Absorb the core — draw its qi into your own."
 murim_artifact.0009.b:0 "Offer it to the sect — a gift to the lineage."
 murim_artifact.0009.c:0 "Sell it. The black market will pay very well."

 murim_artifact.0010.t:0 "The Original Manual"
 murim_artifact.0010.desc:0 "Not a transcription. Not a fragment. The original, in the hand of the technique's creator — the calligraphy unsteady in places as though written in haste, or in pain, or both. The seal on the cover has never been broken. This has not been read since the master who wrote it sealed it, and something in the way it hums tells you they intended it to wait for exactly the right person."
 murim_artifact.0010.a:0 "Study it in complete isolation. Let it transform you."
 murim_artifact.0010.b:0 "Bring it to the sect archive — knowledge belongs to the lineage."
 murim_artifact.0010.c:0 "Keep its existence entirely secret."

 # ============================================================
 # BATCH 22: CULTIVATION MILESTONE EVENTS
 # ============================================================
 murim_milestone.0001.t:0 "The Body Remembers"
 murim_milestone.0001.desc:0 "It happened during an ordinary training session — you struck the post and the wood gave more than wood should. Your hand did not hurt. Your breathing did not change. The transformation you have been working toward has been quietly completing itself, and only now, with splinters at your feet and your breath steady as water, do you understand that you are no longer the same."
 murim_milestone.0001.a:0 "Train harder. The foundation is real now — build on it."
 murim_milestone.0001.b:0 "Celebrate with the sect. Share the moment."

 murim_milestone.0002.t:0 "The Visible Soul"
 murim_milestone.0002.desc:0 "An elder passed you in the corridor today and stopped. Did not speak. Simply looked. You have seen that look directed at others before — the look of a cultivator reading your internal state in your qi. At rank 5, the mirror is no longer hidden. Every serious practitioner near you can see exactly who you are beneath the surface. There is nowhere to hide any more."
 murim_milestone.0002.a:0 "Embrace transparency — let your nature be seen."
 murim_milestone.0002.b:0 "Learn to mask your qi — maintain the mystery."
 murim_milestone.0002.c:0 "Meditate on what your qi reveals about your soul."

 murim_milestone.0003.t:0 "The Jianghu Takes Notice"
 murim_milestone.0003.desc:0 "There is a different quality to the silence when you enter a room now. The letters that arrive have different seals on them. An invitation from a sect you have never contacted. A warning from someone you have never met. A challenge, formally worded, from a cultivator three provinces away. Rank 7 is not just a personal milestone — it is a political one. The jianghu has added your name to a different list."
 murim_milestone.0003.a:0 "Announce your standing. Claim your place openly."
 murim_milestone.0003.b:0 "Remain quiet — power does not need announcement."
 murim_milestone.0003.c:0 "Seek out the other rank-7 cultivators. Learn the landscape."

 murim_milestone.0004.t:0 "The Boundary"
 murim_milestone.0004.desc:0 "You can feel it clearly now — not a metaphor, not a poetic description from an ancient text. An actual boundary. A wall in your cultivation path where everything you have been taught stops making sense. Beyond it, none of the old models apply. You stand at the edge of what human cultivation has mapped. What lies beyond has only been described by those who returned changed, or did not return at all."
 murim_milestone.0004.a:0 "Push forward — cross the boundary now regardless of cost."
 murim_milestone.0004.a.success:0 "The boundary dissolves. You emerge on the other side changed in ways you do not yet have words for."
 murim_milestone.0004.a.partial:0 "A partial crossing. You have gone further than almost anyone alive, but the true other side remains ahead."
 murim_milestone.0004.a.failure:0 "The boundary pushes back. You survive, but the cost is written on your body."
 murim_milestone.0004.b:0 "Wait and consolidate — prepare everything before attempting."
 murim_milestone.0004.c:0 "Seek guidance from the heavens. Pray for a sign."

 # ============================================================
 # BATCH 23: YOUTH TOURNAMENT EVENTS 0013-0014
 # ============================================================
 murim_youth.0013.t:0 "The Child Without a Sect"
 murim_youth.0013.desc:0 "No emblem. No colours. No master standing at the edge of the ring. The child who stepped into the tournament grounds arrived alone and has been defeating every opponent since, using a technique no elder present can name. They are perhaps ten years old. The silence around them is the silence of people trying to solve a problem they do not yet understand."
 murim_youth.0013.a:0 "Offer them a place in your household. Become their patron."
 murim_youth.0013.b:0 "Point them toward a great sect. Serve the jianghu's future."
 murim_youth.0013.c:0 "Watch but stay out of it — this child has their own path."

 murim_youth.0014.t:0 "The Oath of Siblings-in-Arms"
 murim_youth.0014.desc:0 "After the last match — win or loss you are not sure now — the two of you sat at the edge of the training ground and said things that are usually only said much later in life, if at all. About the path. About what it means to walk it beside someone rather than alone. When the sun went down you made a promise to each other, the way children do, with your whole heart and no thought of the cost."
 murim_youth.0014.a:0 "Take the oath. Swear to stand together always."
 murim_youth.0014.b:0 "Decline gently. A cultivator's path belongs to themselves."

 # ============================================================
 # BATCH 24: BREAKTHROUGH EVENTS 0920-0930
 # ============================================================
 murim_breakthrough.0920.t:0 "Synchronised Breakthrough"
 murim_breakthrough.0920.desc:0 "You have been training alongside [scope:breakthrough_partner.GetFirstName] for long enough that your qi circulates have begun to mirror each other during deep practice. Today, at the same moment, you both felt the threshold. Not coincidence. Resonance. The breakthrough could be attempted together — both paths amplifying the other. Or each of you could proceed alone, as always."
 murim_breakthrough.0920.a:0 "Attempt the synchronised breakthrough together."
 murim_breakthrough.0920.a.both_succeed:0 "The resonance amplifies both cultivations. You break through together."
 murim_breakthrough.0920.a.partial:0 "One of you crosses. The other is pushed back by the qi surge."
 murim_breakthrough.0920.a.both_fail:0 "The qi clash between your circulations causes a backlash. Neither crosses."
 murim_breakthrough.0920.b:0 "Attempt the breakthrough alone. Keep your path independent."

 murim_breakthrough.0930.t:0 "Crisis-Forged Breakthrough"
 murim_breakthrough.0930.desc:0 "You were not trying. There was no meditation, no prepared ritual, no sacred site. You were barely alive — the poison/wound/collapse had pushed your qi to its absolute limit — when the boundary simply gave way. The breakthrough happened the way most important things happen: unexpectedly, at the worst possible moment, and permanently. You are on the other side now. So is the damage."
 murim_breakthrough.0930.a:0 "Accept it. Carry the cost and the advancement together."
 murim_breakthrough.0930.b:0 "Suppress it — force the qi back down and stabilise first."

 # ============================================================
 # NEW MODIFIERS ADDED IN BATCHES 17-25
 # ============================================================
 murim_ancient_tomb_insight:0 "Ancient Tomb Insight"
 murim_ancient_tomb_insight_desc:0 "The formations within the sealed tomb have left a permanent imprint on your understanding of qi structure."
 murim_spirit_guardian_blessing:0 "Spirit Guardian's Blessing"
 murim_spirit_guardian_blessing_desc:0 "A lingering spirit from the ancient tomb has chosen to offer its protection."
 murim_formation_scholar:0 "Formation Scholar"
 murim_formation_scholar_desc:0 "Extended study of ancient formations has refined your understanding of qi flow patterns."
 murim_lost_sect_inheritor:0 "Lost Sect Inheritor"
 murim_lost_sect_inheritor_desc:0 "You carry the complete lineage of a sect thought destroyed. The weight of it shapes your cultivation."
 murim_destiny_bond_active:0 "Destiny Bond"
 murim_destiny_bond_active_desc:0 "Your cultivation path is woven together with another's by heavenly decree. Their progress echoes in your meridians."
 murim_fate_defiant:0 "Fate Defiant"
 murim_fate_defiant_desc:0 "You have chosen to sever the heavens' weave. Your cultivation path is entirely your own — for good or ill."
 murim_heaven_defying_will:0 "Heaven-Defying Will"
 murim_heaven_defying_will_desc:0 "You have chosen the path of dominance. The heavens resist you. You have never cared."
 murim_heavenly_accord:0 "Heavenly Accord"
 murim_heavenly_accord_desc:0 "You walk in harmony with the flow of heaven. Your cultivation advances with less resistance and greater depth."
 murim_fate_transcendent:0 "Fate Transcendent"
 murim_fate_transcendent_desc:0 "You rejected both paths the heavens offered and charted a third way. No map exists for where you walk now."
 murim_physician_prescription:0 "Physician's Prescription"
 murim_physician_prescription_desc:0 "The wandering physician's treatment has improved your qi circulation and overall constitution."
 murim_qi_circulation_adjusted:0 "Adjusted Qi Circulation"
 murim_qi_circulation_adjusted_desc:0 "The physician identified a subtle blockage in your meridian flow. The correction is already working."
 murim_charitable_reputation:0 "Charitable Reputation"
 murim_charitable_reputation_desc:0 "Word of your generosity spreads through the jianghu. The common folk remember."
 murim_festival_champion_aura:0 "Festival Champion's Aura"
 murim_festival_champion_aura_desc:0 "Your performance at the Festival of the Ascending Sword is being talked about across three provinces."
 murim_land_qi_resonance:0 "Land Qi Resonance"
 murim_land_qi_resonance_desc:0 "The resonant core's absorption has aligned your personal qi with the earth energies of the region."
 murim_sect_benefactor:0 "Sect Benefactor"
 murim_sect_benefactor_desc:0 "Your gift to the sect has been remembered by its members."
 murim_original_manual_insight:0 "Original Manual Insight"
 murim_original_manual_insight_desc:0 "Reading the technique's original manuscript has given you access to layers of meaning lost in every subsequent copy."
 murim_legacy_preserver:0 "Legacy Preserver"
 murim_legacy_preserver_desc:0 "Your decision to share the original manual has secured your name in the sect's history."
 murim_refined_body_foundation:0 "Refined Body Foundation"
 murim_refined_body_foundation_desc:0 "Your body tempering is complete. The foundation of your cultivation path is stronger than most cultivators ever achieve."
 murim_sect_celebrated:0 "Celebrated by the Sect"
 murim_sect_celebrated_desc:0 "Your breakthrough was marked with ceremony. The sect's morale has lifted."
 murim_transparent_qi_aura:0 "Transparent Qi Aura"
 murim_transparent_qi_aura_desc:0 "You have chosen to let your internal state be visible. Other cultivators read you easily — and respect what they see."
 murim_concealed_qi_mastery:0 "Concealed Qi Mastery"
 murim_concealed_qi_mastery_desc:0 "You have learned to mask your cultivation depth. Others cannot accurately read your power level."
 murim_ranked_power_recognition:0 "Ranked Power Recognition"
 murim_ranked_power_recognition_desc:0 "The jianghu has formally acknowledged your standing. You are on the list of powers that matter."
 murim_hidden_depth_aura:0 "Hidden Depth Aura"
 murim_hidden_depth_aura_desc:0 "Your restraint at rank 7 has become itself a source of mystique. What else are you concealing?"
 murim_peer_network_established:0 "Peer Network Established"
 murim_peer_network_established_desc:0 "You now know who the other rank-7 cultivators are and have opened channels of communication."
 murim_boundary_transcended:0 "Boundary Transcended"
 murim_boundary_transcended_desc:0 "You crossed the mortal boundary of cultivation. What you are now does not have a clean name."
 murim_partial_transcendence:0 "Partial Transcendence"
 murim_partial_transcendence_desc:0 "You have gone further than almost anyone alive. The true other side is still ahead."
 murim_boundary_backlash:0 "Boundary Backlash"
 murim_boundary_backlash_desc:0 "The boundary pushed back. You survived. The cost is written permanently in your qi structure."
 murim_boundary_consolidation:0 "Boundary Consolidation"
 murim_boundary_consolidation_desc:0 "You have chosen to wait. Every day of preparation brings the crossing closer to certainty."
 murim_patron_of_prodigy:0 "Patron of a Prodigy"
 murim_patron_of_prodigy_desc:0 "Your investment in an exceptional young cultivator has raised your standing among the jianghu's talent scouts."
 murim_sworn_sibling_bond:0 "Sworn Siblings in Arms"
 murim_sworn_sibling_bond_desc:0 "A childhood oath — serious as any adult contract, perhaps more so."
 murim_synchronised_breakthrough_boost:0 "Synchronised Breakthrough Resonance"
 murim_synchronised_breakthrough_boost_desc:0 "Breaking through simultaneously with another cultivator left both your qi structures permanently resonant."
 murim_suppressed_qi_pressure:0 "Suppressed Qi Pressure"
 murim_suppressed_qi_pressure_desc:0 "You pushed the crisis breakthrough back down. The pressure is building — it will demand release again."
 murim_crisis_breakthrough_scar:0 "Crisis Breakthrough Scar"
 murim_crisis_breakthrough_scar_desc:0 "The breakthrough happened at your limit. The advancement is real, but the moment left marks on your meridians."
 murim_renowned_patron:0 "Renowned Patron"
 murim_renowned_patron_desc:0 "Your act of referring the ancient disciple to a worthy successor has become a story told in tea houses."
