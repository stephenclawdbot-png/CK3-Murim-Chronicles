l_english:
 murim_celestial.0001.t: "The Imperial Examination"
 murim_celestial.0001.desc: "The imperial court has summoned cultivators to demonstrate their arts before the throne. Officials with jade writing tablets observe from elevated platforms, their judgments capable of elevating a martial artist to imperial favor or condemning them to obscurity. How you present yourself matters as much as your power."
 murim_celestial.0001.a: "Demonstrate orthodox cultivation"
 murim_celestial.0001.b: "Reveal my hidden power"
 murim_celestial.0001.c: "Cheat with qi sense"
 murim_celestial.0001.d: "Refuse the examination entirely"
 murim_celestial.0002.t: "Shadow Emperor Conspiracy"
 murim_celestial.0002.desc: "Rumors of a shadow emperor — a puppet master pulling strings from behind the Dragon Throne — have reached your ears. Someone is manipulating court politics, martial sects, and trade routes from the darkness. The conspiracy runs deeper than anyone suspects."
 murim_celestial.0002.a: "Investigate the conspiracy"
 murim_celestial.0002.b: "Join the conspiracy for power"
 murim_celestial.0002.c: "Report to the Wulin Alliance"
 murim_celestial.0002.d: "Blackmail the puppeteer"
 murim_celestial.0003.t: "Mongol Invasion Response"
 murim_celestial.0003.desc: "Riders from the northern steppes pour across the border like a tide of iron and fury. The Mongol horde threatens to swallow the martial world whole. Cities burn, sects fall, and the rivers run red. Now is the hour when cultivators must stand together — or perish separately."
 murim_celestial.0003.a: "Rally the cultivators for united defense"
 murim_celestial.0003.b: "Defend alone — become a one-man army"
 murim_celestial.0003.c: "Seize power in the chaos"
 murim_celestial.0003.d: "Negotiate with the invaders"
 murim_celestial.0004.t: "The Ministry Purge"
 murim_celestial.0004.desc: "The Imperial Ministry of Martial Affairs has declared a purge of unregistered cultivators. Soldiers backed by court-aligned martial artists sweep through the provinces, arresting anyone who cannot produce papers of official sanction. Your name is on their list."
 murim_celestial.0004.a: "Go into hiding"
 murim_celestial.0004.b: "Fight the Ministry head-on"
 murim_celestial.0004.c: "Infiltrate the Ministry from within"
 murim_celestial.0004.d: "Sacrifice myself to protect others"
 murim_celestial.0005.t: "Heavenly Tribulation"
 murim_celestial.0005.desc: "The sky darkens to the color of bruised iron. Lightning gathers in spiraling columns of destruction, drawn to your cultivation like moths to a flame. The Heavenly Tribulation has come — heaven's own test of whether a mortal deserves to transcend. Many have attempted this crossing. Few have survived."
 murim_celestial.0005.a: "Endure the lightning"
 murim_celestial.0005.b: "Redirect the lightning at my enemies"
 murim_celestial.0005.c: "Absorb the lightning into my weapon"
 murim_celestial.0005.d: "Accept fate and perish"
 murim_celestial.0006.t: "The Great Sect Purge"
 murim_celestial.0006.desc: "The martial world splits along its oldest fault line — orthodox against demonic. A great purge has been declared, and both sides mobilize for total war. Temples burn, hidden valleys echo with the clash of steel, and old alliances shatter overnight. You must choose where you stand."
 murim_celestial.0006.a: "Lead the orthodox purge"
 murim_celestial.0006.b: "Defend the demonic sects"
 murim_celestial.0006.c: "Play both sides from the shadows"
 murim_celestial.0006.d: "Unite all sects under one banner"
