 murim_supreme_martial_artist_modifier:0 "Supreme Martial Artist"
 murim_supreme_martial_artist_modifier_desc:0 "Stands at the absolute pinnacle of the martial world."
 murim_lonely_at_the_top_modifier:0 "Lonely at the Summit"
 murim_lonely_at_the_top_modifier_desc:0 "The weight of being the best. No equal to spar with, no peer to confide in."
 murim_dethroned_number_one_modifier:0 "Dethroned Champion"
 murim_dethroned_number_one_modifier_desc:0 "Once the greatest, now surpassed. The memory of the summit haunts every waking moment."

 murim_recent_combat_modifier:0 "Recent Combat"
 murim_recent_combat_modifier_desc:0 "Still recovering from a recent fight. Fighting again soon carries extra injury risk."
 murim_rank_challenge_cooldown:0 "Ranking Challenge Cooldown"
 murim_rank_challenge_cooldown_desc:0 "Must wait before issuing another ranking challenge."
 murim_career_ending_injury_modifier:0 "Career-Ending Injury"
 murim_career_ending_injury_modifier_desc:0 "A devastating injury has ended this fighter's martial career forever."

 murim_rank_opportunity_modifier:0 "Sensing Opportunity"
 murim_rank_opportunity_modifier_desc:0 "The death of a ranked fighter opens a path upward."
 murim_self_awareness_modifier:0 "Martial Self-Awareness"
 murim_self_awareness_modifier_desc:0 "Knowing one's place in the martial world sharpens the mind."
 murim_rank_motivated_training_modifier:0 "Rank-Motivated Training"
 murim_rank_motivated_training_modifier_desc:0 "Training with renewed intensity to climb the rankings."
 murim_seeking_talent_modifier:0 "Seeking Martial Talent"
