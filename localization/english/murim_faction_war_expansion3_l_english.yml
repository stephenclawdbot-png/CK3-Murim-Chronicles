l_english:
 murim_faction_war_exp3.0001.t: "Total War Declared"
 murim_faction_war_exp3.0001.desc: "The faction war has escalated beyond all control. What began as skirmishes between rival sects has erupted into total war — every clan, every disciple, every blade in the martial world drawn into the conflict. The rivers will run red before this ends."
 murim_faction_war_exp3.0001.a: "Rally all forces. Total war it is."
 murim_faction_war_exp3.0001.b: "Fight strategically. Outthink the enemy."
 murim_faction_war_exp3.0001.c: "Declare neutrality. Refuse to join."
 murim_faction_war_exp3.0002.t: "The Call to Arms"
 murim_faction_war_exp3.0002.desc: "Messengers arrive bearing war summons sealed in blood. Every martial artist must choose — join the total war and fight for their faction, refuse and face dishonor, or exploit the chaos for personal gain. The age of neutrality is over."
 murim_faction_war_exp3.0002.a: "Answer the call. Join the total war."
 murim_faction_war_exp3.0002.b: "Refuse to fight. Choose peace."
 murim_faction_war_exp3.0002.c: "Profit from the chaos instead."
 murim_faction_war_exp3.0003.t: "The War Strategist"
 murim_faction_war_exp3.0003.desc: "Maps cover every surface, marked with troop positions and supply lines. You have chosen the path of strategy over brute force. The enemy's weaknesses are becoming clear — a vulnerable supply route, an exposed flank, a commander's hubris. How will you exploit them?"
 murim_faction_war_exp3.0003.a: "Set up ambushes at their weak points."
 murim_faction_war_exp3.0003.b: "Lay siege to their fortified positions."
 murim_faction_war_exp3.0003.c: "Scorched earth. Deny them everything."
 murim_faction_war_exp3.0004.t: "The Neutral Faction"
 murim_faction_war_exp3.0004.desc: "While the martial world tears itself apart, you stand apart from the bloodshed. The warring factions view you with suspicion, but the common people look to you with hope. As a neutral power, you hold unique influence — the ability to end the war, protect the innocent, or profit from suffering."
 murim_faction_war_exp3.0004.a: "Mediate peace between the factions."
 murim_faction_war_exp3.0004.b: "Protect civilians from the war's devastation."
 murim_faction_war_exp3.0004.c: "Sell arms to both sides from a position of neutrality."
 murim_faction_war_exp3.0005.t: "The Ambush Master"
 murim_faction_war_exp3.0005.desc: "Your ambush tactics have earned you a fearsome reputation on the battlefield. Enemy commanders speak your name with dread. Now a high-value target has been identified — a key enemy leader traveling with minimal escort. The trap is set. The question is how far you will go."
 murim_faction_war_exp3.0005.a: "Spring the ambush. Strike with precision."
 murim_faction_war_exp3.0005.a.win: "The ambush succeeds. The enemy leader falls."
 murim_faction_war_exp3.0005.a.lose: "The target was prepared. The ambush fails."
 murim_faction_war_exp3.0005.b: "Use poison weapons. No survivors."
 murim_faction_war_exp3.0005.c: "Challenge them to honorable combat instead."
 murim_faction_war_exp3.0006.t: "The Peace Summit"
 murim_faction_war_exp3.0006.desc: "Exhausted delegates from both factions gather beneath a white banner of truce. The war has bled the martial world dry. As peace mediator, you hold the fate of Murim in your words. One wrong phrase could shatter the fragile ceasefire; the right ones could end the bloodshed forever."
 murim_faction_war_exp3.0006.a: "Broker a lasting peace treaty."
 murim_faction_war_exp3.0006.b: "The talks collapse. War continues."
 murim_faction_war_exp3.0006.c: "Negotiate a conditional ceasefire."
 murim_faction_war_exp3.0007.t: "The Final Offensive"
 murim_faction_war_exp3.0007.desc: "Peace has failed. The war grinds on, and both sides are bleeding. A final, decisive offensive could end this once and for all — but the cost in lives will be staggering. Exhaustion weighs upon every warrior's shoulders, yet the drums of war beat on."
 murim_faction_war_exp3.0007.a: "Launch the final offensive. End this now."
 murim_faction_war_exp3.0007.b: "We're exhausted. Pull back and regroup."
 murim_faction_war_exp3.0007.c: "Seek a desperate alliance with neutral factions."
 murim_faction_war_exp3.0008.t: "War's End"
 murim_faction_war_exp3.0008.desc: "The final battle has been fought. Bodies litter the field and the smoke of a hundred fires stains the sky. Silence falls over the martial world for the first time in years. The victors stand among the ruins, too exhausted to celebrate. The war is over — but who has truly won?"
 murim_faction_war_exp3.0008.a: "The orthodox factions claim victory."
 murim_faction_war_exp3.0008.b: "The unorthodox factions prevail."
 murim_faction_war_exp3.0008.c: "Neither side wins. Mutual destruction."
 murim_faction_war_exp3.0009.t: "War's Aftermath"
 murim_faction_war_exp3.0009.desc: "The war is over, but its scars remain carved into the land and its people. Ruined sect halls stand as silent monuments to the cost of conflict. Every surviving martial artist must now decide what to do with the rest of their life — rebuild, remember, or seek a new purpose."
 murim_faction_war_exp3.0009.a: "Wear the scars with pride. I am a war veteran."
 murim_faction_war_exp3.0009.b: "Rebuild what was lost. Restore our strength."
 murim_faction_war_exp3.0009.c: "Seek a new balance between the factions."
 murim_faction_war_exp3.0010.t: "The New Murim Order"
 murim_faction_war_exp3.0010.desc: "A peace treaty has been signed, but paper alone cannot heal wounds that run generations deep. The martial world stands at a crossroads — a chance to build something new from the ashes, or to let the old grudges fester until the next war erupts. The choice belongs to those who survived."
 murim_faction_war_exp3.0010.a: "Establish a unified Murim. One world, one order."
 murim_faction_war_exp3.0010.b: "The old grudges remain. Nothing has changed."
 murim_faction_war_exp3.0010.c: "Peaceful coexistence. Agree to disagree."
