 # DUEL SYSTEM
 # ===========================
 murim_duel.0005.t: "A Formal Challenge"
 murim_duel.0005.desc: "A letter arrives sealed with crimson wax — the mark of a formal martial challenge. Another cultivator has publicly declared their intention to test your strength. The martial world watches. To accept is to risk everything. To refuse is to lose face."
 murim_duel.0005.a: "Accept the challenge"
 murim_duel.0005.b: "Decline honorably"




