l_english:
 murim_elder.0001.t: "The Weight of Years"
 murim_elder.0001.desc: "Time, the one enemy no cultivator can defeat. Your qi still flows strong, but you notice it takes longer to recover after intense training. Younger cultivators advance where you plateau. The peak of your physical cultivation may have passed — but wisdom has its own kind of power."
 murim_elder.0001.a: "Refuse to accept decline — push harder"
 murim_elder.0001.b: "Focus on teaching — my knowledge is my strength"
 murim_elder.0001.c: "Accept the natural order with grace"

 murim_elder.0002.t: "Choosing a Successor"
 murim_elder.0002.desc: "The question can no longer be avoided: who will lead after you? Three candidates have emerged — your most talented disciple, your strongest warrior, and your own blood heir. Each has strengths and weaknesses. The wrong choice could destroy everything you've built."
 murim_elder.0002.a: "Choose the most talented — merit above all"
 murim_elder.0002.b: "Choose the strongest — power commands respect"
 murim_elder.0002.c: "Keep them competing — the best will emerge"

 murim_elder.0003.t: "The Final Teaching"
 murim_elder.0003.desc: "You sit before your most promising students, knowing that this may be the last time you can pass on your deepest insights. The knowledge in your head — decades of battle experience, cultivation insights, techniques refined over a lifetime — must not die with you."
 murim_elder.0003.a: "Teach everything openly — hold nothing back"
 murim_elder.0003.b: "Create a written manual for future generations"
 murim_elder.0003.c: "Teach only the worthy — charge a premium"

 murim_elder.0004.t: "The Old Rival Returns"
 murim_elder.0004.desc: "A familiar face appears after decades — your greatest rival from youth, now gray-haired and weathered like you. They've come to settle an old score. 'We never finished our fight,' they say with a wry smile. 'Shall we end it properly, before time does it for us?'"
 murim_elder.0004.a: "One final duel — for old time's sake"
 murim_elder.0004.b: "Share a drink instead — we've grown past this"
 murim_elder.0004.c: "Accept, but on my terms"

 murim_elder.0005.t: "Writing the Chronicle"
 murim_elder.0005.desc: "Late at night, by candlelight, you begin writing. Not techniques or strategies — your story. The battles you won and lost, the friends who fell, the enemies who earned your respect. It's the story of the jianghu itself, told through one cultivator's life."
 murim_elder.0005.a: "Write the unvarnished truth"
 murim_elder.0005.b: "Write a version that serves your legacy"
 murim_elder.0005.c: "Burn what you've written — some things die with me"

 murim_elder.0006.t: "The Burden of Regret"
 murim_elder.0006.desc: "In the quiet hours, memories surface unbidden. The disciple you were too harsh with. The ally you abandoned. The technique you used knowing the cost. The martial path leaves scars deeper than any blade — and some wounds only open wider with time."
 murim_elder.0006.a: "Seek amends — it's not too late"
 murim_elder.0006.b: "Channel regret into renewed purpose"
 murim_elder.0006.c: "Find peace in old friendships"

 murim_elder.0007.t: "One Last Stand"
 murim_elder.0007.desc: "A threat emerges that demands everything you have — perhaps more than you have left. Younger warriors look to you, the legendary veteran, to lead. Your body aches, your qi is not what it was. But your experience, your cunning, your iron will... that hasn't faded."
 murim_elder.0007.a: "Rise to the challenge — blaze like a dying star"
 murim_elder.0007.b: "Let the young take the lead — my time has passed"
 murim_elder.0007.c: "Lead through strategy, not strength"

 murim_elder.0008.t: "The Final Transcendence"
 murim_elder.0008.desc: "After a lifetime of cultivation, you sense the boundary between mortal and immortal — the final barrier that has claimed every cultivator who dared attempt it. The celestial realm beckons. But transcendence is not guaranteed, and failure at this level could shatter your very soul."
 murim_elder.0008.a: "Attempt transcendence — destiny awaits"
 murim_elder.0008.b: "Accept mortality with peace — I am content"
 murim_elder.0008.c: "Leave transcendence to the next generation"
