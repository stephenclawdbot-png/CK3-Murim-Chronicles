l_english:

 # ==========================================
 # MURIM CHRONICLES - MODIFIER LOCALIZATION
 # All character_modifier description keys
 # POLISH PASS: Heartbeat #54 - Added BOM, added missing interaction modifier keys
 # POLISH PASS: Heartbeat #57 - Added active_training, challenge_cooldown, faction war, scout, shadow politics modifier keys
 # ==========================================

 # ---------------------
 # CULTIVATION MODIFIERS
 # ---------------------
 murim_qi_circulation_boost_desc:0 "Your qi flows smoothly through all major meridians, enhancing your body's natural vitality and martial prowess."
 murim_qi_deviation_recovery_desc:0 "You are recovering from a dangerous qi deviation. Your internal energy is chaotic and unstable, weakening your body."
 murim_breakthrough_euphoria_desc:0 "The ecstasy of a successful breakthrough fills your being. Your cultivation base has advanced, and the world seems brighter."
 murim_meridian_opening_strain_desc:0 "The strain of forcing open new meridian pathways has left your body weakened and aching."
 murim_cultivation_seclusion_desc:0 "You have withdrawn from worldly affairs to focus entirely on cultivation. Your insight grows, but you are isolated from court."
 murim_qi_stagnation_desc:0 "Your cultivation has hit a bottleneck. No matter how you meditate, your qi refuses to advance further."
 murim_heavenly_tribulation_survivor_desc:0 "You have endured the wrath of the heavens and emerged victorious. Lightning scars mark your flesh, but your spirit is unbreakable."
 murim_heavenly_tribulation_scarred_desc:0 "The heavenly tribulation left deep scars on your body and soul. You survived, but the marks of heaven's fury remain."
 murim_dual_cultivation_harmony_desc:0 "Through dual cultivation with your partner, your qi flows in perfect harmony. Both body and spirit are nourished."
 murim_core_formation_radiance_desc:0 "A golden core has formed within your dantian, radiating spiritual energy that others can sense. You have transcended mortal limits."
 murim_nascent_soul_presence_desc:0 "Your nascent soul projects an aura of overwhelming spiritual pressure. Lesser cultivators instinctively bow before your presence."
 murim_recent_breakthrough_attempt_desc:0 "You recently attempted a cultivation breakthrough. Your body and spirit need time to recover before trying again."
 murim_recent_tribulation_desc:0 "You recently faced a heavenly tribulation. The aftereffects still linger in your body."
 murim_dual_meridian_harmony_desc:0 "Two opposing meridian systems have achieved perfect balance within your body, granting extraordinary power and insight."
 murim_forbidden_technique_mastered_desc:0 "You have mastered a forbidden technique. Its dark power courses through you, feared by the orthodox and coveted by the unorthodox."

 # ---------------------
 # COMBAT MODIFIERS
 # ---------------------
 murim_battle_scarred_veteran_desc:0 "Countless battles have hardened your body and sharpened your instincts. Each scar tells a story of survival."
 murim_duel_champion_fame_desc:0 "Your name is spoken in every tea house and martial hall. A champion of duels whose reputation precedes them."
 murim_crippling_wound_lingering_desc:0 "A devastating wound from battle refuses to fully heal, leaving you permanently weakened."
 murim_killing_intent_aura_desc:0 "Years of lethal combat have imbued you with a palpable killing intent that makes others uneasy in your presence."
 murim_combat_meditation_focus_desc:0 "Through meditation on your combat experiences, you have achieved a deeper understanding of martial arts."
 murim_defeat_shame_desc:0 "The sting of a public defeat weighs heavily on your spirit. Others whisper about your loss."
 murim_deathly_combat_survivor_desc:0 "You survived a battle where death was certain. The experience has changed you in ways both visible and invisible."
 murim_ambush_trauma_desc:0 "The memory of being ambushed haunts you. You are more vigilant now, but the fear lingers."
 murim_revenge_obsession_desc:0 "A burning need for revenge consumes your thoughts. You can think of little else until the score is settled."
 murim_recent_duel_cooldown_desc:0 "You recently fought a duel and your body needs time to recover before fighting again."

 # ---------------------
 # TRAINING MODIFIERS
 # ---------------------
 murim_active_training_desc:0 "You are currently engaged in intensive martial training, pushing your body and mind to improve your cultivation and combat skills."
 murim_intense_training_regime_desc:0 "A grueling training regimen pushes your body to its limits. You grow stronger, but the strain takes its toll."

 # ---------------------
 # SECT / CLAN MODIFIERS
 # ---------------------
 murim_sect_loyalty_desc:0 "Your devotion to your clan is unwavering. Fellow members trust and respect your commitment."
 murim_sect_betrayal_desc:0 "You have betrayed your clan's trust. Former brothers and sisters regard you with contempt and suspicion."
 murim_joint_cultivation_bond_desc:0 "A deep bond formed through joint cultivation. You and your partner share a spiritual connection."
 murim_technique_exchange_insight_desc:0 "Fresh insights from exchanging martial techniques. Your understanding of combat has broadened."
 murim_poison_qi_disruption_desc:0 "Someone has poisoned your qi circulation. Your internal energy is disrupted and your body weakened."
 murim_stolen_technique_guilt_desc:0 "The guilt of stealing another's martial knowledge gnaws at your conscience. You are more cunning, but the shame persists."

 # ---------------------
 # RANKING MODIFIERS
 # ---------------------
 murim_ranked_top_50_modifier_desc:0 "You are among the Top 50 martial artists in the world. Your name is known from the Central Plains to Goryeo."
 murim_fallen_from_rankings_modifier_desc:0 "You have fallen from the martial rankings. Where once your name commanded respect, now whispers of decline follow you."
 murim_recent_challenge_cooldown_desc:0 "You recently issued a formal ranking challenge. Custom dictates you must wait before challenging again."
 murim_top_10_elite_modifier_desc:0 "You stand among the ten mightiest martial artists alive. Legends speak your name alongside the greatest in history."
 murim_strongest_under_heaven_desc:0 "Strongest Under Heaven -- the undisputed #1 in the martial world. All nine clans acknowledge your supremacy. Your mere presence commands absolute respect."

 # ---------------------
 # JIANGHU MODIFIERS
 # ---------------------
 murim_jianghu_reputation_boost_desc:0 "Your exploits in the jianghu underworld have earned you a fearsome reputation. Information brokers and black market dealers treat you with respect."
 murim_jianghu_bounty_hunted_desc:0 "A bounty has been placed on your head in the jianghu. Assassins and bounty hunters track your movements."

 # ---------------------
 # FACTION WAR MODIFIERS
 # ---------------------
 murim_orthodox_faction_fervor_desc:0 "The righteous fire of the orthodox factions burns in your heart. You fight to uphold the honor of the Murim Alliance and protect the martial world's traditions."
 murim_unorthodox_faction_fervor_desc:0 "The dark ambition of the unorthodox path empowers you. Under the Heavenly Demon's banner, you seek to overthrow the old order and forge a new martial world."
 murim_faction_war_exhaustion_desc:0 "The endless war between orthodox and unorthodox factions has drained you. Your body aches, your spirit wavers, and you wonder if the fighting will ever end."

 # ---------------------
 # SCOUT MODIFIERS
 # ---------------------
 murim_scout_traveling_desc:0 "You are currently traveling the world as a clan scout, seeking talented young martial artists to recruit for your clan."
 murim_successful_recruitment_fame_desc:0 "Your successful recruitment of promising martial talents has earned praise from your clan's leadership."

 # ---------------------
 # SHADOW POLITICS MODIFIERS
 # ---------------------
 murim_puppet_emperor_suspicion_desc:0 "Whispers circulate that the emperor may be a puppet of the Heavenly Demon Sect. Court officials grow suspicious, and your position becomes precarious."
 murim_court_infiltration_active_desc:0 "Agents of the Heavenly Demon Sect have infiltrated the imperial court. Their hidden influence shapes policy and eliminates threats from the shadows."
