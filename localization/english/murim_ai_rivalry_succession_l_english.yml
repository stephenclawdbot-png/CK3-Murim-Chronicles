l_english:
 # ===========================
 # AI AUTONOMY LOCALIZATION
 # ===========================
 murim_ai_autonomy.0001.t: "A Clan Leader's Ambition"
 murim_ai_autonomy.0001.desc: "Your clan's power has grown. The time may be ripe to assert dominance over neighboring sects."
 murim_ai_autonomy.0001.a: "Declare our intentions"
 murim_ai_autonomy.0001.b: "Bide our time"
 murim_ai_autonomy.0010.t: "A Disciple's Doubt"
 murim_ai_autonomy.0010.desc: "The treatment here has become unbearable. Perhaps another clan would value your talents more."
 murim_ai_autonomy.0010.a: "Defect to a rival clan"
 murim_ai_autonomy.0010.b: "Endure — loyalty matters"
 murim_ai_autonomy.0020.t: "Forbidden Temptation"
 murim_ai_autonomy.0020.desc: "A promising disciple has come seeking your forbidden knowledge. Teaching them would spread your dark legacy."
 murim_ai_autonomy.0020.a: "Teach them the forbidden arts"
 murim_ai_autonomy.0020.b: "Refuse — protect them from this curse"
 murim_ai_autonomy.0030.t: "The Contract"
 murim_ai_autonomy.0030.desc: "A new assassination contract has been posted. The target is well-guarded, but your Phantom Blade training makes you uniquely qualified."
 murim_ai_autonomy.0030.a: "Accept the contract"
 murim_ai_autonomy.0030.b: "Pass — too risky"
 murim_ai_autonomy.0040.t: "Cultivation Breakthrough Attempt"
 murim_ai_autonomy.0040.desc: "Your cultivation has reached a bottleneck. The only way forward is to attempt a breakthrough — success or devastation."
 murim_ai_autonomy.0040.a: "Attempt the breakthrough"
 murim_ai_autonomy.0040.b: "Continue accumulating energy"
 murim_ai_autonomy.0050.t: "Alliance Through Marriage"
 murim_ai_autonomy.0050.desc: "A marriage alliance with a neighboring clan could strengthen both sides against common threats."
 murim_ai_autonomy.0050.a: "Propose the alliance"
 murim_ai_autonomy.0050.b: "Maintain independence"
 murim_ai_autonomy.0060.t: "The Grudge Returns"
 murim_ai_autonomy.0060.desc: "Years of training have led to this moment. Your master's killer still lives. The time for vengeance has come."
 murim_ai_autonomy.0060.a: "Confront your master's killer"
 murim_ai_autonomy.0060.b: "The grudge can wait"
 murim_ai_autonomy.0070.t: "A New Sect Rises"
 murim_ai_autonomy.0070.desc: "Your power has outgrown any existing clan's capacity to contain you. Perhaps it is time to forge your own path."
 murim_ai_autonomy.0070.a: "Found a new sect"
 murim_ai_autonomy.0070.b: "Remain unaffiliated"
 murim_ai_autonomy.0080.t: "Tournament Call"
 murim_ai_autonomy.0080.desc: "A grand tournament has been announced. It's an opportunity to test your skills and raise your ranking."
 murim_ai_autonomy.0080.a: "Enter the tournament"
 murim_ai_autonomy.0080.b: "Sit this one out"

 # ===========================
 # NPC RIVALRY LOCALIZATION
 # ===========================
 murim_npc_rivalry.0001.t: "A Rival Appears"
 murim_npc_rivalry.0001.desc: "Your paths have crossed one too many times. Every meeting brings friction, every word carries a barb. This is no longer mere disagreement — this is personal."
 murim_npc_rivalry.0001.a: "Accept the rivalry"
 murim_npc_rivalry.0001.b: "Let it go"
 murim_npc_rivalry.0010.t: "Public Humiliation"
 murim_npc_rivalry.0010.desc: "Your rival has publicly insulted you before a crowd of martial artists. Your reputation demands a response."
 murim_npc_rivalry.0010.a: "Challenge them to a duel"
 murim_npc_rivalry.0010.b: "Endure the insult"
 murim_npc_rivalry.0010.c: "Respond with a cutting retort"
 murim_npc_rivalry.0020.t: "Shadow in the Night"
 murim_npc_rivalry.0020.desc: "Your rival's patience has run out. An assassin strikes from the darkness — your rival has decided to end this permanently."
 murim_npc_rivalry.0020.a: "Survive and counter-attack"
 murim_npc_rivalry.0020.b: "Barely escape — go into hiding"
 murim_npc_rivalry.0020.c: "Set a counter-trap"
 murim_npc_rivalry.0030.t: "From Rivalry to War"
 murim_npc_rivalry.0030.desc: "What began as a personal grudge has engulfed entire clans. Your rivalry has become a clan war."
 murim_npc_rivalry.0030.a: "Full clan war"
 murim_npc_rivalry.0030.b: "Keep it personal"
 murim_npc_rivalry.0030.c: "Seek mediation"
 murim_npc_rivalry.0040.t: "The Rivalry Ends"
 murim_npc_rivalry.0040.desc: "After years of conflict, the rivalry has reached its conclusion. One way or another, this chapter closes."
 murim_npc_rivalry.0040.a: "Victory — your rival submits"
 murim_npc_rivalry.0040.b: "Draw — mutual respect"
 murim_npc_rivalry.0040.c: "Third party mediates"
 murim_npc_rivalry.0050.t: "Caught in the Crossfire"
 murim_npc_rivalry.0050.desc: "Two martial artists are locked in a bitter rivalry, and both sides are seeking allies. You've been dragged into their conflict."
 murim_npc_rivalry.0050.a: "Side with the challenger"
 murim_npc_rivalry.0050.b: "Side with the defender"
 murim_npc_rivalry.0050.c: "Stay out of it"
 murim_npc_rivalry.0060.t: "Nemesis Focus"
 murim_npc_rivalry.0060.desc: "Your rivalry burns like a forge, tempering your martial arts with singular focus. Every technique is sharpened for one purpose."
 murim_npc_rivalry.0060.a: "Train for the final confrontation"
 murim_npc_rivalry.0060.b: "Seek wisdom instead of vengeance"

 # ===========================
 # SUCCESSION WAR LOCALIZATION
 # ===========================
 murim_claim_clan_leadership_decision: "Claim Clan Leadership"
 murim_claim_clan_leadership_decision_desc: "Challenge for the leadership of your clan. Only the strong, the cunning, or the charismatic survive."
 murim_claim_clan_leadership_decision_tooltip: "Begin a succession challenge"

 murim_succession.0001.t: "The Succession Challenge"
 murim_succession.0001.desc: "You have declared your intention to lead. The clan watches as candidates step forward. This will be decided by strength, politics, or both."
 murim_succession.0001.a: "Challenge through combat"
 murim_succession.0001.b: "Challenge through politics"
 murim_succession.0001.c: "Withdraw claim"
 murim_succession.0010.t: "The Leader Has Fallen"
 murim_succession.0010.desc: "Your clan's leader is dead, and no clear successor has been named. The clan teeters on the edge of chaos. Someone must step forward."
 murim_succession.0010.a: "Step forward as candidate"
 murim_succession.0010.b: "Support another candidate"
 murim_succession.0010.c: "Remain neutral"
 murim_succession.0020.t: "Succession by Combat"
 murim_succession.0020.desc: "The old ways demand it: leadership is earned in the arena. All candidates face each other in a tournament, and only the last one standing claims the title."
 murim_succession.0020.a: "Fight all challengers"
 murim_succession.0020.b: "Use underhanded tactics"
 murim_succession.0020.c: "Withdraw gracefully"
 murim_succession.0030.t: "The Clan Splits"
 murim_succession.0030.desc: "No agreement can be reached. The clan fractures along loyalty lines — some follow one candidate, others another. A once-great sect divides."
 murim_succession.0030.a: "Lead the splinter faction"
 murim_succession.0030.b: "Fight to reunify"
 murim_succession.0030.c: "Mediate between factions"
 murim_succession.0040.t: "The New Leader's Vision"
 murim_succession.0040.desc: "You have won the succession. The clan looks to you for direction. Your choices now will determine the clan's fate for a generation."
 murim_succession.0040.a: "Aggressive expansion"
 murim_succession.0040.b: "Internal cultivation focus"
 murim_succession.0040.c: "Reform and modernize"
 murim_succession.0050.t: "Assassin's Blade"
 murim_succession.0050.desc: "A rival candidate has sent assassins to remove you from the succession. The blade comes in the dark of night."
 murim_succession.0050.a: "Survive the attempt"
 murim_succession.0050.b: "Expose the rival"
 murim_succession.0050.c: "Withdraw — not worth dying for"

 # ===========================
 # BLOOD OATH ALLIANCE LOCALIZATION
 # ===========================
 murim_blood_oath.0001.t: "The Blood Oath"
 murim_blood_oath.0001.desc: "The Blood Oath Alliance demands total commitment. To join, you must cut your palm and let your blood mingle with the Alliance's sacred pool. The oath binds your life force — betrayal means death."
 murim_blood_oath.0001.a: "Take the oath"
 murim_blood_oath.0001.b: "Refuse — my blood is my own"
 murim_blood_oath.0005.t: "Blood Rage"
 murim_blood_oath.0005.desc: "The berserker fire ignites in your veins. Your vision turns crimson, pain vanishes, and your body moves with inhuman speed and power. The Blood Rage is the Alliance's greatest weapon — and its greatest curse."
 murim_blood_oath.0005.a: "Enter Blood Rage"
 murim_blood_oath.0005.b: "Control the rage"
 murim_blood_oath.0010.t: "Life-Link Combat"
 murim_blood_oath.0010.desc: "Through the blood oath, you can temporarily link your life force with an ally's. You share strength, share pain, and fight as one entity. The bond is devastating in combat — but if one falls, both may die."
 murim_blood_oath.0010.a: "Form the life-link"
 murim_blood_oath.0010.b: "Fight alone"
 murim_blood_oath.0015.t: "The Price of Betrayal"
 murim_blood_oath.0015.desc: "The blood oath burns in your veins, sensing your wavering loyalty. To break the oath is to invite the blood curse — a slow, agonizing death as your own life force turns against you."
 murim_blood_oath.0015.a: "Break the oath — accept the curse"
 murim_blood_oath.0015.b: "Endure — honor the pact"
 murim_blood_oath.0020.t: "Trial of the Chieftain"
 murim_blood_oath.0020.desc: "In the Blood Oath Alliance, strength determines leadership. The chieftain's seat is won through combat — and kept the same way."
 murim_blood_oath.0020.a: "Challenge for chieftain"
 murim_blood_oath.0020.b: "Support the current chief"
 murim_blood_oath.0035.t: "The Blood Ritual"
 murim_blood_oath.0035.desc: "The Alliance's most sacred ceremony: a blood ritual that channels collective life force into pure martial power. The ritual is ancient and brutal, but effective."
 murim_blood_oath.0035.a: "Perform the ritual"
 murim_blood_oath.0035.b: "Refuse — too cruel"
 murim_blood_oath_bound_desc: "Bound by an unbreakable blood oath to the Alliance. Betrayal triggers a lethal blood curse."
 murim_oath_breaker_desc: "Broke a sacred blood oath. Universally despised and slowly dying from the blood curse."

 # ===========================
 # CROSS-SYSTEM HOOKS LOCALIZATION
 # ===========================
 murim_cross_hooks.0001.t: "Tournament Champion's Ascent"
 murim_cross_hooks.0001.desc: "Your tournament victory has caught the attention of the ranking officials. Your position on the Murim Ranking Board is about to change."
 murim_cross_hooks.0001.a: "Accept the ranking increase"
 murim_cross_hooks.0010.t: "The Tribunal Notices"
 murim_cross_hooks.0010.desc: "Your high ranking has attracted the Heavenly Tribunal's attention. They may be considering you for a seat."
 murim_cross_hooks.0010.a: "Welcome their interest"
 murim_cross_hooks.0010.b: "Stay independent"
 murim_cross_hooks.0020.t: "War Clouds Gather"
 murim_cross_hooks.0020.desc: "Faction tensions are rising. As a clan leader, you can feel the martial world sliding toward continental war."
 murim_cross_hooks.0020.a: "Escalate — war is inevitable"
 murim_cross_hooks.0020.b: "De-escalate — peace serves us better"
 murim_cross_hooks.0020.c: "Prepare secretly"
 murim_cross_hooks.0030.t: "Vault Unsealed by Chaos"
 murim_cross_hooks.0030.desc: "The Great Calamity has destroyed the seals on an ancient forbidden technique vault. The contents are exposed for the first time in centuries."
 murim_cross_hooks.0030.a: "Raid the unsealed vault"
 murim_cross_hooks.0030.b: "Seal it — some lines must hold"
 murim_cross_hooks.0030.c: "Guard it for your clan"
 murim_cross_hooks.0040.t: "Corruption Blocks the Path"
 murim_cross_hooks.0040.desc: "Your cultivation has reached the threshold of immortality — but the corruption in your meridians blocks the ascension. The dark qi must be purged before you can transcend."
 murim_cross_hooks.0040.a: "Begin the purging process"
 murim_cross_hooks.0040.b: "Accept corruption — find another path"
 murim_cross_hooks.0040.c: "Despair"
 murim_cross_hooks.0050.t: "The Heavens Tremble"
 murim_cross_hooks.0050.desc: "A new immortal has emerged, threatening the delicate balance of power among transcendent beings. The old immortals stir."
 murim_cross_hooks.0050.a: "Challenge the other immortal"
 murim_cross_hooks.0050.b: "Propose coexistence"
 murim_cross_hooks.0050.c: "Observe from afar"
 murim_cross_hooks.0060.t: "Imperial Invitation"
 murim_cross_hooks.0060.desc: "Your ranking in the martial world has earned you an invitation from the Imperial Court. The Emperor wishes to meet the famed cultivator."
 murim_cross_hooks.0060.a: "Accept the invitation"
 murim_cross_hooks.0060.b: "Politely decline"
 murim_cross_hooks.0060.c: "Use it as leverage"
 murim_cross_hooks.0070.t: "Rivalry Threatens the Clan"
 murim_cross_hooks.0070.desc: "Your personal rivalry is destabilizing your clan. Factions form, whispers spread, and the unity that once defined your clan begins to crack."
 murim_cross_hooks.0070.a: "Let the succession crisis unfold"
 murim_cross_hooks.0070.b: "Channel rivalry into motivation"
 murim_cross_hooks.0070.c: "Resolve the rivalry immediately"

 # ===========================
 # WAR & RIVALRY TRAITS
 # ===========================
 murim_war_hero_desc: "Distinguished service in the Continental War. Honored by allies and respected by former enemies."
 murim_war_profiteer_desc: "Exploited the Continental War for personal enrichment. Wealthy but distrusted."
 murim_sworn_nemesis_desc: "Locked in a bitter rivalry with a martial artist of comparable power. Cannot rest until it is resolved."
 murim_legacy_grudge_desc: "Inherited a master's grudge against their killer. Honor demands vengeance."
