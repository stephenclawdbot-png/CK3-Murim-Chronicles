 # ---------------------
 # RANKING EVENT TITLES
 # ---------------------
 murim_rank.0001.t:0 "Entered the Martial Rankings!"
 murim_rank.0002.t:0 "Fallen From the Rankings"
 murim_rank.0003.t:0 "A Ranked Fighter Has Fallen"
 murim_rank.0004.t:0 "The New Supreme Martial Artist"
 murim_rank.0005.t:0 "A Ranked Challenge!"
 murim_rank.0006.t:0 "Annual Martial Rankings Report"
 murim_rank.0007.t:0 "A Hidden Talent Emerges!"
 murim_rank.0010.t:0 "The Grand Martial Tournament!"

 # ---------------------
 # EVENT DESCRIPTIONS
 # ---------------------
 murim_rank.0001.desc_top_10:0 "Word has spread like wildfire through the martial world -- [ROOT.GetFirstName] has been recognized among the top ten martial artists in the known world! Sect leaders whisper your name with a mixture of respect and fear. Wandering swordsmen step aside when you pass. Your very presence commands the attention of every cultivator within a hundred li."
 murim_rank.0001.desc_top_20:0 "The martial world has taken notice. [ROOT.GetFirstName] has climbed into the ranks of the top twenty fighters -- a remarkable achievement that marks you as someone to be reckoned with. Sect recruiters seek your favor, and young disciples speak your name with awe."
 murim_rank.0001.desc_top_50:0 "Through years of training, countless duels, and relentless cultivation, [ROOT.GetFirstName] has finally been recognized among the Top 50 martial artists of the realm. The Wulin rankings are not given lightly -- every name on that list was carved in blood and sweat."

 murim_rank.0002.desc:0 "[ROOT.GetFirstName] has fallen from the martial rankings. Whether through injury, defeat, or the simple passage of time as younger warriors rise, the world no longer counts you among its greatest fighters. The teahouses that once buzzed with tales of your exploits now speak other names."

 murim_rank.0003.desc:0 "News arrives that a ranked martial artist has met their end. The martial rankings shift as the fallen warrior's position is vacated, and the next in line steps up. Such is the way of the Wulin -- the rankings are written in blood, and death is the ultimate demotion."

 murim_rank.0004.desc:0 "The martial world trembles with the announcement -- [ROOT.GetFirstName] now stands at the absolute pinnacle. Number One. The Supreme Martial Artist. Every sword saint, every hidden master, every ambitious young cultivator now measures themselves against you. Your name will echo through the ages... or until someone stronger comes along."

 murim_rank.0005.desc:0 "A challenger approaches! [scope:rank_challenger.GetFirstName] has formally issued a ranking challenge, seeking to claim your position in the martial rankings through combat. The rules of the Wulin are clear -- a ranking challenge cannot be ignored without consequence. The entire martial world watches."

 murim_rank.0006.desc_elite:0 "The annual martial rankings have been tallied. [ROOT.GetFirstName] stands among the elite top five -- a position that brings immense prestige but also paints an enormous target on your back. Every ambitious fighter in the realm dreams of taking your place."
 murim_rank.0006.desc_high:0 "The yearly ranking recalculation is complete. [ROOT.GetFirstName] holds a strong position in the top twenty. Respected by many, envied by more -- your rank reflects years of dedicated cultivation and proven combat ability."
 murim_rank.0006.desc_ranked:0 "Another year, another ranking. [ROOT.GetFirstName] maintains a position within the Top 50 martial artists. It is an honor to be counted among the best, though the competition grows fiercer each season."
 murim_rank.0006.desc_unranked:0 "The annual martial rankings have been announced, and [ROOT.GetFirstName] does not appear on the list. The path to the top is long and hard."

 murim_rank.0007.desc:0 "Rumors spread through the martial world -- a previously unknown fighter has emerged with astonishing prowess! The rankings may need to be reconsidered."

 murim_rank.0010.desc:0 "The Grand Martial Tournament has been called! Warriors from across the realm gather to test their skills in formal combat. Reputations will be forged and shattered before the tournament ends."

 # ---------------------
 # EVENT OPTIONS
 # ---------------------
 murim_rank.0001.a:0 "My name shall echo through the ages!"
 murim_rank.0001.b:0 "I must train harder to maintain this position."
 murim_rank.0001.c:0 "I shall use this influence wisely."

 murim_rank.0002.a:0 "I will reclaim my place!"
 murim_rank.0002.b:0 "Perhaps it was not meant to be."
 murim_rank.0002.c:0 "Someone will pay for this humiliation."

 murim_rank.0003.a:0 "A warrior's death. They shall be remembered."
 murim_rank.0003.b:0 "This changes the balance of power."

 murim_rank.0004.a:0 "The summit is mine!"
 murim_rank.0004.b:0 "Heavy is the head that wears the crown."

 murim_rank.0005.a:0 "I accept the challenge!"
 murim_rank.0005.b:0 "I refuse -- let them call me what they will."

 murim_rank.0006.a:0 "The rankings are fair."
 murim_rank.0006.b:0 "I must improve my standing."

 murim_rank.0007.a:0 "Interesting... I should investigate this newcomer."
 murim_rank.0007.b:0 "Just another pretender."

 murim_rank.0010.a:0 "I will compete!"
 murim_rank.0010.b:0 "I shall watch from the stands."

 # ---------------------
 # TOOLTIPS
 # ---------------------
 murim_rank_embrace_fame_tt:0 "Embrace your newfound fame and bask in the prestige of your ranking."
 murim_rank_stay_humble_tt:0 "Stay humble and focus on training rather than glory."
 murim_rank_political_leverage_tt:0 "Use your martial ranking as political leverage in court."
 murim_rank_swear_reclaim_tt:0 "Swear to train harder and reclaim your lost ranking."
 murim_rank_accept_fate_tt:0 "Accept that your time in the rankings has passed."
 murim_rank_seek_vengeance_tt:0 "Seek vengeance against those who surpassed you."

 # ---------------------
 # RANKING EVENT MODIFIER DESCRIPTIONS
 # ---------------------
 murim_ranked_fame_modifier_desc:0 "Your entry into the martial rankings has brought great fame. Your name is on every warrior's lips."
 murim_ranked_focused_training_modifier_desc:0 "Rather than resting on your laurels, you train harder than ever. The rankings demand constant improvement."
 murim_ranked_political_influence_modifier_desc:0 "Your martial ranking gives you leverage in diplomatic matters. Warriors and lords alike treat your words with weight."
 murim_burning_determination_modifier_desc:0 "A fierce determination burns within you. You will reclaim your lost ranking or die trying."
 murim_ranking_acceptance_modifier_desc:0 "You have accepted the ebb and flow of the martial rankings with grace. Inner peace brings its own strength."
 murim_ranking_vengeance_modifier_desc:0 "The desire for vengeance against those who surpassed you consumes your thoughts. You will make them pay."

