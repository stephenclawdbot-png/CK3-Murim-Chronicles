l_english:
 murim_global.0001.t: "Foreign Martial Master Arrives"
 murim_global.0001.desc: "A stranger walks through the gates of the murim heartland, carrying techniques never before seen in these mountains. Their movements are alien, their stance unreadable. Rumors spread like wildfire — a foreign martial master has come, and the balance of the martial world trembles."
 murim_global.0001.a: "Challenge them — test their strength"
 murim_global.0001.b: "Welcome and recruit them to my court"
 murim_global.0001.c: "Spy on their techniques from the shadows"
 murim_global.0001.d: "Ignore them — the murim has enough problems"
 murim_global.0002.t: "Unknown Martial Style Encounter"
 murim_global.0002.desc: "On the road between provinces, you encounter a fighter whose every movement defies the patterns you know. Their stance is wrong by every school's teaching, yet devastatingly effective. You cannot read their attacks, and that makes them far more dangerous than any ranked master."
 murim_global.0002.a: "Engage and try to adapt mid-fight"
 murim_global.0002.b: "Observe their patterns without engaging"
 murim_global.0002.c: "Flee — this is too dangerous"
 murim_global.0002.d: "Try to communicate — perhaps they are friendly"
 murim_global.0003.t: "Cross-Cultural Technique Exchange"
 murim_global.0003.desc: "You sit across from a master of foreign arts, tea growing cold between you as the conversation turns to the deep mechanics of combat. Two traditions, two philosophies of the fist and blade, poised at the threshold of fusion. What you share could birth a new art — or betray your sect's secrets."
 murim_global.0003.a: "Full mutual exchange — teach and learn"
 murim_global.0003.b: "Learn without teaching — keep my secrets"
 murim_global.0003.c: "Focus on philosophy, not techniques"
 murim_global.0003.d: "Spar together repeatedly — learn through combat"
 murim_global.0004.t: "Foreign Assassination Attempt"
 murim_global.0004.desc: "A shadow moves where no shadow should be. The killing intent strikes you like ice water in the veins — an assassin trained in arts utterly foreign to the murim world has been sent to end your life. Their methods are invisible, their poisons unknown. You have seconds to react."
 murim_global.0004.a: "Trust my instincts — fight back"
 murim_global.0004.b: "Let my bodyguard intercept"
 murim_global.0004.c: "Spring my counter-trap"
 murim_global.0004.d: "Fake my own death and disappear"
 murim_global.0005.t: "World Martial Tournament"
 murim_global.0005.desc: "Once in a generation, the greatest fighters from every corner of the known world converge for the ultimate test of martial supremacy. Representatives from the steppes, the islands, the deserts, and the mountains stand ready. The champion will be crowned the World's Greatest Fighter."
 murim_global.0005.a: "Enter as a competitor"
 murim_global.0005.b: "Attend as a spectator — observe all styles"
 murim_global.0005.c: "Send my best student to represent me"
 murim_global.0005.d: "Boycott the tournament"
 murim_global.0006.t: "Berserker vs Heavenly Demon"
 murim_global.0006.desc: "Two monsters of the martial world face each other, and the earth itself seems to recoil. One burns with the mindless fury of the berserker arts, the other radiates the cold, absolute terror of the Heavenly Demon. Those watching feel their knees weaken. This is not a fight — it is a cataclysm."
 murim_global.0006.a: "FIGHT — unleash everything"
 murim_global.0006.b: "Refuse — not worth mutual destruction"
 murim_global.0006.c: "Fight at reduced power — hold back"
 murim_global.0006.d: "Turn it into a teaching moment"
 murim_global.0007.t: "Tang Clan Meets Greek Fire Alchemist"
 murim_global.0007.desc: "A foreign alchemist arrives bearing flasks of liquid fire that burns even on water — the legendary Greek Fire. The Tang Clan's poison arts have never faced a challenge like this. Two traditions of chemical warfare stand face to face: alliance could create weapons of terrible beauty, rivalry could ignite a war of annihilation."
 murim_global.0007.a: "Propose an alliance — combine poison and fire"
 murim_global.0007.b: "Challenge them — Tang poison is superior"
 murim_global.0007.c: "Trade recipes — a commercial exchange"
 murim_global.0007.d: "Kill the alchemist — too dangerous to live"
 murim_global.0008.t: "Foreign Master Challenges the Summit"
 murim_global.0008.desc: "A foreign master has declared before the entire martial world that they will defeat the strongest fighter the murim has to offer. The challenge is absolute — if the murim's champion falls, the prestige of every sect, every tradition, every master will be shattered in a single afternoon."
 murim_global.0008.a: "Accept — defend the murim world's honor"
 murim_global.0008.b: "Attend as spectator — observe all styles"
 murim_global.0008.c: "Send my best student to fight"
 murim_global.0008.d: "Boycott — refuse to dignify the challenge"
