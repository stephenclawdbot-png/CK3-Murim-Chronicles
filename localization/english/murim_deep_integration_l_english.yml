l_english:
 # ===========================
 # DEEP INTEGRATION EVENTS
 # Bridges between all 14 systems
 # ===========================

 # --- Cultivation ↔ Ascension ---
 murim_deep_link.0001.t: "The Veil Thins"
 murim_deep_link.0001.desc: "During your breakthrough, the boundary between mortal and celestial realms shimmers before your inner eye. Your cultivation has reached a threshold — the heavens are watching."
 murim_deep_link.0001.a: "Reach for the heavens"
 murim_deep_link.0001.b: "Pull back — not ready yet"
 murim_deep_link.0001.c: "The forbidden path calls instead"

 murim_deep_link.0002.t: "Deviation's Whisper"
 murim_deep_link.0002.desc: "Your cultivation deviation has left your meridians cracked. In that weakness, a dark voice whispers: there are faster paths to power. Forbidden paths."
 murim_deep_link.0002.a: "Listen to the whisper"
 murim_deep_link.0002.b: "Shut it out — heal naturally"
 murim_deep_link.0002.c: "Seek a master healer"

 murim_deep_link.0003.t: "Celestial Insight"
 murim_deep_link.0003.desc: "Deep in meditation, your consciousness expands beyond the mortal plane. You glimpse the truth of heaven's dao — knowledge that could transform your cultivation forever."
 murim_deep_link.0003.a: "Absorb the celestial knowledge"
 murim_deep_link.0003.b: "Share the insight with your sect"
 murim_deep_link.0003.c: "The knowledge is too dangerous"

 murim_deep_link.0004.t: "Qi Resonance Duel"
 murim_deep_link.0004.desc: "Your cultivation surge has caused a qi resonance with a nearby cultivator of equal power. Your energies clash involuntarily. One of you must yield — or fight."
 murim_deep_link.0004.a: "Accept the challenge"
 murim_deep_link.0004.b: "Yield and redirect your qi"
 murim_deep_link.0004.c: "Propose dual cultivation instead"

 # --- Forbidden Technique ↔ Duel/Ranking ---
 murim_deep_link.0010.t: "The Righteous Blade"
 murim_deep_link.0010.desc: "A righteous cultivator has tracked you down. They sense the dark qi in your meridians and demand you answer for your corruption — with words or with steel."
 murim_deep_link.0010.a: "Fight them"
 murim_deep_link.0010.b: "Explain your reasons"
 murim_deep_link.0010.c: "Flee into the shadows"

 murim_deep_link.0011.t: "Tournament Scandal"
 murim_deep_link.0011.desc: "During the tournament, your forbidden technique was partially revealed. Whispers spread through the arena. The ranking officials are conferring urgently."
 murim_deep_link.0011.a: "Deny everything"
 murim_deep_link.0011.b: "Reveal your full power"
 murim_deep_link.0011.c: "Withdraw before they investigate"

 murim_deep_link.0012.t: "Shadow Market Intelligence"
 murim_deep_link.0012.desc: "Your forbidden knowledge has attracted attention from the shadow politics underground. An information broker offers you a deal: your dark techniques for their intelligence network."
 murim_deep_link.0012.a: "Accept the partnership"
 murim_deep_link.0012.b: "Refuse — too dangerous"
 murim_deep_link.0012.c: "Turn them in to the tribunal"

 murim_deep_link.0013.t: "The Orthodox Hunter"
 murim_deep_link.0013.desc: "An orthodox sect has assigned a dedicated hunter to track forbidden technique users. This one is skilled, relentless, and has your scent. A rivalry is born."
 murim_deep_link.0013.a: "Confront the hunter"
 murim_deep_link.0013.b: "Lead them on a wild chase"
 murim_deep_link.0013.c: "Set a trap"

 # --- Imperial Court ↔ Shadow Politics/Tribunal ---
 murim_deep_link.0020.t: "The Emperor's Shadow"
 murim_deep_link.0020.desc: "While carrying out imperial duties, you stumble upon a shadow politics operation targeting the throne itself. Powerful cultivators are plotting against the Emperor."
 murim_deep_link.0020.a: "Report to the Emperor"
 murim_deep_link.0020.b: "Join the conspiracy"
 murim_deep_link.0020.c: "Sell the information"

 murim_deep_link.0021.t: "Imperial Investigation"
 murim_deep_link.0021.desc: "The Emperor has ordered the Heavenly Tribunal to investigate a powerful sect suspected of harboring forbidden technique users. You're caught in the middle."
 murim_deep_link.0021.a: "Cooperate with the investigation"
 murim_deep_link.0021.b: "Warn the sect"
 murim_deep_link.0021.c: "Use this for personal advantage"

 murim_deep_link.0022.t: "Court Assassination"
 murim_deep_link.0022.desc: "An imperial official has quietly posted an assassination contract through the shadow politics network. The target: a tribunal judge who ruled against the court's interests."
 murim_deep_link.0022.a: "Accept the contract"
 murim_deep_link.0022.b: "Warn the judge"
 murim_deep_link.0022.c: "Blackmail the official"

 murim_deep_link.0023.t: "Imperial Favor Shifts"
 murim_deep_link.0023.desc: "The Emperor's favor has shifted to a rival clan. Your clan's standing at court plummets. Resources dry up, alliances waver, and vultures circle."
 murim_deep_link.0023.a: "Fight to regain favor"
 murim_deep_link.0023.b: "Become self-sufficient"
 murim_deep_link.0023.c: "Plot against the favored clan"

 murim_deep_link.0024.t: "Seeds of Rebellion"
 murim_deep_link.0024.desc: "The Emperor's latest edict has pushed the martial world too far. Whispers of rebellion spread through the shadow politics networks. If war comes, the entire continent will burn."
 murim_deep_link.0024.a: "Fan the flames of rebellion"
 murim_deep_link.0024.b: "Remain loyal to the throne"
 murim_deep_link.0024.c: "Position yourself to profit either way"

 # --- Tournament ↔ Romance/Ranking/Rivalry ---
 murim_deep_link.0030.t: "Victory's Reward"
 murim_deep_link.0030.desc: "Your tournament victory has made you the talk of the martial world. Among the admirers, one catches your eye — a cultivator from a rival sect, watching you with undisguised interest."
 murim_deep_link.0030.a: "Approach them"
 murim_deep_link.0030.b: "Focus on your ranking"
 murim_deep_link.0030.c: "A warrior has no time for romance"

 murim_deep_link.0031.t: "The Bitter Loser"
 murim_deep_link.0031.desc: "Your tournament opponent refuses to accept defeat. They swear revenge before the entire crowd. The hatred in their eyes is real — this is no longer sport."
 murim_deep_link.0031.a: "Accept the rivalry"
 murim_deep_link.0031.b: "Offer reconciliation"
 murim_deep_link.0031.c: "Crush them publicly to end it"

 murim_deep_link.0032.t: "Imperial Summons After Victory"
 murim_deep_link.0032.desc: "Your tournament performance has reached the imperial palace. A court messenger arrives with a gilded scroll: the Emperor requests your presence at the capital."
 murim_deep_link.0032.a: "Accept the summons"
 murim_deep_link.0032.b: "Politely decline"
 murim_deep_link.0032.c: "Use it as leverage with your sect"

 murim_deep_link.0033.t: "The Prodigy's Dilemma"
 murim_deep_link.0033.desc: "A young tournament prodigy has caught everyone's attention. Multiple sects are offering recruitment packages. As a sect leader, you must act fast or lose this talent to a rival."
 murim_deep_link.0033.a: "Offer generous terms"
 murim_deep_link.0033.b: "Sabotage rival offers"
 murim_deep_link.0033.c: "Let them come naturally"

 murim_deep_link.0034.t: "Tournament Cheating Exposed"
 murim_deep_link.0034.desc: "Evidence surfaces that a tournament participant used forbidden techniques during their matches. The ranking board is in chaos. The Tribunal demands an investigation."
 murim_deep_link.0034.a: "Support the investigation"
 murim_deep_link.0034.b: "Cover it up — they're from your sect"
 murim_deep_link.0034.c: "Use this to discredit a rival"

 # --- Calamity ↔ Everything ---
 murim_deep_link.0040.t: "Enemy of My Enemy"
 murim_deep_link.0040.desc: "The calamity has forced the impossible: your sworn nemesis stands beside you against a greater threat. Every instinct screams to attack them — but the demons are worse."
 murim_deep_link.0040.a: "Fight alongside your rival"
 murim_deep_link.0040.b: "Let the demons handle your rival"
 murim_deep_link.0040.c: "Use the chaos to settle the score"

 murim_deep_link.0041.t: "Tournament of Ashes"
 murim_deep_link.0041.desc: "The annual Grand Tournament was mid-match when the calamity struck. The arena is in ruins, contestants scattered. Some are injured, some missing. The tournament must be abandoned — or continued as a symbol of defiance."
 murim_deep_link.0041.a: "Continue the tournament — defy the calamity"
 murim_deep_link.0041.b: "Abandon it — survival first"
 murim_deep_link.0041.c: "Rescue the injured contestants"

 murim_deep_link.0042.t: "Desperate Power"
 murim_deep_link.0042.desc: "The calamity has pushed you to the brink. Your sect is falling, your disciples are dying. There is one option left: the forbidden technique you swore never to use."
 murim_deep_link.0042.a: "Use the forbidden technique"
 murim_deep_link.0042.b: "Find another way"
 murim_deep_link.0042.c: "Accept defeat and retreat"

 murim_deep_link.0043.t: "Scouts in the Storm"
 murim_deep_link.0043.desc: "The calamity has changed the landscape. Your clan scouts report new power dynamics: destroyed sects, displaced cultivators, unclaimed territories. The information is gold."
 murim_deep_link.0043.a: "Claim the unclaimed territories"
 murim_deep_link.0043.b: "Offer shelter to displaced cultivators"
 murim_deep_link.0043.c: "Sell the intelligence to the highest bidder"

 murim_deep_link.0044.t: "Succession in Ruins"
 murim_deep_link.0044.desc: "The calamity killed your clan's leader and most of the elder council. The succession is chaos — three factions are forming, and the clan may splinter if no one acts fast."
 murim_deep_link.0044.a: "Claim leadership by force"
 murim_deep_link.0044.b: "Support the strongest candidate"
 murim_deep_link.0044.c: "Mediate and hold elections"

 murim_deep_link.0045.t: "Lost in the Storm"
 murim_deep_link.0045.desc: "The calamity has torn your beloved from you. Whether dead or simply lost in the chaos, you don't know. The grief threatens to consume you — or forge you into something harder."
 murim_deep_link.0045.a: "Search for them, no matter the cost"
 murim_deep_link.0045.b: "Channel grief into vengeance against the calamity"
 murim_deep_link.0045.c: "Accept the loss and move forward"

 # --- Jianghu ↔ Clan Scout/Romance ---
 murim_deep_link.0050.t: "Tavern Encounter"
 murim_deep_link.0050.desc: "In a dusty jianghu tavern, your eyes meet those of a mysterious cultivator across the room. There's something magnetic about them — and something dangerous."
 murim_deep_link.0050.a: "Approach and introduce yourself"
 murim_deep_link.0050.b: "Observe from a distance"
 murim_deep_link.0050.c: "Leave — trouble follows beauty"

 murim_deep_link.0051.t: "The Broker's Price"
 murim_deep_link.0051.desc: "A jianghu information broker has intelligence your clan scouts desperately need: the location of a rival sect's hidden base. But the price is steep — and may involve betraying an ally."
 murim_deep_link.0051.a: "Pay the price"
 murim_deep_link.0051.b: "Negotiate a better deal"
 murim_deep_link.0051.c: "Take the information by force"

 murim_deep_link.0052.t: "Whispers at the Tea House"
 murim_deep_link.0052.desc: "While resting at a jianghu tea house, you overhear a conversation about a shadow politics assassination plot. The target is someone you know."
 murim_deep_link.0052.a: "Warn the target"
 murim_deep_link.0052.b: "Sell the information"
 murim_deep_link.0052.c: "Do nothing — not your problem"

 murim_deep_link.0053.t: "The Wandering Merchant"
 murim_deep_link.0053.desc: "A traveling merchant in the jianghu offers you something rare: a cultivation pill of extraordinary purity. But they want something unusual in return — a favor, to be named later."
 murim_deep_link.0053.a: "Accept the deal"
 murim_deep_link.0053.b: "Refuse — unnamed favors are traps"
 murim_deep_link.0053.c: "Counter-offer with gold"

 murim_deep_link.0054.t: "The Disguised Agent"
 murim_deep_link.0054.desc: "The friendly jianghu wanderer you've been traveling with slips up — you catch a glimpse of an imperial seal hidden in their belongings. They're a court spy."
 murim_deep_link.0054.a: "Confront them directly"
 murim_deep_link.0054.b: "Feed them false information"
 murim_deep_link.0054.c: "Report them to the shadow politics network"

 # --- Ascension ↔ Continental War/Tribunal ---
 murim_deep_link.0060.t: "Immortal on the Battlefield"
 murim_deep_link.0060.desc: "A newly ascended half-immortal has entered the continental war. Their power dwarfs any mortal cultivator's. Whichever side they choose will likely win. Both factions are scrambling to recruit them."
 murim_deep_link.0060.a: "Recruit the immortal to your side"
 murim_deep_link.0060.b: "Assassinate them before they choose"
 murim_deep_link.0060.c: "Propose the immortal remain neutral"

 murim_deep_link.0061.t: "Above the Law?"
 murim_deep_link.0061.desc: "The Heavenly Tribunal convenes a special session: should immortal cultivators be subject to Murim law? The debate splits the judges. Your opinion could tip the balance."
 murim_deep_link.0061.a: "Immortals must obey the law"
 murim_deep_link.0061.b: "Immortals are beyond mortal law"
 murim_deep_link.0061.c: "New laws specifically for immortals"

 murim_deep_link.0062.t: "Ascending in Wartime"
 murim_deep_link.0062.desc: "Your ascension attempt comes at the worst possible time — the continental war rages around you. The tribulation lightning will attract every combatant within miles."
 murim_deep_link.0062.a: "Attempt ascension anyway"
 murim_deep_link.0062.b: "Wait for the war to end"
 murim_deep_link.0062.c: "Use the war's chaos as cover"

 murim_deep_link.0063.t: "The Immortal's Legacy"
 murim_deep_link.0063.desc: "As a half-immortal, your disciples have grown powerful under your guidance. Too powerful. Two of them now vie for your legacy, and the succession threatens to tear your sect apart."
 murim_deep_link.0063.a: "Choose one successor clearly"
 murim_deep_link.0063.b: "Let them compete"
 murim_deep_link.0063.c: "Divide your legacy between them"

 murim_deep_link.0064.t: "Heaven's Tribulation Duel"
 murim_deep_link.0064.desc: "You were mid-duel when heaven's tribulation struck. The tribulation lightning doesn't distinguish between you and your opponent. Now you must survive both the duel AND divine judgment."
 murim_deep_link.0064.a: "Focus on surviving the tribulation"
 murim_deep_link.0064.b: "Redirect the lightning at your opponent"
 murim_deep_link.0064.c: "Abandon the duel and flee"

