l_english:
 # ==========================================
 # HEARTBEAT 64 LOCALIZATION
 # Great Calamity Expansion + Iron Fist + Poison Flower + Phantom Blade + Shadow Politics
 # ==========================================

 # === GREAT CALAMITY EXPANSION EVENTS ===
 murim_great_calamity_expansion.0001.t:0 "Ashes of the Old World"
 murim_great_calamity_expansion.0001.desc:0 "The dust has settled. The screams have stopped. Where once stood the great sects of the martial world, now only ruins remain. Corpses of masters who once shook heaven and earth lie scattered like fallen leaves. You stand among the wreckage, one of the precious few who survived the Great Calamity. The air itself tastes of death and ash. What will you do with this terrible gift of survival?"
 murim_great_calamity_expansion.0001.a:0 "I vow to rebuild the martial world from these ashes!"
 murim_great_calamity_expansion.0001.b:0 "Search the ruins for lost techniques and treasures..."
 murim_great_calamity_expansion.0001.c:0 "Mourn in silence. The era is truly over."

 murim_great_calamity_expansion.0002.t:0 "The Last Elder Speaks"
 murim_great_calamity_expansion.0002.desc:0 "An ancient elder, their body broken but spirit undefeated, calls you to their side. They are the last living keeper of knowledge from before the Calamity — techniques, histories, and secrets that will die with them unless someone listens. Their breath comes in ragged gasps as they reach for your hand."
 murim_great_calamity_expansion.0002.a:0 "Record every word. This history must not be lost."
 murim_great_calamity_expansion.0002.b:0 "Teach me your final technique before you pass."
 murim_great_calamity_expansion.0002.c:0 "Hold their hand. Let them go in peace."

 murim_great_calamity_expansion.0003.t:0 "Founding a New Sect"
 murim_great_calamity_expansion.0003.desc:0 "The time has come. With the old sects destroyed and the martial world in ruins, someone must take the first step toward rebuilding. You have the skill, the will, and the survivors' respect. The question is: what kind of sect will rise from these ashes?"
 murim_great_calamity_expansion.0003.a:0 "Found an Orthodox sect — justice and righteousness shall prevail."
 murim_great_calamity_expansion.0003.b:0 "Found an Unorthodox sect — only power matters in this new world."
 murim_great_calamity_expansion.0003.c:0 "Found a Neutral sect — balance between light and dark."

 murim_great_calamity_expansion.0004.t:0 "Mythology of the Previous Era"
 murim_great_calamity_expansion.0004.desc:0 "The children born after the Calamity gather around the fire, eyes wide with wonder. They have never known the old martial world — to them, the great sects and legendary masters are nothing but stories. But what kind of stories will be told? The truth, or something more... inspirational?"
 murim_great_calamity_expansion.0004.a:0 "Preserve the true history, with all its darkness."
 murim_great_calamity_expansion.0004.b:0 "Embellish the legends — make the old masters into gods."
 murim_great_calamity_expansion.0004.c:0 "Let the old era die. Focus on the future."

 murim_great_calamity_expansion.0005.t:0 "First Disciples of the New Sect"
 murim_great_calamity_expansion.0005.desc:0 "Word has spread of your new sect. From across the devastated land, the desperate and the hopeful come seeking shelter and purpose. The first to arrive is a young person with fire in their eyes and calluses on their hands. They kneel before you and ask to be accepted as your disciple."
 murim_great_calamity_expansion.0005.a:0 "Welcome, disciple. Your training begins now."
 murim_great_calamity_expansion.0005.b:0 "First, you must pass a test. Only the worthy may join."
 murim_great_calamity_expansion.0005.c:0 "I am not yet ready to teach. Come back later."

 murim_great_calamity_expansion.0006.t:0 "A Rival Sect Emerges"
 murim_great_calamity_expansion.0006.desc:0 "Another survivor of the Calamity has founded their own sect, and it grows rapidly. Their philosophy clashes with yours, and their ambition is clear — they intend to dominate the new martial world. The rivalry of the old era seems destined to repeat itself."
 murim_great_calamity_expansion.0006.a:0 "Challenge them to a duel for supremacy!"
 murim_great_calamity_expansion.0006.b:0 "Propose an alliance — two sects with shared purpose."
 murim_great_calamity_expansion.0006.c:0 "Ignore them. The martial world is vast enough for both."

 murim_great_calamity_expansion.0007.t:0 "The Calamity Cycle Warning"
 murim_great_calamity_expansion.0007.desc:0 "A wandering prophet appears at your gates, eyes wild with visions. 'The Calamity is not a random event,' they cry. 'It is a cycle! Every 150 to 200 years, when the martial world reaches its peak, the heavens reset everything. It has happened before. It will happen again. Unless someone breaks the cycle.'"
 murim_great_calamity_expansion.0007.a:0 "Heed the warning. Begin preparing defenses."
 murim_great_calamity_expansion.0007.b:0 "Dismiss this as superstition and madness."
 murim_great_calamity_expansion.0007.c:0 "Seek the source of the cycle — and break it."

 murim_great_calamity_expansion.0008.t:0 "Children Born After the Calamity"
 murim_great_calamity_expansion.0008.desc:0 "Your child has come of age in a world they never knew was broken. To them, the ruins are just the landscape, and the stories of the old sects are fairy tales. But you remember. You survived. Now you must decide: will you pass on the burden of the old world, or shield them from it?"
 murim_great_calamity_expansion.0008.a:0 "Train them in the old ways. Tradition must be preserved."
 murim_great_calamity_expansion.0008.b:0 "Teach them a new path. The old ways failed us."
 murim_great_calamity_expansion.0008.c:0 "Shield them from the martial world entirely."

 murim_great_calamity_expansion.0009.t:0 "Quest to Break the Cycle"
 murim_great_calamity_expansion.0009.desc:0 "Your investigation into the root cause of the cyclical Calamity has led you deep into forbidden territory. Ancient texts speak of a Heavenly Dao imbalance, a cosmic artifact, or perhaps the martial world itself is simply not meant to exceed a certain level of power."
 murim_great_calamity_expansion.0009.a:0 "The Heavenly Dao is imbalanced. Seek enlightenment."
 murim_great_calamity_expansion.0009.b:0 "Find and destroy the Calamity Artifact."
 murim_great_calamity_expansion.0009.c:0 "Accept the cycle as natural law."

 murim_great_calamity_expansion.0010.t:0 "Dawn of the New Era"
 murim_great_calamity_expansion.0010.desc:0 "Decades have passed since the Great Calamity. New sects have risen. New techniques have been created. New rivalries have formed. The martial world lives again — different, perhaps humbler, but alive. It is time to mark this moment. The New Era has officially begun."
 murim_great_calamity_expansion.0010.a:0 "Declare a Grand Assembly to formalize the new order."
 murim_great_calamity_expansion.0010.b:0 "Claim the title of Supreme Martial Lord."
 murim_great_calamity_expansion.0010.c:0 "Step back. Let the new generation lead."

 # === IRON FIST GATE EXPANSION 3 EVENTS ===
 murim_iron_fist_expansion3.0001.t:0 "The Iron Body Perfection Trial"
 murim_iron_fist_expansion3.0001.desc:0 "The ultimate test of Iron Fist Gate martial arts: the Seven-Day Iron Tempering. For seven days and nights, you must endure a gauntlet of stone, fire, and ice that will either forge your body into living iron or shatter it forever. Only three disciples in Iron Fist history have achieved Iron Body Perfection."
 murim_iron_fist_expansion3.0001.a:0 "Begin the Seven-Day Iron Tempering!"
 murim_iron_fist_expansion3.0001.b:0 "Study the theory first. Attempt it when I am stronger."
 murim_iron_fist_expansion3.0001.c:0 "The risk is too great. I refuse the trial."

 murim_iron_fist_expansion3.0002.t:0 "The Granite Fist Succession"
 murim_iron_fist_expansion3.0002.desc:0 "The current Iron Fist Gate Master grows old and frail. A succession struggle brews between you and a rival — the strongest fighters of the new generation. By Iron Fist tradition, the successor must prove themselves worthy. But tradition has many interpretations."
 murim_iron_fist_expansion3.0002.a:0 "Challenge them directly — the Iron Fist way!"
 murim_iron_fist_expansion3.0002.b:0 "Undermine the rival politically among the elders."
 murim_iron_fist_expansion3.0002.c:0 "Support the rival and become their right hand."

 murim_iron_fist_expansion3.0003.t:0 "The Forbidden Iron Blood Art"
 murim_iron_fist_expansion3.0003.desc:0 "Hidden in a sealed chamber beneath the training grounds, you discover ancient scrolls describing the Iron Blood Art — a forbidden technique that fuses qi with blood to create unstoppable destructive power. It was sealed for a reason: three masters who attempted it were consumed by madness."
 murim_iron_fist_expansion3.0003.a:0 "Learn it. I am strong enough to withstand the danger."
 murim_iron_fist_expansion3.0003.b:0 "Seal it away again. It is too dangerous for anyone."
 murim_iron_fist_expansion3.0003.c:0 "Destroy it completely. No one should have this power."

 murim_iron_fist_expansion3.0004.t:0 "Trade Route Protection Contract"
 murim_iron_fist_expansion3.0004.desc:0 "A wealthy merchant guild approaches Iron Fist Gate with a lucrative proposal: protect their trade route through bandit-infested mountains. The pay is generous, but the work is beneath a true martial artist... or is it? Gold is gold."
 murim_iron_fist_expansion3.0004.a:0 "Accept the contract. Guard the route with full force."
 murim_iron_fist_expansion3.0004.b:0 "Demand triple the payment. Iron Fist does not come cheap."
 murim_iron_fist_expansion3.0004.c:0 "Decline. Iron Fist Gate is not for hire."

 murim_iron_fist_expansion3.0005.t:0 "Bandit Ambush!"
 murim_iron_fist_expansion3.0005.desc:0 "Bandits swarm from the mountain passes, blades gleaming in the dawn light! They thought the trade route was easy prey — they did not expect Iron Fist Gate warriors. Time to show them why Iron Fist is feared across the jianghu."
 murim_iron_fist_expansion3.0005.a:0 "Crush them with overwhelming force!"
 murim_iron_fist_expansion3.0005.b:0 "Capture the bandit leader alive for interrogation."
 murim_iron_fist_expansion3.0005.c:0 "Let the junior disciples handle it. Good training."

 murim_iron_fist_expansion3.0006.t:0 "Iron Fist vs Heavenly Demon Clash"
 murim_iron_fist_expansion3.0006.desc:0 "The ancient enmity between Iron Fist Gate and the Heavenly Demon Sect erupts once more. A Demon Sect champion has appeared at your border, issuing a challenge that cannot be ignored without losing face. Iron versus Darkness — the eternal struggle continues."
 murim_iron_fist_expansion3.0006.a:0 "Fight with the full power of Iron Fist!"
 murim_iron_fist_expansion3.0006.b:0 "Propose a ceasefire. Bigger threats exist."
 murim_iron_fist_expansion3.0006.c:0 "Retreat strategically. Fight another day."

 murim_iron_fist_expansion3.0007.t:0 "Training Grounds Expansion"
 murim_iron_fist_expansion3.0007.desc:0 "Iron Fist Gate's legendary mountain training grounds have served the sect for generations, but they can be improved. With sufficient investment, new facilities could dramatically increase the quality of training for all disciples."
 murim_iron_fist_expansion3.0007.a:0 "Build the Iron Pillar Forest for strength training."
 murim_iron_fist_expansion3.0007.b:0 "Construct the Boulder Canyon for endurance training."
 murim_iron_fist_expansion3.0007.c:0 "Open the grounds to allied clans — for a fee."

 murim_iron_fist_expansion3.0008.t:0 "The Elder's Final Lesson"
 murim_iron_fist_expansion3.0008.desc:0 "The oldest living elder of Iron Fist Gate, a master who has seen three generations of disciples rise and fall, summons you to their chamber. Their body is failing, but their mind is razor sharp. They wish to pass on the ultimate secret of Iron Fist martial arts — a truth that transcends mere technique."
 murim_iron_fist_expansion3.0008.a:0 "Absorb every word. This is the ultimate fist truth."
 murim_iron_fist_expansion3.0008.b:0 "Question the elder's assumptions. Challenge tradition."
 murim_iron_fist_expansion3.0008.c:0 "Ask them to write it down for future generations."

 # === POISON FLOWER PALACE EXPANSION 2 EVENTS ===
 murim_poison_flower_expansion2.0001.t:0 "The Thousand Petal Poison Refinement"
 murim_poison_flower_expansion2.0001.desc:0 "The Thousand Petal Poison — legendary, lethal, beautiful. To master it, one must ingest a thousand different flower petals, each more toxic than the last, building immunity through suffering. Many have died attempting this. Those who survived became the most feared poisoners in the martial world."
 murim_poison_flower_expansion2.0001.a:0 "Ingest the petals one by one. Build the immunity."
 murim_poison_flower_expansion2.0001.b:0 "Research the poison theoretically first."
 murim_poison_flower_expansion2.0001.c:0 "The poison arts path is too dangerous. Refuse."

 murim_poison_flower_expansion2.0002.t:0 "The Palace Mistress Selection"
 murim_poison_flower_expansion2.0002.desc:0 "The time has come to select the next Mistress of Poison Flower Palace. The competition is fierce — only the most skilled, cunning, and ruthless shall lead. Your rival watches you from across the chamber with calculating eyes."
 murim_poison_flower_expansion2.0002.a:0 "Compete through a demonstration of poison mastery."
 murim_poison_flower_expansion2.0002.b:0 "Undermine the rival with gossip and manipulation."
 murim_poison_flower_expansion2.0002.c:0 "Support the rival and become her trusted advisor."

 murim_poison_flower_expansion2.0003.t:0 "The Forbidden Love Poison"
 murim_poison_flower_expansion2.0003.desc:0 "Among the Palace's most forbidden creations: a poison that does not kill, but creates genuine feelings of love and devotion in its victim. Ethical nightmare or ultimate weapon? The vial glows with an otherworldly pink light in your hands."
 murim_poison_flower_expansion2.0003.a:0 "Use it for political advantage. Power is power."
 murim_poison_flower_expansion2.0003.b:0 "Study it to create an antidote against it."
 murim_poison_flower_expansion2.0003.c:0 "Destroy it. Love should never be manufactured."

 murim_poison_flower_expansion2.0004.t:0 "The Poison Garden Expansion"
 murim_poison_flower_expansion2.0004.desc:0 "Poison Flower Palace's legendary garden requires new specimens to maintain the sect's poisoning supremacy. Rare and exotic species from distant lands could revolutionize the Palace's arsenal."
 murim_poison_flower_expansion2.0004.a:0 "Import rare toxic flowers from the southern seas."
 murim_poison_flower_expansion2.0004.b:0 "Cultivate the legendary Seven-Colored Death Bloom."
 murim_poison_flower_expansion2.0004.c:0 "Open the garden to allies for healing herbs."

 murim_poison_flower_expansion2.0005.t:0 "Assassination Contract"
 murim_poison_flower_expansion2.0005.desc:0 "A shadowy figure arrives at the Palace with a contract worth a fortune. The target is a prominent martial artist. Poison Flower Palace has the skills — but does it have the will to cross this line?"
 murim_poison_flower_expansion2.0005.a:0 "Accept. Execute with poison precision."
 murim_poison_flower_expansion2.0005.b:0 "Accept, but use a non-lethal poison instead."
 murim_poison_flower_expansion2.0005.c:0 "Reject. Poison Flower Palace has honor."

 murim_poison_flower_expansion2.0006.t:0 "Orthodox Alliance Confrontation"
 murim_poison_flower_expansion2.0006.desc:0 "A coalition of orthodox sects has arrived at the Palace gates, demanding that Poison Flower cease all 'dark arts.' They threaten military action if the Palace does not comply. The air crackles with tension."
 murim_poison_flower_expansion2.0006.a:0 "Defy them! Prepare the poison defenses."
 murim_poison_flower_expansion2.0006.b:0 "Negotiate. Offer antidotes as a goodwill gesture."
 murim_poison_flower_expansion2.0006.c:0 "Relocate the Palace to a hidden location."

 murim_poison_flower_expansion2.0007.t:0 "The Male Disciple Exception"
 murim_poison_flower_expansion2.0007.desc:0 "A rare occurrence: a young man kneels before the Palace gates, begging to be accepted as a disciple. Poison Flower Palace has been exclusively female for centuries. Yet his talent with herbs is undeniable. Tradition clashes with pragmatism."
 murim_poison_flower_expansion2.0007.a:0 "Accept him. Talent knows no gender."
 murim_poison_flower_expansion2.0007.b:0 "Accept as an outer disciple only — limited access."
 murim_poison_flower_expansion2.0007.c:0 "Reject. Tradition must be maintained."

 murim_poison_flower_expansion2.0008.t:0 "The Universal Antidote Breakthrough"
 murim_poison_flower_expansion2.0008.desc:0 "Years of research have culminated in the impossible: a universal poison antidote. This single compound can neutralize any known poison. In the right hands, it could save countless lives. In the wrong hands, it could render Poison Flower Palace completely irrelevant."
 murim_poison_flower_expansion2.0008.a:0 "Share it with the martial world. Earn universal respect."
 murim_poison_flower_expansion2.0008.b:0 "Keep it secret. Knowledge is power."
 murim_poison_flower_expansion2.0008.c:0 "Sell it to the highest bidder."

 # === PHANTOM BLADE SECT EXPANSION 2 EVENTS ===
 murim_phantom_blade_expansion2.0001.t:0 "The Phantom Step Perfection Trial"
 murim_phantom_blade_expansion2.0001.desc:0 "The Phantom Step — the ability to move so swiftly that you become invisible to the naked eye. To achieve perfection, one must train for 49 days in complete darkness, relying only on the blade's spirit to guide movement. The risk: permanent blindness if the darkness claims your sight."
 murim_phantom_blade_expansion2.0001.a:0 "Enter 49 days of darkness training!"
 murim_phantom_blade_expansion2.0001.b:0 "Seek a master who already perfected the technique."
 murim_phantom_blade_expansion2.0001.c:0 "My current level is sufficient."

 murim_phantom_blade_expansion2.0002.t:0 "The Shadow Blade Auction"
 murim_phantom_blade_expansion2.0002.desc:0 "In the underground markets, a blade of legendary repute has surfaced for auction — the Shadow Drinker, said to have been forged in moonlight and tempered in the blood of a hundred warriors. Every assassin and blade artist in the jianghu wants it."
 murim_phantom_blade_expansion2.0002.a:0 "Outbid everyone. The blade must be ours."
 murim_phantom_blade_expansion2.0002.b:0 "Steal it during the chaos of the auction."
 murim_phantom_blade_expansion2.0002.c:0 "Let it go. A blade does not make the warrior."

 murim_phantom_blade_expansion2.0003.t:0 "The Blade Spirit Communion"
 murim_phantom_blade_expansion2.0003.desc:0 "Your blade hums with an energy that goes beyond mere qi. There is a spirit within — an echo of every warrior who has wielded this weapon. It calls to you, offering to share its power. But merging consciousness with a weapon spirit is not without grave risk."
 murim_phantom_blade_expansion2.0003.a:0 "Merge consciousness with the blade spirit."
 murim_phantom_blade_expansion2.0003.b:0 "Respectfully ask for guidance only."
 murim_phantom_blade_expansion2.0003.c:0 "Dominate the spirit with raw willpower."

 murim_phantom_blade_expansion2.0004.t:0 "Assassination Contract: Political Target"
 murim_phantom_blade_expansion2.0004.desc:0 "A sealed letter arrives bearing a golden seal. Inside: a contract to eliminate a political figure of considerable power. The pay is extraordinary. The risk is equally so. Phantom Blade Sect has always walked the line between shadow and light."
 murim_phantom_blade_expansion2.0004.a:0 "Accept. A clean kill with the Phantom Blade art."
 murim_phantom_blade_expansion2.0004.b:0 "Warn the target instead. Double agent play."
 murim_phantom_blade_expansion2.0004.c:0 "Decline. Even assassins have codes."

 murim_phantom_blade_expansion2.0005.t:0 "Internal Power Struggle"
 murim_phantom_blade_expansion2.0005.desc:0 "Two factions within Phantom Blade Sect have reached a breaking point. The Traditionalists cling to the old assassination codes, while the Reformists want to evolve into something more. Both sides want your support."
 murim_phantom_blade_expansion2.0005.a:0 "Side with the Traditionalists. Honor the old ways."
 murim_phantom_blade_expansion2.0005.b:0 "Side with the Reformists. Evolve or die."
 murim_phantom_blade_expansion2.0005.c:0 "Play both sides. Emerge as the kingmaker."

 murim_phantom_blade_expansion2.0006.t:0 "The Moonlit Blade Dance"
 murim_phantom_blade_expansion2.0006.desc:0 "Once per decade, when the moon is fullest and the stars align just so, Phantom Blade practitioners gather for the Moonlit Blade Dance — an ancient ceremony where blade and moonlight become one. Those who perform the dance under perfect conditions are said to transcend mortal limits."
 murim_phantom_blade_expansion2.0006.a:0 "Perform the full Moonlit Blade Dance!"
 murim_phantom_blade_expansion2.0006.b:0 "Watch and study the movements of others."
 murim_phantom_blade_expansion2.0006.c:0 "Meditate under the moonlight instead."

 murim_phantom_blade_expansion2.0007.t:0 "The Exile Returns"
 murim_phantom_blade_expansion2.0007.desc:0 "A figure emerges from the mist — someone the sect thought dead or gone forever. A former member, disgraced and banished years ago, has returned. They carry a blade that pulses with dark energy and a look in their eyes that speaks of either redemption or revenge."
 murim_phantom_blade_expansion2.0007.a:0 "Draw your blade. Exiles have no place here."
 murim_phantom_blade_expansion2.0007.b:0 "Hear their plea. Perhaps redemption is possible."
 murim_phantom_blade_expansion2.0007.c:0 "Extract their knowledge, then banish them again."

 murim_phantom_blade_expansion2.0008.t:0 "Phantom Blade Succession Tournament"
 murim_phantom_blade_expansion2.0008.desc:0 "The Phantom Blade Sect Master position is open. By tradition, it falls to whoever proves themselves in the Shadow Tournament — a deadly competition where blades speak louder than words. Victory means absolute authority over the sect."
 murim_phantom_blade_expansion2.0008.a:0 "Enter the tournament at full strength!"
 murim_phantom_blade_expansion2.0008.b:0 "Use poison to gain an edge. Win at any cost."
 murim_phantom_blade_expansion2.0008.c:0 "Withdraw. Nominate a worthy successor instead."

 # === SHADOW POLITICS EXPANSION 2 — PUPPET EMPEROR ===
 murim_shadow_politics_expansion2.0001.t:0 "The Heavenly Demon's Imperial Ambition"
 murim_shadow_politics_expansion2.0001.desc:0 "Why merely rule the martial world when you could rule the empire itself? The Heavenly Demon Sect's inner council has proposed the ultimate scheme: place a puppet on the imperial throne. Control the emperor, control the nation. Control the nation, control everything."
 murim_shadow_politics_expansion2.0001.a:0 "Begin Operation Shadow Throne."
 murim_shadow_politics_expansion2.0001.b:0 "Build influence slowly through court manipulation."
 murim_shadow_politics_expansion2.0001.c:0 "The throne is irrelevant. Focus on martial supremacy."

 murim_shadow_politics_expansion2.0002.t:0 "Selecting the Puppet"
 murim_shadow_politics_expansion2.0002.desc:0 "The perfect puppet must be weak-willed, malleable, and preferably already in line for the throne. Your agents have identified a candidate. The question now is how to secure their loyalty — or their obedience."
 murim_shadow_politics_expansion2.0002.a:0 "Blackmail them into submission."
 murim_shadow_politics_expansion2.0002.b:0 "Win them over with gifts and seduction."
 murim_shadow_politics_expansion2.0002.c:0 "Abduct and condition them through force."

 murim_shadow_politics_expansion2.0003.t:0 "Court Infiltration Progress"
 murim_shadow_politics_expansion2.0003.desc:0 "Your agents have been slowly worming their way into the imperial court. Now it is time to decide which power structure to corrupt first — each offers different advantages for the Shadow Throne operation."
 murim_shadow_politics_expansion2.0003.a:0 "Place agents in the imperial guard."
 murim_shadow_politics_expansion2.0003.b:0 "Corrupt the eunuch intelligence network."
 murim_shadow_politics_expansion2.0003.c:0 "Infiltrate the scholarly bureaucracy."

 murim_shadow_politics_expansion2.0004.t:0 "The Puppet Emperor Ascends"
 murim_shadow_politics_expansion2.0004.desc:0 "It is done. Through machination, murder, and manipulation, your puppet now sits on the Dragon Throne. The empire bows to a figure who bows to you. The Heavenly Demon Sect has achieved what no martial art could — absolute political supremacy."
 murim_shadow_politics_expansion2.0004.a:0 "Rule from the shadows. The perfect arrangement."
 murim_shadow_politics_expansion2.0004.b:0 "Make myself the Regent — semi-public control."
 murim_shadow_politics_expansion2.0004.c:0 "Extract one massive demand, then withdraw."

 murim_shadow_politics_expansion2.0005.t:0 "The Secret Exposed"
 murim_shadow_politics_expansion2.0005.desc:0 "Disaster. The orthodox alliance has discovered that the emperor is nothing but a puppet of the Heavenly Demon Sect. Righteous fury spreads across the martial world like wildfire. They are gathering forces for a confrontation."
 murim_shadow_politics_expansion2.0005.a:0 "Deny everything. Gaslight the orthodox alliance."
 murim_shadow_politics_expansion2.0005.b:0 "Threaten them with the imperial army."
 murim_shadow_politics_expansion2.0005.c:0 "Abandon the puppet and go underground."

 murim_shadow_politics_expansion2.0006.t:0 "The Righteous Uprising"
 murim_shadow_politics_expansion2.0006.desc:0 "Orthodox sects from across the land march on the imperial palace. Mount Hua. Shaolin. Wudang. All united against the Demon Sect's puppet emperor. This is the final confrontation — the Shadow Throne scheme succeeds or falls here."
 murim_shadow_politics_expansion2.0006.a:0 "Fight the alliance head-on! Demon power prevails!"
 murim_shadow_politics_expansion2.0006.b:0 "Use the puppet emperor as a hostage."
 murim_shadow_politics_expansion2.0006.c:0 "Negotiate a truce. Withdraw peacefully."

 murim_shadow_politics_expansion2.0007.t:0 "Fall of the Shadow Emperor"
 murim_shadow_politics_expansion2.0007.desc:0 "The scheme has collapsed. The puppet emperor has been freed, the Demon Sect's agents exposed, and the Shadow Throne lies in ruins. Years of careful planning, destroyed in a single righteous uprising. The bitter taste of defeat fills your mouth."
 murim_shadow_politics_expansion2.0007.a:0 "Vow revenge. The throne WILL be ours again."
 murim_shadow_politics_expansion2.0007.b:0 "Accept the loss. Rebuild sect strength."
 murim_shadow_politics_expansion2.0007.c:0 "Go into hiding. Disappear completely."

 murim_shadow_politics_expansion2.0008.t:0 "The Second Attempt"
 murim_shadow_politics_expansion2.0008.desc:0 "Years have passed since the failure of the first Shadow Throne operation. But the desire for imperial power has not faded. The Demon Sect has learned from its mistakes and prepares a new strategy. This time, the approach will be different."
 murim_shadow_politics_expansion2.0008.a:0 "This time, I will become emperor myself."
 murim_shadow_politics_expansion2.0008.b:0 "Install a child puppet. Easier to control."
 murim_shadow_politics_expansion2.0008.c:0 "Abandon imperial ambitions. Rule the martial world instead."

