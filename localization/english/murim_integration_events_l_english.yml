l_english:
 # ===========================
 # CLAN INTEGRATION EVENTS
 # ===========================
 murim_beggar_integration.0001.t: "The Beggar Sect's Hidden Network"
 murim_beggar_integration.0001.desc: "Word reaches you through the vast web of beggars and informants that spans every city and village. The Beggar Sect's network has grown powerful enough to influence events across the entire realm. As a senior member, you must decide how to wield this invisible power."
 murim_beggar_integration.0001.a: "Activate the full network — eyes and ears everywhere"
 murim_beggar_integration.0001.b: "Focus on personal cultivation instead"
 murim_beggar_integration.0001.c: "Remain humble — the sect endures through patience"

 murim_demon_integration.0001.t: "The Heart Demon Stirs"
 murim_demon_integration.0001.desc: "Deep within the Heavenly Demon Sect's forbidden chambers, you feel the pulse of dark qi resonating with your own cultivation. The shadow network that binds unorthodox cultivators together thrums with barely contained power. The Heart Demon within you whispers of greater heights — if you dare to listen."
 murim_demon_integration.0001.a: "Seize control of the shadow network"
 murim_demon_integration.0001.b: "Channel the Heart Demon for a breakthrough"
 murim_demon_integration.0001.c: "Withdraw and consolidate your power"

 murim_iron_fist_integration.0001.t: "The Iron Fist Resounds"
 murim_iron_fist_integration.0001.desc: "Your fists have grown harder than steel, your body tempered through countless hours of external cultivation. The Iron Fist Gate's reputation hinges on simple, undeniable strength. It is time to demonstrate that strength to the martial world."
 murim_iron_fist_integration.0001.a: "Challenge every ranked martial artist in the region"
 murim_iron_fist_integration.0001.b: "Focus on iron body tempering"
 murim_iron_fist_integration.0001.c: "Recruit promising fighters to the Gate"

 murim_mount_hua_integration.0001.t: "The Plum Blossom Blooms"
 murim_mount_hua_integration.0001.desc: "From the mist-shrouded peak of Mount Hua, you survey the martial world below. The sect's sword arts have reached a pinnacle under your generation's practice — the Plum Blossom Sword technique flows like poetry made steel. The time has come to show the world what Mount Hua can do."
 murim_mount_hua_integration.0001.a: "Demonstrate the Plum Blossom Sword publicly"
 murim_mount_hua_integration.0001.b: "Seek deeper understanding through meditation"
 murim_mount_hua_integration.0001.c: "Defend the sect's honor against slander"

 murim_phantom_blade_integration.0001.t: "Shadows Between Shadows"
 murim_phantom_blade_integration.0001.desc: "You are the blade that no one sees, the death that comes without warning. The Phantom Blade Sect has operated from darkness since its founding, but your network of assassins has grown beyond what any single master can control. It is time to expand — or to vanish entirely."
 murim_phantom_blade_integration.0001.a: "Expand the network of hidden blades"
 murim_phantom_blade_integration.0001.b: "Perfect the Vanishing Step technique"
 murim_phantom_blade_integration.0001.c: "Lie low — the best blade is the one unseen"

 murim_poison_flower_integration.0001.t: "A Thousand Petals of Venom"
 murim_poison_flower_integration.0001.desc: "The gardens of the Poison Flower Palace bloom with lethal beauty. Every petal, every stem, every dewdrop carries the potential for death — or for transcendence. Your mastery of toxins has reached a point where the line between poison and medicine blurs entirely."
 murim_poison_flower_integration.0001.a: "Distribute rare toxins through the underground"
 murim_poison_flower_integration.0001.b: "Cultivate the Thousand Petal Body"
 murim_poison_flower_integration.0001.c: "Forge alliances through the art of the banquet"

 murim_shaolin_integration.0001.t: "The Temple Bell Tolls"
 murim_shaolin_integration.0001.desc: "The ancient bell of Shaolin rings across the mountain, calling all disciples to assembly. As a senior monk of the temple, you have witnessed the ebb and flow of the martial world from behind these sacred walls. Now Shaolin must decide its role in the conflicts to come."
 murim_shaolin_integration.0001.a: "Open the Martial Hall for joint training"
 murim_shaolin_integration.0001.b: "Attempt the Eighteen Arhat Formation"
 murim_shaolin_integration.0001.c: "Meditate on the Diamond Sutra"

 murim_tang_integration.0001.t: "Blood of the Tang"
 murim_tang_integration.0001.desc: "The Tang Clan's ancestral hall is filled with the legacy of generations — hidden weapons, poison formulas, and the bloodline techniques that make the Tang family feared across the martial world. As a member of the blood, you have access to secrets that outsiders would kill to possess."
 murim_tang_integration.0001.a: "Unlock the clan's secret weapon cache"
 murim_tang_integration.0001.b: "Study the ancestral poison compendium"
 murim_tang_integration.0001.c: "Strengthen blood ties — clan is family"

 murim_wudang_integration.0001.t: "The Mountain's Breath"
 murim_wudang_integration.0001.desc: "Atop Wudang Mountain, the clouds part to reveal a world in turmoil below. Your Taoist cultivation has brought you closer to the Dao than most mortals will ever come. The mountain's qi flows through you like a river, and you must decide how to channel this tremendous power."
 murim_wudang_integration.0001.a: "Perform the Grand Tai Chi demonstration"
 murim_wudang_integration.0001.b: "Retreat into internal alchemy"
 murim_wudang_integration.0001.c: "Balance the mountain's qi"

