l_english:

 # Master Integration Decisions
 activate_murim_intelligence_network:0 "Activate Murim Intelligence Network"
 activate_murim_intelligence_network_desc:0 "By consolidating our spies, informants, and shadow contacts into a single coordinated network, we can monitor the entire Murim world. Our black market connections and shadow sect allies will feed intelligence directly to us."
 convene_emergency_tribunal:0 "Convene Emergency Tribunal Session"
 convene_emergency_tribunal_desc:0 "The situation demands immediate judgment from the highest martial authority. Whether facing a Great Calamity, clan succession wars, or the spread of forbidden techniques, the Heavenly Tribunal must convene to restore order."
 launch_continental_martial_expedition:0 "Launch Continental Martial Expedition"
 launch_continental_martial_expedition_desc:0 "Send our finest warriors on a grand expedition across the martial world. They will scout distant lands, challenge foreign masters, secure trade routes, and bring glory to our sect. Our trade contacts will provide intelligence along the way."
 forge_blood_oath_network:0 "Forge Blood Oath Alliance Network"
 forge_blood_oath_network_desc:0 "Those bound by blood oaths share more than loyalty — they share fate. By linking our sworn brothers and sisters into a formal network, we create an unbreakable web of mutual defense that even the Great Calamity cannot shatter."
 open_sect_forbidden_vault:0 "Open the Sect's Forbidden Vault"
 open_sect_forbidden_vault_desc:0 "Deep beneath our sect lies a vault of techniques deemed too dangerous for common practice. Opening it may yield ancient alchemy formulae, shadow realm techniques, or weapons of terrible power — but the risk of corruption is very real."
 declare_immortal_ascension_trial:0 "Declare Immortal Ascension Trial"
 declare_immortal_ascension_trial_desc:0 "After a lifetime of cultivation, the time has come to attempt what few dare: transcendence beyond mortality. This trial will draw the attention of every martial artist in the world — and the Heavenly Tribunal itself will oversee the proceedings."

 # Cross-System Event Localization (from heartbeat 97)
 murim_cross_system.0010.t:0 "Black Market Intelligence Synergy"
 murim_cross_system.0010.desc:0 "Our newly activated intelligence network has reached the ears of our black market contacts. They offer to share their own information channels — for a price. The underground dealers know things that even our best spies cannot uncover."
 murim_cross_system.0010.a:0 "Accept their terms — information is power"
 murim_cross_system.0010.b:0 "We will not rely on criminals"

 murim_cross_system.0011.t:0 "Shadow Network Convergence"
 murim_cross_system.0011.desc:0 "The shadow sect operatives within our network have detected a convergence — multiple intelligence streams pointing to the same hidden truth. Something vast is moving in the darkness of the Murim world."
 murim_cross_system.0011.a:0 "Investigate the convergence immediately"
 murim_cross_system.0011.b:0 "Too dangerous — seal the reports"

 murim_cross_system.0001.t:0 "Spy Discovers Black Market"
 murim_cross_system.0001.desc:0 "One of our spies, operating deep in enemy territory, has stumbled upon an underground black market dealing in forbidden techniques and rare alchemical ingredients. This could be a goldmine of intelligence — or a deadly trap."
 murim_cross_system.0001.a:0 "Have the spy infiltrate the market"
 murim_cross_system.0001.b:0 "Pull our spy out — too risky"
 murim_cross_system.0001.c:0 "Report the market to the Tribunal"

 murim_cross_system.0002.t:0 "Black Market Dealer Recruited as Spy"
 murim_cross_system.0002.desc:0 "A prominent black market dealer has approached us, offering to serve as an informant in exchange for protection. They claim to have connections to every shadow sect in the region."
 murim_cross_system.0002.a:0 "Welcome them into our network"
 murim_cross_system.0002.b:0 "Test their loyalty first"
 murim_cross_system.0002.c:0 "Refuse — they cannot be trusted"

 murim_cross_system.0003.t:0 "Tournament Champion Attracts Shadow Sect"
 murim_cross_system.0003.desc:0 "Our tournament champion's display of martial prowess has attracted the attention of a mysterious shadow sect. They offer advanced training in forbidden techniques — but membership comes with dark obligations."
 murim_cross_system.0003.a:0 "Allow the champion to explore this path"
 murim_cross_system.0003.b:0 "Forbid any contact with shadow sects"
 murim_cross_system.0003.c:0 "Use this as an opportunity to spy on them"

 murim_cross_system.0004.t:0 "Calamity Disrupts Tournament"
 murim_cross_system.0004.desc:0 "The tremors of the Great Calamity have reached even our tournament grounds. The arena shakes, fighters are thrown off balance, and panic spreads through the crowd. We must decide whether to continue or evacuate."
 murim_cross_system.0004.a:0 "Evacuate immediately — lives come first"
 murim_cross_system.0004.b:0 "Continue the tournament — we will not bow to chaos"
 murim_cross_system.0004.c:0 "Convert the tournament into a defense rally"

 murim_cross_system.0005.t:0 "Blood Oath Brother Betrays to Shadow Sect"
 murim_cross_system.0005.desc:0 "The unthinkable has happened. One of our blood oath sworn brothers has been revealed as a shadow sect infiltrator. The betrayal runs deep — they have been feeding our secrets to the enemy for years."
 murim_cross_system.0005.a:0 "Hunt them down — no mercy for oath-breakers"
 murim_cross_system.0005.b:0 "Seek to understand why they betrayed us"
 murim_cross_system.0005.c:0 "Bring them before the Tribunal"

 murim_cross_system.0006.t:0 "Forbidden Technique Leaks from Vault"
 murim_cross_system.0006.desc:0 "A forbidden technique from our vault has somehow spread beyond our sect's walls. Practitioners across the region are attempting it without proper training, causing devastating qi deviations and madness."
 murim_cross_system.0006.a:0 "Send hunters to contain the spread"
 murim_cross_system.0006.b:0 "Petition the Tribunal for martial law"
 murim_cross_system.0006.c:0 "Let it spread — the weak will destroy themselves"

 murim_cross_system.0007.t:0 "Trade Route Martial Conflict"
 murim_cross_system.0007.desc:0 "A dispute over a critical trade route has escalated from commercial rivalry to full martial confrontation. Merchant caravans have hired rogue martial artists as escorts, and blood has been spilled."
 murim_cross_system.0007.a:0 "Send our forces to secure the route"
 murim_cross_system.0007.b:0 "Negotiate a peaceful resolution"
 murim_cross_system.0007.c:0 "Let them fight — we will claim the route from the victor"

 murim_cross_system.0008.t:0 "Alchemist Discovers Calamity Cure"
 murim_cross_system.0008.desc:0 "One of our alchemists claims to have discovered a formula that can reverse the corruption of the Great Calamity. The ingredients are exceedingly rare and the process is dangerous, but if true, this could save the entire Murim world."
 murim_cross_system.0008.a:0 "Fund the research immediately"
 murim_cross_system.0008.b:0 "Verify the claims before committing resources"
 murim_cross_system.0008.c:0 "Seize the formula and keep it secret"

 # Modifier Localization
 murim_intelligence_network_modifier:0 "Active Intelligence Network"
 murim_intelligence_network_modifier_desc:0 "Our coordinated spy network provides constant intelligence on rival sects and hidden threats."
 murim_tribunal_authority_modifier:0 "Tribunal Authority"
 murim_tribunal_authority_modifier_desc:0 "Having convened the Heavenly Tribunal, we carry the weight of martial law and supreme judgment."
 murim_continental_expedition_modifier:0 "Continental Expedition Underway"
 murim_continental_expedition_modifier_desc:0 "Our warriors march across distant lands, gathering knowledge, allies, and glory."
 murim_blood_oath_network_modifier:0 "Blood Oath Network"
 murim_blood_oath_network_modifier_desc:0 "An unbreakable web of sworn brothers and sisters stands ready to fight and die together."
 murim_ascension_candidate_modifier:0 "Ascension Candidate"
 murim_ascension_candidate_modifier_desc:0 "The entire Murim world watches as we prepare for the ultimate trial of immortal transcendence."
