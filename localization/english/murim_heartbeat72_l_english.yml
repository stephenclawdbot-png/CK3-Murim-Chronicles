l_english:
 # HEARTBEAT 72 LOCALIZATION - Great Calamity Exp2, Wudang Exp4, Mount Hua Exp4, Shadow Politics Exp6, Calamity AI Exp2, Custom Clan Exp4, Faction War Exp3

 # === GREAT CALAMITY EXPANSION 2 ===
 murim_great_calamity_exp2.0001.t:0 "Ashes of the Old World"
 murim_great_calamity_exp2.0001.desc:0 "The calamity has passed, but its scars remain etched across the land. Where once mighty sect halls stood, only rubble and ash remain. The air still carries the stench of death, and the few survivors wander like ghosts through a world they no longer recognize. As [ROOT.GetFirstName], one of the fortunate few who endured the apocalypse, you must decide how to face this shattered new reality."
 murim_great_calamity_exp2.0001.a:0 "Survey the ruins and count the survivors"
 murim_great_calamity_exp2.0001.b:0 "Mourn the dead and honor the fallen"
 murim_great_calamity_exp2.0001.c:0 "The old world is gone. We start anew."
 murim_great_calamity_exp2.0002.t:0 "The Survivor Census"
 murim_great_calamity_exp2.0002.desc:0 "Your survey of the ruins reveals a grim picture. Of the thousands of martial artists who once populated the Murim, only a fraction survive. Some still bear their clan colors with pride, while others have been stripped of everything — identity, home, purpose. You must decide what to do with these scattered remnants."
 murim_great_calamity_exp2.0002.a:0 "Recruit the clanless into our ranks"
 murim_great_calamity_exp2.0002.b:0 "Focus on our own clan's survivors"
 murim_great_calamity_exp2.0002.c:0 "Create a unified order from all survivors"
 murim_great_calamity_exp2.0003.t:0 "Memorial of the Fallen Clans"
 murim_great_calamity_exp2.0003.desc:0 "The weight of loss hangs heavy over the survivors. Entire clans have been wiped from existence — their techniques, their histories, their bloodlines all gone in the fury of the calamity. Someone must ensure they are not forgotten."
 murim_great_calamity_exp2.0003.a:0 "Build a stone monument listing all the fallen"
 murim_great_calamity_exp2.0003.b:0 "Hold a grand funeral ceremony"
 murim_great_calamity_exp2.0003.c:0 "The dead are dead. Focus on the living."
 murim_great_calamity_exp2.0004.t:0 "Declaration of the New Era"
 murim_great_calamity_exp2.0004.desc:0 "The old era ended in fire and blood. Now, standing among the ruins, you have the opportunity to declare the dawn of something new. The survivors look to you for direction — what will this new age be called?"
 murim_great_calamity_exp2.0004.a:0 "Name the new era after myself"
 murim_great_calamity_exp2.0004.b:0 "Name it the Era of Restoration"
 murim_great_calamity_exp2.0004.c:0 "Let the survivors choose together"
 murim_great_calamity_exp2.0005.t:0 "The New Sect Halls Rise"
 murim_great_calamity_exp2.0005.desc:0 "With survivors gathered and a new purpose forged, the question of rebuilding becomes paramount. The old headquarters lie in ruins — but within those ruins, the foundation of something new can be laid."
 murim_great_calamity_exp2.0005.a:0 "Rebuild on the ruins of the old headquarters"
 murim_great_calamity_exp2.0005.b:0 "Build in a completely new location"
 murim_great_calamity_exp2.0005.c:0 "Remain nomadic — no fixed headquarters"
 murim_great_calamity_exp2.0006.t:0 "The Unified Survivor Order Assembly"
 murim_great_calamity_exp2.0006.desc:0 "The survivors have gathered for the first great assembly since the calamity. Representatives from every surviving clan fragment stand together, united by shared trauma. The question now is governance — how will this new order be led?"
 murim_great_calamity_exp2.0006.a:0 "Establish a democratic council of elders"
 murim_great_calamity_exp2.0006.b:0 "Declare myself supreme leader"
 murim_great_calamity_exp2.0006.c:0 "Rotate leadership among clan survivors"
 murim_great_calamity_exp2.0007.t:0 "The Monument Dedication Ceremony"
 murim_great_calamity_exp2.0007.desc:0 "The monument stands complete — a towering stone edifice carved with the names and symbols of every clan that fell during the Great Calamity. Survivors have gathered from across the land for its dedication."
 murim_great_calamity_exp2.0007.a:0 "Inscribe the name of every fallen martial artist"
 murim_great_calamity_exp2.0007.b:0 "Only inscribe clan leaders and grandmasters"
 murim_great_calamity_exp2.0007.c:0 "Add a warning for future generations"
 murim_great_calamity_exp2.0008.t:0 "Reaction to the New Era"
 murim_great_calamity_exp2.0008.desc:0 "Word has spread that [murim_era_founder.GetFirstName] has declared a new era, naming it after themselves. The martial world is divided — some see this as necessary leadership, others as arrogant presumption."
 murim_great_calamity_exp2.0008.a:0 "Accept the new era and its founder"
 murim_great_calamity_exp2.0008.b:0 "Who is this person to name an era?"
 murim_great_calamity_exp2.0008.c:0 "Stay neutral and wait"
 murim_great_calamity_exp2.0009.t:0 "Secrets Unearthed in the Ruins"
 murim_great_calamity_exp2.0009.desc:0 "While clearing rubble from the old headquarters, workers discover a hidden chamber beneath the foundation. Inside lies treasures preserved from the calamity — ancient knowledge waiting to be reclaimed."
 murim_great_calamity_exp2.0009.a:0 "An ancient cultivation manual!"
 murim_great_calamity_exp2.0009.b:0 "A cache of lost artifacts!"
 murim_great_calamity_exp2.0009.c:0 "A map of hidden cultivation grounds!"
 murim_great_calamity_exp2.0010.t:0 "Resistance Against the New Order"
 murim_great_calamity_exp2.0010.desc:0 "Not everyone accepts the new order. A growing faction of old-era loyalists refuses to acknowledge the new leadership, gathering strength in the shadows and plotting to restore what was."
 murim_great_calamity_exp2.0010.a:0 "Crush the resistance with force"
 murim_great_calamity_exp2.0010.b:0 "Negotiate with the dissidents"
 murim_great_calamity_exp2.0010.c:0 "Step down and let them choose"

 # === WUDANG EXPANSION 4 ===
 murim_wudang_exp4.0001.t:0 "The Path Beyond Mortality"
 murim_wudang_exp4.0001.desc:0 "After decades of cultivation atop Wudang Mountain, [ROOT.GetFirstName] stands at the threshold of transcendence. The Taoist scriptures speak of those who shed their mortal shells and ascend to immortality. Three paths lie ahead."
 murim_wudang_exp4.0001.a:0 "Seek the path of Taoist Immortality"
 murim_wudang_exp4.0001.b:0 "Walk the Sword God path"
 murim_wudang_exp4.0001.c:0 "Remain in the mortal world as a sage"
 murim_wudang_exp4.0002.t:0 "The Immortality Trial"
 murim_wudang_exp4.0002.desc:0 "Deep in meditation for forty-nine days, you feel your soul beginning to separate from flesh. The boundary between mortal and immortal grows thin."
 murim_wudang_exp4.0002.a:0 "Push through — complete the transcendence"
 murim_wudang_exp4.0002.b:0 "Pull back — the mortal body is not ready"
 murim_wudang_exp4.0002.c:0 "Achieve partial immortality"
 murim_wudang_exp4.0003.t:0 "The Sword God Duel"
 murim_wudang_exp4.0003.desc:0 "To claim the title of Sword God, one must defeat the strongest blade in the world. [scope:sword_rival.GetFirstName] stands ready."
 murim_wudang_exp4.0003.a:0 "Challenge them for the Sword God title"
 murim_wudang_exp4.0003.b:0 "Train in solitude as a Sword Hermit"
 murim_wudang_exp4.0003.c:0 "Teach the sword arts to all disciples"
 murim_wudang_exp4.0004.t:0 "Heavenly Dao Communion"
 murim_wudang_exp4.0004.desc:0 "The heavens themselves seem to open as your cultivation reaches a pinnacle never seen in this era."
 murim_wudang_exp4.0004.a:0 "Embrace the Heavenly Dao fully"
 murim_wudang_exp4.0004.b:0 "Walk the path of a humble immortal"
 murim_wudang_exp4.0004.c:0 "It was a false transcendence..."
 murim_wudang_exp4.0005.t:0 "The Wudang Schism"
 murim_wudang_exp4.0005.desc:0 "Internal tensions reach a breaking point. [scope:wudang_schismatic.GetFirstName] openly challenges your leadership and philosophy."
 murim_wudang_exp4.0005.a:0 "Purge the dissenters"
 murim_wudang_exp4.0005.b:0 "Offer a compromise"
 murim_wudang_exp4.0005.c:0 "Retreat to meditation"
 murim_wudang_exp4.0006.t:0 "Wudang Civil War"
 murim_wudang_exp4.0006.desc:0 "The schism has erupted into open conflict. Brother fights brother on the mountain paths."
 murim_wudang_exp4.0006.a:0 "Fight to reunify by force"
 murim_wudang_exp4.0006.b:0 "Forgive the rebels"
 murim_wudang_exp4.0006.c:0 "Exile the dissenters"
 murim_wudang_exp4.0007.t:0 "The Lost Primordial Scripture"
 murim_wudang_exp4.0007.desc:0 "Hidden in a sealed cave, you discover scriptures written by Wudang's legendary founder — knowledge thought lost for centuries."
 murim_wudang_exp4.0007.a:0 "Study the scripture personally"
 murim_wudang_exp4.0007.b:0 "Sell the knowledge for wealth"
 murim_wudang_exp4.0007.c:0 "Share it with all disciples"
 murim_wudang_exp4.0008.t:0 "Civil War Resolution"
 murim_wudang_exp4.0008.desc:0 "The fighting ends. Now comes the harder question — what becomes of Wudang?"
 murim_wudang_exp4.0008.a:0 "Reunify under my rule"
 murim_wudang_exp4.0008.b:0 "Split into two branches"
 murim_wudang_exp4.0008.c:0 "Abdicate for peace"
 murim_wudang_exp4.0009.t:0 "The Void Sword Beckons"
 murim_wudang_exp4.0009.desc:0 "At the pinnacle of sword mastery, you sense a power beyond — the Void Sword, a technique that cuts through reality itself. But it demands a terrible price."
 murim_wudang_exp4.0009.a:0 "Embrace the Void Sword"
 murim_wudang_exp4.0009.b:0 "Reject the dark power"
 murim_wudang_exp4.0009.c:0 "Find the Yin-Yang Sword Balance"
 murim_wudang_exp4.0010.t:0 "The Eternal Patriarch"
 murim_wudang_exp4.0010.desc:0 "Your legend has outgrown mortal measure. The disciples speak your name with reverence reserved for gods."
 murim_wudang_exp4.0010.a:0 "Accept the mantle of Eternal Patriarch"
 murim_wudang_exp4.0010.b:0 "Wander the world as an immortal"
 murim_wudang_exp4.0010.c:0 "Choose a worthy heir and step back"

 # === MOUNT HUA EXPANSION 4 ===
 murim_mount_hua_exp4.0001.t:0 "The Plum Blossom War"
 murim_mount_hua_exp4.0001.desc:0 "Tensions with rival sects have reached a boiling point. Mount Hua's influence and honor are at stake."
 murim_mount_hua_exp4.0001.a:0 "Declare war on the aggressors"
 murim_mount_hua_exp4.0001.b:0 "Seek diplomatic resolution"
 murim_mount_hua_exp4.0001.c:0 "Fortify Mount Hua's defenses"
 murim_mount_hua_exp4.0002.t:0 "The Decisive Battle"
 murim_mount_hua_exp4.0002.desc:0 "The enemy approaches Mount Hua. It is time to fight."
 murim_mount_hua_exp4.0002.a:0 "Lead the charge personally"
 murim_mount_hua_exp4.0002.b:0 "Hire mercenary reinforcements"
 murim_mount_hua_exp4.0002.c:0 "Strategic retreat to higher ground"
 murim_mount_hua_exp4.0003.t:0 "Mercenary Aftermath"
 murim_mount_hua_exp4.0003.desc:0 "The mercenaries have served their purpose — or have they? Their loyalty was always questionable."
 murim_mount_hua_exp4.0003.a:0 "The mercenaries fought well — pay them"
 murim_mount_hua_exp4.0003.b:0 "They betrayed us mid-battle!"
 murim_mount_hua_exp4.0003.c:0 "Form a lasting alliance with them"
 murim_mount_hua_exp4.0004.t:0 "The Sword Saint Path"
 murim_mount_hua_exp4.0004.desc:0 "Your sword has transcended mere technique. You stand on the threshold of becoming a Sword Saint — one whose blade embodies truth itself."
 murim_mount_hua_exp4.0004.a:0 "Accept the Sword Saint mantle"
 murim_mount_hua_exp4.0004.b:0 "Remain a humble swordsman"
 murim_mount_hua_exp4.0004.c:0 "Become the Plum Blossom Grandmaster"
 murim_mount_hua_exp4.0005.t:0 "Sword Saint's Challenge"
 murim_mount_hua_exp4.0005.desc:0 "As a Sword Saint, all the world's swordsmen wish to test themselves against you."
 murim_mount_hua_exp4.0005.a:0 "Issue an open challenge to all comers"
 murim_mount_hua_exp4.0005.b:0 "Meditate on the sword's deeper meaning"
 murim_mount_hua_exp4.0005.c:0 "Open a sword academy for the worthy"
 murim_mount_hua_exp4.0006.t:0 "The Grand Sword Challenge"
 murim_mount_hua_exp4.0006.desc:0 "[scope:grand_challenger.GetFirstName] has answered your challenge. The duel that follows will determine who is the greatest swordsman alive."
 murim_mount_hua_exp4.0006.a:0 "Fight for the title of greatest swordsman"
 murim_mount_hua_exp4.0006.b:0 "Accept a draw — both worthy"
 murim_mount_hua_exp4.0007.t:0 "The Plum Blossom Legacy"
 murim_mount_hua_exp4.0007.desc:0 "As sect leader, you must invest in Mount Hua's future. What legacy will you build?"
 murim_mount_hua_exp4.0007.a:0 "Build a Scripture Vault"
 murim_mount_hua_exp4.0007.b:0 "Expand training grounds"
 murim_mount_hua_exp4.0007.c:0 "Create a spy network"
 murim_mount_hua_exp4.0008.t:0 "Choosing an Heir"
 murim_mount_hua_exp4.0008.desc:0 "Age creeps upon you. Mount Hua needs to know who will lead after you."
 murim_mount_hua_exp4.0008.a:0 "Appoint my strongest child"
 murim_mount_hua_exp4.0008.b:0 "Hold a succession tournament"
 murim_mount_hua_exp4.0008.c:0 "Delay the decision"
 murim_mount_hua_exp4.0009.t:0 "Mount Hua Succession Tournament"
 murim_mount_hua_exp4.0009.desc:0 "The disciples clash in a tournament to determine Mount Hua's next leader."
 murim_mount_hua_exp4.0009.a:0 "Let the strongest win"
 murim_mount_hua_exp4.0009.b:0 "Enter the tournament myself"
 murim_mount_hua_exp4.0010.t:0 "Living Legend of Mount Hua"
 murim_mount_hua_exp4.0010.desc:0 "Your name has become synonymous with Mount Hua itself. Generations will remember you."
 murim_mount_hua_exp4.0010.a:0 "Accept the title of Living Legend"
 murim_mount_hua_exp4.0010.b:0 "Retreat to become a hermit"
 murim_mount_hua_exp4.0010.c:0 "Give one final teaching to all"

 # === SHADOW POLITICS EXPANSION 6 ===
 murim_shadow_pol_exp6.0001.t:0 "The Shadow Emperor's Endgame"
 murim_shadow_pol_exp6.0001.desc:0 "The puppet emperor sits upon the throne, dancing to strings only you can see. But maintaining this charade grows tiresome. The time has come for the final gambit."
 murim_shadow_pol_exp6.0001.a:0 "Begin the endgame — seize everything"
 murim_shadow_pol_exp6.0001.b:0 "Consolidate power through the puppet"
 murim_shadow_pol_exp6.0001.c:0 "Withdraw from the shadows entirely"
 murim_shadow_pol_exp6.0002.t:0 "The Puppet Emperor's Fate"
 murim_shadow_pol_exp6.0002.desc:0 "The puppet has served its purpose. What becomes of it now?"
 murim_shadow_pol_exp6.0002.a:0 "Kill the puppet — become emperor myself"
 murim_shadow_pol_exp6.0002.b:0 "Replace with a new, younger puppet"
 murim_shadow_pol_exp6.0002.c:0 "Maintain the current arrangement"
 murim_shadow_pol_exp6.0003.t:0 "Orthodox Outrage"
 murim_shadow_pol_exp6.0003.desc:0 "The Heavenly Demon sits upon the imperial throne. The orthodox sects are horrified."
 murim_shadow_pol_exp6.0003.a:0 "Let them rage — they cannot stop me"
 murim_shadow_pol_exp6.0003.b:0 "Attempt diplomacy with the outraged"
 murim_shadow_pol_exp6.0003.c:0 "Launch a pre-emptive purge"
 murim_shadow_pol_exp6.0004.t:0 "The Orthodox Crusade"
 murim_shadow_pol_exp6.0004.desc:0 "The orthodox sects unite under [scope:crusade_leader.GetFirstName] and march against the Demon Emperor."
 murim_shadow_pol_exp6.0004.a:0 "Meet their champion in single combat"
 murim_shadow_pol_exp6.0004.b:0 "Negotiate from the throne"
 murim_shadow_pol_exp6.0004.c:0 "Flee with the treasury"
 murim_shadow_pol_exp6.0005.t:0 "The Great Purge"
 murim_shadow_pol_exp6.0005.desc:0 "The purge sweeps through the martial world. Orthodox masters fall one by one."
 murim_shadow_pol_exp6.0005.a:0 "Complete the purge — spare no one"
 murim_shadow_pol_exp6.0005.b:0 "Selective elimination of leaders only"
 murim_shadow_pol_exp6.0005.c:0 "Show mercy — end the purge"
 murim_shadow_pol_exp6.0006.t:0 "Underground Resistance"
 murim_shadow_pol_exp6.0006.desc:0 "Despite the purge, pockets of resistance persist in the shadows."
 murim_shadow_pol_exp6.0006.a:0 "Hunt them down"
 murim_shadow_pol_exp6.0006.b:0 "Ignore them — they are irrelevant"
 murim_shadow_pol_exp6.0006.c:0 "Infiltrate the resistance"
 murim_shadow_pol_exp6.0007.t:0 "The Resistance Champion"
 murim_shadow_pol_exp6.0007.desc:0 "A champion has emerged from the resistance — [scope:resistance_champion.GetFirstName] challenges you openly."
 murim_shadow_pol_exp6.0007.a:0 "Face them in combat"
 murim_shadow_pol_exp6.0007.b:0 "Offer a truce"
 murim_shadow_pol_exp6.0008.t:0 "Internal Conspiracy"
 murim_shadow_pol_exp6.0008.desc:0 "Even within your own Heavenly Demon Sect, conspirators plot against you."
 murim_shadow_pol_exp6.0008.a:0 "Execute the conspirator"
 murim_shadow_pol_exp6.0008.b:0 "Offer amnesty"
 murim_shadow_pol_exp6.0008.c:0 "Increase surveillance"
 murim_shadow_pol_exp6.0009.t:0 "Legacy of the Demon Emperor"
 murim_shadow_pol_exp6.0009.desc:0 "You have ruled as Demon Emperor for decades. The question of legacy looms."
 murim_shadow_pol_exp6.0009.a:0 "Found the Demon Dynasty"
 murim_shadow_pol_exp6.0009.b:0 "Abdicate and return to the shadows"
 murim_shadow_pol_exp6.0009.c:0 "Rule eternally — seek immortality"
 murim_shadow_pol_exp6.0010.t:0 "Absolute Power"
 murim_shadow_pol_exp6.0010.desc:0 "With orthodox crushed and all resistance broken, the Heavenly Demon's power is absolute."
 murim_shadow_pol_exp6.0010.a:0 "Declare a Dark Age of Murim"
 murim_shadow_pol_exp6.0010.b:0 "Rule as a benevolent demon emperor"
 murim_shadow_pol_exp6.0010.c:0 "Reform — create new balance"

 # === CALAMITY AI EXPANSION 2 ===
 murim_calamity_ai_exp2.0001.t:0 "The Temptation of Betrayal"
 murim_calamity_ai_exp2.0001.desc:0 "The calamity rages. Your allies grow weak. A treacherous thought forms — if you strike now, you could seize their resources and survive."
 murim_calamity_ai_exp2.0001.a:0 "Betray the alliance — strike now"
 murim_calamity_ai_exp2.0001.b:0 "Stay loyal to the alliance"
 murim_calamity_ai_exp2.0001.c:0 "Go solo — trust no one"
 murim_calamity_ai_exp2.0002.t:0 "Betrayal's Consequence"
 murim_calamity_ai_exp2.0002.desc:0 "Your betrayal did not go unnoticed. The survivors demand justice."
 murim_calamity_ai_exp2.0002.a:0 "Face the avenger in combat"
 murim_calamity_ai_exp2.0002.b:0 "Buy forgiveness with gold"
 murim_calamity_ai_exp2.0002.c:0 "Flee before they find you"
 murim_calamity_ai_exp2.0003.t:0 "The Last Stand"
 murim_calamity_ai_exp2.0003.desc:0 "The calamity closes in. There is nowhere left to run. You can make your stand here or fall back."
 murim_calamity_ai_exp2.0003.a:0 "Make a heroic last stand"
 murim_calamity_ai_exp2.0003.b:0 "Tactical retreat to safer ground"
 murim_calamity_ai_exp2.0003.c:0 "Guerrilla warfare — hit and run"
 murim_calamity_ai_exp2.0004.t:0 "Guerrilla Results"
 murim_calamity_ai_exp2.0004.desc:0 "Your guerrilla tactics have yielded results — but at what cost?"
 murim_calamity_ai_exp2.0004.a:0 "Success — the enemy is weakened"
 murim_calamity_ai_exp2.0004.b:0 "Exposed — they found our camp"
 murim_calamity_ai_exp2.0004.c:0 "Form a guerrilla brotherhood"
 murim_calamity_ai_exp2.0005.t:0 "Desperate Alliance"
 murim_calamity_ai_exp2.0005.desc:0 "The calamity leaves no room for old grudges. Even your bitter rival could be the key to survival."
 murim_calamity_ai_exp2.0005.a:0 "Ally with my bitter rival"
 murim_calamity_ai_exp2.0005.b:0 "Survive alone"
 murim_calamity_ai_exp2.0005.c:0 "Build a survivor network"
 murim_calamity_ai_exp2.0006.t:0 "Grief in the Calamity"
 murim_calamity_ai_exp2.0006.desc:0 "Friends have fallen. The grief threatens to overwhelm you."
 murim_calamity_ai_exp2.0006.a:0 "Swear vengeance"
 murim_calamity_ai_exp2.0006.b:0 "Mourn and find peace"
 murim_calamity_ai_exp2.0006.c:0 "Harden your heart — feel nothing"
 murim_calamity_ai_exp2.0007.t:0 "Rebuild Politics"
 murim_calamity_ai_exp2.0007.desc:0 "The calamity is over. Now the survivors must decide who leads the rebuilding."
 murim_calamity_ai_exp2.0007.a:0 "Lead a rebuilding council"
 murim_calamity_ai_exp2.0007.b:0 "Become a warlord of the ruins"
 murim_calamity_ai_exp2.0007.c:0 "Retreat to hermitage"
 murim_calamity_ai_exp2.0008.t:0 "The New Alliance"
 murim_calamity_ai_exp2.0008.desc:0 "The rebuilding council proposes a grand alliance of all surviving clans."
 murim_calamity_ai_exp2.0008.a:0 "Form the New Murim Alliance"
 murim_calamity_ai_exp2.0008.b:0 "Competition is healthier"
 murim_calamity_ai_exp2.0008.c:0 "Isolationism — we rebuild alone"
 murim_calamity_ai_exp2.0009.t:0 "Recording the Calamity"
 murim_calamity_ai_exp2.0009.desc:0 "The survivors must decide how the calamity will be remembered."
 murim_calamity_ai_exp2.0009.a:0 "Write an accurate historical record"
 murim_calamity_ai_exp2.0009.b:0 "Mythologize it into legend"
 murim_calamity_ai_exp2.0009.c:0 "Let it be forgotten"
 murim_calamity_ai_exp2.0010.t:0 "Sage of the Calamity"
 murim_calamity_ai_exp2.0010.desc:0 "In your old age, you are the last living witness of the Great Calamity. Your wisdom is sought by all."
 murim_calamity_ai_exp2.0010.a:0 "Become a revered sage"
 murim_calamity_ai_exp2.0010.b:0 "Found a new era"
 murim_calamity_ai_exp2.0010.c:0 "Pass the torch to the next generation"

 # === CUSTOM CLAN EXPANSION 4 ===
 murim_custom_clan_exp4.0001.t:0 "The Supreme Path"
 murim_custom_clan_exp4.0001.desc:0 "As founder of your clan, you have reached the pinnacle of cultivation. Three supreme paths open before you."
 murim_custom_clan_exp4.0001.a:0 "Supreme Martial Path"
 murim_custom_clan_exp4.0001.b:0 "Supreme Wisdom Path"
 murim_custom_clan_exp4.0001.c:0 "Supreme Shadow Path"
 murim_custom_clan_exp4.0002.t:0 "Martial Supremacy Trial"
 murim_custom_clan_exp4.0002.desc:0 "To achieve martial supremacy, you must defeat the strongest warrior in the world."
 murim_custom_clan_exp4.0002.a:0 "Challenge the strongest for supremacy"
 murim_custom_clan_exp4.0002.b:0 "Continue training"
 murim_custom_clan_exp4.0002.c:0 "Develop martial philosophy"
 murim_custom_clan_exp4.0003.t:0 "Wisdom Enlightenment"
 murim_custom_clan_exp4.0003.desc:0 "The path of supreme wisdom leads to understanding that transcends mortal limits."
 murim_custom_clan_exp4.0003.a:0 "Achieve Supreme Sage enlightenment"
 murim_custom_clan_exp4.0003.b:0 "Continue seeking wisdom"
 murim_custom_clan_exp4.0003.c:0 "Share wisdom with the world"
 murim_custom_clan_exp4.0004.t:0 "Shadow Sovereignty"
 murim_custom_clan_exp4.0004.desc:0 "The path of shadows leads to dominion over the unseen world."
 murim_custom_clan_exp4.0004.a:0 "Become the Shadow Sovereign"
 murim_custom_clan_exp4.0004.b:0 "Expand the shadow network"
 murim_custom_clan_exp4.0004.c:0 "Balance shadow and light"
 murim_custom_clan_exp4.0005.t:0 "Forging the Clan Legacy"
 murim_custom_clan_exp4.0005.desc:0 "Your clan has grown powerful enough to establish a lasting legacy."
 murim_custom_clan_exp4.0005.a:0 "Found a martial legacy"
 murim_custom_clan_exp4.0005.b:0 "Build an economic empire"
 murim_custom_clan_exp4.0005.c:0 "Create a spiritual tradition"
 murim_custom_clan_exp4.0006.t:0 "The Ultimate Technique"
