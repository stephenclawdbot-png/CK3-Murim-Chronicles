l_english:
 murim_calamity_cycle_exp2.0001.t: "The Last Elder's Testament"
 murim_calamity_cycle_exp2.0001.desc: "Your body grows frail, but your memories of the Calamity remain sharp as a blade's edge. Your child has come of age, and what you carry — the horror, the truth, the lessons — must be passed on before you join the fallen. How you shape this legacy will echo through generations."
 murim_calamity_cycle_exp2.0001.a: "Pass down the full, unvarnished truth."
 murim_calamity_cycle_exp2.0001.b: "Mythologize it — turn horror into legend."
 murim_calamity_cycle_exp2.0001.c: "Suppress the memory. Let them be free."
 murim_calamity_cycle_exp2.0001.d: "Weaponize the memory — train them to prevent it."
 murim_calamity_cycle_exp2.0002.t: "A Sect Born from Ruins"
 murim_calamity_cycle_exp2.0002.desc: "The ruins of the old world stretch before you — shattered training grounds, crumbled sect halls, scattered manuals half-consumed by flame. But ruins are also foundations. With your knowledge of what was lost, you could build something new upon the bones of the old."
 murim_calamity_cycle_exp2.0002.a: "Found a warden sect to prevent the next Calamity."
 murim_calamity_cycle_exp2.0002.b: "Found a sect that embraces the cycle's power."
 murim_calamity_cycle_exp2.0002.c: "Found a sect dedicated to preserving knowledge."
 murim_calamity_cycle_exp2.0002.d: "Wander alone as a living warning."
 murim_calamity_cycle_exp2.0003.t: "Signs of the Next Cycle"
 murim_calamity_cycle_exp2.0003.desc: "The birds fly in strange patterns. The spiritual veins beneath the mountains pulse with an irregular rhythm you recognize — the same tremors that preceded the last Calamity. The cycle is accelerating. If you are right, the martial world has less time than anyone realizes."
 murim_calamity_cycle_exp2.0003.a: "Sound the alarm — warn all clans!"
 murim_calamity_cycle_exp2.0003.b: "Gather the strongest for a preemptive strike."
 murim_calamity_cycle_exp2.0003.c: "Prepare in secret — don't cause panic."
 murim_calamity_cycle_exp2.0003.d: "Accept the cycle — it cannot be stopped."
 murim_calamity_cycle_exp2.0004.t: "When Myth Becomes Faith"
 murim_calamity_cycle_exp2.0004.desc: "The tales of the Calamity have taken on a life of their own. Disciples kneel before shrines to fallen grandmasters. Prayers are offered to ward off the next cycle. What began as history has become something more — a faith born from catastrophe, seeking meaning in destruction."
 murim_calamity_cycle_exp2.0004.a: "Formalize it into a proper religion."
 murim_calamity_cycle_exp2.0004.b: "Keep it as oral tradition — no rigid doctrine."
 murim_calamity_cycle_exp2.0004.c: "Write it down as history, not myth."
 murim_calamity_cycle_exp2.0004.d: "Let the stories die with time."
 murim_calamity_cycle_exp2.0005.t: "The Preemptive Coalition"
 murim_calamity_cycle_exp2.0005.desc: "Your call to arms has been answered. Warriors from across the martial world gather under your banner — not for glory or revenge, but to strike at the source of the cycle before it can begin anew. This coalition may be the last hope of the martial world."
 murim_calamity_cycle_exp2.0005.a: "Lead the coalition personally."
 murim_calamity_cycle_exp2.0005.b: "Delegate command to a younger warrior."
 murim_calamity_cycle_exp2.0005.c: "Seek a diplomatic solution instead."
 murim_calamity_cycle_exp2.0006.t: "Children of the Calamity"
 murim_calamity_cycle_exp2.0006.desc: "You never saw the old world, but you grew up in its shadow. Your parents' nightmares became your lullabies. The weight of what was lost presses down on your generation — some buckle beneath it, others forge themselves into something harder. The choice is yours."
 murim_calamity_cycle_exp2.0006.a: "Train harder than anyone — never again."
 murim_calamity_cycle_exp2.0006.b: "Dedicate yourself to healing and rebuilding."
 murim_calamity_cycle_exp2.0006.c: "Reject the burden of the past."
 murim_calamity_cycle_exp2.0006.d: "Seek out the source of the Calamity."
 murim_calamity_cycle_exp2.0007.t: "The Cycle Accelerates"
 murim_calamity_cycle_exp2.0007.desc: "Dark powers are rising across the martial world — too many grandmasters of the demonic path, too much concentrated malice. The spiritual balance that holds the cycle at bay is tipping. If this continues, the next Calamity may arrive far sooner than anyone predicted."
 murim_calamity_cycle_exp2.0007.a: "Strengthen all clan defenses immediately."
 murim_calamity_cycle_exp2.0007.b: "Seek ancient artifacts to counter it."
 murim_calamity_cycle_exp2.0007.c: "Prepare an evacuation route."
 murim_calamity_cycle_exp2.0007.d: "Ignore the signs — they mean nothing."
 murim_calamity_cycle_exp2.0008.t: "Breaking the Cycle"
 murim_calamity_cycle_exp2.0008.desc: "At last, you stand at the threshold of the impossible. The cycle's mechanism lies before you — ancient, vast, and terrible in its indifference. You have the power to act, but every path forward demands a price that would break lesser cultivators."
 murim_calamity_cycle_exp2.0008.a: "Sacrifice yourself to seal the cycle."
 murim_calamity_cycle_exp2.0008.b: "Unite all nine clans to seal it together."
 murim_calamity_cycle_exp2.0008.c: "Harness the cycle's power for yourself."
 murim_calamity_cycle_exp2.0008.d: "Accept the cycle as part of nature."
