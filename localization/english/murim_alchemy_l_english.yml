l_english:
 # ==========================================
 # MURIM ALCHEMY EVENTS LOCALIZATION
 # Pill crafting, herb gathering, alchemy competitions
 # ==========================================

 # --- EVENT 1: Spiritual Herb Garden ---
 murim_alchemy.0001.t:0 "A Garden Hidden from Heaven"
 murim_alchemy.0001.desc:0 "While traversing the wilderness, your qi-sense brushes against something unusual — a pulse of spiritual energy emanating from a sheltered ravine. You push aside the hanging moss to find a lush garden of century-old spirit herbs, their leaves glowing faintly with stored qi. Such a discovery is rare beyond measure."
 murim_alchemy.0001.a:0 "Harvest carefully, preserving the roots."
 murim_alchemy.0001.b:0 "Take everything now — this chance may not come again."
 murim_alchemy.0001.c:0 "Mark the location and return with disciples to tend it."
 murim_alchemy_herb_harvest_careful_tt:0 "Careful harvest yields [murim_herb_stockpile|G] herbs. The garden survives."
 murim_alchemy_herb_harvest_greedy_tt:0 "The garden is stripped clean. A substantial haul, but it will be years before anything grows here again."
 murim_alchemy_herb_harvest_disciples_tt:0 "With disciples helping, the garden is harvested efficiently and documented. It may yield again."

 # --- EVENT 2: Brewing the Breakthrough Pill ---
 murim_alchemy.0002.t:0 "The Alchemy Furnace Roars"
 murim_alchemy.0002.desc:0 "You have gathered enough spirit herbs to attempt a Breakthrough Pill — a cultivation catalyst that compresses months of training into a single night of refinement. The ancient bronze furnace heats to a dull crimson as you channel your qi into the brew. Success would accelerate your path considerably. Failure could cost you greatly."
 murim_alchemy.0002.a:0 "Follow the standard formula. Safety first."
 murim_alchemy.0002.b:0 "Infuse more qi to create a Superior Pill. High risk, high reward."
 murim_alchemy.0002.c:0 "Brew a pill for a deserving disciple instead."
 murim_alchemy_brew_success_tt:0 "The pill condenses perfectly. Cultivation advances significantly."
 murim_alchemy_brew_weak_tt:0 "The pill is weak but functional. Modest gains."
 murim_alchemy_brew_superior_tt:0 "A Superior Pill emerges! Cultivation surges. Your alchemy skill improves."
 murim_alchemy_brew_explosion_tt:0 "The furnace explodes in a qi backlash! Singed and shaken, you recover slowly."
 murim_alchemy_brew_disciple_tt:0 "Your disciple benefits greatly. Your reputation as a teacher grows."

 # --- EVENT 3: Alchemy Competition ---
 murim_alchemy.0003.t:0 "The Grand Pill Assembly"
 murim_alchemy.0003.desc:0 "Word spreads of an alchemy competition held at this season's martial gathering. Practitioners bring their finest pill formulas, competing before a panel of sect elders and wealthy patrons. Victory would bring fame across the jianghu — and perhaps lucrative connections. The air in the competition hall already smells of smoke and rare herbs."
 murim_alchemy.0003.a:0 "Enter the competition."
 murim_alchemy.0003.b:0 "Watch from the sidelines and absorb what you can."
 murim_alchemy_competition_win_tt:0 "Your pill takes first prize. Prestige soars and your alchemy mastery deepens."
 murim_alchemy_competition_lose_tt:0 "A younger alchemist outperforms you. A humbling defeat."
 murim_alchemy_competition_observe_tt:0 "Careful observation teaches you techniques you had not considered before."

 # --- EVENT 4: Trading Pills for Secrets ---
 murim_alchemy.0004.t:0 "The Merchant of Hidden Roads"
 murim_alchemy.0004.desc:0 "A cloaked figure approaches you in the market district, speaking quietly of a cultivation manual they have acquired — a fragment of a lost immortal's notes on qi compression and meridian expansion. They want spirit herbs in exchange, claiming gold is too common to be worth their time. Something about them is difficult to read."
 murim_alchemy.0004.a:0 "Make the trade."
 murim_alchemy.0004.b:0 "Investigate them before committing."
 murim_alchemy.0004.c:0 "Decline and report the suspicious merchant."
 murim_alchemy_trade_success_tt:0 "The manual proves genuine. The cultivation insights contained within are extraordinary."
 murim_alchemy_trade_incomplete_tt:0 "The manual is authentic but incomplete — only scattered notes remain. Still useful."
 murim_alchemy_trade_scam_tt:0 "The merchant vanishes with your herbs. A costly lesson in trust."
 murim_alchemy_trade_verified_tt:0 "Your investigation confirms the merchant is legitimate. You trade confidently and gain greatly."
 murim_alchemy_trade_exposed_tt:0 "You uncover the merchant as a thief. Exposing them earns you considerable face."
 murim_alchemy_trade_decline_tt:0 "You turn away the offer. The sect appreciates your caution."

 # --- EVENT 5: Pill Side Effects ---
 murim_alchemy.0005.t:0 "The Poison Beneath the Medicine"
 murim_alchemy.0005.desc:0 "The accumulation of pills over many years has left traces of residual qi-toxins in your meridians. You feel it as a persistent heaviness in the chest — a dull ache that deepens with each breath. Left untreated, it may impede future cultivation. You must decide how to address it."
 murim_alchemy.0005.desc_master:0 "Your mastery of alchemy allows you to recognize the symptoms early: qi-toxin crystallization along the outer meridians. Your own knowledge can guide the purge — but it will still require sacrifice."
 murim_alchemy.0005.a:0 "Enter deep meditation to purge the toxins."
 murim_alchemy.0005.b:0 "Ignore it and push forward — pain is a teacher."
 murim_alchemy.0005.c:0 "Seek a skilled healer and pay for treatment."
 murim_alchemy_sideeffect_purge_tt:0 "The purge is successful but costs cultivation progress. Health is restored."
 murim_alchemy_sideeffect_push_tt:0 "You endure, but your body pays the price. Future breakthroughs will be harder."
 murim_alchemy_sideeffect_healer_tt:0 "The healer cleanses the toxins completely. Worth every coin."

 # --- EVENT 6: Ancient Recipe Recovered ---
 murim_alchemy.0006.t:0 "The Lost Formula of Ancestor Wei"
 murim_alchemy.0006.desc:0 "Hidden within a crumbling annex of an old library — between tax records and moth-eaten histories — you find a slim jade slip etched with a pill formula. The inscription identifies it as the work of Ancestor Wei, a legendary alchemist said to have crafted pills that could compress a decade of cultivation into a single season. The formula is intact. The knowledge within is priceless."
 murim_alchemy.0006.a:0 "Study it yourself. This knowledge belongs with you."
 murim_alchemy.0006.b:0 "Share it with the sect — let all benefit."
 murim_alchemy.0006.c:0 "Sell it to those who will pay the most."
 murim_alchemy_recipe_study_tt:0 "Months of careful study yield mastery. Your alchemy skill surges and cultivation advances."
 murim_alchemy_recipe_share_tt:0 "The sect erupts in gratitude. Your disciples and followers will long remember this gift."
 murim_alchemy_recipe_sell_tt:0 "Gold flows in, but the jianghu whispers that you sold a priceless heritage."

 # --- EVENT 7: Teaching Alchemy ---
 murim_alchemy.0007.t:0 "Passing the Flame"
 murim_alchemy.0007.desc:0 "One of your disciples has shown consistent interest in the alchemy furnace — asking questions, quietly reviewing your formulas late at night. They have the patience for it, if not yet the skill. The question is how much you are willing to share."
 murim_alchemy.0007.a:0 "Teach them everything you know."
 murim_alchemy.0007.b:0 "Teach the basics only. The deeper secrets remain yours."
 murim_alchemy_teach_full_tt:0 "Your disciple blossoms under thorough instruction. They are fiercely loyal."
 murim_alchemy_teach_basic_tt:0 "A foundation is laid. They will grow from here on their own."

 # --- EVENT 8: Pill Auction ---
 murim_alchemy.0008.t:0 "The Auction of Rare Medicines"
 murim_alchemy.0008.desc:0 "The grand hall is packed with cultivators from half a dozen sects, all drawn by rumours of a truly exceptional item: a Heaven-grade cultivation pill retrieved from a sealed vault in the northern mountains. The auctioneer holds it up — a fist-sized crimson sphere pulsing with compressed qi. The bidding is about to begin."
 murim_alchemy.0008.a:0 "Bid aggressively. Win it at any cost."
 murim_alchemy.0008.b:0 "Place a measured bid and hope for the best."
 murim_alchemy.0008.c:0 "Watch, learn, and note who wins."
 murim_alchemy_auction_bid_high_tt:0 "The pill is yours. The cultivation boost is immediate and powerful."
 murim_alchemy_auction_bid_win_tt:0 "Your bid wins by a narrow margin. A fine acquisition."
 murim_alchemy_auction_bid_lose_tt:0 "Outbid at the last moment. The pill goes to a rival."
 murim_alchemy_auction_observe_tt:0 "You learn who purchased the pill and what they paid. Useful intelligence."

 # --- EVENT 9: Pill Toxicity Crisis ---
 murim_alchemy.0009.t:0 "The Poison in the Cure"
 murim_alchemy.0009.desc:0 "It begins as a dull ache in your meridians — familiar, manageable. But this time it does not fade. Every cultivation pill you have ever refined, every elixir consumed in the pursuit of faster advancement, has left a residue behind. The toxins have compounded quietly for years, and now they have reached a threshold your body can no longer absorb. Your qi circuits are sluggish. Your inner sight shows discoloration in the lower dantian. You have run out of time to ignore this."
 murim_alchemy.0009.a:0 "Undergo a full cleansing ritual. Whatever it costs."
 murim_alchemy.0009.b:0 "Channel the toxic qi into a breakthrough attempt — burn it out from the inside."
 murim_alchemy.0009.b.success:0 "The toxic qi burns away in the breakthrough fire. Your body is clean — and stronger."
 murim_alchemy.0009.b.partial:0 "Partial success. Some toxins remain, but the worst has passed."
 murim_alchemy.0009.b.backlash:0 "The breakthrough fails. The toxic qi lashes back through your meridians."
 murim_alchemy.0009.c:0 "Seek a herbalist — use your own stockpile to treat the condition properly."

 # --- EVENT 10: Master Alchemist Recognition ---
 murim_alchemy.0010.t:0 "The Alchemist's Summit"
 murim_alchemy.0010.desc:0 "A letter arrives — not through the ordinary post but carried personally by a young disciple dressed in the colours of the Medicine King Valley sect. The master who sends it is among the most renowned alchemists in the jianghu, a name spoken with respect even in orthodox circles. The message is simple: 'I have heard of your work. I believe we have things to teach each other. I propose a meeting.' The meeting of two master alchemists is always significant — what comes of it depends on you."
 murim_alchemy.0010.a:0 "Accept freely. Share everything — mutual advancement serves the art."
 murim_alchemy.0010.b:0 "Offer a formula exchange. Your best work for their herb stores."
 murim_alchemy.0010.c:0 "Challenge them to a live refinement contest. Let the furnaces decide who is better."
 murim_alchemy.0010.c.win:0 "Your pills are superior. The master acknowledges it gracefully."
 murim_alchemy.0010.c.lose:0 "Their technique is subtler than yours. A humbling but instructive defeat."

 # --- BLACK MARKET HERB AUCTION (0013) ---
 murim_black_market.0013.t:0 "The Midnight Herb Market"
 murim_black_market.0013.desc:0 "Word arrives through an underground contact — the kind of person who knows things before they happen. A trader has surfaced with a private cache of spirit herbs, the sort that command extraordinary prices in any proper market. Instead they are selling them here, tonight, to a small audience of cultivators who know how to keep quiet. The herbs are real: seven-colour lotus root, thousand-year snow fungus, and three varieties of high-mountain qi-moss. The window is narrow. The opportunity is real."
 murim_black_market.0013.a:0 "Bid aggressively — buy everything you can."
 murim_black_market.0013.b:0 "Bid moderately — take what you need."
 murim_black_market.0013.c:0 "Skip the bidding. Watch who buys what."
 murim_black_market.0013.d:0 "Steal from the auction under cover of the chaos."
 murim_black_market.0013.d.success:0 "Quick hands and quicker feet. You leave with an armful of rare herbs."
 murim_black_market.0013.d.caught:0 "Someone saw. Your face is known at every underground market now."
 murim_black_market.0013.d.partial:0 "Partial success. You escape with some herbs but not without being noticed."
 murim_black_market_herb_observe_tt:0 "You map the buyers. Several are cultivators with alchemy connections worth knowing."
