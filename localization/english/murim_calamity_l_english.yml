l_english:
 # === GREAT CALAMITY TRAITS ===
 murim_calamity_survivor:0 "Calamity Survivor"
 murim_calamity_survivor_desc:0 "You endured the Great Calamity. While the world burned and clans fell, you survived. The memories haunt you, but they also made you stronger than any trial could."
 murim_calamity_witness:0 "Calamity Witness"
 murim_calamity_witness_desc:0 "You saw the Great Calamity unfold. The screams, the blood, the fallen masters - all etched into your memory forever. You carry the burden of remembering what was lost."
 murim_calamity_rebuilder:0 "Calamity Rebuilder"
 murim_calamity_rebuilder_desc:0 "From the ashes of the Great Calamity, you chose to rebuild. Where others despaired, you found purpose. New sects rise under your guidance, and the Murim world slowly heals."
 murim_calamity_born_after:0 "Born After the Calamity"
 murim_calamity_born_after_desc:0 "You were born in the aftermath of the Great Calamity. The old world is nothing but stories to you - legends of fallen masters and destroyed clans that shaped the world you know."
 murim_calamity_living_legend:0 "Living Legend of the Calamity"
 murim_calamity_living_legend_desc:0 "You are one of the last survivors of the Great Calamity, and your mere existence is a testament to the old world. Young martial artists seek your wisdom, and even the proudest clan leaders bow in respect."
 murim_calamity_betrayer:0 "Calamity Betrayer"
 murim_calamity_betrayer_desc:0 "During the Great Calamity, you betrayed your allies to survive. The world remembers. Trust is a luxury you will never know again."
 murim_calamity_orphan:0 "Calamity Orphan"
 murim_calamity_orphan_desc:0 "The Great Calamity took everything from you - your parents, your clan, your home. But loss forged you into something harder than steel."
 murim_cycle_breaker:0 "Breaker of the Cycle"
 murim_cycle_breaker_desc:0 "You have done what no one else could - broken the endless cycle of Great Calamities. Through your actions, the Murim world may finally know lasting peace."
 murim_calamity_prophet:0 "Calamity Prophet"
 murim_calamity_prophet_desc:0 "You foresaw the Great Calamity before it came. Some call you mad, others call you blessed. Either way, your warnings went unheeded, and now the world pays the price."
 murim_calamity_warlord:0 "Calamity Warlord"
 murim_calamity_warlord_desc:0 "In the chaos of the Great Calamity, you rose as a warlord. Where others saw destruction, you saw opportunity. Your armies march over the bones of the old world."

 # === GREAT CALAMITY EVENTS ===
 murim_great_calamity.0001.t:0 "Omens of the Great Calamity"
 murim_great_calamity.0001.desc:0 "Strange signs appear across the Murim world. Birds fly south in summer. Rivers run red at dawn. The oldest elders whisper of a cycle they hoped would never return - the Great Calamity approaches."
 murim_great_calamity.0002.t:0 "A Martial Artist Senses Doom"
 murim_great_calamity.0002.desc:0 "Your qi resonates with an unfamiliar frequency. Deep in your meridians, something ancient stirs - a warning encoded in the very fabric of martial cultivation. The Great Calamity is coming."

 # === CALAMITY AI EVENTS ===
 murim_calamity_ai.0001.t:0 "War Declaration - The Calamity Begins"
 murim_calamity_ai.0001.desc:0 "The fragile peace has shattered. Clan leaders, driven mad by ambition and fear, declare war on their neighbors. This is how the Great Calamity always begins - not with a single blow, but with a thousand betrayals."
 murim_calamity_ai.0002.t:0 "Betrayal in the Calamity"
 murim_calamity_ai.0002.desc:0 "Former allies turn on each other. In the madness of the Great Calamity, trust is the first casualty. Your once-sworn brother now stands across the battlefield, blade drawn."
 murim_calamity_ai.0003.t:0 "Mass Death Sweeps the Murim World"
 murim_calamity_ai.0003.desc:0 "The killing has reached its crescendo. Martial artists fall by the hundreds. Entire clans are wiped from existence in a single night. The rivers carry so many bodies that they overflow their banks."
 murim_calamity_ai.0004.t:0 "The Emperor Falls"
 murim_calamity_ai.0004.desc:0 "The Murim Emperor, the supposed pinnacle of martial authority, lies dead. Whether by assassination or battle matters little - the throne is empty, and the last symbol of order has crumbled."
 murim_calamity_ai.0005.t:0 "Civilian Massacre"
 murim_calamity_ai.0005.desc:0 "The common people suffer most in the Great Calamity. With no martial arts to protect themselves, they fall like wheat before the scythe. Villages burn. Cities are abandoned. The world grows silent."
 murim_calamity_ai.0006.t:0 "Survivor Selection"
 murim_calamity_ai.0006.desc:0 "From each clan, only a handful remain. One, two, perhaps three at most. These are the survivors - chosen not by merit but by luck, cunning, or sheer stubbornness. They will carry the torch of their clan into the new era."
 murim_calamity_ai.0007.t:0 "Your Dynasty Endures"
 murim_calamity_ai.0007.desc:0 "Against all odds, your bloodline survives the Great Calamity. Whether through skill, luck, or destiny, your dynasty will see the dawn of a new age. The old world is gone, but you remain."
 murim_calamity_ai.0008.t:0 "Mythology Forms"
 murim_calamity_ai.0008.desc:0 "The survivors gather and speak of what was lost. Already, the truth blurs into legend. The fallen masters become gods. The destroyed clans become mythical kingdoms. The Great Calamity itself becomes a creation myth for the new era."
 murim_calamity_ai.0009.t:0 "Succession Crisis After Death"
 murim_calamity_ai.0009.desc:0 "Your clan leader has fallen in the Calamity. The survivors look to you - the strongest remaining disciple. Will you take up the mantle, or will the clan die with its master?"
 murim_calamity_ai.0010.t:0 "Shockwaves of a Ranker's Death"
 murim_calamity_ai.0010.desc:0 "A great ranker has fallen. The shockwave of their death ripples through the Murim world like an earthquake. If even the mighty can fall, what hope is there for the rest of us?"

 # === CALAMITY EXPANSION EVENTS ===
 murim_great_calamity_expansion.0003.t:0 "Founding a New Sect"
 murim_great_calamity_expansion.0003.desc:0 "From the ashes, you build anew. A new sect, forged in the memory of what was lost and the hope of what might be. Your disciples are few, but their determination burns bright."
 murim_great_calamity_expansion.0004.t:0 "The Old World Becomes Myth"
 murim_great_calamity_expansion.0004.desc:0 "Fifty years have passed since the Great Calamity. The survivors grow old, and their stories grow taller. The pre-Calamity era is now spoken of in hushed, reverent tones - a golden age that may never have truly existed."
 murim_great_calamity_expansion.0005.t:0 "The Rebuilding Continues"
 murim_great_calamity_expansion.0005.desc:0 "Twenty years after the Calamity, the Murim world slowly recovers. New clans form from the remnants of the old. New techniques are born from the ashes of lost manuals. Life goes on."
 murim_great_calamity_expansion.0008.t:0 "A Child of the New Era"
 murim_great_calamity_expansion.0008.desc:0 "Born after the Great Calamity, this young martial artist knows only the new world. The old era is bedtime stories - tales of impossible masters and legendary techniques that feel more like fairy tales than history."

 # === CALAMITY ON_ACTIONS MODIFIERS ===
 murim_calamity_war_frenzy:0 "Calamity War Frenzy"
 murim_calamity_betrayer_opinion:0 "Betrayed During the Calamity"
 murim_living_legend_opinion:0 "Living Legend of the Old Era"
 murim_puppet_controlled:0 "Puppet of the Heavenly Demon"
 murim_shadow_puppeteer:0 "Shadow Puppeteer"

 # === WUDANG EXPANSION 2 ===
 murim_wudang_exp2.0001.t:0 "Taiji Grand Mastery Trial"
 murim_wudang_exp2.0001.desc:0 "The highest trial of Wudang awaits. The 108 Movements of Heaven and Earth - a sequence so complex that even grandmasters spend decades attempting it. Your body and qi must become one with the Dao of Taiji."
 murim_wudang_exp2.0001.a:0 "Attempt the 108 Movements"
 murim_wudang_exp2.0001.b:0 "Meditate on the Dao for a year"
 murim_wudang_exp2.0001.c:0 "Walk the mountain alone"
 murim_wudang_exp2.0002.t:0 "Yin-Yang Dual Cultivation"
 murim_wudang_exp2.0002.desc:0 "The foundation of Wudang philosophy - Yin and Yang. Every martial artist must choose: explosive Yang power, subtle Yin mastery, or the nearly impossible perfect balance."
 murim_wudang_exp2.0002.a:0 "Embrace the Yang path"
 murim_wudang_exp2.0002.b:0 "Embrace the Yin path"
 murim_wudang_exp2.0002.c:0 "Seek perfect balance"
 murim_wudang_exp2.0003.t:0 "Sword-Qi Fusion Breakthrough"
 murim_wudang_exp2.0003.desc:0 "Your sword and your qi are ready to become one. The Sword-Qi Fusion - the pinnacle of Wudang combat arts. Success means transcendence. Failure means destruction."
 murim_wudang_exp2.0003.a:0 "Fuse sword intent with internal qi"
 murim_wudang_exp2.0003.b:0 "Master them separately"
 murim_wudang_exp2.0004.t:0 "Qi Deviation Crisis"
 murim_wudang_exp2.0004.desc:0 "Your qi spirals out of control. Meridians burn. The world spins. This is qi deviation - the nightmare of every cultivator. Act quickly, or your cultivation may be destroyed forever."
 murim_wudang_exp2.0004.a:0 "Seek the Sect Leader's help"
 murim_wudang_exp2.0004.b:0 "Endure alone through iron will"
 murim_wudang_exp2.0004.c:0 "Use forbidden Yin technique"
 murim_wudang_exp2.0005.t:0 "Wudang Internal Power Struggle"
 murim_wudang_exp2.0005.desc:0 "A senior disciple challenges your authority. Whispers of discontent echo through the mountain halls. The sect watches, waiting to see if you are worthy of leading Wudang."
 murim_wudang_exp2.0005.a:0 "Accept the challenge publicly"
 murim_wudang_exp2.0005.b:0 "Offer to share power"
 murim_wudang_exp2.0005.c:0 "Eliminate the threat quietly"
 murim_wudang_exp2.0006.t:0 "The Hermit Sage Path"
 murim_wudang_exp2.0006.desc:0 "Age and wisdom call you to the mountaintop. The path of the Hermit Sage - abandoning worldly concerns to pursue ultimate enlightenment in solitude. Few walk this path. Fewer return."
 murim_wudang_exp2.0006.a:0 "Ascend the mountain"
 murim_wudang_exp2.0006.b:0 "Stay and guide the next generation"
 murim_wudang_exp2.0006.c:0 "One final journey"
 murim_wudang_exp2.0007.t:0 "The Lost Wudang Manual"
 murim_wudang_exp2.0007.desc:0 "Deep in a forgotten cave behind the waterfall, you discover an ancient scroll - the Pure Yang True Scripture, written by Wudang's founder himself. This knowledge could change everything."
 murim_wudang_exp2.0007.a:0 "Study the Pure Yang True Scripture"
 murim_wudang_exp2.0007.b:0 "Share with all orthodox sects"
 murim_wudang_exp2.0007.c:0 "Destroy it - too dangerous"
 murim_wudang_exp2.0008.t:0 "Orthodox Alliance Leadership Bid"
 murim_wudang_exp2.0008.desc:0 "Wudang's prestige has grown enough to challenge for leadership of the Orthodox Alliance. But Shaolin will not yield easily, and the other sects watch with calculating eyes."
 murim_wudang_exp2.0008.a:0 "Claim leadership of the Alliance"
 murim_wudang_exp2.0008.b:0 "Support Shaolin's claim"
 murim_wudang_exp2.0008.c:0 "Wudang walks alone"
 murim_wudang_exp2.0009.t:0 "True Immortal Ascension"
 murim_wudang_exp2.0009.desc:0 "You stand at the threshold of True Immortality. Decades of cultivation, sacrifice, and enlightenment have led to this moment. The heavens themselves seem to hold their breath."
 murim_wudang_exp2.0009.a:0 "Attempt True Immortal Ascension"
 murim_wudang_exp2.0009.b:0 "Pass the knowledge to a successor"
 murim_wudang_exp2.0009.c:0 "Seal the immortal knowledge"
 murim_wudang_exp2.0010.t:0 "Wudang Mountain Under Siege"
 murim_wudang_exp2.0010.desc:0 "Enemy forces march on Wudang Mountain. The sacred halls where generations of sword immortals trained now face destruction. You must choose how to defend your home."
 murim_wudang_exp2.0010.a:0 "Activate the Seven Star Formation"
 murim_wudang_exp2.0010.b:0 "Single combat challenge"
 murim_wudang_exp2.0010.c:0 "Evacuate disciples, sacrifice yourself"

 # === TANG CLAN EXPANSION 2 ===
 murim_tang_exp2.0001.t:0 "Thousand Poison Body Trial"
 murim_tang_exp2.0001.desc:0 "The ultimate trial of the Tang Clan - ingesting a thousand different poisons to build absolute immunity. Many who attempt this die screaming. Those who survive become untouchable."
 murim_tang_exp2.0001.a:0 "Ingest the Thousand Poisons"
 murim_tang_exp2.0001.b:0 "Master through study instead"
 murim_tang_exp2.0001.c:0 "Focus on hidden weapons only"
 murim_tang_exp2.0002.t:0 "Hidden Weapon Forge Discovery"
 murim_tang_exp2.0002.desc:0 "Behind a false wall in the ancestral hall, you discover the legendary Tang forge - where the first generation created weapons so deadly they were sealed away for centuries."
 murim_tang_exp2.0003.t:0 "First Assassination Contract"
 murim_tang_exp2.0003.desc:0 "A wealthy merchant approaches with gold and a name. The Tang Clan's darker tradition calls - assassination for hire. Your ancestors built the clan on such contracts."
 murim_tang_exp2.0004.t:0 "Poison Garden Expansion"
 murim_tang_exp2.0004.desc:0 "The Tang Clan's poison garden has grown beyond its walls. New species of deadly flora bloom under careful cultivation. The question is how to use this expanded arsenal."
 murim_tang_exp2.0005.t:0 "Family Betrayal - Secrets Sold"
 murim_tang_exp2.0005.desc:0 "A Tang family member has been selling clan secrets to outsiders. The hidden weapon blueprints, the poison formulas, the assassination techniques - all compromised."
 murim_tang_exp2.0006.t:0 "Rain of Needles Technique"
 murim_tang_exp2.0006.desc:0 "The legendary Rain of Needles - a thousand poison-tipped needles launched simultaneously with pinpoint accuracy. Only a true hidden weapon master can even attempt this technique."
 murim_tang_exp2.0007.t:0 "Tang vs Poison Flower Palace"
 murim_tang_exp2.0007.desc:0 "Two poison clans, one rivalry that spans generations. The Poison Flower Palace dares to call themselves the true masters of venom. The Tang Clan will not let this stand."
 murim_tang_exp2.0008.t:0 "Tang Merchant Network"
 murim_tang_exp2.0008.desc:0 "Beyond martial arts, the Tang Clan has always been savvy merchants. Poisons, antidotes, weapons, medicines - all flow through Tang trade routes across the Murim world."
 murim_tang_exp2.0009.t:0 "Ancestral Bloodline Awakening"
 murim_tang_exp2.0009.desc:0 "Your blood runs with ancestral power. The Tang bloodline, cultivated over generations of poison immunity, has evolved into something more. The Poison God's legacy awaits."
 murim_tang_exp2.0010.t:0 "Soul Scattering Needle"
 murim_tang_exp2.0010.desc:0 "The ultimate Tang technique - a needle so thin it passes through any defense and scatters the target's soul. One strike, one kill, no exceptions. The weapon to end all weapons."

 # === BEGGAR SECT EXPANSION 2 ===
 murim_beggar_exp2.0001.t:0 "Eighteen Dragon-Subduing Palms Trial"
 murim_beggar_exp2.0001.desc:0 "The Eighteen Dragon-Subduing Palms - the most powerful external martial art in the Murim world. Each palm strike carries the force of a dragon's fury. Few can master even nine of the eighteen."
 murim_beggar_exp2.0002.t:0 "Beggar Sect Intelligence Network"
 murim_beggar_exp2.0002.desc:0 "Beggars see everything. They sit in every market, every corner, every shadow. The Beggar Sect's greatest weapon has never been martial arts - it is information."
 murim_beggar_exp2.0003.t:0 "Dog Beating Staff Succession"
 murim_beggar_exp2.0003.desc:0 "The Dog Beating Staff - symbol of the Beggar Sect Leader's authority. The time has come to pass it to a successor. But who is worthy of carrying the weight of a million beggars?"
 murim_beggar_exp2.0004.t:0 "Clean vs Dirty Faction"
 murim_beggar_exp2.0004.desc:0 "The eternal conflict within the Beggar Sect: the Clean faction wants to modernize, while the Dirty faction holds to ancient traditions. The sect leader must choose a side - or find a way to unite them."
 murim_beggar_exp2.0005.t:0 "Street War"
 murim_beggar_exp2.0005.desc:0 "Local gangs encroach on Beggar Sect territory. The streets belong to the beggars, and they will fight to keep them."
 murim_beggar_exp2.0006.t:0 "Grand Gathering"
 murim_beggar_exp2.0006.desc:0 "The Beggar Sect calls all branches to the Grand Gathering. From every city, every province, every backwater town, the beggars converge for the most important meeting in a generation."
 murim_beggar_exp2.0007.t:0 "Disguise Infiltration"
 murim_beggar_exp2.0007.desc:0 "A beggar can go anywhere unseen. No one looks twice at a ragged figure in the street. This invisibility is the Beggar Sect's deadliest weapon."
 murim_beggar_exp2.0008.t:0 "Wine Immortal Path"
 murim_beggar_exp2.0008.desc:0 "The legendary Drunken Immortal style - fighting while intoxicated, turning stumbles into strikes and hiccups into devastating palm techniques. Unorthodox, undignified, and utterly devastating."
 murim_beggar_exp2.0009.t:0 "Alliance Proposal"
 murim_beggar_exp2.0009.desc:0 "The Beggar Sect stands at a crossroads. Ally with the great orthodox sects, or walk the path alone? The beggars have always been outsiders - but perhaps it is time to change that."
 murim_beggar_exp2.0010.t:0 "Beggar King Ascension"
 murim_beggar_exp2.0010.desc:0 "You have mastered both the Dragon-Subduing Palms and the Dog Beating Staff. You stand at the pinnacle of the Beggar Sect's martial legacy. The title of Beggar King awaits."

 # === SHADOW POLITICS EXPANSION 2 ===
 murim_shadow_pol2.0001.t:0 "The Heavenly Demon's Plan"
 murim_shadow_pol2.0001.desc:0 "The Murim Emperor sits on his throne, fat and complacent. The Heavenly Demon sees an opportunity - why conquer when you can control? A puppet emperor serves better than a dead one."
 murim_shadow_pol2.0002.t:0 "Infiltrating the Imperial Court"
 murim_shadow_pol2.0002.desc:0 "The imperial court is a nest of vipers even without your involvement. Spies, bribes, seduction - the tools of shadow politics. Choose your method of infiltration."
 murim_shadow_pol2.0003.t:0 "The Emperor's Weakness"
 murim_shadow_pol2.0003.desc:0 "Everyone has a weakness. The emperor is no exception. Your agents have discovered his - now the question is how to exploit it."
 murim_shadow_pol2.0004.t:0 "Cover Blown"
 murim_shadow_pol2.0004.desc:0 "Your spy has been discovered. The imperial guard is on high alert. Your carefully laid plans teeter on the edge of collapse."
 murim_shadow_pol2.0005.t:0 "Imperial Succession Crisis"
 murim_shadow_pol2.0005.desc:0 "The throne is empty. In the chaos that follows, whoever acts fastest controls the fate of the Murim world."
 murim_shadow_pol2.0006.t:0 "The Shadow Council"
 murim_shadow_pol2.0006.desc:0 "Power from the shadows requires structure. The Shadow Council - a secret body of the most powerful unorthodox leaders, with the Heavenly Demon at its head."
 murim_shadow_pol2.0007.t:0 "The Council Exposed"
 murim_shadow_pol2.0007.desc:0 "The orthodox sects have discovered the Shadow Council's existence. War drums sound across the Murim world."
 murim_shadow_pol2.0008.t:0 "The Masked Emperor's Decree"
 murim_shadow_pol2.0008.desc:0 "Through your puppet, you can shape the law of the land. What decree will you issue from behind the throne?"
 murim_shadow_pol2.0009.t:0 "True Power vs Shadows"
 murim_shadow_pol2.0009.desc:0 "You have achieved everything a shadow ruler could want. But is this truly power? Or merely its illusion?"
 murim_shadow_pol2.0010.t:0 "The World Reacts"
 murim_shadow_pol2.0010.desc:0 "The Heavenly Demon has revealed himself as the true power behind the throne. The Murim world holds its breath - then erupts."

 # === TOURNAMENT EXPANSION 2 ===
 murim_tourney_exp2.0001.t:0 "Grand Tournament Opening"
 murim_tourney_exp2.0001.desc:0 "The Grand Tournament opens with a thunderous display of martial prowess. Champions from every sect and clan gather to prove their worth before the assembled Murim world."
 murim_tourney_exp2.0002.t:0 "First Round Bracket Fight"
 murim_tourney_exp2.0002.desc:0 "Your first opponent steps into the ring. The crowd roars. This is what the Murim world lives for - the clash of martial artists at the pinnacle of their art."
 murim_tourney_exp2.0003.t:0 "The Dark Horse Appears"
 murim_tourney_exp2.0003.desc:0 "An unknown fighter tears through the brackets with terrifying ease. No one knows their name, their sect, or their style. The dark horse of the tournament has arrived."
 murim_tourney_exp2.0004.t:0 "The Grand Final"
 murim_tourney_exp2.0004.desc:0 "Two fighters remain. The crowd falls silent. This is the moment that will be spoken of for generations - the Grand Final of the tournament."
 murim_tourney_exp2.0005.t:0 "Champion's Reward"
 murim_tourney_exp2.0005.desc:0 "Victory! The crowd chants your name. The tournament master approaches with the champion's reward - a treasure worthy of the greatest martial artist in the Murim world."
 murim_tourney_exp2.0006.t:0 "Young Dragon Tournament"
 murim_tourney_exp2.0006.desc:0 "The Young Dragon Tournament - where the next generation of martial artists prove themselves. Only fighters under 25 may enter, but the competition is no less fierce."
 murim_tourney_exp2.0007.t:0 "Rigged Fight Exposed"
 murim_tourney_exp2.0007.desc:0 "Evidence surfaces that fights are being rigged. Someone is paying fighters to throw matches, corrupting the sacred tradition of the Grand Tournament."
 murim_tourney_exp2.0008.t:0 "Grudge Match"
 murim_tourney_exp2.0008.desc:0 "The sting of tournament defeat lingers. The champion who bested you walks through the Murim world with glory that should have been yours. Will you seek a rematch?"
 murim_tourney_exp2.0009.t:0 "Host the Tournament"
 murim_tourney_exp2.0009.desc:0 "Your sect has been offered the honor of hosting the next Grand Tournament. The prestige is immense, but so is the cost and responsibility."
 murim_tourney_exp2.0010.t:0 "Legendary Tournament"
 murim_tourney_exp2.0010.desc:0 "Once in a century, the Legendary Tournament is held. Only Absolute Masters and above may enter. The stakes are the highest in the Murim world - the title of Murim Lord."
