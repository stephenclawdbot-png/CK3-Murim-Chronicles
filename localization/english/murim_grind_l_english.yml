l_english:

 # ==========================================
 # BODY TEMPERING TRAITS (Levels 1-9)
 # ==========================================

 murim_body_temper_1_iron_skin:0 "Iron Skin"
 murim_body_temper_1_iron_skin_desc:0 "Through relentless strikes against stone and steel, this warrior has forged their outer flesh into a barrier as unyielding as iron. Blades dull against their hide, and lesser blows leave no mark."
 murim_body_temper_2_copper_bones:0 "Copper Bones"
 murim_body_temper_2_copper_bones_desc:0 "The skeletal frame has been tempered with medicinal baths and bone-crushing pressure, granting a resilience that echoes like struck bronze. Fractures that would cripple others are mere inconveniences."
 murim_body_temper_3_steel_meridians:0 "Steel Meridians"
 murim_body_temper_3_steel_meridians_desc:0 "The qi pathways have been refined and hardened through countless cycles of circulation, allowing energy to flow with the precision and force of a river through channels of living steel."
 murim_body_temper_4_silver_blood:0 "Silver Blood"
 murim_body_temper_4_silver_blood_desc:0 "Through alchemical refinement and extreme duress, the very blood has been transmuted. It flows like liquid silver through the veins, carrying vitality that purges toxins and mends wounds with unnatural speed."
 murim_body_temper_5_gold_marrow:0 "Gold Marrow"
 murim_body_temper_5_gold_marrow_desc:0 "The deepest reaches of the body have been touched by cultivation. Golden essence saturates the bone marrow, generating qi-infused blood that radiates a faint warmth perceptible to other cultivators."
 murim_body_temper_6_jade_sinew:0 "Jade Sinew"
 murim_body_temper_6_jade_sinew_desc:0 "Every tendon and muscle fiber has been refined to a jade-like perfection. The body moves with impossible grace and explosive power, each motion carrying the weight of a mountain behind silk-smooth precision."
 murim_body_temper_7_obsidian_core:0 "Obsidian Core"
 murim_body_temper_7_obsidian_core_desc:0 "A core of condensed obsidian qi has crystallized within the dantian, anchoring the body's defenses in a shell of volcanic darkness. Even spirit-grade weapons struggle to pierce this living fortress."
 murim_body_temper_8_diamond_flesh:0 "Diamond Flesh"
 murim_body_temper_8_diamond_flesh_desc:0 "The body has transcended mortal limits. Flesh gleams with a diamond-like luster under sunlight, and the warrior can withstand blows that would shatter castle walls. Few weapons in the mortal realm pose any threat."
 murim_body_temper_9_void_body:0 "Void Body"
 murim_body_temper_9_void_body_desc:0 "The pinnacle of body tempering. The physical form has been refined to the point where it exists partially between realms. Attacks seem to pass through empty space, and the warrior's mere presence distorts the qi of the world around them."

 # ==========================================
 # QI DEVIATION TRAITS
 # ==========================================

 murim_qi_deviation_minor:0 "Minor Qi Deviation"
 murim_qi_deviation_minor_desc:0 "A cultivation accident has caused the qi pathways to become partially misaligned. Periodic tremors and cold sweats plague the body, and channeling internal energy brings sharp, stabbing pain. With rest and careful meditation, recovery is possible."
 murim_qi_deviation_major:0 "Severe Qi Deviation"
 murim_qi_deviation_major_desc:0 "A catastrophic failure during cultivation has shattered several major meridians. Qi leaks uncontrollably from the body, causing violent spasms, blood-tinged coughing, and episodes of delirium. Only a master healer or rare elixir might reverse the damage."
 murim_qi_deviation_crippling:0 "Qi Collapse"
 murim_qi_deviation_crippling_desc:0 "The dantian has ruptured completely. What was once a wellspring of boundless energy is now a hollow void. The cultivation base has been obliterated, and with it, any hope of walking the martial path again. A fate worse than death for any cultivator."

 # ==========================================
 # FORBIDDEN KNOWLEDGE MARKS
 # ==========================================

 murim_forbidden_mark_1:0 "First Mark of the Forbidden"
 murim_forbidden_mark_1_desc:0 "A dark sigil has etched itself upon the soul after dabbling in forbidden cultivation arts. The mark pulses with an alien hunger, granting flickers of terrible insight. Others sense something... wrong... in this one's presence."
 murim_forbidden_mark_2:0 "Abyssal Taint"
 murim_forbidden_mark_2_desc:0 "The second mark has taken root, and the abyss gazes back with familiarity. Dark veins crawl beneath the skin, visible when qi is circulated. The forbidden knowledge whispers constantly now, offering power in exchange for something the bearer cannot quite name."
 murim_forbidden_mark_3:0 "Void Touched"
 murim_forbidden_mark_3_desc:0 "The third and final mark has consumed what remained of the original self. The bearer exists as a vessel for something ancient and terrible. Their eyes occasionally flash with an inhuman light, and the very heavens seem to recoil from their presence. There is no return from this path."

 # ==========================================
 # LIFESTYLE / STATUS TRAITS
 # ==========================================

 murim_sparring_addict:0 "Sparring Addict"
 murim_sparring_addict_desc:0 "This warrior lives for the clash of fists and the ring of steel. Every encounter is a chance to test their limits, and they grow restless without regular combat to sharpen their edge."
 murim_hermit_cultivator:0 "Hermit Cultivator"
 murim_hermit_cultivator_desc:0 "Forsaking the chaos of court and battlefield, this cultivator has turned inward. In solitude and silence, they pursue the deeper mysteries of the Dao, seeking enlightenment over martial glory."
 murim_breakthrough_failure:0 "Breakthrough Failure"
 murim_breakthrough_failure_desc:0 "A failed attempt to break through to the next cultivation realm has left deep scars on body and spirit. The dantian aches, the meridians are bruised, and confidence has been shaken to its core."
 murim_tribulation_survivor:0 "Tribulation Survivor"
 murim_tribulation_survivor_desc:0 "Having endured the wrath of heavenly tribulation and emerged unbroken, this cultivator carries the mark of one who has been tested by the cosmos itself. Their spirit burns with tempered resolve."
 murim_master_teacher:0 "Master Teacher"
 murim_master_teacher_desc:0 "A cultivator renowned for guiding others along the martial path. Their patience and insight have shaped the foundations of many promising disciples, earning them deep respect in the jianghu."
 murim_eternal_rival:0 "Eternal Rival"
 murim_eternal_rival_desc:0 "Bound by the red thread of martial fate to a worthy adversary. This rivalry burns like an undying flame, pushing both warriors to ever greater heights. Neither can rest while the other grows stronger."
 murim_technique_thief:0 "Technique Thief"
 murim_technique_thief_desc:0 "Whispered about in the jianghu as one who steals the hard-won secrets of others. Through cunning observation and ruthless acquisition, they have claimed techniques that were never meant for their hands."

