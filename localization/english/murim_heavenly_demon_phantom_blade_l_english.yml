l_english:

 # ==========================================
 # HEAVENLY DEMON SECT EVENTS
 # ==========================================

 # Event 0001 - Dark Qi Awakening
 murim_demon.0001.t: "Dark Qi Awakening"
 murim_demon.0001.desc: "A surge of dark qi erupts from deep within your meridians. The Heavenly Demon Art responds to your inner turmoil, and shadows coil around your body like living serpents. The other disciples of the sect watch with a mixture of awe and fear — this is the awakening that separates true Heavenly Demon practitioners from mere pretenders."
 murim_demon.0001.a: "Embrace the darkness — let it flow through every meridian!"
 murim_demon.0001.b: "Channel it carefully — power must be controlled."

 # Event 0002 - Demonic Succession Challenge
 murim_demon.0002.t: "Demonic Succession Challenge"
 murim_demon.0002.desc: "A powerful disciple of the Heavenly Demon Sect has formally issued a succession challenge. According to the ancient laws of the sect, the strongest rules — and they believe their mastery of the Heavenly Demon Reversal Art has surpassed yours. The entire sect gathers to witness this fateful confrontation."
 murim_demon.0002.a: "Face them in the Demonic Arena — my power speaks for itself!"
 murim_demon.0002.b: "Refuse the duel — use political maneuvering instead."
 murim_demon.0002.a.win: "Your Heavenly Demon Arts crush their challenge utterly."
 murim_demon.0002.a.lose: "Their technique overwhelms you — the sect watches your fall."

 # Event 0003 - Heretic Purge
 murim_demon.0003.t: "Orthodox Spies Discovered"
 murim_demon.0003.desc: "Your intelligence network has uncovered Orthodox faction agents embedded within the Heavenly Demon Sect. Disciples from Mount Hua, Shaolin, or Wudang have been feeding information about your sect's movements, techniques, and internal politics to the Murim Alliance. The question is how to handle this betrayal."
 murim_demon.0003.a: "Launch a full purge — make an example of every last spy!"
 murim_demon.0003.b: "Deal with them quietly — no need to alarm the sect."
 murim_demon.0003.c: "Turn them into double agents — feed the Alliance lies."

 # Event 0004 - Forbidden Art Temptation
 murim_demon.0004.t: "Ancient Demonic Scroll Discovered"
 murim_demon.0004.desc: "In a hidden chamber beneath the Heavenly Demon Sect's main hall, you discover a scroll sealed with blood runes. It contains the legendary Asura Devouring Art — a technique so dangerous it was sealed away by the sect's founder. The power it promises is immense, but the risk of qi deviation is equally terrifying."
 murim_demon.0004.a: "Study the forbidden technique — power demands sacrifice!"
 murim_demon.0004.b: "Seal it away again — some power is too dangerous."
 murim_demon.0004.c: "Share it with the sect elders for collective study."
 murim_demon.0004.a.success: "The Asura Devouring Art yields its secrets to your will!"
 murim_demon.0004.a.partial: "You grasp fragments of the technique but suffer qi backlash."
 murim_demon.0004.a.fail: "Qi deviation! The forbidden art ravages your meridians!"

 # Event 0005 - Unorthodox Alliance Diplomacy
 murim_demon.0005.t: "Unorthodox Alliance Summit"
 murim_demon.0005.desc: "As a senior member of the Heavenly Demon Sect, you have the authority to propose formal alliances with the other unorthodox factions. The Poison Flower Palace and Phantom Blade Sect both have their own agendas, but a united front against the Orthodox Alliance could shift the balance of power in the entire martial world."
 murim_demon.0005.a: "Propose alliance with the Poison Flower Palace."
 murim_demon.0005.b: "Propose alliance with the Phantom Blade Sect."
 murim_demon.0005.c: "Unite all three unorthodox sects under Heavenly Demon banner!"

 # Event 0006 - Demon Lord Martial Challenge
 murim_demon.0006.t: "Challenge at the Demon Gate"
 murim_demon.0006.desc: "An outsider martial artist has appeared at the gates of the Heavenly Demon Sect, demanding to test their skills against the sect's elders. They claim their martial arts can defeat the legendary Heavenly Demon techniques. Such brazen challenges cannot go unanswered — the sect's reputation is at stake."
 murim_demon.0006.a: "Crush them with the full might of Heavenly Demon Arts!"
 murim_demon.0006.b: "Send a subordinate to fight in your place."
 murim_demon.0006.a.win: "Your Heavenly Demon techniques leave them broken and humbled."
 murim_demon.0006.a.lose: "Their martial arts prove unexpectedly powerful — you fall."

 # Event 0007 - Shadow Disciple Training
 murim_demon.0007.t: "Training the Next Generation"
 murim_demon.0007.desc: "A group of promising young disciples has been selected for advanced training under your guidance. The future of the Heavenly Demon Sect rests on these shoulders. You must decide which branch of the sect's martial arts to emphasize in their training — the devastating Heavenly Demon Reversal Art, or the subtle shadow assassination techniques."
 murim_demon.0007.a: "Train them in the Heavenly Demon Reversal Art."
 murim_demon.0007.b: "Train them in shadow assassination techniques."
 murim_demon.0007.c: "Let them find their own path — true strength is personal."

 # Event 0008 - Internal Power Struggle
 murim_demon.0008.t: "Faction War Within the Demon Sect"
 murim_demon.0008.desc: "Internal factions within the Heavenly Demon Sect have begun openly competing for influence. The loyalist faction supports the current leadership, while a challenger faction believes new blood is needed at the top. Both sides court your support, and your decision could tip the balance of power within the sect for a generation."
 murim_demon.0008.a: "Support the current Heavenly Demon leadership."
 murim_demon.0008.b: "Side with the challenger faction."
 murim_demon.0008.c: "Play both sides — gather intelligence from each."

 # ==========================================
 # PHANTOM BLADE SECT EVENTS
 # ==========================================

 # Event 0001 - Blade Spirit Communion
 murim_phantom.0001.t: "Blade Spirit Communion"
 murim_phantom.0001.desc: "Deep in meditation at the Phantom Blade Sect's Blade Shrine, you feel a resonance between your qi and the spirit dwelling within your weapon. The Phantom Blade tradition teaches that every true blade has a spirit — and those who bond with their blade's spirit can achieve techniques beyond mortal limits. The spirit reaches out to you now."
 murim_phantom.0001.a: "Fully bond with the blade spirit — become one!"
 murim_phantom.0001.b: "Maintain a partial bond — keep my independence."
 murim_phantom.0001.c: "Reject the spirit — I forge my own path."

 # Event 0002 - Assassination Contract
 murim_phantom.0002.t: "The Shadow Contract"
 murim_phantom.0002.desc: "A hooded figure arrives at the Phantom Blade Sect's hidden meeting hall with a high-profile assassination contract. The target is a senior elder of one of the Orthodox clans — someone with powerful allies and formidable martial arts. The payment is extraordinary, but the risk of failure could bring the entire Orthodox faction down upon the sect."
 murim_phantom.0002.a: "Accept the contract — this is what we do."
 murim_phantom.0002.b: "Refuse — the risk outweighs the reward."
 murim_phantom.0002.c: "Warn the target instead — choose honor over profit."
 murim_phantom.0002.a.success: "The phantom strike lands true — the target falls silently."
 murim_phantom.0002.a.partial: "The target is wounded but escapes — partial success."
 murim_phantom.0002.a.fail: "Caught! The Orthodox clans now have your name."

 # Event 0003 - Phantom Step Mastery
 murim_phantom.0003.t: "Nine Phantom Steps"
 murim_phantom.0003.desc: "The Nine Phantom Steps is the Phantom Blade Sect's legendary movement technique — said to make the user appear in nine places simultaneously. Mastering it requires perfect qi control and absolute fearlessness. Your training has reached the point where you might attempt the breakthrough, but failure could shatter your meridians."
 murim_phantom.0003.a: "Attempt to master the Nine Phantom Steps!"
 murim_phantom.0003.b: "Focus on blade work instead — movement will come later."
 murim_phantom.0003.a.mastery: "Nine shadows dance as one — you have mastered the Steps!"
 murim_phantom.0003.a.partial: "You grasp six of the nine steps — partial mastery."
 murim_phantom.0003.a.fail: "Your qi falters at the seventh step — backlash!"

 # Event 0004 - Blade Forging Ritual
 murim_phantom.0004.t: "Forging the Phantom Blade"
 murim_phantom.0004.desc: "The Phantom Blade Sect's forge master has declared you worthy of commissioning a personal blade. Three designs are available: the Shadow Fang — an offensive blade that drinks qi from its victims, the Ghost Whisper — a stealth blade that makes no sound when drawn, or you may choose to reforge a broken ancestral blade from the sect's vault."
 murim_phantom.0004.a: "Commission a Shadow Fang blade — pure offense."
 murim_phantom.0004.b: "Commission a Ghost Whisper blade — stealth is supreme."
 murim_phantom.0004.c: "Reforge an ancestor's broken blade — honor the past."

 # Event 0005 - Sect Infiltration Mission
 murim_phantom.0005.t: "Infiltration Orders"
 murim_phantom.0005.desc: "The Phantom Blade Sect's intelligence division has assigned you an infiltration mission. Your skill in disguise and deception makes you an ideal candidate to embed within one of the Orthodox clans. The intelligence gathered could shift the balance of the next faction war. But if caught, there will be no rescue."
 murim_phantom.0005.a: "Infiltrate Mount Hua Sect — their sword arts hold secrets."
 murim_phantom.0005.b: "Infiltrate Shaolin Temple — their qi techniques are legendary."
 murim_phantom.0005.c: "Decline the mission — too risky."
 murim_phantom.0005.a.success: "Months of careful deception yield Mount Hua's secrets!"
 murim_phantom.0005.a.partial: "You learn some techniques but must extract early."
 murim_phantom.0005.a.caught: "Discovered! Mount Hua disciples corner you at the gate!"
 murim_phantom.0005.b.success: "The Shaolin monks never suspected — their sutras are yours!"
 murim_phantom.0005.b.partial: "Limited access — but even fragments of Shaolin arts are valuable."
 murim_phantom.0005.b.caught: "The abbot's piercing gaze sees through your disguise!"

 # Event 0006 - Blade Dancer Tournament
 murim_phantom.0006.t: "Blade Dance Tournament"
 murim_phantom.0006.desc: "The Phantom Blade Sect holds its annual Blade Dance Tournament — an internal competition where disciples demonstrate their mastery of the sect's signature flowing blade techniques. Victory brings prestige and potential promotion within the sect hierarchy. Your opponent is a skilled rival who has trained specifically to counter your style."
 murim_phantom.0006.a: "Enter the Blade Dance — all-out attack!"
 murim_phantom.0006.b: "Forfeit — I am not ready yet."
 murim_phantom.0006.a.win: "Your blade sings through the air — the dance is yours!"
 murim_phantom.0006.a.lose: "Their counter-style proves effective — you fall in the dance."

 # Event 0007 - Shadow Market Connections
 murim_phantom.0007.t: "The Shadow Market"
 murim_phantom.0007.desc: "The Phantom Blade Sect maintains extensive underworld connections through the legendary Shadow Market — a network of black market dealers, information brokers, and smugglers that operates across the entire martial world. As a senior member, you have the opportunity to expand these connections for the sect's benefit."
 murim_phantom.0007.a: "Establish a poison trade route with Poison Flower Palace."
 murim_phantom.0007.b: "Build an intelligence network spanning all nine clans."
 murim_phantom.0007.c: "Smuggle rare martial arts manuals for profit."

 # Event 0008 - Phantom Blade Legacy
 murim_phantom.0008.t: "The Phantom Legacy"
 murim_phantom.0008.desc: "You have grown old in the service of the Phantom Blade Sect, and the time has come to pass on the sect's most treasured artifact — the Founding Phantom Blade, forged by the sect's founder from meteoric iron and tempered in dragon's blood. The choice of heir will shape the sect's future for generations to come."
 murim_phantom.0008.a: "Pass it to the most talented disciple — merit above blood."
 murim_phantom.0008.b: "Pass it to my own bloodline heir — family first."
 murim_phantom.0008.c: "Destroy the blade — no one should wield such power."

