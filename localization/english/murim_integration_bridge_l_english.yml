l_english:
 murim_integration_bridge.0001.t: "Calamity Strikes the Clan"
 murim_integration_bridge.0001.desc: "The Great Calamity has reached your doorstep. As clan leader, you must decide how to protect your people. Every choice carries the weight of lives -- your disciples, their families, the legacy of generations."
 murim_integration_bridge.0001.a: "Fortify the clan compound."
 murim_integration_bridge.0001.b: "Evacuate the clan members."
 murim_integration_bridge.0001.c: "Form a desperate alliance."
 murim_integration_bridge.0001.d: "Sacrifice the elders in a blood ritual."
 murim_integration_bridge.0002.t: "Rebuilding from Ruins"
 murim_integration_bridge.0002.desc: "The calamity has passed, but the devastation it left behind is staggering. Your clan's compound lies in ruins, and the survivors look to you for guidance. From these ashes, a new future must be forged."
 murim_integration_bridge.0002.a: "Rebuild the ancestral clan."
 murim_integration_bridge.0002.b: "Found an entirely new clan."
 murim_integration_bridge.0002.c: "Merge with another survivor clan."
 murim_integration_bridge.0003.t: "Ranker's Tournament Qualification"
 murim_integration_bridge.0003.desc: "Your high ranking in the Murim Rankings has earned you automatic qualification for the Grand Tournament. A seeded position awaits, but with it comes the crushing pressure of expectations from the entire martial world."
 murim_integration_bridge.0003.a: "Enter as the favored combatant."
 murim_integration_bridge.0003.b: "Send a disciple in my place."
 murim_integration_bridge.0003.c: "Challenge the tournament system."
 murim_integration_bridge.0004.t: "Champion's Rank"
 murim_integration_bridge.0004.desc: "Your tournament victory has sent shockwaves through the Murim Rankings. The ranking elders scramble to reassess, and your name soars on the great tablets. Every cultivator in the martial world now knows your strength."
 murim_integration_bridge.0004.a: "Claim my rank publicly."
 murim_integration_bridge.0004.b: "Stay humble -- hidden dragon."
 murim_integration_bridge.0004.c: "Challenge the current number one."
 murim_integration_bridge.0005.t: "The Puppet Emperor Revealed"
 murim_integration_bridge.0005.desc: "Dark whispers reach your ears -- the Heavenly Demon has installed a puppet on the imperial throne. The Emperor's decrees are not his own. A shadow network controls the court, and the fate of the entire orthodox world hangs in the balance."
 murim_integration_bridge.0005.a: "Investigate the puppet emperor."
 murim_integration_bridge.0005.b: "Rally orthodox clans for war."
 murim_integration_bridge.0005.c: "Secretly approach the Heavenly Demon."
 murim_integration_bridge.0005.d: "Focus on my own clan's survival."
 murim_integration_bridge.0006.t: "War's End -- A New Order"
 murim_integration_bridge.0006.desc: "The faction war has concluded. The victors stand bloodied but triumphant, while the defeated kneel in the mud. The old order has been shattered, and whoever shapes what comes next will control the martial world for generations."
 murim_integration_bridge.0006.a: "Establish the new Murim order."
 murim_integration_bridge.0006.b: "Show mercy to the defeated."
 murim_integration_bridge.0006.c: "Purge the defeated faction."
 murim_integration_bridge.0007.t: "Clan Recruitment Offers"
 murim_integration_bridge.0007.desc: "Word of your entry into the martial world has spread. Clan scouts from across the murim approach with offers of membership, each promising power, prestige, and protection in exchange for your loyalty."
 murim_integration_bridge.0007.a: "Join an orthodox clan."
 murim_integration_bridge.0007.b: "Join an unorthodox clan."
 murim_integration_bridge.0007.c: "Remain clanless -- lone wolf."
 murim_integration_bridge.0007.d: "Found my own clan."
 murim_integration_bridge.0008.t: "Scouting New Talent"
 murim_integration_bridge.0008.desc: "Reports indicate a promising young martial artist has recently entered the murim world. Their raw talent and potential make them a valuable recruit for any clan seeking to strengthen its ranks."
 murim_integration_bridge.0008.a: "Recruit the prospect."
 murim_integration_bridge.0008.b: "They are not worth the effort."
 murim_integration_bridge.0009.t: "Cultivation Breakthrough -- Ranking Impact"
 murim_integration_bridge.0009.desc: "Your recent cultivation breakthrough has fundamentally altered your power level. The ranking elders will soon take notice, and you must decide whether to reveal your new strength or conceal it for strategic advantage."
 murim_integration_bridge.0009.a: "Demonstrate my power publicly."
 murim_integration_bridge.0009.b: "Keep the breakthrough secret."
 murim_integration_bridge.0009.c: "Challenge the entire top ten."
 murim_integration_bridge.0010.t: "Fortification Under Siege"
 murim_integration_bridge.0010.desc: "The calamity hammers against your clan's fortifications. Walls crack, formations flicker, and the desperate cries of disciples fill the night. Everything depends on whether the defenses can hold."
 murim_integration_bridge.0010.a: "The fortifications held!"
 murim_integration_bridge.0010.b: "The walls have been breached!"
 murim_integration_bridge.0011.t: "Evacuation in the Storm"
 murim_integration_bridge.0011.desc: "The evacuation route stretches through devastated lands. Refugees from your clan trudge through mud and rain, carrying what little they could save. Some will not survive the journey, but the clan must endure."
 murim_integration_bridge.0011.a: "Press onward to safety."
 murim_integration_bridge.0012.t: "The Desperate Alliance"
 murim_integration_bridge.0012.desc: "Your desperate calamity alliance has survived the initial crisis. Now the question becomes: do you honor the bond forged in fire, or exploit the vulnerability of your temporary allies?"
 murim_integration_bridge.0012.a: "Honor the alliance."
 murim_integration_bridge.0012.b: "Betray them for resources."
 murim_integration_bridge.0013.t: "Blood Ritual Outcome"
 murim_integration_bridge.0013.desc: "The blood of the sacrificed elders pools in the ritual circle, and dark energy surges through the clan compound. The ancient protective barrier flickers to life -- but such power always demands a price beyond blood."
 murim_integration_bridge.0013.a: "The ritual succeeds."
 murim_integration_bridge.0013.b: "The ritual backfires."
 murim_integration_bridge.0014.t: "Murim Ledger Intelligence"
 murim_integration_bridge.0014.desc: "The Murim Ledger compiles intelligence from across all systems -- rankings, clan politics, shadow operations, and calamity warnings. A comprehensive picture of the martial world's state lies before you."
 murim_integration_bridge.0014.a: "Review the full Murim Ledger."
 murim_integration_bridge.0014.b: "Focus on threats."
 murim_integration_bridge.0014.c: "Share intel with allies."
 murim_integration_bridge.0015.t: "Love Across Clan Lines"
 murim_integration_bridge.0015.desc: "Your forbidden romance with someone from a rival clan has become impossible to hide. As clan leader, this affair could either forge an unprecedented alliance through marriage or ignite a devastating war."
 murim_integration_bridge.0015.a: "Accept the forbidden love."
 murim_integration_bridge.0015.b: "Choose duty over love."
 murim_integration_bridge.0020.t: "Rebuilding Progress"
 murim_integration_bridge.0020.desc: "Months of tireless effort have gone into rebuilding the clan from the calamity's devastation. The training grounds take shape, new disciples arrive, and the ancestral hall begins to rise from the rubble."
 murim_integration_bridge.0020.a: "Rebuilding succeeds!"
 murim_integration_bridge.0020.b: "Rebuilding struggles continue."
 murim_integration_bridge.0021.t: "Merged Clan Aftermath"
 murim_integration_bridge.0021.desc: "The merger of two survivor clans has created a powerful but volatile new faction. Cultural differences, competing martial styles, and old grudges threaten to tear the fragile union apart from within."
 murim_integration_bridge.0021.a: "The merged clan thrives."
 murim_integration_bridge.0021.b: "Internal conflict erupts."
 murim_integration_bridge.0030.t: "Challenging the Tournament"
 murim_integration_bridge.0030.desc: "You have chosen to defy the grand tournament's traditions. The orthodox sects view this as sacrilege, but the unorthodox clans see you as a champion of change. The confrontation will reshape how the martial world settles its disputes."
 murim_integration_bridge.0030.a: "Crash the tournament."
 murim_integration_bridge.0030.b: "Organize a shadow tournament."
 murim_integration_bridge.0050.t: "The Plot Uncovered"
 murim_integration_bridge.0050.desc: "Your investigation has borne fruit -- irrefutable proof that the Heavenly Demon controls the Emperor through a web of shadows and puppets. This knowledge could liberate the martial world or make you its most hunted target."
 murim_integration_bridge.0050.a: "Expose the truth publicly."
 murim_integration_bridge.0050.b: "Keep it as secret leverage."
 murim_integration_bridge.0051.t: "The Demon Retaliates"
 murim_integration_bridge.0051.desc: "Your investigation has been discovered. The Heavenly Demon's agents move against you in the night. Shadows converge on your position, and you realize with cold certainty that you have become the hunted."
 murim_integration_bridge.0051.a: "Face the assassins."
 murim_integration_bridge.0052.t: "Orthodox War Rally"
 murim_integration_bridge.0052.desc: "Your call to arms echoes through the orthodox clans. Some rise to join your cause with righteous fury, while others hesitate, weighing the cost of open war against the Heavenly Demon's forces."
 murim_integration_bridge.0052.a: "We have enough support -- war begins!"
 murim_integration_bridge.0052.b: "We stand alone."
 murim_integration_bridge.0060.t: "Dawn of a New Era"
 murim_integration_bridge.0060.desc: "The faction war is over, and you stand as the architect of a new Murim order. The old power structures crumble as your vision for the martial world takes shape. History will remember this as the moment everything changed."
 murim_integration_bridge.0060.a: "Establish the new era."
 murim_integration_bridge.0061.t: "Seeds of Resistance"
 murim_integration_bridge.0061.desc: "The purge may have broken the enemy's power, but it has sown the seeds of resistance. In hidden valleys and forgotten caves, survivors gather, sharpening their blades and nursing their hatred. Vengeance is patient."
 murim_integration_bridge.0061.a: "Let them come."
 murim_integration_bridge.0090.t: "The Ten-Battle Gauntlet"
 murim_integration_bridge.0090.desc: "You have issued the most audacious challenge in Murim history -- to face all ten top-ranked martial artists in succession. The entire martial world gathers to witness this display of supreme confidence or supreme folly."
 murim_integration_bridge.0090.a: "Begin the gauntlet."
 murim_integration_bridge.0090.b: "Back down."
 murim_integration_bridge.0140.t: "The Murim Ledger"
 murim_integration_bridge.0140.desc: "The comprehensive Murim Ledger lies open before you, containing intelligence on every major system in the martial world. Rankings, clan politics, shadow threats, and calamity warnings -- all are catalogued here."
 murim_integration_bridge.0140.a: "Review the rankings."
 murim_integration_bridge.0140.b: "Study clan politics."
 murim_integration_bridge.0140.c: "Investigate shadow threats."
 murim_integration_bridge.0140.d: "Assess calamity preparations."
 murim_integration_bridge.0141.t: "Allied Intelligence Received"
 murim_integration_bridge.0141.desc: "An ally has shared their Murim Ledger intelligence with you. The information reveals hidden connections and threats you had not previously considered. Such generosity strengthens the bonds between your clans."
 murim_integration_bridge.0141.a: "Study the intelligence carefully."
