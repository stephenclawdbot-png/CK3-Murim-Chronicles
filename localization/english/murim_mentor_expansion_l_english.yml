 # ============================================================
 # MENTOR EXPANSION EVENTS - New Events 0006-0007
 # ============================================================

 # --- EVENT 6: Disciple Surpasses Master ---
 murim_mentor_exp.0006.t:0 "The Student Has Become the Master"
 murim_mentor_exp.0006.desc:0 "It happened quietly, without ceremony. During your last sparring session, you felt it — your master's techniques, once impenetrable walls, have become familiar landscapes. You move through their forms like water, finding the seams they never saw themselves. Your master knows it too. They paused mid-form, turned to look at you, and said nothing for a long moment. The silence between you holds a question that cannot be unasked."
 murim_mentor_exp.0006.a:0 "Accept the change with grace. Become equals."
 murim_mentor_exp.0006.a.secret:0 "Your master smiles and teaches you the one technique they never shared."
 murim_mentor_exp.0006.a.blessing:0 "Your master grants you their blessing before the jianghu."
 murim_mentor_exp.0006.b:0 "Break away — greater heights await beyond any master."
 murim_mentor_exp.0006.c:0 "Conceal it. Maintain your role as their student."

 # --- EVENT 7: Ultimate Technique Inheritance ---
 murim_mentor_exp.0007.t:0 "The Final Teaching"
 murim_mentor_exp.0007.desc:0 "Your master summons you alone at dawn, by the place where they first tested you. They sit with the stillness of deep water, and when they speak it is slowly, with the weight of someone ordering their affairs. 'I have one technique I have never taught anyone,' they say. 'I have been waiting to see if you were worthy. I believe you are. I want you to carry it forward.' Their hands are steady but their qi circulation feels different — the rhythm of someone preparing to put down a long burden."
 murim_mentor_exp.0007.a:0 "Accept. Take everything they offer."
 murim_mentor_exp.0007.b:0 "Ask for more time — learn from them while they still breathe."
 murim_mentor_exp.0007.c:0 "Refuse gently. The path ahead must be wholly mine."

 # --- MEMORY TYPES ---
 received_ultimate_technique_memory:0 "Received the Ultimate Technique"
