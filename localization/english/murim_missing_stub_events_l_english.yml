l_english:
 murim_combat.0020.t: "Elite Combat Challenge"
 murim_combat.0020.desc: "A formidable warrior has issued a direct challenge. Their reputation precedes them — this would be no ordinary fight. Victory could cement your name in the jianghu, but defeat carries its own consequences."
 murim_combat.0020.a: "Accept the challenge!"
 murim_combat.0020.b: "Decline — not worth the risk."
 murim_combat.0020.c: "Turn it into a learning experience."
 murim_cultivation.0002.t: "Qi Deviation Warning"
 murim_cultivation.0002.desc: "Your meridians tremble as unstable qi surges through them. This is qi deviation — a cultivator's worst nightmare. One wrong move could cripple your cultivation permanently, but pushing through could lead to a breakthrough."
 murim_cultivation.0002.a: "Push through the deviation!"
 murim_cultivation.0002.b: "Stabilize carefully."
 murim_cultivation.0002.c: "Abandon the session."
 murim_cultivation.0008.t: "Breakthrough Opportunity"
 murim_cultivation.0008.desc: "The barrier to the next realm thins before you. Your accumulated cultivation trembles at the edge of transformation. This moment may not come again for years — but rushing a breakthrough is how cultivators die."
 murim_cultivation.0008.a: "Attempt the breakthrough now!"
 murim_cultivation.0008.b: "Meditate longer first."
 murim_cultivation.0008.c: "I'm not ready yet."
 murim_cultivation.0030.t: "Cultivation Insight"
 murim_cultivation.0030.desc: "In the quiet hours of dawn meditation, a profound insight crystallizes in your mind. You perceive a subtle truth about qi circulation that could advance your cultivation — or benefit your entire sect if shared."
 murim_cultivation.0030.a: "Apply this insight to your own cultivation."
 murim_cultivation.0030.b: "Share the insight with your sect."
 murim_cultivation.0030.c: "Keep it secret for now."
 murim_cultivation.0050.t: "The Cultivation Crossroads"
 murim_cultivation.0050.desc: "Your cultivation has reached a crossroads. The orthodox path offers steady, safe advancement at the cost of slower progress. The unorthodox path promises rapid power — at unknown cost. Or you could forge your own way entirely."
 murim_cultivation.0050.a: "Walk the orthodox path."
 murim_cultivation.0050.b: "Explore the unorthodox path."
 murim_cultivation.0050.c: "Forge your own way."
 murim_daily.0001.t: "A Day in the Jianghu"
 murim_daily.0001.desc: "Dawn breaks over the martial world. Another day stretches before you — time to be spent training, gathering information, or simply resting your weary body. The jianghu never truly sleeps, but sometimes its warriors must."
 murim_daily.0001.a: "Train at dawn."
 murim_daily.0001.b: "Visit the teahouse for rumors."
 murim_daily.0001.c: "Rest and recover."
 murim_interaction.0040.t: "Diplomatic Encounter"
 murim_interaction.0040.desc: "A representative from another sect has arrived seeking audience. Their demeanor suggests this could lead to alliance — or something more sinister. How you receive them will set the tone for future relations."
 murim_interaction.0040.a: "Extend a hand of friendship."
 murim_interaction.0040.b: "Probe their weaknesses."
 murim_interaction.0040.c: "Dismiss them."
 murim_jianghu.0020.t: "Wandering Warrior"
 murim_jianghu.0020.desc: "A lone martial artist crosses your path on the mountain road. Their bearing suggests considerable skill, yet they travel without sect insignia. Such wanderers can be valuable allies — or dangerous enemies."
 murim_jianghu.0020.a: "Challenge them to a friendly spar."
 murim_jianghu.0020.b: "Share a drink and exchange stories."
 murim_jianghu.0020.c: "Keep your distance."
 murim_jianghu.0030.t: "Underground Market"
 murim_jianghu.0030.desc: "Hidden behind an unassuming tea shop, a thriving underground market deals in forbidden pills, stolen technique scrolls, and intelligence from every corner of the jianghu. The air smells of money and danger."
 murim_jianghu.0030.a: "Browse the forbidden wares."
 murim_jianghu.0030.b: "Sell intelligence to the highest bidder."
 murim_jianghu.0030.c: "Leave — too dangerous."
 murim_jianghu.0040.t: "Sect Recruitment Offer"
 murim_jianghu.0040.desc: "An envoy bearing the seal of a prestigious sect has sought you out specifically. They speak of your growing reputation and extend a formal invitation to join their ranks. A tempting offer — but with strings attached."
 murim_jianghu.0040.a: "Accept the invitation."
 murim_jianghu.0040.b: "Decline politely."
 murim_jianghu.0040.c: "Pretend to accept — spy on them."
 murim_jianghu.0045.t: "Hidden Technique Scroll"
 murim_jianghu.0045.desc: "Wedged behind loose stones in an ancient cave, you discover a weathered scroll bearing technique diagrams of extraordinary sophistication. The martial art described within has been lost for generations."
 murim_jianghu.0045.a: "Study the scroll immediately."
 murim_jianghu.0045.b: "Hide it for later study."
 murim_jianghu.0045.c: "Return it to its rightful owner."
 murim_jianghu.0046.t: "Poisoned Wine"
 murim_jianghu.0046.desc: "The wine before you smells faintly wrong — an almost imperceptible sweetness that doesn't belong. Your host smiles warmly, but their eyes are watching your cup. Someone has laced this drink with poison."
 murim_jianghu.0046.a: "Turn the trap against them."
 murim_jianghu.0046.b: "Pretend to drink — play along."
 murim_jianghu.0046.c: "Confront them directly."
 murim_jianghu.0050.t: "Power Shift in the Jianghu"
 murim_jianghu.0050.desc: "The balance of power in the martial world shifts. A major sect has fallen or a legendary master has died, creating a vacuum that ambitious warriors rush to fill. The winds of change blow strong."
 murim_jianghu.0050.a: "Seize the opportunity to rise."
 murim_jianghu.0050.b: "Stay neutral."
 murim_jianghu.0050.c: "Ally with the rising power."
 murim_jianghu.0055.t: "Secret Meeting at Moonlit Lake"
 murim_jianghu.0055.desc: "Word reaches you of a clandestine gathering at the lake beneath the crescent moon. Leaders from multiple sects are meeting in secret — the implications could reshape the martial world."
 murim_jianghu.0055.a: "Attend the secret meeting."
 murim_jianghu.0055.b: "Report it to the authorities."
 murim_jianghu.0055.c: "Ignore it."
 murim_jianghu.0060.t: "Tavern Brawl"
 murim_jianghu.0060.desc: "The peaceful evening at the tavern shatters as tables flip and fists fly. Two groups of martial artists have come to blows over an old grudge, and the chaos is spreading fast."
 murim_jianghu.0060.a: "Jump in — fists flying!"
 murim_jianghu.0060.b: "Break up the fight."
 murim_jianghu.0060.c: "Slip away quietly."
 murim_jianghu.0075.t: "Legendary Artifact Rumor"
 murim_jianghu.0075.desc: "Whispers in teahouses speak of a legendary weapon — one of the mythical artifacts said to grant power beyond mortal limits. The trail is cold, the competition fierce, and the whole thing could be an elaborate trap."
 murim_jianghu.0075.a: "Investigate the rumor immediately."
 murim_jianghu.0075.b: "Gather more information first."
 murim_jianghu.0075.c: "It's probably a trap — ignore it."
