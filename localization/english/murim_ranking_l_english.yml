 murim_respects_number_one_opinion:0 "Respects the Supreme Martial Artist"
 murim_coward_declined_challenge_opinion:0 "Declined a Ranking Challenge"
 murim_noticed_talent_opinion:0 "Noticed Emerging Talent"
 murim_rank_rival_fallen_tt:0 "Your rival has fallen from the rankings..."
 murim_rank_friend_fallen_tt:0 "A friend has fallen from the rankings..."

 # ---------------------
 # COMBAT TRAUMA TRAITS
 # ---------------------
 trait_shattered_meridians:0 "Shattered Meridians"
 trait_shattered_meridians_desc:0 "A devastating blow has permanently damaged the qi pathways throughout this warrior's body. While they can still sense qi and perform basic cultivation, they will never advance beyond their current rank. The meridians, once shattered, cannot be fully restored -- not even by the greatest alchemists."
 trait_qi_crippled:0 "Qi Crippled"
 trait_qi_crippled_desc:0 "The connection to qi has been completely severed. Whether through meridian destruction, forbidden technique backlash, or a crippling blow in combat, this warrior can no longer access their inner energy. They may still fight with physical strength and skill, but the world of cultivation is forever closed to them."
 trait_combat_scarred:0 "Combat Scarred"
 trait_combat_scarred_desc:0 "Countless battles have left their mark -- both visible and invisible. This veteran fighter carries the weight of every duel, every near-death experience, every comrade lost. The scars grant hard-won experience and prowess, but the stress of yet another fight invitation makes the old wounds ache."
 trait_broken_spirit:0 "Broken Spirit"
 trait_broken_spirit_desc:0 "A crushing defeat -- especially one at the hands of a lesser opponent -- has shattered this warrior's confidence completely. They flinch at the sound of swords clashing, avoid sparring grounds, and refuse every challenge. The body may still be capable, but the will to fight is gone."
 trait_battle_madness:0 "Battle Madness"
 trait_battle_madness_desc:0 "Too many kills, too much violence -- the mind has cracked. This fighter exists in a permanent state of battle readiness, seeing threats in every shadow and enemies in every face. Their prowess in combat is terrifying, but they cannot distinguish friend from foe when the blood rage takes hold."
 trait_phantom_pain:0 "Phantom Pain"
 trait_phantom_pain_desc:0 "An old wound that never truly healed. It flares up without warning -- a stab of agony from a sword cut long since scarred over, or a deep ache in bones broken by a palm strike years ago. On good days, it is merely a nuisance. On bad days, it is debilitating."
 trait_flinch_reflex:0 "Flinch Reflex"
 trait_flinch_reflex_desc:0 "A specific technique type -- the one that nearly killed them -- triggers an involuntary flinch. The body remembers what the mind tries to forget. Against any practitioner of that school of combat, this warrior fights at a permanent disadvantage, their muscles betraying them at the critical moment."
