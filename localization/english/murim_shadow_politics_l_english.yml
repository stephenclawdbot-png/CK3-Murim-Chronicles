l_english:
 murim_shadow_politics.0001.t: "A Shadow Approaches"
 murim_shadow_politics.0001.desc: "A visitor arrives at your court under cover of darkness -- not a diplomat, not a merchant, but something far more dangerous. They represent the Heavenly Demon Sect, and they carry an offer: power, gold, and the destruction of your enemies. All you must surrender is your will."
 murim_shadow_politics.0001.a: "Accept the Heavenly Demon's offer."
 murim_shadow_politics.0001.b: "Reject them and pray they leave."
 murim_shadow_politics.0001.c: "Reject and report them to the orthodox clans."
 murim_shadow_politics.0001.d: "Pretend to accept. Work against them secretly."
 murim_shadow_politics.0002.t: "The Puppet Emperor's First Orders"
 murim_shadow_politics.0002.desc: "The Heavenly Demon's demands arrive sealed in black wax. As their puppet, you must now serve their agenda: persecute the righteous sects, shield the unorthodox from law, rig tournaments, or unleash your army against martial artists who have never wronged you. The leash tightens."
 murim_shadow_politics.0002.a: "Persecute orthodox martial artists."
 murim_shadow_politics.0002.b: "Grant legal immunity to unorthodox clans."
 murim_shadow_politics.0002.c: "Rig the next Grand Tournament."
 murim_shadow_politics.0002.d: "Send armies against orthodox headquarters."
 murim_shadow_politics.0002.e: "Stall for time. Do nothing yet."
 murim_shadow_politics.0003.t: "Orthodox Clans Hear the Truth"
 murim_shadow_politics.0003.desc: "Your warning reaches the leaders of the orthodox martial world. Their reaction is immediate and grateful -- a ruler brave enough to defy the Heavenly Demon and expose their shadow network is a rare and valuable ally. The righteous sects mobilize to protect you."
 murim_shadow_politics.0003.a: "Accept their gratitude and alliance."
 murim_shadow_politics.0003.b: "Request martial bodyguards for protection."
 murim_shadow_politics.0004.t: "The Heavenly Demon Retaliates"
 murim_shadow_politics.0004.desc: "You dared to refuse the Heavenly Demon, and now the consequences arrive. Silent figures move through your palace at night. Your food tasters fall ill. Coded threats appear on your pillow. The Demonic Path does not forgive, and it certainly does not forget."
 murim_shadow_politics.0004.a: "Survive the assassination attempt."
 murim_shadow_politics.0004.b: "Endure as they poison my court."
 murim_shadow_politics.0004.c: "Suffer their blackmail in silence."
 murim_shadow_politics.0005.t: "The Double Agent's Gambit"
 murim_shadow_politics.0005.desc: "You walk a blade's edge between two worlds. To the Heavenly Demon, you are their obedient puppet. In truth, you are gathering evidence of their network, mapping their agents, and preparing to bring their empire of shadows crashing down. One misstep means death."
 murim_shadow_politics.0005.a: "Gather evidence of their network."
 murim_shadow_politics.0005.b: "Sabotage their orders subtly."
 murim_shadow_politics.0005.c: "Contact orthodox clans in secret."
 murim_shadow_politics.0005.d: "Abandon the double agent role."
 murim_shadow_politics.0006.t: "Order to Attack Orthodox Clans"
 murim_shadow_politics.0006.desc: "The Heavenly Demon's latest command crosses every line: deploy your royal army against the martial sects. Send soldiers with swords and spears against masters who can shatter stone with their palms. It is madness, but refusal means the Demon's wrath falls on you instead."
 murim_shadow_politics.0006.a: "Target Mount Hua Sect."
 murim_shadow_politics.0006.b: "Target Shaolin Temple."
 murim_shadow_politics.0006.c: "Target all orthodox clans at once."
 murim_shadow_politics.0006.d: "Refuse. Defy the Heavenly Demon."
 murim_shadow_politics.0007.t: "Exposing the Shadow Empire"
 murim_shadow_politics.0007.desc: "After months of dangerous intelligence gathering, you hold the evidence that could topple the Heavenly Demon's shadow empire. Names, locations, methods -- every strand of their web of puppet rulers and hidden agents is mapped and documented. How you reveal this truth will determine the fate of the martial world."
 murim_shadow_politics.0007.a: "Public declaration at the Grand Tournament."
 murim_shadow_politics.0007.b: "Send evidence secretly to the Alliance Leader."
 murim_shadow_politics.0007.c: "Use it as leverage over the Heavenly Demon."
 murim_shadow_politics.0008.t: "The Double Agent Exposed"
 murim_shadow_politics.0008.desc: "They know. The Heavenly Demon has discovered your treachery, and their fury is absolute. Assassins are already en route. Your palace guard cannot protect you from what is coming. Every exit is watched, every ally compromised. The shadow empire strikes back without mercy."
 murim_shadow_politics.0008.a: "Face the assassins head-on."
 murim_shadow_politics.0008.b: "Flee the capital immediately."
 murim_shadow_politics.0008.c: "Beg the Heavenly Demon for forgiveness."
 murim_shadow_politics.0008.d: "Challenge the Heavenly Demon personally."
 murim_shadow_politics.0009.t: "Orthodox Coalition Forms"
 murim_shadow_politics.0009.desc: "The truth of the puppet emperor has united the orthodox world as nothing else could. Mount Hua, Shaolin, Wudang, Tang Clan, Beggar Sect, and Iron Fist Gate set aside their rivalries to face a common enemy. For the first time in a generation, the Righteous Path speaks with one voice."
 murim_shadow_politics.0009.a: "Lead the coalition against the puppet."
 murim_shadow_politics.0009.b: "Join as a warrior in the coalition."
 murim_shadow_politics.0009.c: "Stay neutral. This is not my fight."
 murim_shadow_politics.0009.d: "Support the puppet emperor."
 murim_shadow_politics.0010.t: "The Great Orthodox Purge"
 murim_shadow_politics.0010.desc: "The puppet emperor has gone mad -- or perhaps their Heavenly Demon masters have. Royal armies march simultaneously against every orthodox sect headquarters. Mount Hua, Shaolin, Wudang -- all targeted for destruction in a single coordinated strike. The martial world's darkest hour has arrived."
 murim_shadow_politics.0010.a: "Unite all orthodox clans in resistance!"
 murim_shadow_politics.0010.b: "Go underground and hide our identity."
 murim_shadow_politics.0010.c: "Flee to foreign lands."
 murim_shadow_politics.0010.d: "Pretend to be unorthodox to survive."
 murim_shadow_politics.0011.t: "Evidence Reaches the Alliance Leader"
 murim_shadow_politics.0011.desc: "The Murim Alliance Leader reads the evidence with trembling hands. Every page reveals another puppet ruler, another poisoned court, another sect betrayed from within. The scope of the Heavenly Demon's infiltration is staggering. The Alliance must act immediately -- but action carries enormous risk."
 murim_shadow_politics.0011.a: "Convene an emergency council."
 murim_shadow_politics.0011.b: "Send a secret strike team."
 murim_shadow_politics.0011.c: "Challenge the Heavenly Demon directly."
 murim_shadow_politics.0012.t: "Duel with the Heavenly Demon"
 murim_shadow_politics.0012.desc: "You stand before the most terrifying martial artist in the world. The Heavenly Demon radiates an aura of such overwhelming malice that lesser warriors would collapse from the pressure alone. Their dark qi warps the air around them. This is the pinnacle of the Demonic Path -- absolute power, absolute evil. And they are smiling at you."
 murim_shadow_politics.0012.a: "Fight with everything I have."
 murim_shadow_politics.0012.b: "Unleash forbidden techniques."
 murim_shadow_politics.0012.c: "Retreat. I am outmatched."
 murim_shadow_politics.0013.t: "The Coalition Marches on the Capital"
 murim_shadow_politics.0013.desc: "The combined might of the orthodox martial world advances on the imperial capital. Thousands of disciples march alongside soldiers and wandering masters united by a single purpose: liberate the puppet emperor and drive the Heavenly Demon's influence from the halls of power forever."
 murim_shadow_politics.0013.a: "Storm the palace!"
 murim_shadow_politics.0013.b: "Siege and starve them out."
 murim_shadow_politics.0013.c: "Negotiate with the puppet emperor."
 murim_shadow_politics.0014.t: "The Puppet Emperor Freed"
 murim_shadow_politics.0014.desc: "The Heavenly Demon's grip on the throne has been broken. The puppet emperor sits dazed and hollow-eyed, freed from years of dark manipulation. The court lies in shambles, but the shadow empire's hold on the government is shattered. Now comes the question of justice -- or mercy."
 murim_shadow_politics.0014.a: "Pardon the emperor. They were controlled."
 murim_shadow_politics.0014.b: "Depose the puppet. They chose this path."
 murim_shadow_politics.0014.c: "Execute them publicly."
 murim_shadow_politics.0015.t: "The Heavenly Demon Defeated"
 murim_shadow_politics.0015.desc: "The unthinkable has happened. The Heavenly Demon -- the shadow that haunted the martial world for a generation -- has been defeated. Their followers scatter like rats from a burning ship. But the Demonic Path has risen before, and it will rise again unless its roots are torn out completely."
 murim_shadow_politics.0015.a: "Hunt down all remaining remnants."
 murim_shadow_politics.0015.b: "Offer amnesty to those who surrender."
 murim_shadow_politics.0015.c: "The Demon will rise again. Let it be."
 murim_shadow_politics.0015.d: "Claim the Demon's techniques for myself."
 murim_shadow_politics.0016.t: "Corruption of the Dark Qi"
 murim_shadow_politics.0016.desc: "The Heavenly Demon's techniques were never meant for righteous hands. Dark qi seeps through your meridians like black ink through rice paper, corrupting everything it touches. Whispers fill your mind -- promises of power, urges toward cruelty. You are becoming what you fought to destroy."
 murim_shadow_politics.0016.a: "Succumb to the corruption."
 murim_shadow_politics.0016.b: "Seal the techniques away forever."
 murim_shadow_politics.0016.c: "Master the darkness. Become the new Demon."
 murim_shadow_politics.0016.d: "Seek Shaolin's help to purify my qi."
