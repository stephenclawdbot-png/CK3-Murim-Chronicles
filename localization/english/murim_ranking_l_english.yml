 # ---------------------
 # RANKING EVENT MODIFIER DESCRIPTIONS (from murim_ranking_event_modifiers.txt)
 # ---------------------
 murim_ranked_fame_modifier_desc:0 "Your ranking has brought fame and recognition. Tea houses buzz with tales of your exploits, and admirers seek your attention."
 murim_ranked_focused_training_modifier_desc:0 "Driven by the pressure of the rankings, you have dedicated yourself to intense martial training, honing your skills beyond what you thought possible."
 murim_ranked_political_influence_modifier_desc:0 "Your position in the martial rankings grants you political influence. Sect leaders and court officials alike seek your counsel on matters of the martial world."
 murim_burning_determination_modifier_desc:0 "The fire of ambition burns within you. Whether seeking to climb higher or reclaim a lost position, your determination pushes you beyond your limits."
 murim_ranking_acceptance_modifier_desc:0 "You have made peace with your current standing in the martial world. This inner calm grants you wisdom and insight that raw ambition cannot."
 murim_ranking_vengeance_modifier_desc:0 "The sting of ranking defeat fuels a burning desire for revenge. You obsess over the one who took your position, plotting your return to glory."

 # ---------------------
 # TIER MODIFIER DESCRIPTIONS (from murim_ranking_effects.txt)
 # ---------------------
 murim_top_10_elite_modifier:0 "Top 10 Elite"
 murim_ranked_top_50_modifier:0 "Top 50 Ranked Fighter"
 murim_ranked_top_50_modifier_desc:0 "You are recognized among the fifty greatest martial artists in the realm. Your name appears on the official Wulin rankings."
 murim_fallen_from_rankings_modifier:0 "Fallen From Rankings"
 murim_fallen_from_rankings_modifier_desc:0 "Once counted among the greatest, you have fallen from the martial rankings. The shame of this decline weighs heavily upon you."

 # ---------------------
 # COMBAT MEMORY DESCRIPTIONS (from murim_ranking_effects.txt)
 # ---------------------
 murim_entered_rankings_memory:0 "I entered the Top 50 martial rankings -- a moment I shall never forget."
 murim_fell_from_rankings_memory:0 "I fell from the martial rankings. The shame burns deeper than any wound."
 murim_duel_victory_memory:0 "I emerged victorious from a martial duel. The thrill of combat still sings in my veins."
 murim_duel_defeat_memory:0 "I was defeated in a duel. The bitter taste of loss lingers."
 murim_combat_wounded_memory:0 "I was wounded in combat. The scar will serve as a reminder of my weakness."
 murim_combat_severely_wounded_memory:0 "I was severely wounded in battle. It is a miracle I survived at all."
 murim_combat_disfigured_memory:0 "Combat left me disfigured. The physical scars pale beside the ones within."
 murim_combat_incapacitated_memory:0 "A devastating blow left me incapacitated. My body may never fully recover."
 murim_combat_fear_memory:0 "After a terrifying defeat, fear has taken root in my heart. The battlefield now fills me with dread."

