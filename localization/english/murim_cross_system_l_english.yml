l_english:

 # === CROSS-SYSTEM INTEGRATION EVENTS ===
 murim_cross_system.0001.t:0 "Shadows in the Underground"
 murim_cross_system.0001.desc:0 "Our spy network has uncovered something unexpected — a vast underground market operating beneath the Murim world. Forbidden weapons, stolen manuals, rare medicinal herbs... all traded in shadowed halls where orthodox law cannot reach. The question is: do we establish contact, or report this den of iniquity?"
 murim_cross_system.0001.a:0 "Establish contact with the underground market"
 murim_cross_system.0001.b:0 "Report this to the orthodox authorities immediately"
 murim_cross_system.0001.c:0 "Play both sides... carefully"

 murim_cross_system.0002.t:0 "The Broker's Proposition"
 murim_cross_system.0002.desc:0 "A shadowy figure approaches through our market contacts. They represent a faction that values information above gold. 'Your trading network reaches places our agents cannot,' they whisper. 'We propose a mutually beneficial arrangement.' The world of espionage beckons."
 murim_cross_system.0002.a:0 "Accept the espionage role — become a shadow broker"
 murim_cross_system.0002.b:0 "Decline. Trade is profitable enough without the danger"

 murim_cross_system.0003.t:0 "Whispers After the Victory"
 murim_cross_system.0003.desc:0 "After our tournament victory, a messenger arrives bearing no clan insignia. The note reads: 'Your strength is wasted in the light. The Shadow Sect offers power beyond what orthodox masters dare teach. Meet us at the crossroads beneath the dead moon.' The shadow sect has noticed our prowess."
 murim_cross_system.0003.a:0 "Join the Shadow Sect and embrace forbidden power"
 murim_cross_system.0003.b:0 "Refuse and report this recruitment attempt"
 murim_cross_system.0003.c:0 "Infiltrate them as a double agent"

 murim_cross_system.0004.t:0 "From Ashes, A Leader Rises"
 murim_cross_system.0004.desc:0 "The Great Calamity left us scarred but not broken. Our spy network survived where armies fell. Now the scattered survivors look to us — someone who can organize, who knows the hidden paths, who can strike from shadows. The resistance needs a leader."
 murim_cross_system.0004.a:0 "Step forward and lead the resistance openly"
 murim_cross_system.0004.b:0 "Lead from the shadows — the enemy must never know our face"

 murim_cross_system.0005.t:0 "Espionage in the Succession War"
 murim_cross_system.0005.desc:0 "The succession war tears our clan apart. But we have an advantage our rivals lack — a network of spies embedded throughout the Murim world. Our spymaster awaits orders. Shall we deploy our intelligence assets against the rival claimant?"
 murim_cross_system.0005.a:0 "Deploy the spy network against our rival"
 murim_cross_system.0005.b:0 "Rely on martial strength alone — honor demands it"

 murim_cross_system.0006.t:0 "Intelligence Between Blood Brothers"
 murim_cross_system.0006.desc:0 "Our blood oath ally lacks the intelligence network we have cultivated. The oath binds us to mutual protection — sharing our spy network would strengthen our alliance immeasurably. But intelligence shared is intelligence compromised."
 murim_cross_system.0006.a:0 "Share our full intelligence network with our sworn brother"
 murim_cross_system.0006.b:0 "Share only what they need to know"

 murim_cross_system.0007.t:0 "The Tribunal's Warrant"
 murim_cross_system.0007.desc:0 "Word has reached us that the Heavenly Tribunal has issued a warrant for our arrest. Our use of forbidden techniques has not gone unnoticed. Three tribunal enforcers approach our gates. We must decide: face their judgment, flee into hiding, or challenge their authority with the very power they seek to condemn."
 murim_cross_system.0007.a:0 "Submit to the Tribunal's judgment"
 murim_cross_system.0007.b:0 "Flee into hiding — we will not be caged"
 murim_cross_system.0007.c:0 "Challenge the Tribunal with our full power"

 murim_cross_system.0008.t:0 "The Ancient Vault Revealed"
 murim_cross_system.0008.desc:0 "Our pursuit of immortality has led us to a hidden vault sealed for centuries. Ancient formations still pulse with qi around the entrance. Within may lie the secrets of the immortal path — or dangers that consumed the vault's original masters. The seal weakens at our touch."
 murim_cross_system.0008.a:0 "Enter the vault alone — this knowledge is ours"
 murim_cross_system.0008.b:0 "Bring trusted disciples to share the discovery"
 murim_cross_system.0008.c:0 "Seal it permanently and report to the elders"

 # === DEATH CASCADE EVENTS ===
 murim_cross_system.0010.t:0 "The Spymaster Falls"
 murim_cross_system.0010.desc:0 "With the death of our intelligence leader, the spy network teeters on collapse. Operatives scattered across the Murim world await orders that will never come. Without swift action, years of carefully cultivated contacts will vanish like morning mist."
 murim_cross_system.0010.a:0 "A lieutenant steps forward to inherit the network"
 murim_cross_system.0010.b:0 "The network dissolves — the spies scatter"

 murim_cross_system.0011.t:0 "The Kingpin is Dead"
 murim_cross_system.0011.desc:0 "The black market kingpin has fallen. In the underground halls, lieutenants eye each other with naked ambition. The power vacuum will consume some and elevate others. The market itself may not survive the chaos."
 murim_cross_system.0011.a:0 "The lieutenants fight for control"

 murim_cross_system.0012.t:0 "A Champion's Empty Throne"
 murim_cross_system.0012.desc:0 "The tournament champion has fallen — not in glorious combat but in the merciless flow of fate. The title stands vacant. Across the Murim world, martial artists sharpen their blades and hone their qi. A succession tournament must be held."
 murim_cross_system.0012.a:0 "Declare a grand succession tournament"

 murim_cross_system.0013.t:0 "Blood Oath Severed by Death"
 murim_cross_system.0013.desc:0 "Our blood oath brother has perished. The bond we swore beneath the heavens now burns like fire in our veins. The oath demands vengeance — or transcendence through grief. The path forward will define us."
 murim_cross_system.0013.a:0 "Swear vengeance — hunt the killer to the ends of the earth"
 murim_cross_system.0013.b:0 "Channel grief into meditation and seek enlightenment"

 murim_cross_system.0015.t:0 "The Succession Tournament"
 murim_cross_system.0015.desc:0 "Warriors from across the realm have gathered. The fallen champion's legacy hangs in the balance. Two finalists face each other in the arena — the winner will inherit the title and all the honor that comes with it."
 murim_cross_system.0015.a:0 "Crown the victor as the new champion"
 murim_cross_system.0015.b:0 "The tournament ends in controversy and dispute"

 murim_cross_system.0020.t:0 "War Awakens Sleeping Spies"
 murim_cross_system.0020.desc:0 "War has come, and with it the need for intelligence. Our dormant spy operatives — placed in enemy territories years ago — await activation. One word from us and they become our eyes and ears behind enemy lines."
 murim_cross_system.0020.a:0 "Activate all dormant spies immediately"
 murim_cross_system.0020.b:0 "Keep them dormant as long-term insurance"

 murim_cross_system.0021.t:0 "War and the Black Market"
 murim_cross_system.0021.desc:0 "War disrupts all trade — except the underground kind. Our black market contacts offer a choice: supply weapons to both sides for enormous profit, or watch as supply lines are severed and our contacts scatter."
 murim_cross_system.0021.a:0 "War profiteering — sell to all sides"
 murim_cross_system.0021.b:0 "The supply lines are cut. The market collapses."

 murim_cross_system.0022.t:0 "The Shadow of Calamity"
 murim_cross_system.0022.desc:0 "This war has grown beyond any clan dispute. Entire regions burn. The destruction echoes the ancient tales of the Great Calamity — when the Murim world was nearly destroyed. Elders whisper that history is repeating itself. We stand at the precipice."
 murim_cross_system.0022.a:0 "The calamity cannot be stopped. Prepare for the worst."
 murim_cross_system.0022.b:0 "Seek peace before the world is consumed"

