l_english:
 murim_iron_fist_gate.0001.t: "Iron Body Initiation"
 murim_iron_fist_gate.0001.desc: "The medicinal bath churns with bitter herbs as the elders prepare the tempering ritual. To join the Iron Fist Gate, your body must be forged like steel — submerged in scalding medicine and hammered by relentless strikes."
 murim_iron_fist_gate.0001.a: "Endure the full tempering."
 murim_iron_fist_gate.0001.b: "Refuse — the pain is too much."
 murim_iron_fist_gate.0001.c: "Attempt a shortcut with herbs."
 murim_iron_fist_gate.0002.t: "Fist of the Mountain"
 murim_iron_fist_gate.0002.desc: "Your master's fist splits a boulder clean in two, and the mountain itself seems to tremble. The Mountain Splitting Fist is the Iron Fist Gate's foundation — every disciple must master its crushing power."
 murim_iron_fist_gate.0002.a: "Train diligently in Mountain Splitting Fist."
 murim_iron_fist_gate.0002.b: "Focus on body cultivation instead."
 murim_iron_fist_gate.0002.c: "Demand to learn the forbidden Demolition Fist."
 murim_iron_fist_gate.0003.t: "The Iron Trial"
 murim_iron_fist_gate.0003.desc: "Three iron pillars stand in the courtyard, each thicker than a man's torso. To advance within the Gate, you must shatter them with your bare fists. The iron is cold and unyielding — just like the Gate itself."
 murim_iron_fist_gate.0003.a: "Strike with full force — break all three."
 murim_iron_fist_gate.0003.b: "Steady approach — break two pillars."
 murim_iron_fist_gate.0003.c: "My hands shatter against the iron..."
 murim_iron_fist_gate.0004.t: "Gate Elder Challenge"
 murim_iron_fist_gate.0004.desc: "A grizzled elder blocks your path to the inner sect, fists raised and eyes burning. Only by defeating an elder in single combat can you prove yourself worthy. His reputation precedes him — he has broken many aspiring disciples."
 murim_iron_fist_gate.0004.a: "Accept — duel the elder."
 murim_iron_fist_gate.0004.b: "Decline — I am not ready yet."
 murim_iron_fist_gate.0004.c: "Challenge a different elder instead."
 murim_iron_fist_gate.0005.t: "Iron Fist Gate Inheritance Crisis"
 murim_iron_fist_gate.0005.desc: "The Gate Master's breathing falters, each exhale weaker than the last. The secret manual of ultimate techniques remains unbestowed. Disciples gather like wolves, each certain they deserve to inherit the Gate."
 murim_iron_fist_gate.0005.a: "Declare myself the rightful successor."
 murim_iron_fist_gate.0005.b: "Support the senior brother."
 murim_iron_fist_gate.0005.c: "Seize the secret manual first."
 murim_iron_fist_gate.0006.t: "Succession Duel Tournament"
 murim_iron_fist_gate.0006.desc: "The dueling platform has been set. Two candidates, one legacy. The Iron Fist Gate's succession will be decided the only way iron understands — through the clash of fists and the will to stand last."
 murim_iron_fist_gate.0006.a: "Fight honorably in the tournament."
 murim_iron_fist_gate.0006.b: "Sabotage the rival before the fight."
 murim_iron_fist_gate.0006.c: "Withdraw and leave the Gate."
 murim_iron_fist_gate.0007.t: "The Forbidden Iron Demon Art"
 murim_iron_fist_gate.0007.desc: "In the Gate's deepest vault, behind seals meant to last eternity, you find a manual bound in dark leather. The Iron Demon Art — a forbidden technique that promises unrivaled power at the cost of one's very soul."
 murim_iron_fist_gate.0007.a: "Study the Iron Demon Art in secret."
 murim_iron_fist_gate.0007.b: "Report the manual to the elders."
 murim_iron_fist_gate.0007.c: "Destroy it before it corrupts anyone."
 murim_iron_fist_gate.0007.d: "Sell its location to the unorthodox."
 murim_iron_fist_gate.0008.t: "War with Heaven's Sword Alliance"
 murim_iron_fist_gate.0008.desc: "The Heaven's Sword Alliance has declared open hostility against the Iron Fist Gate. Their blades are sharp, but your fists are harder. The clash of steel against iron will echo across the martial world."
 murim_iron_fist_gate.0008.a: "Lead the Gate to war."
 murim_iron_fist_gate.0008.b: "Seek peace through the Orthodox Alliance."
 murim_iron_fist_gate.0008.c: "Challenge their leader to single combat."
 murim_iron_fist_gate.0009.t: "Iron Demon Corruption"
 murim_iron_fist_gate.0009.desc: "Dark veins creep across your skin like cracks in stone. The Iron Demon Art is consuming you from within, twisting your qi into something monstrous. Power surges through your fists — but at what cost to your humanity?"
 murim_iron_fist_gate.0009.a: "Embrace the demon power fully."
 murim_iron_fist_gate.0009.b: "Resist and purge it through meditation."
 murim_iron_fist_gate.0009.c: "Seek help from Shaolin monks."
 murim_iron_fist_gate.0010.t: "Legacy of Iron"
 murim_iron_fist_gate.0010.desc: "A lifetime of tempering has made your body a living fortress and your fists weapons of legend. The Iron Fist Gate's future rests on the legacy you choose to leave behind. How will the world remember you?"
 murim_iron_fist_gate.0010.a: "Create the Heavenly Iron Fist technique."
 murim_iron_fist_gate.0010.b: "Pass the legacy to the next generation."
 murim_iron_fist_gate.0010.c: "Seal the Gate and enter eternal meditation."
 murim_iron_fist_gate.0010.d: "Challenge the Heavenly Demon for supremacy."
