l_english:
 murim_sect_alliance.0001.t: "Grand Alliance Formation Ceremony"
 murim_sect_alliance.0001.desc: "Under the Banner of Nine Swords, representatives of the martial world's greatest sects gather to forge a grand alliance against a rising demonic threat. The ceremony requires a blood oath, and every leader present harbors their own ambitions behind a mask of unity."
 murim_sect_alliance.0001.a: "Take the blood oath — become Alliance Leader"
 murim_sect_alliance.0001.b: "Join as a supporting elder"
 murim_sect_alliance.0001.c: "Spy on the alliance for the underworld"
 murim_sect_alliance.0002.t: "Alliance Tournament for Champion"
 murim_sect_alliance.0002.desc: "The alliance must choose its champion — the warrior who will lead armies and represent the combined might of the orthodox sects. A tournament is declared, and every sect sends their finest. The arena fills with killing intent and the electric tension of qi about to be unleashed."
 murim_sect_alliance.0002.a: "Fight with full power for the title"
 murim_sect_alliance.0002.b: "Fight defensively — observe my opponents"
 murim_sect_alliance.0002.c: "Refuse — this is beneath my dignity"
 murim_sect_alliance.0003.t: "Blood Oath Betrayal"
 murim_sect_alliance.0003.desc: "The sacred blood oath has been broken. One among the alliance has betrayed the pact — selling secrets to the demonic sects, sabotaging defenses, poisoning supply lines. Trust, built painstakingly over years of negotiation, shatters in a single act of treachery."
 murim_sect_alliance.0003.a: "Hunt down the oath-breaker myself"
 murim_sect_alliance.0003.b: "Rally the alliance for a coordinated response"
 murim_sect_alliance.0003.c: "Use the chaos to seize power"
 murim_sect_alliance.0004.t: "Sacred Treasure Vault Opening"
 murim_sect_alliance.0004.desc: "The alliance's shared treasure vault — sealed for decades — creaks open at last. Within lies the accumulated wealth of generations: legendary weapons still humming with the qi of dead masters, cultivation elixirs of impossible rarity, and formation diagrams that could fortify a city."
 murim_sect_alliance.0004.a: "Claim a legendary weapon"
 murim_sect_alliance.0004.b: "Take rare cultivation elixirs"
 murim_sect_alliance.0004.c: "Study the ancient formation diagrams"
 murim_sect_alliance.0005.t: "Alliance Dissolution Crisis"
 murim_sect_alliance.0005.desc: "The alliance fractures along old fault lines — petty grudges, competing ambitions, and unresolved blood debts threaten to tear apart everything that was built. Faction leaders argue in raised voices behind closed doors, and disciples of rival sects eye each other with naked hostility."
 murim_sect_alliance.0005.a: "Mediate between factions to preserve unity"
 murim_sect_alliance.0005.b: "Side with the strongest faction"
 murim_sect_alliance.0005.c: "Leave the alliance entirely"
