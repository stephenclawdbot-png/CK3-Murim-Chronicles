l_english:
 murim_wudang.0001.t: "Pure Yang Qi Awakening"
 murim_wudang.0001.desc: "The morning mist clings to Wudang Mountain as you settle into the cultivation chamber. Your meridians hum with untamed qi, yearning for direction. The path to the Tai Chi Sword begins here, in the crucible of Pure Yang."
 murim_wudang.0001.a: "Seek the balance of Yin and Yang."
 murim_wudang.0001.b: "Unleash Pure Yang in a blazing torrent."
 murim_wudang.0001.c: "Practice the forbidden dual body method."
 murim_wudang.0002.t: "Tai Chi Sword Revelation"
 murim_wudang.0002.desc: "Your master draws the sword in a single breath, and the world seems to slow. The Tai Chi Sword is not merely technique — it is philosophy given steel. You must choose how this art will take root within you."
 murim_wudang.0002.a: "Master the classical 49-stance form."
 murim_wudang.0002.b: "Learn the aggressive Seven-Star form."
 murim_wudang.0002.c: "Create my own interpretation of the art."
 murim_wudang.0003.t: "Sword Hall vs Alchemy Hall"
 murim_wudang.0003.desc: "Voices rise like clashing blades in the great hall. The Sword Hall demands more martial training; the Alchemy Hall insists cultivation research is Wudang's true strength. The rift threatens to split the sect."
 murim_wudang.0003.a: "Stand with the Sword Hall."
 murim_wudang.0003.b: "Support the Alchemy Hall."
 murim_wudang.0003.c: "Mediate between both factions."
 murim_wudang.0003.d: "Exploit the chaos for personal gain."
 murim_wudang.0004.t: "The Mountain Hermit"
 murim_wudang.0004.desc: "High above the cloud line, where the air itself tastes of ancient qi, you stumble upon a hermit elder who has not descended Wudang Mountain in decades. His eyes hold the weight of forgotten techniques."
 murim_wudang.0004.a: "Humbly request the elder's teachings."
 murim_wudang.0004.b: "Challenge the hermit to test yourself."
 murim_wudang.0004.c: "Steal his techniques while he sleeps."
 murim_wudang.0004.d: "Observe quietly, then leave in peace."
 murim_wudang.0005.t: "Yin-Yang Heart Sutra Breakthrough"
 murim_wudang.0005.desc: "The Yin-Yang Heart Sutra is Wudang's supreme internal art, a technique that merges body and cosmos. Few have ever completed it. The qi within you surges, demanding a breakthrough or a reckoning."
 murim_wudang.0005.a: "Enter 49 days of secluded meditation."
 murim_wudang.0005.b: "Attempt dual cultivation with a partner."
 murim_wudang.0005.c: "Channel the Ancestral Wudang Sword."
 murim_wudang.0006.t: "Sacred Site on Wudang Mountain"
 murim_wudang.0006.desc: "Behind a curtain of ancient vines, you discover a forgotten cultivation site. Taoist formations still pulse faintly in the stone. The air here is thick with primordial qi, untouched for centuries."
 murim_wudang.0006.a: "Meditate at the Dragon Tiger Pool."
 murim_wudang.0006.b: "Enter the Sword Saint's Cave."
 murim_wudang.0006.c: "Disturb the sealed formation."
 murim_wudang.0006.d: "Report the site to the Sect Master."
 murim_wudang.0007.t: "The Sect Master's Final Lesson"
 murim_wudang.0007.desc: "The Sect Master's sword whispers through the twilight air one last time. Before retirement, there is one final teaching to bestow — a lesson reserved for those who may one day carry Wudang's banner."
 murim_wudang.0007.a: "Accept the lesson with humility."
 murim_wudang.0007.b: "Propose merging my art with theirs."
 murim_wudang.0007.c: "Refuse — I have surpassed the master."
 murim_wudang.0008.t: "Taoist Alchemy Experiment"
 murim_wudang.0008.desc: "The alchemy furnace glows with an inner light as you gather rare ingredients. Wudang's dual path of sword and alchemy demands mastery of both. The question is what you will forge in the crucible tonight."
 murim_wudang.0008.a: "Brew a Qi Enhancement Pill."
 murim_wudang.0008.b: "Attempt a Longevity Elixir."
 murim_wudang.0008.c: "Create a forbidden Berserker Pill."
 murim_wudang.0008.d: "Sell pills to other martial artists."
 murim_wudang.0009.t: "The Berserker Pill's Grip"
 murim_wudang.0009.desc: "Your hands tremble. The berserker pill's fire still burns through your meridians, demanding another dose. Power and madness claw at the edges of your mind. You must choose before the craving consumes you."
 murim_wudang.0009.a: "Quit cold turkey and endure withdrawal."
 murim_wudang.0009.b: "Take another dose — embrace the power."
 murim_wudang.0009.c: "Seek Shaolin Buddhist purification."
 murim_wudang.0010.t: "Seven Immortals Sword Formation"
 murim_wudang.0010.desc: "Seven Wudang swordsmen stand as one, their qi intertwined like the threads of fate itself. The legendary Seven Immortals Formation can repel armies — but only if every position is filled by a worthy blade."
 murim_wudang.0010.a: "Lead from the center position."
 murim_wudang.0010.b: "Take the sword vanguard position."
 murim_wudang.0010.c: "Serve as the qi conduit."
 murim_wudang.0010.d: "Refuse the formation — fight alone."
