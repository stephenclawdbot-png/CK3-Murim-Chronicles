l_english:
 murim_dark.0001.t: "Demonic Whispers"
 murim_dark.0001.desc: "In the depths of meditation, a voice speaks to you — cold, ancient, and seductive. It promises power beyond imagination, cultivation shortcuts that would take decades off your journey. All it asks in return is that you open your heart to the darkness. Just a crack."
 murim_dark.0001.a: "Listen to the voice — embrace the power"
 murim_dark.0001.b: "Purge the voice through righteous meditation"
 murim_dark.0001.c: "Study the phenomenon — knowledge is neutral"

 murim_dark.0002.t: "The Corruption Deepens"
 murim_dark.0002.desc: "The dark qi has taken root within your meridians. You can feel it — a cold presence that amplifies your power but clouds your judgment. Your eyes flash red in moments of anger. Fellow cultivators sense something wrong but can't identify it. The corruption is growing."
 murim_dark.0002.a: "Embrace it fully — become what you are becoming"
 murim_dark.0002.b: "Fight back — purge the corruption through willpower"
 murim_dark.0002.c: "Seek a healer who specializes in qi corruption"

 murim_dark.0003.t: "The Point of No Return"
 murim_dark.0003.desc: "The dark qi surges through every meridian. Your cultivation base trembles on the edge of transformation. Beyond this point lies the Demonic Path — power unimaginable, but at the cost of your humanity. Behind you lies everything you were. The choice is yours alone."
 murim_dark.0003.a: "Complete the transformation — become a Demon Cultivator"
 murim_dark.0003.b: "Resist with everything — shatter the corruption"
 murim_dark.0003.c: "Find a middle path — control the darkness without succumbing"

 murim_dark.0004.t: "Blood Harvest"
 murim_dark.0004.desc: "A defeated enemy lies before you, their cultivation base exposed and vulnerable. You could absorb their life force and qi — a forbidden technique that would dramatically boost your power. No one would know. The temptation is almost physical in its intensity."
 murim_dark.0004.a: "Harvest their cultivation — power demands sacrifice"
 murim_dark.0004.b: "Spare them — I will not become a monster"
 murim_dark.0004.c: "Let them go, but mark them for surveillance"

 murim_dark.0005.t: "The Dark Sect's Offer"
 murim_dark.0005.desc: "A shadowy figure appears in your chambers bearing an invitation sealed in black wax. The Underworld Sect — practitioners of forbidden arts operating in the shadows of the jianghu — wants you to join their ranks. They offer forbidden techniques, dark allies, and resources beyond measure."
 murim_dark.0005.a: "Join the Underworld Sect"
 murim_dark.0005.b: "Refuse and report them to the authorities"
 murim_dark.0005.c: "Pretend to join as a double agent"

 murim_dark.0006.t: "The Cursed Blade"
 murim_dark.0006.desc: "A weapon of extraordinary craftsmanship lies before you — a blade that seems to drink in the light around it. When you touch the hilt, visions flash through your mind: blood, victory, domination. The weapon's previous owner died screaming. But its power is undeniable."
 murim_dark.0006.a: "Wield it — I am strong enough to resist"
 murim_dark.0006.b: "Seal it away where no one can find it"
 murim_dark.0006.c: "Sell it to a collector who doesn't know better"

 murim_dark.0007.t: "The Road to Redemption"
 murim_dark.0007.desc: "A wandering monk approaches you, eyes filled not with judgment but with compassion. 'I sense the darkness within you,' they say quietly. 'It is not too late. The path of redemption is harder than the path of corruption — but far more rewarding. Will you walk it?'"
 murim_dark.0007.a: "Accept — begin the purification journey"
 murim_dark.0007.b: "Decline politely — I control my own darkness"
 murim_dark.0007.c: "The darkness serves me well — leave me be"

 murim_dark.0008.t: "The Soul Devourer"
 murim_dark.0008.desc: "A creature of pure dark qi emerges from a dimensional rift — a Soul Devourer, a being that feeds on the cultivation of martial artists. It's drawn to the concentration of qi in this area. If not stopped, it will consume everything. But fighting it risks corruption."
 murim_dark.0008.a: "Face it in direct combat"
 murim_dark.0008.b: "Flee — this is beyond my power"
 murim_dark.0008.c: "Seek allies before engaging"
