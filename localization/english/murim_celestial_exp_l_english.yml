l_english:
 murim_celestial.2001.t: "Celestial Court Summons"
 murim_celestial.2001.desc: "An imperial envoy arrives bearing a golden decree — the Emperor himself demands your service at the Celestial Court. Your cultivation has drawn the throne's attention. To serve is to gain political power. To refuse is to declare the martial world stands apart from mortal governance."
 murim_celestial.2001.a: "Serve the Emperor — gain political favor"
 murim_celestial.2001.b: "Refuse — the martial world stands apart"
 murim_celestial.2001.c: "Negotiate terms — serve on my conditions"
 murim_celestial.3001.t: "Heavenly Tribulation"
 murim_celestial.3001.desc: "The sky splits with violet lightning as the heavens themselves test your worthiness. This is the Heavenly Tribulation — the barrier between mortal cultivation and something beyond. Thunderclouds spiral above you in a maelstrom of pure destruction. Only the strongest will endure."
 murim_celestial.3001.a: "Face the tribulation head-on"
 murim_celestial.3001.b: "Use a protective formation"
 murim_celestial.3001.c: "Postpone — I am not ready"
 murim_celestial.3002.t: "Celestial Dao Comprehension"
 murim_celestial.3002.desc: "In the stillness between breaths, the fundamental nature of reality reveals itself. The Dao — the Way of Heaven — unfolds before your inner eye like an infinite scroll. To comprehend it is to transcend the limits of mortal martial arts. To forge your own Dao is to challenge heaven itself."
 murim_celestial.3002.a: "Comprehend the Dao of Heaven"
 murim_celestial.3002.b: "Forge my own Dao — reject heaven's path"
 murim_celestial.4001.t: "Celestial Realm Gateway"
 murim_celestial.4001.desc: "The air tears like silk, and through the rift you glimpse a world of crystalline mountains and rivers of liquid starlight — the Celestial Realm, where the immortals dwell. The gateway pulses with energy older than civilization. One step through, and nothing will ever be the same."
 murim_celestial.4001.a: "Step through the gateway"
 murim_celestial.4001.b: "Seal the gateway — too dangerous"
 murim_celestial.4001.c: "Study the gateway without entering"
 murim_celestial.5001.t: "Celestial Artifact Discovered"
 murim_celestial.5001.desc: "Buried beneath ancient ruins, you unearth an artifact that thrums with celestial energy. Its surface is warm to the touch, etched with runes that predate human memory. Such power could elevate your cultivation — or corrupt it beyond salvation."
 murim_celestial.5001.a: "Claim the artifact for myself"
 murim_celestial.5001.b: "Return it to the sect for study"
 murim_celestial.5001.c: "Destroy it before it corrupts anyone"
 murim_celestial.5009.t: "Celestial Convergence"
 murim_celestial.5009.desc: "The stars align in a pattern not seen for a thousand years. Every qi flow in the world shifts and intensifies, meridians humming with borrowed cosmic energy. This is the Celestial Convergence — a once-in-a-lifetime opportunity to harness the power of heaven and earth."
 murim_celestial.5009.a: "Meditate during the convergence"
 murim_celestial.5009.b: "Channel the qi into my cultivation"
 murim_celestial.5010.t: "Celestial Trial of Virtue"
 murim_celestial.5010.desc: "A voice resounds from the heavens, neither male nor female, ancient beyond reckoning. It poses a trial not of strength but of character — your virtue, your integrity, the very essence of your soul laid bare before cosmic judgment. The heavens will decide if you are worthy."
 murim_celestial.5010.a: "Pass the trial through righteousness"
 murim_celestial.5010.b: "Defy the trial — power transcends virtue"
 murim_celestial.5010.c: "Walk the middle path"
 murim_celestial.6001.t: "Celestial Mandate"
 murim_celestial.6001.desc: "The heavens have spoken. A mandate descends upon you — the fate of the entire martial world placed upon your shoulders. You are chosen to be its guardian, its protector, its sovereign. Whether you accept this burden, reject it, or seize it by force will define an era."
 murim_celestial.6001.a: "Accept the mandate — become the guardian"
 murim_celestial.6001.b: "Reject it — no one should wield this power"
 murim_celestial.6001.c: "Seize the mandate by force"
 murim_immortal_ascension.0001.t: "Immortal Ascension Trial"
 murim_immortal_ascension.0001.desc: "You stand at the precipice of mortality itself. Beyond this threshold lies immortality — an existence beyond aging, beyond sickness, beyond the petty concerns of the mortal world. The trial will either elevate you to godhood or shatter everything you have built."
 murim_immortal_ascension.0001.a: "Begin the ascension — shed mortality"
 murim_immortal_ascension.0001.b: "Postpone — continue cultivating"
 murim_immortal_ascension.0001.c: "Forge a new path — neither mortal nor immortal"
 murim_immortal_ascension.0002.t: "Ascension Aftermath"
 murim_immortal_ascension.0002.desc: "The dust of the ascension trial settles, and the world looks different now. Your very existence has been altered by the attempt, whether successful or not. The martial world watches in awe and fear. What will you do with what you have become?"
 murim_immortal_ascension.0002.a: "Inspire the next generation"
 murim_immortal_ascension.0002.b: "Withdraw from the mortal world"
 murim_immortal_ascension.0002.c: "Begin training a successor"
