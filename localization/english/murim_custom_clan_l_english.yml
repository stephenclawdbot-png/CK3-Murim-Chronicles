l_english:
 murim_custom_clan.0001.t: "Founding a New Clan"
 murim_custom_clan.0001.desc: "You have walked the martial path long enough. You have trained disciples, mastered techniques no school claims, and carved your own philosophy. The time has come to plant your banner. But the martial world does not grant this right lightly."
 murim_custom_clan.0001.a: "Petition the Nine Great Clans for approval."
 murim_custom_clan.0001.b: "I am the Supreme Champion. I declare my clan!"
 murim_custom_clan.0001.c: "Not yet — I need more preparation."
 murim_custom_clan.0010.t: "The Petition Vote"
 murim_custom_clan.0010.desc: "Your petition arrives at the next clan leader's desk. They read your credentials, review your fight record, and consider your philosophy. The vote could go either way — unless you tip the scales."
 murim_custom_clan.0010.a: "Present your case with dignity and conviction."
 murim_custom_clan.0010.b: "Offer a generous donation to sway the vote."
 murim_custom_clan.0010.c: "If words fail, let fists speak."
 murim_custom_clan.0030.t: "The Vote Is Tallied"
 murim_custom_clan.0030.desc_approved: "The votes are counted. The majority has spoken: the martial world recognizes your right to found a new clan. The Nine — now Ten — Great Clans welcome you. Name your clan. Choose your path. Write your legacy."
 murim_custom_clan.0030.desc_rejected: "The votes are counted. The majority has spoken: you are denied. The martial world is not ready for your clan. Perhaps in ten years, when memories fade and new alliances form, you may try again."
 murim_custom_clan.0030.a: "The clans have spoken. Found my clan!"
 murim_custom_clan.0030.b: "Accept the rejection with grace."
 murim_custom_clan.0030.c: "They said no. I say I don't care."
 murim_custom_clan.0050.t: "A New Clan Is Born"
 murim_custom_clan.0050.desc: "The moment has arrived. You stand before your followers — the martial artists who believed in you when no one else did. You plant your banner, speak your clan's philosophy, and carve your name into the stone tablet at your clan's gate. A new clan is born."
 murim_custom_clan.0050.a: "Follow the Righteous Path. Honor above power."
 murim_custom_clan.0050.b: "Reject hollow codes. Only strength matters."
 murim_custom_clan.0050.c: "Walk our own path — neither righteous nor demonic."
 murim_custom_clan.0060.t: "Followers Gather"
 murim_custom_clan.0060.desc: "Word spreads of your new clan. Your existing followers formally join, but others come too — clanless wanderers, dissatisfied members of other clans, young fighters seeking a fresh start. Your clan grows, but how it grows matters."
 murim_custom_clan.0060.a: "Accept all who share our philosophy."
 murim_custom_clan.0060.b: "Test each applicant — only the worthy."
 murim_custom_clan.0060.c: "Recruit only from specific backgrounds."
 murim_custom_clan.0070.t: "The Faction Declaration"
 murim_custom_clan.0070.desc: "Five years have passed since you founded your clan. The martial world demands to know: where do you stand? The Murim Alliance asks you to join the Righteous Path. The Heavenly Demon extends an invitation to the Demonic Path. Or you can stand alone — but alone means unprotected."
 murim_custom_clan.0070.a: "Join the Orthodox faction."
 murim_custom_clan.0070.b: "Join the Unorthodox faction."
 murim_custom_clan.0070.c: "We answer to no faction. Permanent independence."
 murim_custom_clan.0080.t: "The Clan Falls"
 murim_custom_clan.0080.desc: "Your clan is gone. The last members have left, died, or defected. The banner you planted with such pride lies in the dust. The martial world moves on. Some clans last centuries. Yours did not. Perhaps that is enough. Perhaps not."
 murim_custom_clan.0080.a: "Accept the end. It was a good run."
 murim_custom_clan.0080.b: "One is enough. I'll rebuild from nothing."
