l_english:
 murim_jianghu.0001.t: "Challenge at the Teahouse"
 murim_jianghu.0001.desc: "The teahouse falls silent as a rival cultivator slams their palm on the table and points a finger at you. Every eye in the room watches — merchants, warriors, informants. What you do next will ripple through the jianghu for months."
 murim_jianghu.0001.a: "Accept the duel"
 murim_jianghu.0001.b: "Decline and walk away"
 murim_jianghu.0001.c: "Poison their tea first"
 murim_jianghu.0001.d: "Talk my way out of this"
 murim_jianghu.0002.t: "Wulin Alliance Summit"
 murim_jianghu.0002.desc: "The great sects have gathered beneath the Banner of the Nine Heavens to elect a new Alliance Leader. Power, gold, and ancient grudges all collide in this hall of calculated smiles and hidden daggers. The outcome will shape the martial world for a decade."
 murim_jianghu.0002.a: "Campaign for the leadership"
 murim_jianghu.0002.b: "Support another candidate"
 murim_jianghu.0002.c: "Sabotage the summit from the shadows"
 murim_jianghu.0002.d: "Attend quietly and observe"
 murim_jianghu.0003.t: "Bounty on Your Head"
 murim_jianghu.0003.desc: "You awaken to the whisper of steel in the dark. Assassins have come for you — someone in the jianghu has placed a price on your head. The shadows writhe with killing intent, and you must decide in the span of a single breath how to survive the night."
 murim_jianghu.0003.a: "Fight them off"
 murim_jianghu.0003.b: "Investigate who sent them"
 murim_jianghu.0003.c: "Buy off the bounty hunters"
 murim_jianghu.0003.d: "Flee into the wilderness"
 murim_jianghu.0004.t: "The Wandering Swordsman"
 murim_jianghu.0004.desc: "A figure in tattered robes walks through your territory carrying nothing but a sword and the weight of a thousand battles. The old-timers whisper the name of a hermit cultivator thought long dead. A chance encounter with a living legend — this moment may never come again."
 murim_jianghu.0004.a: "Challenge them to a duel"
 murim_jianghu.0004.b: "Beg for their teaching"
 murim_jianghu.0004.c: "Offer hospitality and respect"
 murim_jianghu.0004.d: "Ignore them and move on"
 murim_jianghu.0005.t: "Sect War Declaration"
 murim_jianghu.0005.desc: "War drums echo through the mountain valleys as your sect clashes with a rival power. Blood will stain the bamboo groves before this is over. How you lead in this conflict will determine whether your sect rises in glory or crumbles into ash and memory."
 murim_jianghu.0005.a: "Lead the charge personally"
 murim_jianghu.0005.b: "Negotiate for peace"
 murim_jianghu.0005.c: "Betray my sect and join the enemy"
 murim_jianghu.0005.d: "Use the chaos to eliminate a target"
 murim_jianghu.0006.t: "The Underground Tournament"
 murim_jianghu.0006.desc: "A blood-red invitation arrives at midnight — sealed with the mark of the Underworld. A secret death match tournament awaits in the caverns beneath Iron Ghost Mountain. The stakes are life and death, the rewards beyond imagining. Few who enter leave unchanged."
 murim_jianghu.0006.a: "Enter the tournament"
 murim_jianghu.0006.b: "Bet on the fighters"
 murim_jianghu.0006.c: "Report it to the authorities"
 murim_jianghu.0006.d: "Infiltrate for intelligence"
 murim_jianghu.0007.t: "Demonic Path Temptation"
 murim_jianghu.0007.desc: "A demonic cultivator appears from the shadows like a phantom made flesh, their eyes burning with crimson qi. They offer forbidden knowledge — techniques that devour the life force of others to fuel your own power. The orthodox path is slow. The demonic path is fast. Both have their price."
 murim_jianghu.0007.a: "Accept the forbidden knowledge"
 murim_jianghu.0007.b: "Refuse righteously"
 murim_jianghu.0007.c: "Pretend to accept, then betray them"
 murim_jianghu.0007.d: "Absorb their power by force"
 murim_jianghu.0008.t: "Blood Debt Collected"
 murim_jianghu.0008.desc: "The past arrives with a blade drawn and old wounds reopened. Someone you wronged — or whose kin you harmed — has tracked you across the rivers and lakes of the jianghu. Their eyes burn with the weight of years spent sharpening themselves for this single moment of reckoning."
 murim_jianghu.0008.a: "Face them in honorable duel"
 murim_jianghu.0008.b: "Apologize and pay reparations"
 murim_jianghu.0008.c: "Send my disciples to handle it"
 murim_jianghu.0008.d: "Strike them down before they can act"
