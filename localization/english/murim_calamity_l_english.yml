l_english:

 # ========================================
 # GREAT CALAMITY - TRAIT DESCRIPTIONS
 # ========================================

 murim_fate_blessed_desc:0 "The heavens have marked this soul for survival. An invisible thread of destiny shields them from the worst of fate's cruelty."
 murim_fate_doomed_desc:0 "A shadow clings to this soul. The heavens have already written the final chapter, and it ends in ash."
 murim_omen_seer_desc:0 "Visions of fire and silence haunt their dreams. They have seen the end of the martial world — and no one believes them."
 murim_omen_denier_desc:0 "Omens are for the weak and superstitious. The martial world has stood for centuries and will stand for centuries more."
 murim_heaven_touched_desc:0 "The Qi disturbances have left their mark — a trembling in the meridians, a flicker behind the eyes. Something fundamental has changed."
 murim_calamity_survivor_desc:0 "They walked through the fire and came out the other side. The screams of the dying still echo in the silence between heartbeats. They survived the Great Calamity. Most did not."
 murim_bearer_of_ashes_desc:0 "They carry the weight of an entire era on their shoulders — the techniques, the stories, the names of the dead. They are the memory of a world that no longer exists."
 murim_last_of_shaolin_desc:0 "The last disciple of Shaolin. The thousand-year temple is ash, the monks are bones, and the sutras burn in memory alone. Only they remain to chant the final prayer."
 murim_last_of_wudang_desc:0 "The last sword of Wudang. The mountain is silent now, the sword halls empty, the Tai Chi circles undrawn in the dust. They carry the Yin-Yang Heart Sutra in a mind that cannot forget."
 murim_last_of_mount_hua_desc:0 "The last blade of Mount Hua. The plum blossoms fall on graves now, and the Thirteen Swords exist only in the memory of hands that once held steel. The Plum Blossom Sword Saint is gone."
 murim_last_of_beggar_sect_desc:0 "The last of the Beggar Sect. The intelligence network is ashes, the Dog Beating Staff broken, the Eighteen Dragon Subduing Palms known to only one living soul. The eyes and ears of the Jianghu have gone blind and deaf."
 murim_last_of_iron_fist_desc:0 "The last Iron Fist. The gates are rubble, the training grounds are graves, and the Vajra Fist exists in one pair of scarred hands. The body is the weapon — and this body remembers."
 murim_last_of_tang_clan_desc:0 "The last of the Tang bloodline. The hidden weapons are scattered, the poison gardens burnt, the secret passages collapsed. Generations of deadly craft survive in a single mind."
 murim_last_of_heavenly_demon_desc:0 "The last of the Heavenly Demon Sect. The Dark Qi fades, the demonic throne sits empty, and the forbidden arts that terrified the orthodox world are remembered by one soul alone."
 murim_last_of_poison_flower_desc:0 "The last flower of the Poison Flower Palace. The Garden of Ten Thousand Poisons is withered, the Bewitching Arts have no audience, and the deadliest beauty in the martial world walks alone."
 murim_last_of_phantom_blade_desc:0 "The last shadow of the Phantom Blade Sect. The blade spirits are silent, the assassination contracts unfulfilled, and the Nine Phantom Steps leave tracks that no one follows."
 murim_calamity_accelerator_desc:0 "They didn't just watch the world burn — they lit the match. When the Great Calamity came, they saw opportunity in the chaos and seized it with both hands."
 murim_calamity_peacemaker_desc:0 "They tried to stop it. They begged, pleaded, negotiated, and sacrificed — and in the end, the world burned anyway. But they tried. That has to count for something."
 murim_child_of_renewal_desc:0 "Born after the fire. They never knew the old world, only the stories their parents whisper in the dark. They are the first generation of a new era — carrying hope they don't fully understand."

 # ========================================
 # PRE-CALAMITY OMEN EVENTS
 # ========================================

 murim_calamity.0001.t:0 "Strange Qi Disturbance"
 murim_calamity.0001.desc:0 "Something is wrong with the Qi. You felt it during morning meditation — a tremor in the meridians, like the earth itself shuddering beneath your crossed legs. The flow of heaven and earth has... stuttered. Other martial artists report the same: techniques misfiring, cultivation suddenly harder, a wrongness in the air that has no name.\n\nThe elders say it happened before, in the legends. Before the last Great Calamity. Before the world burned."
 murim_calamity.0001.desc_seer:0 "You saw it before you felt it. In your dreams, the rivers of Qi that flow through the earth turned black, then stopped. Mountains crumbled. The sky wept blood. You woke screaming — and then you felt the tremor during meditation, exactly as the dream foretold.\n\nThe visions are getting worse. And they are getting clearer."
 murim_calamity.0001.a:0 "Meditate deeper — try to understand what's happening."
 murim_calamity.0001.b:0 "A minor fluctuation. Nothing more."
 murim_calamity.0001.c:0 "Warn the other martial artists immediately."

 murim_calamity.0010.t:0 "The Animals Flee"
 murim_calamity.0010.desc:0 "Your subjects report something disturbing: the animals are leaving. Birds fly south in the wrong season. Deer abandon forests they've lived in for generations. Wolves howl at noon. Fish float belly-up in rivers that seem clean.\n\nThe old farmers say they've seen this before — in the stories their grandmothers told. The stories about the last time the world ended."
 murim_calamity.0010.a:0 "Send scouts to investigate the source."
 murim_calamity.0010.b:0 "Pray for guidance from heaven."
 murim_calamity.0010.c:0 "Animals are stupid. Ignore it."

 murim_calamity.0011.t:0 "The Dead Qi Zones"
 murim_calamity.0011.desc:0 "The scouts return with haunted eyes. They found areas where Qi simply... doesn't exist. Dead zones, miles across, where no cultivation is possible, no techniques function, and martial artists feel like ordinary mortals. The land itself has rejected the martial world.\n\nThey also found bones in the dead zones. Very old bones. Wearing very old armor. From the last time this happened."
 murim_calamity.0011.a:0 "Record the locations. This knowledge may save lives."

 murim_calamity.0020.t:0 "A Vision of the End"
 murim_calamity.0020.desc:0 "The dream comes uninvited, in the deepest hour of the night.\n\nYou stand on a mountain overlooking the entire martial world. Below you, the nine great clans clash — Shaolin against Heavenly Demon, Mount Hua against Phantom Blade, Tang Clan hidden weapons raining like stars. The earth splits. The sky darkens. One by one, the great masters fall.\n\nAnd then silence. A silence so profound it has weight.\n\nYou see the aftermath: empty training halls, broken swords rusting in rain, children asking where their parents went. The martial world is gone. All of it.\n\nAnd then you see the first green shoot pushing through the ash.\n\nYou wake up weeping."
 murim_calamity.0020.a:0 "The vision was real. Prepare for what's coming."
 murim_calamity.0020.b:0 "Try to warn the Murim Alliance — they must know."
 murim_calamity.0020.c:0 "It was just a dream. Just a dream."

 # ========================================
 # PHASE 1: THE GATHERING STORM
 # ========================================

 murim_calamity.1000.t:0 "THE GATHERING STORM"
 murim_calamity.1000.desc:0 "It has begun.\n\nThe signs were there for years — the Qi disturbances, the dead zones, the prophetic dreams. But now the storm has arrived in flesh and steel. Old alliances shatter overnight. Border disputes that simmered for decades erupt into open warfare. Orthodox sects accuse unorthodox sects of causing the Qi collapse. Unorthodox sects accuse orthodox sects of hoarding resources.\n\nEveryone is right. Everyone is wrong. And everyone is reaching for their swords.\n\nThe Great Calamity approaches. The only question left is: what will you do with the time that remains?"
 murim_calamity.1000.a:0 "Rally my forces. If war is coming, I will be ready."
 murim_calamity.1000.b:0 "Seek alliance. If we stand together, perhaps we can survive."
 murim_calamity.1000.c:0 "Let it burn. I will rule whatever rises from the ashes."
 murim_calamity.1000.d:0 "Flee to the mountains. Seek seclusion. Survive."

 murim_calamity.1010.t:0 "Choose Your Side"
 murim_calamity.1010.desc:0 "The martial world has split into two camps, and neutrality is becoming impossible. The Orthodox Alliance — Shaolin, Wudang, Mount Hua, and their sworn brothers — demands unity against what they call 'the corruption of heaven.' The Unorthodox Coalition — led by the Heavenly Demon Sect, flanked by Poison Flower Palace and Phantom Blade — claims the orthodox sects caused this crisis through their rigid suppression of true martial arts.\n\nBoth sides are recruiting. Both sides are threatening. The middle ground is shrinking by the day."
 murim_calamity.1010.a:0 "Stand with the Orthodox Alliance. Honor and righteousness."
 murim_calamity.1010.b:0 "Join the Unorthodox Coalition. Freedom and power."
 murim_calamity.1010.c:0 "Refuse to choose. Both sides are wrong."

 murim_calamity.1020.t:0 "One Last Chance"
 murim_calamity.1020.desc:0 "You have the standing, the skill, and the reputation to attempt what no one else can: a Grand Summit of all nine clans. Orthodox and unorthodox, sitting at the same table, setting aside centuries of hatred to face the true enemy — the Calamity itself.\n\nIt would require emptying your treasury, spending every favor you've ever earned, and convincing people who have sworn blood oaths to destroy each other to share a cup of tea instead.\n\nIt might be impossible. But so was everything you've achieved in the martial world."
 murim_calamity.1020.a:0 "Call the Grand Summit. This is worth everything I have."
 murim_calamity.1020.b:0 "It's too late. Focus on survival."

 # ========================================
 # PHASE 2: THE GREAT WAR
 # ========================================

 murim_calamity.2000.t:0 "THE GREAT WAR"
 murim_calamity.2000.desc:0 "The war erupts everywhere at once.\n\nShaolin burns. Wudang's mountain paths run red. Mount Hua's plum blossom forests are cut down for siege engines. The Beggar Sect's intelligence network collapses as agents are hunted and killed. Iron Fist Gate's walls — walls that stood for two hundred years — crumble under the combined assault of three sects.\n\nThe Heavenly Demon Sect unleashes forbidden arts that crack the earth. Poison Flower Palace poisons entire rivers. Phantom Blade assassins kill three sect leaders in a single night.\n\nThe Tang Clan's hidden weapons rain from the sky. The sky rains back.\n\nThis is not a war. This is an extinction event."
 murim_calamity.2000.a:0 "Lead the charge. Fight for everything we are."
 murim_calamity.2000.b:0 "Coordinate from behind. Strategy wins wars, not bravery."
 murim_calamity.2000.c:0 "Protect the civilians. Save who I can."

 murim_calamity.2010.t:0 "Death in the Great War"
 murim_calamity.2010.desc:0 "Another master falls. The war takes everyone eventually — the skilled and the weak, the righteous and the corrupt, the young and the old. The martial world devours its own children."
 murim_calamity.2010.a:0 "They fought well. They are at peace now."

 murim_calamity.2020.t:0 "The Heavenly Demon Makes His Move"
 murim_calamity.2020.desc:0 "In the chaos of the Great War, the Heavenly Demon Sect makes its ultimate gambit. The Demon Lord — whoever holds that terrible title now — has gathered the full power of the dark arts and marches not just against the orthodox sects, but against the world itself.\n\nThe dark Qi radiates outward like a plague, corrupting everything it touches. Martial artists who resist go mad. Those who submit lose their humanity. The Demon Lord doesn't want to win the war — they want to end the concept of war by ending everything else."
 murim_calamity.2020.a:0 "Stand against the Demon Lord. This ends here."
 murim_calamity.2020.b:0 "Evacuate. Save who I can and run."
 murim_calamity.2020.c:0 "Join the Demon Lord. If the world must end, be on the winning side."

 # ========================================
 # PHASE 3: THE SILENCE
 # ========================================

 murim_calamity.3000.t:0 "THE SILENCE"
 murim_calamity.3000.desc:0 "It ends not with a final clash, but with absence.\n\nOne morning you wake and there is no sound of training. No steel on steel. No morning sutras from Shaolin. No sword drills on Wudang mountain. No laughter from the Beggar Sect's camps. No screams from Poison Flower Palace's gardens.\n\nSilence.\n\nYou walk through what used to be the martial world and find only ghosts. The great sects are ruins. The clans are bloodlines with no blood left. The rankings, the tournaments, the alliances, the rivalries — all of it means nothing now.\n\nYou are alive. You don't know why. Most people you knew are not."
 murim_calamity.3000.a:0 "Survey the devastation. See what remains."

 murim_calamity.3010.t:0 "The Last of Your Kind"
 murim_calamity.3010.desc:0 "You search for weeks. You send messages to every contact, every safe house, every hidden refuge your clan maintained. The responses don't come.\n\nSlowly, the truth settles like ash on your shoulders: you are the last. Every brother, every sister, every elder, every disciple — gone. The techniques that took generations to perfect exist now only in your memory. The history, the traditions, the prayers — all of it rests on you alone.\n\nYou are not a person anymore. You are a living memorial."
 murim_calamity.3010.a:0 "I will carry the legacy. They will not be forgotten."
 murim_calamity.3010.b:0 "Let it die. The clan failed. We all failed."

 murim_calamity.3020.t:0 "Wandering Through the Ruins"
 murim_calamity.3020.desc:0 "You walk through the ruins of what was once the greatest martial world in history. Training halls where legends were born are now rubble. Libraries of ancient techniques are ash. The tournament grounds where champions were crowned are mass graves.\n\nBut here and there — signs of life. A footprint in the dust. A fire still smoking. A child crying behind a collapsed wall."
 murim_calamity.3020.a:0 "Search for other survivors. We are not alone."
 murim_calamity.3020.a.tt_found:0 "You find another survivor — scarred, haunted, but alive."
 murim_calamity.3020.a.tt_child:0 "You find a child among the ruins — the first of the new generation."
 murim_calamity.3020.a.tt_nothing:0 "Nothing but bones and ash. The silence continues."
 murim_calamity.3020.b:0 "Bury the dead first. They deserve that much."

 # ========================================
 # PHASE 4: THE RENEWAL
 # ========================================

 murim_calamity.4000.t:0 "THE RENEWAL"
 murim_calamity.4000.desc:0 "Spring comes to the ashes.\n\nNot all at once — a blade of grass here, a bird call there, a child's laughter somewhere in the distance. The world remembers how to live, even if the people in it have forgotten.\n\nThe survivors gather. They are few — a handful from each clan, if the clan survived at all. Some clans are gone entirely, their techniques lost to history, their names becoming the new mythology.\n\nBut from every ending comes a beginning. The martial world is empty, which means it is waiting to be filled. New sects will rise. New techniques will be created. New legends will be born.\n\nThe cycle continues. It always continues."
 murim_calamity.4000.a:0 "Gather the survivors. We rebuild — together."
 murim_calamity.4000.b:0 "Seek lost techniques in the ruins. The old knowledge must not die."
 murim_calamity.4000.c:0 "Start fresh. The old ways led to this. We need something new."

 murim_calamity.4010.t:0 "Lost Technique Recovered"
 murim_calamity.4010.desc:0 "Deep in the ruins of a fallen sect, hidden beneath collapsed walls and decades of dust, your hands close around a scroll case. Inside, perfectly preserved, is a technique manual from the previous era — a style thought lost forever in the Great Calamity.\n\nThe characters are faded but legible. The diagrams are precise. This is not just a technique — it is a bridge to the past, proof that the old masters' knowledge can survive even the end of the world."
 murim_calamity.4010.a:0 "Study and master this technique. I will be its living vessel."
 murim_calamity.4010.b:0 "Preserve it for the next generation. This is too important for one person."

 murim_calamity.4020.t:0 "Training the New Generation"
 murim_calamity.4020.desc:0 "Your child stands before you — young, eager, knowing nothing of the world that was. They have heard the stories, of course. Everyone has heard the stories. But stories are not the same as standing in a training hall at dawn, feeling the weight of a real sword, learning to channel Qi for the first time.\n\nYou can give them that. You can teach them everything you know — everything your masters taught you, everything the fallen world created. Or you can let them find their own path, unburdened by the failures of the past."
 murim_calamity.4020.a:0 "Train them in the old ways. The techniques must survive."
 murim_calamity.4020.b:0 "Let them find their own path. The old ways led to the Calamity."

 murim_calamity.4030.t:0 "Legacy of the Fallen Era"
 murim_calamity.4030.desc:0 "Years after the Calamity, you sit by a fire and realize that the old world is becoming a legend. Children ask about Shaolin the way you once asked about fairy tales. Mount Hua's Thirteen Swords are becoming myth. The Heavenly Demon is becoming a ghost story.\n\nThe truth is fading. Soon, no one alive will remember what actually happened — how the clans really fell, who really fought, what was really lost. Unless someone writes it down."
 murim_calamity.4030.a:0 "Record everything. The truth must survive."
 murim_calamity.4030.b:0 "The past is dead. Let the legends be enough."
 murim_calamity.4030.c:0 "Tell the stories to inspire the new generation."

 murim_calamity.4099.t:0 "The Cycle Continues"
 murim_calamity.4099.desc:0 "The Great Calamity has passed. The renewal is underway."
 murim_calamity.4099.a:0 "A new era begins."
 murim_calamity.4099.a.tt:0 "The Great Calamity cycle is complete. The martial world begins anew."

 # ========================================
 # MODIFIER DESCRIPTIONS
 # ========================================

 murim_qi_disturbance_awareness:0 "Qi Disturbance Awareness"
 murim_qi_disturbance_awareness_desc:0 "You have sensed the tremors in the earth's Qi. Something is deeply wrong."
 murim_dead_qi_zone_knowledge:0 "Dead Qi Zone Knowledge"
 murim_dead_qi_zone_knowledge_desc:0 "You know where the dead zones are — places where no cultivation is possible."
 murim_preparing_for_calamity:0 "Preparing for the Calamity"
 murim_preparing_for_calamity_desc:0 "The vision was clear. You are making preparations others think are madness."
 murim_doomsayer_reputation:0 "Doomsayer"
 murim_doomsayer_reputation_desc:0 "You warned everyone. They called you mad. Soon they will call you prophet."
 murim_rallying_for_calamity:0 "Rallying for War"
 murim_rallying_for_calamity_desc:0 "Your forces gather. Whatever comes, you will meet it with steel."
 murim_alliance_seeker:0 "Alliance Seeker"
 murim_alliance_seeker_desc:0 "You seek to unite the clans against the coming storm."
 murim_chaos_opportunist:0 "Chaos Opportunist"
 murim_chaos_opportunist_desc:0 "While others panic, you see opportunity. The old order's fall is your rise."
 murim_calamity_neutral_stance:0 "Neutral in the Storm"
 murim_calamity_neutral_stance_desc:0 "You refused to choose a side. Both factions distrust you."
 murim_savior_of_the_realm:0 "Savior of the Realm"
 murim_savior_of_the_realm_desc:0 "You delayed the Great Calamity. The martial world owes you a debt it can never repay."
 murim_failed_peacemaker:0 "Failed Peacemaker"
 murim_failed_peacemaker_desc:0 "You tried to stop the war and failed. The weight of that failure will never leave you."
 murim_war_veteran:0 "Great War Veteran"
 murim_war_veteran_desc:0 "You fought in the opening battles of the Great War and survived."
 murim_war_strategist:0 "War Strategist"
 murim_war_strategist_desc:0 "You coordinated the defense from behind the lines."
 murim_civilian_protector:0 "Protector of the Innocent"
 murim_civilian_protector_desc:0 "While others fought for glory, you saved lives."
 murim_faced_demon_lord:0 "Faced the Demon Lord"
 murim_faced_demon_lord_desc:0 "You stood against the Heavenly Demon Lord during the Great War and survived."
 murim_demon_lord_ally:0 "Demon Lord's Ally"
 murim_demon_lord_ally_desc:0 "You allied with the Demon Lord during the Great War."
 murim_witnessed_the_silence:0 "Witnessed the Silence"
 murim_witnessed_the_silence_desc:0 "You saw the aftermath. The empty halls. The silence. You will never forget."
 murim_mourner_of_the_fallen:0 "Mourner of the Fallen"
 murim_mourner_of_the_fallen_desc:0 "You buried the dead with your own hands. Every grave is a story."
 murim_era_founder:0 "Era Founder"
 murim_era_founder_desc:0 "You gathered the survivors and began rebuilding. The new era starts with you."
 murim_technique_seeker:0 "Seeker of Lost Arts"
 murim_technique_seeker_desc:0 "You explore the ruins of the old world, searching for techniques that must not be forgotten."
 murim_new_path_pioneer:0 "New Path Pioneer"
 murim_new_path_pioneer_desc:0 "The old ways led to destruction. You walk a path no one has walked before."
 murim_recovered_ancient_technique:0 "Ancient Technique Master"
 murim_recovered_ancient_technique_desc:0 "You recovered a lost technique from the ruins and made it your own."
 murim_technique_preserver:0 "Technique Preserver"
 murim_technique_preserver_desc:0 "You preserved a lost technique for future generations rather than claiming it yourself."
 murim_historian_of_the_fallen:0 "Historian of the Fallen"
 murim_historian_of_the_fallen_desc:0 "You recorded the truth of what happened for future generations."
 murim_legend_teller:0 "Legend Teller"
 murim_legend_teller_desc:0 "You use the stories of the fallen era to inspire the new generation."

