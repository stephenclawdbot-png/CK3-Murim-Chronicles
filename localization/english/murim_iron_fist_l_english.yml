l_english:
 murim_iron_fist.0001.t: "The Iron Body Trial"
 murim_iron_fist.0001.desc: "The waterfall roars behind you as the Iron Fist elders line up with their iron rods. Every disciple must endure this trial — stand firm while they strike, and prove your body is worthy of the Iron Fist name. The water is freezing, the iron unforgiving."
 murim_iron_fist.0001.a: "Grit my teeth and endure every blow."
 murim_iron_fist.0001.b: "Secretly channel qi to reinforce my body."
 murim_iron_fist.0001.c: "I refuse. This trial is madness."
 murim_iron_fist.0002.t: "Vajra Fist Awakening"
 murim_iron_fist.0002.desc: "Your fists hum with condensed power, yearning to break free. The Iron Monument stands before you — a pillar of solid iron that has broken the hands of countless disciples. Only those who shatter it awaken the legendary Vajra Fist, said to be harder than any forged steel."
 murim_iron_fist.0002.a: "Strike the Iron Monument with everything I have."
 murim_iron_fist.0002.b: "Train with iron sand for a hundred days first."
 murim_iron_fist.0002.c: "Temper my fists with forbidden blood arts."
 murim_iron_fist.0003.t: "The Schism of Iron"
 murim_iron_fist.0003.desc: "A rift tears through the Iron Fist Gate. The Traditionalists insist on pure body cultivation — fists, sinew, and bone alone. The Reformists argue that blending qi with iron flesh will elevate the sect to new heights. Both sides look to you for support, and silence is not an option."
 murim_iron_fist.0003.a: "The body alone is supreme. I stand with tradition."
 murim_iron_fist.0003.b: "Body and qi together are stronger. I back reform."
 murim_iron_fist.0003.c: "I'll prove body cultivation's supremacy in a public fight."
 murim_iron_fist.0003.d: "Publicly support tradition, secretly study qi."
 murim_iron_fist.0004.t: "Mountain Splitting Palm"
 murim_iron_fist.0004.desc: "The Cliff of Ten Thousand Strikes looms above, scarred by generations of Iron Fist masters who trained here. To learn the Mountain Splitting Palm, you must strike the cliff face until stone yields to flesh. The technique can cleave boulders — but the training has shattered as many arms as it has forged legends."
 murim_iron_fist.0004.a: "Train at the Cliff of Ten Thousand Strikes."
 murim_iron_fist.0004.b: "Study the scroll and adapt it to my body."
 murim_iron_fist.0004.c: "Fuse Mountain Palm with Vajra Fist."
 murim_iron_fist.0005.t: "The Iron Gate Challenge"
 murim_iron_fist.0005.desc: "A wandering fighter stands at the Iron Gate, fists raised in challenge. By ancient tradition, any martial artist may demand a bare-handed bout with an Iron Fist disciple. Victory earns the right to join — or to claim a technique scroll. The entire sect watches."
 murim_iron_fist.0005.a: "Accept and fight with full power."
 murim_iron_fist.0005.b: "Hold back and test the challenger's worth."
 murim_iron_fist.0005.c: "Refuse the challenge."
 murim_iron_fist.0006.t: "The Living Iron"
 murim_iron_fist.0006.desc: "Your body has reached the pinnacle of external cultivation. The final step is the Living Iron transformation — where flesh becomes as metal, impervious to blade and flame. The elders speak of the Molten Iron Bath, a ritual so dangerous that most who attempt it emerge scarred beyond recognition. Or not at all."
 murim_iron_fist.0006.a: "Undergo the Molten Iron Bath."
 murim_iron_fist.0006.b: "Take the gradual meditation approach."
 murim_iron_fist.0006.c: "Use demonic blood tempering for the fastest path."
 murim_iron_fist.0007.t: "Succession by Combat"
 murim_iron_fist.0007.desc: "The Gate Master grows old, his iron body beginning to rust with age. In the Iron Fist tradition, leadership passes to whoever can defeat the reigning master in single combat. The arena is prepared, and the disciples gather. This is your chance to claim the throne of iron."
 murim_iron_fist.0007.a: "Challenge the Gate Master directly."
 murim_iron_fist.0007.b: "Defeat all other candidates first."
 murim_iron_fist.0007.c: "Poison the Gate Master before the fight."
 murim_iron_fist.0008.t: "The Demolition Tournament"
 murim_iron_fist.0008.desc: "The annual Demolition Tournament begins. Pillars of wood, stone, iron, and finally steel are lined up in the courtyard. Disciples must shatter each in succession — bare-handed. The last one standing when the steel pillar falls is crowned champion. Your knuckles ache with anticipation."
 murim_iron_fist.0008.a: "Go all out from the first round."
 murim_iron_fist.0008.b: "Pace myself and conserve energy."
 murim_iron_fist.0008.c: "Unleash my secret technique on the steel pillar."
 murim_iron_fist.0009.t: "Wandering Challenge Tour"
 murim_iron_fist.0009.desc: "It is time for the Iron Fist tradition of wandering the martial world to challenge every sect's champion. Fists against palms, fists against swords, fists against demonic arts — you will test Iron Fist techniques against every style under heaven and build your reputation across Murim."
 murim_iron_fist.0009.a: "Challenge Shaolin — fist against palm."
 murim_iron_fist.0009.b: "Challenge Wudang — fist against sword."
 murim_iron_fist.0009.c: "Challenge Mount Hua — fist against swordsmanship."
 murim_iron_fist.0009.d: "Challenge the Heavenly Demon Sect."
 murim_iron_fist.0010.t: "The Unbreakable"
 murim_iron_fist.0010.desc: "Whispers carry your name across the martial world like thunder before a storm. They call you 'The Unbreakable' — a body cultivator who has pushed flesh beyond the limits of mortal understanding. Your fists split mountains, your skin turns blades. You stand at the summit of external martial arts."
 murim_iron_fist.0010.a: "Accept the title and protect the orthodox alliance."
 murim_iron_fist.0010.b: "Challenge the Strongest Under Heaven for the top rank."
 murim_iron_fist.0010.c: "Retire from the martial world as a living legend."
