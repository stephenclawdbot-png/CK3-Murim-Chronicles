l_english:
 murim_custom_clan_exp3.0001.t: "The Supreme Path: Declaring Authority"
 murim_custom_clan_exp3.0001.desc: "Your clan stands ready, but a clan without a clear leader is a blade without a hilt. You have chosen the Supreme Path — absolute authority, absolute responsibility. Now you must decide how to claim the title of Grandmaster and what kind of leader you will be."
 murim_custom_clan_exp3.0001.a: "Declare supreme authority. All must obey."
 murim_custom_clan_exp3.0001.b: "Earn respect through a demonstration of power."
 murim_custom_clan_exp3.0001.c: "Rule through wisdom, not force."
 murim_custom_clan_exp3.0002.t: "The Clan Council Election"
 murim_custom_clan_exp3.0002.desc: "Your clan has chosen the democratic path. The council gathers to elect a leader — voices raised in debate, alliances forming and breaking in whispered conversations. The question is not just who leads, but how you intend to win."
 murim_custom_clan_exp3.0002.a: "Campaign for leader fairly and honestly."
 murim_custom_clan_exp3.0002.b: "Grease the wheels with generous donations."
 murim_custom_clan_exp3.0002.c: "Make it clear what happens to dissenters."
 murim_custom_clan_exp3.0002.d: "Withdraw and support another candidate."
 murim_custom_clan_exp3.0003.t: "Testing the First Disciple"
 murim_custom_clan_exp3.0003.desc: "A promising young martial artist kneels before you, seeking to become your clan's first official disciple. This moment will set the precedent for all who follow. A harsh trial produces fearsome warriors but may break the unworthy. A gentle test preserves more, but tempers less."
 murim_custom_clan_exp3.0003.a: "Put them through brutal trial by combat."
 murim_custom_clan_exp3.0003.b: "Test their wisdom and knowledge instead."
 murim_custom_clan_exp3.0003.c: "Send them on a dangerous loyalty mission."
 murim_custom_clan_exp3.0004.t: "Council Disagreement"
 murim_custom_clan_exp3.0004.desc: "The clan council is split. Elders argue over training methods, resource allocation, and the clan's direction. As elected leader, you must resolve this before the fracture lines deepen into chasms. Democracy is messy — but so is every alternative."
 murim_custom_clan_exp3.0004.a: "Override the council with leader authority."
 murim_custom_clan_exp3.0004.b: "Find a compromise — middle ground."
 murim_custom_clan_exp3.0004.c: "Let the council vote and abide the result."
 murim_custom_clan_exp3.0004.d: "Dissolve the council. Seize absolute power."
 murim_custom_clan_exp3.0005.t: "Forging a Signature Technique"
 murim_custom_clan_exp3.0005.desc: "Every great clan is defined by its techniques. The Shaolin have their Iron Body, Mount Hua their Plum Blossom Sword. Your clan needs its own — a technique born from your philosophy, your experience, your vision. What you create now will be practiced for generations."
 murim_custom_clan_exp3.0005.a: "Create a devastating offensive technique."
 murim_custom_clan_exp3.0005.b: "Create an impenetrable defensive technique."
 murim_custom_clan_exp3.0005.c: "Create a healing and support technique."
 murim_custom_clan_exp3.0005.d: "Create a forbidden dark art."
 murim_custom_clan_exp3.0006.t: "Challenged for the Right to Exist"
 murim_custom_clan_exp3.0006.desc: "A leader of one of the established clans has come to your gates with a single demand: prove your clan deserves to exist, or disband. The Nine Great Clans do not take kindly to upstarts. Your response will determine whether your clan's story continues or ends here."
 murim_custom_clan_exp3.0006.a: "Accept the challenge duel."
 murim_custom_clan_exp3.0006.b: "Negotiate recognition through diplomacy."
 murim_custom_clan_exp3.0006.c: "Prove worth through a public demonstration."
 murim_custom_clan_exp3.0006.d: "Ignore them and build power quietly."
 murim_custom_clan_exp3.0007.t: "Recruiting from Other Clans"
 murim_custom_clan_exp3.0007.desc: "A discontented martial artist from an established clan has caught your attention. They chafe under their current leadership, and your clan offers something theirs does not. But poaching another clan's members is a dangerous game — one that could make powerful enemies."
 murim_custom_clan_exp3.0007.a: "Offer them a better position in your clan."
 murim_custom_clan_exp3.0007.b: "Challenge their leader for recruitment rights."
 murim_custom_clan_exp3.0007.c: "Recruit them secretly — no one needs to know."
 murim_custom_clan_exp3.0007.d: "Train new disciples from scratch instead."
 murim_custom_clan_exp3.0008.t: "Choosing Your Faction"
 murim_custom_clan_exp3.0008.desc: "The martial world is divided — Orthodox and Unorthodox, Righteous and Demonic. Every clan must eventually choose where it stands. The Orthodox offer legitimacy and allies. The Unorthodox offer freedom and power. Or you could forge a third way, beholden to no one."
 murim_custom_clan_exp3.0008.a: "Join the Orthodox faction."
 murim_custom_clan_exp3.0008.b: "Join the Unorthodox faction."
 murim_custom_clan_exp3.0008.c: "Stay neutral — walk an independent path."
 murim_custom_clan_exp3.0008.d: "Found a third faction entirely."
 murim_custom_clan_exp3.0009.t: "Rebellion Against the Grandmaster"
 murim_custom_clan_exp3.0009.desc: "Your iron grip has bred resentment. Disciples whisper in corridors, elders exchange meaningful glances, and training attendance has dropped. A rebellion brews within your own clan — the very people you swore to lead now question whether you deserve to."
 murim_custom_clan_exp3.0009.a: "Crush the rebellion with overwhelming force."
 murim_custom_clan_exp3.0009.b: "Address grievances and reform your ways."
 murim_custom_clan_exp3.0009.c: "Duel the rebellion's leader."
 murim_custom_clan_exp3.0010.t: "Recognition as the Tenth Great Clan"
 murim_custom_clan_exp3.0010.desc: "Word has spread across the martial world: your clan has earned its place. A signature technique, a proven leader, faction loyalty, and the respect of rivals — all the marks of greatness. The Nine Great Clans are prepared to become Ten. How you accept this honor defines what comes next."
 murim_custom_clan_exp3.0010.a: "Accept the title with a grand ceremony."
 murim_custom_clan_exp3.0010.b: "Reject the title — stay independent."
 murim_custom_clan_exp3.0010.c: "Demand a higher title — challenge the Nine."
 murim_custom_clan_exp3.0010.d: "Merge with an existing great clan instead."
