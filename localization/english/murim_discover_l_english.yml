l_english:
 murim_discover.1001.t: "Strange Sounds in the Mountains"
 murim_discover.1001.desc: "You hear it before you see it -- a thunderous crack that splits the mountain silence, followed by the shriek of displaced air. Through the trees, glimpses of impossible movement: two figures leaping between clifftops, their strikes sending shockwaves that strip leaves from branches. This is not a normal fight."
 murim_discover.1001.desc_brave: "Your heart races not with fear but excitement. The sounds of combat echo through the mountain pass -- inhuman speed, devastating power. Every instinct tells you to investigate. Whatever is happening beyond those trees, you must see it with your own eyes."
 murim_discover.1001.desc_craven: "A terrible crashing echoes through the mountains, accompanied by unearthly shrieks. Every survival instinct screams at you to flee. Whatever is making those sounds could crush you like an insect. And yet... curiosity gnaws at you."
 murim_discover.1001.a: "Investigate the sounds."
 murim_discover.1001.b: "Best not to get involved."
 murim_discover.1001.c: "Rush in to help -- someone may be hurt!"
 murim_discover.1002.t: "The Injured Stranger"
 murim_discover.1002.desc: "A figure lies broken at the roadside, their silk robes soaked with blood. But these are no ordinary injuries -- the wounds pulse with residual qi, and the stranger's body radiates an aura of contained power even in its ruined state. This is a martial artist, and a formidable one. What you do next could change your life forever."
 murim_discover.1002.a: "Tend their wounds."
 murim_discover.1002.b: "Rob them while they are helpless."
 murim_discover.1002.c: "Carry them to the nearest healer."
 murim_discover.1002.d: "Leave them. Not my problem."
 murim_discover.1003.t: "The Hidden Valley"
 murim_discover.1003.desc: "A wrong turn through a narrow canyon opens into a vast hidden valley where dozens of white-robed figures move in perfect unison, their movements flowing like water. Training dummies explode under the force of their strikes. You have stumbled upon a secret training ground of a martial sect."
 murim_discover.1003.a: "Watch secretly from hiding."
 murim_discover.1003.b: "Announce yourself honestly."
 murim_discover.1003.c: "Try to steal a training manual."
 murim_discover.1004.t: "The Tea House Conversation"
 murim_discover.1004.desc: "In a crowded tea house, a table of rough-looking strangers speaks in hushed tones about things that make no sense: 'qi meridians,' 'cultivation breakthroughs,' 'the Heavenly Demon's movements.' Their calloused hands and scarred faces suggest these are not scholars discussing philosophy. These people have killed."
 murim_discover.1004.a: "Listen carefully from nearby."
 murim_discover.1004.b: "Ask to join their table."
 murim_discover.1004.c: "Challenge the loudest one."
 murim_discover.1005.t: "Bandits on the Road"
 murim_discover.1005.desc: "Bandits surround you on the road, blades drawn, grinning with malice. Before you can even draw your weapon, a figure drops from the trees like a thunderbolt. In three heartbeats and five strikes, every bandit lies groaning in the dirt. Your rescuer sheathes their sword and regards you with mild interest."
 murim_discover.1005.a: "Beg to become their disciple."
 murim_discover.1005.b: "Thank them and part ways."
 murim_discover.1005.c: "Ask to travel together."
 murim_discover.1006.t: "The Ancient Cave"
 murim_discover.1006.desc: "Sheltering from a storm, you crawl into a cave and discover something extraordinary: stacked on stone shelves, preserved by the dry air, are dozens of training manuals written in ancient script. Diagrams show human figures with glowing lines traced through their bodies. This is a martial arts treasury, hidden for perhaps centuries."
 murim_discover.1006.a: "Study the manuals yourself."
 murim_discover.1006.b: "Take them to sell."
 murim_discover.1006.c: "Train here in secret solitude."
 murim_discover.2001.t: "The Martial Demonstration"
 murim_discover.2001.desc: "A traveling martial artist requests an audience, offering to demonstrate their skills in exchange for patronage. In your courtyard, they proceed to shatter a stone pillar with their bare palm, leap over your castle wall, and deflect arrows with a wooden fan. Your soldiers stand slack-jawed. This person is not entirely human."
 murim_discover.2001.a: "Attend personally and request training."
 murim_discover.2001.b: "Send my marshal to evaluate them."
 murim_discover.2001.c: "Refuse -- I do not trust them."
 murim_discover.2001.d: "Demand they teach me for land and coin."
 murim_discover.2002.t: "The Bodyguard"
 murim_discover.2002.desc: "A stranger arrives at your court seeking employment as a bodyguard. They move with an uncanny grace, and your master-at-arms quietly warns you that this person could kill every guard in the castle without breaking a sweat. They are a martial artist -- a warrior of the hidden world."
 murim_discover.2002.a: "Hire them as my bodyguard."
 murim_discover.2002.b: "Hire them and ask for training."
 murim_discover.2002.c: "I have no need of such services."
 murim_discover.2003.t: "The Succession Threat"
 murim_discover.2003.desc: "Your rival has acquired something terrifying: martial training. Reports describe them shattering tables with their fists and leaping across rooftops. Against such power, your guards and political alliances are worthless. If you do not find a way to match their strength, your title -- and your life -- are forfeit."
 murim_discover.2003.a: "Seek martial training urgently!"
 murim_discover.2003.b: "Hire a martial champion."
 murim_discover.2003.c: "Outmaneuver them politically."
 murim_discover.2003.d: "Surrender to fate."
 murim_discover.2004.t: "Your Child Shows Talent"
 murim_discover.2004.desc: "A visiting martial master watches your child play in the courtyard and goes very still. 'This one,' they say quietly, 'has natural meridians. One in ten thousand.' They offer to train your child in the martial arts, to unlock potential that would otherwise lie dormant forever. But training means danger."
 murim_discover.2004.a: "Allow training under the master."
 murim_discover.2004.b: "Hire the master to train at home."
 murim_discover.2004.c: "Refuse -- protect my heir."
 murim_discover.2004.d: "Train alongside my child."
 murim_discover.2005.t: "The Sect on Your Land"
 murim_discover.2005.desc: "Your scouts report an alarming discovery: a martial sect has established a hidden compound on your territory. They train in secret, their techniques shaking the earth and splitting trees. They answer to no lord and pay no taxes. They are a power unto themselves, and they are living on your land."
 murim_discover.2005.a: "Confront them directly."
 murim_discover.2005.b: "Negotiate -- allow them for teaching."
 murim_discover.2005.c: "Join them secretly."
 murim_discover.2005.d: "Expel them from my domain."
 murim_discover.3001.t: "The Court Martial Master"
 murim_discover.3001.desc: "One of your liege's courtiers is not what they seem. Behind closed doors, when they think no one watches, they practice movements of breathtaking violence and beauty -- fists that blur, kicks that crack stone, stances that seem to defy gravity. A martial master hides in plain sight."
 murim_discover.3001.a: "Ask to train under them."
 murim_discover.3001.b: "Watch and learn in secret."
 murim_discover.3001.c: "Challenge them openly."
 murim_discover.3002.t: "The Tournament Invitation"
 murim_discover.3002.desc: "A mysterious invitation arrives: you are welcome to attend the annual martial arts tournament, held in a mountain fortress that appears on no map. Fighters from across the land will compete for glory, gold, and the attention of powerful sects. This is your doorway into another world."
 murim_discover.3002.a: "Enter as a novice fighter."
 murim_discover.3002.b: "Attend and watch carefully."
 murim_discover.3002.c: "Bet on the fighters."
 murim_discover.3003.t: "The Secret Practice"
 murim_discover.3003.desc: "At midnight, the sound of muffled strikes and controlled breathing draws you to the courtyard. A fellow courtier practices a martial form in the moonlight, their movements radiating controlled power. They do not know you are watching. Not yet."
 murim_discover.3003.a: "Ask them to teach you."
 murim_discover.3003.b: "Report them to your liege."
 murim_discover.3003.c: "Watch and imitate on your own."
 murim_discover.3003.d: "Join them silently in practice."
 murim_discover.4001.t: "Crossing Sect Territory"
 murim_discover.4001.desc: "Your travel route has taken you through territory claimed by a martial sect. Figures appear on the ridgeline, watching your approach with the stillness of predators. You have entered their domain uninvited. How they respond depends on who they are -- and how you present yourself."
 murim_discover.4001.desc_mount_hua: "Disciples in white robes appear on the mountain path ahead, their swords gleaming in the sunlight. Mount Hua Sect guards its territory with polite firmness. A young disciple approaches with a formal bow."
 murim_discover.4001.desc_heavenly_demon: "Dark-robed figures materialize from the shadows, their killing intent pressing down on you like a physical weight. You have wandered into Heavenly Demon territory. Their eyes hold no warmth."
 murim_discover.4001.desc_shaolin: "Saffron-robed monks block the path with gentle but immovable presence. The great Shaolin Temple rises behind them, its bells echoing through the valley. You have entered sacred ground."
 murim_discover.4001.desc_tang: "The air tastes wrong. A faint sweetness, like poisoned honey. Tang Clan territory -- where every flower may be a weapon and every breeze may carry death."
 murim_discover.4001.desc_wudang: "Taoist priests in flowing robes observe your approach from a cloud-wreathed pavilion. Wudang Mountain radiates an aura of profound calm. These are not warriors who seek battle, but warriors who have transcended it."
 murim_discover.4001.desc_beggar: "A ragged figure by the roadside watches you with surprisingly sharp eyes. Then another. And another. The Beggar Sect sees everything, hears everything, and knows you were coming before you knew it yourself."
 murim_discover.4001.desc_generic: "Martial artists block your path, their stances suggesting both readiness and restraint. You have entered the territory of a sect that does not appear on any official map."
 murim_discover.4001.a: "Accept their approach peacefully."
 murim_discover.4001.b: "Try to leave immediately."
 murim_discover.4001.c: "Introduce yourself formally."
 murim_discover.4002.t: "The Remote Master"
 murim_discover.4002.desc: "In a hermit's cave high above the tree line, you find an ancient martial master who has withdrawn from the world. Their beard reaches their waist, their eyes hold the depth of decades of solitary cultivation. They have not spoken to another human in years, yet their power is staggering."
 murim_discover.4002.a: "Beg to become their student."
 murim_discover.4002.b: "Share news from the outside world."
 murim_discover.4002.c: "Leave them to their solitude."
 murim_discover.4003.t: "The Battlefield Revelation"
 murim_discover.4003.desc: "In the aftermath of battle, you notice a soldier fighting with impossible skill -- deflecting blades with bare hands, striking with force that shatters armor. This is no ordinary warrior. They carry themselves with the discipline of something beyond mere military training."
 murim_discover.4003.a: "Ask them to teach you."
 murim_discover.4003.b: "Study their fighting style yourself."
 murim_discover.4003.c: "Report this to your commander."
 murim_discover.4004.t: "Foreign Lands, Foreign Arts"
 murim_discover.4004.desc: "Far from the heartland of the murim, you encounter a warrior practicing arts that bear no resemblance to anything you have seen. Different stances, different breathing, different philosophy -- yet the power is undeniable. The martial way, it seems, has many branches across the world."
 murim_discover.4004.desc_india: "An Indian warrior demonstrates Kalaripayattu -- fluid, deadly movements that blend flexibility with devastating strikes. Their tradition is as ancient and deep as any in the East."
 murim_discover.4004.desc_norse: "A Norse berserker enters a battle trance that transforms them into something barely human. Their rage-fueled combat style sacrifices technique for overwhelming, terrifying power."
 murim_discover.4004.desc_persia: "A Persian swordmaster displays blade work of exquisite precision, their curved sword dancing through patterns that seem to cut the air itself. Beauty and lethality are one."
 murim_discover.4004.desc_mongol: "A Mongol warrior combines horse archery with devastating wrestling throws. Their martial tradition is forged on the endless steppe, where weakness is death."
 murim_discover.4004.desc_byzantine: "A Byzantine warrior practices a disciplined combat form that combines Roman military precision with eastern flexibility. The empire's martial tradition runs deep."
 murim_discover.4004.desc_africa: "An African warrior demonstrates a combat tradition of explosive power and rhythm, their movements flowing between dance and devastation. Ancient knowledge lives in their strikes."
 murim_discover.4004.desc_generic: "A foreign warrior practices combat arts entirely unlike anything from the Central Plains. Their tradition is alien yet undeniably powerful."
 murim_discover.4004.a: "Train with the foreign master."
 murim_discover.4004.b: "Exchange knowledge between traditions."
 murim_discover.4004.c: "Observe but do not participate."
