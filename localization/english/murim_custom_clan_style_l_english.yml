l_english:
 murim_custom_clan.0010.t: "The Council of Nine"
 murim_custom_clan.0010.desc: "You present your petition before the assembled leaders of the Nine Great Clans. Mount Hua, Shaolin, Wudang, Tang Clan, Beggar Sect, Iron Fist Gate, Heavenly Demon Sect, Poison Flower Palace, and Phantom Blade — all nine weigh your worthiness. Your reputation precedes you. Now, how will you approach them?"
 murim_custom_clan.0010.a: "Present my case with humility and honor"
 murim_custom_clan.0010.b: "Grease their palms with gold [300 gold]"
 murim_custom_clan.0010.c: "Let my martial prowess speak for itself"
 murim_custom_clan.0040.t: "Choose Your Martial Style"
 murim_custom_clan.0040.desc: "Every great clan is defined by its martial arts. Mount Hua has their sword forms. Shaolin has their iron body. Tang Clan has their hidden weapons. Now you must decide: what martial arts will define YOUR clan for generations? Choose wisely — this is your clan's combat identity."
 murim_custom_clan.0040.a: "Sword Arts — elegant bladework, flowing forms [+3 Prowess, +2 Martial]"
 murim_custom_clan.0040.b: "Internal Cultivation — qi mastery, meditation, inner strength [+2 Prowess, +3 Learning]"
 murim_custom_clan.0040.c: "Body Tempering — iron body, raw crushing power [+5 Prowess]"
 murim_custom_clan.0040.d: "Hidden Weapons & Poisons — cunning and lethal precision [+2 Prowess, +3 Intrigue]"
 murim_custom_clan.0040.e: "Shadow Arts — stealth, assassination, unseen blades [+2 Prowess, +2 Intrigue, +1 Martial]"
 murim_custom_clan.0040.f: "Forbidden Techniques — overwhelming dark power, at a cost [+4 Prowess, +1 Intrigue]"
 murim_custom_clan.0040.g: "Information Network — eyes and ears across the Jianghu [+3 Intrigue, +2 Diplomacy]"
 murim_custom_clan.0040.h: "Seduction & Toxins — beauty and poison as weapons [+2 Intrigue, +2 Diplomacy, +1 Prowess]"
 murim_custom_clan.0045.t: "Choose Your Clan Specialty"
 murim_custom_clan.0045.desc: "Beyond martial arts, every clan needs a purpose — something that draws disciples and earns respect. The Beggar Sect has their intelligence network. Shaolin has their medicine. What will YOUR clan be known for beyond the battlefield?"
 murim_custom_clan.0045.a: "Alchemy & Medicine — brew pills, cure poisons, extend life [+2 Learning]"
 murim_custom_clan.0045.b: "Weapon Forging — craft legendary blades and artifacts [+2 Stewardship]"
 murim_custom_clan.0045.c: "Mercenary Work — take contracts for gold and glory [+2 Martial, +100 Gold]"
 murim_custom_clan.0045.d: "Scholar Tradition — preserve and study ancient martial texts [+3 Learning]"
 murim_custom_clan.0045.e: "Tournament Champions — live for competition and glory [+2 Prowess, +200 Prestige]"
 murim_custom_clan.0045.f: "Political Influence — operate through courts and alliances [+3 Diplomacy]"
