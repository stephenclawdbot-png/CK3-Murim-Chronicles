l_english:
 murim_duel.0001.t: "Formal Duel Challenge"
 murim_duel.0001.desc: "A martial artist stands before you, fist clasped in palm -- the formal challenge salute. They have come to test their strength against yours before witnesses. In the martial world, a formal duel is both a test of skill and a declaration of respect."
 murim_duel.0001.a: "Accept with honor"
 murim_duel.0001.b: "Accept, but set conditions"
 murim_duel.0001.c: "Refuse the challenge"
 murim_duel.0010.t: "The Duel Begins"
 murim_duel.0010.desc: "The dueling ground is cleared. Witnesses line the perimeter. Both fighters take their stances -- qi rising, muscles coiled, eyes locked. The wind dies. A leaf falls between you. The moment it touches the ground, the duel begins."
 murim_duel.0010.a: "Fight with orthodox technique"
 murim_duel.0010.b: "Unleash forbidden arts"
 murim_duel.0010.c: "Adopt a defensive counter-stance"
 murim_duel.0020.t: "Victory!"
 murim_duel.0020.desc_standard: "Your opponent falls. The duel is decisive -- your technique was sharper, your qi stronger, your will unbreakable. The crowd murmurs in admiration as you stand over your defeated foe. How you treat them now will define your reputation."
 murim_duel.0020.desc_forbidden: "Dark qi crackles around your fists as your opponent crumples. The forbidden technique gave you the edge, but the witnesses saw the unnatural energy. Your victory is tainted with the stench of the demonic path."
 murim_duel.0020.desc_counter: "Patience prevails. You read every strike, deflected every blow, and when the opening came, you struck with devastating precision. A master's victory -- earned through discipline, not brute force."
 murim_duel.0020.a: "Show mercy to the defeated"
 murim_duel.0020.b: "Demand their technique scroll as prize"
 murim_duel.0020.c: "Cripple their cultivation permanently"
 murim_duel.0030.t: "Honorable Draw"
 murim_duel.0030.desc: "Neither fighter yields. You trade blow for blow until exhaustion claims you both, and you stand apart, breathing hard, each having tested the limits of the other. A draw between equals -- the rarest and most respected outcome."
 murim_duel.0030.a: "Acknowledge mutual respect"
 murim_duel.0030.b: "Demand a rematch"
 murim_duel.0030.c: "Propose an alliance"
 murim_duel.0040.t: "Defeat"
 murim_duel.0040.desc: "The ground rushes up to meet you. Your opponent's final blow sends you sprawling, qi scattered, body broken. The taste of dust and blood fills your mouth. The crowd watches in silence as the reality of defeat settles over you."
 murim_duel.0040.a: "Accept defeat gracefully"
 murim_duel.0040.b: "Swear vengeance"
 murim_duel.0040.c: "Train harder -- let defeat fuel me"
 murim_duel.0050.t: "Forbidden Technique Backfires"
 murim_duel.0050.desc: "The forbidden technique turns against you. Dark qi surges through your meridians like wildfire, tearing pathways you spent years cultivating. Your opponent watches in horror as your own power consumes you from within. This is the price of the demonic path."
 murim_duel.0050.a: "Endure the devastating backlash"
 murim_duel.1000.t: "Tournament of the Martial World"
 murim_duel.1000.desc: "The time has come to host a grand tournament -- a gathering of the martial world's finest fighters, competing for glory, prestige, and the chance to prove their sect's supremacy. The tournament grounds await preparation."
 murim_duel.1000.a: "Grand tournament -- open to all"
 murim_duel.1000.b: "Invite-only elite tournament"
 murim_duel.1000.c: "Death match tournament"
 murim_duel.1000.d: "Not the right time"
 murim_duel.1010.t: "The Tournament Rounds"
 murim_duel.1010.desc: "The tournament grounds thunder with the clash of martial artists. Disciples from across the martial world display their techniques before roaring crowds. The air crackles with competing qi as fighters advance through the brackets."
 murim_duel.1010.a: "Compete personally"
 murim_duel.1010.b: "Observe and judge"
 murim_duel.1010.c: "Scout the tournament for talent"
 murim_duel.1011.t: "Tournament Champion!"
 murim_duel.1011.desc: "You stand alone atop the tournament platform, the last fighter standing. The crowd erupts. Your name echoes across the martial world -- tournament champion, the strongest under heaven. This victory will be remembered for generations."
 murim_duel.1011.a: "Accept the champion's laurels"
 murim_duel.1012.t: "Tournament Runner-Up"
 murim_duel.1012.desc: "So close. You fought brilliantly through every round, but the final match eluded you. Still, second place in a tournament of the martial world's finest is no small achievement. The wounds you carry are badges of honor."
 murim_duel.1012.a: "Hold your head high"
 murim_duel.1013.t: "Early Elimination"
 murim_duel.1013.desc: "Your tournament ends sooner than expected. A superior opponent exposed weaknesses in your technique you did not know existed. The walk from the tournament grounds feels longer than any journey you have ever taken."
 murim_duel.1013.a: "Accept with grace"
 murim_duel.1013.b: "Claim foul play"
 murim_duel.1020.t: "The Death Match Tournament"
 murim_duel.1020.desc: "This is no ordinary tournament. The arena floor is stained with old blood. There are no rules, no referees, no mercy. Fighters enter knowing they may not leave alive. The crowd watches with a hunger that borders on madness."
 murim_duel.1020.a: "Enter the ring yourself"
 murim_duel.1020.b: "Watch from the stands"
 murim_duel.1020.c: "Cancel -- this was a mistake"
 murim_duel.2000.t: "Technique Showcase"
 murim_duel.2000.desc: "A fellow martial artist proposes a technique showcase -- a friendly exhibition where both fighters display their strongest arts without lethal intent. It is a rare opportunity to learn from a peer and test your cultivation against an equal."
 murim_duel.2000.a: "Showcase your strongest technique"
 murim_duel.2000.b: "Hold back and study their technique"
 murim_duel.2000.c: "Decline -- my techniques are secret"
