l_english:
 murim_poison_flower_palace.0001.t: "The Flower Maiden's Trial"
 murim_poison_flower_palace.0001.desc: "The Garden of a Thousand Poisons awaits, its blossoms impossibly vivid. Every breath here carries death. The Palace Mistress watches from above as you take your first step toward becoming a true disciple."
 murim_poison_flower_palace.0001.a: "Walk through the Garden of Poisons."
 murim_poison_flower_palace.0001.b: "Build resistance through microdosing."
 murim_poison_flower_palace.0001.c: "Refuse — poisons are beneath me."
 murim_poison_flower_palace.0002.t: "Art of the Venomous Petal"
 murim_poison_flower_palace.0002.desc: "Your teacher unfurls a silk fan, and razor petals dance through the air like deadly butterflies. The signature fighting style of the Palace combines lethal grace with toxic precision. Choose your specialization."
 murim_poison_flower_palace.0002.a: "Master the Venomous Petal Dance."
 murim_poison_flower_palace.0002.b: "Focus on poison crafting instead."
 murim_poison_flower_palace.0002.c: "Learn the forbidden Charm Technique."
 murim_poison_flower_palace.0003.t: "Hundred Poison Body Cultivation"
 murim_poison_flower_palace.0003.desc: "One hundred vials of increasingly deadly poison stand in a circle around you. To achieve the Hundred Poison Body — near-total immunity — you must consume them all. Many have tried. Many did not survive."
 murim_poison_flower_palace.0003.a: "Consume all 100 poisons in the ritual."
 murim_poison_flower_palace.0003.b: "Use the safer modified method."
 murim_poison_flower_palace.0003.c: "Abandon poison — focus on martial arts."
 murim_poison_flower_palace.0004.t: "Palace Mistress Selection"
 murim_poison_flower_palace.0004.desc: "The current Palace Mistress has noticed your potential and whispers of succession. Your mastery of the Hundred Poison Body makes you a candidate. But the path to the throne is paved with rival ambition."
 murim_poison_flower_palace.0004.a: "Accept the nomination and compete."
 murim_poison_flower_palace.0004.b: "Decline — I prefer wandering free."
 murim_poison_flower_palace.0004.c: "Assassinate the rival candidate first."
 murim_poison_flower_palace.0005.t: "The Poison Flower Competition"
 murim_poison_flower_palace.0005.desc: "Candidates stand before their alchemy tables, ingredients arrayed like soldiers before battle. The test: create the most potent poison and its perfect antidote. Only mastery of both life and death earns the throne."
 murim_poison_flower_palace.0005.a: "Create the Seven-Color Heartbreak Poison."
 murim_poison_flower_palace.0005.b: "Pioneer a healing-poison hybrid."
 murim_poison_flower_palace.0005.c: "Concede gracefully."
 murim_poison_flower_palace.0006.t: "The Male Outsider"
 murim_poison_flower_palace.0006.desc: "A male martial artist has been discovered within the Palace grounds. Handsome and bold, he stands defiant before your sisters. The Palace's laws are clear about trespassers — but something in his eyes gives you pause."
 murim_poison_flower_palace.0006.a: "Fall in love — a forbidden romance."
 murim_poison_flower_palace.0006.b: "Test your poisons on him."
 murim_poison_flower_palace.0006.c: "Execute him for trespassing."
 murim_poison_flower_palace.0006.d: "Extract his martial secrets through charm."
 murim_poison_flower_palace.0007.t: "Palace Civil War"
 murim_poison_flower_palace.0007.desc: "A rebel elder has raised her banner against your rule, rallying discontented sisters to her cause. The scent of poison fills the corridors as both factions prepare for a war fought with venom and daggers."
 murim_poison_flower_palace.0007.a: "Crush the rebellion with poison."
 murim_poison_flower_palace.0007.b: "Negotiate and split into branches."
 murim_poison_flower_palace.0007.c: "Challenge her to a poison duel."
 murim_poison_flower_palace.0008.t: "The Forbidden Love Discovered"
 murim_poison_flower_palace.0008.desc: "Whispers snake through the Palace halls — your secret has been uncovered. The love you thought hidden now stands exposed before judgmental eyes. The Palace's laws demand harsh punishment for such transgressions."
 murim_poison_flower_palace.0008.a: "Flee the Palace together."
 murim_poison_flower_palace.0008.b: "Kill the lover to preserve my position."
 murim_poison_flower_palace.0008.c: "Poison the witnesses to keep the secret."
 murim_poison_flower_palace.0009.t: "Petal Storm Apocalypse"
 murim_poison_flower_palace.0009.desc: "After years of research, you stand on the brink of creating the ultimate technique — the Petal Storm Apocalypse. A hurricane of poisoned blades that leaves nothing alive in its wake. The power to destroy armies rests in your hands."
 murim_poison_flower_palace.0009.a: "Complete the Petal Storm Apocalypse."
 murim_poison_flower_palace.0009.b: "Seal it away — too dangerous."
 murim_poison_flower_palace.0009.c: "Teach it to all Palace members."
 murim_poison_flower_palace.0010.t: "The Eternal Garden"
 murim_poison_flower_palace.0010.desc: "The years have distilled your knowledge into something transcendent. Every poison and its cure lives within your memory. Now you must decide what form your legacy will take — a garden, a successor, an alliance, or freedom."
 murim_poison_flower_palace.0010.a: "Create the Eternal Garden — a living legacy."
 murim_poison_flower_palace.0010.b: "Pass everything to a chosen successor."
 murim_poison_flower_palace.0010.c: "Unite the Palace with another sect."
 murim_poison_flower_palace.0010.d: "Become the Poison Immortal — wander free."
