l_english:
 # =============================================
 # MENTOR EXPANSION LOCALIZATION
 # =============================================
 murim_mentor_exp.0001.t:0 "Master's Hidden Past"
 murim_mentor_exp.0001.desc:0 "Whispers in the jianghu have reached your ears - your master, the one who trained you with such patience, was once known as a feared killer. The Blood Shadow, they called them. Dozens fell to their blade before they renounced violence and took you as a disciple."
 murim_mentor_exp.0001.a:0 "Everyone deserves redemption. I stand by my master."
 murim_mentor_exp.0001.b:0 "I demand the truth - face me, Master!"
 murim_mentor_exp.0001.b.win:0 "Your master nods with respect as you match their blade."
 murim_mentor_exp.0001.b.draw:0 "Neither of you can gain the upper hand."
 murim_mentor_exp.0001.b.lose:0 "Your master's killing intent floods the clearing."
 murim_mentor_exp.0001.c:0 "The authorities should know about this criminal."

 murim_mentor_exp.0002.t:0 "Graduation Ceremony"
 murim_mentor_exp.0002.desc:0 "After years of grueling training, your master stands before you with a solemn expression. 'There is nothing more I can teach you,' they say, their voice carrying both pride and sadness. 'It is time for you to walk your own path in the martial world.'"
 murim_mentor_exp.0002.a:0 "I will carry your teachings with honor, Master."
 murim_mentor_exp.0002.b:0 "Let us have one final duel - I will surpass you!"
 murim_mentor_exp.0002.b.surpass:0 "Your blade sings past your master's guard. They smile."
 murim_mentor_exp.0002.b.close:0 "Blow for blow, neither can claim victory."
 murim_mentor_exp.0002.b.humbled:0 "Your master's final lesson: humility."
 murim_mentor_exp.0002.c:0 "I am not ready. Let me stay a while longer."

 murim_mentor_exp.0003.t:0 "Master's Sacrifice"
 murim_mentor_exp.0003.desc:0 "The assassin's blade was meant for you. But your master moved faster than you have ever seen them move before - and took the blow in your place. As they lie in your arms, blood pooling beneath them, they whisper their final technique into your ear."
 murim_mentor_exp.0003.a:0 "I will find them. I will kill them. I SWEAR IT!"
 murim_mentor_exp.0003.b:0 "I will honor your memory through peaceful cultivation."
 murim_mentor_exp.0003.c:0 "The martial world took everything... I am done."

 murim_mentor_exp.0004.t:0 "Temptation of Forbidden Scrolls"
 murim_mentor_exp.0004.desc:0 "Your master's private study stands open. Inside, you can see the forbidden technique scrolls - the ones they swore they would never teach anyone. The Heaven-Rending Palm. The Soul-Severing Blade Art. Knowledge that could make you the strongest in the martial world... if you dare take it."
 murim_mentor_exp.0004.a:0 "Take the scrolls. Power is all that matters."
 murim_mentor_exp.0004.a.success:0 "The scrolls are yours. Such power..."
 murim_mentor_exp.0004.a.partial:0 "You grab what you can before the alarms sound."
 murim_mentor_exp.0004.a.caught:0 "Your master's hand clamps on your wrist. 'Traitor.'"
 murim_mentor_exp.0004.b:0 "No. My master's trust means more than any technique."
 murim_mentor_exp.0004.c:0 "Perhaps if I ask respectfully, they will teach me."

 murim_mentor_exp.0005.t:0 "The Legacy Weapon"
 murim_mentor_exp.0005.desc:0 "Before you lies your master's most treasured possession - the weapon that carved their legend across the martial world. Whether through graduation, sacrifice, or the passing of time, the weapon has come to you. Its weight carries the history of every battle your master ever fought."
 murim_mentor_exp.0005.a:0 "I swear on this blade to uphold my master's honor."
 murim_mentor_exp.0005.b:0 "I will reforge it - a new weapon for a new era."
 murim_mentor_exp.0005.c:0 "Seal it away. This weapon is too dangerous for the world."

 # =============================================
 # ROMANCE EXPANSION LOCALIZATION
 # =============================================
 murim_romance_exp.0001.t:0 "Love Letter Intercepted"
 murim_romance_exp.0001.desc:0 "Your heart sinks as word reaches you - the love letter you wrote has been intercepted by sect members. Your secret romance, carefully hidden for months, now teeters on the edge of exposure. If the elders find out about your forbidden connection..."
 murim_romance_exp.0001.a:0 "Deny everything. Burn any remaining evidence."
 murim_romance_exp.0001.a.covered:0 "The trail goes cold. Your secret is safe... for now."
 murim_romance_exp.0001.a.suspicious:0 "They don't have proof, but suspicious eyes follow you."
 murim_romance_exp.0001.a.exposed:0 "The evidence is damning. Your romance is exposed."
 murim_romance_exp.0001.b:0 "Enough hiding! I declare my love openly!"
 murim_romance_exp.0001.c:0 "End the relationship. It's the only way to protect us both."

 murim_romance_exp.0002.t:0 "Dual Cultivation Catastrophe"
 murim_romance_exp.0002.desc:0 "The qi between you and your cultivation partner spirals violently out of control. What was meant to be harmonious dual cultivation has become a devastating backlash. Energy crackles through the room, shattering furniture and scorching walls. One of you may not survive this."
 murim_romance_exp.0002.a:0 "Sacrifice my own qi channels to save them!"
 murim_romance_exp.0002.b:0 "Try to contain the backlash together - focus!"
 murim_romance_exp.0002.b.contained:0 "Together, your wills overpower the raging qi."
 murim_romance_exp.0002.b.partial:0 "The backlash is reduced but not eliminated."
 murim_romance_exp.0002.b.failed:0 "The qi explosion sends both of you flying."
 murim_romance_exp.0002.c:0 "Save myself - flee before the explosion!"

 murim_romance_exp.0003.t:0 "Jealous Sect Elder"
 murim_romance_exp.0003.desc:0 "A powerful elder in your sect has discovered your romance and is furious. Whether driven by jealousy, sect tradition, or genuine concern for your cultivation path, they demand you end the relationship immediately - or face the consequences."
 murim_romance_exp.0003.a:0 "I will fight for my love! Face me, Elder!"
 murim_romance_exp.0003.a.victory:0 "The elder staggers back, defeated. Love prevails."
 murim_romance_exp.0003.a.struggle:0 "The elder's power is immense. You barely survive."
 murim_romance_exp.0003.a.crushed:0 "The elder's palm sends you crashing through walls."
 murim_romance_exp.0003.b:0 "I... I will obey. The sect comes first."
 murim_romance_exp.0003.c:0 "We will elope. Pack your things tonight."

 murim_romance_exp.0004.t:0 "Elopement Flight"
 murim_romance_exp.0004.desc:0 "Under the cover of a moonless night, you and your lover prepare to flee the sect forever. Beyond these walls lies freedom - and danger. The jianghu is vast, but sect enforcers are relentless. This is your one chance."
 murim_romance_exp.0004.a:0 "Stealth is our best weapon. Move silently."
 murim_romance_exp.0004.a.clean_escape:0 "The night swallows your footsteps. Freedom."
 murim_romance_exp.0004.a.pursued:0 "Shouts behind you - they've noticed your absence!"
 murim_romance_exp.0004.a.caught:0 "Torchlight floods the gate. 'Going somewhere?'"
 murim_romance_exp.0004.b:0 "We fight our way out! No one stops us!"
 murim_romance_exp.0004.b.broke_through:0 "Bodies lie in your wake. The road ahead is open."
 murim_romance_exp.0004.b.bloody:0 "You break through, but not without cost."
 murim_romance_exp.0004.b.overwhelmed:0 "Too many guards. The weight of numbers crushes you."
 murim_romance_exp.0004.c:0 "This is madness. We cannot risk it."

 murim_romance_exp.0005.t:0 "Reunion After Years"
 murim_romance_exp.0005.desc:0 "Years have passed since you were separated. The martial world has changed you both - scars, new techniques, new stories carved into weathered faces. But when your eyes meet across the crowded tea house, time itself seems to stop. The connection that once burned so bright still glows like embers."
 murim_romance_exp.0005.a:0 "We are older, stronger, wiser. Let us begin again."
 murim_romance_exp.0005.b:0 "Some things are best left in the past. Farewell."
 murim_romance_exp.0005.c:0 "You abandoned me. Now face my blade!"
 murim_romance_exp.0005.c.victory:0 "Your former lover kneels, defeated."
 murim_romance_exp.0005.c.draw:0 "Neither can land the finishing blow."
 murim_romance_exp.0005.c.defeat:0 "They were always the better fighter."

 # =============================================
 # TRAINING EXPANSION 2 LOCALIZATION
 # =============================================
 murim_training_exp2.0001.t:0 "Forbidden Training Ground"
 murim_training_exp2.0001.desc:0 "Deep in the mountains, hidden behind ancient formation arrays, you discover a training ground of immense spiritual power. The qi here is concentrated a hundredfold - the air itself hums with energy. Whoever sealed this place did so for good reason."
 murim_training_exp2.0001.a:0 "Enter the forbidden ground. Train in concentrated spirit qi."
 murim_training_exp2.0001.b:0 "Study the formation arrays. Knowledge is power."
 murim_training_exp2.0001.c:0 "Seal it and report to the sect. Too dangerous alone."

 murim_training_exp2.0002.t:0 "Spirit Qi Waterfall"
 murim_training_exp2.0002.desc:0 "A waterfall fed by underground spirit veins cascades from a cliff face, its waters infused with raw qi. Legends say that those who can endure 49 days of meditation beneath its crushing force will achieve an iron body impervious to ordinary blades. Many have tried. Few survived."
 murim_training_exp2.0002.a:0 "49 days. I will endure every single one."
 murim_training_exp2.0002.b:0 "7 days is enough. I am no fool."
 murim_training_exp2.0002.c:0 "The risk is too great. I will find another way."
