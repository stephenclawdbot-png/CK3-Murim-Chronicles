l_english:
 murim_great_calamity_exp2.0001.t: "Ashes of the Old World"
 murim_great_calamity_exp2.0001.desc: "The dust has finally settled, revealing the full scope of devastation. Where once stood proud sect halls and bustling martial academies, only charred ruins and scattered bones remain. The old world of Murim is gone. What rises from these ashes depends on the survivors who remain."
 murim_great_calamity_exp2.0001.a: "Survey the ruins and count the survivors."
 murim_great_calamity_exp2.0001.b: "Mourn the dead. Honor the fallen."
 murim_great_calamity_exp2.0001.c: "The old world is gone. We start anew."
 murim_great_calamity_exp2.0002.t: "The Survivor Census"
 murim_great_calamity_exp2.0002.desc: "Your survey reveals a grim picture. Scattered martial artists wander the ruins — some still bearing clan markings, others stripped of everything but their cultivation. Clanless survivors outnumber the clan remnants. The question of who to rebuild with weighs upon your shoulders."
 murim_great_calamity_exp2.0002.a: "Recruit the clanless survivors into our ranks."
 murim_great_calamity_exp2.0002.b: "Focus only on our own clan survivors."
 murim_great_calamity_exp2.0002.c: "Create a unified order from all survivors."
 murim_great_calamity_exp2.0003.t: "Memorial of the Fallen Clans"
 murim_great_calamity_exp2.0003.desc: "Entire clans have been wiped from existence — their techniques lost, their lineages ended, their names fading from memory. The survivors gather in solemn silence, each carrying the weight of those who did not make it. The fallen deserve to be remembered. But how?"
 murim_great_calamity_exp2.0003.a: "Build a stone monument listing all the fallen."
 murim_great_calamity_exp2.0003.b: "Hold a grand funeral ceremony."
 murim_great_calamity_exp2.0003.c: "The dead are dead. Focus on the living."
 murim_great_calamity_exp2.0004.t: "Declaration of the New Era"
 murim_great_calamity_exp2.0004.desc: "The old era perished in the calamity. A new one must be proclaimed — a fresh beginning for the martial world, with new rules, new alliances, and new dreams. As the one who rallied the survivors, you hold the privilege of naming this nascent age."
 murim_great_calamity_exp2.0004.a: "Name the new era after myself."
 murim_great_calamity_exp2.0004.b: "Name it the Era of Restoration."
 murim_great_calamity_exp2.0004.c: "Let the survivors choose the name together."
 murim_great_calamity_exp2.0005.t: "The New Sect Halls Rise"
 murim_great_calamity_exp2.0005.desc: "Timber is cut, foundations are laid, and for the first time since the calamity, the sound of hammers replaces the echo of destruction. The sect halls must be rebuilt — but should they rise from the hallowed ruins of the old, or should you seek fresh ground unburdened by memory?"
 murim_great_calamity_exp2.0005.a: "Rebuild on the ruins of the old headquarters."
 murim_great_calamity_exp2.0005.b: "Build in a completely new location."
 murim_great_calamity_exp2.0005.c: "Remain nomadic. No fixed headquarters."
 murim_great_calamity_exp2.0006.t: "The Survivor Assembly"
 murim_great_calamity_exp2.0006.desc: "Martial artists from every surviving faction gather beneath a makeshift pavilion. Former enemies sit across from each other, united by shared trauma. The assembly must decide how to govern the new order — by council, by strength, or by rotation. Every voice carries the weight of the dead."
 murim_great_calamity_exp2.0006.a: "Establish a democratic council of elders."
 murim_great_calamity_exp2.0006.b: "Declare myself supreme leader."
 murim_great_calamity_exp2.0006.c: "Rotate leadership among clan survivors."
 murim_great_calamity_exp2.0007.t: "The Monument Dedication"
 murim_great_calamity_exp2.0007.desc: "The stone monument stands complete — a towering pillar of granite carved with the names and deeds of the fallen. Survivors gather for the dedication ceremony, their eyes wet with memories. The monument will stand for centuries, a silent witness to what was lost and what endured."
 murim_great_calamity_exp2.0007.a: "Inscribe every fallen martial artist's name."
 murim_great_calamity_exp2.0007.b: "Inscribe only clan leaders and grandmasters."
 murim_great_calamity_exp2.0007.c: "Add a warning for future generations."
 murim_great_calamity_exp2.0008.t: "Reaction to the New Era"
 murim_great_calamity_exp2.0008.desc: "Word has spread that a self-proclaimed founder has named a new era. Not everyone accepts this presumption — who is this person to declare the old world dead and name what follows? Some kneel in gratitude for leadership; others seethe at the arrogance. Where do you stand?"
 murim_great_calamity_exp2.0008.a: "Accept the new era and its founder."
 murim_great_calamity_exp2.0008.b: "Reject it. Who are they to name an era?"
 murim_great_calamity_exp2.0008.c: "Stay neutral. Wait and see."
 murim_great_calamity_exp2.0009.t: "Secrets Unearthed in the Ruins"
 murim_great_calamity_exp2.0009.desc: "While excavating the old sect grounds, workers uncover a hidden vault sealed for generations. Inside: ancient scrolls, lost artifacts, and maps to places long forgotten. The calamity has destroyed much, but it has also revealed secrets that the old masters buried deliberately."
 murim_great_calamity_exp2.0009.a: "Study the ancient cultivation manual."
 murim_great_calamity_exp2.0009.b: "Claim the lost artifact cache."
 murim_great_calamity_exp2.0009.c: "Follow the map to hidden cultivation grounds."
 murim_great_calamity_exp2.0010.t: "Resistance Against the New Order"
 murim_great_calamity_exp2.0010.desc: "Not all survivors accept the new leadership. Old-era loyalists band together, declaring the new order illegitimate. Their resistance leader, a martial artist of formidable skill, rallies the discontented and demands change. The fragile peace of the post-calamity world trembles."
 murim_great_calamity_exp2.0010.a: "Crush the resistance with force."
 murim_great_calamity_exp2.0010.b: "Negotiate with the dissidents."
 murim_great_calamity_exp2.0010.c: "Step down. Let them choose a new leader."
