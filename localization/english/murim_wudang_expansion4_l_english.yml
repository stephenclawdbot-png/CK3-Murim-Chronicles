l_english:
 murim_wudang_exp4.0001.t: "The Immortal Path Beckons"
 murim_wudang_exp4.0001.desc: "After decades of cultivation atop Wudang Mountain, you stand at a crossroads few mortals ever glimpse. Three paths shimmer before your inner eye: the way of immortality, the way of the sword god, or the way of the worldly sage."
 murim_wudang_exp4.0001.a: "Walk the path of immortality."
 murim_wudang_exp4.0001.b: "Pursue the Sword God's ascension."
 murim_wudang_exp4.0001.c: "Remain a sage among mortals."
 murim_wudang_exp4.0002.t: "The Immortality Trial"
 murim_wudang_exp4.0002.desc: "Seated upon the Celestial Peak, the boundary between mortal and eternal grows thin. Your qi reaches toward the heavens, testing whether flesh can transcend its earthly prison. The trial of immortality has begun."
 murim_wudang_exp4.0002.a: "Push through — transcend mortality itself."
 murim_wudang_exp4.0002.b: "Pull back — the risk is too great."
 murim_wudang_exp4.0002.c: "Settle for partial transcendence."
 murim_wudang_exp4.0003.t: "The Sword God's Challenge"
 murim_wudang_exp4.0003.desc: "Your blade hums with divine intent. To claim the title of Sword God, you must prove your steel against the mightiest warriors of the age. A worthy rival awaits on the dueling ground."
 murim_wudang_exp4.0003.a: "Duel the rival for the title of Sword God."
 murim_wudang_exp4.0003.b: "Train in seclusion as a Sword Hermit."
 murim_wudang_exp4.0003.c: "Pass my sword art to all disciples."
 murim_wudang_exp4.0004.t: "Communion with the Heavenly Dao"
 murim_wudang_exp4.0004.desc: "Golden light cascades from the heavens as your consciousness touches the infinite. Every martial artist in the world feels a tremor in their qi — something extraordinary is happening on Wudang Mountain."
 murim_wudang_exp4.0004.a: "Embrace full transcendence before all."
 murim_wudang_exp4.0004.b: "Accept quietly, with humility."
 murim_wudang_exp4.0004.c: "This was a false breakthrough..."
 murim_wudang_exp4.0005.t: "Schism Within Wudang"
 murim_wudang_exp4.0005.desc: "Discontent festers among the disciples. A faction has formed in opposition to your leadership, questioning your path for the sect. The cracks must be addressed before they shatter Wudang from within."
 murim_wudang_exp4.0005.a: "Confront the dissenters directly."
 murim_wudang_exp4.0005.b: "Offer compromise and reconciliation."
 murim_wudang_exp4.0005.c: "Retreat to meditation — let it pass."
 murim_wudang_exp4.0006.t: "The Wudang Purge"
 murim_wudang_exp4.0006.desc: "The schism has come to a head. Rebels and loyalists draw their swords within the sacred halls of Wudang. Brother turns against brother. The sect's future hangs on what you do next."
 murim_wudang_exp4.0006.a: "Crush the rebellion by force."
 murim_wudang_exp4.0006.b: "Forgive the rebels and restore unity."
 murim_wudang_exp4.0006.c: "Exile all dissidents from Wudang."
 murim_wudang_exp4.0007.t: "The Primordial Scripture"
 murim_wudang_exp4.0007.desc: "Behind a sealed wall in the deepest archive, you discover a scripture written by Wudang's founder. The ink still glows with residual qi. This is knowledge thought lost for generations."
 murim_wudang_exp4.0007.a: "Study the scripture personally."
 murim_wudang_exp4.0007.b: "Sell the knowledge for gold."
 murim_wudang_exp4.0007.c: "Share the scripture with all disciples."
 murim_wudang_exp4.0008.t: "Aftermath of Civil War"
 murim_wudang_exp4.0008.desc: "The dust settles over a scarred Wudang. The civil war is over, but the sect will never be quite the same. Now you must decide how to rebuild — or whether to rebuild at all."
 murim_wudang_exp4.0008.a: "Reunify Wudang under my banner."
 murim_wudang_exp4.0008.b: "Accept the split — two branches of Wudang."
 murim_wudang_exp4.0008.c: "Abdicate and let another lead."
 murim_wudang_exp4.0009.t: "The Void Sword Beckons"
 murim_wudang_exp4.0009.desc: "Beyond the Sword God lies something darker — the Void Sword, a technique that draws power from nothingness itself. It promises absolute dominion over blade arts, but at a cost that may consume your humanity."
 murim_wudang_exp4.0009.a: "Master the Void Sword technique."
 murim_wudang_exp4.0009.b: "Reject the Void — I need no darkness."
 murim_wudang_exp4.0009.c: "Harmonize Void and Light into balance."
 murim_wudang_exp4.0010.t: "The Eternal Patriarch"
 murim_wudang_exp4.0010.desc: "You have lived beyond the span of ordinary men, mastering arts that defy mortality. All of Wudang looks to you as a living legend. The time has come to decide what your eternal legacy shall be."
 murim_wudang_exp4.0010.a: "Become Wudang's Eternal Patriarch."
 murim_wudang_exp4.0010.b: "Wander the world as an immortal."
 murim_wudang_exp4.0010.c: "Choose an heir and retire gracefully."
