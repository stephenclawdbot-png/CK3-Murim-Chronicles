l_english:
 murim_entry_path_exp3.0001.t: "Legacy Pressure"
 murim_entry_path_exp3.0001.desc: "The weight of your family name presses down like a mountain. Every elder, every ancestor, every whispered legend of your clan's glory demands that you carry the torch. Your parents' techniques are carved into your bones, but are they truly yours — or merely borrowed?"
 murim_entry_path_exp3.0001.a: "Embrace the family legacy"
 murim_entry_path_exp3.0001.b: "Reject their path — forge my own"
 murim_entry_path_exp3.0001.c: "Secretly study forbidden techniques"
 murim_entry_path_exp3.0001.d: "Ask to train under a different clan"
 murim_entry_path_exp3.0002.t: "Survival in the Underworld"
 murim_entry_path_exp3.0002.desc: "The streets are a crucible of hunger, violence, and desperate cunning. Without a name, a sect, or a single copper coin, you must find a way to survive in the underworld of the martial world — or be swallowed by it. Every alley holds a threat, but also an opportunity."
 murim_entry_path_exp3.0002.a: "Join a street gang for protection"
 murim_entry_path_exp3.0002.b: "Steal a martial arts manual"
 murim_entry_path_exp3.0002.c: "Beg a passing martial artist for training"
 murim_entry_path_exp3.0002.d: "Survive alone through sheer willpower"
 murim_entry_path_exp3.0003.t: "The Ancient Manuscript"
 murim_entry_path_exp3.0003.desc: "Among dusty scrolls and crumbling records, your scholarly hands have unearthed something extraordinary — an ancient martial arts manuscript of incalculable value. The characters seem to glow faintly in candlelight, and reading them sends a tremor of qi through your meridians."
 murim_entry_path_exp3.0003.a: "Study the manuscript in secret"
 murim_entry_path_exp3.0003.b: "Share the discovery with the academic world"
 murim_entry_path_exp3.0003.c: "Sell the manuscript to a martial clan"
 murim_entry_path_exp3.0003.d: "Use it as leverage to join a powerful clan"
 murim_entry_path_exp3.0004.t: "Deep Cover Mission"
 murim_entry_path_exp3.0004.desc: "Your imperial handler delivers the final briefing. You are to infiltrate one of the great martial sects, live among them, learn their secrets, and report back to the throne. One wrong word, one lapse in your cover, and the cultivators will tear you apart before the empire can intervene."
 murim_entry_path_exp3.0004.a: "Infiltrate Mount Hua Sect"
 murim_entry_path_exp3.0004.b: "Infiltrate the Phantom Blade"
 murim_entry_path_exp3.0004.c: "Infiltrate the Heavenly Demon Sect"
 murim_entry_path_exp3.0004.d: "Go rogue — abandon the imperial mission"
 murim_entry_path_exp3.0005.t: "Breaking Through Family Limits"
 murim_entry_path_exp3.0005.desc: "You have reached the ceiling of your family's martial arts. Every technique, every form, every secret teaching has been absorbed — and still it is not enough. To surpass the generation that came before, you must shatter the boundaries they never dared to cross."
 murim_entry_path_exp3.0005.a: "Surpass my parents through sheer effort"
 murim_entry_path_exp3.0005.b: "Combine family arts with outside techniques"
 murim_entry_path_exp3.0005.c: "Discover a hidden family technique"
 murim_entry_path_exp3.0006.t: "First Real Master"
 murim_entry_path_exp3.0006.desc: "After years of scraping and fighting for every scrap of martial knowledge, a true master has finally appeared before you. Their power is undeniable, their gaze penetrating. For the first time in your life, someone offers to teach you properly — to shape the raw stone into a blade."
 murim_entry_path_exp3.0006.a: "A retired grandmaster takes me in"
 murim_entry_path_exp3.0006.b: "A wandering swordsman teaches me on the road"
 murim_entry_path_exp3.0006.c: "I teach myself from observation and combat"
 murim_entry_path_exp3.0007.t: "Identity Crisis"
 murim_entry_path_exp3.0007.desc: "The face in the mirror belongs to a stranger. After so long undercover, you can no longer tell where the mask ends and the real person begins. The sect you infiltrated has become your family. The empire you serve has become a distant memory. Who are you, really?"
 murim_entry_path_exp3.0007.a: "Stay loyal to the empire — complete the mission"
 murim_entry_path_exp3.0007.b: "Defect fully — embrace the martial world"
 murim_entry_path_exp3.0007.c: "Play both sides"
 murim_entry_path_exp3.0007.d: "Disappear — create a new identity entirely"
 murim_entry_path_exp3.0008.t: "Meeting of Destinies"
 murim_entry_path_exp3.0008.desc: "All paths through the martial world converge at this moment. Whether born to power, raised in the gutter, trained in the academy, or forged in deception, you now stand at the crossroads of destiny. The heavens watch to see what kind of warrior you will become."
 murim_entry_path_exp3.0008.a: "My path was destined from birth"
 murim_entry_path_exp3.0008.b: "I forged my destiny through will alone"
 murim_entry_path_exp3.0008.c: "My destiny is still unwritten"
 murim_entry_path_exp3.0008.d: "I reject destiny — walk the path of chaos"
