l_english:
 murim_underworld.0001.t: "The Black Market"
 murim_underworld.0001.desc: "In a dimly lit back alley, a hooded figure whispers your name. They know who you are. They know what you need. 'I have items that no legitimate merchant would dare sell,' they murmur. 'Forbidden manuals, cursed weapons, spirit-beast cores. Name your price.'"
 murim_underworld.0001.a: "Browse their wares — power has no morality"
 murim_underworld.0001.b: "Report them to the authorities"
 murim_underworld.0001.c: "Feign interest to gather intelligence"

 murim_underworld.0002.t: "The Smuggler's Proposition"
 murim_underworld.0002.desc: "A notorious smuggler approaches with a lucrative offer: help transport a shipment of forbidden cultivation materials through your territory. The pay is extraordinary, but if caught, the consequences would be devastating to your reputation and standing."
 murim_underworld.0002.a: "Accept the job — the gold is too good"
 murim_underworld.0002.b: "Refuse and confiscate the materials"
 murim_underworld.0002.c: "Negotiate a finder's fee for looking the other way"

 murim_underworld.0003.t: "The Underground Arena"
 murim_underworld.0003.desc: "Deep beneath the city, torchlight illuminates a fighting pit. Wealthy patrons wager fortunes on no-rules combat between cultivators. The champion earns a king's ransom. The losers... don't always walk out. A promoter recognizes you and offers a spot on tonight's card."
 murim_underworld.0003.a: "Fight — the money and glory are worth the risk"
 murim_underworld.0003.b: "Bet on the fights instead"
 murim_underworld.0003.c: "This is beneath me — leave"

 murim_underworld.0004.t: "The Poison Dealer"
 murim_underworld.0004.desc: "A veiled woman presents an array of small jade bottles. 'Seven-Step Soul Dissolving Powder. Meridian Sealing Toxin. Heart-Eating Crimson Dust.' Her wares could kill any cultivator below the Nascent Soul realm. She also carries antidotes... for those who can afford them."
 murim_underworld.0004.a: "Buy poisons — weapons come in many forms"
 murim_underworld.0004.b: "Buy antidotes — preparation saves lives"
 murim_underworld.0004.c: "Shut her operation down"

 murim_underworld.0005.t: "Secrets for Sale"
 murim_underworld.0005.desc: "An information broker sits behind a screen of beads, their face hidden. 'I know the location of every hidden sect treasury in the province. I know which elders have secret disciples. I know who poisoned the Grand Elder last spring. What would you like to know?'"
 murim_underworld.0005.a: "Buy intelligence on rival sects"
 murim_underworld.0005.b: "Buy political intelligence"
 murim_underworld.0005.c: "I don't deal in stolen secrets"

 murim_underworld.0006.t: "The Bounty"
 murim_underworld.0006.desc: "A sealed letter bears a simple offer: eliminate a specific cultivator, and receive a fortune in spirit stones. The target is a sect leader who has made powerful enemies. The job is dangerous but straightforward. No one would ever trace it back to you."
 murim_underworld.0006.a: "Accept the contract"
 murim_underworld.0006.b: "Warn the target instead"
 murim_underworld.0006.c: "Sell the information to the target"

 murim_underworld.0007.t: "The Slave Auction"
 murim_underworld.0007.desc: "You stumble upon a horrific scene — captured cultivators, their meridians sealed, being auctioned to wealthy patrons as servants and bodyguards. Among them are children with cultivation potential, torn from their families. The auctioneers are well-armed and well-connected."
 murim_underworld.0007.a: "Break them free — this ends now"
 murim_underworld.0007.b: "Buy the children to save them"
 murim_underworld.0007.c: "Leave — this isn't my fight"

 murim_underworld.0008.t: "Counterfeit Cultivation Pills"
 murim_underworld.0008.desc: "Reports surface of fake cultivation pills flooding the market. They look identical to genuine ones but contain impurities that damage meridians. Several promising young cultivators have already been crippled. The counterfeiter is making a fortune — and ruining lives."
 murim_underworld.0008.a: "Investigate and shut down the operation"
 murim_underworld.0008.b: "Take over the operation for profit"
 murim_underworld.0008.c: "Develop a test to identify fakes"
