l_english:
 murim_clan_scout.0001.t: "A Hidden Prodigy"
 murim_clan_scout.0001.desc: "Our scout has returned with startling news. Among the common folk, a youth moves with an instinct for qi that cannot be taught. Their meridians are naturally aligned, their reflexes sharp as a blade's edge -- a diamond hidden in the mud."
 murim_clan_scout.0001.a: "Recruit them at once."
 murim_clan_scout.0001.b: "Test them further first."
 murim_clan_scout.0001.c: "They are beneath our clan."
 murim_clan_scout.0010.t: "The Trial Concludes"
 murim_clan_scout.0010.desc: "The candidate has completed the trials we set before them. Our senior disciples observed every moment -- their stance, their breathing, their resolve under pressure. Now we must render judgment on their worthiness."
 murim_clan_scout.0010.a: "They passed brilliantly. Welcome them."
 murim_clan_scout.0010.b: "Adequate, but raw. More training needed."
 murim_clan_scout.0010.c: "They failed. Send them away."
 murim_clan_scout.0020.t: "Foreign Martial Knowledge"
 murim_clan_scout.0020.desc: "Our scout spent months beyond the borders, observing foreign fighters and their strange techniques. They return bearing scrolls of unfamiliar forms -- breathing patterns that twist qi in ways our founders never imagined. Such knowledge could strengthen us, or corrupt our path."
 murim_clan_scout.0020.a: "Integrate these foreign techniques."
 murim_clan_scout.0020.b: "Our traditions need no foreign taint."
 murim_clan_scout.0020.c: "I will study them privately first."
 murim_clan_recruit.0001.t: "A New Disciple Joins"
 murim_clan_recruit.0001.desc: "Word has reached us that a promising new member has formally joined our ranks. Another voice to recite our oath, another blade to carry our banner. The clan grows stronger with each generation."
 murim_clan_recruit.0001.a: "The clan welcomes them."
 murim_scout.0020.t: "Advancing the Frontier"
 murim_scout.0020.desc: "The trail stretches onward into uncharted territory. Beyond the next ridge, there may be hidden sects, lost techniques, or deadly ambushes. Our scout must decide whether to press forward into the unknown or return home with what they have already gathered."
 murim_scout.0020.a: "Press onward into the unknown."
 murim_scout.0020.b: "Return home with our findings."
 murim_clan_scout_integration.0001.t: "Scout Reports to Leadership"
 murim_clan_scout_integration.0001.desc: "Our scout kneels before the clan elders, presenting a detailed account of the surrounding territories. Every rival movement, every hidden resource, every shift in the balance of power has been carefully documented. This intelligence could shape our strategy for years to come."
 murim_clan_scout_integration.0001.a: "This report brings honor to our clan."
 murim_clan_scout_integration.0001.b: "Use this to sharpen our martial strategy."
 murim_clan_scout_integration.0002.t: "Rival Clan Activity Detected"
 murim_clan_scout_integration.0002.desc: "Our scout has uncovered troubling signs of a rival clan massing disciples near our borders. Training grounds have been established in hidden valleys, and coded messages fly between their outposts. They are preparing for something."
 murim_clan_scout_integration.0002.a: "Prepare counter-intelligence operations."
 murim_clan_scout_integration.0002.b: "Note this and remain vigilant."
 murim_clan_scout_integration.0003.t: "Abandoned Training Ground"
 murim_clan_scout_integration.0003.desc: "Deep in a mist-shrouded gorge, our scout discovered the remnants of a forgotten training ground. Weathered stone dummies still stand in formation, and faded inscriptions on the cliff wall describe cultivation exercises lost to time."
 murim_clan_scout_integration.0003.a: "Study the ancient techniques."
 murim_clan_scout_integration.0003.b: "Salvage what materials we can."
 murim_clan_scout_integration.0004.t: "A Wandering Master"
 murim_clan_scout_integration.0004.desc: "On a remote mountain path, our scout encountered an elderly martial artist of terrifying skill. The master travels alone, unburdened by sect loyalties, carrying a lifetime of combat wisdom in gnarled hands. They seem willing to share their knowledge -- for the right price."
 murim_clan_scout_integration.0004.a: "Learn from the wandering master."
 murim_clan_scout_integration.0004.b: "Invite them to our clan as an honored guest."
 murim_clan_scout_integration.0005.t: "Scout Ambushed!"
 murim_clan_scout_integration.0005.desc: "A desperate message arrives: our scout was ambushed by mountain bandits along the southern pass. Though wounded and outnumbered, they fought their way free, leaving several attackers groaning in the dirt. The experience has hardened them, but the roads grow ever more dangerous."
 murim_clan_scout_integration.0005.a: "Fight through -- pain forges strength."
 murim_clan_scout_integration.0005.b: "Evade and gather intelligence on them."
 murim_clan_scout_integration.0006.t: "A Secret Technique Scroll"
 murim_clan_scout_integration.0006.desc: "Hidden behind a waterfall, sealed in an oilskin pouch within a jade box, our scout discovered a technique scroll of extraordinary craftsmanship. The calligraphy describes a cultivation method thought lost centuries ago. This find could revolutionize our training -- or fetch a king's ransom."
 murim_clan_scout_integration.0006.a: "Study the scroll for our clan."
 murim_clan_scout_integration.0006.b: "Sell it to the highest bidder."
 murim_clan_scout_integration.0007.t: "A Foreign Tournament"
 murim_clan_scout_integration.0007.desc: "Our scout witnessed a grand martial tournament in distant lands, where fighters from a dozen schools clashed with unfamiliar styles. They took careful note of every stance, every footwork pattern, every killing technique on display."
 murim_clan_scout_integration.0007.a: "Report on their fighting styles."
 murim_clan_scout_integration.0007.b: "Apply what we learned to our training."
 murim_clan_scout_integration.0008.t: "A Tempting Offer"
 murim_clan_scout_integration.0008.desc: "A foreign power has approached our scout with a lavish offer: gold, land, and rank in exchange for their loyalty. The temptation is real -- our scout has spent months away from home, and the foreigners promise a life of comfort. But betrayal carries a price measured in blood."
 murim_clan_scout_integration.0008.a: "Remain loyal to our clan."
 murim_clan_scout_integration.0008.b: "Accept the foreign gold... quietly."
 murim_clan_scout_integration.0009.t: "Rare Medicinal Herbs"
 murim_clan_scout_integration.0009.desc: "In a hidden alpine meadow, our scout discovered a patch of Spirit Root herbs -- rare plants that accelerate meridian cleansing and qi cultivation. Properly prepared, these herbs could advance a cultivator's progress by months. They also command extraordinary prices in any market."
 murim_clan_scout_integration.0009.a: "Use them for our cultivation training."
 murim_clan_scout_integration.0009.b: "Sell them at the apothecary market."
 murim_clan_scout_integration.0010.t: "New Trade Routes Mapped"
 murim_clan_scout_integration.0010.desc: "Our scout has mapped a network of trade routes connecting remote villages and merchant towns, previously unknown to our clan. Controlling these paths would bring steady revenue and intelligence. The merchants along these routes are eager for protection from bandits."
 murim_clan_scout_integration.0010.a: "Establish trade along these routes."
 murim_clan_scout_integration.0010.b: "Use the routes for intelligence networks."
 murim_clan_scout_integration.0011.t: "A Demonic Cultivator"
 murim_clan_scout_integration.0011.desc: "Our scout stumbled upon a cultivator practicing forbidden arts in a desolate ravine -- drawing qi from the suffering of captured beasts, their eyes burning with unnatural light. The demonic practitioner noticed our scout but did not attack, instead offering a cold smile and an invitation to 'learn true power.'"
 murim_clan_scout_integration.0011.a: "Confront the demonic cultivator."
 murim_clan_scout_integration.0011.b: "Retreat and report to the elders."
 murim_clan_scout_integration.0011.c: "Observe their techniques from hiding."
 murim_clan_scout_integration.0012.t: "A Rising Clan"
 murim_clan_scout_integration.0012.desc: "From a distant province comes word of a new clan rising rapidly in power. Their leader is young but formidable, and they recruit aggressively from surrounding villages. Whether they become a future ally or rival depends on how we respond to their emergence."
 murim_clan_scout_integration.0012.a: "Prepare our defenses against expansion."
 murim_clan_scout_integration.0012.b: "Send spies to learn more about them."
 murim_clan_scout_integration.0013.t: "Celestial Phenomenon"
 murim_clan_scout_integration.0013.desc: "Our scout witnessed an extraordinary sight: the heavens split open with cascading light, and for a brief moment, the very qi of the earth surged like a tidal wave. Ancient texts describe such phenomena as harbingers of great change -- moments when the barrier between mortal and immortal thins."
 murim_clan_scout_integration.0013.a: "Meditate on this heavenly sign."
 murim_clan_scout_integration.0013.b: "Study the phenomenon rationally."
 murim_clan_scout_integration.0014.t: "Underground Martial Arena"
 murim_clan_scout_integration.0014.desc: "Beneath a bustling market town, our scout discovered a secret fighting pit where martial artists wager gold and honor in brutal no-rules combat. The stakes are high, the fighters desperate, and the spectators wealthy. This underworld could be a source of both profit and intelligence."
 murim_clan_scout_integration.0014.a: "Enter the arena and fight."
 murim_clan_scout_integration.0014.b: "Infiltrate and gather intelligence."
 murim_clan_scout_integration.0015.t: "An Injured Martial Artist"
 murim_clan_scout_integration.0015.desc: "On a rain-soaked mountain trail, our scout found a martial artist lying broken among the rocks, their robes torn and stained with blood. They had clearly lost a terrible fight. Despite their injuries, their qi signature reveals considerable cultivation. Mercy here could win a powerful ally."
 murim_clan_scout_integration.0015.a: "Rescue them and tend their wounds."
 murim_clan_scout_integration.0015.b: "Leave them -- it is not our concern."
 murim_clan_scout_integration.0016.t: "An Intercepted Message"
 murim_clan_scout_integration.0016.desc: "Our scout intercepted a coded message carried by a disguised courier traveling between two rival clans. The cipher is complex but not unbreakable. If decoded, it could reveal alliance plans, troop movements, or assassination targets. Dangerous knowledge, but invaluable."
 murim_clan_scout_integration.0016.a: "Decode and exploit the intelligence."
 murim_clan_scout_integration.0016.b: "Report this through proper channels."
 murim_clan_scout_integration.0017.t: "A Safe House Established"
 murim_clan_scout_integration.0017.desc: "Our scout has established a hidden safe house in foreign territory -- a nondescript building with concealed exits, emergency supplies, and a network of local informants. It will serve as a staging point for future operations, though maintaining it requires ongoing investment."
 murim_clan_scout_integration.0017.a: "Fund the safe house operations."
 murim_clan_scout_integration.0017.b: "Acknowledge the effort and move on."
 murim_clan_scout_integration.0018.t: "Cover Blown!"
 murim_clan_scout_integration.0018.desc: "Disaster. Our scout's identity has been discovered by hostile forces. Pursuit teams are closing in, and every exit route is being watched. The scout must fight or flee -- there is no third option. Every moment of hesitation brings the enemy closer."
 murim_clan_scout_integration.0018.a: "Fight through the enemy cordon."
 murim_clan_scout_integration.0018.b: "Use stealth and misdirection to escape."
 murim_clan_scout_integration.0019.t: "Comprehensive Regional Census"
 murim_clan_scout_integration.0019.desc: "After months of painstaking work, our scout returns with a complete martial census of the surrounding region. Every clan, every wandering master, every hidden training ground has been catalogued. This intelligence is a masterwork -- a complete picture of the martial landscape that no other sect possesses."
 murim_clan_scout_integration.0019.a: "This is invaluable. Reward the scout."
 murim_clan_scout_integration.0019.b: "Sell copies to allied clans for profit."
 murim_clan_scout_integration.0020.t: "Grand Scout Briefing"
 murim_clan_scout_integration.0020.desc: "The clan leadership gathers in the great hall for a comprehensive briefing on all scouting activities. Maps are unfurled, reports are read aloud, and the full picture of our position in the martial world becomes clear. Every elder and senior disciple listens with rapt attention as the scouts present their findings."
 murim_clan_scout_integration.0020.a: "This knowledge strengthens our foundation."
 murim_clan_scout_integration.0020.b: "Use these insights to train our warriors."
