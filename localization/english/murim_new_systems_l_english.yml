 murim_young_dragon_champion_desc:0 "YOUNG DRAGON CHAMPION. The greatest young martial artist of the generation."
 murim_young_dragon_finalist_desc:0 "Reached the finals of the Young Dragon Tournament."
 murim_grand_tournament_cooldown_desc:0 "Recently competed in the Grand Tournament."
 murim_grand_champion_desc:0 "GRAND CHAMPION of the martial world. The most feared and respected fighter alive."
 murim_grand_finalist_desc:0 "Finalist of the Grand Tournament. Among the strongest in the world."
 murim_dark_path_chosen_desc:0 "Chose the unorthodox path. The darkness within grows."
 murim_recent_challenge_cooldown_desc:0 "Recently issued a formal ranking challenge."
 murim_desperate_determination_desc:0 "Born from desperation, forged in hardship. Nothing to lose, everything to gain."
 murim_mysterious_encounter_desc:0 "A fateful encounter with the supernatural has left its mark."
 murim_ancient_manual_insight_desc:0 "Studying an ancient cultivation manual discovered in the mountains."
 murim_near_death_awakening_desc:0 "A near-death experience awakened dormant qi potential."
 murim_mountain_hermit_focus_desc:0 "Training in isolation in the mountains, focused entirely on cultivation."
 murim_active_training_desc:0 "Currently engaged in intensive martial arts training."
 murim_sect_outer_disciple_desc:0 "An outer disciple of the clan. Learning the basics."
 murim_sect_inner_disciple_desc:0 "An inner disciple. Trusted with advanced techniques and clan secrets."
 murim_sect_elder_desc:0 "An elder of the clan. Voice in all major decisions."
 murim_sect_vice_leader_desc:0 "Vice Leader of the clan. Second only to the Clan Leader."
 murim_sect_leader_desc:0 "CLAN LEADER. Supreme authority within the clan."
 murim_new_sect_member_enthusiasm_desc:0 "The enthusiasm of a new clan member. Everything is exciting."
 murim_tang_associate_poison_knowledge_desc:0 "Knowledge of Tang Clan poison arts gained through their associate program."
 murim_sect_deserter_stigma_desc:0 "Left their clan. Former comrades view this as betrayal."
 murim_sect_expelled_shame_desc:0 "Expelled from their clan in disgrace. A mark of shame."
