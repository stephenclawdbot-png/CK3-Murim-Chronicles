 # CLAN TRAIT NAMES
 # ---------------------
 martial_awareness:0 "Martial Awareness"
 martial_awareness_desc:0 "This character has witnessed the martial world but has not joined it. They understand that cultivators and warriors exist in a hidden layer of society."

