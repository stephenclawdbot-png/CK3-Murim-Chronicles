l_english:

 # === ALLIANCE EVENTS LOCALIZATION ===
 murim_cross_system.0030.t:0 "Intelligence for Our New Allies"
 murim_cross_system.0030.desc:0 "Our new alliance opens possibilities beyond mere military cooperation. Our spy network has intelligence that could benefit our allies greatly — trade route disruptions, enemy troop movements, hidden caches. Sharing this would cement the bond, but intelligence shared is intelligence that can be turned against us."
 murim_cross_system.0030.a:0 "Share intelligence with our new allies"
 murim_cross_system.0030.b:0 "Keep our intelligence separate for now"

 murim_cross_system.0031.t:0 "Underground Trade Partnership"
 murim_cross_system.0031.desc:0 "Our new allies lack access to the underground markets we have cultivated. Opening joint access would enrich both parties — and bind our interests more tightly together. The black market rewards those who bring new customers."
 murim_cross_system.0031.a:0 "Open joint black market access with our allies"
 murim_cross_system.0031.b:0 "Keep our market contacts exclusive"

 murim_cross_system.0040.t:0 "The Alliance Shatters — Spies Exposed"
 murim_cross_system.0040.desc:0 "The alliance is broken, and with it our security. Our former allies knew the faces of some of our operatives. They may have already turned — or been turned. The spy network is compromised. We must decide quickly: purge the compromised agents, or gamble that our former allies won't exploit this knowledge."
 murim_cross_system.0040.a:0 "Purge all potentially compromised agents"
 murim_cross_system.0040.b:0 "Ignore the risk and hope for the best"

 murim_cross_system.0041.t:0 "Forbidden Secrets Leaked"
 murim_cross_system.0041.desc:0 "Our former ally knows our darkest secret — that we practice forbidden techniques. Already, whispers spread through the Murim world. The Heavenly Tribunal may soon take notice. We must act before our former ally can deliver proof."
 murim_cross_system.0041.a:0 "Deny everything — let rumor die on its own"
 murim_cross_system.0041.b:0 "Silence our former ally before they can talk"
 murim_cross_system.0041.c:0 "Flee before the truth catches up with us"

 murim_cross_system.0042.t:0 "The Blood Oath Burns"
 murim_cross_system.0042.desc:0 "We swore a blood oath — and now we have broken it. The ancient binding burns through our meridians like molten iron. The heavens do not forgive oath-breakers lightly. Our qi falters, our cultivation foundation cracks. This is the price of betrayal."
 murim_cross_system.0042.a:0 "Endure the spiritual backlash — we deserve this pain"
 murim_cross_system.0042.b:0 "Perform an atonement ritual to mitigate the curse"

 murim_cross_system.0050.t:0 "The Predecessor's Hidden Network"
 murim_cross_system.0050.desc:0 "Upon taking our new position, we discover something unexpected in the predecessor's private chambers: coded messages, secret maps, lists of agents planted throughout the Murim world. An entire spy network, waiting for orders. It is ours to command — or disband."
 murim_cross_system.0050.a:0 "Take command of the inherited spy network"
 murim_cross_system.0050.b:0 "Disband the spies — we rule with honor"

 murim_cross_system.0051.t:0 "The Hidden Ledgers"
 murim_cross_system.0051.desc:0 "Behind a false wall in the sect leader's study, we find ledgers detailing years of underground trade. Names, transactions, debts owed — a complete record of black market dealings. These pages hold power over dozens of prominent martial artists."
 murim_cross_system.0051.a:0 "Use the ledgers to establish our own market contacts"
 murim_cross_system.0051.b:0 "Destroy the ledgers and purify our sect's reputation"
 murim_cross_system.0051.c:0 "Blackmail everyone listed in these pages"

 murim_cross_system.0052.t:0 "Forbidden Practitioners Among Our Vassals"
 murim_cross_system.0052.desc:0 "As the new leader, the Tribunal expects us to review our vassals' practices. Several are known to practice forbidden techniques — soul-devouring arts, blood cultivation, corpse manipulation. The orthodox world watches to see if we will tolerate such darkness under our banner."
 murim_cross_system.0052.a:0 "Purge all forbidden technique practitioners"
 murim_cross_system.0052.b:0 "Tolerate them quietly — their power serves us"
 murim_cross_system.0052.c:0 "Learn their forbidden arts in secret"

 # === MONTHLY PULSE EVENT LOCALIZATION ===
 murim_cross_system.0060.t:0 "Spy Network Funding Crisis"
 murim_cross_system.0060.desc:0 "Our spy network costs gold to maintain — agents need payment, safe houses need upkeep, informants need bribes. Our coffers run dangerously low. Without funding, the network will collapse within weeks."
 murim_cross_system.0060.a:0 "Cut costs — reduce the network's reach"
 murim_cross_system.0060.b:0 "Abandon the spy network entirely"

 murim_cross_system.0061.t:0 "The Calamity Deepens"
 murim_cross_system.0061.desc:0 "The Great Calamity continues its relentless advance. More clans fall, more territories burn. The very fabric of the Murim world frays. Those who survive must adapt or perish."
 murim_cross_system.0061.a:0 "Fortify our defenses and prepare for the worst"
 murim_cross_system.0061.b:0 "Seek allies among other survivors"

 murim_cross_system.0062.t:0 "Shadow Sect Influence Spreads"
 murim_cross_system.0062.desc:0 "Our shadow sect connections extend their tendrils into neighboring territories. A lord nearby shows signs of susceptibility — ambition, resentment toward orthodox authority, desperation. They could be turned to our cause."
 murim_cross_system.0062.a:0 "Attempt to recruit them into the shadow sect"
 murim_cross_system.0062.b:0 "Leave them be — we grow too exposed"

