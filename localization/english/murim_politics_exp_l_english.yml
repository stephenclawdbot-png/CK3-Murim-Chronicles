l_english:
 murim_politics_exp.0001.t: "Sect Elder Impeachment"
 murim_politics_exp.0001.desc: "Whispers of corruption have circled [impeached_elder.GetFirstName] for years — misuse of sect resources, secret dealings with demonic cultivators, abuse of junior disciples. You have the evidence and the influence to act. But an elder cornered is an elder most dangerous."
 murim_politics_exp.0001.a: "Launch formal impeachment proceedings"
 murim_politics_exp.0001.b: "Challenge the elder to a martial contest"
 murim_politics_exp.0001.c: "Let it go — too risky"
 murim_politics_exp.0002.t: "Trade Route Control War"
 murim_politics_exp.0002.desc: "The medicinal herb trade route running through the border mountains is the lifeblood of any sect's alchemy halls. [trade_rival.GetFirstName] has been encroaching on your territory for months, and tensions have reached the breaking point. Control the herbs, control the cultivators."
 murim_politics_exp.0002.a: "Seize the trade route by force"
 murim_politics_exp.0002.b: "Negotiate a shared trade agreement"
 murim_politics_exp.0002.c: "Ignore it — focus on cultivation"
 murim_politics_exp.0003.t: "Hostage Exchange Between Sects"
 murim_politics_exp.0003.desc: "[hostage_holder.GetFirstName] proposes a hostage exchange to guarantee peace between your sects. Your child would be sent as a ward and guarantee of good faith. It is an old custom of the martial world — but one that has been abused as often as it has been honored."
 murim_politics_exp.0003.a: "Agree — send my child as a ward"
 murim_politics_exp.0003.b: "Refuse — my child stays, prepare for war"
 murim_politics_exp.0003.c: "Send a decoy disciple instead"
 murim_politics_exp.0004.t: "Spy Network Infiltration"
 murim_politics_exp.0004.desc: "Your agents report that [spy_target.GetFirstName]'s sect holds technique scrolls of extraordinary value. A well-placed infiltrator could steal them and shift the balance of power overnight. But if your spy is caught, the diplomatic consequences will be severe."
 murim_politics_exp.0004.a: "Infiltrate to steal technique scrolls"
 murim_politics_exp.0004.b: "Gather intelligence on their strength"
 murim_politics_exp.0004.c: "Abandon the spy operation"
 murim_politics_exp.0005.t: "Martial Law Declaration"
 murim_politics_exp.0005.desc: "War presses at the gates and enemies gather beyond the mountains. The time has come to decide: mobilize every disciple for total war, or maintain a measured response. Martial law would strengthen your defenses but strain the loyalty of those who joined the sect seeking peace, not conflict."
 murim_politics_exp.0005.a: "Declare martial law — all disciples mobilized"
 murim_politics_exp.0005.b: "Selective mobilization — inner disciples only"
 murim_politics_exp.0005.c: "Seek peace instead"
 murim_politics_exp.0006.t: "Refugee Sect Seeks Shelter"
 murim_politics_exp.0006.desc: "[refugee_leader.GetFirstName] kneels before your gates, leading the battered remnants of a destroyed sect. They beg for shelter, their robes torn and stained with the blood of fallen brothers. Taking them in could bring new techniques and loyal fighters — or lead their enemies straight to your door."
 murim_politics_exp.0006.a: "Welcome the refugees — gain their loyalty"
 murim_politics_exp.0006.b: "Turn them away"
 murim_politics_exp.0006.c: "Demand they swear fealty as vassals first"
 murim_politics_exp.0007.t: "Forbidden Technique Pact"
 murim_politics_exp.0007.desc: "[dark_pact_partner.GetFirstName] approaches you in secret, eyes gleaming with dangerous ambition. They propose studying forbidden techniques together — arts banned by the orthodox sects for the devastation they wreak on body and soul. The power offered is immense, but the cost may be your humanity."
 murim_politics_exp.0007.a: "Agree to study forbidden techniques"
 murim_politics_exp.0007.b: "Study the theory only — do not practice"
 murim_politics_exp.0007.c: "Refuse and report them to the orthodox sects"
 murim_politics_exp.0008.t: "Grand Tournament of Sects"
 murim_politics_exp.0008.desc: "The great sects have agreed to gather for a tournament of martial excellence. As a leader of considerable prestige, you may host this grand spectacle — drawing fighters from across the realm — or enter the ring yourself and let your fists speak louder than your rank."
 murim_politics_exp.0008.a: "Host the grand tournament"
 murim_politics_exp.0008.b: "Enter as a fighter"
 murim_politics_exp.0008.c: "Decline to participate"
