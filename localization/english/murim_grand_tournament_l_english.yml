 # =============================================
 # GRAND TOURNAMENT EVENTS - Localization
 # murim_grand_tournament.0001 - 0008
 # HB#59
 # =============================================

 # 0001 - Grand Tournament Begins
 murim_grand_tournament.0001.t:0 "The Grand Tournament Begins!"
 murim_grand_tournament.0001.desc:0 "Once every decade, the greatest martial artists from all nine clans gather at the Central Plains Arena. The Grand Tournament is open to all — young and old, orthodox and unorthodox alike. The air crackles with fighting spirit as representatives from Mount Hua, Shaolin, Wudang, Tang Clan, Beggar Sect, Iron Fist Gate, Heavenly Demon Sect, Poison Flower Palace, and Phantom Blade Sect prepare to test their might. Your first opponent awaits."
 murim_grand_tournament.0001.a:0 "Fight with everything I have!"
 murim_grand_tournament.0001.a.victory:0 "Your techniques overwhelm your opponent! The crowd roars approval as you advance to the next round."
 murim_grand_tournament.0001.a.defeat:0 "Your opponent's skill proves superior. You are eliminated from the tournament, but the experience forges your martial spirit."
 murim_grand_tournament.0001.b:0 "Withdraw — I am not ready for this level."

 # 0002 - Semi-Finals
 murim_grand_tournament.0002.t:0 "Grand Tournament Semi-Finals"
 murim_grand_tournament.0002.desc:0 "You have fought through the preliminary rounds and now face one of the strongest martial artists remaining. The semi-finals draw the attention of every clan leader and elder present. This is where legends are made — or broken."
 murim_grand_tournament.0002.a:0 "Unleash my full power!"
 murim_grand_tournament.0002.a.victory:0 "In a clash that shakes the arena, you emerge victorious! The crowd falls silent in awe, then erupts. You are a Grand Tournament finalist!"
 murim_grand_tournament.0002.a.defeat:0 "Despite fighting with everything you have, your opponent's experience and technique prevail. An honorable defeat at the highest level."
 murim_grand_tournament.0002.b:0 "Concede to my opponent with dignity."

 # 0003 - Champion Coronation
 murim_grand_tournament.0003.t:0 "Supreme Champion of the Martial World!"
 murim_grand_tournament.0003.desc:0 "You have conquered every challenger in the Grand Tournament. The nine clan leaders rise in acknowledgment. The Murim Alliance elders bring forth the Champion's Seal — a jade medallion inscribed with the names of every past champion. From this day forward, you stand at the pinnacle of the martial world. Every martial artist in the Central Plains knows your name."
 murim_grand_tournament.0003.a:0 "Accept the title with humility and grace."
 murim_grand_tournament.0003.b:0 "Declare my dominance — let all bow before me!"

 # 0004 - Inter-Clan Challenge Match
 murim_grand_tournament.0004.t:0 "Inter-Clan Challenge Match"
 murim_grand_tournament.0004.desc:0 "A long-standing dispute between your clan and a rival faction must be settled through combat. Your clan's honor rests on your shoulders. The arena has been cleared, and both clan leaders watch with piercing eyes. This is more than a duel — it is a statement of your clan's martial supremacy."
 murim_grand_tournament.0004.a:0 "Fight for my clan's honor!"
 murim_grand_tournament.0004.a.victory:0 "Your clan's martial arts prove superior! Your opponent bows in defeat, and your clan's reputation soars across the martial world."
 murim_grand_tournament.0004.a.defeat:0 "Despite your best efforts, you fall to the rival champion. Your clan suffers a blow to its reputation, and whispers of decline spread."
 murim_grand_tournament.0004.b:0 "Decline — propose diplomacy over combat."

 # 0005 - Clan Representative Selection
 murim_grand_tournament.0005.t:0 "Selected as Clan Representative"
 murim_grand_tournament.0005.desc:0 "Your clan's elder has called you forward. After observing your training and recent achievements, the elders have selected you to represent the clan in the upcoming Grand Tournament. It is both a tremendous honor and a heavy responsibility — you carry the martial legacy of your entire clan."
 murim_grand_tournament.0005.a:0 "Accept with pride — I will not disappoint!"
 murim_grand_tournament.0005.b:0 "Decline — I am not worthy of this honor."
 murim_grand_tournament.0005.c:0 "Suggest a more worthy clanmate."

 # 0006 - Tournament Injury Recovery
 murim_grand_tournament.0006.t:0 "Recovering from Tournament Wounds"
 murim_grand_tournament.0006.desc:0 "The Grand Tournament exacted a heavy toll on your body. Your injuries require attention — the question is how to heal. The herbalists of Poison Flower Palace are renowned for their medicinal arts, but you could also rely on internal qi circulation to mend your wounds. Or you could simply accept your battle scars as marks of a warrior's journey."
 murim_grand_tournament.0006.a:0 "Seek healing from Poison Flower Palace herbalists."
 murim_grand_tournament.0006.b:0 "Meditate and self-heal with internal qi."
 murim_grand_tournament.0006.c:0 "Accept the scars — they tell my story."

 # 0007 - Spectator Gets Recruited
 murim_grand_tournament.0007.t:0 "A Promising Talent Observed"
 murim_grand_tournament.0007.desc:0 "In the crowd gathered to watch the Grand Tournament, your trained eye spots a young person with exceptional physical potential. Their eyes follow every technique with unusual comprehension, and their body moves instinctively with the rhythms of combat. This one has the raw talent to become a martial artist — they simply need someone to open the door."
 murim_grand_tournament.0007.a:0 "Offer them a place in the martial world."
 murim_grand_tournament.0007.b:0 "Let them find their own path."

 # 0008 - Legacy of Champions
 murim_grand_tournament.0008.t:0 "The Legacy of Champions"
 murim_grand_tournament.0008.desc:0 "As a newly initiated martial artist, you hear tales of past Grand Tournament champions — legendary figures whose techniques reshaped the martial world. Their stories inspire you, but also present a choice: will you study the established paths of past champions, forge your own unique style, or seek out a living champion as a personal mentor?"
 murim_grand_tournament.0008.a:0 "Study the champion's techniques."
 murim_grand_tournament.0008.b:0 "Forge my own path — reject imitation."
 murim_grand_tournament.0008.c:0 "Seek out the champion as a personal mentor."

 # =============================================
 # NEW DECISIONS LOCALIZATION - HB#59
 # =============================================

 # Declare Faction Allegiance
 murim_declare_faction_allegiance_decision_title:0 "Declare Faction Allegiance"
 murim_declare_faction_allegiance_decision_desc:0 "The martial world is divided between the Orthodox Murim Alliance and the Unorthodox Heavenly Demon Cult. As a member of one of the nine great clans, you must declare where your loyalties lie. This choice will shape your relationships, your access to techniques, and your role in the coming faction wars."

 # Request Mentor
 murim_request_mentor_decision_title:0 "Request Mentor Assignment"
 murim_request_mentor_decision_desc:0 "Approach your clan elders and request the assignment of a senior martial artist as your personal mentor. A good mentor can accelerate your cultivation, teach you secret techniques, and guide you through the dangers of the martial world. However, not every mentor-disciple pairing ends well."

 # Seek Clan Audience
 murim_seek_clan_audience_decision_title:0 "Seek Clan Audience"
 murim_seek_clan_audience_decision_desc:0 "As an unaffiliated martial artist, you may petition one of the nine great clans for membership. Seek an audience with a clan leader to present your skills and declare your intent to join. Success depends on your prowess, reputation, and the clan's current needs. Each clan has its own traditions for accepting new members."

 # Announce Seclusion Training
 murim_announce_seclusion_decision_title:0 "Enter Seclusion Training"
 murim_announce_seclusion_decision_desc:0 "Announce your intention to enter deep cultivation seclusion. For one to three years, you will isolate yourself from the world, focusing entirely on internal cultivation and martial arts advancement. This is the path to breakthrough — but it carries the risk of qi deviation. You cannot be disturbed during seclusion, and the world will move on without you."

 # Seclusion tooltip
 murim_seclusion_peaceful_tt:0 "Your seclusion proceeds peacefully. Deep cultivation awaits."

