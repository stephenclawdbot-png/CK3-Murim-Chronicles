l_english:
 murim_deep_link.0001.t: "The Ascension Beckons"
 murim_deep_link.0001.desc: "Your cultivation has reached a plateau that few ever witness. Beyond this point lies the realm of immortals. The heavens themselves seem to watch, waiting to see whether you dare to reach for transcendence."
 murim_deep_link.0001.a: "Attempt to touch the heavens."
 murim_deep_link.0001.b: "Consolidate my current strength."
 murim_deep_link.0001.c: "Seek forbidden shortcuts to power."
 murim_deep_link.0002.t: "Qi Deviation -- A Dark Opportunity"
 murim_deep_link.0002.desc: "Your qi deviation has left your meridians fractured and unstable. In this weakened state, whispers reach you of forbidden techniques that could restore your cultivation -- at a terrible price."
 murim_deep_link.0002.a: "Embrace the forbidden path."
 murim_deep_link.0002.b: "Endure and heal naturally."
 murim_deep_link.0002.c: "Seek a healer's aid."
 murim_deep_link.0003.t: "Celestial Harmony"
 murim_deep_link.0003.desc: "During deep meditation, you feel the resonance of celestial energy flowing through you. The boundary between the mortal world and the heavens grows thin. Other cultivators sense the disturbance in the qi around you."
 murim_deep_link.0003.a: "Pursue celestial enlightenment."
 murim_deep_link.0003.b: "Share the revelation with allies."
 murim_deep_link.0003.c: "Suppress the sensation."
 murim_deep_link.0004.t: "Martial Resonance"
 murim_deep_link.0004.desc: "Your qi surges with a fierce martial resonance that demands release. The energy within you calls for battle -- to test your cultivation against a worthy opponent and refine your understanding through combat."
 murim_deep_link.0004.a: "Seek a worthy opponent."
 murim_deep_link.0004.b: "Suppress the urge and meditate."
 murim_deep_link.0004.c: "Channel it into other pursuits."
 murim_deep_link.0010.t: "Righteous Hunters Approach"
 murim_deep_link.0010.desc: "Word of your forbidden techniques has reached the righteous sects. A group of orthodox martial artists approaches, their killing intent unmistakable. They come to purge the unorthodox taint from the martial world."
 murim_deep_link.0010.a: "Face them in battle."
 murim_deep_link.0010.b: "Try to reason with them."
 murim_deep_link.0010.c: "Flee into the shadows."
 murim_deep_link.0011.t: "Forbidden Power Exposed"
 murim_deep_link.0011.desc: "Your use of forbidden techniques has been exposed to the martial world. Whispers of your dark cultivation spread through teahouses and sect halls. The righteous condemn you while the ambitious eye you with interest."
 murim_deep_link.0011.a: "Deny everything and hide deeper."
 murim_deep_link.0011.b: "Embrace the infamy openly."
 murim_deep_link.0011.c: "Distance yourself from dark arts."
 murim_deep_link.0012.t: "Shadow Alliance Offer"
 murim_deep_link.0012.desc: "The shadow underworld has taken notice of your forbidden cultivation. A veiled emissary arrives with an offer -- join their network and gain protection, or be left to face the tribunal alone."
 murim_deep_link.0012.a: "Join the shadow network."
 murim_deep_link.0012.b: "Remain independent."
 murim_deep_link.0012.c: "Report them to the tribunal."
 murim_deep_link.0013.t: "Bounty Hunters on the Trail"
 murim_deep_link.0013.desc: "A bounty has been placed on your head by those who fear your forbidden techniques. Hunters stalk the roads and mountain paths, their eyes sharp for any sign of dark qi. Every shadow could conceal an enemy."
 murim_deep_link.0013.a: "Confront the hunters directly."
 murim_deep_link.0013.b: "Outmaneuver them with cunning."
 murim_deep_link.0013.c: "Set traps and watch."
 murim_deep_link.0020.t: "The Emperor's Shadow"
 murim_deep_link.0020.desc: "Your position as Imperial Enforcer places you at the intersection of martial power and political authority. The Emperor's shadow government operates through you, but every order carries moral weight."
 murim_deep_link.0020.a: "Serve the Emperor faithfully."
 murim_deep_link.0020.b: "Use the position for personal gain."
 murim_deep_link.0020.c: "Skim profits from operations."
 murim_deep_link.0021.t: "Imperial Investigation"
 murim_deep_link.0021.desc: "Imperial agents arrive bearing sealed orders. A high-ranking cultivator stands accused of crimes against the martial world. As someone of authority, you must decide whether to pursue justice or bury the truth."
 murim_deep_link.0021.a: "Investigate and seek justice."
 murim_deep_link.0021.b: "Protect the accused."
 murim_deep_link.0021.c: "Use the situation for leverage."
 murim_deep_link.0022.t: "The Court Assassin's Contract"
 murim_deep_link.0022.desc: "A sealed scroll arrives bearing the imperial dragon seal. Within lies a contract -- eliminate a target who threatens the stability of the court. The pay is extraordinary, but the act would stain your hands forever."
 murim_deep_link.0022.a: "Accept the assassination contract."
 murim_deep_link.0022.b: "Expose the plot to the tribunal."
 murim_deep_link.0022.c: "Sell the information instead."
 murim_deep_link.0023.t: "Shifting Imperial Favor"
 murim_deep_link.0023.desc: "The Imperial Court's favor shifts like autumn wind. As clan leader, you must navigate the treacherous currents of palace politics, where a single misstep can doom your entire bloodline."
 murim_deep_link.0023.a: "Curry favor at court."
 murim_deep_link.0023.b: "Strengthen the clan independently."
 murim_deep_link.0023.c: "Manipulate court factions."
 murim_deep_link.0024.t: "Seeds of Rebellion"
 murim_deep_link.0024.desc: "Discontent festers beneath the surface of the martial world. Whispers of rebellion against the Imperial Court grow louder. You sense the moment approaching when the old order could be swept away entirely."
 murim_deep_link.0024.a: "Support the rebellion."
 murim_deep_link.0024.b: "Defend the current order."
 murim_deep_link.0024.c: "Play both sides for profit."
 murim_deep_link.0030.t: "Victory and Romance"
 murim_deep_link.0030.desc: "Your tournament victory has not only earned you glory but also the admiring gaze of someone remarkable. Their eyes follow you from the crowd, and you feel a connection that transcends martial rivalry."
 murim_deep_link.0030.a: "Pursue the connection."
 murim_deep_link.0030.b: "Focus on martial glory instead."
 murim_deep_link.0030.c: "Train harder -- no distractions."
 murim_deep_link.0031.t: "A Bitter Rival Emerges"
 murim_deep_link.0031.desc: "Your tournament victory has bred a dangerous enemy. A defeated combatant seethes with humiliation and hatred, swearing vengeance before the entire assembly. You can see murder in their eyes."
 murim_deep_link.0031.a: "Prepare for their vendetta."
 murim_deep_link.0031.b: "Extend an olive branch."
 murim_deep_link.0031.c: "Crush them before they grow."
 murim_deep_link.0032.t: "Imperial Summons"
 murim_deep_link.0032.desc: "A golden scroll bearing the Imperial seal arrives at your door. The Emperor summons you to the capital to serve the court. This could be the opportunity of a lifetime -- or a gilded cage."
 murim_deep_link.0032.a: "Answer the Imperial summons."
 murim_deep_link.0032.b: "Politely decline."
 murim_deep_link.0032.c: "Send a representative instead."
 murim_deep_link.0033.t: "A Prodigy in the Clan"
 murim_deep_link.0033.desc: "A young disciple within your clan displays extraordinary talent. Their natural qi sensitivity surpasses anything the elders have seen in generations. Every major sect would kill to recruit them."
 murim_deep_link.0033.a: "Invest heavily in their training."
 murim_deep_link.0033.b: "Use them as a political tool."
 murim_deep_link.0033.c: "Let them develop naturally."
 murim_deep_link.0034.t: "Tournament Corruption Exposed"
 murim_deep_link.0034.desc: "Evidence surfaces that the recent tournament was rigged. Forbidden pills, secret bribes, and planted fighters have tainted the competition. The revelation threatens to shatter the martial world's faith in its most sacred tradition."
 murim_deep_link.0034.a: "Demand a tribunal investigation."
 murim_deep_link.0034.b: "Use the scandal to your advantage."
 murim_deep_link.0034.c: "Cover it up to preserve order."
 murim_deep_link.0040.t: "The Enemy of My Enemy"
 murim_deep_link.0040.desc: "The Great Calamity forces an impossible choice. Your sworn nemesis stands before you, weapons lowered. Against the existential threat consuming the world, even the deepest hatred must yield to survival."
 murim_deep_link.0040.a: "Form a temporary alliance."
 murim_deep_link.0040.b: "Use the chaos to destroy them."
 murim_deep_link.0040.c: "Settle this once and for all."
 murim_deep_link.0041.t: "Tournament of Ashes"
 murim_deep_link.0041.desc: "Even as the Great Calamity rages, martial artists gather for a desperate tournament. Not for glory, but to determine who is strong enough to lead the survivors. Every bout could be the last."
 murim_deep_link.0041.a: "Fight for the right to lead."
 murim_deep_link.0041.b: "Support from the sidelines."
 murim_deep_link.0041.c: "Unite fighters without combat."
 murim_deep_link.0042.t: "Desperate Power"
 murim_deep_link.0042.desc: "The Great Calamity closes in. Your current strength is not enough. A forbidden technique manual lies before you, offering power sufficient to turn the tide -- but at the cost of everything you believe in."
 murim_deep_link.0042.a: "Learn the forbidden technique."
 murim_deep_link.0042.b: "Fight with what I have."
 murim_deep_link.0042.c: "Flee and survive."
 murim_deep_link.0043.t: "Scouts in the Storm"
 murim_deep_link.0043.desc: "As clan leader during the Great Calamity, your scouts report on the devastation spreading across the land. Refugees stream toward your compound, and you must decide how to allocate your dwindling resources."
 murim_deep_link.0043.a: "Fortify and prepare to fight."
 murim_deep_link.0043.b: "Open the gates to refugees."
 murim_deep_link.0043.c: "Raid abandoned settlements."
 murim_deep_link.0044.t: "Succession in the Ruins"
 murim_deep_link.0044.desc: "The Great Calamity has decimated the martial world's leadership. With so many sect leaders fallen, a power vacuum opens that could reshape the entire murim hierarchy. Those who seize this moment will rule what remains."
 murim_deep_link.0044.a: "Claim leadership by force."
 murim_deep_link.0044.b: "Wait for the dust to settle."
 murim_deep_link.0044.c: "Build a coalition of survivors."
 murim_deep_link.0045.t: "Love Lost to Calamity"
 murim_deep_link.0045.desc: "The Great Calamity has claimed someone dear to you. Their final moments replay in your mind as grief threatens to consume you. The pain cuts deeper than any blade, but it also forges something harder within."
 murim_deep_link.0045.a: "Grieve and search for them."
 murim_deep_link.0045.b: "Let rage fuel vengeance."
 murim_deep_link.0045.c: "Find peace through acceptance."
 murim_deep_link.0050.t: "Tavern Encounter"
 murim_deep_link.0050.desc: "In a smoky jianghu tavern, you catch the eye of a mysterious stranger. Wine flows freely, and conversation turns from idle chatter to matters of the heart. The martial world rarely allows such gentle moments."
 murim_deep_link.0050.a: "Pursue the connection."
 murim_deep_link.0050.b: "Gather intelligence instead."
 murim_deep_link.0050.c: "Leave quietly."
 murim_deep_link.0051.t: "The Information Broker"
 murim_deep_link.0051.desc: "A notorious information broker offers your clan exclusive intelligence on rival sects and hidden threats. Their price is steep, but the knowledge could mean the difference between flourishing and falling."
 murim_deep_link.0051.a: "Pay for premium intelligence."
 murim_deep_link.0051.b: "Buy only basic information."
 murim_deep_link.0051.c: "Threaten the broker instead."
 murim_deep_link.0052.t: "The Teahouse Strategist"
 murim_deep_link.0052.desc: "A retired martial master holds court in a humble teahouse, dispensing wisdom to all who sit with them. Their insights into the martial world's hidden currents are said to be without equal."
 murim_deep_link.0052.a: "Listen and learn humbly."
 murim_deep_link.0052.b: "Offer gold for exclusive counsel."
 murim_deep_link.0052.c: "This is beneath me."
 murim_deep_link.0053.t: "The Traveling Weapons Merchant"
 murim_deep_link.0053.desc: "A merchant appears with weapons of extraordinary quality -- blades said to be forged by an immortal smith. Their craftsmanship speaks of techniques lost for centuries. But can the seller be trusted?"
 murim_deep_link.0053.a: "Purchase the finest weapon."
 murim_deep_link.0053.b: "Examine carefully before deciding."
 murim_deep_link.0053.c: "Haggle for a better price."
 murim_deep_link.0054.t: "A Spy in Disguise"
 murim_deep_link.0054.desc: "You uncover a spy operating within the local jianghu community, disguised as an ordinary merchant. Their true allegiance could tie to any number of factions vying for control of the martial world."
 murim_deep_link.0054.a: "Confront them openly."
 murim_deep_link.0054.b: "Feed them false information."
 murim_deep_link.0054.c: "Turn them into a double agent."
 murim_deep_link.0060.t: "Immortal in the War"
 murim_deep_link.0060.desc: "The continental war demands that even the mightiest cultivators take sides. As one approaching immortality, your intervention could end the conflict overnight -- or escalate it beyond all reckoning."
 murim_deep_link.0060.a: "Broker peace between the factions."
 murim_deep_link.0060.b: "Destabilize both sides secretly."
 murim_deep_link.0060.c: "Mediate with impartial wisdom."
 murim_deep_link.0061.t: "Above the Mortal Law"
 murim_deep_link.0061.desc: "Your cultivation has elevated you beyond what the Murim Tribunal can enforce. The law of mortals seems quaint when you can shatter mountains. Yet the question remains -- should power be above justice?"
 murim_deep_link.0061.a: "Submit to the tribunal willingly."
 murim_deep_link.0061.b: "I am beyond such concerns."
 murim_deep_link.0061.c: "Reform the tribunal from within."
 murim_deep_link.0062.t: "Wartime Ascension"
 murim_deep_link.0062.desc: "The chaos of continental war has pushed your cultivation to its absolute limit. In this crucible of violence and desperation, you sense the final barrier to immortality weakening. Now may be your only chance."
 murim_deep_link.0062.a: "Attempt ascension immediately."
 murim_deep_link.0062.b: "Wait for a safer moment."
 murim_deep_link.0062.c: "Ascend covertly during the chaos."
 murim_deep_link.0063.t: "The Immortal's Legacy"
 murim_deep_link.0063.desc: "Having touched the realm of immortals, you must now consider your mortal legacy. Your clan needs a successor who can carry the torch when you eventually transcend this world entirely."
 murim_deep_link.0063.a: "Choose a worthy successor."
 murim_deep_link.0063.b: "Groom a loyal heir."
 murim_deep_link.0063.c: "Teach all disciples equally."
 murim_deep_link.0064.t: "Tribulation Duel"
 murim_deep_link.0064.desc: "Another cultivator undergoing tribulation challenges you to a duel at the heavenly threshold. Such battles between those touched by heaven's lightning are legendary -- and often lethal."
 murim_deep_link.0064.a: "Accept with reverence for heaven."
 murim_deep_link.0064.b: "Fight with lethal intent."
 murim_deep_link.0064.c: "Decline the heavenly duel."
