l_english:
 murim_unorthodox.0001.t: "The Demonic Emperor's Whisper"
 murim_unorthodox.0001.desc: "In the depths of the Heavenly Demon Sect's forbidden chambers, a presence stirs. The spirit of the founding Demonic Emperor — sealed within the sect's core artifact — speaks to you. It offers fragments of the original Heavenly Demon Art, techniques lost for generations. The price is unclear."
 murim_unorthodox.0001.a: "Accept the power — inherit the Emperor's will"
 murim_unorthodox.0001.b: "Study the technique cautiously"
 murim_unorthodox.0001.c: "Resist — the Emperor's gifts always have teeth"

 murim_unorthodox.0002.t: "Blood in the Throne Room"
 murim_unorthodox.0002.desc: "The Heavenly Demon Sect does not tolerate weakness. A faction of ambitious disciples is plotting to seize power. Assassinations, poisonings, and midnight duels thin the ranks nightly. As a senior member, you must choose: crush the upstarts, outmaneuver them, or find a diplomatic path through the chaos."
 murim_unorthodox.0002.a: "Crush them with overwhelming force"
 murim_unorthodox.0002.b: "Manipulate the factions against each other"
 murim_unorthodox.0002.c: "Broker a power-sharing agreement"

 murim_unorthodox.0003.t: "The Perfect Kill"
 murim_unorthodox.0003.desc: "Your shadow arts have reached a new level. Standing in the moonlight, you practice the Phantom Blade's signature technique — the draw so fast it's invisible, the cut so clean it leaves no trace. Your blade becomes an extension of your killing intent. Art and death merge into one."
 murim_unorthodox.0003.a: "Refine the technique to absolute perfection"
 murim_unorthodox.0003.b: "Develop a new variation of the killing art"
 murim_unorthodox.0003.c: "Monetize your skill — take contracts"

 murim_unorthodox.0004.t: "The Shadow Contract"
 murim_unorthodox.0004.desc: "The Phantom Blade Sect's elders present you with a sealed scroll — a high-value assassination contract. The target: a rising star in the orthodox sects whose growing influence threatens the balance of power. The payment is extraordinary. But the target has powerful allies."
 murim_unorthodox.0004.a: "Accept — this is what we do"
 murim_unorthodox.0004.b: "Refuse and warn the target instead"
 murim_unorthodox.0004.c: "Accept but plan to extract more value"

 murim_unorthodox.0005.t: "Forging the Indestructible Body"
 murim_unorthodox.0005.desc: "The Iron Fist Gate's ultimate body cultivation technique: submerging in a cauldron of medicinal metals heated to extreme temperatures while circulating qi through every fiber of your being. If successful, your body will be harder than steel. If you fail, the metals will poison your meridians permanently."
 murim_unorthodox.0005.a: "Endure the full iron tempering process"
 murim_unorthodox.0005.b: "Take a gradual approach — temper in stages"
 murim_unorthodox.0005.c: "Seek a master's guidance before attempting"

 murim_unorthodox.0006.t: "Challengers at the Iron Gate"
 murim_unorthodox.0006.desc: "The Iron Fist Gate's tradition demands that any outsider may challenge a member to single combat. Today, a formidable warrior stands at the gate. They've defeated three of your brothers already. Your sect's honor is at stake — if they defeat you too, the Iron Fist Gate's reputation crumbles."
 murim_unorthodox.0006.a: "Face them — iron does not bend"
 murim_unorthodox.0006.b: "Refuse — find a diplomatic solution"
 murim_unorthodox.0006.c: "Study their fighting style before engaging"

 murim_unorthodox.0007.t: "The Thousand Poisons Garden"
 murim_unorthodox.0007.desc: "Deep within the Poison Flower Sect's hidden valley, the legendary Thousand Poisons Garden blooms with deadly beauty. Flowers that kill with fragrance, vines that dissolve flesh, mushrooms that drive cultivators mad. As a disciple, you tend this garden — and learn its deadliest secrets."
 murim_unorthodox.0007.a: "Cultivate the most lethal specimens"
 murim_unorthodox.0007.b: "Focus on developing antidotes and medicines"
 murim_unorthodox.0007.c: "Harvest and sell the rarest toxins"

 murim_unorthodox.0008.t: "A Cure or a Curse?"
 murim_unorthodox.0008.desc: "Your mastery of poisons has reached an inflection point. You've developed a compound that could either save thousands — as a cure for a widespread cultivation disease — or be weaponized into the most devastating poison the jianghu has ever seen. The choice defines who you are."
 murim_unorthodox.0008.a: "Release the cure — save lives"
 murim_unorthodox.0008.b: "Weaponize it — power through fear"
 murim_unorthodox.0008.c: "Sell both versions — profit either way"

 murim_unorthodox.0009.t: "The Demonic Art Competition"
 murim_unorthodox.0009.desc: "The Heavenly Demon Sect holds its annual competition — a brutal elimination tournament where disciples demonstrate mastery of demonic arts. Victory means advancement, resources, and the Sect Leader's favor. Defeat means disgrace... or worse. There are no rules except survival."
 murim_unorthodox.0009.a: "Enter and dominate through raw power"
 murim_unorthodox.0009.b: "Use cunning to eliminate rivals before the fight"
 murim_unorthodox.0009.c: "Build alliances to survive the tournament"

 murim_unorthodox.0010.t: "Recruiting from the Orthodox"
 murim_unorthodox.0010.desc: "An orthodox sect disciple has grown disillusioned — they've seen hypocrisy behind the righteous facade. They've secretly reached out to the Heavenly Demon Sect, offering to defect and bring valuable techniques with them. Handling this correctly could strengthen your position enormously."
 murim_unorthodox.0010.a: "Accept them and exploit their knowledge"
 murim_unorthodox.0010.b: "Use them as a spy within their old sect"
 murim_unorthodox.0010.c: "Build a genuine relationship — loyalty matters"

 murim_unorthodox.0011.t: "The Demonic Tribulation"
 murim_unorthodox.0011.desc: "To advance in the Heavenly Demon Art, you must face the Demonic Tribulation — your own inner demons manifest as physical opponents. Every fear, every regret, every dark desire takes form and attacks. If you falter, the darkness consumes you. If you prevail, unimaginable power awaits."
 murim_unorthodox.0011.a: "Face the tribulation with full power"
 murim_unorthodox.0011.b: "Wait until I'm better prepared"
 murim_unorthodox.0011.c: "Use protective talismans and formations"

 murim_unorthodox.0012.t: "Ghost Step Mastery"
 murim_unorthodox.0012.desc: "The Phantom Blade's signature movement technique — Ghost Step — allows a cultivator to move so fast they leave afterimages. You've been training in the moonless dark, learning to become invisible in shadow. Tonight, you feel the technique clicking into place."
 murim_unorthodox.0012.a: "Perfect the technique through midnight practice"
 murim_unorthodox.0012.b: "Test it in a real sparring match"
 murim_unorthodox.0012.c: "Use it to earn money in the underground arena"

 murim_unorthodox.0013.t: "The Infiltration"
 murim_unorthodox.0013.desc: "The Phantom Blade Sect's elders have selected you for a deep cover mission — infiltrate a rival sect posing as a wandering cultivator. Steal their technique manuals, map their defenses, and identify their weaknesses. Months of deception, with death the price of discovery."
 murim_unorthodox.0013.a: "Accept the mission — execute flawlessly"
 murim_unorthodox.0013.b: "Accept but use it to build genuine connections"
 murim_unorthodox.0013.c: "Sell your services as a double agent"

 murim_unorthodox.0014.t: "Blade Tempering in Moonlight"
 murim_unorthodox.0014.desc: "Phantom Blade tradition holds that the finest blades must be tempered under a full moon, when yin energy is strongest. You sit alone on a cliff's edge, channeling lunar qi through your weapon while performing meditation forms. The blade glows with an ethereal silver light."
 murim_unorthodox.0014.a: "Complete the full moonlight tempering ritual"
 murim_unorthodox.0014.b: "Develop a new technique inspired by the moonlight"
 murim_unorthodox.0014.c: "Simply enjoy the peace of the moment"

 murim_unorthodox.0015.t: "The Iron Bone Wine Ritual"
 murim_unorthodox.0015.desc: "Iron Fist Gate's secret: Iron Bone Wine — a medicinal brew containing ground iron filings, powdered spirit stones, and seventeen rare herbs. Drinking it while circulating qi strengthens bones until they're harder than steel. The pain is excruciating. The results are permanent."
 murim_unorthodox.0015.a: "Drink the full dose and endure the pain"
 murim_unorthodox.0015.b: "Take a diluted dose over several weeks"
 murim_unorthodox.0015.c: "Skip the wine — train the traditional way"

 murim_unorthodox.0016.t: "Smashing the Bandit Fortress"
 murim_unorthodox.0016.desc: "A bandit fortress has been raiding villages near Iron Fist territory. The Iron Fist Gate doesn't negotiate — they demonstrate. Your sect leader points at the fortress walls and says one word: 'Break them.' This is what the Iron Fist was built for."
 murim_unorthodox.0016.a: "Lead the assault — shatter their defenses"
 murim_unorthodox.0016.b: "Claim the spoils for the Iron Fist Gate"
 murim_unorthodox.0016.c: "Turn the bandits into informants instead"

 murim_unorthodox.0017.t: "The Thousand Jin Fist"
 murim_unorthodox.0017.desc: "The ultimate Iron Fist technique: channeling so much qi into a single punch that it strikes with the force of a thousand jin. Masters shatter boulders, split rivers, and crack city walls. The training involves punching increasingly harder materials until your fists are living weapons."
 murim_unorthodox.0017.a: "Undergo the full brutal training regimen"
 murim_unorthodox.0017.b: "Train gradually — build power over time"
 murim_unorthodox.0017.c: "Focus on technique rather than raw power"

 murim_unorthodox.0018.t: "The Venom Immunity Trial"
 murim_unorthodox.0018.desc: "To ascend in the Poison Flower Sect, you must survive the Venom Immunity Trial — consuming increasingly potent poisons over seven days while using qi to neutralize them. By the end, you'll either be immune to most known toxins... or your meridians will be permanently scarred."
 murim_unorthodox.0018.a: "Face the full seven-day trial"
 murim_unorthodox.0018.b: "Study the poisons theoretically first"
 murim_unorthodox.0018.c: "Postpone until I'm more confident"

 murim_unorthodox.0019.t: "The Perfumed Assassin"
 murim_unorthodox.0019.desc: "The Poison Flower Sect's most elegant technique: concealing lethal toxins within perfume, cosmetics, and incense. A target dies days later with no visible cause. The sect's elders offer to teach you this art — but warn that those who walk this path can never fully wash the poison from their hands."
 murim_unorthodox.0019.a: "Learn the art — become the perfumed death"
 murim_unorthodox.0019.b: "Refuse — I prefer open combat"
 murim_unorthodox.0019.c: "Learn it defensively — to recognize and counter it"

 murim_unorthodox.0020.t: "The Thousand-Year Orchid"
 murim_unorthodox.0020.desc: "In the deepest chamber of the Poison Flower Sect's greenhouse, a rare orchid is about to bloom for the first time in a millennium. Its nectar can create the most powerful cultivation pill ever conceived — or the most devastating poison. The bloom will last only one hour."
 murim_unorthodox.0020.a: "Harvest it for cultivation advancement"
 murim_unorthodox.0020.b: "Sell it — this is priceless"
 murim_unorthodox.0020.c: "Share it with the sect for collective growth"
