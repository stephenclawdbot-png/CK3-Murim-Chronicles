l_english:
 murim_youth.0001.t: "The Young Dragons Tournament"
 murim_youth.0001.desc: "Word has spread across the martial world -- the annual Young Dragons Tournament is upon us. Your child has been training diligently, and the fire of competition burns in their eyes. Masters from every great sect will be watching, scouting the next generation of martial heroes."
 murim_youth.0001.a: "Enter them in the tournament."
 murim_youth.0001.b: "Coach them personally before the match."
 murim_youth.0001.c: "Hire a professional trainer for them."
 murim_youth.0001.d: "Forbid them from competing this year."
 murim_youth.0002.t: "Tournament Preparations"
 murim_youth.0002.desc: "The tournament grounds bustle with activity as young martial artists from across the realm gather. Your child stands among them, sizing up the competition. A particularly fierce-looking youth from a rival clan catches your eye -- they could be trouble."
 murim_youth.0002.a: "They will do great. I believe in them."
 murim_youth.0002.b: "Spy on the competition's techniques."
 murim_youth.0002.c: "Pray for their safety and success."
 murim_youth.0003.t: "First Round"
 murim_youth.0003.desc: "The drums thunder as the first round begins. Your child steps into the sparring ring, fists raised, eyes focused. Their opponent bows. The referee drops his hand. The crowd holds its breath."
 murim_youth.0003.a: "Watch closely..."
 murim_youth.0004.t: "Second Round"
 murim_youth.0004.desc: "Your child advances! The second-round opponent is visibly stronger -- the child of a renowned martial family, trained from birth in lethal forms. The stakes have risen, and the crowd leans forward with anticipation."
 murim_youth.0004.a: "The real test begins now."
 murim_youth.0005.t: "The Final Match"
 murim_youth.0005.desc: "Two young dragons remain. Your child faces the strongest youth in the tournament under the watchful gaze of legendary masters. Sect elders lean forward from their seats, already calculating which prodigy to recruit. Everything rides on this fight."
 murim_youth.0005.a: "Everything rides on this. Fight!"
 murim_youth.0006.t: "Young Dragon Champion!"
 murim_youth.0006.desc: "Victory! Your child stands triumphant in the center of the ring, chest heaving, eyes blazing with hard-won glory. The crowd erupts. Masters from the greatest sects nod in approval. A ceremonial weapon is presented as the young champion is crowned before all."
 murim_youth.0006.a: "My child, the Young Dragon Champion!"
 murim_youth.0006.b: "Stay humble. This is just the beginning."
 murim_youth.0007.t: "Honorable Runner-Up"
 murim_youth.0007.desc: "So close. Your child fought brilliantly but fell just short of the championship. They stand with clenched fists, fighting back tears of frustration. Second place is still a remarkable achievement, but the sting of almost-victory cuts deep."
 murim_youth.0007.a: "Second place is still incredible. Be proud."
 murim_youth.0007.b: "Second is first loser. Train harder."
 murim_youth.0008.t: "Tournament Participation"
 murim_youth.0008.desc: "Your child's tournament run has ended. Though they did not reach the final rounds, the experience of competing against the realm's finest young martial artists has left its mark. They return to you bruised but wiser, with fire in their belly."
 murim_youth.0008.a: "You competed. That takes courage."
 murim_youth.0008.b: "Use this as fuel. Come back stronger."
 murim_youth.0009.t: "A Master Takes Notice"
 murim_youth.0009.desc: "A legendary master approaches after the tournament, their eyes fixed on your champion child with unmistakable interest. They wish to take your child as a personal disciple -- an honor that could elevate their martial path beyond anything you could provide alone."
 murim_youth.0009.a: "Accept. This is an incredible opportunity."
 murim_youth.0009.b: "Decline. They are not ready to leave home."
 murim_youth.0009.c: "Ask for more time to decide."
 murim_youth.0010.t: "A Prodigy Revealed!"
 murim_youth.0010.desc: "Gasps ripple through the crowd. A child not yet ten years old has defeated opponents years their senior with effortless grace. Your child is a once-in-a-generation prodigy whose talent defies all convention. Every major sect in the realm will be desperate to claim them."
 murim_youth.0010.a: "The martial world shall know their name."
 murim_youth.0010.b: "Hide their talent. Keep them safe."
 murim_youth.0011.t: "A Rivalry Born"
 murim_youth.0011.desc: "Your child's eyes burn with the memory of defeat. The youth who bested them has become an obsession -- a rival whose name is muttered during every training session. This could be the spark that forges a legendary warrior, or a grudge that consumes them."
 murim_youth.0011.a: "Use that anger. Someday you will face them again."
 murim_youth.0011.b: "A true martial artist does not hold grudges."
 murim_youth.0011.c: "Channel it into relentless training."
 murim_youth.0012.t: "Sparring Accident"
 murim_youth.0012.desc: "A cry cuts through the cheering -- your child lies on the sparring ground, clutching an injury sustained from an overzealous opponent's strike. The tournament referees rush in. It was an accident, but the sight of your child in pain ignites something primal within you."
 murim_youth.0012.a: "Forgive. Accidents happen in sparring."
 murim_youth.0012.b: "Demand compensation from their family."
 murim_youth.0012.c: "No more tournaments. I won't risk this again."
 murim_youth.0012.d: "Pain is the best teacher. Learn from this."
