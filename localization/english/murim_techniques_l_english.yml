l_english:

 # ============================================================
 # TIER 1 TRAIT NAMES & DESCRIPTIONS
 # ============================================================

 murim_harmonious_palm:0 "Harmonious Palm"
 murim_harmonious_palm_desc:0 "Through the unity of martial prowess and diplomatic insight, this cultivator has mastered the Harmonious Palm -- a technique that redirects force without creating enmity. Every strike de-escalates. Every deflection builds respect. The opponent is defeated before they realize no true blow was ever landed."

 murim_iron_hegemon:0 "Iron Hegemon Body"
 murim_iron_hegemon_desc:0 "Pure martial force fused with unyielding prowess. The Iron Hegemon does not block -- they shatter the incoming attack with their body alone. Muscles like forged steel, bones like tempered iron. The cultivator IS the weapon, and the battlefield bends to their will."

 murim_venom_needle:0 "Venom Needle Art"
 murim_venom_needle_desc:0 "Where prowess meets cunning, the Venom Needle Art is born. Silent killing refined to a science -- poison-tipped strikes at pressure points invisible to the untrained eye. One tap. One breath. Then the target collapses, and the cultivator is already three rooms away."

 murim_void_sight:0 "Void Sight"
 murim_void_sight_desc:0 "The scholar-warrior who reads qi flow like scripture. Void Sight merges prowess with deep learning -- the practitioner sees technique structures, predicts attack sequences, and identifies the single flaw in any martial form. They do not fight harder. They fight smarter."

 murim_jade_treasury:0 "Jade Treasury Fist"
 murim_jade_treasury_desc:0 "Wealth is power, and power is martial when wielded by the Jade Treasury practitioner. This cultivator fights with the best pills, the finest equipment, and overwhelming material advantage. Every punch carries the weight of gold behind it."

 # ============================================================
 # TIER 2 TRAIT NAMES & DESCRIPTIONS
 # ============================================================

 murim_shadow_executioner:0 "Shadow Executioner"
 murim_shadow_executioner_desc:0 "The convergence of martial devastation and assassin cunning, all built on a foundation of supreme prowess. The Shadow Executioner kills before the opponent registers the fight has begun. One strike from the darkness. No second strike needed. No witnesses."

 murim_sage_commander:0 "Sage Commander"
 murim_sage_commander_desc:0 "The general who leads from the front, their blade as eloquent as their words. Sage Commanders inspire absolute loyalty through personal valor -- challenging enemy leaders to single combat while their troops watch. Victory on the field is victory of the spirit."

 murim_silken_blade:0 "Silken Blade"
 murim_silken_blade_desc:0 "Charm. Grace. A smile that disarms. And beneath the silk, a blade that never misses. The Silken Blade masters the art of social manipulation backed by lethal prowess -- the perfect courtier until the moment they are the perfect killer."

 murim_sutra_fist:0 "Sutra Fist"
 murim_sutra_fist_desc:0 "The warrior-scholar who understands the theory behind every technique. The Sutra Fist practitioner reads martial manuals like holy texts, adapts mid-fight, and dismantles opponent techniques with academic precision. Knowledge is the deadliest weapon."

 murim_phantom_meridian:0 "Phantom Meridian"
 murim_phantom_meridian_desc:0 "Where scholarly knowledge of the body's qi pathways meets the assassin's touch. The Phantom Meridian practitioner maps every meridian, every pressure point, every vulnerability -- then strikes once to disable, paralyze, or kill. Medicine and murder share the same anatomy."

 murim_golden_merchant:0 "Golden Merchant Fist"
 murim_golden_merchant_desc:0 "The war profiteer turned warrior-king. The Golden Merchant funds armies, equips elite knights, and fights with gold-bought forbidden techniques. In the Murim, wealth isn't just influence -- it's a combat multiplier."

 murim_coin_and_dagger:0 "Coin and Dagger"
 murim_coin_and_dagger_desc:0 "The most feared archetype in the Murim underworld. Coin buys loyalty. Dagger silences dissent. The practitioner controls black markets, commands assassin networks, and eliminates rivals through a combination of economic warfare and precision killing."

 murim_jade_emperor_palm:0 "Jade Emperor Palm"
 murim_jade_emperor_palm_desc:0 "The ruler who fights. Governance backed by overwhelming personal power -- vassals obey not from law alone, but because the lord's palm can shatter stone. The Jade Emperor Palm unifies domain management with martial supremacy."

 murim_mountain_sage:0 "Mountain Sage"
 murim_mountain_sage_desc:0 "The hermit alchemist who descends from the mountain with an iron body. Years of pill refinement and body tempering have forged a cultivator who heals as readily as they harm. The Mountain Sage's strikes carry the accumulated weight of solitary perfection."

 murim_heavens_voice:0 "Heaven's Voice"
 murim_heavens_voice_desc:0 "The preacher-warrior whose martial demonstrations are sermons. Heaven's Voice practitioners convert through the undeniable proof of combat truth -- every technique a spiritual argument, every victory a testament of faith. To watch them fight is to believe."

 # ============================================================
 # TIER 3 TRAIT NAMES & DESCRIPTIONS
 # ============================================================

 murim_tyrant_fist:0 "Tyrant Fist"
 murim_tyrant_fist_desc:0 "The Unrivaled King. Commands nations, deceives gods, and destroys all who resist. The Tyrant Fist practitioner bends the entire Murim to their will through a combination of overwhelming martial power, ruthless cunning, and terrifying charisma. Legends fear this name."

 murim_dao_heart:0 "Dao Heart"
 murim_dao_heart_desc:0 "The Enlightened Sword Saint. Having mastered combat, scholarship, and the art of connection, the Dao Heart practitioner fights without ego. Every movement is a lesson. Every breath carries the weight of understanding. They have seen through the illusion of conflict itself."

 murim_asura_crown:0 "Asura's Crown"
 murim_asura_crown_desc:0 "Emperor of the Underworld. The Asura's Crown commands assassin armies, controls the black market of the Murim, and fights with forbidden techniques that would destroy lesser cultivators. They have transcended morality and emerged as something the righteous paths whisper about in terror."

 murim_heavenly_sovereign:0 "Heavenly Sovereign"
 murim_heavenly_sovereign_desc:0 "The Apex. The cultivator who has mastered every path -- martial and scholarly, shadow and light, wealth and wisdom. The Heavenly Sovereign appears once per era, if at all. Their existence reshapes the balance of the Murim. History does not record their techniques. History records their name."

 # ============================================================
 # EVENT TEXT
 # ============================================================

 # Tier 1 Event
 murim_technique.0001.t:0 "Martial Awakening"
 murim_technique.0001.desc:0 "Years of relentless training have converged. My prowess has reached the threshold where raw physical power can be channeled through a discipline of the mind. I feel the breakthrough approaching -- a technique forming from the fusion of my strengths. I must choose which path to walk."

 murim_technique.0001.a:0 "[diplomacy|E] Walk the path of the Harmonious Palm. Redirect force. Win without making enemies."
 murim_technique.0001.b:0 "[martial|E] Forge the Iron Hegemon Body. Become the weapon. Shatter everything."
 murim_technique.0001.c:0 "[intrigue|E] Master the Venom Needle Art. One strike. One kill. Silence."
 murim_technique.0001.d:0 "[learning|E] Open the Void Sight. Read the opponent. Break their technique."
 murim_technique.0001.e:0 "[stewardship|E] Claim the Jade Treasury Fist. Wealth is power. Power is martial."

 # Tier 2 Event
 murim_technique.0010.t:0 "The Second Convergence"
 murim_technique.0010.desc:0 "My foundation technique has matured, and I feel a second convergence forming -- two disciplines merging into something greater than either alone. My prowess is the crucible. My skills are the ore. What emerges will define my legend in the Murim."

 murim_technique.0010.a:0 "Become the Shadow Executioner. Kill before they know the fight has started."
 murim_technique.0010.b:0 "Rise as the Sage Commander. Lead from the front. Inspire with valor."
 murim_technique.0010.c:0 "Take the Silken Blade path. Charm the room. Kill the target."
 murim_technique.0010.d:0 "Follow the Sutra Fist. Understand every technique. Dismantle them all."
 murim_technique.0010.e:0 "Master the Phantom Meridian. One touch to the pressure point. One death."
 murim_technique.0010.f:0 "Forge the Golden Merchant Fist. Fund war. Equip supremacy."
 murim_technique.0010.g:0 "Walk the path of Coin and Dagger. Buy loyalty. Silence resistance."
 murim_technique.0010.h:0 "Claim the Jade Emperor Palm. Rule with strength behind every decree."
 murim_technique.0010.i:0 "Become the Mountain Sage. Brew. Temper. Transcend."
 murim_technique.0010.j:0 "Speak with Heaven's Voice. Let martial truth convert the world."

 # Tier 3 Event
 murim_technique.0100.t:0 "Legendary Ascension"
 murim_technique.0100.desc:0 "The Murim trembles. I stand at the threshold of legend -- three disciplines converging with prowess so refined it bends the rules of what cultivators thought possible. This is not merely a technique. This is a title. A declaration. The world will remember this moment."

 murim_technique.0100.a:0 "Seize the Tyrant Fist! Let the Murim kneel!"
 murim_technique.0100.b:0 "Attain the Dao Heart. Transcend conflict. See truth."
 murim_technique.0100.c:0 "Claim the Asura's Crown. Rule the underworld. Fear nothing."
 murim_technique.0100.d:0 "Become the Heavenly Sovereign. Master all paths. Reshape history."

 # ============================================================
 # DECISION TEXT
 # ============================================================

 # Tier 1 Decisions
 murim_pursue_harmonious_palm_decision_title:0 "Pursue the Harmonious Palm"
 murim_pursue_harmonious_palm_decision_desc:0 "My prowess and diplomatic insight have grown enough to attempt mastering the Harmonious Palm -- a technique that redirects force without creating enmity. I need Prowess 15 and Diplomacy 15."

 murim_pursue_iron_hegemon_decision_title:0 "Pursue the Iron Hegemon Body"
 murim_pursue_iron_hegemon_decision_desc:0 "My prowess and martial skill are sufficient to attempt forging the Iron Hegemon Body -- transforming myself into a living weapon. I need Prowess 15 and Martial 15."

 murim_pursue_venom_needle_decision_title:0 "Pursue the Venom Needle Art"
 murim_pursue_venom_needle_decision_desc:0 "My prowess and cunning have reached the threshold for the Venom Needle Art -- the silent killer's technique. I need Prowess 15 and Intrigue 15."

 murim_pursue_void_sight_decision_title:0 "Pursue the Void Sight"
 murim_pursue_void_sight_decision_desc:0 "My prowess and scholarly knowledge can unlock the Void Sight -- reading qi flow to predict and counter any technique. I need Prowess 15 and Learning 15."

 murim_pursue_jade_treasury_decision_title:0 "Pursue the Jade Treasury Fist"
 murim_pursue_jade_treasury_decision_desc:0 "My prowess and wealth management skills are ready for the Jade Treasury Fist -- turning material advantage into martial dominance. I need Prowess 15 and Stewardship 15."

 # Tier 2 Decisions
 murim_pursue_shadow_executioner_decision_title:0 "Pursue the Shadow Executioner Path"
 murim_pursue_shadow_executioner_decision_desc:0 "With a foundation technique mastered, I can pursue the Shadow Executioner -- merging martial devastation with assassin cunning. I need Prowess 20, Martial 18, and Intrigue 18."

 murim_pursue_sage_commander_decision_title:0 "Pursue the Sage Commander Path"
 murim_pursue_sage_commander_decision_desc:0 "My foundation allows me to pursue the Sage Commander -- leading armies through personal valor. I need Prowess 20, Martial 18, and Diplomacy 18."

 murim_pursue_silken_blade_decision_title:0 "Pursue the Silken Blade Path"
 murim_pursue_silken_blade_decision_desc:0 "I can now pursue the Silken Blade -- social manipulation backed by lethal skill. I need Prowess 20, Intrigue 18, and Diplomacy 18."

 murim_pursue_sutra_fist_decision_title:0 "Pursue the Sutra Fist Path"
 murim_pursue_sutra_fist_decision_desc:0 "Scholar and warrior converge. I can pursue the Sutra Fist -- dismantling techniques with academic precision. I need Prowess 20, Learning 18, and Martial 18."

 murim_pursue_phantom_meridian_decision_title:0 "Pursue the Phantom Meridian Path"
 murim_pursue_phantom_meridian_decision_desc:0 "Knowledge of the body's qi pathways meets the assassin's touch. I can pursue the Phantom Meridian. I need Prowess 20, Learning 18, and Intrigue 18."

 murim_pursue_golden_merchant_decision_title:0 "Pursue the Golden Merchant Fist Path"
 murim_pursue_golden_merchant_decision_desc:0 "Wealth and war merge into the Golden Merchant Fist. I need Prowess 20, Stewardship 18, and Martial 18."

 murim_pursue_coin_and_dagger_decision_title:0 "Pursue the Coin and Dagger Path"
 murim_pursue_coin_and_dagger_decision_desc:0 "Control the underworld through economic warfare and precision killing. I need Prowess 20, Stewardship 18, and Intrigue 18."

 murim_pursue_jade_emperor_palm_decision_title:0 "Pursue the Jade Emperor Palm Path"
 murim_pursue_jade_emperor_palm_decision_desc:0 "Rule with martial strength behind every decree. I need Prowess 20, Stewardship 18, and Diplomacy 18."

 murim_pursue_mountain_sage_decision_title:0 "Pursue the Mountain Sage Path"
 murim_pursue_mountain_sage_decision_desc:0 "The hermit alchemist warrior. Brew pills, temper the body, transcend. I need Prowess 20, Stewardship 18, and Learning 18."

 murim_pursue_heavens_voice_decision_title:0 "Pursue the Heaven's Voice Path"
 murim_pursue_heavens_voice_decision_desc:0 "Let martial truth become spiritual expression. I need Prowess 20, Diplomacy 18, and Learning 18."

 # Tier 3 Decisions
 murim_pursue_tyrant_fist_decision_title:0 "Seize the Tyrant Fist"
 murim_pursue_tyrant_fist_decision_desc:0 "The Unrivaled King awaits. Command, deceive, destroy. I need Prowess 25, Martial 20, Intrigue 20, and Diplomacy 20. Only those who already walk a dual path may attempt this."

 murim_pursue_dao_heart_decision_title:0 "Attain the Dao Heart"
 murim_pursue_dao_heart_decision_desc:0 "The Enlightened Sword Saint. Fight without ego. Every movement a lesson. I need Prowess 25, Learning 20, Martial 20, and Diplomacy 20. Only those who already walk a dual path may attempt this."

 murim_pursue_asura_crown_decision_title:0 "Claim the Asura's Crown"
 murim_pursue_asura_crown_decision_desc:0 "Emperor of the Underworld. Control the black market, command assassin armies, wield forbidden power. I need Prowess 25, Stewardship 20, Intrigue 20, and Martial 20. Only those who already walk a dual path may attempt this."

 murim_pursue_heavenly_sovereign_decision_title:0 "Ascend as the Heavenly Sovereign"
 murim_pursue_heavenly_sovereign_decision_desc:0 "The Apex. Master all five paths with prowess that defies the era. I need Prowess 30, and all five skills at 22 or higher. Only those who have already achieved legendary status may attempt this. History will record my name."