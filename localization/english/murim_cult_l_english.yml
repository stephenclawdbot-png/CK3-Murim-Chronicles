l_english:
 murim_cult.0001.t: "Morning Meditation Breakthrough"
 murim_cult.0001.desc: "Dawn light filters through the bamboo grove as you settle into meditation. Your breathing slows, and the qi of heaven and earth responds, flowing toward you in gentle spirals. A breakthrough in understanding feels tantalizingly close."
 murim_cult.0001.a: "Push deeper into meditation."
 murim_cult.0001.b: "Accept the natural flow."
 murim_cult.0001.c: "Share the insight with disciples."
 murim_cult.0002.t: "Rare Herb Discovery"
 murim_cult.0002.desc: "While traversing the mountain trails, you discover a rare spiritual herb growing in a crevice where qi concentrates naturally. Its leaves shimmer with faint luminescence, and the air around it hums with vitality."
 murim_cult.0002.a: "Consume it immediately."
 murim_cult.0002.b: "Store it for a breakthrough attempt."
 murim_cult.0002.c: "Gift it to a powerful ally."
 murim_cult.0003.t: "Wandering Master Encounter"
 murim_cult.0003.desc: "An old man in tattered robes sits by the roadside, drinking wine from a gourd. Something about his presence makes the air heavy with power. This is no ordinary beggar -- you sense cultivation that defies comprehension."
 murim_cult.0003.a: "Beg humbly for teaching."
 murim_cult.0003.b: "Challenge them to a spar."
 murim_cult.0003.c: "Offer food and shelter."
 murim_cult.0004.t: "A Disciple Shows Promise"
 murim_cult.0004.desc: "One of the younger disciples has displayed extraordinary talent during training. Their qi control surpasses their peers by leagues, and their martial instincts are razor-sharp. A rare gem has emerged in your sect."
 murim_cult.0004.a: "Intensify their training."
 murim_cult.0004.b: "Let them find their own path."
 murim_cult.0004.c: "Take them as personal student."
 murim_cult.0005.t: "Qi Deviation Crisis"
 murim_cult.0005.desc: "Your qi spirals out of control. Energy rampages through your meridians like a flood breaking through a dam. Pain lances through every nerve as your own cultivation threatens to tear you apart from within."
 murim_cult.0005.a: "Force control with willpower."
 murim_cult.0005.b: "Release the qi outward."
 murim_cult.0005.c: "Seek emergency help."
 murim_cult.0006.t: "Ancient Manual Fragment"
 murim_cult.0006.desc: "Among dusty scrolls in a collapsed library, you discover a fragment of an ancient cultivation manual. The characters are archaic but legible, describing techniques that predate all known sects. This could be the find of a lifetime."
 murim_cult.0006.a: "Study it immediately."
 murim_cult.0006.b: "Seek experts to decode it."
 murim_cult.0006.c: "Share it with the sect."
 murim_cult.0061.t: "The Second Fragment"
 murim_cult.0061.desc: "Following clues hidden within the first fragment, you have located a second piece of the ancient manual. The characters overlap and complement each other, revealing deeper layers of cultivation knowledge."
 murim_cult.0061.a: "Follow the trail to the final piece."
 murim_cult.0061.b: "Abandon the search."
 murim_cult.0062.t: "The Complete Manual"
 murim_cult.0062.desc: "All fragments assembled, the ancient manual reveals its complete form. A cultivation technique of breathtaking depth and power unfolds before your eyes -- knowledge that could elevate you to heights undreamed of."
 murim_cult.0062.a: "Absorb the complete technique."
 murim_cult.0062.b: "Transcribe and teach to the sect."
 murim_cult.0007.t: "Breakthrough Attempt"
 murim_cult.0007.desc: "Your accumulated qi has reached the threshold for advancement. The barrier between cultivation ranks shimmers before your mind's eye like a wall of glass. Beyond it lies power you can barely imagine. The moment of truth has arrived."
 murim_cult.0007.a: "Attempt breakthrough with full power."
 murim_cult.0007.b: "Take the cautious approach."
 murim_cult.0008.t: "Body Tempering Trial"
 murim_cult.0008.desc: "A cauldron filled with medicinal liquid and spiritual herbs awaits. The Body Tempering Trial will strengthen your physical form to withstand higher levels of qi. The liquid steams with a heat that borders on unbearable."
 murim_cult.0008.a: "Short immersion -- safe and mild."
 murim_cult.0008.b: "Medium immersion -- push further."
 murim_cult.0008.c: "Full immersion -- risk everything."
 murim_cult.0009.t: "Meridian Opening Ceremony"
 murim_cult.0009.desc: "The time has come to open additional meridian channels. Each opened meridian allows qi to flow more freely through your body, amplifying your power. But the process is agonizing, and failure could cripple your cultivation."
 murim_cult.0009.a: "Public ceremony -- high stakes."
 murim_cult.0009.b: "Private ceremony with an elder."
 murim_cult.0009.c: "Force open with sheer qi."
 murim_cult.0010.t: "Dual Cultivation Proposal"
 murim_cult.0010.desc: "A fellow cultivator approaches with a delicate proposition -- dual cultivation. By synchronizing qi circulation with a partner, both can achieve breakthroughs impossible alone. But the practice is taboo among orthodox sects."
 murim_cult.0010.a: "Accept the proposal."
 murim_cult.0010.b: "Politely decline."
 murim_cult.0010.c: "Report them to the elders."
 murim_cult.0011.t: "Heavenly Tribulation -- First Strike"
 murim_cult.0011.desc: "The sky darkens. Thunder rolls across the heavens as divine lightning gathers above you. The Heavenly Tribulation has arrived -- the ultimate test that separates mortals from immortals. There is no turning back."
 murim_cult.0011.a: "Stand firm and absorb it."
 murim_cult.0011.b: "Deflect with a qi shield."
 murim_cult.0011.c: "Flee the tribulation."
 murim_cult.0112.t: "Heavenly Tribulation -- Second Strike"
 murim_cult.0112.desc: "The second bolt descends with twice the fury of the first. Your body screams in agony as divine energy courses through you. The heavens test not just your power, but your very will to survive."
 murim_cult.0112.a: "Endure through martial will."
 murim_cult.0112.b: "Channel qi into a counterattack."
 murim_cult.0113.t: "Heavenly Tribulation -- Final Strike"
 murim_cult.0113.desc: "The final bolt gathers above, dwarfing everything that came before. This is it -- the last barrier between mortality and transcendence. The lightning descends like the judgment of heaven itself. Survive, and ascend. Fail, and perish."
 murim_cult.0113.a: "Merge with the lightning."
 murim_cult.0113.b: "Sacrifice cultivation to survive."
 murim_cult.0012.t: "Forbidden Technique Temptation"
 murim_cult.0012.desc: "A shadowy figure appears bearing a scroll wrapped in black silk. They offer a forbidden cultivation technique of devastating power -- one that feeds on the life force of others. The dark qi emanating from the scroll is intoxicating."
 murim_cult.0012.a: "Accept the forbidden technique."
 murim_cult.0012.b: "Refuse firmly."
 murim_cult.0012.c: "Pretend to accept, then destroy it."
 murim_cult.0013.t: "Inner Demon Manifestation"
 murim_cult.0013.desc: "In the depths of meditation, your inner demon manifests. It wears your face twisted by malice, offering visions of power unlimited. Every cultivator must face this trial -- your darkest self, given form and voice."
 murim_cult.0013.a: "Show compassion to banish it."
 murim_cult.0013.b: "Reject it through discipline."
 murim_cult.0013.c: "Give in to the temptation."
 murim_cult.0132.t: "Inner Demon -- Test of Resolve"
 murim_cult.0132.desc: "The inner demon shifts its approach, attacking not with temptation but with despair. Visions of failure, loss, and meaninglessness batter your consciousness. Only unshakable resolve can weather this storm."
 murim_cult.0132.a: "Endure through sheer willpower."
 murim_cult.0132.b: "Use forbidden knowledge to banish it."
 murim_cult.0133.t: "Inner Demon -- Final Confrontation"
 murim_cult.0133.desc: "The inner demon stands before you one last time. Weakened by your resolve, it offers one final choice -- accept it as part of yourself and achieve harmony, or destroy it utterly and claim martial dominance."
 murim_cult.0133.a: "Accept the shadow as part of me."
 murim_cult.0133.b: "Destroy the shadow utterly."
 murim_cult.0014.t: "Legacy Inheritance"
 murim_cult.0014.desc: "A dying master has chosen you as the inheritor of their cultivation legacy. Their lifetime of knowledge, their techniques, their very qi -- all can be passed to you. But with the power comes their enemies and unfinished grudges."
 murim_cult.0014.a: "Accept the full inheritance."
 murim_cult.0014.b: "Accept only the safe portion."
 murim_cult.0014.c: "Refuse and let it pass on."
 murim_cult.0015.t: "Dual Path Tension"
 murim_cult.0015.desc: "The orthodox teachings of your master and the forbidden techniques you have acquired pull in opposite directions within your dantian. The conflicting energies threaten to tear you apart. You must choose a path -- or attempt the impossible fusion."
 murim_cult.0015.a: "Abandon the demonic path."
 murim_cult.0015.b: "Embrace darkness fully."
 murim_cult.0015.c: "Attempt the dangerous fusion."
 murim_cult.0016.t: "Pill Refinement"
 murim_cult.0016.desc: "The alchemy cauldron glows with spiritual fire as you prepare to refine cultivation pills. The ingredients are laid out with precision -- each herb measured, each mineral weighed. A single mistake could cause an explosion."
 murim_cult.0016.a: "Use common herbs -- safe approach."
 murim_cult.0016.b: "Use rare ingredients -- powerful pill."
 murim_cult.0016.c: "Add the forbidden blood lotus."
 murim_cult.0017.t: "Secret Realm Discovery"
 murim_cult.0017.desc: "A shimmering portal opens in a hidden valley, revealing a pocket dimension where time flows differently and qi is a hundred times denser. Ancient guardians protect whatever secrets lie within. A Secret Realm has been found."
 murim_cult.0017.a: "Enter the outer realm."
 murim_cult.0017.b: "Push to the inner sanctum."
 murim_cult.0017.c: "Seal it and study from outside."
 murim_cult.0018.t: "Cultivation Partner"
 murim_cult.0018.desc: "A fellow cultivator of compatible qi proposes a cultivation partnership. By practicing together, you could amplify each other's progress significantly. But such bonds are binding and not easily broken."
 murim_cult.0018.a: "Accept the partnership fully."
 murim_cult.0018.b: "Propose a limited arrangement."
 murim_cult.0018.c: "Decline -- cultivation is solitary."
 murim_cult.0019.t: "Enlightenment Under the Waterfall"
 murim_cult.0019.desc: "A thundering waterfall cascades from the cliffs above, its spray carrying dense spiritual energy. Legend says those who can endure the crushing force of the water while meditating will achieve a state of perfect clarity."
 murim_cult.0019.a: "Stand firm against the torrent."
 murim_cult.0019.b: "This is too dangerous."
 murim_cult.0192.t: "Waterfall Trial -- Mind Stage"
 murim_cult.0192.desc: "Your body has endured the waterfall's punishment. Now the trial shifts inward -- the roaring water drowns out all thought, demanding that you find stillness within chaos. Only a clear mind can advance."
 murim_cult.0192.a: "Clear my mind through meditation."
 murim_cult.0192.b: "Stop here with the body gains."
 murim_cult.0193.t: "Waterfall Trial -- Spirit Stage"
 murim_cult.0193.desc: "Body tempered, mind cleared. The final stage of the waterfall trial awaits -- spiritual transcendence. The water becomes a mirror reflecting the cosmos itself. You stand at the threshold of enlightenment."
 murim_cult.0193.a: "Push into spiritual enlightenment."
 murim_cult.0193.b: "Rest content with two stages."
 murim_cult.0020.t: "The Hundred Day Foundation"
 murim_cult.0020.desc: "A secluded mountain cave has been prepared for the legendary Hundred Day Foundation retreat. For one hundred days, you will consume nothing but medicinal pills and spiritual water, cultivating without rest. The outcome is guaranteed -- but so is the danger."
 murim_cult.0020.a: "Begin the hundred day retreat."
 murim_cult.0020.b: "Too dangerous to withdraw now."
 murim_cult.0201.t: "Hundred Day Foundation -- Conclusion"
 murim_cult.0201.desc: "The days blur together in an endless cycle of cultivation. Your body transforms, your qi deepens, and the world outside fades to nothing. At last, the hundredth dawn arrives."
 murim_cult.0201.a: "Emerge with newfound power."
 murim_cult.0201.b: "The retreat was interrupted."
 murim_cult.0201.c: "Forced out, but resilient."
