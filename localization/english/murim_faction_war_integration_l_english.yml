l_english:
 murim_faction_war_integration.0001.t: "The Clash of Factions"
 murim_faction_war_integration.0001.desc: "The drums of war echo across the martial world. Orthodox and unorthodox forces have drawn their lines, and every cultivator must choose where they stand. The air crackles with killing intent as armies of martial artists gather on either side."
 murim_faction_war_integration.0001.a: "Lead the charge personally!"
 murim_faction_war_integration.0001.b: "Coordinate the battle from behind."
 murim_faction_war_integration.0001.c: "Seek peace between the factions."
 murim_faction_war_integration.0002.t: "Faction War Report"
 murim_faction_war_integration.0002.desc: "Runners arrive with reports from the front lines. The faction war grinds on, and your counsel is needed to determine the next strategic move."
 murim_faction_war_integration.0002.a: "Study the battlefield reports."
 murim_faction_war_integration.0002.b: "Send spies to the enemy camp."
 murim_faction_war_shadow.0001.t: "Shadow Operations"
 murim_faction_war_shadow.0001.desc: "In the darkness between the factions, shadow operatives carry out missions that will never see daylight. A contact approaches with a mission that could turn the tide of war."
 murim_faction_war_shadow.0001.a: "Embrace the shadows."
 murim_faction_war_shadow.0001.b: "Decline the covert work."
 murim_faction_war_shadow.0002.t: "Black Market Intelligence"
 murim_faction_war_shadow.0002.desc: "A shadowy broker offers intelligence gathered during the faction conflict. The information could be genuine, or it could be a carefully planted deception."
 murim_faction_war_shadow.0002.a: "Buy the intelligence."
 murim_faction_war_shadow.0002.b: "Rely on your own sources."
 murim_faction_war.0030.t: "Continental Escalation"
 murim_faction_war.0030.desc: "What began as a local dispute has erupted into a continent-spanning conflict. Sects and clans from every province are being drawn into the maelstrom. The very foundations of the murim are shaking."
 murim_faction_war.0030.a: "Rally the warriors to our banner."
 murim_faction_war.0030.b: "Focus on tactical superiority."
 murim_continental_war.0030.t: "The War Engulfs All"
 murim_continental_war.0030.desc: "Smoke rises from a hundred battlefields. The continental war has consumed the martial world, pitting master against master, sect against sect. History itself hangs in the balance."
 murim_continental_war.0030.a: "March to war with everything we have."
 murim_continental_war.0030.b: "Negotiate from a position of strength."
 murim_calamity_ai_integration.0001.t: "The Great Calamity Descends"
 murim_calamity_ai_integration.0001.desc: "The sky splits open with unnatural light. The Great Calamity that the ancient texts warned about has arrived, and every martial artist must decide how to face the existential threat bearing down upon the world."
 murim_calamity_ai_integration.0001.a: "Fight desperately to survive!"
 murim_calamity_ai_integration.0001.b: "Flee to the mountains."
 murim_calamity_ai_integration.0001.c: "Shield the weak from harm."
 murim_calamity_ai_integration.0002.t: "Surviving the Calamity"
 murim_calamity_ai_integration.0002.desc: "The Great Calamity rages on. Those who survive must decide between standing firm against the tide or finding shelter until the storm passes."
 murim_calamity_ai_integration.0002.a: "Stand and fight."
 murim_calamity_ai_integration.0002.b: "Find shelter and recover."
 murim_great_calamity.0001.t: "The First Omen"
 murim_great_calamity.0001.desc: "Strange signs manifest across the land. Rivers run dark, beasts flee the mountains, and the qi of heaven and earth grows turbulent. The elders whisper of a Great Calamity foretold in the ancient scriptures."
 murim_great_calamity.0001.a: "Prepare for the coming storm."
 murim_great_calamity.0001.b: "Investigate the source of the omen."
 murim_great_calamity.0001.c: "Dismiss the superstition."
 murim_great_calamity.0002.t: "The Second Sign"
 murim_great_calamity.0002.desc: "A second omen has appeared, darker than the first. Spiritual energy fluctuates wildly, and even the most skeptical martial artists can no longer deny that something terrible approaches."
 murim_great_calamity.0002.a: "Redouble our preparations."
 murim_great_calamity.0002.b: "Pray to the heavens for guidance."
 murim_great_calamity_rebuild.0001.t: "From the Ashes"
 murim_great_calamity_rebuild.0001.desc: "The Great Calamity has passed, but its devastation lingers. Sects lie in ruins, martial lineages are broken, and the survivors must decide how to rebuild the shattered martial world."
 murim_great_calamity_rebuild.0001.a: "Rebuild the sect from the ashes."
 murim_great_calamity_rebuild.0001.b: "Train the next generation."
 murim_great_calamity_rebuild.0001.c: "Wander alone into the unknown."
 murim_artifact_events.0001.t: "A Martial Relic Unearthed"
 murim_artifact_events.0001.desc: "Workers have unearthed an ancient artifact pulsing with residual qi. The relic bears markings of a forgotten martial lineage and could hold the key to lost cultivation techniques."
 murim_artifact_events.0001.a: "Study the relic's secrets."
 murim_artifact_events.0001.b: "Sell it to the highest bidder."
 murim_artifact_integration.0001.t: "Artifact Resonance"
 murim_artifact_integration.0001.desc: "The martial artifact in your possession has begun to resonate with your cultivation base. Strange visions flash before your eyes as the relic's latent power stirs to life."
 murim_artifact_integration.0001.a: "Channel the artifact's power."
 murim_artifact_integration.0001.b: "Display it as a symbol of prestige."
 murim_artifact_integration.0002.t: "Artifact Appraisal"
 murim_artifact_integration.0002.desc: "An expert appraiser has examined a martial relic found in your territory. The artifact appears to be authentic, though its true worth depends on how you choose to use it."
 murim_artifact_integration.0002.a: "Keep it for martial training."
 murim_artifact_integration.0002.b: "Sell it for a generous sum."
 murim_shadow.0001.t: "Whispers from the Shadows"
 murim_shadow.0001.desc: "A cloaked figure appears at your door under cover of night. They speak of a hidden world beneath the martial world -- a realm of assassins, spies, and shadow brokers where the true power of the murim is decided."
 murim_shadow.0001.a: "Step into the shadow world."
 murim_shadow.0001.b: "Refuse -- I walk in the light."
 murim_shadow_politics.0020.t: "Shadow Market Dealings"
 murim_shadow_politics.0020.desc: "The shadow market buzzes with clandestine exchanges. Secret techniques, forbidden pills, and classified intelligence change hands in smoke-filled back rooms far from the righteous sects."
 murim_shadow_politics.0020.a: "Deal in forbidden goods."
 murim_shadow_politics.0020.b: "Gather information only."
 murim_shadow_realm.0015.t: "The Shadow Realm Beckons"
 murim_shadow_realm.0015.desc: "Deep within the hidden passages of the underworld, you discover a gateway to the Shadow Realm -- a pocket dimension where dark qi flows freely and forbidden techniques can be practiced without restriction."
 murim_shadow_realm.0015.a: "Enter and cultivate the dark arts."
 murim_shadow_realm.0015.b: "Use it to intimidate rivals."
 murim_tribunal.0020.t: "The Murim Tribunal Convenes"
 murim_tribunal.0020.desc: "The Murim Tribunal -- the highest judicial body of the martial world -- has convened to adjudicate a matter that concerns your sect. The gathered elders demand testimony and evidence."
 murim_tribunal.0020.a: "Present evidence formally."
 murim_tribunal.0020.b: "Challenge the tribunal's authority."
 murim_tribunal.0020.c: "Submit to their judgment."
 murim_tribunal.0021.t: "Tribunal Verdict"
 murim_tribunal.0021.desc: "The Murim Tribunal has reached its verdict. The assembled elders speak with the weight of tradition and law behind them. The martial world watches to see how you respond."
 murim_tribunal.0021.a: "Accept the verdict with grace."
 murim_tribunal.0021.b: "Prepare to contest the ruling."
 murim_tribunal.0022.t: "Tribunal Aftermath"
 murim_tribunal.0022.desc: "The tribunal's proceedings have concluded, leaving ripples throughout the martial world. The judgments rendered today will shape the balance of power for years to come."
 murim_tribunal.0022.a: "Reflect on the outcome."
 murim_tribunal.0022.b: "Work the aftermath to your advantage."
 murim_tribunal.0030.t: "Grand Tribunal Assembly"
 murim_tribunal.0030.desc: "A rare Grand Tribunal Assembly has been called, bringing together the most powerful figures of the martial world. Momentous decisions will be made here that could reshape the entire murim."
 murim_tribunal.0030.a: "Speak with authority at the assembly."
 murim_tribunal.0030.b: "Listen and learn from the elders."
 murim_final_integration.0008.t: "Convergence of Paths"
 murim_final_integration.0008.desc: "The threads of your martial journey weave together. Your cultivation, your reputation, and your alliances have reached a point of convergence where every choice shapes the next stage of your path."
 murim_final_integration.0008.a: "Let cultivation guide the way."
 murim_final_integration.0008.b: "Sharpen both blade and spirit."
 murim_final_integration.0009.t: "The World Takes Notice"
 murim_final_integration.0009.desc: "Your growing influence has drawn the attention of the martial world's most powerful figures. Whispered conversations in teahouses and sect halls revolve around your name and deeds."
 murim_final_integration.0009.a: "Cultivate wisdom from this recognition."
 murim_final_integration.0009.b: "Let my fists speak louder."
 murim_final_integration.0010.t: "Pinnacle of Integration"
 murim_final_integration.0010.desc: "All the paths you have walked -- cultivation, combat, politics, and shadow -- converge into a single moment of clarity. You stand at the pinnacle, ready to shape the future of the martial world."
 murim_final_integration.0010.a: "Embrace my destiny fully."
 murim_sect.0003.t: "Sect Internal Affairs"
 murim_sect.0003.desc: "Internal matters within the sect demand attention. Disciple disputes, resource allocation, and training schedules all require the guidance of a senior member."
 murim_sect.0003.a: "Address the matters decisively."
 murim_sect.0003.b: "Focus on martial training priorities."
 murim_sect.0005.t: "Sect Traditions"
 murim_sect.0005.desc: "The sect's annual observance of its founding traditions draws near. Incense burns before the ancestor tablets as disciples gather to honor the martial lineage that binds them."
 murim_sect.0005.a: "Honor the ancestors with reverence."
 murim_sect.0005.b: "Use the ceremony for combat drills."
 murim_sect.0050.t: "Sect Expansion"
 murim_sect.0050.desc: "The sect has grown large enough to consider expansion. New training grounds, additional disciples, and extended territories all demand resources and leadership."
 murim_sect.0050.a: "Expand the sect's influence."
 murim_sect.0050.b: "Invest in deeper cultivation study."
 murim_sect.0501.t: "Sect Cultivation Gathering"
 murim_sect.0501.desc: "The sect holds a grand cultivation gathering where disciples share insights and breakthrough experiences. The collective wisdom strengthens everyone's martial foundation."
 murim_sect.0501.a: "Share your cultivation insights."
 murim_sect.0501.b: "Meditate on the collective wisdom."
 murim_sect_events.0001.t: "Sect Daily Affairs"
 murim_sect_events.0001.desc: "The rhythms of sect life continue. Disciples train in the courtyard, elders discuss doctrine, and the smell of medicinal herbs wafts from the alchemy pavilion."
 murim_sect_events.0001.a: "Attend to sect business."
 murim_custom_clan.0002.t: "The Clan Takes Shape"
 murim_custom_clan.0002.desc: "Your newly founded clan is beginning to take root. Followers gather under your banner, drawn by your reputation and the promise of a new martial path."
 murim_custom_clan.0002.a: "Establish strict martial traditions."
 murim_custom_clan.0002.b: "Build diplomatic ties first."
 murim_entry.0005.t: "First Steps on the Path"
 murim_entry.0005.desc: "The martial world opens before you like an endless horizon. Every senior cultivator you pass radiates power you can barely comprehend, yet something within you stirs with untapped potential."
 murim_entry.0005.a: "Begin cultivating immediately."
 murim_entry.0005.b: "Study the martial arts theoretically."
 murim_entry.0007.t: "A Spark of Potential"
 murim_entry.0007.desc: "During basic training, you discover a natural affinity for channeling qi. The energy flows through your meridians more easily than your instructors expected. Perhaps you are destined for greatness."
 murim_entry.0007.a: "Push your body to its limits."
 murim_entry.0007.b: "Study the theory behind qi flow."
 murim_daily.0003.t: "A Day in the Murim"
 murim_daily.0003.desc: "Dawn breaks over the martial world. The morning air carries the sounds of distant training -- wooden swords clashing, the rhythmic breathing of meditating cultivators, and the bustle of the nearby marketplace."
 murim_daily.0003.a: "Train in the courtyard."
 murim_daily.0003.b: "Visit the marketplace."
 murim_daily.0003.c: "Meditate by the river."
 murim_jianghu.0120.t: "Jianghu Rumors"
 murim_jianghu.0120.desc: "Tavern gossip carries whispers of opportunity. A traveling merchant speaks of hidden treasures, bounties on rogue cultivators, and secret meetings in the bamboo groves."
 murim_jianghu.0120.a: "Follow the rumors for profit."
 murim_jianghu.0120.b: "Build connections with the locals."
 murim_jianghu.0200.t: "Underworld Contact"
 murim_jianghu.0200.desc: "A figure from the jianghu underworld seeks you out. They offer access to a network of informants and black-market dealers -- for a price that extends beyond mere gold."
 murim_jianghu.0200.a: "Deal with the underworld."
 murim_jianghu.0200.b: "Maintain your reputation instead."
 murim_jianghu.0300.t: "The Wandering Merchant"
 murim_jianghu.0300.desc: "A mysterious merchant appears with wares unlike any you have seen -- cultivation pills, rare herbs, and scrolls bearing forgotten techniques. But such treasures never come without strings attached."
 murim_jianghu.0300.a: "Trade for rare goods."
 murim_jianghu.0300.b: "Earn goodwill through honest dealing."
 murim_jianghu.0400.t: "The Black Auction"
 murim_jianghu.0400.desc: "Invitations to the infamous Black Auction circulate through the jianghu underworld. Only the most powerful and connected receive entry to this gathering where forbidden artifacts change hands."
 murim_jianghu.0400.a: "Attend and bid aggressively."
 murim_jianghu.0400.b: "Observe from a safe distance."
 murim_jianghu_events.0001.t: "Life in the Jianghu"
 murim_jianghu_events.0001.desc: "The rivers and lakes of the jianghu flow ever onward. Wandering swordsmen pass through, old debts are settled, and new alliances form over cups of rice wine."
 murim_jianghu_events.0001.a: "Navigate the currents."
 murim_ranker_death_events.0001.t: "A Ranker Falls"
 murim_ranker_death_events.0001.desc: "News spreads like wildfire through the martial world -- a ranked master has fallen. The power vacuum left behind sends shockwaves through every sect and clan. Ambitious cultivators circle like vultures."
 murim_ranker_death_events.0001.a: "Mourn the fallen master."
 murim_ranker_death_events.0001.b: "Seize the opportunity."
 murim_ranker_death_events.0001.c: "Honor their memory solemnly."
 murim_cross_clan_romance.0001.t: "Forbidden Affection"
 murim_cross_clan_romance.0001.desc: "Your heart betrays you -- drawn to someone from a rival clan. Such a bond could spark war or forge an unprecedented alliance. The choice between love and duty has never felt so sharp."
 murim_cross_clan_romance.0001.a: "Follow your heart."
 murim_cross_clan_romance.0001.b: "Choose duty over desire."
 murim_cross_clan_romance.0001.c: "Meet in secret."
 murim_forbidden_vault.0001.t: "The Forbidden Vault"
 murim_forbidden_vault.0001.desc: "Deep beneath the ancestral halls, you discover a sealed vault pulsing with dark qi. Ancient warning seals cover the door, but you can feel immense power waiting within -- techniques sealed away for a reason."
 murim_forbidden_vault.0001.a: "Open the vault."
 murim_forbidden_vault.0001.b: "Seal it tighter."
 murim_forbidden_vault.0001.c: "Take one scroll only."
 murim_trade_martial.0015.t: "The Martial Trade Route"
 murim_trade_martial.0015.desc: "A lucrative trade route for martial supplies passes through your territory. Spirit stones, medicinal herbs, and weapon materials flow along the road, bringing wealth to those who control it."
 murim_trade_martial.0015.a: "Tax the trade route."
 murim_trade_martial.0015.b: "Offer protection for prestige."
 murim_travel.0001.t: "Wandering the Martial World"
 murim_travel.0001.desc: "The open road stretches before you, winding through misty mountains and ancient forests. Every step brings new encounters, and traveling cultivators often find insights that elude those who remain still."
 murim_travel.0001.a: "Seek cultivation insights on the road."
 murim_travel.0001.b: "Train while traveling."
 murim_alchemy.0020.t: "The Alchemist's Crucible"
 murim_alchemy.0020.desc: "You have gathered rare ingredients sufficient to attempt pill refinement. The cauldron glows with spiritual fire as you prepare to forge a cultivation pill that could accelerate your advancement."
 murim_alchemy.0020.a: "Brew the cultivation pill."
 murim_alchemy.0020.b: "Sell the ingredients instead."
 murim_blood_oath.0025.t: "The Blood Oath"
 murim_blood_oath.0025.desc: "A sworn brother requests a blood oath -- the most binding pact in the martial world. Once sealed, the oath can never be broken without dire consequences. Blood drips onto the ancestral altar."
 murim_blood_oath.0025.a: "Seal the blood oath."
 murim_blood_oath.0025.b: "Refuse the binding pact."
 murim_blood_oath.0030.t: "Blood Oath Fulfilled"
 murim_blood_oath.0030.desc: "The blood oath you swore has been called upon. Your sworn sibling demands you honor your pledge, regardless of the personal cost. The weight of the oath burns in your veins."
 murim_blood_oath.0030.a: "Honor the oath without hesitation."
 murim_blood_oath.0030.b: "Seek a way to fulfill it peacefully."
