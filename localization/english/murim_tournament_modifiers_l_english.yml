l_english:

 # ==========================================
 # TOURNAMENT MODIFIERS
 # ==========================================
 murim_young_dragon_cooldown_desc:0 "Recently competed in the Young Dragon Tournament. Must wait before entering again."
 murim_young_dragon_victor_desc:0 "Proved their strength in the Young Dragon Tournament, defeating a worthy opponent in front of the assembled clans."
 murim_young_dragon_champion_desc:0 "Champion of the Young Dragon Tournament! The greatest young martial artist of this generation, celebrated across all nine clans."
 murim_young_dragon_finalist_desc:0 "Reached the final rounds of the Young Dragon Tournament, earning respect from the martial world."
 murim_grand_tournament_cooldown_desc:0 "Recently competed in the Grand Martial Tournament. Must wait before entering again."
 murim_grand_champion_desc:0 "Grand Champion of the Martial World! Defeated all challengers in the decennial Grand Tournament, acknowledged as the supreme fighter of the age."
 murim_grand_finalist_desc:0 "Reached the finals of the Grand Martial Tournament, a feat that places them among the elite fighters of the martial world."
 murim_dark_path_chosen_desc:0 "Chose the path of shadow and deception, embracing forbidden techniques that grant power at the cost of reputation."
 murim_recent_challenge_cooldown_desc:0 "Recently issued or received a ranking challenge. Must recover before the next one."

 # ==========================================
 # ENTRY PATH MODIFIERS
 # ==========================================
 murim_desperate_determination_desc:0 "The desperation of a landless wanderer forged into iron determination. Every strike carries the weight of survival."
 murim_mysterious_encounter_desc:0 "A chance encounter with a mysterious martial artist has opened their eyes to the hidden world of cultivation."
 murim_ancient_manual_insight_desc:0 "Discovered an ancient martial arts manual and absorbed its fundamental teachings, gaining deep insight into qi circulation."
 murim_near_death_awakening_desc:0 "A brush with death unlocked dormant potential, awakening martial instincts at the cost of lingering physical damage."
 murim_mountain_hermit_focus_desc:0 "Years of solitary mountain training have sharpened martial skills and deepened understanding, though social skills have withered."
 murim_active_training_desc:0 "Currently engaged in focused martial training, pushing the body to its limits daily."

 # ==========================================
 # CLAN RANK MODIFIERS
 # ==========================================
 murim_sect_outer_disciple_desc:0 "An outer disciple of their clan, learning the fundamentals and proving their worth to earn advancement."
 murim_sect_inner_disciple_desc:0 "An inner disciple with access to advanced techniques and closer guidance from the elders."
 murim_sect_elder_desc:0 "A respected elder of their clan, trusted with teaching disciples and advising the leadership."
 murim_sect_vice_leader_desc:0 "The vice leader of their clan, second in command and heir apparent to the leadership position."
 murim_sect_leader_desc:0 "The leader of their clan, bearing the weight of all disciples' futures and the clan's honor in the martial world."
 murim_new_sect_member_enthusiasm_desc:0 "The excitement and energy of a newly accepted clan member, eager to prove themselves worthy."
 murim_tang_associate_poison_knowledge_desc:0 "Trained in the Tang Clan's legendary poison arts, gaining insight into toxins, antidotes, and hidden weapons."
 murim_sect_deserter_stigma_desc:0 "Branded a traitor for abandoning their clan. Former brothers and sisters now view them with contempt and suspicion."

 # ==========================================
 # TOURNAMENT EVENT LOCALIZATION
 # ==========================================
 murim_tournament.0001.t:0 "Young Dragon Tournament"
 murim_tournament.0001.desc:0 "The drums of the Young Dragon Tournament echo across the valley! Every five years, the nine great clans gather their most promising young disciples for a grand contest of martial skill. Warriors under thirty from Mount Hua, Shaolin, Wudang, Tang Clan, Beggar Sect, Iron Fist Gate, Heavenly Demon Sect, Poison Flower Palace, and Phantom Blade Sect have assembled. Your name has been called to the arena."
 murim_tournament.0001.a:0 "Fight with everything I have!"
 murim_tournament.0001.a.victory:0 "Your opponent crumbles before your superior technique. The crowd roars approval as clan elders nod with respect."
 murim_tournament.0001.a.defeat:0 "Despite your best efforts, your opponent's skill proves superior. You taste the bitter dust of the arena floor."
 murim_tournament.0001.b:0 "Forfeit and preserve my body."

 murim_tournament.0002.t:0 "Young Dragon - Semi-Finals"
 murim_tournament.0002.desc:0 "You have advanced to the semi-finals of the Young Dragon Tournament! The remaining fighters are the cream of the young generation. Each represents the pride of their clan. The atmosphere is electric with anticipation."

 murim_tournament.0005.t:0 "Grand Martial Tournament"
 murim_tournament.0005.desc:0 "Once every decade, the greatest martial artists in the world gather for the Grand Tournament. There are no age restrictions here -- only raw power and skill matter. The winner will be acknowledged as the supreme champion of the martial world. Clan leaders, hermit masters, and legendary fighters have all descended from their training grounds."

 murim_tournament.0010.t:0 "Clan Scouts Approach"
 murim_tournament.0010.desc:0 "Your impressive performance in the Young Dragon Tournament has not gone unnoticed. Scouts from multiple clans approach you with recruitment offers. Each clan promises different strengths: Mount Hua's elegant swordsmanship, Shaolin's indomitable body cultivation, Wudang's flowing internal arts, Tang Clan's deadly poison techniques, Beggar Sect's vast intelligence network, Iron Fist Gate's raw power, Heavenly Demon Sect's forbidden strength, Poison Flower Palace's botanical mastery, or Phantom Blade Sect's ghostly assassination arts."

 # ==========================================
 # NOTIFICATION LOCALIZATION
 # ==========================================
 murim_rank_ai_duel_winner_notification:0 "Ranking Duel Result"
 murim_rank_ai_duel_winner_desc:0 "A ranking duel has concluded in the martial world. The challenger has proven their strength and claimed a higher position."
 murim_rank_challenge_winner_desc:0 "The challenger's martial arts proved superior, earning them a higher ranking."
 murim_rank_challenge_loser_desc:0 "The defender could not repel the challenger's assault and has been demoted in the rankings."
