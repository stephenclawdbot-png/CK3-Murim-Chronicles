l_english:
 murim_mastery.0001.t: "The Ancient Manual"
 murim_mastery.0001.desc: "Hidden within the pages of a crumbling book, you discover a martial arts manual written in an archaic script. The techniques described are unlike anything taught by modern sects — raw, powerful, and dangerous. Mastering this could take years, but the potential is extraordinary."
 murim_mastery.0001.a: "Study it intensively — no matter the cost"
 murim_mastery.0001.b: "Share it with your master for guidance"
 murim_mastery.0001.c: "Sell it to the highest bidder"

 murim_mastery.0002.t: "The Impenetrable Form"
 murim_mastery.0002.desc: "You've been practicing the technique for weeks, but the seventh form eludes you. Your body knows the movements, but something is missing — a deeper understanding that you can't quite grasp. The technique remains incomplete, its full power locked away behind comprehension."
 murim_mastery.0002.a: "Practice until your body breaks through"
 murim_mastery.0002.b: "Seek enlightenment through meditation"
 murim_mastery.0002.c: "Set it aside and return later"

 murim_mastery.0003.t: "Technique Perfected!"
 murim_mastery.0003.desc: "In a moment of perfect clarity, every form connects. Your qi flows through the technique like water through a river — natural, effortless, devastatingly powerful. You've achieved true mastery. The technique is no longer something you perform; it's something you are."
 murim_mastery.0003.a: "Test my mastery in real combat"
 murim_mastery.0003.b: "Begin teaching this technique to others"
 murim_mastery.0003.c: "Keep my mastery secret — a hidden trump card"

 murim_mastery.0004.t: "Creating a New Path"
 murim_mastery.0004.desc: "Your understanding of martial arts has reached a point where existing techniques feel... limited. You see patterns that connect disparate styles, gaps in conventional wisdom, possibilities no one has explored. You could create something entirely new — your own original technique."
 murim_mastery.0004.a: "Create a devastating offensive technique"
 murim_mastery.0004.b: "Develop a technique that harmonizes body and spirit"
 murim_mastery.0004.c: "Forge a forbidden technique of dark power"

 murim_mastery.0005.t: "The Worthy Opponent"
 murim_mastery.0005.desc: "A wandering martial artist arrives whose skill matches your own. Every move you make, they counter; every technique you try, they match. For the first time in years, you face someone who can truly push you beyond your limits. This is the kind of opponent who makes you stronger."
 murim_mastery.0005.a: "Spar intensively — push each other to grow"
 murim_mastery.0005.b: "Befriend them and exchange techniques"
 murim_mastery.0005.c: "Study their weaknesses for future advantage"

 murim_mastery.0006.t: "Weapon Affinity"
 murim_mastery.0006.desc: "During training, you pick up a weapon you've rarely used — and something clicks. The weight feels perfect, the balance natural, as if this weapon was always meant for you. Your qi resonates through the blade in ways your previous weapon never allowed."
 murim_mastery.0006.a: "Commit fully to this weapon path"
 murim_mastery.0006.b: "Study the weapon arts methodically"
 murim_mastery.0006.c: "Develop a unique dual-weapon fighting style"

 murim_mastery.0007.t: "Technique Theft"
 murim_mastery.0007.desc: "During a public exhibition, a rival cultivator performs a technique that is unmistakably yours — the same forms, the same qi flow, the same finishing move. Someone has stolen your art and is passing it off as their own. The crowd doesn't know the truth."
 murim_mastery.0007.a: "Challenge them publicly to prove ownership"
 murim_mastery.0007.b: "Evolve the technique beyond what they copied"
 murim_mastery.0007.c: "Let it go — a true master needs no validation"

 murim_mastery.0008.t: "Passing the Torch"
 murim_mastery.0008.desc: "A young disciple shows extraordinary aptitude for your signature technique — perhaps even more talent than you had at their age. Teaching them could ensure your art survives for generations. But there's always the risk that the student surpasses the master."
 murim_mastery.0008.a: "Teach them everything — hold nothing back"
 murim_mastery.0008.b: "Teach the basics, charge for advanced lessons"
 murim_mastery.0008.c: "Teach them some, keep the secrets for now"

 murim_mastery.0009.t: "A Fatal Flaw"
 murim_mastery.0009.desc: "During combat analysis, you realize your primary technique has a critical weakness — a brief moment of vulnerability during the third transition. Anyone who discovers this flaw could exploit it lethally. You've been unknowingly leaving yourself open all this time."
 murim_mastery.0009.a: "Drill relentlessly until the flaw is patched"
 murim_mastery.0009.b: "Seek a master who can help address it"
 murim_mastery.0009.c: "Hope no one else notices it"

 murim_mastery.0010.t: "The Ultimate Technique"
 murim_mastery.0010.desc: "After decades of martial cultivation, you stand at the pinnacle. Every technique you know, every battle you've fought, every insight you've gained — they converge into a singular vision. You can feel the ultimate technique forming in your mind, a culmination of your entire martial journey."
 murim_mastery.0010.a: "Create the ultimate offensive art"
 murim_mastery.0010.b: "Perfect the harmony of all martial paths"
 murim_mastery.0010.c: "Leave a legacy technique for future generations"
