 # Civilian Casualty Events
 murim_civilian.0001.t: "Collateral Damage"
 murim_civilian.0001.desc: "The streets run red. Your clash with a rival martial artist has spilled beyond the boundaries of your duel — market stalls overturned, walls shattered by errant palm strikes, and the screams of ordinary people caught in the crossfire echo through the district. A merchant clutches a bleeding child. An old woman weeps over her destroyed cart. The consequences of martial power wielded carelessly stare back at you from a dozen terrified faces."
 murim_civilian.0001.a: "The fight was unavoidable."
 murim_civilian.0001.b: "Help the injured and pay for the damage."
 murim_civilian.0001.c: "Disappear before anyone recognizes me."

 murim_civilian.0002.t: "Technique Gone Wrong"
 murim_civilian.0002.desc: "The forbidden technique erupted with force beyond anything you anticipated. What should have been a focused strike instead sent a shockwave rippling through the surrounding area. Buildings cracked. Trees were uprooted. And in the settling dust, you see the bodies — civilians who happened to be passing by, their lives ended by power you failed to contain. The qi still crackles in the air, tainted with the copper scent of innocent blood."
 murim_civilian.0002.a: "The technique's power was beyond my control."
 murim_civilian.0002.b: "Seal the technique forever — it's too dangerous."
 murim_civilian.0002.c: "Cover it up. Blame it on bandits."

 murim_civilian.0003.t: "Village Devastation"
 murim_civilian.0003.desc: "The sect war has reached a quiet farming village. Your forces clashed with the enemy amidst rice paddies and thatched roofs, and now the village burns. Farmers who knew nothing of martial arts lie dead in their fields. Children cry for parents who will never answer. The elders of the village kneel before you, begging for mercy — but the damage is already done. This is the true cost of the martial world's conflicts."
 murim_civilian.0003.a: "War demands sacrifice. Press forward."
 murim_civilian.0003.b: "Cease fighting. Help rebuild what we destroyed."
 murim_civilian.0003.c: "Blame the enemy for this destruction."

 # Tooltips
 murim_civilian_damage_minor_tt: "Minor collateral damage — property destroyed, but no lives lost."
 murim_civilian_damage_injured_tt: "Several civilians were injured in the crossfire."
 murim_civilian_damage_death_tt: "Innocent civilians were killed by your martial power."
