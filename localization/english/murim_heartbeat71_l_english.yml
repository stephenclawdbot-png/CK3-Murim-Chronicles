l_english:
 # Heartbeat 71 Localization — Shaolin Exp3, Tang Exp3, Beggar Exp3, Calamity Exp5, Mount Hua Exp3, Wudang Exp3, Shadow Politics Exp5

 # === SHAOLIN EXPANSION 3 ===
 murim_shaolin_expansion3.0001.t:0 "The Forbidden Scripture Chamber"
 murim_shaolin_expansion3.0001.desc:0 "While sweeping the ancient pagoda's lowest level, you discover a hidden passage behind a loose stone. Beyond lies a sealed vault — the Forbidden Scripture Chamber, containing techniques banned by the First Abbot three hundred years ago. The scrolls glow with residual qi. The 72 Demonic Transformations. The Blood Lotus Sutra. The Soul-Rending Palm. Knowledge that was deemed too dangerous for any monk to possess."
 murim_shaolin_expansion3.0001.a:0 "Enter the chamber and study the forbidden techniques"
 murim_shaolin_expansion3.0001.b:0 "Seal it and report to the Abbot immediately"
 murim_shaolin_expansion3.0001.c:0 "Tell no one — keep the secret yourself"
 murim_shaolin_expansion3.0002.t:0 "The Abbot's Judgment"
 murim_shaolin_expansion3.0002.desc:0 "The Abbot convenes the Elder Council in the Dharma Hall. Your discovery of the Forbidden Chamber has shaken the monastery. Some elders demand the knowledge be destroyed. Others argue it should be studied carefully. The Abbot looks at you with ancient eyes: 'You found it. What do you think should be done?'"
 murim_shaolin_expansion3.0002.a:0 "Accept the role of Chamber Guardian"
 murim_shaolin_expansion3.0002.b:0 "Request permission to study one scroll under supervision"
 murim_shaolin_expansion3.0002.c:0 "The knowledge should be destroyed — burn it all"
 murim_shaolin_expansion3.0003.t:0 "Qi Deviation Crisis"
 murim_shaolin_expansion3.0003.desc:0 "The forbidden techniques are fighting against your orthodox training. Your meridians burn. Your qi spirals out of control. The 72 Demonic Transformations are corrupting your carefully cultivated Buddhist foundation. Your skin turns dark purple in patches. Your eyes flash red during meditation."
 murim_shaolin_expansion3.0003.a:0 "Push through — force the technique to completion"
 murim_shaolin_expansion3.0003.b:0 "Seek help from a senior monk"
 murim_shaolin_expansion3.0003.c:0 "Abandon the forbidden arts entirely"
 murim_shaolin_expansion3.0004.t:0 "Iron Arhat Awakening"
 murim_shaolin_expansion3.0004.desc:0 "The Diamond Sutra technique activates something dormant in your body. Your bones harden. Your skin takes on a metallic sheen. When you strike a rock, the rock shatters and your fist is unharmed. You are becoming the legendary Iron Arhat — the indestructible warrior monk."
 murim_shaolin_expansion3.0004.a:0 "Embrace the Iron Arhat transformation fully"
 murim_shaolin_expansion3.0004.b:0 "Control it — seek balance between iron and flesh"
 murim_shaolin_expansion3.0004.c:0 "Reject the transformation — purge the iron qi"
 murim_shaolin_expansion3.0005.t:0 "The Chamber Guardian Crisis"
 murim_shaolin_expansion3.0005.desc:0 "As guardian of the Forbidden Chamber, you perform nightly checks. Tonight, the door seal is disturbed. Fresh footprints in the dust lead toward the Elder Monk quarters. Someone has been entering the chamber secretly."
 murim_shaolin_expansion3.0005.a:0 "Confront the suspicious elder directly"
 murim_shaolin_expansion3.0005.b:0 "Set a trap to catch them in the act"
 murim_shaolin_expansion3.0005.c:0 "Report to the Abbot silently"
 murim_shaolin_expansion3.0006.t:0 "Vajra Palm Breakthrough"
 murim_shaolin_expansion3.0006.desc:0 "Under the Elder's careful supervision, you achieve insight into the Vajra Palm — a technique lost for two hundred years. Your palm strikes now carry the weight of a mountain. The air itself ripples when you practice."
 murim_shaolin_expansion3.0006.a:0 "Master the Vajra Palm completely"
 murim_shaolin_expansion3.0006.b:0 "Combine Vajra Palm with your existing style"
 murim_shaolin_expansion3.0006.c:0 "The technique is too dangerous — seal it away"
 murim_shaolin_expansion3.0007.t:0 "The Abbot Refuses"
 murim_shaolin_expansion3.0007.desc:0 "The Abbot shakes his head slowly. 'Knowledge is never evil, only its misuse. We are guardians, not destroyers. The day we burn knowledge out of fear is the day we become no different from the Heavenly Demon Sect.'"
 murim_shaolin_expansion3.0007.a:0 "Accept the Abbot's wisdom"
 murim_shaolin_expansion3.0007.b:0 "Defy the Abbot — burn the scrolls yourself"
 murim_shaolin_expansion3.0007.c:0 "Leave the monastery over this disagreement"
 murim_shaolin_expansion3.0008.t:0 "The Elder's Secret"
 murim_shaolin_expansion3.0008.desc:0 "The captured elder confesses: he was reconstructing the Eighteen Lohan Formation — a group combat technique requiring eighteen masters acting as one. His intent was to prepare Shaolin's defense against the coming Calamity that ancient texts predict."
 murim_shaolin_expansion3.0008.a:0 "Help complete the Eighteen Lohan Formation"
 murim_shaolin_expansion3.0008.b:0 "The Calamity talk is superstition — punish him"
 murim_shaolin_expansion3.0008.c:0 "Free the elder but forbid further research"
 murim_shaolin_expansion3.0009.t:0 "Eighteen Lohan Formation Complete"
 murim_shaolin_expansion3.0009.desc:0 "After months of secret training, eighteen Shaolin monks have mastered the formation. Moving as one mind in eighteen bodies, they are the most powerful group combat force in the Orthodox world. But the Heavenly Demon Sect has spies everywhere..."
 murim_shaolin_expansion3.0009.a:0 "Demonstrate at the Orthodox Alliance meeting"
 murim_shaolin_expansion3.0009.b:0 "Keep it secret — our trump card"
 murim_shaolin_expansion3.0009.c:0 "Teach the principles to other Orthodox sects"
 murim_shaolin_expansion3.0010.t:0 "Shaolin Succession Crisis"
 murim_shaolin_expansion3.0010.desc:0 "The Abbot is dying. Three factions within the monastery vie for the position: the Warriors who want martial supremacy, the Scholars who value wisdom above all, and the Reformists who would open Shaolin to the modern world."
 murim_shaolin_expansion3.0010.a:0 "Support the Warrior faction"
 murim_shaolin_expansion3.0010.b:0 "Support the Scholar faction"
 murim_shaolin_expansion3.0010.c:0 "Support the Reformist faction"

 # === TANG CLAN EXPANSION 3 ===
 murim_tang_clan_expansion3.0001.t:0 "The Thousand Poison Cauldron"
 murim_tang_clan_expansion3.0001.desc:0 "The ultimate test for any Tang Clan disciple. You will be sealed inside a room with one thousand different poisons for three days. Those who emerge alive gain immunity to all known toxins. The death rate is thirty percent. Your master looks at you expectantly."
 murim_tang_clan_expansion3.0001.a:0 "Enter the Cauldron Room"
 murim_tang_clan_expansion3.0001.b:0 "Refuse — the risk is too great"
 murim_tang_clan_expansion3.0001.c:0 "Secretly take an antidote beforehand"
 murim_tang_clan_expansion3.0002.t:0 "The Hidden Arsenal"
 murim_tang_clan_expansion3.0002.desc:0 "A hidden passage in the ancestral hall leads to the First Patriarch's personal arsenal. Weapons never before seen: Rain of Stars, a 360-degree needle launcher. Soul Seeker, a heat-tracking dart. Phantom Chain, an invisible wire weapon."
 murim_tang_clan_expansion3.0002.a:0 "Study Rain of Stars"
 murim_tang_clan_expansion3.0002.b:0 "Study Soul Seeker"
 murim_tang_clan_expansion3.0002.c:0 "Study Phantom Chain"
 murim_tang_clan_expansion3.0003.t:0 "Poison Grandmaster Recognition"
 murim_tang_clan_expansion3.0003.desc:0 "The clan elders recognize your immunity as proof of Grandmaster potential. But the current Poison Grandmaster, a formidable woman who has held the title for twenty years, sees you as a direct threat to her authority."
 murim_tang_clan_expansion3.0003.a:0 "Challenge the current Grandmaster"
 murim_tang_clan_expansion3.0003.b:0 "Wait your turn — show patience"
 murim_tang_clan_expansion3.0003.c:0 "Leave the clan — your skills will serve elsewhere"
 murim_tang_clan_expansion3.0004.t:0 "Trade Route Crisis"
 murim_tang_clan_expansion3.0004.desc:0 "The clan's poison ingredient supply routes through Sichuan are under attack. Iron Fist Gate bandits raid every caravan. Without rare ingredients, Tang Clan cannot produce its signature weapons."
 murim_tang_clan_expansion3.0004.a:0 "Send an armed escort"
 murim_tang_clan_expansion3.0004.b:0 "Negotiate with Iron Fist Gate"
 murim_tang_clan_expansion3.0004.c:0 "Find alternative ingredients"
 murim_tang_clan_expansion3.0005.t:0 "The Grandmaster's Mysterious Death"
 murim_tang_clan_expansion3.0005.desc:0 "The Poison Grandmaster is dead under mysterious circumstances. A master of poisons, killed by poison. The irony is not lost on anyone. The clan demands answers."
 murim_tang_clan_expansion3.0005.a:0 "Investigate the death"
 murim_tang_clan_expansion3.0005.b:0 "Claim the Grandmaster title immediately"
 murim_tang_clan_expansion3.0005.c:0 "Call for a proper succession tournament"
 murim_tang_clan_expansion3.0006.t:0 "Revolutionary Compound"
 murim_tang_clan_expansion3.0006.desc:0 "Your research into alternative ingredients has produced something unexpected — a compound more lethal than any traditional Tang formula. This could revolutionize clan weaponry or destroy the balance of power in the martial world."
 murim_tang_clan_expansion3.0006.a:0 "Develop the new compound fully"
 murim_tang_clan_expansion3.0006.b:0 "Share with the Orthodox Alliance"
 murim_tang_clan_expansion3.0006.c:0 "Destroy the formula — too dangerous"
 murim_tang_clan_expansion3.0007.t:0 "Venomous Constitution Awakening"
 murim_tang_clan_expansion3.0007.desc:0 "The ancient Tang bloodline carries a dormant poison resistance gene. In rare individuals, it awakens as the Venomous Constitution — the body itself produces toxins. Your touch becomes lethal. Your sweat is corrosive. Flowers wilt when you walk past them."
 murim_tang_clan_expansion3.0007.a:0 "Embrace the Venomous Constitution"
 murim_tang_clan_expansion3.0007.b:0 "Suppress it with medicine"
 murim_tang_clan_expansion3.0007.c:0 "Seek a cure from Poison Flower Palace"
 murim_tang_clan_expansion3.0008.t:0 "Curse of the Venomous Body"
 murim_tang_clan_expansion3.0008.desc:0 "Your touch kills flowers. Animals flee. Even your own family cannot embrace you. The Phantom Blade Sect sees your condition as an opportunity — they offer you a position as the ultimate assassin."
 murim_tang_clan_expansion3.0008.a:0 "Accept Phantom Blade's offer"
 murim_tang_clan_expansion3.0008.b:0 "Refuse — learn to control the poison yourself"
 murim_tang_clan_expansion3.0008.c:0 "Isolate yourself — become a mountain hermit"
 murim_tang_clan_expansion3.0009.t:0 "Poison Control Mastery"
 murim_tang_clan_expansion3.0009.desc:0 "After months of meditation and training, you achieve what no Tang Clan member has before — complete control over your venomous body. You can choose when to be lethal and when to be safe. You are the first to master the Venomous Constitution."
 murim_tang_clan_expansion3.0009.a:0 "Master of Poison and Touch"
 murim_tang_clan_expansion3.0009.b:0 "Teach the control method to future generations"
 murim_tang_clan_expansion3.0010.t:0 "Myriad Poison Divine Art"
 murim_tang_clan_expansion3.0010.desc:0 "The culmination of all Tang Clan knowledge into one supreme technique. The Myriad Poison Divine Art makes you both the ultimate healer and the ultimate killer. This is the Tang Clan's answer to the Heavenly Demon's power."
 murim_tang_clan_expansion3.0010.a:0 "Achieve the Myriad Poison Divine Art"
 murim_tang_clan_expansion3.0010.b:0 "The power is too great — seal it for the next generation"

 # === BEGGAR SECT EXPANSION 3 ===
 murim_beggar_sect_expansion3.0001.t:0 "The Beggar Network Awakens"
 murim_beggar_sect_expansion3.0001.desc:0 "Your intelligence network reports disturbing patterns. The Heavenly Demon Sect is moving agents into position across all major trade cities simultaneously. Something massive is being prepared."
 murim_beggar_sect_expansion3.0001.a:0 "Mobilize the full network"
 murim_beggar_sect_expansion3.0001.b:0 "Alert the Orthodox Alliance"
 murim_beggar_sect_expansion3.0001.c:0 "Sell the information to the highest bidder"
 murim_beggar_sect_expansion3.0002.t:0 "The Mole"
 murim_beggar_sect_expansion3.0002.desc:0 "Your counter-intelligence reveals a mole. One of your own sub-leaders has been turned by the Heavenly Demon. They are feeding information back to the enemy."
 murim_beggar_sect_expansion3.0002.a:0 "Feed false information through them"
 murim_beggar_sect_expansion3.0002.b:0 "Confront and execute the mole publicly"
 murim_beggar_sect_expansion3.0002.c:0 "Offer them redemption"
 murim_beggar_sect_expansion3.0003.t:0 "False Intelligence Trap"
 murim_beggar_sect_expansion3.0003.desc:0 "The false information worked. Demon agents walked into a trap. A major operation has been disrupted. But the Demon Lord now knows who orchestrated it — you."
 murim_beggar_sect_expansion3.0003.a:0 "Accept fame as Orthodox Alliance spymaster"
 murim_beggar_sect_expansion3.0003.b:0 "Stay in the shadows"
 murim_beggar_sect_expansion3.0003.c:0 "Use this as leverage for resources"
 murim_beggar_sect_expansion3.0004.t:0 "Orthodox Emergency Summit"
 murim_beggar_sect_expansion3.0004.desc:0 "All major Orthodox sects gather in response to your intelligence. They must agree on a unified response to the Demon threat, but old rivalries threaten unity."
 murim_beggar_sect_expansion3.0004.a:0 "Push for immediate preemptive strike"
 murim_beggar_sect_expansion3.0004.b:0 "Advocate defensive posture"
 murim_beggar_sect_expansion3.0004.c:0 "Propose infiltrating the Demon Sect"
 murim_beggar_sect_expansion3.0005.t:0 "Demon Bounty Hunters"
 murim_beggar_sect_expansion3.0005.desc:0 "Three elite Phantom Blade assassins have been dispatched to kill you. Your beggars spot them entering the city. You have hours to prepare."
 murim_beggar_sect_expansion3.0005.a:0 "Set an ambush in the city streets"
 murim_beggar_sect_expansion3.0005.b:0 "Flee to a safe house"
 murim_beggar_sect_expansion3.0005.c:0 "Face them openly with the Dog Beating Staff"
 murim_beggar_sect_expansion3.0006.t:0 "Deep Cover Mission"
 murim_beggar_sect_expansion3.0006.desc:0 "To truly understand the Demon Sect's plans, someone must infiltrate from within. A dangerous mission with no guarantee of survival."
 murim_beggar_sect_expansion3.0006.a:0 "Send a trained agent"
 murim_beggar_sect_expansion3.0006.b:0 "Go yourself"
 murim_beggar_sect_expansion3.0006.c:0 "Abort — too dangerous"
 murim_beggar_sect_expansion3.0007.t:0 "Doomsday Intelligence"
 murim_beggar_sect_expansion3.0007.desc:0 "The deep cover agent reports the unthinkable: the Heavenly Demon plans to trigger the Great Calamity artificially. They want to destroy the Orthodox world and rebuild it under Demon rule."
 murim_beggar_sect_expansion3.0007.a:0 "Rush this intel to every Orthodox leader"
 murim_beggar_sect_expansion3.0007.b:0 "Keep it secret — use as leverage"
 murim_beggar_sect_expansion3.0007.c:0 "Attempt to stop it from within"
 murim_beggar_sect_expansion3.0008.t:0 "Agent's Death"
 murim_beggar_sect_expansion3.0008.desc:0 "Your deep cover operative was discovered and killed. The Demon Sect sent back the body with a message: 'Next time, send someone better.'"
 murim_beggar_sect_expansion3.0008.a:0 "Mourn and honor their sacrifice"
 murim_beggar_sect_expansion3.0008.b:0 "Swear vengeance"
 murim_beggar_sect_expansion3.0008.c:0 "Learn from the failure — improve training"
 murim_beggar_sect_expansion3.0009.t:0 "Agent Turned Traitor"
 murim_beggar_sect_expansion3.0009.desc:0 "Your operative has genuinely joined the Demon Sect. Worse: they know all safe houses, codes, and agent identities. The entire intelligence network is compromised."
 murim_beggar_sect_expansion3.0009.a:0 "Emergency protocol — burn and rebuild"
 murim_beggar_sect_expansion3.0009.b:0 "Hunt the traitor personally"
 murim_beggar_sect_expansion3.0009.c:0 "Feed them false information"
 murim_beggar_sect_expansion3.0010.t:0 "Beggar King's Divine Art"
 murim_beggar_sect_expansion3.0010.desc:0 "Dog Beating Staff and Eighteen Dragon-Subduing Palms merge into one supreme art. The Beggar King's Divine Art — achieved once every three hundred years. Supreme intelligence operative and unmatched fighter become one."
 murim_beggar_sect_expansion3.0010.a:0 "Achieve the Beggar King's Divine Art"
 murim_beggar_sect_expansion3.0010.b:0 "Record the method for future generations"

 # === CALAMITY CYCLE EXPANSION 5 ===
 murim_calamity_cycle_expansion5.0001.t:0 "The Sky Burns Red"
 murim_calamity_cycle_expansion5.0001.desc:0 "The final phase has begun. All nine clans are at war. The Heavenly Demon has declared himself Emperor of Murim. Orthodox Alliance headquarters burns. Unorthodox factions tear each other apart. The sky above the battlefield glows red with qi discharge."
 murim_calamity_cycle_expansion5.0001.a:0 "Rally what remains — make a last stand"
 murim_calamity_cycle_expansion5.0001.b:0 "Flee to the mountains — preserve what you can"
 murim_calamity_cycle_expansion5.0001.c:0 "Seek out the Heavenly Demon directly"
 murim_calamity_cycle_expansion5.0002.t:0 "Last Stand at Broken Sword Valley"
 murim_calamity_cycle_expansion5.0002.desc:0 "Remnants of all Orthodox sects gather for a final defense. Shaolin monks, Wudang swordsmen, Mount Hua blademasters, Tang poison masters, Beggar Sect fighters. Different robes, different styles, one purpose: survive."
 murim_calamity_cycle_expansion5.0002.a:0 "Lead the combined formation"
 murim_calamity_cycle_expansion5.0002.b:0 "Sacrifice yourself to buy time"
 murim_calamity_cycle_expansion5.0002.c:0 "Propose surrender terms"
 murim_calamity_cycle_expansion5.0003.t:0 "Confrontation with the Heavenly Demon"
 murim_calamity_cycle_expansion5.0003.desc:0 "You stand before the Heavenly Demon atop Thousand Demon Peak. His dark qi fills the sky. His power is overwhelming. The fate of the entire martial world rests on this single battle."
 murim_calamity_cycle_expansion5.0003.a:0 "Fight — ultimate duel for the fate of Murim"
 murim_calamity_cycle_expansion5.0003.b:0 "Challenge him to honorable single combat"
 murim_calamity_cycle_expansion5.0003.c:0 "Use a forbidden technique — mutual annihilation"
 murim_calamity_cycle_expansion5.0004.t:0 "No Mercy"
 murim_calamity_cycle_expansion5.0004.desc:0 "The Heavenly Demon's army massacres the surrendered Orthodox fighters. Blood fills Broken Sword Valley. This becomes the darkest day in Murim history."
 murim_calamity_cycle_expansion5.0004.a:0 "Fight your way out in the chaos"
 murim_calamity_cycle_expansion5.0004.b:0 "Play dead among the corpses"
 murim_calamity_cycle_expansion5.0004.c:0 "Accept death with dignity"
 murim_calamity_cycle_expansion5.0005.t:0 "Mountain Refuge"
 murim_calamity_cycle_expansion5.0005.desc:0 "You have gathered survivors in a hidden valley. Monks, swordsmen, poisoners, beggars — all mixed together. Old rivalries mean nothing when ninety percent of the martial world is dead."
 murim_calamity_cycle_expansion5.0005.a:0 "Unite all survivors — found the New Murim Alliance"
 murim_calamity_cycle_expansion5.0005.b:0 "Rebuild your own clan first"
 murim_calamity_cycle_expansion5.0005.c:0 "Abandon the martial world — become a farmer"
 murim_calamity_cycle_expansion5.0006.t:0 "After the Storm"
 murim_calamity_cycle_expansion5.0006.desc:0 "The Heavenly Demon is dead. The Calamity is over. But Murim lies in ruins. Ninety percent of martial artists are dead. Sects are destroyed. Knowledge is lost. Only ashes remain — and the will to rebuild."
 murim_calamity_cycle_expansion5.0006.a:0 "Declare the New Era — become its first leader"
 murim_calamity_cycle_expansion5.0006.b:0 "Step back — let the next generation lead"
 murim_calamity_cycle_expansion5.0006.c:0 "Wander alone — too much pain to stay"
 murim_calamity_cycle_expansion5.0007.t:0 "Founding the New Sects"
 murim_calamity_cycle_expansion5.0007.desc:0 "The old sects are gone. Their names live only in memory. New sects must rise from the ashes, carrying fragments of the old knowledge combined in new ways."
 murim_calamity_cycle_expansion5.0007.a:0 "Found a sect combining Orthodox and Unorthodox arts"
 murim_calamity_cycle_expansion5.0007.b:0 "Rebuild the Orthodox Alliance — preserve tradition"
 murim_calamity_cycle_expansion5.0007.c:0 "Create a school teaching ALL martial arts"
 murim_calamity_cycle_expansion5.0008.t:0 "Mythology Formation"
 murim_calamity_cycle_expansion5.0008.desc:0 "The survivors tell stories of the old world. Great warriors become legends. Real events become myths. Soon the truth is lost entirely, replaced by tales of gods and demons."
 murim_calamity_cycle_expansion5.0008.a:0 "Write the true history"
 murim_calamity_cycle_expansion5.0008.b:0 "Let the myths grow — legends inspire"
 murim_calamity_cycle_expansion5.0008.c:0 "Create a secret archive"
 murim_calamity_cycle_expansion5.0009.t:0 "The Cycle Warning"
 murim_calamity_cycle_expansion5.0009.desc:0 "An ancient text from the ruins warns: the Calamity is cyclical. Every one hundred fifty to two hundred years, Murim tears itself apart. The Heavenly Demon was not the cause — only the catalyst."
 murim_calamity_cycle_expansion5.0009.a:0 "Prepare countermeasures for the next cycle"
 murim_calamity_cycle_expansion5.0009.b:0 "Accept the cycle as natural"
 murim_calamity_cycle_expansion5.0009.c:0 "Destroy the text"
 murim_calamity_cycle_expansion5.0010.t:0 "Dawn of the New Age"
 murim_calamity_cycle_expansion5.0010.desc:0 "Children born after the Calamity know nothing of the old world. They train in the new sects, learn the new techniques, dream of surpassing the legends. Your dynasty has survived. The game goes on."
 murim_calamity_cycle_expansion5.0010.a:0 "Train the new generation"
 murim_calamity_cycle_expansion5.0010.b:0 "Focus on dynasty power"
 murim_calamity_cycle_expansion5.0010.c:0 "Dedicate your life to preventing the next cycle"

 # === MOUNT HUA EXPANSION 3 ===
 murim_mount_hua_expansion3.0001.t:0 "Sword Heart Awakening"
 murim_mount_hua_expansion3.0001.desc:0 "During midnight meditation on the peak, your sword begins vibrating without being touched. It resonates with the mountain itself. The ancient texts call this Sword Heart Awakening — it happens once per generation."
 murim_mount_hua_expansion3.0001.a:0 "Follow the resonance"
 murim_mount_hua_expansion3.0001.b:0 "Resist — it feels dangerous"
 murim_mount_hua_expansion3.0001.c:0 "Study the phenomenon scientifically"
 murim_mount_hua_expansion3.0002.t:0 "The Lost Six Forms"
 murim_mount_hua_expansion3.0002.desc:0 "The Sword Heart reveals the complete Twenty-Four Plum Blossom Sword Forms. Mount Hua only knows eighteen. The lost six are devastating: Winter Plum, Fallen Petal Rain, Root Strike, Branch Whip, Blossom Storm, and Eternal Spring."
 murim_mount_hua_expansion3.0002.a:0 "Master all twenty-four forms"
 murim_mount_hua_expansion3.0002.b:0 "Specialize in the lost six"
 murim_mount_hua_expansion3.0002.c:0 "Share with all of Mount Hua immediately"
 murim_mount_hua_expansion3.0003.t:0 "The First Sword Saint"
 murim_mount_hua_expansion3.0003.desc:0 "Your analysis reveals the mountain contains the qi of the First Sword Saint — the founder of Mount Hua. His consciousness has been embedded in the mountain for five hundred years."
 murim_mount_hua_expansion3.0003.a:0 "Communicate with the First Sword Saint"
 murim_mount_hua_expansion3.0003.b:0 "Free his spirit — let him rest"
 murim_mount_hua_expansion3.0003.c:0 "Keep the secret"
 murim_mount_hua_expansion3.0004.t:0 "Sect Leader Challenge"
 murim_mount_hua_expansion3.0004.desc:0 "Your mastery makes you the strongest swordsman in Mount Hua history. The aging Sect Leader refuses to acknowledge this. A formal challenge on the Plum Blossom Platform is inevitable."
 murim_mount_hua_expansion3.0004.a:0 "Issue a formal challenge"
 murim_mount_hua_expansion3.0004.b:0 "Wait for natural succession"
 murim_mount_hua_expansion3.0004.c:0 "Leave Mount Hua — walk your own path"
 murim_mount_hua_expansion3.0005.t:0 "Wudang-Mount Hua Sword Summit"
 murim_mount_hua_expansion3.0005.desc:0 "The decennial meeting between the two greatest sword sects. This time, tensions are high. A Wudang disciple publicly called Mount Hua swordsmanship 'rigid and predictable.'"
 murim_mount_hua_expansion3.0005.a:0 "Accept the formal sword exchange"
 murim_mount_hua_expansion3.0005.b:0 "Propose a joint technique"
 murim_mount_hua_expansion3.0005.c:0 "Boycott the summit"
 murim_mount_hua_expansion3.0006.t:0 "Ancient Rival Returns"
 murim_mount_hua_expansion3.0006.desc:0 "A Phantom Blade assassin who was once expelled from Mount Hua for poisoning his blade has returned. Now their best killer, he challenges you for revenge."
 murim_mount_hua_expansion3.0006.a:0 "Accept the challenge"
 murim_mount_hua_expansion3.0006.b:0 "Set conditions — no poison, pure swords"
 murim_mount_hua_expansion3.0006.c:0 "Reject — we do not duel criminals"
 murim_mount_hua_expansion3.0007.t:0 "Plum Blossom in Winter"
 murim_mount_hua_expansion3.0007.desc:0 "A rare phenomenon — plum trees bloom in winter. Tradition says this heralds the emergence of the next Sword God within a generation."
 murim_mount_hua_expansion3.0007.a:0 "Hold a grand selection tournament"
 murim_mount_hua_expansion3.0007.b:0 "Intensive training for all disciples"
 murim_mount_hua_expansion3.0007.c:0 "Ignore the superstition"
 murim_mount_hua_expansion3.0008.t:0 "Sword God Trials"
 murim_mount_hua_expansion3.0008.desc:0 "Three trials: Cut the Waterfall (power), Catch the Falling Petal (precision), Thread the Storm (adaptability). No one has passed all three in two hundred years."
 murim_mount_hua_expansion3.0008.a:0 "Attempt all three trials"
 murim_mount_hua_expansion3.0008.b:0 "Attempt your strongest trial only"
 murim_mount_hua_expansion3.0008.c:0 "Decline — not ready yet"
 murim_mount_hua_expansion3.0009.t:0 "Mount Hua Reformation"
 murim_mount_hua_expansion3.0009.desc:0 "Younger disciples demand change: allow women to learn all forms, open to non-Chinese students, modernize teaching. The elders resist. The sect risks splitting."
 murim_mount_hua_expansion3.0009.a:0 "Support full reformation"
 murim_mount_hua_expansion3.0009.b:0 "Compromise — partial reforms"
 murim_mount_hua_expansion3.0009.c:0 "Reject all reforms"
 murim_mount_hua_expansion3.0010.t:0 "Eternal Plum Blossom"
 murim_mount_hua_expansion3.0010.desc:0 "The ultimate Mount Hua technique. Swordsman becomes sword becomes mountain becomes blossom. Attacks from everywhere and nowhere. The Sword God's final form."
 murim_mount_hua_expansion3.0010.a:0 "Achieve Eternal Plum Blossom"
 murim_mount_hua_expansion3.0010.b:0 "Seal the power within the mountain"

 # === WUDANG EXPANSION 3 ===
 murim_wudang_expansion3.0001.t:0 "Gateway to Immortality"
 murim_wudang_expansion3.0001.desc:0 "On Wudang's highest peak during the winter solstice, you achieve a state of complete stillness. Your internal qi circulates on its own. The Taoist texts call this the Gateway to Immortality."
 murim_wudang_expansion3.0001.a:0 "Embrace the stillness — pursue immortality"
 murim_wudang_expansion3.0001.b:0 "Channel the energy into martial power"
 murim_wudang_expansion3.0001.c:0 "Pull back — the void is too vast"
 murim_wudang_expansion3.0002.t:0 "Golden Elixir Formation"
 murim_wudang_expansion3.0002.desc:0 "Your body produces Golden Elixir qi. Wounds heal faster. Aging slows. But it demands absolute celibacy and emotional detachment. Any strong emotion disrupts the formation."
 murim_wudang_expansion3.0002.a:0 "Accept all restrictions — full cultivation"
 murim_wudang_expansion3.0002.b:0 "Partial cultivation — keep connections"
 murim_wudang_expansion3.0002.c:0 "Reject — humanity is worth more than immortality"
 murim_wudang_expansion3.0003.t:0 "Tai Chi Sword Enlightenment"
 murim_wudang_expansion3.0003.desc:0 "Practicing the 108 Tai Chi Sword forms in the rain, each raindrop follows the same principles as sword qi. Your sword begins to move like water."
 murim_wudang_expansion3.0003.a:0 "Water Sword Style — become formless"
 murim_wudang_expansion3.0003.b:0 "Apply the principle to all combat"
 murim_wudang_expansion3.0003.c:0 "Teach this insight to all disciples"
 murim_wudang_expansion3.0004.t:0 "The Snow Lotus Quest"
 murim_wudang_expansion3.0004.desc:0 "The Golden Elixir needs one final catalyst: the Thousand Year Snow Lotus. But Poison Flower Palace also seeks it."
 murim_wudang_expansion3.0004.a:0 "Race to the Heavenly Peak"
 murim_wudang_expansion3.0004.b:0 "Send disciples to gather it"
 murim_wudang_expansion3.0004.c:0 "Seek an alternative method"
 murim_wudang_expansion3.0005.t:0 "Confrontation at the Peak"
 murim_wudang_expansion3.0005.desc:0 "Poison Flower Palace's mistress stands before the Snow Lotus. She offers to share — both get half potency — or fight."
 murim_wudang_expansion3.0005.a:0 "Share the lotus — the Dao values harmony"
 murim_wudang_expansion3.0005.b:0 "Fight for the lotus"
 murim_wudang_expansion3.0005.c:0 "Yield gracefully"
 murim_wudang_expansion3.0006.t:0 "Quasi-Immortal State"
 murim_wudang_expansion3.0006.desc:0 "The Golden Elixir is complete. Your lifespan has doubled. Qi is inexhaustible. But food has no taste. Music has no beauty. Only the Dao remains."
 murim_wudang_expansion3.0006.a:0 "Accept transcendence — become a living immortal"
 murim_wudang_expansion3.0006.b:0 "Channel into martial arts — immortal fighter"
 murim_wudang_expansion3.0006.c:0 "Reverse the process — choose mortality"
 murim_wudang_expansion3.0007.t:0 "Alternative Elixir"
 murim_wudang_expansion3.0007.desc:0 "Ancient texts reveal a method using rare herbs, meditation, and willingly given human blood with pure yang qi. An ethical dilemma for any Taoist."
 murim_wudang_expansion3.0007.a:0 "Find a willing donor"
 murim_wudang_expansion3.0007.b:0 "Use your own blood"
 murim_wudang_expansion3.0007.c:0 "Abandon the elixir path entirely"
 murim_wudang_expansion3.0008.t:0 "The Immortal's Burden"
 murim_wudang_expansion3.0008.desc:0 "Years pass. Friends and disciples age and die while you remain unchanged. A young disciple asks: 'Master, is it lonely being immortal?'"
 murim_wudang_expansion3.0008.a:0 "Yes, but someone must carry the knowledge forward"
 murim_wudang_expansion3.0008.b:0 "Loneliness is just attachment — let it go"
 murim_wudang_expansion3.0008.c:0 "Take the disciple as your successor"
 murim_wudang_expansion3.0009.t:0 "Wudang's Crossroads"
 murim_wudang_expansion3.0009.desc:0 "The sect divides: Martial Taoists want combat supremacy, Pure Taoists want meditation and cultivation. The Sect Master must choose Wudang's future path."
 murim_wudang_expansion3.0009.a:0 "Martial Taoist path — strength to survive"
 murim_wudang_expansion3.0009.b:0 "Pure Taoist path — cultivation and wisdom"
 murim_wudang_expansion3.0009.c:0 "The Dao encompasses all — maintain both"
 murim_wudang_expansion3.0010.t:0 "True Taiji Sword"
 murim_wudang_expansion3.0010.desc:0 "The perfect union of yin and yang, martial and mystical, mortal and divine. The sword becomes an extension of the Dao itself. The highest achievement for a Wudang cultivator."
 murim_wudang_expansion3.0010.a:0 "Achieve True Taiji Sword"
 murim_wudang_expansion3.0010.b:0 "The Dao cannot be grasped — release all technique"

 # === SHADOW POLITICS EXPANSION 5 ===
 murim_shadow_politics_expansion5.0001.t:0 "The Emperor's New Advisor"
 murim_shadow_politics_expansion5.0001.desc:0 "The Heavenly Demon has installed his agent as Imperial Grand Advisor. Imperial decrees subtly favor unorthodox sects. Orthodox taxes increase. Military posts go to Demon allies."
 murim_shadow_politics_expansion5.0001.a:0 "Investigate the new Grand Advisor"
 murim_shadow_politics_expansion5.0001.b:0 "Petition the Emperor directly"
 murim_shadow_politics_expansion5.0001.c:0 "Ignore politics — focus on martial strength"
 murim_shadow_politics_expansion5.0002.t:0 "The Web Revealed"
 murim_shadow_politics_expansion5.0002.desc:0 "The conspiracy is vast. The Grand Advisor is a Heavenly Demon elder. The bodyguards are Demon disciples. The Emperor may be under mind-control through the Soul Binding Technique."
 murim_shadow_politics_expansion5.0002.a:0 "Alert the Orthodox Alliance"
 murim_shadow_politics_expansion5.0002.b:0 "Infiltrate the palace yourself"
 murim_shadow_politics_expansion5.0002.c:0 "Publish the evidence widely"
 murim_shadow_politics_expansion5.0003.t:0 "Before the Puppet Emperor"
 murim_shadow_politics_expansion5.0003.desc:0 "You stand before the Emperor. His eyes are glazed, his movements puppet-like. The Grand Advisor smiles behind the throne. Dark qi threads are visible around the Emperor's meridians."
 murim_shadow_politics_expansion5.0003.a:0 "Attack the Grand Advisor mid-audience"
 murim_shadow_politics_expansion5.0003.b:0 "Play along — gather more intel"
 murim_shadow_politics_expansion5.0003.c:0 "Quietly disrupt the Soul Binding"
 murim_shadow_politics_expansion5.0004.t:0 "Orthodox Council on Imperial Crisis"
 murim_shadow_politics_expansion5.0004.desc:0 "All Orthodox leaders gather in secret. The Emperor is controlled by the Heavenly Demon. Acting against the Emperor means treason. Doing nothing means subjugation."
 murim_shadow_politics_expansion5.0004.a:0 "Plan a covert rescue"
 murim_shadow_politics_expansion5.0004.b:0 "Full assault on the Imperial Palace"
 murim_shadow_politics_expansion5.0004.c:0 "Focus on the Heavenly Demon directly"
 murim_shadow_politics_expansion5.0005.t:0 "Solo Palace Infiltration"
 murim_shadow_politics_expansion5.0005.desc:0 "Midnight. Palace walls. Demon guards on every corridor. Seven locked gates between you and the Emperor."
 murim_shadow_politics_expansion5.0005.a:0 "Stealth approach — avoid all guards"
 murim_shadow_politics_expansion5.0005.b:0 "Fight through — create chaos"
 murim_shadow_politics_expansion5.0005.c:0 "Disguise yourself as a palace eunuch"
 murim_shadow_politics_expansion5.0006.t:0 "Demon Retaliation"
 murim_shadow_politics_expansion5.0006.desc:0 "Three assassination attempts in one night. The Heavenly Demon Sect's response to your published evidence is swift and deadly."
 murim_shadow_politics_expansion5.0006.a:0 "Fight off all three attempts"
 murim_shadow_politics_expansion5.0006.b:0 "Use body doubles and misdirection"
 murim_shadow_politics_expansion5.0006.c:0 "Go into hiding completely"
 murim_shadow_politics_expansion5.0007.t:0 "Palace Prison"
 murim_shadow_politics_expansion5.0007.desc:0 "The Demon Advisor keeps you alive as a trophy. In his arrogance, he reveals the Soul Binding's weakness: it requires monthly renewal."
 murim_shadow_politics_expansion5.0007.a:0 "Wait for renewal day — strike then"
 murim_shadow_politics_expansion5.0007.b:0 "Break out by force now"
 murim_shadow_politics_expansion5.0007.c:0 "Pretend submission — become a double agent"
 murim_shadow_politics_expansion5.0008.t:0 "Palace Intelligence"
 murim_shadow_politics_expansion5.0008.desc:0 "While pretending loyalty, you map the entire Demon network within government. Ministers, generals, eunuchs — the infiltration is total. But you also discover loyal imperials."
 murim_shadow_politics_expansion5.0008.a:0 "Contact the loyal imperial faction"
 murim_shadow_politics_expansion5.0008.b:0 "Smuggle the intelligence map out"
 murim_shadow_politics_expansion5.0008.c:0 "Use knowledge for personal leverage"
 murim_shadow_politics_expansion5.0009.t:0 "Operation Liberation"
 murim_shadow_politics_expansion5.0009.desc:0 "The rescue plan is ready. Diversions at three city gates. A small team through the ancient drainage tunnels. One chance."
 murim_shadow_politics_expansion5.0009.a:0 "Execute the plan"
 murim_shadow_politics_expansion5.0009.b:0 "Delay — gather more intel"
 murim_shadow_politics_expansion5.0009.c:0 "Abandon rescue — kill the Demon instead"
 murim_shadow_politics_expansion5.0010.t:0 "Face to Face"
 murim_shadow_politics_expansion5.0010.desc:0 "You stand before the puppet Emperor. His eyes flicker with trapped consciousness. He mouths silent words: 'Kill me... or free me...' The Soul Binding threads are visible as dark qi around his meridians."
 murim_shadow_politics_expansion5.0010.a:0 "Use qi surgery to cut the binding"
 murim_shadow_politics_expansion5.0010.b:0 "Grant his wish — a merciful death"
 murim_shadow_politics_expansion5.0010.c:0 "Escape with the Emperor to Orthodox healers"
