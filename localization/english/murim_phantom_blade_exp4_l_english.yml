l_english:
 murim_phantom_blade_exp4.0001.t: "Shadow Contract: Imperial Target"
 murim_phantom_blade_exp4.0001.desc: "A sealed scroll arrives bearing the sect's black crescent mark. Inside: the name of an imperial official, a sum of gold, and a deadline. This is no ordinary contract — the target holds a kingdom's worth of power. Success would elevate you among the Phantom Blade's elite. Failure means death or exposure."
 murim_phantom_blade_exp4.0001.a: "Accept the contract. The shadow serves."
 murim_phantom_blade_exp4.0001.b: "Too dangerous. I decline."
 murim_phantom_blade_exp4.0001.c: "Warn the target instead. Betray the sect."
 murim_phantom_blade_exp4.0001.a.success: "The blade finds its mark. The target falls silently."
 murim_phantom_blade_exp4.0001.a.partial: "The target survives, and your identity is compromised."
 murim_phantom_blade_exp4.0001.a.failure: "The assassination fails. You barely escape with your life."
 murim_phantom_blade_exp4.0001.b.elder_shame: "As an elder, refusing a contract brings great shame upon you."
 murim_phantom_blade_exp4.0002.t: "Blade Evolution: Living Shadow"
 murim_phantom_blade_exp4.0002.desc: "Your shadow moves before you do. It stretches when you stand still, coils when you breathe. The Phantom Blade's deepest art beckons — merge with your own shadow and become the Living Shadow, a being that exists between light and darkness. But what remains of your humanity afterward?"
 murim_phantom_blade_exp4.0002.a: "Merge with my shadow. Become the Living Shadow."
 murim_phantom_blade_exp4.0002.b: "Reject the merge. Maintain my humanity."
 murim_phantom_blade_exp4.0003.t: "Orthodox Hunter Squad"
 murim_phantom_blade_exp4.0003.desc: "Orthodox sect warriors have formed a hunting party and tracked you to the mountain pass. Their righteous fury burns in their eyes — to them, you are a demon that must be purged. The hunter leader draws a gleaming sword and calls for your surrender. The shadows around you deepen."
 murim_phantom_blade_exp4.0003.a: "Fight the hunter squad head-on."
 murim_phantom_blade_exp4.0003.b: "Vanish into the shadows without a trace."
 murim_phantom_blade_exp4.0003.c: "Surrender and offer information."
 murim_phantom_blade_exp4.0003.a.success: "Your blade dances through their formation like a phantom."
 murim_phantom_blade_exp4.0003.a.draw: "Neither side can land a killing blow. You slip away."
 murim_phantom_blade_exp4.0003.a.failure: "Their combined strength overwhelms you. You must flee, wounded."
 murim_phantom_blade_exp4.0004.t: "Night of a Thousand Blades"
 murim_phantom_blade_exp4.0004.desc: "The stars align for the Phantom Blade's most terrifying operation. On a single night, assassins will strike across the realm simultaneously — a coordinated massacre that will reshape the balance of power in Murim forever. As elder, the decision to launch rests with you alone."
 murim_phantom_blade_exp4.0004.a: "Orchestrate the Night of a Thousand Blades."
 murim_phantom_blade_exp4.0004.a.tt: "Launch coordinated assassinations across the realm."
 murim_phantom_blade_exp4.0004.b: "Too risky. Call it off."
 murim_phantom_blade_exp4.0005.t: "Blade Inheritance"
 murim_phantom_blade_exp4.0005.desc: "Age has dulled your edge, but not your mind. The Phantom Blade legacy must be passed on — the techniques, the contacts, the hidden blades. Your chosen heir kneels before you, eyes sharp with ambition. But is anyone truly worthy of carrying the weight of so many shadows?"
 murim_phantom_blade_exp4.0005.a: "Pass the Phantom Blade legacy to my heir."
 murim_phantom_blade_exp4.0005.b: "No one is worthy. The secrets die with me."
 murim_phantom_blade_exp4.0006.t: "Shadow Market: Forbidden Poisons"
 murim_phantom_blade_exp4.0006.desc: "In the back alley of a midnight market, a hooded figure offers vials of forbidden poison — concoctions that can coat a blade and kill with a single scratch. The Tang Clan's deadliest work, sold to the highest bidder. The price is steep, but the advantage in combat would be decisive."
 murim_phantom_blade_exp4.0006.a: "Buy the forbidden poisons."
 murim_phantom_blade_exp4.0006.b: "Steal them instead."
 murim_phantom_blade_exp4.0006.b.success: "Your hands are quicker than theirs. The poisons are yours."
 murim_phantom_blade_exp4.0006.b.failure: "The poison dealer catches you. The vials shatter on your skin."
 murim_phantom_blade_exp4.0006.c: "Decline. Too risky."
 murim_phantom_blade_exp4.0007.t: "The Phantom Court"
 murim_phantom_blade_exp4.0007.desc: "Your web of influence has grown vast enough to warrant its own court — a shadow government that pulls strings behind every throne in the region. Local lords unknowingly dance to your tune, their decrees shaped by whispered suggestions from agents they never see."
 murim_phantom_blade_exp4.0007.a: "Establish the Phantom Court."
 murim_phantom_blade_exp4.0007.b: "Rule openly instead. No more hiding."
 murim_phantom_blade_exp4.0008.t: "Dual Identity Crisis"
 murim_phantom_blade_exp4.0008.desc: "Two lives wage war within you. By day, a respected figure with obligations and reputation. By night, a shadow that kills without mercy. The strain of maintaining both identities has become unbearable — your secrets multiply, your stress fractures deepen. Something must give."
 murim_phantom_blade_exp4.0008.a: "Embrace the shadow. Let my public self die."
 murim_phantom_blade_exp4.0008.b: "Fight to maintain both identities."
 murim_phantom_blade_exp4.0008.c: "Abandon the Phantom Blade. Choose my public life."
 murim_phantom_blade_exp4.0009.t: "Blood Moon Ritual"
 murim_phantom_blade_exp4.0009.desc: "The blood moon rises, bathing the world in crimson light. The Phantom Blade's most forbidden ceremony can only be performed on this night — a ritual that channels the moon's dark energy through your blade and into your very soul. Power beyond imagination awaits, but the ritual's price is equally unknowable."
 murim_phantom_blade_exp4.0009.a: "Perform the Blood Moon Ritual."
 murim_phantom_blade_exp4.0009.a.success: "Dark power floods your meridians. You ascend as Blood Moon Master."
 murim_phantom_blade_exp4.0009.a.partial: "The ritual is incomplete. Some power takes hold, but not all."
 murim_phantom_blade_exp4.0009.a.failure: "The ritual backfires. Dark energy tears through your body."
 murim_phantom_blade_exp4.0009.b: "This darkness is too deep. I refuse."
 murim_phantom_blade_exp4.0010.t: "The Last Phantom"
 murim_phantom_blade_exp4.0010.desc: "You are the last elder of the Phantom Blade sect. No heir of blood remains, no disciple of sufficient skill. The techniques that have haunted the martial world for generations will vanish with your final breath — unless you find a way to preserve them. The shadow grows long."
 murim_phantom_blade_exp4.0010.a: "Find a stranger worthy of the legacy."
 murim_phantom_blade_exp4.0010.b: "Let the Phantom Blade die with me."
 murim_phantom_blade_exp4.0010.c: "Hide the techniques in a secret manual."
