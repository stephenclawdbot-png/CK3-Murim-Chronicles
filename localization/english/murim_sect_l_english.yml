l_english:
 murim_sect.0001.c: "I walk alone. No sect binds me."
 murim_sect.0010.t: "The Initiation Trial"
 murim_sect.0010.desc: "The sect elders have prepared your initiation trial. Three paths lie before you, each testing a different aspect of your character. The inner disciples watch from the gallery, eager to see whether you have what it takes to join their ranks."
 murim_sect.0010.a: "Face the Trial of Combat."
 murim_sect.0010.b: "Attempt the Trial of Wisdom."
 murim_sect.0010.c: "Endure the Trial of the Hundred Steps."
 murim_sect.0011.t: "Trial Passed!"
 murim_sect.0011.desc: "The elders nod in approval as you complete the trial with flying colors. Your name is inscribed in the sect registry as an inner disciple. New techniques, resources, and a place among the martial elite now await you."
 murim_sect.0011.a: "I am honored to serve the sect."
 murim_sect.0012.t: "Probationary Standing"
 murim_sect.0012.desc: "Your performance was adequate but not exceptional. The elders grant you a probationary position -- you may remain, but must prove yourself further before being recognized as a true inner disciple."
 murim_sect.0012.a: "I will work harder to prove myself."
 murim_sect.0013.t: "Trial Failed"
 murim_sect.0013.desc: "Dust and shame cling to you in equal measure. The trial has exposed the gaps in your cultivation, and the elders' verdict is merciless. You have failed. The sect gates close behind you as whispers follow your retreat."
 murim_sect.0013.a: "Accept defeat and leave with dignity."
 murim_sect.0013.b: "Demand a rematch. I refuse to accept this."
 murim_sect.0020.t: "Core Disciple Promotion"
 murim_sect.0020.desc: "Your cultivation has reached heights that few inner disciples ever achieve. The Sect Patriarch himself acknowledges your strength with a rare nod. The rank of Core Disciple -- with all its privileges and responsibilities -- is now offered to you."
 murim_sect.0020.a: "Accept the promotion humbly."
 murim_sect.0020.b: "Demand elder recognition as well."
 murim_sect.0100.t: "Betrayal Within the Sect"
 murim_sect.0100.desc: "Treachery festers within the sect's walls. A fellow disciple has been secretly undermining the sect from within -- selling techniques to outsiders, poisoning alliances, and sowing discord. The evidence is damning, and they know you have discovered them."
 murim_sect.0100.a: "Confront the betrayer directly."
 murim_sect.0100.b: "Report the treachery to the elders."
 murim_sect.0100.c: "Exploit this knowledge for my own gain."
 murim_sect.0200.t: "Sect War Looms"
 murim_sect.0200.desc: "Tensions between your sect and a rival faction have reached a breaking point. Their disciples patrol your borders with naked steel, and insults fly like arrows at every gathering. War seems inevitable -- but the form it takes remains yours to decide."
 murim_sect.0200.a: "Launch an all-out sect war!"
 murim_sect.0200.b: "Challenge their leader to single combat."
 murim_sect.0200.c: "Seek peace through negotiation."
 murim_sect.0210.t: "Duel for Sect Supremacy"
 murim_sect.0210.desc: "The appointed day arrives. Two sect leaders face each other across a field of trampled grass as hundreds of disciples line the hillside in tense silence. This duel will determine which sect stands supreme. There is no room for hesitation."
 murim_sect.0210.a: "Draw my weapon and fight!"
 murim_sect.0300.t: "Elder Council Politics"
 murim_sect.0300.desc: "The elder council is fractured. Reformists push for modernization while traditionalists cling to the ancient ways. As a core disciple with growing influence, every faction seeks your allegiance. The choices you make here will reshape the sect for generations."
 murim_sect.0300.a: "Rally the younger disciples for reform."
 murim_sect.0300.b: "Align with the traditionalist elders."
 murim_sect.0300.c: "Play both sides for personal advantage."
 murim_sect.0300.d: "Challenge for sect leadership directly."
 murim_sect.0310.t: "The Leadership Challenge"
 murim_sect.0310.desc: "You stand before the assembled sect, having declared your challenge for the patriarch's seat. The current leader regards you with cold eyes. Everything you have built leads to this moment -- victory means supreme authority, defeat means exile or worse."
 murim_sect.0310.a: "Fate will decide. Let it begin."
 murim_sect.0400.t: "A Secret Disciple Revealed"
 murim_sect.0400.desc: "Your investigation has uncovered a startling truth -- someone within your court harbors a hidden identity. They carry secrets and cultivator abilities they have kept concealed from everyone. As sect leader, this revelation presents both opportunity and danger."
 murim_sect.0400.a: "Welcome them into the sect openly."
 murim_sect.0400.b: "Use their secret as leverage."
 murim_sect.0400.c: "Expose them publicly as a warning."
