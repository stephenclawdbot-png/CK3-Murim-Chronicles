l_english:
 # ===== IRON FIST GATE EXPANSION EVENTS =====
 murim_iron_fist_exp.0001.t: "The Iron Body Forging Furnace"
 murim_iron_fist_exp.0001.desc: "Deep beneath Iron Fist Gate's mountain lies the legendary volcanic furnace. Only those who have completed Stage Three Iron Body training may attempt this final tempering. The heat within could forge your body into something beyond human... or reduce it to ash."
 murim_iron_fist_exp.0001.a: "Enter the furnace with pure body conditioning"
 murim_iron_fist_exp.0001.b: "Use qi reinforcement during the forging"
 murim_iron_fist_exp.0001.c: "Decline - the furnace is not worth the risk"
 
 murim_iron_fist_exp.0002.t: "Mountain Splitting Competition"
 murim_iron_fist_exp.0002.desc: "Iron Fist Gate hosts its annual Mountain Splitting Competition. Martial artists from all nine clans are invited to test their raw physical strength. No weapons, no qi tricks - only the power of your body matters here."
 murim_iron_fist_exp.0002.a: "Compete with raw strength"
 murim_iron_fist_exp.0002.b: "Use a special technique during the contest"
 murim_iron_fist_exp.0002.c: "Forfeit graciously to show respect"
 
 murim_iron_fist_exp.0003.t: "Reformist Rebellion"
 murim_iron_fist_exp.0003.desc: "The Reformist faction within Iron Fist Gate has risen up. They demand the right to incorporate qi cultivation alongside traditional body training. The Traditionalist elders call this betrayal of everything Iron Fist stands for. As a leader, you must decide the Gate's future."
 murim_iron_fist_exp.0003.a: "Crush the rebellion with force"
 murim_iron_fist_exp.0003.b: "Negotiate a compromise"
 murim_iron_fist_exp.0003.c: "Side with the reformists"
 
 murim_iron_fist_exp.0004.t: "Fist Against Blade"
 murim_iron_fist_exp.0004.desc: "The eternal rivalry between Iron Fist Gate and Phantom Blade Sect erupts once more. A Phantom Blade fighter has issued an open challenge: can a fist truly break a blade? The honor of your entire clan rests on your answer."
 murim_iron_fist_exp.0004.a: "Fight bare-fisted against their blade"
 murim_iron_fist_exp.0004.b: "Challenge them to weaponless combat"
 murim_iron_fist_exp.0004.c: "Refuse - this rivalry is pointless"
 
 murim_iron_fist_exp.0005.t: "Body Cultivation Breakthrough"
 murim_iron_fist_exp.0005.desc: "After years of relentless training, you feel your body transforming at the deepest level. Your skin hardens like metal, your bones grow denser than steel. This is the legendary state that Iron Fist Gate's founder achieved - complete physical transcendence."
 murim_iron_fist_exp.0005.a: "Push through the pain barrier"
 murim_iron_fist_exp.0005.b: "Meditate on the body-mind connection"
 murim_iron_fist_exp.0005.c: "Abandon the attempt - not ready yet"
 
 murim_iron_fist_exp.0006.t: "The Gate Guardian Challenge"
 murim_iron_fist_exp.0006.desc: "Iron Fist Gate's strongest disciple stands as the Gate Guardian - an open challenge to any martial artist brave enough to test their skills. Defeating the Guardian earns fame across all nine clans. But the Guardian's iron body has broken many challengers before."
 murim_iron_fist_exp.0006.a: "Challenge the Guardian head-on"
 murim_iron_fist_exp.0006.b: "Study the Guardian's stance before fighting"
 murim_iron_fist_exp.0006.c: "Pay respects and leave"
 
 # ===== BEGGAR SECT EXPANSION EVENTS =====
 murim_beggar_exp.0001.t: "Clean vs Dirty Faction Showdown"
 murim_beggar_exp.0001.desc: "The tensions between the Clean Faction and Dirty Faction of the Beggar Sect have reached a breaking point. The Clean Faction, backed by wealthy patrons, demands more influence. The Dirty Faction, the true beggars who built this sect from nothing, refuse to yield. Someone must settle this before the sect tears itself apart."
 murim_beggar_exp.0001.a: "Call for a martial contest to settle it"
 murim_beggar_exp.0001.b: "Propose a democratic vote among all members"
 murim_beggar_exp.0001.c: "Secretly eliminate the rival"
 
 murim_beggar_exp.0002.t: "Intelligence Network Breakthrough"
 murim_beggar_exp.0002.desc: "Your network of beggar-spies has uncovered critical intelligence. The information could change the balance of power in the murim world. What you do with this knowledge will define your legacy."
 murim_beggar_exp.0002.a: "Share intelligence with the Orthodox Alliance"
 murim_beggar_exp.0002.b: "Sell the intelligence to the highest bidder"
 murim_beggar_exp.0002.c: "Use the intelligence for personal leverage"
 
 murim_beggar_exp.0003.t: "Eighteen Dragon Subduing Palms"
 murim_beggar_exp.0003.desc: "The time has come to learn the Beggar Sect's ultimate combat technique - the Eighteen Dragon Subduing Palms. Each palm strike carries the weight and fury of a dragon. Only the Sect Chief and their chosen successor may attempt to master this legendary art."
 murim_beggar_exp.0003.a: "Train all 18 palms sequentially"
 murim_beggar_exp.0003.b: "Focus only on the 3 most devastating palms"
 murim_beggar_exp.0003.c: "Decline the training for now"
 
 murim_beggar_exp.0004.t: "Beggar King Succession Crisis"
 murim_beggar_exp.0004.desc: "The position of Beggar Sect Chief is vacant, and the legendary Dog Beating Staff must be passed to a new leader. Multiple candidates have emerged, each backed by different factions within the sect. The succession must be decided before the sect fractures."
 murim_beggar_exp.0004.a: "Claim the staff through martial superiority"
 murim_beggar_exp.0004.b: "Rally the elders to vote for you"
 murim_beggar_exp.0004.c: "Withdraw candidacy to preserve unity"
 
 murim_beggar_exp.0005.t: "Undercover Mission"
 murim_beggar_exp.0005.desc: "The Beggar Sect's intelligence division has identified a critical gap in knowledge about the unorthodox factions. Someone must go undercover in an enemy clan to gather secrets. It is the most dangerous assignment in the sect - deep cover, alone, surrounded by enemies."
 murim_beggar_exp.0005.a: "Go deep cover yourself"
 murim_beggar_exp.0005.b: "Send a subordinate instead"
 murim_beggar_exp.0005.c: "Abort the mission - too risky"
 
 murim_beggar_exp.0006.t: "Beggar Sect Mass Gathering"
 murim_beggar_exp.0006.desc: "Thousands of Beggar Sect members from across the realm converge for the annual mass gathering. Intelligence is shared, disputes are settled, new members are initiated, and the Chief delivers the annual address. This is the lifeblood of the sect."
 murim_beggar_exp.0006.a: "Focus on recruitment"
 murim_beggar_exp.0006.b: "Focus on intelligence sharing"
 murim_beggar_exp.0006.c: "Use the gathering for political maneuvering"
 murim_beggar_exp.0006.d: "Challenge someone during the gathering"
 
 # ===== WUDANG EXPANSION EVENTS =====
 murim_wudang_exp.0001.t: "Tai Chi Grandmaster Enlightenment"
 murim_wudang_exp.0001.desc: "After decades of practice and meditation, you stand at the threshold of true Tai Chi mastery. The unity of yin and yang, hardness and softness, stillness and motion - all converging into a single moment of perfect clarity. Your movements become water: soft yet unstoppable, yielding yet unbreakable."
 murim_wudang_exp.0001.a: "Embrace the moment of perfect stillness"
 murim_wudang_exp.0001.b: "Seek a sparring partner to test the insight"
 murim_wudang_exp.0001.c: "Return to meditation - not yet ready"
 
 murim_wudang_exp.0002.t: "Sword vs Palm: The Eternal Debate"
 murim_wudang_exp.0002.desc: "Wudang's internal philosophical divide erupts again. The Sword faction believes the Wudang sword is the sect's very soul. The Palm faction counters that Tai Chi palm negates all weapons and represents true mastery. Both sides demand a demonstration duel to prove their point."
 murim_wudang_exp.0002.a: "Champion the sword tradition"
 murim_wudang_exp.0002.b: "Champion the palm tradition"
 murim_wudang_exp.0002.c: "Declare both paths equally valid"
 
 murim_wudang_exp.0003.t: "Wudang-Shaolin Summit"
 murim_wudang_exp.0003.desc: "The two greatest pillars of orthodox martial arts meet on neutral ground. Wudang and Shaolin must coordinate their response to growing unorthodox aggression. But beneath the diplomacy lies the question that has divided them for centuries: who truly leads the Orthodox Alliance?"
 murim_wudang_exp.0003.a: "Propose joint military action against the Heavenly Demon"
 murim_wudang_exp.0003.b: "Propose a shared training exchange program"
 murim_wudang_exp.0003.c: "Assert Wudang's right to lead the alliance"
 
 murim_wudang_exp.0004.t: "Yin-Yang Imbalance Crisis"
 murim_wudang_exp.0004.desc: "A senior Wudang disciple's cultivation has gone terribly wrong. Their yang qi has overwhelmed their yin, turning their gentle martial arts violent and destructive. They lash out uncontrollably, endangering fellow disciples. The sect must act before someone dies."
 murim_wudang_exp.0004.a: "Use Tai Chi to realign their qi"
 murim_wudang_exp.0004.b: "Seal their meridians to contain the damage"
 murim_wudang_exp.0004.c: "Let nature take its course"
 
 murim_wudang_exp.0005.t: "Mountain Hermit Discovery"
 murim_wudang_exp.0005.desc: "A mysterious hermit has been found living in a cave on Wudang Mountain. They move with a grace that suggests mastery of techniques lost to the sect centuries ago. This could be a blessing from the ancestors... or a trap laid by enemies."
 murim_wudang_exp.0005.a: "Invite the hermit to teach at Wudang"
 murim_wudang_exp.0005.b: "Challenge the hermit to prove their skill"
 murim_wudang_exp.0005.c: "Drive the hermit away"
 
 murim_wudang_exp.0006.t: "Wudang Successor Selection"
 murim_wudang_exp.0006.desc: "The time has come to choose the next Sect Master of Wudang. Unlike the violent successions of other clans, Wudang values wisdom and balance above raw power. But not every disciple agrees with your choice, and ambition knows no philosophy."
 murim_wudang_exp.0006.a: "Announce your chosen successor publicly"
 murim_wudang_exp.0006.b: "Train both candidates and let merit decide"
 murim_wudang_exp.0006.c: "Delay the decision"
