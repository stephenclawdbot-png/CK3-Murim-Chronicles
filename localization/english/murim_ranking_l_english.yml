 murim_ranked_top_10_modifier:0 "Ranked Top 10 Martial Artist"
 murim_ranked_top_10_modifier_desc:0 "A legendary fighter whose name is known in every corner of the martial world."
 murim_ranked_top_5_modifier:0 "Ranked Top 5 Martial Artist"
