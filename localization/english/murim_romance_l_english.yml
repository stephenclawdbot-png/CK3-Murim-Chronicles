 # ============================================================
 # POLITICS EVENT LOCALIZATION
 # ============================================================
 murim_politics.0001.t:0 "Martial Alliance Formation"
 murim_politics.0001.desc:0 "The leaders of several righteous sects gather at Mount Hua for an unprecedented summit. A rising darkness threatens the martial world -- the demonic sects grow bolder by the day. Only a united alliance can stand against them."
 murim_politics.0002.t:0 "Wulin Congress"
 murim_politics.0002.desc:0 "Once every ten years, the Wulin Congress convenes. Representatives from every major sect attend to settle disputes, establish new rules, and elect the Martial Alliance Leader."
 murim_politics.0003.t:0 "Inter-Sect Diplomacy"
 murim_politics.0003.desc:0 "An emissary from a neighboring sect arrives bearing gifts and a proposal for cooperation."
 murim_politics.0004.t:0 "Marriage Alliance Proposal"
 murim_politics.0004.desc:0 "A powerful sect has proposed a marriage alliance between their young prodigy and your most talented disciple."
 murim_politics.0005.t:0 "Trade Negotiations"
 murim_politics.0005.desc:0 "Rare medicinal herbs, spirit stones, and cultivation resources are at stake as two sects negotiate a trade agreement."
 murim_politics.0006.t:0 "Territory Dispute"
 murim_politics.0006.desc:0 "Sacred training grounds lie at the border between two sects. Both claim rightful ownership of this qi-rich territory."
 murim_politics.0007.t:0 "Peace Summit"
 murim_politics.0007.desc:0 "After years of bloody sect warfare, exhausted elders from both sides agree to meet at a neutral tea house."
 murim_politics.0008.t:0 "Betrayal Pact Discovered"
 murim_politics.0008.desc:0 "Your spies intercept a secret message -- two rival sects have formed a pact to destroy yours!"
 murim_politics.0009.t:0 "Alliance War Declaration"
 murim_politics.0009.desc:0 "The Martial Alliance drums thunder across the mountains. War has been declared against the demonic sects."
 murim_politics.0010.t:0 "Vassal Sect Tribute Demand"
 murim_politics.0010.desc:0 "A more powerful sect demands tribute from your sect, claiming ancient rights of superiority."

 # ============================================================
 # FATE EVENT LOCALIZATION
 # ============================================================
 murim_fate.0001.t:0 "Heavenly Tribulation Descends"
 murim_fate.0001.desc:0 "Black clouds gather overhead. Lightning crackles with the fury of the heavens themselves. Your cultivation has reached a threshold -- the heavens demand you prove your worth."
 murim_fate.0002.t:0 "Karmic Debt Comes Due"
 murim_fate.0002.desc:0 "A mysterious monk appears before you, speaking of debts from a past life. The karma you carry weighs heavy on your cultivation."
 murim_fate.0003.t:0 "Reincarnation Memories"
 murim_fate.0003.desc:0 "In dreams, you glimpse another life -- a powerful cultivator who once stood at the apex of the martial world. These memories feel more real than real."
 murim_fate.0004.t:0 "Prophecy Revealed"
 murim_fate.0004.desc:0 "An ancient oracle stone in a forgotten temple blazes to life as you approach. The prophecy etched in its surface speaks of you."
 murim_fate.0005.t:0 "The Chosen One Emerges"
 murim_fate.0005.desc:0 "Celestial signs appear across the martial world -- a comet, a double sunrise, flowers blooming in winter. The ancient texts speak of these signs heralding the Chosen One."
 murim_fate.0006.t:0 "Destiny's Fork"
 murim_fate.0006.desc:0 "At the crossroads of fate, two paths stretch before you. One leads to supreme power through righteous cultivation. The other promises faster growth through the demonic dao."
 murim_fate.0007.t:0 "Ancestral Spirit Vision"
 murim_fate.0007.desc:0 "During deep meditation, the spirit of your ancestor appears, revealing secrets of a lost cultivation technique."
 murim_fate.0008.t:0 "Heaven's Judgment"
 murim_fate.0008.desc:0 "The heavens have taken notice of your actions. A celestial being descends to pass judgment on your deeds."
 murim_fate.0009.t:0 "Cosmic Alignment"
 murim_fate.0009.desc:0 "Stars align in a pattern not seen for ten thousand years. The spiritual energy of the world surges."
 murim_fate.0010.t:0 "Fate-Defying Breakthrough"
 murim_fate.0010.desc:0 "You stand against the very heavens themselves, refusing to accept the fate decreed for you. If you can survive this tribulation, you will transcend mortal limitations."

 # ============================================================
 # DAILY LIFE EVENT LOCALIZATION (Events 11-20)
 # ============================================================
 murim_daily_life.0011.t:0 "Scholar of the Martial Arts"
 murim_daily_life.0011.desc:0 "A scholar travels the jianghu, recording the histories and techniques of every sect. They request permission to observe your training."
 murim_daily_life.0012.t:0 "Poisoned Wine at a Banquet"
 murim_daily_life.0012.desc:0 "At a grand banquet between martial artists, you notice something wrong with the wine. Your cultivation senses detect a faint toxin."
 murim_daily_life.0013.t:0 "Orphan with Martial Talent"
 murim_daily_life.0013.desc:0 "A starving orphan child demonstrates extraordinary martial talent in a street fight against thugs twice their size."
 murim_daily_life.0014.t:0 "Ancient Tomb Discovery"
 murim_daily_life.0014.desc:0 "Farmers report strange lights emanating from a hillside. Investigation reveals the entrance to an ancient cultivator's tomb."
 murim_daily_life.0015.t:0 "Bridge Guardian Challenge"
 murim_daily_life.0015.desc:0 "A lone martial artist blocks the only bridge across the river, challenging all who pass to a friendly bout."
 murim_daily_life.0016.t:0 "Spirit Beast in the Mountains"
 murim_daily_life.0016.desc:0 "Hunters report a spirit beast prowling the nearby mountains. It has already killed three experienced martial artists."
 murim_daily_life.0017.t:0 "Calligraphy Master's Insight"
 murim_daily_life.0017.desc:0 "An elderly calligraphy master demonstrates brush strokes that seem to contain martial intent. Each character they write resonates with qi."
 murim_daily_life.0018.t:0 "Flood Threatens the Village"
 murim_daily_life.0018.desc:0 "Heavy rains threaten to flood the local village. The dam is cracking. Only someone with immense cultivation power could reinforce it."
 murim_daily_life.0019.t:0 "Mysterious Night Music"
 murim_daily_life.0019.desc:0 "Every night for a week, haunting flute music echoes from the forest. Those who follow the sound return changed -- some enlightened, some mad."
 murim_daily_life.0020.t:0 "Retired Grandmaster's Garden"
 murim_daily_life.0020.desc:0 "You stumble upon a beautiful garden tended by an unassuming old person. Something about their movements suggests a lifetime of supreme martial mastery."

 # ============================================================
 # TRAINING EVENT LOCALIZATION
 # ============================================================
 murim_training.0001.t:0 "Training Montage"
 murim_training.0001.desc:0 "Months of grueling training await. Every day begins before dawn and ends long after sunset. Your muscles scream, your qi burns, but you grow stronger."
 murim_training.0002.t:0 "Sparring Partner Encounter"
 murim_training.0002.desc:0 "A fellow cultivator of similar strength offers to spar. Both of you could benefit from testing your skills."
 murim_training.0003.t:0 "Waterfall Meditation"
 murim_training.0003.desc:0 "Standing beneath a roaring waterfall, the cold water pounds your body while you focus your qi inward. This ancient training method strengthens both body and spirit."
 murim_training.0004.t:0 "Iron Body Tempering"
 murim_training.0004.desc:0 "You submerge yourself in a cauldron of medicinal herbs, enduring the burning sensation as the mixture tempers your flesh and bones."
 murim_training.0005.t:0 "Thousand Steps Challenge"
 murim_training.0005.desc:0 "A thousand stone steps lead up to the summit of a sacred peak. Each step drains qi. Only those with the strongest will reach the top."
 murim_training.0006.t:0 "Blindfolded Combat Training"
 murim_training.0006.desc:0 "Your master blindfolds you and attacks without warning. You must learn to sense killing intent through qi alone."
 murim_training.0007.t:0 "Weight Training in Gravity Formation"
 murim_training.0007.desc:0 "An ancient formation array multiplies gravity tenfold. Every movement becomes a struggle, but the gains are extraordinary."
 murim_training.0008.t:0 "Master's Secret Training Ground"
 murim_training.0008.desc:0 "Your master reveals a hidden training ground, rich in spiritual energy and protected by ancient formations."
 murim_training.0009.t:0 "Spirit Beast Taming Training"
 murim_training.0009.desc:0 "A wild spirit beast must be subdued through martial force and spiritual connection. Only the worthy may bond with such a creature."
 murim_training.0010.t:0 "Life and Death Training"
 murim_training.0010.desc:0 "Your master throws you into a pit of venomous creatures. Survive, and your cultivation will advance dramatically. Fail, and..."

 # ============================================================
 # MENTOR EVENT LOCALIZATION
 # ============================================================
 murim_mentor.0001.t:0 "Finding a Master"
 murim_mentor.0001.desc:0 "A legendary cultivator agrees to consider you as a disciple -- but first, you must pass their test."
 murim_mentor.0002.t:0 "Master's Test of Character"
 murim_mentor.0002.desc:0 "Your potential master presents a moral dilemma. There is no right answer -- only the answer that reveals your true nature."
 murim_mentor.0003.t:0 "First Lesson"
 murim_mentor.0003.desc:0 "Your master begins your training with the most basic stance. You spend three months just standing until your legs give out."
 murim_mentor.0004.t:0 "Master's Past Revealed"
 murim_mentor.0004.desc:0 "You discover your master has a dark past -- they were once a feared cultivator of the demonic path."
 murim_mentor.0005.t:0 "Master's Secret Technique"
 murim_mentor.0005.desc:0 "After years of devoted service, your master reveals their ultimate technique -- one they have never taught before."
 murim_mentor.0006.t:0 "Master Falls Ill"
 murim_mentor.0006.desc:0 "Your master collapses during training. An old injury from a battle decades ago has resurfaced. Without rare medicine, they will perish."
 murim_mentor.0007.t:0 "Master's Final Words"
 murim_mentor.0007.desc:0 "Your master sits beneath the ancient tree where they first accepted you as a disciple. Their qi is fading. They have one last lesson to impart."
 murim_mentor.0008.t:0 "Legacy of the Master"
 murim_mentor.0008.desc:0 "With your master gone, the weight of their legacy falls upon your shoulders. Their sect, their techniques, their unfinished business -- all yours to carry."
 murim_mentor.0009.t:0 "Betrayal of the Master"
 murim_mentor.0009.desc:0 "Your fellow disciple has betrayed the master, stealing the sect's sacred manual and fleeing to a demonic cult."
 murim_mentor.0010.t:0 "Surpassing the Master"
 murim_mentor.0010.desc:0 "The moment has come. Your cultivation has surpassed your master's. The student has exceeded the teacher. What happens next defines your legacy."
