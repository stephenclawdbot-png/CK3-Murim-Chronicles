l_english:
 murim_martial_artist: "Martial Artist"
 murim_martial_artist_desc: "A practitioner of the martial arts, walking the path of the jianghu. Whether orthodox or unorthodox, they have dedicated their life to combat and cultivation."
 murim_mount_hua_clan: "Mount Hua Sect"
 murim_mount_hua_clan_desc: "A member of the Mount Hua Sect, renowned for their elegant swordsmanship and righteous spirit."
 murim_shaolin_clan: "Shaolin Temple"
 murim_shaolin_clan_desc: "A practitioner of Shaolin martial arts, combining Buddhist wisdom with devastating combat techniques."
 murim_wudang_clan: "Wudang Sect"
 murim_wudang_clan_desc: "A disciple of the Wudang Sect, masters of internal energy cultivation and Tai Chi principles."
 murim_tang_clan: "Tang Clan"
 murim_tang_clan_desc: "A member of the Tang Clan, specialists in hidden weapons, poisons, and mechanical traps."
 murim_beggar_sect_clan: "Beggar Sect"
 murim_beggar_sect_clan_desc: "A member of the Beggar Sect, the largest intelligence network in the jianghu with eyes and ears everywhere."
 murim_iron_fist_clan: "Iron Fist Gate"
 murim_iron_fist_clan_desc: "A practitioner of the Iron Fist Gate, known for overwhelming physical power and body-hardening techniques."
 murim_heavenly_demon_clan: "Heavenly Demon Sect"
 murim_heavenly_demon_clan_desc: "A member of the Heavenly Demon Sect, the most feared unorthodox faction. Their demonic arts corrupt the body but grant terrifying power."
 murim_poison_flower_clan: "Poison Flower Palace"
 murim_poison_flower_clan_desc: "A member of the Poison Flower Palace, masters of exotic poisons and seductive deception."
 murim_phantom_blade_clan: "Phantom Blade Sect"
 murim_phantom_blade_clan_desc: "A member of the Phantom Blade Sect, assassins who strike from the shadows with lethal precision."
 murim_body_tempering_1: "Body Tempering: Iron Stage"
 murim_body_tempering_1_desc: "The first stage of body tempering — your flesh has been hardened through grueling physical training."
 murim_body_tempering_2: "Body Tempering: Steel Stage"
 murim_body_tempering_2_desc: "The second stage of body tempering — your bones and sinews have been refined to steel-like resilience."
 murim_body_tempering_3: "Body Tempering: Diamond Stage"
 murim_body_tempering_3_desc: "The third stage of body tempering — your body approaches the limits of mortal endurance."
 murim_fist_initiate: "Fist Art Initiate"
 murim_fist_initiate_desc: "You have begun training in fist arts — basic forms and striking techniques."
 murim_fist_adept: "Fist Art Adept"
 murim_fist_adept_desc: "Your fist technique has reached the adept level — qi flows through your strikes with devastating effect."
 murim_fist_master: "Fist Art Master"
 murim_fist_master_desc: "A true master of fist arts. Your punches can shatter stone and your forms are flawless."
 murim_palm_initiate: "Palm Art Initiate"
 murim_palm_initiate_desc: "You have begun training in palm arts — learning to channel qi through open-hand techniques."
 murim_palm_adept: "Palm Art Adept"
 murim_palm_adept_desc: "Your palm technique channels devastating internal energy. A single palm strike can rupture meridians."
 murim_grandmaster: "Grandmaster"
 murim_grandmaster_desc: "A grandmaster of the martial arts — one who has transcended mastery to forge their own path. Their very presence commands respect."
 murim_elder: "Sect Elder"
 murim_elder_desc: "A venerable elder of the martial world, whose decades of experience and wisdom make them invaluable to any sect."
 cultivation_stage_3: "Core Formation"
 cultivation_stage_3_desc: "You have reached the third stage of cultivation — Core Formation. Your dantian has crystallized a qi core, vastly increasing your power."
 cultivation_stage_4: "Nascent Soul"
 cultivation_stage_4_desc: "You have reached the fourth stage of cultivation — Nascent Soul. A spiritual entity has formed within your core, granting power beyond mortal limits."
 murim_rank_absolute: "Absolute Realm"
 murim_rank_absolute_desc: "You have reached the Absolute Realm — the pinnacle of martial arts. Only a handful in all of history have stood at this height."
 murim_rank_transcendent: "Transcendent Realm"
 murim_rank_transcendent_desc: "You have entered the Transcendent Realm, surpassing what most martial artists believe possible. Your techniques bend the laws of nature."
 murim_rank_peak: "Peak Realm"
 murim_rank_peak_desc: "You stand at the Peak Realm — among the mightiest martial artists of the current era. Few dare challenge you."
 murim_dark_horse: "Dark Horse"
 murim_dark_horse_desc: "An unknown fighter who emerged from obscurity to shock the martial world. No one saw you coming."
 murim_grand_tournament_champion: "Grand Tournament Champion"
 murim_grand_tournament_champion_desc: "Champion of the Grand Tournament — the supreme martial competition held once a decade. Your name echoes across the jianghu."
 murim_lord_of_murim: "Lord of Murim"
 murim_lord_of_murim_desc: "The undisputed lord of the martial world. All sects bow before your authority, all fighters acknowledge your supremacy."
 murim_combat_trauma_tournament_loss: "Tournament Trauma"
 murim_combat_trauma_tournament_loss_desc: "A devastating loss in tournament competition has left psychological scars. The memory of defeat haunts your every step."
