l_english:
 # =============================================
 # SECT WAR EVENTS LOCALIZATION
 # 5 large-scale sect warfare events
 # =============================================

 # --- Event 1: Sect Fortress Siege ---
 murim_sect_war.0001.t:0 "Sect Fortress Siege"
 murim_sect_war.0001.desc:0 "The mountain fortress of [siege_defender.GetName]'s sect rises before your assembled forces. Its walls are reinforced with ancient formation arrays that shimmer with protective qi. Banners snap in the wind as defenders line the ramparts, their killing intent washing over your army in waves. Months of conflict have led to this moment - the decisive siege that will determine which sect survives. Your disciples look to you for orders."
 murim_sect_war.0001.a:0 "I will lead the charge personally! Storm the gates!"
 murim_sect_war.0001.b:0 "Send the outer disciples first. I will direct from the rear."
 murim_sect_war.0001.c:0 "Offer terms before blood is spilled. There has been enough death."

 # --- Event 2: Battlefield Betrayal ---
 murim_sect_war.0002.t:0 "Betrayal on the Battlefield"
 murim_sect_war.0002.desc:0 "The battle was going well - your forces advancing, the enemy retreating - when suddenly your allied sect turns their weapons on YOUR people. Formation arrays reverse. Friendly qi blasts slam into your flank. The shock paralyzes your disciples for one horrific moment as they realize the truth: your allies have been bought. You are surrounded on all sides by enemies who, moments ago, fought beside you."
 murim_sect_war.0002.a:0 "Cut through them all! My blade knows no ally or enemy - only the way forward!"
 murim_sect_war.0002.b:0 "Use the chaos to fake my death and escape unseen."
 murim_sect_war.0002.c:0 "Rally every loyal disciple! We make our last stand HERE!"

 # --- Event 3: War Council Strategy ---
 murim_sect_war.0003.t:0 "War Council Strategy"
 murim_sect_war.0003.desc:0 "The war room is thick with tension as your elders gather around the map table. Wooden markers represent sect positions, supply lines, and contested territories. The enemy has proven more resilient than expected, and your resources are stretched thin. Three strategies have been proposed, each carrying different risks. The fate of your sect rests on this decision."
 murim_sect_war.0003.a:0 "Full offensive! Crush them before they can regroup."
 murim_sect_war.0003.b:0 "Fortify and attrit. Let them break themselves against our walls."
 murim_sect_war.0003.c:0 "Send assassins to eliminate their leadership in the shadows."

 # --- Event 4: Champion Duel Before Armies ---
 murim_sect_war.0004.t:0 "Champion Duel Before the Armies"
 murim_sect_war.0004.desc:0 "Both armies stand in perfect silence across the blood-soaked valley. By ancient murim custom, a war may be decided by single combat between sect champions. [enemy_champion.GetName] steps forward from the enemy ranks, their killing aura making the air itself tremble. Thousands of eyes turn to you. Your sect's honor, influence, and very survival now rest on one duel."
 murim_sect_war.0004.a:0 "Hold nothing back. Every technique, every ounce of qi - this ends NOW."
 murim_sect_war.0004.b:0 "Reveal my secret technique. Let them witness power they never imagined."
 murim_sect_war.0004.c:0 "I nominate another champion. This fight is beneath my station."

 # --- Event 5: Sect Annihilation Aftermath ---
 murim_sect_war.0005.t:0 "Ruins of a Fallen Sect"
 murim_sect_war.0005.desc:0 "Where a proud sect once stood, only ruins remain. Shattered formation pillars jut from scorched earth like broken bones. The sect's great hall is a hollow shell, its rafters collapsed inward. Scattered across the grounds lie the remnants of a martial legacy - torn technique scrolls, cracked weapons, abandoned robes still bearing the sect's emblem. A few survivors huddle in the wreckage, their eyes hollow. The murim world is one sect smaller today."
 murim_sect_war.0005.a:0 "Claim everything. Their techniques, their influence - all mine now."
 murim_sect_war.0005.b:0 "Show mercy. Adopt the survivors into our sect."
 murim_sect_war.0005.c:0 "Burn it all. Leave nothing. Let this be a warning to every sect."

 # =============================================
 # POISON ARTS EVENTS LOCALIZATION
 # 5 poison/alchemy combat events
 # =============================================

 # --- Event 1: Venomous Technique Awakening ---
 murim_poison.0001.t:0 "Venomous Qi Awakening"
 murim_poison.0001.desc:0 "A strange tingling spreads through your meridians, and your qi takes on a sickly green hue. Your fingers leave withered marks on surfaces you touch. Plants near you curl and die. The truth is undeniable - your body has developed an affinity for poison qi, one of the most feared and reviled cultivation paths in the murim world. Orthodox sects execute poison cultivators on sight. But the power... the power is intoxicating."
 murim_poison.0001.a:0 "Embrace the poison path. Power is power, regardless of its color."
 murim_poison.0001.b:0 "Suppress it immediately! This is an evil path I will not walk."
 murim_poison.0001.c:0 "Seek a master who understands poison cultivation."

 # --- Event 2: Alchemy Laboratory Catastrophe ---
 murim_poison.0002.t:0 "Alchemy Laboratory Catastrophe"
 murim_poison.0002.desc:0 "The pill furnace shakes violently as cracks spiderweb across its surface. Toxic smoke billows in green and purple clouds as the spiritual herbs inside react in ways you never predicted. The temperature is rising exponentially - the unstable spiritual energy is about to detonate. Your disciples are frozen in terror behind you. You have seconds to act before the entire laboratory is consumed in a toxic explosion."
 murim_poison.0002.a:0 "Channel my qi into a barrier! Contain the explosion!"
 murim_poison.0002.b:0 "Shield the disciples! I'll absorb the blast myself!"
 murim_poison.0002.c:0 "Flee the laboratory - now! Nothing can stop this!"

 # --- Event 3: Poisoned at a Banquet ---
 murim_poison.0003.t:0 "Poisoned at the Banquet"
 murim_poison.0003.desc:0 "The wine tasted slightly bitter - you noticed too late. Within moments, your meridians begin to burn as an insidious toxin spreads through your blood. Your vision swims. Your qi circulation falters. Across the banquet table, you catch a flicker of satisfied malice on someone's face before they school their expression. You have been poisoned at what was supposed to be a gathering of allies. The room spins as the venom reaches your dantian."
 murim_poison.0003.a:0 "Circulate my qi at maximum speed! Burn the poison out from within!"
 murim_poison.0003.b:0 "Induce vomiting and find an alchemist immediately!"
 murim_poison.0003.c:0 "Swallow the bezoar pill I always carry for emergencies."

 # --- Event 4: Poison Immunity Training ---
 murim_poison.0004.t:0 "Poison Immunity Training"
 murim_poison.0004.desc:0 "Seven vials stand before you on the stone table, each containing a different deadly poison. The Sevenfold Venom Immunity Method requires ingesting all seven in sequence - each one more lethal than the last. Those who survive gain a body impervious to all poisons. Those who fail... well, the training ground is surrounded by unmarked graves. Your hands are steady as you reach for the first vial."
 murim_poison.0004.a:0 "All seven in seven days. Full commitment. No turning back."
 murim_poison.0004.b:0 "Take the gradual path - small doses over several years."
 murim_poison.0004.c:0 "This is madness. I will find another way to defend against poison."

 # --- Event 5: Antidote Quest ---
 murim_poison.0005.t:0 "Race for the Antidote"
 murim_poison.0005.desc:0 "The poison spreads with each heartbeat, darkening veins and weakening qi. Without an antidote, death is certain - the only question is when. Three paths lie before you: the legendary Poisonous Mist Valley where the rarest medicinal herbs grow among deadly flora, the shadowy black market of the jianghu underworld where anything can be bought for the right price, or deep meditation to fight the poison with pure spiritual energy. Time is running out."
 murim_poison.0005.a:0 "Venture into the Poisonous Mist Valley for the Thousand Year Spirit Herb."
 murim_poison.0005.b:0 "The jianghu underground trades in antidotes. Find a dealer."
 murim_poison.0005.c:0 "Meditate and use internal qi to neutralize the poison slowly."

