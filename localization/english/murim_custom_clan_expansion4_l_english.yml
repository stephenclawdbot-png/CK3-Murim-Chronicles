l_english:
 murim_custom_clan_exp4.0001.t: "The Supreme Path Beckons"
 murim_custom_clan_exp4.0001.desc: "Your cultivation has reached the fifth realm, and your clan stands at the threshold of greatness. Three paths unfold before you — the way of martial supremacy, the way of transcendent wisdom, or the way of shadow sovereignty. Each will transform your clan's destiny irrevocably."
 murim_custom_clan_exp4.0001.a: "Walk the path of martial supremacy."
 murim_custom_clan_exp4.0001.b: "Walk the path of transcendent wisdom."
 murim_custom_clan_exp4.0001.c: "Walk the path of shadow sovereignty."
 murim_custom_clan_exp4.0002.t: "Trial of the Supreme Martial Lord"
 murim_custom_clan_exp4.0002.desc: "The path of martial supremacy demands proof. Somewhere in the world, a warrior of immense prowess awaits — not as an enemy, but as a measuring stone. If you can defeat them, you will ascend to a level of martial authority few have ever known."
 murim_custom_clan_exp4.0002.a: "Challenge the supreme trial opponent."
 murim_custom_clan_exp4.0002.b: "Continue training — not ready yet."
 murim_custom_clan_exp4.0002.c: "Pursue martial philosophy over raw combat."
 murim_custom_clan_exp4.0003.t: "Attaining Supreme Wisdom"
 murim_custom_clan_exp4.0003.desc: "Years of meditation and study have brought you to the edge of enlightenment. The texts of a hundred fallen masters, the patterns of heaven and earth, the flow of qi through all living things — it all connects. One final step remains to become a sage of ages."
 murim_custom_clan_exp4.0003.a: "Attain supreme enlightenment."
 murim_custom_clan_exp4.0003.b: "Continue seeking — wisdom has no end."
 murim_custom_clan_exp4.0003.c: "Share your wisdom with the world."
 murim_custom_clan_exp4.0004.t: "Becoming the Shadow Sovereign"
 murim_custom_clan_exp4.0004.desc: "Your network of informants, assassins, and hidden allies spans the martial world. From the shadows, you have manipulated events that others believe to be fate. Now the final weave comes together — become the unseen hand that guides all of murim, or remain in comfortable darkness."
 murim_custom_clan_exp4.0004.a: "Ascend as the Shadow Sovereign."
 murim_custom_clan_exp4.0004.b: "Expand the shadow network further."
 murim_custom_clan_exp4.0004.c: "Balance shadow with light — seek harmony."
 murim_custom_clan_exp4.0005.t: "Forging the Clan Legacy"
 murim_custom_clan_exp4.0005.desc: "Your clan has grown beyond what you dared imagine. Disciples fill the training grounds, your techniques are feared and respected, and your name is spoken across the martial world. The time has come to forge a legacy that will outlast even you — something eternal."
 murim_custom_clan_exp4.0005.a: "Forge a martial legacy for the ages."
 murim_custom_clan_exp4.0005.b: "Build an economic dynasty instead."
 murim_custom_clan_exp4.0005.c: "Create a spiritual legacy of enlightenment."
 murim_custom_clan_exp4.0006.t: "The Ultimate Technique"
 murim_custom_clan_exp4.0006.desc: "With your clan's legacy secured, the conditions are right to create something truly transcendent — a technique, a formation, or a philosophy that will define your clan for centuries. This is the culmination of everything you have built."
 murim_custom_clan_exp4.0006.a: "Create an ultimate personal technique."
 murim_custom_clan_exp4.0006.b: "Develop a devastating clan formation."
 murim_custom_clan_exp4.0006.c: "Write a profound clan philosophy text."
 murim_custom_clan_exp4.0007.t: "Seeking Recognition"
 murim_custom_clan_exp4.0007.desc: "Your clan has grown powerful, but power without recognition is shadow without substance. The established clans — Shaolin, Wudang, Mount Hua — hold the keys to legitimacy in the martial world. You must decide whether to seek their approval, forge your own path, or find darker allies."
 murim_custom_clan_exp4.0007.a: "Petition the orthodox clans for recognition."
 murim_custom_clan_exp4.0007.b: "We need no one's approval. Stand alone."
 murim_custom_clan_exp4.0007.c: "Seek alliance with the unorthodox instead."
 murim_custom_clan_exp4.0008.t: "The Orthodox Response"
 murim_custom_clan_exp4.0008.desc: "Your petition has been received. The orthodox elders deliberate behind closed doors, weighing your clan's merits against tradition and politics. The answer, when it comes, will reshape your clan's place in the martial world — for better or worse."
 murim_custom_clan_exp4.0008.a: "Acceptance! The orthodox acknowledge your clan."
 murim_custom_clan_exp4.0008.b: "Rejected. Use spite as fuel for greater ambition."
 murim_custom_clan_exp4.0008.c: "Conditional acceptance — pay the price they demand."
 murim_custom_clan_exp4.0009.t: "The Question of Succession"
 murim_custom_clan_exp4.0009.desc: "The years advance, and the question you have avoided can no longer be ignored: who will lead your clan when you are gone? Your child shows promise, but a talented vassal may be the stronger choice. Or perhaps the clan is not yet ready for the uncertainty of transition."
 murim_custom_clan_exp4.0009.a: "Name your child as heir to the clan."
 murim_custom_clan_exp4.0009.b: "Hold a meritocratic succession trial."
 murim_custom_clan_exp4.0009.c: "Delay the decision. There is still time."
 murim_custom_clan_exp4.0010.t: "The Succession Trial"
 murim_custom_clan_exp4.0010.desc: "Candidates from across your clan have assembled for the succession trial. Each one carries your teachings, but the strongest among them will determine whether your legacy endures or crumbles. The trial begins at dawn — let the worthy rise."
 murim_custom_clan_exp4.0010.a: "Let the strongest candidate lead."
 murim_custom_clan_exp4.0010.b: "Challenge the winner yourself — test their resolve."
 murim_custom_clan_exp4.0010.c: "Form a council of elders instead."
