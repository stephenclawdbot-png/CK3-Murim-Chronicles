l_english:
 murim_calamity_cycle.0001.t: "Omens of the Cycle: Heavenly Signs"
 murim_calamity_cycle.0001.desc: "The stars bleed crimson and the rivers run still. Ancient texts speak of these signs — the Great Calamity that devours all martial knowledge and resets the world. Your cultivation has reached a height where you can sense what others cannot: the cycle is turning once more."
 murim_calamity_cycle.0001.a: "Warn the Murim Alliance of impending doom."
 murim_calamity_cycle.0001.b: "Keep this knowledge secret and prepare alone."
 murim_calamity_cycle.0001.c: "Dismiss it as mere superstition."
 murim_calamity_cycle.0002.t: "A Warning from the Heavens"
 murim_calamity_cycle.0002.desc: "Word has reached your sect — a cultivator of great renown has read the heavenly signs and issued a dire warning. The Great Calamity approaches. Whether you believe the prophecy or not, prudence demands a response."
 murim_calamity_cycle.0002.a: "Fortify the sect and prepare defenses."
 murim_calamity_cycle.0002.b: "Ignore the warning and continue as normal."
 murim_calamity_cycle.0002.c: "Flee to the mountains with core disciples."
 murim_calamity_cycle.0003.t: "The Calamity Begins: Heaven Weeps"
 murim_calamity_cycle.0003.desc: "It has begun. The sky splits with thunder that carries no rain, and the earth groans beneath your feet. Martial artists across the land feel their qi destabilize. The Great Calamity is no longer prophecy — it is here, and the world of martial arts will never be the same."
 murim_calamity_cycle.0003.a: "Rally the clan for war!"
 murim_calamity_cycle.0003.b: "Protect the civilians first."
 murim_calamity_cycle.0003.c: "Seal yourself in meditation and endure."
 murim_calamity_cycle.0004.t: "The Great Extinction"
 murim_calamity_cycle.0004.desc: "The Calamity sweeps across the martial world like a scythe through wheat. Clans that stood for centuries crumble in days. The screams of the dying echo through mountain passes and bamboo groves alike. There is no negotiation with annihilation — only the slim hope of survival."
 murim_calamity_cycle.0004.a: "Face the storm with what courage remains."
 murim_calamity_cycle.0005.t: "Surviving the Calamity"
 murim_calamity_cycle.0005.desc: "The world burns around you, but your dynasty's flame refuses to die. Through martial prowess, cunning, or sheer will, you have endured what has destroyed countless others. Now you must decide how your bloodline will weather the final hours of this apocalypse."
 murim_calamity_cycle.0005.a: "Fight through it — my dynasty survives!"
 murim_calamity_cycle.0005.b: "Protect my family above all else."
 murim_calamity_cycle.0006.t: "Naming the Lost Age"
 murim_calamity_cycle.0006.desc: "The Calamity has passed, leaving a shattered world behind. As one of the few who survived and remembers, it falls to you to name the age that was lost. Future generations will know this era by whatever words you choose to speak into the silence."
 murim_calamity_cycle.0006.a: "Call it the Age of Shattering."
 murim_calamity_cycle.0006.b: "Name it the Crimson Twilight."
 murim_calamity_cycle.0006.c: "It shall be known as Heaven's Weeping."
 murim_calamity_cycle.0006.d: "Let the survivors name it themselves."
 murim_calamity_cycle.0007.t: "Tales of the Old Masters"
 murim_calamity_cycle.0007.desc: "The years weigh heavy, and with them comes the burden of memory. You are among the last who walked the world before the Calamity. The techniques of fallen grandmasters, the names of destroyed sects — all of it exists now only in your mind. What becomes of it is your choice."
 murim_calamity_cycle.0007.a: "Write the Chronicle of the Lost Era."
 murim_calamity_cycle.0007.b: "Pass down oral traditions to disciples."
 murim_calamity_cycle.0007.c: "Let the old world be forgotten."
 murim_calamity_cycle.0008.t: "From the Ashes: A New Sect"
 murim_calamity_cycle.0008.desc: "The Calamity destroyed the old martial order, but you still stand. Your cultivation remains, your will is unbroken, and scattered warriors look to you for guidance. The time has come to plant a new banner in the ruins and build something that will endure."
 murim_calamity_cycle.0008.a: "Found an orthodox sect — carry the righteous flame."
 murim_calamity_cycle.0008.b: "Found an unorthodox sect — the old rules failed us."
 murim_calamity_cycle.0008.c: "Found a neutral sect — beyond both paths."
 murim_calamity_cycle.0009.t: "The Pattern Repeats"
 murim_calamity_cycle.0009.desc: "Buried in ancient texts and carved into forgotten cave walls, you have found the terrible truth: the Calamity is not a singular event. It is a cycle — one that has destroyed and remade the martial world countless times before. And the signs suggest it will come again."
 murim_calamity_cycle.0009.a: "Attempt to break the cycle forever."
 murim_calamity_cycle.0009.b: "Build shelters for the next cycle."
 murim_calamity_cycle.0009.c: "Accept the cycle as heaven's will."
 murim_calamity_cycle.0010.t: "Dawn of the New Era"
 murim_calamity_cycle.0010.desc: "You have survived the Calamity and rebuilt from nothing. New sects train in the shadow of old ruins, and young martial artists speak of the lost age as legend. The martial world is reborn — smaller, scarred, but alive. And you stand at its center, the founder of what comes next."
 murim_calamity_cycle.0010.a: "Declare the Dawn of the New Murim!"
 murim_calamity_cycle.0010.b: "Let the new era emerge naturally."
