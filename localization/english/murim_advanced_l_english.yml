l_english:

 # ==========================================
 # MURIM CHRONICLES - ADVANCED EVENTS LOCALIZATION
 # Covers: Advanced Grind Events, Advanced Duel Events
 # Fight Memory, Ranker Death Memorials, Revenge Chains
 # ==========================================

 # ---------------------
 # ADVANCED GRIND EVENTS
 # ---------------------

 # 0100 - Closed-Door Cultivation
 murim_grind.0100.t:0 "Closed-Door Cultivation"
 murim_grind.0100.desc:0 "The walls of your chamber seem to press inward as you prepare for extended isolation. Scrolls of cultivation theory lie stacked beside jars of medicinal pills. The door will be sealed, and you will not emerge until your qi has transformed -- or your body has broken.\n\nThis is the path of the desperate and the devoted alike. Many enter closed-door cultivation. Not all emerge the same."
 murim_grind.0100.a:0 "Seal the door for half a year. [Standard Closed-Door Cultivation]"
 murim_grind.0100.b:0 "A full year of isolation. Let my qi transform or my body shatter. [Extreme Closed-Door]"
 murim_grind.0100.c:0 "The time is not right. I will prepare further."

 # 0101 - Seclusion Breakthrough Insight
 murim_grind.0101.t:0 "A Flash of Insight!"
 murim_grind.0101.desc:0 "Deep within seclusion, time has lost all meaning. Your meridians hum with accumulated qi, and the boundary between self and dao grows thin.\n\nThen -- like lightning splitting a midnight sky -- understanding crashes through you. A principle you have struggled with for years suddenly becomes crystalline. Your cultivation base trembles on the edge of transformation."
 murim_grind.0101.a:0 "Embrace the insight carefully. Let it settle into my foundation."
 murim_grind.0101.b:0 "Push further! Chase this enlightenment to its limit!"

 # 0102 - Seclusion Qi Deviation
 murim_grind.0102.t:0 "Qi Deviation in Seclusion!"
 murim_grind.0102.desc:0 "Your meridians burn. The carefully circulated qi has found a crack in your cultivation base and is rampaging through your body like a river breaking its banks.\n\nYour organs ache. Blood seeps from your nose. The walls of your seclusion chamber are the only witnesses to your agony. You must act quickly -- a full qi deviation in isolation could be fatal."
 murim_grind.0102.a:0 "Fight through it! Channel the rogue qi back under control!"
 murim_grind.0102.b:0 "Break seclusion immediately! Survival first!"
 murim_grind.0102.c:0 "Accept the deviation. Let the pain teach me where my foundation is weak."

 # 0200 - Sparring Partner Training
 murim_grind.0200.t:0 "A Sparring Opportunity"
 murim_grind.0200.desc:0 "[sparring_partner.GetFirstName] stands in the courtyard, working through forms with fluid precision. Your eyes meet across the training ground, and an unspoken challenge passes between you.\n\nTwo martial artists. One courtyard. The best way to sharpen a blade is against another blade."
 murim_grind.0200.a:0 "Friendly sparring -- we both benefit from practice."
 murim_grind.0200.b:0 "Intense sparring -- push each other to the limit."
 murim_grind.0200.c:0 "I prefer to train alone."

 # 0201 - Sparring Turns Hostile
 murim_grind.0201.t:0 "Sparring Escalates!"
 murim_grind.0201.desc:0 "What began as training has become something else entirely. [sparring_partner.GetFirstName]'s strikes carry killing intent now. A blow that should have been pulled lands with full force against your ribs.\n\nOld grudges surface. The thin line between sparring and combat has been crossed."
 murim_grind.0201.a:0 "So be it. If they want a real fight, they'll get one."
 murim_grind.0201.a.win:0 "Your final strike sends [sparring_partner.GetFirstName] crashing to the ground. The sparring match is decisively yours."
 murim_grind.0201.a.draw:0 "You trade blow for blow until both of you stagger apart, bruised but unbroken. Neither can claim victory."
 murim_grind.0201.a.lose:0 "[sparring_partner.GetFirstName]'s technique proves superior. You hit the ground hard, tasting blood and bitter defeat."
 murim_grind.0201.b:0 "Step back. This isn't worth real bloodshed."
 murim_grind.0201.c:0 "Channel this anger into focused training instead."

 # 0300 - Pill Refinement Training
 murim_grind.0300.t:0 "Pill Refinement Opportunity"
 murim_grind.0300.desc:0 "A traveling herbalist has arrived with rare medicinal ingredients -- spirit ginseng, millennium snow lotus, and crimson fire berries. Combined properly, these could produce cultivation pills of considerable potency.\n\nCombined improperly, they could produce poison."
 murim_grind.0300.a:0 "Purchase standard ingredients and attempt refinement. [Costs 25 gold]"
 murim_grind.0300.a.success:0 "The pill glows with a soft golden light. A perfect refinement. You swallow it and feel your cultivation base surge with warmth."
 murim_grind.0300.a.partial:0 "The pill is cloudy with impurities but still usable. Better than nothing."
 murim_grind.0300.a.failure:0 "The refinement fails catastrophically. The resulting substance burns your throat and poisons your meridians."
 murim_grind.0300.b:0 "Spare no expense -- premium ingredients only. [Costs 75 gold]"
 murim_grind.0300.b.success:0 "A masterwork pill! The surface gleams like jade, and the medicinal aroma fills the room. Your cultivation surges forward."
 murim_grind.0300.b.partial:0 "A decent pill, though not perfect. The premium ingredients prevented total failure."
 murim_grind.0300.b.failure:0 "Even premium ingredients couldn't save this batch. At least the impurities are mild."
 murim_grind.0300.c:0 "Too expensive. I'll train the traditional way."

 # 0400 - Scripture Study
 murim_grind.0400.t:0 "Ancient Scriptures"
 murim_grind.0400.desc:0 "In the dusty corner of a library, you discover scrolls written in archaic script. The brushstrokes carry traces of qi -- whoever wrote these was a cultivator of considerable power.\n\nSome passages describe orthodox cultivation methods. Others... the ink seems to writhe when you look too closely. Forbidden knowledge, perhaps, but knowledge nonetheless."
 murim_grind.0400.a:0 "Study the orthodox passages carefully."
 murim_grind.0400.b:0 "The forbidden sections call to me. Knowledge is knowledge."
 murim_grind.0400.b.enlighten:0 "The forbidden text reveals a truth about qi circulation that orthodox methods obscure. Dangerous knowledge, but enlightening."
 murim_grind.0400.b.confuse:0 "The text contradicts everything you know. Your understanding of cultivation wavers, leaving you confused and uncertain."
 murim_grind.0400.b.corrupt:0 "Something in the text reaches into your cultivation base. Foreign qi invades your meridians. You slam the scroll shut, but the damage is done."
 murim_grind.0400.c:0 "Meditate on what I already know. No need for ancient texts."

 # 0500 - Master Guidance Session
 murim_grind.0500.t:0 "A Master's Guidance"
 murim_grind.0500.desc:0 "[martial_mentor.GetFirstName] sits cross-legged in the meditation hall, qi radiating from [martial_mentor.GetHerHis] body like invisible heat from a forge. Years of cultivation have made [martial_mentor.GetHerHim] a mountain -- immovable, unfathomable.\n\n'You seek guidance,' [martial_mentor.GetSheHe] says without opening [martial_mentor.GetHerHis] eyes. 'Ask your question.'"
 murim_grind.0500.a:0 "Master, please correct my cultivation technique. [Humble Request]"
 murim_grind.0500.b:0 "I believe your method has a flaw. Allow me to demonstrate. [Challenge Master]"
 murim_grind.0500.c:0 "I will simply observe and learn in silence."

 # 0600 - Training Montage
 murim_grind.0600.t:0 "The Crucible of Training"
 murim_grind.0600.desc:0 "You can feel it -- the threshold of breakthrough is close. Your cultivation base hums with barely contained energy. Every fiber of your being screams that with just a little more effort, a little more pain, you could transcend your current limits.\n\nThe training grounds await. The question is not whether to train, but how hard to push."
 murim_grind.0600.a:0 "Full intensity! 30 days of relentless training!"
 murim_grind.0600.b:0 "Balanced training over 60 days. Steady progress."
 murim_grind.0600.c:0 "Actually, rest might serve me better right now."

 # ---------------------
 # ADVANCED DUEL EVENTS
 # ---------------------

 # 3000 - Fight Memory: Remembered Defeat
 murim_duel.3000.t:0 "The Ghost of Defeat"
 murim_duel.3000.desc:0 "You see [old_enemy.GetFirstName] across the marketplace, and the old wound throbs. Not the physical one -- that healed long ago. The wound to your pride.\n\n[old_enemy.GetSheHe] defeated you. The memory burns like acid, replaying in your mind during every sleepless night. [old_enemy.GetSheHe] stands there now, laughing with companions, as though you don't exist.\n\nBut you've grown stronger since then. Haven't you?"
 murim_duel.3000.a:0 "Challenge [old_enemy.GetFirstName]. Today, the debt is paid."
 murim_duel.3000.b:0 "Use this burning shame as fuel for training."
 murim_duel.3000.c:0 "Let it go. The past is the past."

 # 3001 - Revenge Duel Confrontation
 murim_duel.3001.t:0 "The Revenge Duel"
 murim_duel.3001.desc:0 "You stand before [old_enemy.GetFirstName] in the center of the martial arena. The crowd parts around you like water around stones. Everyone knows what this is.\n\nRevenge.\n\n[old_enemy.GetFirstName] smirks. 'Back for more?' The words cut deeper than any blade. But words won't matter when fists fly."
 murim_duel.3001.a:0 "An honor duel. Let skill decide."
 murim_duel.3001.a.win:0 "Your final strike sends [old_enemy.GetFirstName] to the ground. The defeat that haunted you is avenged. The crowd roars."
 murim_duel.3001.a.draw:0 "Neither can gain the advantage. You separate, breathing hard, the grudge still unresolved."
 murim_duel.3001.a.lose:0 "Defeated again. [old_enemy.GetFirstName] stands over you with contempt. The shame doubles."
 murim_duel.3001.b:0 "No rules. No mercy. This ends in blood."
 murim_duel.3001.b.win:0 "[old_enemy.GetFirstName] crumples. Blood pools on the ground. The revenge is complete -- and terrible."
 murim_duel.3001.b.draw:0 "Both of you lie broken on the ground, neither able to finish the other. The death match ends in mutual destruction."
 murim_duel.3001.b.lose:0 "Darkness closes in. [old_enemy.GetFirstName]'s killing blow falls. Your last thought is bitter regret."
 murim_duel.3001.c:0 "...I can't do this. Walk away."

 # 4000 - Ranked Fighter Death Memorial
 murim_duel.4000.t:0 "A Ranked Fighter Has Fallen"
 murim_duel.4000.desc:0 "Word spreads through the martial world like wildfire: [dead_ranker.GetFirstName], ranked among the Top 50 martial artists in the realm, is dead.\n\nSome mourn. Some celebrate. Some sharpen their blades, knowing the rankings have shifted. A space has opened, and the ambitious will fight to fill it.\n\nThe martial world never stands still."
 murim_duel.4000.a:0 "Honor their memory. Even enemies deserve respect in death."
 murim_duel.4000.b:0 "Their loss is my opportunity. Time to climb the rankings."
 murim_duel.4000.c:0 "Something about this death seems... wrong. Investigate."
 murim_duel.4000.c.foul_play:0 "Your investigation uncovers disturbing evidence. This was no natural death or fair duel."
 murim_duel.4000.c.natural:0 "After thorough investigation, the death appears to be from natural causes or a fair fight. No foul play detected."

 # 4001 - Death Investigation: Foul Play Discovered
 murim_duel.4001.t:0 "Murder Most Foul"
 murim_duel.4001.desc:0 "The evidence is damning. Traces of meridian-dissolving poison. Witnesses who saw a shadowy figure near the victim's quarters. And one name keeps surfacing in your investigation: [murder_suspect.GetFirstName].\n\n[murder_suspect.GetSheHe] had motive -- a ranking dispute, a grudge from years past. And [murder_suspect.GetSheHe] has the skills to pull it off.\n\nThe question now is: what do you do with this knowledge?"
 murim_duel.4001.a:0 "Publicly accuse [murder_suspect.GetFirstName] before the martial world!"
 murim_duel.4001.b:0 "Confront [murder_suspect.GetFirstName] privately. Knowledge is leverage."
 murim_duel.4001.c:0 "Keep this secret. Getting involved could be fatal."
 murim_duel.4001.d:0 "They murdered a warrior. I will be their judge, jury, and executioner."

 # 5000 - Legendary Battle Recalled
 murim_duel.5000.t:0 "Tales of Your Legendary Battles"
 murim_duel.5000.desc:0 "A traveling storyteller has arrived at court, and tonight's entertainment features... you.\n\nWith dramatic flair, the storyteller recounts your greatest battles -- the enemies felled, the impossible odds overcome, the moments where your prowess shook the heavens. The audience hangs on every word.\n\nSome details are embellished, of course. But the core truth remains: you are a legend of the martial world."
 murim_duel.5000.a:0 "Let them tell the tale! My reputation grows!"
 murim_duel.5000.b:0 "The storyteller exaggerates. I was simply doing what needed to be done."
 murim_duel.5000.c:0 "Let them fear my name. A fearsome reputation is a weapon."

 # 5010 - Veteran's Scar Story
 murim_duel.5010.t:0 "The Stories Scars Tell"
 murim_duel.5010.desc:0 "A young martial artist stares at the network of scars across your arms and chest. Each one a battle. Each one a lesson paid for in blood.\n\n'How did you survive all of that?' the youth asks, eyes wide.\n\nYou trace the oldest scar -- the one from your very first real fight, decades ago. How did you survive? Sometimes you wonder the same thing."
 murim_duel.5010.a:0 "These scars made me who I am. Each one made me stronger."
 murim_duel.5010.b:0 "Let me teach you, so your scars will be fewer than mine."
 murim_duel.5010.c:0 "I survived. But I wonder sometimes... at what cost?"

 # ---------------------
 # MODIFIER LOCALIZATION
 # ---------------------

 murim_revenge_focus:0 "Revenge Focus"
 murim_revenge_focus_desc:0 "The desire for revenge sharpens your training. Every rep, every form, every meditation is fueled by the memory of defeat."
 murim_bitter_motivation:0 "Bitter Motivation"
 murim_bitter_motivation_desc:0 "The sting of past defeat drives you forward with grim determination."
 murim_revenge_complete:0 "Revenge Fulfilled"
 murim_revenge_complete_desc:0 "The score is settled. The weight of past defeat has been lifted from your shoulders."
 murim_defeated_twice:0 "Defeated Twice"
 murim_defeated_twice_desc:0 "Losing to the same opponent twice has shaken your confidence to its core."
 murim_unfinished_business:0 "Unfinished Business"
 murim_unfinished_business_desc:0 "The revenge duel ended in a draw. The grudge remains unresolved."
 murim_crushed_spirit:0 "Crushed Spirit"
 murim_crushed_spirit_desc:0 "Defeated again by the same enemy. Your martial spirit wavers."
 murim_dominant_fighter:0 "Dominant Fighter"
 murim_dominant_fighter_desc:0 "Having defeated the same challenger twice, your reputation for dominance grows."
 murim_swallowed_pride:0 "Swallowed Pride"
 murim_swallowed_pride_desc:0 "You walked away from a revenge duel. The shame gnaws at you."
 murim_mourning_warrior:0 "Mourning a Fallen Warrior"
 murim_mourning_warrior_desc:0 "A ranked martial artist has fallen. You observe a period of mourning."
 murim_rival_fallen:0 "Rival Has Fallen"
 murim_rival_fallen_desc:0 "Your rival is dead. The complex mix of relief and emptiness is hard to process."
 murim_lost_martial_brother:0 "Lost a Martial Brother"
 murim_lost_martial_brother_desc:0 "A friend and fellow martial artist has died. The grief runs deep."
 murim_ranking_ambition:0 "Ranking Ambition"
 murim_ranking_ambition_desc:0 "A space has opened in the rankings. You intend to fill it."
 murim_cold_ambition:0 "Cold Ambition"
 murim_cold_ambition_desc:0 "Others noticed your eagerness when a ranked fighter died. They question your character."
 murim_investigating_death:0 "Investigating a Death"
 murim_investigating_death_desc:0 "You are looking into the suspicious death of a ranked martial artist."
 murim_peace_of_mind:0 "Peace of Mind"
 murim_peace_of_mind_desc:0 "Your investigation found no foul play. The death was fair."
 murim_murder_suspect:0 "Murder Suspect"
 murim_murder_suspect_desc:0 "Publicly accused of murdering a ranked martial artist. Whether guilty or not, the stigma remains."
 murim_false_accuser:0 "False Accuser"
 murim_false_accuser_desc:0 "Your accusation of murder was proven baseless. Your reputation suffers."
 murim_holds_dark_secret:0 "Holds a Dark Secret"
 murim_holds_dark_secret_desc:0 "You know the truth about a murder. This knowledge is both a weapon and a burden."
 murim_burden_of_knowledge:0 "Burden of Knowledge"
 murim_burden_of_knowledge_desc:0 "You know who killed the ranked fighter but chose silence. The truth weighs heavy."
 murim_vengeance_sworn:0 "Vengeance Sworn"
 murim_vengeance_sworn_desc:0 "You have sworn to avenge a murdered warrior. This oath drives your every action."
 murim_legendary_reputation:0 "Legendary Reputation"
 murim_legendary_reputation_desc:0 "Tales of your martial exploits have spread far and wide."
 murim_humble_master:0 "Humble Master"
 murim_humble_master_desc:0 "Despite legendary battles, you remain humble. Others respect this deeply."
 murim_fearsome_reputation:0 "Fearsome Reputation"
 murim_fearsome_reputation_desc:0 "You leverage your legendary battles to inspire fear. Your name alone makes enemies hesitate."
 murim_battle_hardened:0 "Battle-Hardened Veteran"
 murim_battle_hardened_desc:0 "Years of combat have tempered your body and mind like folded steel."
 murim_path_of_peace:0 "Walking the Path of Peace"
 murim_path_of_peace_desc:0 "After years of violence, you have begun to question whether the martial path requires bloodshed."
 murim_closed_door_cultivation:0 "In Closed-Door Cultivation"
 murim_closed_door_cultivation_desc:0 "Sealed in isolation, pushing your cultivation base to its limits."
 murim_closed_door_extreme:0 "Extreme Closed-Door Cultivation"
 murim_closed_door_extreme_desc:0 "A full year of total isolation. Transform or die trying."
 murim_overcame_deviation:0 "Overcame Qi Deviation"
 murim_overcame_deviation_desc:0 "You fought through a qi deviation in seclusion. Your cultivation base is stronger for it."
 murim_failed_seclusion:0 "Failed Seclusion"
 murim_failed_seclusion_desc:0 "Forced to break seclusion early due to qi deviation. Progress was lost."
 murim_deviation_wisdom:0 "Deviation Wisdom"
 murim_deviation_wisdom_desc:0 "The qi deviation taught you where your foundation was weak. A painful but valuable lesson."
 murim_sparring_partner:0 "Sparring Partner"
 murim_sparring_partner_desc:0 "We train together regularly. Iron sharpens iron."
 murim_sparring_bruises:0 "Sparring Bruises"
 murim_sparring_bruises_desc:0 "Covered in fresh bruises from intense sparring practice."
 murim_sparring_victor:0 "Sparring Victor"
 murim_sparring_victor_desc:0 "Won a decisive sparring match. Confidence is high."
 murim_backed_down:0 "Backed Down"
 murim_backed_down_desc:0 "They refused to fight when challenged. Weakness noted."
 murim_anger_fueled_training:0 "Anger-Fueled Training"
 murim_anger_fueled_training_desc:0 "Channeling rage into disciplined training. Dangerous but effective."
 murim_pill_enhanced:0 "Pill-Enhanced Cultivation"
 murim_pill_enhanced_desc:0 "A successfully refined pill accelerates your cultivation."
 murim_pill_impure:0 "Impure Pill Side Effects"
 murim_pill_impure_desc:0 "The pill had impurities. Minor side effects cloud your focus."
 murim_pill_poisoned:0 "Pill Poisoning"
 murim_pill_poisoned_desc:0 "The refinement failed badly. Your meridians burn with toxic residue."
 murim_pill_superior:0 "Superior Pill Enhancement"
 murim_pill_superior_desc:0 "A masterwork pill of exceptional quality surges through your cultivation base."
 murim_scripture_insight:0 "Scripture Insight"
 murim_scripture_insight_desc:0 "Ancient texts have granted clarity to your cultivation theory."
 murim_forbidden_knowledge:0 "Forbidden Knowledge"
 murim_forbidden_knowledge_desc:0 "You have glimpsed truths that orthodox cultivation methods conceal."
 murim_scripture_confusion:0 "Scripture Confusion"
 murim_scripture_confusion_desc:0 "Contradictory teachings have muddled your understanding."
 murim_training_montage:0 "Intensive Training"
 murim_training_montage_desc:0 "Pushing your body to absolute limits in a burst of focused training."
 murim_overtraining_strain:0 "Overtraining Strain"
 murim_overtraining_strain_desc:0 "Your body protests the abuse. Muscles torn, joints aching."
 murim_steady_training:0 "Steady Training Regimen"
 murim_steady_training_desc:0 "A balanced training routine that builds strength without breaking the body."
 murim_well_rested:0 "Well-Rested"
 murim_well_rested_desc:0 "Sometimes the best training is rest. Your body and mind are refreshed."
 murim_grateful_student:0 "Grateful Student"
 murim_grateful_student_desc:0 "A student who values their master's teachings."
 murim_dedicated_student:0 "Dedicated Student"
 murim_dedicated_student_desc:0 "Shows genuine dedication to learning the martial arts."
 murim_disrespectful_student:0 "Disrespectful Student"
 murim_disrespectful_student_desc:0 "Questioned my techniques openly. Arrogant."
 murim_promising_student:0 "Promising Student"
 murim_promising_student_desc:0 "Questions my methods -- not from disrespect, but from genuine insight. Impressive."
 murim_hero_worship:0 "Hero Worship"
 murim_hero_worship_desc:0 "In awe of their legendary martial prowess."
 murim_wise_elder:0 "Wise Elder"
 murim_wise_elder_desc:0 "Teaches through experience and pain. A true master."
 murim_accused_of_murder:0 "Accused of Murder"
 murim_accused_of_murder_desc:0 "Publicly accused me of killing a ranked martial artist."
 murim_murderer:0 "Known Murderer"
 murim_murderer_desc:0 "I know what they did. A ranked fighter's blood is on their hands."
 murim_knows_secret:0 "Knows My Secret"
 murim_knows_secret_desc:0 "They know something dangerous about me. A liability."
 murim_defeated_by:0 "Defeated By"
 murim_defeated_by_desc:0 "They defeated me in combat. The memory burns."
 murim_revenge_taken:0 "Revenge Taken"
 murim_revenge_taken_desc:0 "I defeated them in a revenge duel. The score is settled."