l_english:
 murim_mount_hua_exp4.0001.t: "The Great Sect War Begins"
 murim_mount_hua_exp4.0001.desc: "A rival sect leader has insulted Mount Hua beyond all tolerance. Their forces mass at the border, and the air crackles with impending violence. The plum blossom banner must answer — but how?"
 murim_mount_hua_exp4.0001.a: "March to war as commander."
 murim_mount_hua_exp4.0001.b: "Seek peace through diplomacy."
 murim_mount_hua_exp4.0001.c: "Fortify our mountain stronghold."
 murim_mount_hua_exp4.0002.t: "The Battle Rages"
 murim_mount_hua_exp4.0002.desc: "Steel rings against steel across the battlefield. Mount Hua's swordsmen fight with precision born of generations, but the enemy presses hard. A decisive blow is needed to turn the tide."
 murim_mount_hua_exp4.0002.a: "Challenge their leader to single combat."
 murim_mount_hua_exp4.0002.b: "Hire mercenary reinforcements."
 murim_mount_hua_exp4.0002.c: "Sound the retreat — live to fight again."
 murim_mount_hua_exp4.0003.t: "Mercenary Complications"
 murim_mount_hua_exp4.0003.desc: "The mercenaries have arrived, blades sharp and loyalty thin. Hired swords are a double-edged weapon — they fight for gold, not honor. Managing them will require careful handling."
 murim_mount_hua_exp4.0003.a: "Pay them well and direct the assault."
 murim_mount_hua_exp4.0003.b: "They have betrayed us..."
 murim_mount_hua_exp4.0003.c: "Forge a lasting mercenary alliance."
 murim_mount_hua_exp4.0004.t: "The Sword Saint's Ascension"
 murim_mount_hua_exp4.0004.desc: "Your blade has transcended mortal limits. Every strike resonates with perfected sword intent, and lesser weapons shatter at your approach. The martial world whispers a title once thought extinct — Sword Saint."
 murim_mount_hua_exp4.0004.a: "Accept the title of Sword Saint."
 murim_mount_hua_exp4.0004.b: "Remain a humble swordsman."
 murim_mount_hua_exp4.0004.c: "Become a Plum Blossom Grandmaster instead."
 murim_mount_hua_exp4.0005.t: "The Sword Saint's Declaration"
 murim_mount_hua_exp4.0005.desc: "As Sword Saint, every warrior of note yearns to test their blade against yours. Worthy challengers gather from across the land, their eyes burning with ambition. Your legend demands a response."
 murim_mount_hua_exp4.0005.a: "Issue an open challenge to all comers."
 murim_mount_hua_exp4.0005.b: "Meditate in seclusion to deepen mastery."
 murim_mount_hua_exp4.0005.c: "Open a sword academy for disciples."
 murim_mount_hua_exp4.0006.t: "The Grand Challenge"
 murim_mount_hua_exp4.0006.desc: "A supreme martial artist answers your challenge, their qi a storm of killing intent. This is no friendly spar — this is a battle to determine the greatest swordsman alive. The world holds its breath."
 murim_mount_hua_exp4.0006.a: "Face them in the decisive duel."
 murim_mount_hua_exp4.0006.b: "Declare a draw — honor preserved."
 murim_mount_hua_exp4.0007.t: "The Plum Blossom Legacy"
 murim_mount_hua_exp4.0007.desc: "As leader of Mount Hua, the sect's future rests on the foundations you build today. Will you invest in knowledge, martial might, or the shadows? The plum blossoms await your decision."
 murim_mount_hua_exp4.0007.a: "Build a scripture vault."
 murim_mount_hua_exp4.0007.b: "Construct elite training grounds."
 murim_mount_hua_exp4.0007.c: "Establish a spy network."
 murim_mount_hua_exp4.0008.t: "Choosing a Successor"
 murim_mount_hua_exp4.0008.desc: "The years weigh upon you, and Mount Hua needs leadership that will endure beyond your time. Your child shows promise with the blade, but succession in the martial world is never simple."
 murim_mount_hua_exp4.0008.a: "Appoint my child as heir."
 murim_mount_hua_exp4.0008.b: "Hold a tournament for succession."
 murim_mount_hua_exp4.0008.c: "Delay the decision for now."
 murim_mount_hua_exp4.0009.t: "The Succession Tournament"
 murim_mount_hua_exp4.0009.desc: "The candidates clash in the dueling arena, their blades singing the song of ambition. The strongest will lead Mount Hua into a new era. But strength alone does not make a leader."
 murim_mount_hua_exp4.0009.a: "Accept the tournament's winner."
 murim_mount_hua_exp4.0009.b: "Enter the tournament myself."
 murim_mount_hua_exp4.0010.t: "The Living Legend"
 murim_mount_hua_exp4.0010.desc: "Decades of mastery have made you a figure of reverence across the entire martial world. Mount Hua disciples speak your name in hushed tones. The time has come to seal your legend for eternity."
 murim_mount_hua_exp4.0010.a: "Become Mount Hua's living legend."
 murim_mount_hua_exp4.0010.b: "Withdraw as a hermit of the plum groves."
 murim_mount_hua_exp4.0010.c: "Give one final teaching to all disciples."
