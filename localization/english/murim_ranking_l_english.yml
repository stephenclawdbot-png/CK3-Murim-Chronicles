 murim_number_one_modifier:0 "Supreme Martial Artist (#1)"
 murim_number_one_modifier_desc:0 "The undisputed Number One. Every martial artist measures themselves against you."

 murim_ranked_fame_modifier:0 "Martial Fame"
 murim_ranked_fame_modifier_desc:0 "Your entry into the rankings has brought widespread recognition."
 murim_ranked_focused_training_modifier:0 "Focused Martial Training"
 murim_ranked_focused_training_modifier_desc:0 "Humble dedication to improvement despite ranking recognition."
 murim_ranked_political_influence_modifier:0 "Martial Political Influence"
