l_english:
 murim_weapon.0001.t: "The Master Blacksmith"
 murim_weapon.0001.desc: "Rumors lead you to a remote mountain forge where a master blacksmith works metal with qi-infused hammers. Their creations are legendary -- blades that sing with internal energy, spears that pierce through qi barriers. They agree to meet you, but their time and skill come at a steep price."
 murim_weapon.0001.a: "Commission a divine weapon"
 murim_weapon.0001.b: "Seek an ancient weapon instead"
 murim_weapon.0001.c: "Strength comes from within, not weapons"
 murim_weapon.0002.t: "Gathering Rare Materials"
 murim_weapon.0002.desc: "The master blacksmith presents a list of materials needed for the divine weapon -- meteorite iron from a fallen star, dragon bone from an ancient tomb, jade crystals from a sacred spring. Each ingredient is rarer than the last, and none will come easily."
 murim_weapon.0002.a: "Lead an expedition personally"
 murim_weapon.0002.b: "Send agents to acquire materials"
 murim_weapon.0002.c: "Buy from the black market"
 murim_weapon.0003.t: "The Forging: Infusing Qi"
 murim_weapon.0003.desc: "The forge blazes white-hot. The master blacksmith holds the blade in the flames while you channel your qi into the glowing metal. The weapon absorbs your essence, becoming an extension of your meridians. One wrong move and the qi backlash could destroy you both."
 murim_weapon.0003.a: "Pour your full qi into the weapon"
 murim_weapon.0003.b: "Careful, measured qi infusion"
 murim_weapon.0003.c: "Let the master smith handle it"
 murim_weapon.0004.t: "The Blade Awakens"
 murim_weapon.0004.desc: "Your weapon pulses with a heartbeat that is not your own. A voice -- ancient, vast, and unmistakably aware -- resonates through the blade and into your consciousness. Your divine weapon has developed a spirit. It is alive, and it has opinions."
 murim_weapon.0004.a: "Bond with the weapon spirit"
 murim_weapon.0004.b: "Dominate the weapon spirit"
 murim_weapon.0004.c: "Seal the weapon spirit away"
 murim_weapon.0005.t: "The Ancient Tomb"
 murim_weapon.0005.desc: "A weathered map leads you to an ancient tomb sealed for centuries. Within, according to legend, lies a weapon forged during the age of immortals -- a blade that has waited in darkness for a worthy wielder. The tomb entrance exhales cold qi like the breath of the dead."
 murim_weapon.0005.a: "Explore the tomb alone"
 murim_weapon.0005.b: "Explore with companions"
 murim_weapon.0005.c: "Hire mercenaries to clear the tomb"
 murim_weapon.0006.t: "The Cursed Weapon's Influence"
 murim_weapon.0006.desc: "The weapon whispers in your dreams. Its dark influence seeps through your grip into your meridians -- bloodlust, paranoia, an insatiable hunger for battle. The cursed blade was forged with malice, and it seeks to remake its wielder in its own image."
 murim_weapon.0006.a: "Embrace the curse for more power"
 murim_weapon.0006.b: "Seek a way to purify the weapon"
 murim_weapon.0006.c: "Destroy the cursed weapon"
 murim_weapon.0007.t: "Divine Weapon Stolen!"
 murim_weapon.0007.desc: "You reach for your weapon and find only empty air. Gone. Stolen in the night by hands skilled enough to bypass your qi-sense. Without your divine weapon, you feel diminished -- like a dragon stripped of its claws. Rage and loss war within you."
 murim_weapon.0007.a: "Hunt down the thief personally"
 murim_weapon.0007.b: "Hire trackers and spies"
 murim_weapon.0007.c: "Forge a new weapon to replace it"
 murim_weapon.0008.t: "Nine-Clan Weapon Competition"
 murim_weapon.0008.desc: "The great clans gather for the Nine-Clan Weapon Competition -- a showcase where the finest weapons and their wielders compete for supremacy. Divine blades clash against legendary spears in displays of martial artistry that leave the audience breathless."
 murim_weapon.0008.a: "Enter the competition"
 murim_weapon.0008.b: "Judge the competition"
 murim_weapon.0008.c: "Display your weapon without competing"
 murim_weapon.0009.t: "Passing Down the Blade"
 murim_weapon.0009.desc: "Age and battle have taken their toll. Your grip weakens, your qi fades, but your divine weapon endures. It is time to decide who will inherit this weapon -- who will carry your legacy into the future. The blade hums expectantly, as if it too awaits the answer."
 murim_weapon.0009.a: "Pass it to the most worthy child"
 murim_weapon.0009.b: "Let the children compete for it"
 murim_weapon.0009.c: "Be buried with the weapon"
 murim_weapon.0009.d: "Pass it to the most talented disciple"
 murim_weapon.0010.t: "Weapon Succession Tournament"
 murim_weapon.0010.desc: "Your children face each other in the training grounds, each determined to prove themselves worthy of your divine weapon. Sibling rivalry burns hot as steel as they trade blows. Only one can inherit the blade -- the question is whether the family will survive the contest."
 murim_weapon.0010.a: "Let them duel for it"
 murim_weapon.0010.b: "Cancel and choose yourself"
 murim_weapon.0011.t: "The Weapon Shatters"
 murim_weapon.0011.desc: "A sickening crack splits the air. Your divine weapon -- companion of a hundred battles, extension of your very soul -- shatters in your hands. The fragments fall like tears of steel. The loss strikes deeper than any wound."
 murim_weapon.0011.a: "Reforge it stronger"
 murim_weapon.0011.b: "Fight with bare hands from now on"
 murim_weapon.0011.c: "Seek a new legendary weapon"
 murim_weapon.0012.t: "The Weapon of Heaven's Will"
 murim_weapon.0012.desc: "In the heart of the Great Calamity, a weapon materializes from pure heavenly qi -- the Weapon of Heaven's Will, forged by the dao itself to combat the darkness threatening the martial world. It calls to you with a voice that transcends mortal understanding. But wielding heaven's power demands a price beyond imagining."
 murim_weapon.0012.a: "Wield the Weapon of Heaven's Will"
 murim_weapon.0012.b: "Guard it for a worthy successor"
 murim_weapon.0012.c: "Destroy it before it falls to evil"
