l_english:
 # ===========================
 # AI WORLD PULSE EVENTS
 # Living world simulation
 # ===========================

 # --- AI Sect Leader Actions ---
 murim_world_pulse.0001.t: "Expansionist Ambitions"
 murim_world_pulse.0001.desc: "Your clan's resources are strained by growth. Neighboring territories lie ripe for the taking — or you could strengthen what you have."
 murim_world_pulse.0001.a: "Expand aggressively"
 murim_world_pulse.0001.b: "Consolidate our holdings"
 murim_world_pulse.0001.c: "Negotiate for territory"

 murim_world_pulse.0002.t: "The Marriage Proposal"
 murim_world_pulse.0002.desc: "A neighboring clan has an eligible cultivator of considerable talent. A marriage alliance would strengthen both clans and create a powerful bond."
 murim_world_pulse.0002.a: "Propose the alliance"
 murim_world_pulse.0002.b: "Marriage is weakness"
 murim_world_pulse.0002.c: "Wait for a better match"

 murim_world_pulse.0003.t: "Internal Purge"
 murim_world_pulse.0003.desc: "Rumors of disloyalty among your inner disciples have reached your ears. Some may be planning to defect to a rival sect — or worse, plotting a succession challenge."
 murim_world_pulse.0003.a: "Purge the disloyal"
 murim_world_pulse.0003.b: "Investigate quietly"
 murim_world_pulse.0003.c: "Address their grievances"

 murim_world_pulse.0004.t: "The Power of Darkness"
 murim_world_pulse.0004.desc: "A forbidden technique scroll has surfaced in the black market. Your scouts report that a rival sect is also bidding. The power it promises is immense — and dangerous."
 murim_world_pulse.0004.a: "Acquire it at any cost"
 murim_world_pulse.0004.b: "Report it to the Tribunal"
 murim_world_pulse.0004.c: "Let the rival have it — and the consequences"

 murim_world_pulse.0005.t: "Tournament Season"
 murim_world_pulse.0005.desc: "The annual tournament season approaches. Hosting or sending your best fighters could raise your clan's prestige — or expose your weaknesses."
 murim_world_pulse.0005.a: "Host a grand tournament"
 murim_world_pulse.0005.b: "Send our champions to compete"
 murim_world_pulse.0005.c: "Skip this year — focus on training"

 murim_world_pulse.0006.t: "Shadow Operations"
 murim_world_pulse.0006.desc: "Your intelligence network reports a vulnerability in a rival sect's defenses. A well-placed spy could give you years of strategic advantage."
 murim_world_pulse.0006.a: "Deploy a spy"
 murim_world_pulse.0006.b: "Too risky — focus on defense"
 murim_world_pulse.0006.c: "Use the information for a direct strike"

 murim_world_pulse.0007.t: "Imperial Petition"
 murim_world_pulse.0007.desc: "Your clan could benefit from imperial recognition. Sending a petition to the court would gain resources and prestige — but also imperial oversight."
 murim_world_pulse.0007.a: "Send the petition"
 murim_world_pulse.0007.b: "The court's favor is a leash"
 murim_world_pulse.0007.c: "Send gifts without formal petition"

 murim_world_pulse.0008.t: "Recruit the Wanderer"
 murim_world_pulse.0008.desc: "A powerful unaffiliated cultivator has been spotted in the jianghu. Several sects are attempting recruitment. Their skills would strengthen any clan they join."
 murim_world_pulse.0008.a: "Send a recruitment team"
 murim_world_pulse.0008.b: "Offer sanctuary and training resources"
 murim_world_pulse.0008.c: "They'll come to us if we're worthy"

 # --- AI Cultivator Life Cycle ---
 murim_world_pulse.0010.t: "Choosing the Path"
 murim_world_pulse.0010.desc: "Your cultivation has reached a crossroads. The path of martial combat promises power and fame. The path of inner cultivation promises wisdom and longevity. Both have their price."
 murim_world_pulse.0010.a: "Martial combat — power through conflict"
 murim_world_pulse.0010.b: "Inner cultivation — wisdom through patience"
 murim_world_pulse.0010.c: "Balance both — slower but complete"

 murim_world_pulse.0011.t: "The Training Wall"
 murim_world_pulse.0011.desc: "Your cultivation has hit a wall. No amount of meditation breaks through. You need external help — a master's guidance, a forbidden shortcut, or a life-changing experience."
 murim_world_pulse.0011.a: "Seek a master's guidance"
 murim_world_pulse.0011.b: "Look for forbidden shortcuts"
 murim_world_pulse.0011.c: "Push through with raw willpower"

 murim_world_pulse.0012.t: "Love on a Mission"
 murim_world_pulse.0012.desc: "During a clan mission, you've developed feelings for a fellow cultivator. They're talented, attractive, and from a different sect. The heart wants what the mind knows is complicated."
 murim_world_pulse.0012.a: "Confess your feelings"
 murim_world_pulse.0012.b: "Suppress them — duty first"
 murim_world_pulse.0012.c: "Test their feelings subtly"

 murim_world_pulse.0013.t: "A Rival's Weakness"
 murim_world_pulse.0013.desc: "Through careful observation, you've discovered a critical weakness in a rival's technique. You could challenge them to a duel with near-certain victory — or sell the information."
 murim_world_pulse.0013.a: "Challenge them to a duel"
 murim_world_pulse.0013.b: "Sell the information"
 murim_world_pulse.0013.c: "Keep it as insurance"

 murim_world_pulse.0014.t: "Witness to Injustice"
 murim_world_pulse.0014.desc: "You've witnessed a powerful cultivator abusing their position. Weaker martial artists suffer, but no one dares speak up. You could report this to the Tribunal — or handle it yourself."
 murim_world_pulse.0014.a: "Report to the Tribunal"
 murim_world_pulse.0014.b: "Confront them directly"
 murim_world_pulse.0014.c: "Stay quiet — not your fight"

 murim_world_pulse.0015.t: "The Court's Offer"
 murim_world_pulse.0015.desc: "An imperial recruiter has approached you. The court needs skilled cultivators for a special assignment. The pay is excellent, but you'd be serving the throne — something many martial artists disdain."
 murim_world_pulse.0015.a: "Accept the assignment"
 murim_world_pulse.0015.b: "Decline respectfully"
 murim_world_pulse.0015.c: "Negotiate better terms"

 murim_world_pulse.0016.t: "A Friend Falls"
 murim_world_pulse.0016.desc: "A close friend has fallen in the calamity. Their last words were a plea: avenge them. The ones responsible are powerful, connected, and dangerous."
 murim_world_pulse.0016.a: "Swear vengeance"
 murim_world_pulse.0016.b: "Grieve and move on"
 murim_world_pulse.0016.c: "Investigate before acting"

 murim_world_pulse.0017.t: "The Peak"
 murim_world_pulse.0017.desc: "Your cultivation has reached its peak. You stand at the threshold of ascension — the chance to become something more than human. But the tribulation could destroy you."
 murim_world_pulse.0017.a: "Attempt ascension"
 murim_world_pulse.0017.b: "Not yet — accumulate more"
 murim_world_pulse.0017.c: "Consolidate power at this level"

 murim_world_pulse.0018.t: "The Elder's Legacy"
 murim_world_pulse.0018.desc: "Age is catching up. Your cultivation can extend your years, but not forever. The time has come to think about legacy: who will carry your techniques, your grudges, your dreams?"
 murim_world_pulse.0018.a: "Choose a successor carefully"
 murim_world_pulse.0018.b: "Resolve old grudges first"
 murim_world_pulse.0018.c: "Attempt one final ascension"

 # --- World Events ---
 murim_world_pulse.0020.t: "Sect Conflict Escalates"
 murim_world_pulse.0020.desc: "A border dispute between two sects has turned violent. Disciples are injured, elders are furious, and both sides are mobilizing. The martial world holds its breath."
 murim_world_pulse.0020.a: "Intervene as mediator"
 murim_world_pulse.0020.b: "Support the stronger side"
 murim_world_pulse.0020.c: "Stay out of it"

 murim_world_pulse.0021.t: "Death of a Ranker"
 murim_world_pulse.0021.desc: "A top-ranked cultivator has been found dead under mysterious circumstances. The ranking board is in turmoil. Was it assassination, a cultivation accident, or something darker?"
 murim_world_pulse.0021.a: "Investigate the death"
 murim_world_pulse.0021.b: "Claim their vacated rank"
 murim_world_pulse.0021.c: "Too dangerous to get involved"

 murim_world_pulse.0022.t: "Forbidden Scroll Surfaces"
 murim_world_pulse.0022.desc: "A forbidden technique scroll of legendary power has appeared on the black market. Every faction wants it. The bidding war could turn into a real war."
 murim_world_pulse.0022.a: "Bid aggressively"
 murim_world_pulse.0022.b: "Steal it covertly"
 murim_world_pulse.0022.c: "Alert the Tribunal to confiscate it"

 murim_world_pulse.0023.t: "Imperial Decree"
 murim_world_pulse.0023.desc: "A new imperial decree shakes the martial world: all sects must register with the court and pay a cultivation tax. Compliance means submission. Defiance means war."
 murim_world_pulse.0023.a: "Comply — fight another day"
 murim_world_pulse.0023.b: "Defy openly"
 murim_world_pulse.0023.c: "Comply publicly, resist secretly"

 murim_world_pulse.0024.t: "Disaster Strikes"
 murim_world_pulse.0024.desc: "An earthquake has disrupted the qi flow in a major cultivation region. Spiritual veins are blocked, cultivation grounds are ruined. Sects dependent on this area are desperate."
 murim_world_pulse.0024.a: "Offer aid to affected sects"
 murim_world_pulse.0024.b: "Seize the opportunity — recruit their displaced cultivators"
 murim_world_pulse.0024.c: "Focus on securing your own cultivation grounds"

 murim_world_pulse.0025.t: "Ancient Tomb Discovered"
 murim_world_pulse.0025.desc: "An ancient cultivator's tomb has been discovered, sealed for a thousand years. The treasures inside could change the power balance. Multiple factions are racing to crack the seals."
 murim_world_pulse.0025.a: "Send an expedition immediately"
 murim_world_pulse.0025.b: "Ally with another sect for a joint expedition"
 murim_world_pulse.0025.c: "Wait for others to trigger the traps first"

 murim_world_pulse.0026.t: "The Legendary Weapon"
 murim_world_pulse.0026.desc: "A legendary weapon from the Age of Heroes has resurfaced. Its last wielder was an immortal who fell in battle centuries ago. Multiple claimants have emerged."
 murim_world_pulse.0026.a: "Claim the weapon by force"
 murim_world_pulse.0026.b: "Argue for rightful inheritance"
 murim_world_pulse.0026.c: "Destroy it — such power corrupts"

 murim_world_pulse.0027.t: "Demonic Cultivator Sighting"
 murim_world_pulse.0027.desc: "A demonic cultivator has been spotted near a peaceful village, leaving a trail of corrupted qi. Villagers are falling ill. Someone must stop them."
 murim_world_pulse.0027.a: "Hunt the demonic cultivator"
 murim_world_pulse.0027.b: "Report to the Tribunal"
 murim_world_pulse.0027.c: "Investigate — things aren't always what they seem"

 murim_world_pulse.0028.t: "Trade Route Bandits"
 murim_world_pulse.0028.desc: "Bandits have disrupted a major trade route, cutting off medicinal herbs and cultivation resources. The jianghu community wants action, but the bandits are well-organized."
 murim_world_pulse.0028.a: "Lead a subjugation force"
 murim_world_pulse.0028.b: "Negotiate with the bandits"
 murim_world_pulse.0028.c: "Establish an alternative route"

 murim_world_pulse.0029.t: "The Great Conference"
 murim_world_pulse.0029.desc: "An annual martial arts conference has been called. All major sects will attend. It's a crucible of politics, duels, alliances, and betrayals — and an opportunity for those bold enough."
 murim_world_pulse.0029.a: "Attend with full delegation"
 murim_world_pulse.0029.b: "Send spies disguised as delegates"
 murim_world_pulse.0029.c: "Host it at your sect compound"

 murim_world_pulse.0030.t: "Blood Moon Rising"
 murim_world_pulse.0030.desc: "A blood moon rises over the martial world. Demonic cultivators feel their power surge while orthodox techniques weaken. Ancient texts warn: blood moons herald great change."
 murim_world_pulse.0030.a: "Use the power boost"
 murim_world_pulse.0030.b: "Protect against the dark qi surge"
 murim_world_pulse.0030.c: "Study the phenomenon"

