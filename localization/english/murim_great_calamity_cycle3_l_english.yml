l_english:
 murim_great_calamity_cycle3.0001.t: "The Old World Becomes Legend"
 murim_great_calamity_cycle3.0001.desc: "Fifty years have passed since the calamity. The children born after know the old world only through stories — tales of legendary sects, impossible techniques, and heroes who walked among clouds. Memory fades into myth, and myth into legend. You alone remember the truth."
 murim_great_calamity_cycle3.0001.a: "Preserve the truth as historical record."
 murim_great_calamity_cycle3.0001.b: "Let it become myth. Legends serve us better."
 murim_great_calamity_cycle3.0001.c: "The old world deserved to die."
 murim_great_calamity_cycle3.0002.t: "Children of Ash"
 murim_great_calamity_cycle3.0002.desc: "Your child has never known the old world — born in the ashes, raised among ruins, they know nothing of the glory that came before. Yet their potential burns bright, untainted by the failures of the past. How you train them will shape the next generation of the martial world."
 murim_great_calamity_cycle3.0002.a: "Train them in the old ways. Preserve what was lost."
 murim_great_calamity_cycle3.0002.b: "Teach them the new path. Adapted for our world."
 murim_great_calamity_cycle3.0002.c: "Let them find their own way."
 murim_great_calamity_cycle3.0003.t: "The Forbidden Archives"
 murim_great_calamity_cycle3.0003.desc: "Beneath the rubble of a collapsed mountain, you discover a sealed vault filled with scrolls bearing the marks of sects long destroyed. The Heavenly Demon's sealed techniques, the Orthodox Alliance's formation manuals — knowledge that could reshape the martial world, or destroy it again."
 murim_great_calamity_cycle3.0003.a: "Study the Heavenly Demon's sealed techniques."
 murim_great_calamity_cycle3.0003.b: "Recover the Orthodox Alliance's formation manuals."
 murim_great_calamity_cycle3.0003.c: "Seal them again. This knowledge caused the calamity."
 murim_great_calamity_cycle3.0004.t: "Demonic Corruption"
 murim_great_calamity_cycle3.0004.desc: "The forbidden techniques have taken root in your meridians like poisonous vines. Dark qi surges through your body, whispering promises of power beyond imagination. Your eyes flicker between mortal brown and demonic crimson. The corruption spreads — you must choose before it consumes you entirely."
 murim_great_calamity_cycle3.0004.a: "Embrace the demonic power fully."
 murim_great_calamity_cycle3.0004.b: "Fight the corruption. Purify the technique."
 murim_great_calamity_cycle3.0004.c: "Seal my own meridians. Sacrifice power for safety."
 murim_great_calamity_cycle3.0005.t: "New Sect Founding Ceremony"
 murim_great_calamity_cycle3.0005.desc: "The time has come to plant a new flag in the martial world. You have the prestige, the skill, and the followers. Before an assembly of witnesses, you will declare the founding of a new sect — one that will carry your philosophy into the future. What path will your sect walk?"
 murim_great_calamity_cycle3.0005.a: "Found an Orthodox sect. The righteous path."
 murim_great_calamity_cycle3.0005.b: "Found an Unorthodox sect. Power by any means."
 murim_great_calamity_cycle3.0005.c: "Found a Neutral sect. Balance between light and dark."
 murim_great_calamity_cycle3.0006.t: "Prophecy of the Next Calamity"
 murim_great_calamity_cycle3.0006.desc: "Ancient texts found among the ruins speak of a cycle — the Great Calamity is not a singular event but a recurring catastrophe that reshapes the martial world at regular intervals. The signs described in the prophecy are already beginning to appear. The cycle turns once more."
 murim_great_calamity_cycle3.0006.a: "Warn everyone. We must prepare."
 murim_great_calamity_cycle3.0006.b: "Seek a way to break the cycle permanently."
 murim_great_calamity_cycle3.0006.c: "Accept the cycle. It is the natural order."
 murim_great_calamity_cycle3.0007.t: "Quest to Break the Cycle"
 murim_great_calamity_cycle3.0007.desc: "Your quest has led you to the heart of the world's qi, where ley lines converge and the fabric of reality grows thin. The ancients knew this place — they left warnings carved in stone and seals wrought in starlight. Breaking the calamity cycle may be possible, but the cost could be everything."
 murim_great_calamity_cycle3.0007.a: "Destroy all forbidden manuals. Restore balance."
 murim_great_calamity_cycle3.0007.b: "Create a seal at the world's qi nexus."
 murim_great_calamity_cycle3.0007.c: "Only unity of all nine clans can prevent it."
 murim_great_calamity_cycle3.0008.t: "The Grand Unity Summit"
 murim_great_calamity_cycle3.0008.desc: "Representatives from every surviving clan gather at the summit — orthodox and unorthodox, ancient and newly founded. Old grudges simmer beneath polite words. The prophecy demands unity, but unity demands trust, and trust is the rarest commodity in the martial world."
 murim_great_calamity_cycle3.0008.a: "Convince them with reason and diplomacy."
 murim_great_calamity_cycle3.0008.b: "Show them the prophecy evidence."
 murim_great_calamity_cycle3.0008.c: "Force unity through martial supremacy."
 murim_great_calamity_cycle3.0009.t: "The Grudge Wars"
 murim_great_calamity_cycle3.0009.desc: "The summit has collapsed. Old hatreds, buried beneath decades of ash, have erupted anew. Clans that lost everything blame those who survived. Accusations fly like blades, and soon real blades follow. The dream of unity shatters as the martial world plunges back into conflict."
 murim_great_calamity_cycle3.0009.a: "Try to mediate. Salvage what peace remains."
 murim_great_calamity_cycle3.0009.b: "Pick a side. Join the strongest faction."
 murim_great_calamity_cycle3.0009.c: "Stand alone. Become the balance between factions."
 murim_great_calamity_cycle3.0010.t: "The Eternal Cycle"
 murim_great_calamity_cycle3.0010.desc: "At the end of all paths, the truth reveals itself. The calamity cycle is woven into the very fabric of the martial world — a consequence of the endless pursuit of power that defines human nature. You have lived long enough to see the pattern repeat. Now, in your twilight years, one final choice remains."
 murim_great_calamity_cycle3.0010.a: "Pass the knowledge to the next generation."
 murim_great_calamity_cycle3.0010.b: "Attempt to transcend beyond the mortal cycle."
 murim_great_calamity_cycle3.0010.c: "Rage against the cycle. Defy fate itself."
