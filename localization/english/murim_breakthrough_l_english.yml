l_english:
 murim_breakthrough.0001.t: "Qi Condensation Breakthrough"
 murim_breakthrough.0001.desc: "Your qi reserve has reached the threshold for condensation. The scattered energy within your body yearns to compress into something denser and more powerful. The first true test of your cultivation journey begins now."
 murim_breakthrough.0001.a: "Focused meditation breakthrough."
 murim_breakthrough.0001.b: "Force qi compression."
 murim_breakthrough.0001.c: "Seek my master's guidance."
 murim_breakthrough.0001.d: "Delay the attempt."
 murim_breakthrough.0010.t: "Qi Condensation Success!"
 murim_breakthrough.0010.desc: "The scattered qi within your body crystallizes into a dense, pulsing core of energy. Your senses sharpen, your body feels lighter, and the world itself seems more vivid. You have taken your first true step on the path of cultivation."
 murim_breakthrough.0010.a: "Celebrate the achievement."
 murim_breakthrough.0010.b: "Channel new power into combat."
 murim_breakthrough.0100.t: "Foundation Establishment"
 murim_breakthrough.0100.desc: "The time has come to establish your martial foundation -- the bedrock upon which all future cultivation will rest. This is the critical juncture where many cultivators falter. A weak foundation means a lifetime of mediocrity."
 murim_breakthrough.0100.a: "Build through body tempering."
 murim_breakthrough.0100.b: "Purify the spiritual root."
 murim_breakthrough.0100.c: "Use sect resources."
 murim_breakthrough.0100.d: "Postpone for now."
 murim_breakthrough.0110.t: "Foundation Established!"
 murim_breakthrough.0110.desc: "Your foundation solidifies like granite beneath a mountain. Qi flows through your body with newfound stability and purpose. The path ahead, once shrouded in uncertainty, now stretches clearly before you. You are no longer a novice."
 murim_breakthrough.0110.a: "Solidify with meditation."
 murim_breakthrough.0110.b: "Channel into martial supremacy."
 murim_breakthrough.0200.t: "Core Formation -- The Golden Core"
 murim_breakthrough.0200.desc: "Your qi has accumulated enough to attempt forming the legendary Golden Core. This is the threshold that separates true cultivators from mere practitioners. Success means power beyond mortal reckoning. Failure could shatter everything."
 murim_breakthrough.0200.a: "Compress into a perfect core."
 murim_breakthrough.0200.b: "Rapid crystallization."
 murim_breakthrough.0200.c: "Dual cultivation with partner."
 murim_breakthrough.0200.d: "Delay the attempt."
 murim_breakthrough.0210.t: "Golden Core Formed!"
 murim_breakthrough.0210.desc: "A golden sphere of compressed qi takes shape within your dantian. The Golden Core pulses with power that resonates through every fiber of your being. You have joined the ranks of true cultivators."
 murim_breakthrough.0210.a: "Bask in the achievement."
 murim_breakthrough.0211.t: "Perfect Golden Core!"
 murim_breakthrough.0211.desc: "The impossible has occurred -- your Golden Core has formed with flawless symmetry and purity. Light radiates from within you as the perfect core resonates with the heavens themselves. Such perfection occurs once in ten thousand cultivators."
 murim_breakthrough.0211.a: "Marvel at this miraculous achievement."
 murim_breakthrough.0300.t: "Nascent Soul Emergence"
 murim_breakthrough.0300.desc: "Your cultivation has reached the precipice of the Nascent Soul stage. Within your Golden Core, a miniature version of yourself begins to stir -- the Nascent Soul, seat of true power and the bridge to immortality."
 murim_breakthrough.0300.a: "Soul separation meditation."
 murim_breakthrough.0300.b: "Face the heavenly tribulation."
 murim_breakthrough.0300.c: "Delay -- I am not ready."
 murim_breakthrough.0310.t: "Nascent Soul Awakened!"
 murim_breakthrough.0310.desc: "Your Nascent Soul opens its eyes for the first time. A being of pure qi and consciousness sits within your dantian, perfectly mirroring your form. The boundary between life and death grows thin as your lifespan extends beyond mortal limits."
 murim_breakthrough.0310.a: "Embrace transcendence."
 murim_breakthrough.0315.t: "Tribulation-Forged Nascent Soul!"
 murim_breakthrough.0315.desc: "Through the crucible of heavenly tribulation, your Nascent Soul has been forged into something beyond ordinary -- tempered by divine lightning itself. Its power eclipses anything the mortal world has seen in centuries. The heavens tremble at your birth."
 murim_breakthrough.0315.a: "Let the world witness my power."
 murim_breakthrough.0400.t: "Soul Transformation -- The Final Barrier"
 murim_breakthrough.0400.desc: "The last mortal barrier stands before you. Soul Transformation -- the process of shedding your mortal shell and becoming a being of pure cultivation. Beyond this point, you will transcend the cycle of life and death itself."
 murim_breakthrough.0400.a: "Nine-fold tribulation ascension."
 murim_breakthrough.0400.b: "Sect formation ritual."
 murim_breakthrough.0400.c: "Abandon the attempt."
 murim_breakthrough.0410.t: "Soul Transformed -- Ascended Being!"
 murim_breakthrough.0410.desc: "Your mortal form dissolves and reforms as something greater. You stand reborn as an ascended being, your power vast enough to reshape the world itself. Mountains bow, rivers part, and the heavens acknowledge your arrival among the immortals."
 murim_breakthrough.0410.a: "I have transcended mortality."
 murim_breakthrough.0050.t: "Qi Deviation During Breakthrough"
 murim_breakthrough.0050.desc: "The breakthrough fails as your qi spirals out of control. Energy rampages through your meridians in violent waves, each one threatening to tear your cultivation apart. You must regain control or face devastating consequences."
 murim_breakthrough.0050.a: "Meditate to recover."
 murim_breakthrough.0050.b: "Push through the pain."
 murim_breakthrough.0060.t: "Meridian Damage"
 murim_breakthrough.0060.desc: "The failed breakthrough has damaged your meridian channels. Qi leaks from hairline fractures in your internal pathways, and each breath brings stabbing pain. Without treatment, the damage could become permanent."
 murim_breakthrough.0060.a: "Seek medical treatment."
 murim_breakthrough.0060.b: "Endure and self-heal."
 murim_breakthrough.0065.t: "Core Cracked"
 murim_breakthrough.0065.desc: "A sickening crack echoes through your consciousness. Your Golden Core has fractured under the strain of the failed breakthrough. Power hemorrhages from the wound, and your cultivation plummets as the foundation crumbles."
 murim_breakthrough.0065.a: "Sacrifice cultivation to save my life."
 murim_breakthrough.0065.b: "Attempt emergency stabilization."
 murim_breakthrough.0070.t: "Cultivation Crippled"
 murim_breakthrough.0070.desc: "Total catastrophe. Your meridians shatter, your qi reserve empties, and your cultivation collapses to nothing. Everything you have built over years of relentless practice is gone in a single devastating instant."
 murim_breakthrough.0070.a: "Accept my fate."
 murim_breakthrough.0070.b: "Seek forbidden restoration."
 murim_breakthrough.0080.t: "Forbidden Restoration"
 murim_breakthrough.0080.desc: "Deep in the underworld, a dark cultivator offers a forbidden technique to restore your shattered cultivation. The method requires blood sacrifice and demonic qi, but it is your only hope to walk the martial path again."
 murim_breakthrough.0080.a: "Take the dark cultivation path."
 murim_breakthrough.0080.b: "Accept my mortal fate."
 murim_breakthrough.0500.t: "Lightning Tribulation Descends"
 murim_breakthrough.0500.desc: "The heavens split open as divine lightning gathers above you. Thick thunderclouds spiral into an unnatural vortex, and bolts of tribulation lightning arc through the sky. The heavens have found you worthy of testing."
 murim_breakthrough.0500.a: "Face it head-on."
 murim_breakthrough.0500.b: "Use a protective formation."
 murim_breakthrough.0500.c: "Dodge and survive."
 murim_breakthrough.0510.t: "Nine Thunder Tribulation"
 murim_breakthrough.0510.desc: "The most devastating tribulation known to cultivators descends upon you. Nine bolts of divine thunder, each more powerful than the last, will strike in succession. Only the strongest souls survive the Nine Thunder Tribulation."
 murim_breakthrough.0510.a: "Absorb the lightning."
 murim_breakthrough.0510.b: "Endure wave by wave."
 murim_breakthrough.0600.t: "Cultivation Bottleneck"
 murim_breakthrough.0600.desc: "Your cultivation has stalled. Despite endless meditation and practice, the barrier to the next stage remains impenetrable. This bottleneck has consumed years from many cultivators' lives. A different approach may be needed."
 murim_breakthrough.0600.a: "Secluded meditation retreat."
 murim_breakthrough.0600.b: "Travel the world for inspiration."
 murim_breakthrough.0600.c: "Challenge a stronger opponent."
 murim_breakthrough.0610.t: "Bottleneck Broken!"
 murim_breakthrough.0610.desc: "Like a dam bursting, the bottleneck shatters in a single moment of brilliant insight. Understanding floods through you, and the barrier that seemed so impenetrable dissolves like morning mist. Your cultivation surges forward."
 murim_breakthrough.0610.a: "Embrace the sudden insight."
 murim_breakthrough.0700.t: "Rival Attacks During Breakthrough!"
 murim_breakthrough.0700.desc: "In your most vulnerable state, a rival strikes. They have been waiting for this moment -- when your qi is unstable and your attention focused inward. The cowardly attack could destroy everything you have worked for."
 murim_breakthrough.0700.a: "Allies, protect me!"
 murim_breakthrough.0700.b: "Break off and fight."
 murim_breakthrough.0700.c: "Use rage to fuel the breakthrough."
 murim_breakthrough.0710.t: "Sect Protection Offered"
 murim_breakthrough.0710.desc: "The sect elders have prepared a protective formation to guard your breakthrough attempt. Disciples stand in formation around your meditation chamber, channeling qi to shield you from interference."
 murim_breakthrough.0710.a: "Accept the protective formation."
 murim_breakthrough.0710.b: "Decline -- prove my independence."
 murim_breakthrough.0800.t: "Spiritual Nexus Discovered"
 murim_breakthrough.0800.desc: "You stumble upon a nexus of converging spiritual energy lines. The qi here is a hundred times denser than anywhere you have cultivated before. The ground itself pulses with power, and the air shimmers with visible spiritual energy."
 murim_breakthrough.0800.a: "Meditate at the nexus."
 murim_breakthrough.0800.b: "Build a cultivation chamber here."
 murim_breakthrough.0800.c: "Share with the sect."
 murim_breakthrough.0810.t: "Ancestral Inheritance"
 murim_breakthrough.0810.desc: "In dreams, the spirit of your deceased parent appears, offering to pass on the cultivation knowledge they accumulated in life. Their qi resonates with your own, a bridge across the boundary of death itself."
 murim_breakthrough.0810.a: "Accept the ancestral inheritance."
 murim_breakthrough.0810.b: "Merge it with my own path."
 murim_breakthrough.0900.t: "Master's Guidance"
 murim_breakthrough.0900.desc: "Your master has recognized that you stand at the threshold of a breakthrough. They offer to guide you personally through the process, sharing secrets that took them a lifetime to discover."
 murim_breakthrough.0900.a: "Accept guidance humbly."
 murim_breakthrough.0900.b: "Request the secret technique."
 murim_breakthrough.0900.c: "Decline -- I forge my own path."
 murim_breakthrough.0910.t: "Sect Formation Ritual"
 murim_breakthrough.0910.desc: "The sect has assembled its elders for a rare formation ritual designed to channel collective qi into those attempting breakthroughs. The formation circle glows with accumulated power as disciples take their positions."
 murim_breakthrough.0910.a: "Lead the formation ritual."
 murim_breakthrough.0910.b: "Participate without leading."
