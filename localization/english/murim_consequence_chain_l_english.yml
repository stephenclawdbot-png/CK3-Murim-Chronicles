l_english:
 # ===========================
 # CONSEQUENCE CHAIN EVENTS
 # Follow-ups for dead-end events
 # ===========================

 # --- Cultivation Consequences ---
 murim_consequence.0001.t: "Jealous Eyes"
 murim_consequence.0001.desc: "Your cultivation progress hasn't gone unnoticed. A fellow cultivator of similar rank watches you with barely disguised envy. They've been stuck at their current level for years while you advance effortlessly."
 murim_consequence.0001.a: "Offer to help them"
 murim_consequence.0001.b: "Ignore them"
 murim_consequence.0001.c: "Assert your superiority"

 murim_consequence.0002.t: "The Recruiter's Pitch"
 murim_consequence.0002.desc: "Your breakthrough has attracted attention. An elder from a prestigious sect has arrived with an offer: join them, and your cultivation will accelerate beyond anything your current sect can provide."
 murim_consequence.0002.a: "Consider the offer seriously"
 murim_consequence.0002.b: "Refuse — loyalty matters"
 murim_consequence.0002.c: "Use the offer as leverage with your sect"

 murim_consequence.0003.t: "The Healer's Price"
 murim_consequence.0003.desc: "Your qi deviation has left you vulnerable. A traveling healer offers to repair your damaged meridians, but their fee isn't gold — they want you to perform a dangerous task first."
 murim_consequence.0003.a: "Accept the task"
 murim_consequence.0003.b: "Find another healer"
 murim_consequence.0003.c: "Try to heal yourself"

 murim_consequence.0004.t: "Overheard Conspiracy"
 murim_consequence.0004.desc: "During deep meditation, your enhanced senses picked up a whispered conversation nearby. Two cultivators are planning to overthrow your sect's leadership. The plot is already advanced."
 murim_consequence.0004.a: "Report to your leader immediately"
 murim_consequence.0004.b: "Investigate further before acting"
 murim_consequence.0004.c: "Consider joining the conspiracy"

 murim_consequence.0005.t: "The Dark Shortcut"
 murim_consequence.0005.desc: "Your failed breakthrough has left you desperate. A mysterious figure appears, offering a forbidden scroll that guarantees success — but at the cost of your moral integrity."
 murim_consequence.0005.a: "Take the forbidden scroll"
 murim_consequence.0005.b: "Refuse and continue struggling"
 murim_consequence.0005.c: "Report the figure to the authorities"

 murim_consequence.0006.t: "Master's Choice"
 murim_consequence.0006.desc: "Your training has impressed your master. They offer you a fateful choice: specialize in their combat technique and become their successor, or follow the scholarly path and master cultivation theory."
 murim_consequence.0006.a: "Choose the combat path"
 murim_consequence.0006.b: "Choose the scholarly path"
 murim_consequence.0006.c: "Ask for time to decide"

 murim_consequence.0007.t: "The Wandering Sage"
 murim_consequence.0007.desc: "Stuck at a cultivation plateau, you encounter a wandering sage in the jianghu. Their cryptic words make no sense at first — but then something clicks, and you see a path forward."
 murim_consequence.0007.a: "Follow the sage's teaching"
 murim_consequence.0007.b: "Ask the sage to become your master"
 murim_consequence.0007.c: "Dismiss it as nonsense"

 murim_consequence.0008.t: "Meridian Resonance"
 murim_consequence.0008.desc: "Your qi gathering has caused your meridians to resonate with something buried nearby. Ancient energy pulses beneath the earth — an artifact or a sealed tomb, waiting to be unearthed."
 murim_consequence.0008.a: "Excavate immediately"
 murim_consequence.0008.b: "Mark the location and return with backup"
 murim_consequence.0008.c: "Seal it further — some things should stay buried"

 # --- Ranking Consequences ---
 murim_consequence.0010.t: "Imperial Eyes"
 murim_consequence.0010.desc: "Your rising rank has not escaped the imperial court's attention. An emissary arrives with gifts and subtle suggestions: the Emperor could use someone of your caliber."
 murim_consequence.0010.a: "Accept the Emperor's interest"
 murim_consequence.0010.b: "Politely deflect"
 murim_consequence.0010.c: "Use this to pressure your sect leader"

 murim_consequence.0011.t: "Mocked by Rivals"
 murim_consequence.0011.desc: "Your ranking drop has become public gossip. A rival cultivator mocks you openly at a gathering. Your disciples look to you for a response."
 murim_consequence.0011.a: "Challenge them to a duel"
 murim_consequence.0011.b: "Endure with dignity"
 murim_consequence.0011.c: "Respond with a devastating verbal retort"

 murim_consequence.0012.t: "Tribunal Invitation"
 murim_consequence.0012.desc: "Your entry into the top 10 rankings has caught the Heavenly Tribunal's attention. A judge approaches you privately: there may be a seat opening soon."
 murim_consequence.0012.a: "Express interest"
 murim_consequence.0012.b: "Decline — too much politics"
 murim_consequence.0012.c: "Ask what's expected of a judge"

 murim_consequence.0013.t: "Challenged at the Ceremony"
 murim_consequence.0013.desc: "The ink on your new ranking certificate isn't even dry when a challenger steps forward. They claim your ranking is undeserved and demand an immediate contest."
 murim_consequence.0013.a: "Accept the challenge"
 murim_consequence.0013.b: "Refuse — rankings aren't decided by duels"
 murim_consequence.0013.c: "Propose a formal tournament instead"

 murim_consequence.0014.t: "Wavering Disciples"
 murim_consequence.0014.desc: "Your ranking loss has shaken your disciples' faith. Two of your most promising students are considering leaving for a higher-ranked master. Loyalty is tested."
 murim_consequence.0014.a: "Show them your true strength"
 murim_consequence.0014.b: "Let them go with your blessing"
 murim_consequence.0014.c: "Promise them advancement if they stay"

 murim_consequence.0015.t: "The Rigged Board"
 murim_consequence.0015.desc: "Evidence surfaces that the ranking board has been manipulated by shadow politics operatives. Some rankings are fraudulent. The martial world demands an investigation."
 murim_consequence.0015.a: "Lead the investigation"
 murim_consequence.0015.b: "Exploit the chaos"
 murim_consequence.0015.c: "Demand a complete reset"

 # --- Duel Consequences ---
 murim_consequence.0020.t: "The Loser's Sect Retaliates"
 murim_consequence.0020.desc: "The cultivator you defeated in the duel is the pride of their sect. Their sect leader sends you a message: return honor to their disciple, or face clan war."
 murim_consequence.0020.a: "Prepare for clan war"
 murim_consequence.0020.b: "Offer reparations"
 murim_consequence.0020.c: "Challenge their sect leader directly"

 murim_consequence.0021.t: "Comfort in Defeat"
 murim_consequence.0021.desc: "After your duel loss, you sit alone nursing your wounds. Someone approaches — someone you've noticed watching you for a while. They offer comfort, and something deeper."
 murim_consequence.0021.a: "Accept their comfort"
 murim_consequence.0021.b: "Push them away — shame is too great"
 murim_consequence.0021.c: "Train harder instead of dwelling on loss"

 murim_consequence.0022.t: "Summoned for Killing"
 murim_consequence.0022.desc: "The cultivator you killed in the duel had connections. The Heavenly Tribunal has issued a summons: you must appear before the judges to justify the death."
 murim_consequence.0022.a: "Appear before the Tribunal"
 murim_consequence.0022.b: "Argue it was a fair duel"
 murim_consequence.0022.c: "Flee — the Tribunal won't be fair"

 murim_consequence.0023.t: "Respect After the Draw"
 murim_consequence.0023.desc: "Your duel ended in a draw, and something changed between you and your opponent. There's a mutual respect now — the kind forged only in combat. They propose a blood oath."
 murim_consequence.0023.a: "Accept the blood oath"
 murim_consequence.0023.b: "Decline but maintain friendship"
 murim_consequence.0023.c: "Propose a master-disciple relationship instead"

 murim_consequence.0024.t: "The Imperial Hand"
 murim_consequence.0024.desc: "The challenge wasn't personal — your opponent reveals they were sent by the imperial court to test your abilities. The Emperor has plans for you."
 murim_consequence.0024.a: "Agree to meet the Emperor"
 murim_consequence.0024.b: "Refuse to be anyone's puppet"
 murim_consequence.0024.c: "Demand to know what the Emperor wants"

 murim_consequence.0025.t: "Dishonorable Reputation"
 murim_consequence.0025.desc: "Word of your dishonorable duel tactics has spread through the jianghu like wildfire. Tavern storytellers embellish the tale. Your reputation takes a hit, but some see ruthlessness as strength."
 murim_consequence.0025.a: "Embrace the ruthless reputation"
 murim_consequence.0025.b: "Try to correct the narrative"
 murim_consequence.0025.c: "Challenge anyone who repeats the story"

 # --- Calamity Consequences ---
 murim_consequence.0030.t: "Nightmares of the Calamity"
 murim_consequence.0030.desc: "You survived the calamity, but the nightmares won't stop. Every night you relive the destruction. Your cultivation suffers as your mind fractures. You need help — or a way to channel the trauma."
 murim_consequence.0030.a: "Seek spiritual healing"
 murim_consequence.0030.b: "Channel the trauma into combat fury"
 murim_consequence.0030.c: "Meditate to confront your fears"

 murim_consequence.0031.t: "Rebuilding from Nothing"
 murim_consequence.0031.desc: "Your sect is gone. The buildings are rubble, the scrolls are ash, most of your disciples are dead. But you survived. And a handful of loyal followers look to you for direction."
 murim_consequence.0031.a: "Rebuild the sect from scratch"
 murim_consequence.0031.b: "Merge with another sect"
 murim_consequence.0031.c: "Go wandering — the jianghu calls"

 murim_consequence.0032.t: "The Scramble"
 murim_consequence.0032.desc: "The calamity has ended, but the real battle begins: resources. Cultivation grounds, technique scrolls, medicinal herbs — everything is scarce. Multiple sects eye the same prizes."
 murim_consequence.0032.a: "Race to claim resources"
 murim_consequence.0032.b: "Propose fair distribution"
 murim_consequence.0032.c: "Let others fight while you cultivate"

 murim_consequence.0033.t: "The Spy Among Refugees"
 murim_consequence.0033.desc: "One of the refugees you sheltered isn't what they seem. They've been gathering intelligence on your sect's defenses and techniques, reporting to a rival clan."
 murim_consequence.0033.a: "Confront and expel the spy"
 murim_consequence.0033.b: "Feed them false information"
 murim_consequence.0033.c: "Recruit them as a double agent"

 murim_consequence.0034.t: "Corruption's Choice"
 murim_consequence.0034.desc: "The calamity left dark qi saturating your meridians. You can feel it — alien, powerful, corrupting. You could purge it painfully, or embrace it and gain power beyond your current cultivation."
 murim_consequence.0034.a: "Purge the corruption"
 murim_consequence.0034.b: "Embrace the dark power"
 murim_consequence.0034.c: "Seek a balance between light and dark"

 murim_consequence.0035.t: "Post-Calamity Tournament"
 murim_consequence.0035.desc: "To establish the new power hierarchy after the calamity, a grand tournament is announced. Every surviving sect must send their champions. The winner's sect gets priority in the rebuilding."
 murim_consequence.0035.a: "Enter as your sect's champion"
 murim_consequence.0035.b: "Send your best disciple instead"
 murim_consequence.0035.c: "Boycott — tournaments won't fix anything"

 # --- War/Political Consequences ---
 murim_consequence.0040.t: "The Prisoner's Bargain"
 murim_consequence.0040.desc: "You captured an enemy cultivator in battle. They offer something unexpected: a forbidden technique scroll, in exchange for their freedom. The technique is real — and powerful."
 murim_consequence.0040.a: "Accept the trade"
 murim_consequence.0040.b: "Refuse — hand them to the Tribunal"
 murim_consequence.0040.c: "Take the scroll AND keep the prisoner"

 murim_consequence.0041.t: "Border Tensions"
 murim_consequence.0041.desc: "The peace treaty is signed, but the border between formerly warring sects is a powder keg. A minor incident — a disciple crossing the line — threatens to reignite the conflict."
 murim_consequence.0041.a: "De-escalate immediately"
 murim_consequence.0041.b: "Use it as a pretext to renegotiate terms"
 murim_consequence.0041.c: "Ignore it — peace is fragile but necessary"

 murim_consequence.0042.t: "Marked as Traitor"
 murim_consequence.0042.desc: "Your faction betrayal has made you the most hated person in the martial world. Your former allies hunt you. Your new allies don't fully trust you. Everywhere you go, whispers follow."
 murim_consequence.0042.a: "Prove your loyalty to your new faction"
 murim_consequence.0042.b: "Go into hiding"
 murim_consequence.0042.c: "Play both sides as a double agent"

 murim_consequence.0043.t: "Spoils of War Dispute"
 murim_consequence.0043.desc: "Victory has been claimed, but the division of spoils is tearing your alliance apart. Three clan leaders want the same sphere of influence. If you don't mediate, the alliance will collapse."
 murim_consequence.0043.a: "Mediate fairly"
 murim_consequence.0043.b: "Claim the influence for yourself"
 murim_consequence.0043.c: "Support the strongest claimant"

 murim_consequence.0044.t: "The Court's Dark Secrets"
 murim_consequence.0044.desc: "Serving the Emperor has given you access to the palace's hidden archives. What you find there shocks you: the court has been secretly controlling the martial world for centuries."
 murim_consequence.0044.a: "Expose the truth to the martial world"
 murim_consequence.0044.b: "Keep the secret — knowledge is power"
 murim_consequence.0044.c: "Use the information to gain imperial favor"

 murim_consequence.0045.t: "Revenge of the Judged"
 murim_consequence.0045.desc: "The cultivator the Tribunal exiled has returned — stronger, angrier, and with followers of their own. They're targeting tribunal judges one by one. You're on their list."
 murim_consequence.0045.a: "Prepare for their attack"
 murim_consequence.0045.b: "Reach out for reconciliation"
 murim_consequence.0045.c: "Strike first — hunt them down"

 murim_consequence.0046.t: "Counter-Intelligence"
 murim_consequence.0046.desc: "Your shadow politics victory has made you a target. The rival intelligence network has identified you and launched a counter-operation. The hunter has become the hunted."
 murim_consequence.0046.a: "Go deeper underground"
 murim_consequence.0046.b: "Set a trap for your pursuers"
 murim_consequence.0046.c: "Retire from shadow politics — too dangerous"

