l_english:
 murim_faction_war.0001.t: "Tensions Rising"
 murim_faction_war.0001.desc.orthodox: "The Demonic Path grows bolder with each passing season. Orthodox elders whisper of provocations, of assassinations disguised as accidents, of Heavenly Demon agents slithering through the courts. The Righteous Path must steel itself -- war is coming, whether we wish it or not."
 murim_faction_war.0001.desc.unorthodox: "The so-called 'Righteous Path' tightens its grip on the martial world, preaching virtue while hoarding power. The Heavenly Demon Sect will not kneel to hypocrites. The time to shatter their sanctimonious alliance draws near."
 murim_faction_war.0001.desc.neutral: "The martial world trembles on the edge of a blade. Orthodox and Unorthodox factions arm themselves openly, and the air reeks of killing intent. For those caught between the two great powers, survival demands a choice -- or the cunning to avoid one."
 murim_faction_war.0001.a: "Rally our faction for the coming war!"
 murim_faction_war.0001.b: "Counsel peace -- war benefits no one."
 murim_faction_war.0001.c: "Prepare secretly and watch."
 murim_faction_war.0001.d: "Flee the martial world entirely."
 murim_faction_war.0002.t: "Peace Negotiations"
 murim_faction_war.0002.desc: "A fragile opportunity for peace has emerged. Both factions have agreed to at least hear terms, though trust is thinner than rice paper. The wrong word, the wrong gesture, could ignite the very war we seek to prevent. But if peace can hold, thousands of lives may be spared."
 murim_faction_war.0002.a: "Propose a summit at Shaolin Temple."
 murim_faction_war.0002.b: "Offer a cross-faction marriage alliance."
 murim_faction_war.0002.c: "Give up on peace. Prepare for war."
 murim_faction_war.0003.t: "Peace Summit Succeeds"
 murim_faction_war.0003.desc: "Against all odds, the peace summit has succeeded. Orthodox and Unorthodox leaders clasped hands before witnesses, swearing oaths of non-aggression. The martial world exhales. For now, the rivers of blood remain only in our nightmares. But how long will this fragile peace endure?"
 murim_faction_war.0003.a: "Celebrate -- we prevented bloodshed!"
 murim_faction_war.0003.b: "Use this peace to strengthen our position."
 murim_faction_war.0004.t: "Cross-Faction Marriage Proposal"
 murim_faction_war.0004.desc: "A daring proposal: bind the two factions through marriage, creating a blood tie that makes war unthinkable. It is the oldest strategy in the world, and the most painful. Whoever crosses this divide will carry the weight of two worlds on their shoulders."
 murim_faction_war.0004.a: "Offer a marriage across faction lines."
 murim_faction_war.0004.b: "Offer myself as a hostage-guest instead."
 murim_faction_war.0004.c: "Withdraw -- it is too dangerous."
 murim_faction_war.0005.t: "Marriage Alliance Accepted"
 murim_faction_war.0005.desc: "The impossible has happened. An Orthodox daughter and an Unorthodox son -- or perhaps the reverse -- will be joined in marriage. Two worlds that have shed each other's blood for generations will now share a bloodline. Some call it beautiful. Others call it the ultimate betrayal."
 murim_faction_war.0005.a: "Grand ceremony -- let all the world witness."
 murim_faction_war.0005.b: "Quiet ceremony -- avoid drawing attention."
 murim_faction_war.0006.t: "Marriage Proposal Rejected"
 murim_faction_war.0006.desc: "The marriage proposal has been thrown back in our faces like filth. Their faction's leader spat upon the offer, calling it an insult to their ancestors. The humiliation burns like acid. Some whisper that this rejection makes war inevitable."
 murim_faction_war.0006.a: "Swallow the insult. Maintain composure."
 murim_faction_war.0006.b: "This insult means war!"
 murim_faction_war.0006.c: "Take the bride by force."
 murim_faction_war.0007.t: "Hostage-Guest in Enemy Territory"
 murim_faction_war.0007.desc: "You live among those who would kill your faction-mates without hesitation. Every smile could hide a blade, every kindness a trap. Yet here, behind enemy lines, you have access to their training halls, their strategy meetings, their unguarded conversations. The question is: what will you do with this opportunity?"
 murim_faction_war.0007.a: "Learn their techniques secretly."
 murim_faction_war.0007.b: "Genuinely befriend them."
 murim_faction_war.0007.c: "Escape and report back."
 murim_faction_war.0007.d: "Defect to their faction."
 murim_faction_war.0008.t: "The Captive"
 murim_faction_war.0008.desc: "The kidnapping succeeded -- barely. Your captive glares at you with fury that could melt iron, yet there is something else in their eyes. Curiosity, perhaps. Or the first flicker of understanding that the divide between your factions is not as absolute as they were taught."
 murim_faction_war.0008.a: "Perhaps bonds can form even here."
 murim_faction_war.0008.b: "Use them as leverage for peace."
 murim_faction_war.0008.c: "Release them -- honor demands it."
 murim_faction_war.0009.t: "Exposed!"
 murim_faction_war.0009.desc: "Your scheme has been discovered. Enemy martial artists surround you, their killing intent pressing down like a physical weight. Escape seems impossible, surrender unthinkable. Every training session, every technique you have ever learned -- it all comes down to this moment."
 murim_faction_war.0009.a: "Fight your way out!"
 murim_faction_war.0009.b: "Beg for mercy."
 murim_faction_war.0009.c: "Deploy poison to cover your escape."
 murim_faction_war.0009.d: "Activate shadow assassination technique."
 murim_faction_war.0010.t: "The Great Faction War Erupts"
 murim_faction_war.0010.desc.orthodox: "The war we dreaded has arrived. The Heavenly Demon Sect and its unorthodox allies have unleashed their full fury upon the Righteous Path. Shaolin burns. Mount Hua bleeds. Every orthodox disciple must take up arms or perish. The fate of the martial world hangs in the balance."
 murim_faction_war.0010.desc.unorthodox: "The chains of orthodox tyranny are finally broken! The Heavenly Demon leads the charge against the hypocrites who have oppressed the martial world for centuries. Today we fight. Today we conquer. Today the Demonic Path rises!"
 murim_faction_war.0010.desc.neutral: "The martial world has erupted into total war. Orthodox and Unorthodox factions clash across every province, turning mountains into battlefields and rivers into graves. For those unaligned, this is both the greatest danger and the greatest opportunity."
 murim_faction_war.0010.a: "Lead the charge for our faction!"
 murim_faction_war.0010.b: "Defend our clan's territory."
 murim_faction_war.0010.c: "Profit from both sides."
 murim_faction_war.0010.d: "Go into hiding with my family."
 murim_faction_war.0010.e: "Challenge the enemy faction leader directly!"
 murim_faction_war.0011.t: "Battlefield Skirmish"
 murim_faction_war.0011.desc: "The clash of steel echoes through the valley as faction warriors collide in furious combat. Amid the chaos, an enemy champion stands out -- their technique flawless, their killing intent overwhelming. They have already felled three of your allies. Someone must face them."
 murim_faction_war.0011.a: "Duel the enemy champion!"
 murim_faction_war.0011.b: "Lead a group ambush."
 murim_faction_war.0011.c: "Unleash the forbidden technique."
 murim_faction_war.0011.d: "Protect civilians caught in the crossfire."
 murim_faction_war.0012.t: "Clan Headquarters Under Attack"
 murim_faction_war.0012.desc: "They have come for our home. Enemy forces assault the gates of our ancestral training grounds, the halls where generations of disciples honed their craft. The sacred scrolls, the founder's weapons, the memory of everything our clan has built -- all will be lost if we fall here."
 murim_faction_war.0012.a: "Rally the disciples! Defend our home!"
 murim_faction_war.0012.b: "Evacuate the sacred texts and artifacts."
 murim_faction_war.0012.c: "Negotiate surrender to preserve lives."
 murim_faction_war.0012.d: "Set a deadly trap for the invaders."
 murim_faction_war.0013.t: "Betrayal From Within"
 murim_faction_war.0013.desc: "A sickening discovery: one of our own clan elders has been feeding intelligence to the enemy faction. Their treachery explains our recent defeats, the ambushes that came too precisely, the supply routes that were cut too cleanly. The traitor must be dealt with -- but how?"
 murim_faction_war.0013.a: "Investigate and identify the traitor."
 murim_faction_war.0013.b: "Feed false information through them."
 murim_faction_war.0013.c: "Purge all suspected traitors."
 murim_faction_war.0014.t: "Confronting the Traitor"
 murim_faction_war.0014.desc: "The traitor elder stands before you, exposed at last. Their eyes hold no shame, only a weary resignation. Perhaps they believed they were saving the clan by dealing with the enemy. Perhaps they were simply bought. Either way, the clan demands justice."
 murim_faction_war.0014.a: "Public execution. Make an example."
 murim_faction_war.0014.b: "Strip their rank and exile them."
 murim_faction_war.0014.c: "Turn them into a double agent."
 murim_faction_war.0014.d: "Forgive them. They had their reasons."
 murim_faction_war.0015.t: "Faction Leader Duel"
 murim_faction_war.0015.desc: "This is the moment that could end the war. You stand across from the enemy faction's leader, the most powerful martial artist of the opposing side. A thousand disciples watch in breathless silence. If you win, the war ends. If you lose, your faction crumbles. There is no retreat from this arena."
 murim_faction_war.0015.a: "Duel to the death."
 murim_faction_war.0015.b: "Duel to submission -- show mercy."
 murim_faction_war.0015.c: "Withdraw the challenge. I cannot win."
 murim_faction_war.0016.t: "Forbidden Technique Backlash"
 murim_faction_war.0016.desc: "The forbidden technique you unleashed in battle has turned against you. Dark qi rampages through your meridians, tearing at your organs from within. The power was too great, the cost too high. You gambled everything on a single devastating blow, and now the debt comes due."
 murim_faction_war.0016.a: "Qi deviation ravages my body."
 murim_faction_war.0016.b: "My own faction condemns my methods."
 murim_faction_war.0016.c: "The technique consumed someone I love."
 murim_faction_war.0017.t: "The Faction War Ends"
 murim_faction_war.0017.desc.orthodox_wins: "The Righteous Path stands victorious! The Heavenly Demon Sect and its unorthodox allies have been shattered, their leaders killed or scattered to the winds. Orthodox banners fly over captured strongholds. The martial world can begin to heal -- but the scars will last a generation."
 murim_faction_war.0017.desc.unorthodox_wins: "The Demonic Path triumphant! The so-called 'righteous' clans have been broken, their hollow virtue exposed for all to see. A new order rises in the martial world, led by the strong rather than the sanctimonious."
 murim_faction_war.0017.desc.draw: "The war ends not with a decisive victory, but with mutual exhaustion. Both factions have bled themselves dry, and neither can claim true triumph. The martial world limps toward an uneasy peace, its strength halved and its unity shattered."
 murim_faction_war.0017.a: "Demand unconditional surrender."
 murim_faction_war.0017.b: "Generous peace -- rebuild together."
 murim_faction_war.0017.c: "Absorb the defeated into our clan."
 murim_faction_war.0018.t: "Captured!"
 murim_faction_war.0018.desc: "Iron chains bind your broken body in a dank cell beneath the enemy stronghold. Your wounds throb with every heartbeat. They will come with questions soon -- questions about your faction's strength, your clan's secret techniques, the location of your hidden allies. The choice between loyalty and survival has never been more real."
 murim_faction_war.0018.a: "Endure torture. Reveal nothing."
 murim_faction_war.0018.b: "Reveal secrets to survive."
 murim_faction_war.0018.c: "Challenge my captor to a rematch."
 murim_faction_war.0018.d: "Offer to defect."
 murim_faction_war.0019.t: "Rescue Attempt"
 murim_faction_war.0019.desc: "A commotion outside your cell -- the clash of blades, shouting, the unmistakable sound of your clan's battle cry. Your disciples have come for you, risking everything on a desperate rescue mission deep behind enemy lines. But rescue attempts can fail, and failure means more prisoners."
 murim_faction_war.0019.a: "Coordinate with the rescuers!"
 murim_faction_war.0019.b: "Tell them to leave me. Save themselves."
 murim_faction_war.0019.c: "Use the distraction to escape alone."
 murim_faction_war.0020.t: "Faction Defection"
 murim_faction_war.0020.desc: "The unthinkable weighs on your mind. Your faction's cause no longer moves you -- perhaps it never did. The enemy's philosophy makes a strange kind of sense. Or perhaps you simply wish to survive. Whatever the reason, the path of defection lies before you, dark and irreversible."
 murim_faction_war.0020.a: "Defect fully. Switch factions."
 murim_faction_war.0020.b: "Become a double agent instead."
 murim_faction_war.0020.c: "Go independent. Leave both factions."
 murim_faction_war.0020.d: "Stay loyal. I will not betray my brothers."
