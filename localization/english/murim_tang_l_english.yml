l_english:
 murim_tang.0001.t: "Tang Clan Poison Refinement"
 murim_tang.0001.desc: "The alchemy chamber fills with acrid fumes as reagents bubble in jade vessels. The Tang Clan's art demands precision — one wrong measure and the poison turns against its maker. What will you create today?"
 murim_tang.0001.a: "Refine a lethal combat poison."
 murim_tang.0001.b: "Brew healing antidotes instead."
 murim_tang.0001.c: "Craft hidden weapons."
 murim_tang.0001.d: "Study poison theory quietly."
 murim_tang.0002.t: "Assassination Contract"
 murim_tang.0002.desc: "A sealed bamboo scroll arrives bearing a name and a price. Someone wants your rival dead, and the Tang Clan's methods ensure no blade need be drawn. Poison is patient, invisible, and absolute."
 murim_tang.0002.a: "Accept — carry out the assassination."
 murim_tang.0002.b: "Decline — too dishonorable."
 murim_tang.0002.c: "Warn the target instead."
 murim_tang.0002.d: "Blackmail the contractor."
 murim_tang.0003.t: "The Antidote's Price"
 murim_tang.0003.desc: "Word reaches you that a prominent figure writhes in agony from slow-acting poison. Only the Tang Clan possesses the antidote. A life hangs in the balance — and so does an opportunity."
 murim_tang.0003.a: "Cure them for free — earn righteousness."
 murim_tang.0003.b: "Demand gold for the cure."
 murim_tang.0003.c: "Demand a favor in exchange."
 murim_tang.0003.d: "Let them suffer."
 murim_tang.0004.t: "Poison Resistance Training"
 murim_tang.0004.desc: "Rows of jade vials line the training chamber, each containing a different poison. To become a true Tang master, you must build immunity through your own flesh. The path to the Hundred Poisons Body begins with a single burning sip."
 murim_tang.0004.a: "Full intensity — drink them all."
 murim_tang.0004.b: "Gradual microdosing — slow and safe."
 murim_tang.0004.c: "Refuse — the risk is too great."
 murim_tang.0005.t: "The Poisoned Banquet"
 murim_tang.0005.desc: "A grand banquet lies spread before the gathered elite. Your lethal poison rests concealed in your sleeve, colorless and odorless. The host suspects nothing. One drop could reshape the balance of power."
 murim_tang.0005.a: "Poison the main course."
 murim_tang.0005.b: "Subtly poison the wine."
 murim_tang.0005.c: "Attend honestly — no poison."
 murim_tang.0005.d: "Skip the banquet entirely."
 murim_tang.0006.t: "Hidden Weapon Challenge"
 murim_tang.0006.desc: "A brash martial artist has publicly mocked the Tang Clan's reliance on hidden weapons, calling it the art of cowards. The challenge is clear — prove the deadliness of needle and dart, or let the insult stand."
 murim_tang.0006.a: "Accept — demonstrate our hidden weapons."
 murim_tang.0006.b: "Decline — beneath my notice."
 murim_tang.0006.c: "Offer to teach them instead."
 murim_tang.0007.t: "Black Market Poison Trade"
 murim_tang.0007.desc: "Shadowy figures gather at the jianghu underground market. The Tang Clan's poisons and antidotes are the most sought-after commodities. Everyone wants your wares — righteous, demonic, and everything between."
 murim_tang.0007.a: "Sell to the highest bidder."
 murim_tang.0007.b: "Sell only to righteous sects."
 murim_tang.0007.c: "Sell to the demonic faction."
 murim_tang.0007.d: "Keep the stock for personal use."
 murim_tang.0008.t: "Tang Clan Succession Crisis"
 murim_tang.0008.desc: "The Tang family head lies on the verge of death, and the secret recipes remain unbestowed. Rival heirs circle like vultures over the clan's vast poison legacy. Blood or cunning will determine who inherits."
 murim_tang.0008.a: "Claim leadership through the poison trial."
 murim_tang.0008.b: "Challenge the rival heir to a duel."
 murim_tang.0008.c: "Support another candidate as kingmaker."
 murim_tang.0008.d: "Leave the clan entirely."
 murim_tang.0009.t: "Poison and Medicine: Two Sides"
 murim_tang.0009.desc: "An old master's words echo in your mind: poison and medicine are born of the same root. Every toxin conceals a cure; every cure conceals a toxin. Which face of this duality will define your legacy?"
 murim_tang.0009.a: "Embrace the poison path fully."
 murim_tang.0009.b: "Pursue the medicine path — become a healer."
 murim_tang.0009.c: "Walk the dual path of balance."
 murim_tang.0009.d: "Abandon poison study altogether."
 murim_tang.0010.t: "Tang Clan Defense Pact"
 murim_tang.0010.desc: "War encroaches upon the land, and the Tang Clan's poison expertise could tip the balance. Allies seek your aid — poison traps for enemies, antidotes for friends. The neutral Tang must choose how far to commit."
 murim_tang.0010.a: "Deploy poison traps for defense."
 murim_tang.0010.b: "Supply antidotes to allied forces."
 murim_tang.0010.c: "Stay neutral — the Tang way."
