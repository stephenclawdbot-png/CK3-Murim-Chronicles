l_english:

 # ==========================================
 # MURIM LEDGER DECISIONS
 # ==========================================
 open_murim_ledger_decision_title:0 "Open the Murim Ledger"
 open_murim_ledger_decision_desc:0 "Consult the records of the martial world. The Murim Ledger contains the rankings of the top 50 martial artists, profiles of the nine great clans, your own martial cultivation progress, recent notable events, and upcoming tournament schedules. Maintained by the intelligence networks of the nine clans and updated by wandering scribes."
 open_murim_ledger_decision_tooltip:0 "Open the Murim Ledger to view the state of the martial world."

 murim_challenge_ranked_decision_title:0 "Challenge a Ranked Martial Artist"
 murim_challenge_ranked_decision_desc:0 "Issue a formal challenge to a martial artist ranked above you. If they accept, a duel will be arranged under the old rules. Victory means claiming their rank. Defeat means losing face and dropping in the rankings."

 murim_request_clan_membership_decision_title:0 "Request Clan Membership"
 murim_request_clan_membership_decision_desc:0 "Approach one of the nine great clans and request to join as a disciple. Each clan has different requirements and specializations. Mount Hua values swordsmanship, Shaolin demands iron body discipline, Wudang seeks inner harmony, Tang Clan guards its poison secrets, Beggar Sect welcomes the resourceful, Iron Fist Gate respects raw power, Heavenly Demon Sect tempts with forbidden strength, Poison Flower Palace prizes botanical mastery, and Phantom Blade Sect recruits the stealthy."

 # ==========================================
 # MASTER DECISIONS (murim_decisions.txt)
 # ==========================================
 murim_create_custom_clan_decision_title:0 "Found a New Martial Clan"
 murim_create_custom_clan_decision_desc:0 "Your martial prowess has reached a level where you could establish your own clan. The hard path requires securing approval votes from at least six of the nine existing clan leaders. The supreme path is available only to the number one ranked martial artist, who may simply declare a new clan into existence."

 murim_begin_training_decision_title:0 "Begin Focused Training"
 murim_begin_training_decision_desc:0 "Dedicate yourself to intensive martial training for the coming months. Push your body and spirit to their limits, risking injury for the chance of meaningful cultivation progress."

 murim_seek_entry_decision_title:0 "Seek Entry to the Martial World"
 murim_seek_entry_decision_desc:0 "You have heard whispers of a hidden world where warriors cultivate supernatural powers. Four paths lead into this world: the desperate path of a landless adventurer, the privileged path of a landed noble with resources, the courtier's path of encountering martial artists in service, or the explorer's path of stumbling upon ancient training grounds."

 murim_challenge_ranking_decision_title:0 "Challenge for Ranking Position"
 murim_challenge_ranking_decision_desc:0 "Formally challenge a martial artist ranked above you in the Top 50. This is a serious commitment that will be witnessed by the martial world. Win, and you claim their position. Lose, and you face shame and possible injury."

 # ==========================================
 # MURIM ENTER SECLUSION (from murim_ledger_decisions.txt)
 # ==========================================
 murim_enter_seclusion_decision_title:0 "Enter Martial Seclusion"
 murim_enter_seclusion_decision_desc:0 "Withdraw from worldly affairs to focus entirely on cultivation. During seclusion, diplomatic and courtly abilities will suffer, but learning and martial progress will be greatly enhanced. A period of solitude that many great masters have used to achieve breakthroughs."

 # ==========================================
 # ADDITIONAL LEDGER ENTRIES
 # ==========================================
 murim_ledger.0001.t:0 "The Murim Ledger"
 murim_ledger.0001.desc:0 "The Murim Ledger lies open before you, its pages filled with the deeds of the martial world's greatest warriors. What would you like to consult?"
 murim_ledger.0001.a:0 "View the Rankings"
 murim_ledger.0001.b:0 "Check Clan Status"
 murim_ledger.0001.c:0 "Review My Profile"
 murim_ledger.0001.d:0 "Recent Events"
 murim_ledger.0001.e:0 "Tournament Schedule"
 murim_ledger.0001.f:0 "Close the Ledger"
