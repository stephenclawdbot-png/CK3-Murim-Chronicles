l_english:

 # ==========================================
 # CULTIVATION MODIFIERS
 # ==========================================
 murim_qi_circulation_boost_desc:0 "Qi flows freely through opened meridians, enhancing martial prowess and vitality."
 murim_qi_deviation_recovery_desc:0 "Recovering from a dangerous qi deviation. Meridians are damaged and cultivation base is unstable."
 murim_breakthrough_euphoria_desc:0 "The exhilaration of breaking through to a new cultivation realm fills every fiber of being."
 murim_meridian_opening_strain_desc:0 "The painful process of forcing open blocked meridians has left the body exhausted."
 murim_cultivation_seclusion_desc:0 "In deep seclusion, focusing entirely on cultivation at the cost of worldly connections."
 murim_qi_stagnation_desc:0 "Cultivation progress has stalled. The path forward is unclear and frustrating."
 murim_heavenly_tribulation_survivor_desc:0 "Survived the Heavenly Tribulation that marks the boundary between mortal and transcendent realms."
 murim_heavenly_tribulation_scarred_desc:0 "The Heavenly Tribulation's lightning left deep scars, a permanent reminder of the price of power."
 murim_dual_cultivation_harmony_desc:0 "Practicing dual cultivation with a partner, harmonizing yin and yang qi for mutual benefit."
 murim_core_formation_radiance_desc:0 "The golden core radiates spiritual energy, visible to those with qi sensitivity."
 murim_nascent_soul_presence_desc:0 "A nascent soul cultivator's mere presence commands respect and awe from lesser martial artists."
 murim_recent_breakthrough_attempt_desc:0 "Recently attempted a cultivation breakthrough. The body needs time to stabilize."
 murim_recent_tribulation_desc:0 "Recently endured a heavenly tribulation. Still recovering from the ordeal."
 murim_dual_meridian_harmony_desc:0 "Perfect harmony between dual meridian pathways grants exceptional qi flow and combat instincts."
 murim_forbidden_technique_mastered_desc:0 "Mastered a forbidden technique that grants immense power at a terrible cost to body and reputation."

 # ==========================================
 # COMBAT MODIFIERS
 # ==========================================
 murim_battle_scarred_veteran_desc:0 "Years of real combat have forged a hardened warrior, bearing the scars of countless battles."
 murim_duel_champion_fame_desc:0 "Renowned across the martial world for victories in formal duels against worthy opponents."
 murim_crippled_meridians_desc:0 "Meridians have been deliberately damaged by an enemy. Qi circulation is severely impaired."
 murim_defeat_shame_desc:0 "The bitter shame of a public defeat weighs heavily. Others whisper about the loss."
 murim_intense_training_regime_desc:0 "Pushing the body to its absolute limits with a punishing daily training regimen."

 # ==========================================
 # SECT & CLAN MODIFIERS
 # ==========================================
 murim_sect_harmony_high_desc:0 "The clan is in harmony. Disciples cooperate, elders guide wisely, and morale is excellent."
 murim_sect_harmony_low_desc:0 "Internal strife plagues the clan. Factions bicker, disciples are restless, and morale crumbles."
 murim_sect_loyalty_desc:0 "Deep loyalty to the clan, forged through years of shared training and mutual dependence."
 murim_joint_cultivation_bond_desc:0 "A deep bond formed through joint cultivation sessions, sharing qi and technique insights."
 murim_technique_exchange_insight_desc:0 "Gained fresh perspectives from exchanging techniques with a fellow martial artist."
 murim_poison_qi_disruption_desc:0 "Poison has infiltrated the qi pathways, causing intermittent disruption to cultivation."
 murim_stolen_technique_guilt_desc:0 "The guilt of stealing another's hard-earned technique weighs on the conscience."

 # ==========================================
 # FACTION MODIFIERS (Orthodox vs Unorthodox)
 # ==========================================
 murim_orthodox_faction_fervor_desc:0 "Burning with righteous conviction for the Orthodox path. The Murim Alliance's cause is just."
 murim_unorthodox_faction_fervor_desc:0 "Embracing the freedom and power of the Unorthodox path. The Heavenly Demon's vision is truth."
 murim_faction_war_exhaustion_desc:0 "The endless conflict between Orthodox and Unorthodox factions has drained morale and resources."

 # ==========================================
 # SHADOW POLITICS MODIFIERS
 # ==========================================
 murim_puppet_emperor_influence_desc:0 "Operating as a shadow hand behind the imperial throne, manipulating court politics for the Heavenly Demon Sect."
 murim_court_infiltrator_desc:0 "Embedded within the imperial court as a covert agent, gathering intelligence and sowing discord."
 murim_shadow_politics_aware_desc:0 "Aware of the Heavenly Demon Sect's shadow operations within the imperial court."

 # ==========================================
 # SCOUT & RECRUITMENT MODIFIERS
 # ==========================================
 murim_scout_traveling_desc:0 "A clan scout is currently traveling distant lands, seeking talented youth for recruitment."
 murim_successful_recruitment_fame_desc:0 "Known for successfully recruiting exceptional talent, bringing honor and fresh blood to the clan."
 murim_scout_rivalry_desc:0 "A rival clan's scouts are competing for the same recruits, escalating tensions."

 # ==========================================
 # RANKING TIER MODIFIERS
 # ==========================================
 murim_top_10_elite_modifier_desc:0 "Among the top 10 martial artists in the world. A living legend whose name echoes across all nine clans."
 murim_top_50_recognized_modifier_desc:0 "Recognized as one of the top 50 martial artists. Respected and feared throughout the martial world."

 # ==========================================
 # TRAINING & SECLUSION MODIFIERS
 # ==========================================
 murim_active_training_desc:0 "Currently engaged in focused martial training, pushing the body to its limits daily."
 murim_seclusion_focus_desc:0 "In martial seclusion, withdrawing from worldly affairs to concentrate on cultivation."
 murim_recent_challenge_cooldown_desc:0 "Recently participated in a ranking challenge. The body and spirit need time to recover."
 murim_recent_duel_cooldown_desc:0 "Recently fought a formal duel. Wounds and fatigue prevent another immediate challenge."
