l_english:
 murim_hero.0001.t: "Cries for Help"
 murim_hero.0001.desc: "Smoke rises from a village in the valley below. Bandits — dozens of them — are ransacking homes and terrorizing families. The villagers have no cultivators to protect them. Their screams carry on the wind. You could intervene... but you'd be outnumbered."
 murim_hero.0001.a: "Charge in and fight — these people need me"
 murim_hero.0001.b: "Rally nearby cultivators to help"
 murim_hero.0001.c: "It's not my concern — keep moving"

 murim_hero.0002.t: "The Kidnapped Heir"
 murim_hero.0002.desc: "A distraught noble kneels before you, tears streaming. Their child — a young prodigy with extraordinary cultivation potential — has been abducted by a dark sect for use in forbidden rituals. The trail grows cold with every passing hour. 'Please,' they beg. 'You're our only hope.'"
 murim_hero.0002.a: "Launch an immediate rescue mission"
 murim_hero.0002.b: "Investigate first — find their hideout"
 murim_hero.0002.c: "Demand payment before acting"

 murim_hero.0003.t: "A Hero's Reward"
 murim_hero.0003.desc: "The rescue was successful. The child is safe, the dark sect scattered. The grateful family kneels before you alongside the villagers you've helped. Word of your deed is already spreading through the jianghu. You've become a symbol of hope in dark times."
 murim_hero.0003.a: "Accept their gratitude and political support"
 murim_hero.0003.b: "Refuse rewards — virtue is its own reward"
 murim_hero.0003.c: "Use this opportunity strategically"

 murim_hero.0004.t: "The Plague Village"
 murim_hero.0004.desc: "A village has been quarantined — a mysterious illness that seems to target cultivators specifically. Their qi becomes chaotic, their meridians inflame. Local doctors are helpless. You suspect this is no natural plague, but a deliberate attack using weaponized qi corruption."
 murim_hero.0004.a: "Use your cultivation knowledge to find a cure"
 murim_hero.0004.b: "Fund relief efforts and hire specialists"
 murim_hero.0004.c: "Avoid the area — I can't risk infection"

 murim_hero.0005.t: "The Sacred Texts"
 murim_hero.0005.desc: "An elderly scholar carries ancient scrolls of immeasurable value — cultivation texts from a fallen golden age. Multiple factions want them. The scholar begs for your protection on a journey to a safe temple. The road is long and dangerous, but the knowledge is priceless."
 murim_hero.0005.a: "Escort them personally — honor demands it"
 murim_hero.0005.b: "Escort them and request to study the texts"
 murim_hero.0005.c: "Demand payment for the dangerous work"

 murim_hero.0006.t: "The Tyrant's Hold"
 murim_hero.0006.desc: "A powerful sect leader has become a tyrant — taxing villages into starvation, kidnapping young cultivators, executing dissenters. The people live in terror. No one dares challenge them. But you've heard whispers of a resistance forming, waiting for someone strong enough to lead them."
 murim_hero.0006.a: "Lead the resistance in open rebellion"
 murim_hero.0006.b: "Infiltrate and topple them from within"
 murim_hero.0006.c: "Broker a diplomatic solution"
