 # ---------------------
 # CHARACTER INTERACTIONS
 # ---------------------
 challenge_to_duel_interaction:0 "Challenge to Duel"
 challenge_to_duel_interaction_desc:0 "Formally challenge [TARGET.GetFirstName] to an honorable martial duel. Victory brings prestige and ranking advancement. Defeat may bring injury, shame, or worse."
 request_teaching_interaction:0 "Request Teaching"
 request_teaching_interaction_desc:0 "Humbly request [TARGET.GetFirstName] to share their martial knowledge with you. A generous master may agree to mentor you in their techniques."
 offer_discipleship_interaction:0 "Offer Discipleship"
 offer_discipleship_interaction_desc:0 "Offer to take [TARGET.GetFirstName] as your personal disciple, training them in your martial arts and cultivation methods."
 trade_techniques_interaction:0 "Trade Techniques"
 trade_techniques_interaction_desc:0 "Propose a mutual exchange of martial knowledge with [TARGET.GetFirstName]. Both parties benefit from sharing cultivation insights."
 joint_cultivation_interaction:0 "Joint Cultivation"
 joint_cultivation_interaction_desc:0 "Invite [TARGET.GetFirstName] to cultivate together. Dual cultivation can accelerate breakthroughs for both parties, though it requires deep trust."
 poison_rival_interaction:0 "Poison Rival"
 poison_rival_interaction_desc:0 "Secretly poison [TARGET.GetFirstName]'s qi circulation using alchemical toxins. A coward's method, but devastatingly effective if undetected."
 steal_technique_interaction:0 "Steal Technique"
 steal_technique_interaction_desc:0 "Attempt to observe and steal [TARGET.GetFirstName]'s martial techniques through deception. If caught, the consequences will be severe."

 # ---------------------
 # CULTIVATION EVENT TITLES
 # ---------------------
 cultivation.0001.t:0 "The Awakening"
 cultivation.0001.desc:0 "You have meditated for seven days and seven nights. As the sun rises on the eighth morning, you feel something stir within your dantian -- a spark of energy. The first step on the path.\n\nYou have broken through to the Qi Refinement Realm! Your senses sharpen, your body strengthens. The cultivation world opens before you."
 cultivation.0001.a:0 "I shall become stronger!"
 cultivation.0001.b:0 "I need more time to stabilize..."

 cultivation.0002.t:0 "Foundation Breakthrough"
 cultivation.0002.desc:0 "Five years have passed. You have refined your qi until it flows like a river within your meridians. Now, at the critical moment, you feel the energy crystallizing in your dantian.\n\nThe Foundation Realm! Your qi now has a core, a foundation upon which greater power can be built."
 cultivation.0002.a:0 "This is only the beginning!"
 cultivation.0002.b:0 "I will share this technique with my sect."

 cultivation.0003.t:0 "The Nascent Soul Awakens"
 cultivation.0003.desc:0 "A golden light erupts from your forehead as your spiritual sense expands beyond mortal limitations. You can see the flows of energy, the threads of fate.\n\nThe Nascent Soul Realm -- a second life within you. You are now a true cultivator, respected and feared."
 cultivation.0003.a:0 "The heavens are within reach!"
 cultivation.0003.b:0 "I must protect my sect..."

 cultivation.0004.t:0 "The Demonic Seed"
 cultivation.0004.desc:0 "In your darkest hour, when your enemies have crushed you and your sect turns away, you find an ancient manual. Its pages whisper of power at any cost.\n\nA seed of darkness takes root in your soul. The Demonic Dao offers strength, but demands much."
 cultivation.0004.a:0 "I accept. Power above all."
 cultivation.0004.b:0 "I am still righteous at heart."

 cultivation.0005.t:0 "Ancient Secret Manual"
 cultivation.0005.desc:0 "While exploring the ruins of a fallen temple, you discover a jade slip hidden beneath the altar. It contains the complete Sword Dao of an ancient immortal.\n\nThis secret manual holds forbidden knowledge. With study, you could master techniques thought lost to time."

 cultivation.0006.t:0 "Heavenly Tribulation"
 cultivation.0006.desc:0 "Clouds gather above your cultivation chamber -- not ordinary storm clouds, but tribulation lightning. The heavens themselves test your worthiness for immortality.\n\nYou have reached the threshold. The Heavenly Tribulation will either forge you into an Immortal or reduce you to ash."
 cultivation.0006.a:0 "I fear neither heaven nor earth!"
 cultivation.0006.b:0 "I need to prepare more..."

 # Murim-prefixed cultivation events (used by effects system)
 murim_cultivation.0100.t:0 "Cultivation Breakthrough!"
 murim_cultivation.0100.desc:0 "After months of dedicated practice, you feel your qi surge and crystallize. The barrier to the next realm shatters before your will."
 murim_cultivation.0200.t:0 "Qi Deviation!"
 murim_cultivation.0200.desc:0 "Something has gone terribly wrong. Your qi rampages through your meridians uncontrollably, tearing at your body from within."

 # ---------------------
 # DUEL EVENT TITLES
 # ---------------------
 murim_duel.0001.t:0 "Formal Duel Challenge"
 murim_duel.0001.desc:0 "The challenge has been issued and accepted. Both fighters face each other with weapons drawn, the crowd holding its breath."
 murim_duel.0005.t:0 "Revenge Duel"
 murim_duel.0005.desc:0 "Burning with righteous fury, a martial artist seeks retribution through combat for a perceived wrong."

 # ---------------------
 # TRAINING EVENT TITLES
 # ---------------------
 murim_training.0001.t:0 "Training Begins"
 murim_training.0001.desc:0 "Your master leads you to the training grounds. The path of martial excellence begins with the first step."

 # ---------------------
 # MENTOR EVENT TITLES
 # ---------------------
 murim_mentor.0001.t:0 "A Master's Guidance"
 murim_mentor.0001.desc:0 "Your new master studies you with piercing eyes, then begins the first lesson with a single devastating strike aimed at your head."

 # ---------------------
 # ROMANCE EVENT TITLES
 # ---------------------
 murim_romance.0001.t:0 "Dual Cultivation Bond"
 murim_romance.0001.desc:0 "Through the intimate practice of dual cultivation, a deep bond forms between two martial artists."

 # ---------------------
 # JIANGHU EVENT TITLES
 # ---------------------
 murim_jianghu.0001.t:0 "Underworld Dealings"
 murim_jianghu.0001.desc:0 "The shadows of the martial world hold their own kind of power. Dark deeds have consequences."
 murim_jianghu.0002.t:0 "Poison Detected!"
 murim_jianghu.0002.desc:0 "Your finely-tuned qi senses detect something wrong -- someone has attempted to poison you!"
 murim_jianghu.0005.t:0 "Stolen Knowledge"
 murim_jianghu.0005.desc:0 "Through careful observation and deception, you have managed to learn secrets that were not meant for you."

 # ---------------------
 # ARTIFACT EVENT TITLES
 # ---------------------
 murim_artifact.0010.t:0 "Jealous Eyes on Your Weapon"
 murim_artifact.0010.desc:0 "Word of your ancient weapon has spread. A martial artist approaches with hunger in their eyes."
 murim_artifact.0001.t:0 "Ancient Artifact Discovered"
 murim_artifact.0001.desc:0 "A relic of immense power has been unearthed, drawing the attention of martial artists from across the realm."

