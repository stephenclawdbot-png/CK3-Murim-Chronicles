l_english:
 murim_memory.0001.t: "Blood Remembered"
 murim_memory.0001.desc: "The news strikes like a blade through the heart. Someone you cared for has been cut down — their qi extinguished forever. The killer's name burns itself into your memory, a brand that time will not erase."
 murim_memory.0001.a: "Their blood demands vengeance!"
 murim_memory.0001.b: "I will remember... and wait."
 murim_memory.0001.c: "The martial world is cruel. Accept it."
 murim_memory.0002.t: "Face to Face with the Killer"
 murim_memory.0002.desc: "Fate is not without a sense of irony. The one who took everything from you stands before you now — breathing, laughing, living. Your hand moves to your weapon without thought. Years of rage crystallize into this single moment."
 murim_memory.0002.a: "Draw your blade. This ends now."
 murim_memory.0002.b: "Patience... a blade in the dark is surer."
 murim_memory.0002.c: "Let the grudge die. Break the cycle."
 murim_memory.0003.t: "Your Parent's Killer Lives"
 murim_memory.0003.desc: "You have grown strong enough to learn the truth. Your parent did not die of illness or old age — they were killed. And the killer still walks the jianghu, unpunished. What will you do with this knowledge?"
 murim_memory.0003.a: "Train until I'm strong enough to avenge them."
 murim_memory.0003.b: "Seek the full truth first."
 murim_memory.0003.c: "Let the past die. Forge my own path."
 murim_memory.0004.t: "A Name Written in Blood"
 murim_memory.0004.desc: "Word spreads across the jianghu like wildfire. You have slain a ranked martial artist in combat. Teahouses whisper your name with fear and respect. The kill ledger of the martial world has a new entry."
 murim_memory.0004.a: "Let them fear me."
 murim_memory.0004.b: "It was necessary. Nothing more."
 murim_memory.0004.c: "The weight of a life taken..."
 murim_memory.0005.t: "The Heavenly Demon's Massacre"
 murim_memory.0005.desc: "The Heavenly Demon Sect has unleashed devastation beyond measure. Bodies of orthodox masters lie broken across the battlefield. Sect halls burn. Disciples scatter like leaves in a storm. You survived — but the images of that day will haunt you forever."
 murim_memory.0005.a: "I swear to destroy the Heavenly Demon Sect!"
 murim_memory.0005.b: "Hide, rebuild, grow stronger first."
 murim_memory.0005.c: "Flee the martial world entirely."
 murim_memory.0006.t: "Vengeance Fulfilled"
 murim_memory.0006.desc: "It is done. The one who took so much from you lies still at last. Blood pools beneath them like a dark mirror. You expected to feel relief, closure, peace. Instead, the silence after the kill is deafening."
 murim_memory.0006.a: "Justice is served. I can move on."
 murim_memory.0006.b: "This was only the beginning..."
 murim_memory.0006.c: "I feel... nothing. Was it worth it?"
 murim_killed_my_kin: "Killed My Kin"
 murim_assassination_target: "Marked for Death"
 murim_feared_killer: "Feared Killer"
 murim_feared_killer_desc: "Your name is spoken in whispers. You have killed a ranked martial artist, and the jianghu remembers."
