l_english:
 # ===========================
 # RANKING SYSTEM
 # ===========================
 murim_ranking.0001.t: "A New Ranker Rises"
 murim_ranking.0001.desc: "Your cultivation has caught the attention of the martial world. The Murim Ranking Board has officially recognized your strength, and whispers of your name spread through every teahouse and training hall. How will you respond to this newfound fame?"
 murim_ranking.0001.a: "Accept the recognition with humility"
 murim_ranking.0001.b: "Use this fame to attract disciples"
 murim_ranking.0001.c: "Challenge the ranker above me"

 murim_ranking.0003.t: "Ranking Challenge"
 murim_ranking.0003.desc: "The challenge has been issued. Martial artists from across the realm gather to witness as two ranked cultivators prepare to test their strength against each other."
 murim_ranking.0003.a: "Accept and prepare for battle"
 murim_ranking.0003.b: "Decline — not worth the risk"

 murim_ranking.0005.t: "Defending Your Rank"
 murim_ranking.0005.desc: "A challenger has appeared at your gates, demanding a match for your position in the rankings. The martial world watches — to refuse would be cowardice, but to accept risks everything you have built."
 murim_ranking.0005.a: "Crush the challenger decisively"
 murim_ranking.0005.b: "Show mercy to the challenger"
 murim_ranking.0005.c: "Refuse — I am above such games"

 murim_ranking.0010.t: "Annual Ranking Ceremony"
 murim_ranking.0010.desc: "The annual Murim Ranking ceremony takes place under the watchful eyes of the elders. Names shift on the board as the martial world's balance of power is publicly displayed."
 murim_ranking.0010.a: "Attend the ceremony"

 murim_ranking.0100.t: "Legendary Rank Achieved"
 murim_ranking.0100.desc: "Your name has ascended to the realm of legends. The Murim Ranking Board inscribes your name in gold — you stand among the greatest martial artists the world has ever known. Songs will be written. Stories will be told. Your legacy is eternal."
 murim_ranking.0100.a: "My name echoes across the martial world"

 murim_ranking_events.0001.t: "Ranking Update"
 murim_ranking_events.0001.desc: "The rankings have been updated to reflect recent events in the martial world."
 murim_ranking_events.0001.a: "Noted"

 murim_ranking_integration.0001.t: "Rankings Meet Cultivation"
 murim_ranking_integration.0001.desc: "Your cultivation breakthrough has caught the attention of the ranking officials. Your position on the board may soon change."
 murim_ranking_integration.0001.a: "Let my cultivation speak for itself"
 murim_ranking_integration.0001.b: "Train harder to secure my position"

 murim_ranking_integration.0002.t: "Ranking Ripple Effect"
 murim_ranking_integration.0002.desc: "A shift in the rankings sends ripples through the martial world. Alliances adjust, rivalries intensify, and the balance of power tilts."
 murim_ranking_integration.0002.a: "Capitalize on the shift"
 murim_ranking_integration.0002.b: "Observe from a safe distance"

 murim_ranking_integration.0003.t: "Cross-System Ranking Impact"
 murim_ranking_integration.0003.desc: "Your ranking position has attracted attention from political circles, sect leaders, and underground networks alike. Everyone wants to know the ranked cultivator."
 murim_ranking_integration.0003.a: "Use the attention wisely"
 murim_ranking_integration.0003.b: "Focus on what truly matters — cultivation"

 murim_ranking_integration.0010.t: "Ranking Pinnacle"
 murim_ranking_integration.0010.desc: "You have reached the very pinnacle of the ranking system. All eyes in the martial world are upon you."
 murim_ranking_integration.0010.a: "Stand at the summit"

 # ===========================
 # CULTIVATION SYSTEM
 # ===========================
 murim_cultivation.0001.t: "First Steps on the Martial Path"
 murim_cultivation.0001.desc: "You feel qi stirring within your body for the first time — a warmth that begins in the dantian and spreads through your meridians like liquid fire. This is the beginning of your journey as a martial artist. The path ahead is long and dangerous, but the first step has been taken."
 murim_cultivation.0001.a: "Begin orthodox cultivation — slow and steady"
 murim_cultivation.0001.b: "Push my body to its limits"
 murim_cultivation.0001.c: "Seek a master to guide me"

 murim_cultivation.0020.t: "Meridian Opening"
 murim_cultivation.0020.desc: "You have reached a critical juncture in your cultivation. The twelve primary meridians must be opened to advance further, but the process is excruciatingly painful and carries real risk of qi deviation."
 murim_cultivation.0020.a: "Force the meridian open with pure qi"
 murim_cultivation.0020.b: "Gentle approach — follow the natural flow"

 murim_cultivation.0021.t: "Qi Deviation Warning"
 murim_cultivation.0021.desc: "Your qi flow has become erratic and unstable. The signs of qi deviation are unmistakable — cold sweats, involuntary muscle spasms, and a creeping darkness at the edge of your consciousness. You must act quickly before the deviation becomes permanent."
 murim_cultivation.0021.a: "Stabilize through meditation"
 murim_cultivation.0021.b: "Push through the danger"

 murim_cultivation.0022.t: "Dantian Formation"
 murim_cultivation.0022.desc: "Your cultivation has reached the critical threshold. Within your lower dantian, qi begins to condense into a golden core — the foundation upon which all higher cultivation is built. This is the moment that separates ordinary martial artists from true cultivators."
 murim_cultivation.0022.a: "Condense the golden core"

 murim_cultivation.0100.t: "Transcendent Cultivation"
 murim_cultivation.0100.desc: "You have broken through every barrier, shattered every limit. Your cultivation has reached a realm that most believe to be myth. The qi within you flows like an ocean, vast and limitless. You are no longer merely strong — you are something else entirely."
 murim_cultivation.0100.a: "A new realm of existence"

 murim_cultivation_events.0001.t: "Cultivation Progress"
 murim_cultivation_events.0001.desc: "Your daily cultivation bears fruit as your internal energy grows stronger."
 murim_cultivation_events.0001.a: "Continue training"

 # ===========================
 # TECHNIQUE SYSTEM
 # ===========================
 murim_technique.0401.t: "Palm Technique Mastered"
 murim_technique.0401.desc: "Through countless hours of practice, you have mastered an advanced palm technique. The power flows from your dantian through your arm and concentrates in your palm, capable of shattering stone."
 murim_technique.0401.a: "Practice the technique further"
 murim_technique.0401.b: "Demonstrate it to the sect"

 murim_technique.0402.t: "Finger Technique Refined"
 murim_technique.0402.desc: "Your finger technique has been refined to a lethal point. With a single strike of your index finger, you can seal meridians, rupture blood vessels, or shatter bone. A weapon that can never be taken from you."
 murim_technique.0402.a: "Perfect the lethal applications"
 murim_technique.0402.b: "Focus on healing applications"

 murim_technique.0501.t: "Body Tempering Breakthrough"
 murim_technique.0501.desc: "Your body has undergone a fundamental transformation through rigorous tempering. Skin like iron, bones like steel — you have achieved a level of physical durability that borders on the supernatural."
 murim_technique.0501.a: "Push the tempering even further"
 murim_technique.0501.b: "Balance with internal cultivation"

 murim_technique.0700.t: "Qinggong — Lightness Art"
 murim_technique.0700.desc: "You feel light as a feather. Your mastery of qinggong allows you to traverse rooftops, scale walls, and cross rivers by stepping on falling leaves. Movement itself has become an art form."
 murim_technique.0700.a: "Master the advanced movements"
 murim_technique.0700.b: "Apply it to combat footwork"

 murim_technique.0800.t: "Internal Energy Circulation"
 murim_technique.0800.desc: "You have achieved a perfect cycle of internal energy circulation. Qi flows through all twelve meridians in an unbroken loop, constantly strengthening your body and spirit."
 murim_technique.0800.a: "Deepen the circulation cycle"
 murim_technique.0800.b: "Channel it into combat power"

 murim_technique.0900.t: "Weapon Forging Technique"
 murim_technique.0900.desc: "You have learned the ancient art of forging martial weapons imbued with qi. A blade tempered with cultivation energy cuts deeper, lasts longer, and resonates with its wielder's internal power."
 murim_technique.0900.a: "Forge a personal weapon"
 murim_technique.0900.b: "Teach the technique to others"

 murim_technique.1100.t: "Formation Combat"
 murim_technique.1100.desc: "You have mastered the art of formation combat — coordinating multiple fighters into a single devastating unit. When properly executed, a formation of five can defeat an army of fifty."
 murim_technique.1100.a: "Train your disciples in formation"
 murim_technique.1100.b: "Adapt it for diplomatic purposes"

 murim_technique.1400.t: "Forbidden Technique Discovered"
 murim_technique.1400.desc: "Hidden within a sealed vault, you discover a technique scroll marked with warnings in red ink. This is a forbidden art — immensely powerful but carrying terrible costs. Those who practice it gain tremendous strength, but the price may be their humanity."
 murim_technique.1400.a: "Study it despite the risks"
 murim_technique.1400.b: "Destroy it — too dangerous"
 murim_technique.1400.c: "Seal it away for safekeeping"

 murim_technique_events.0001.t: "Technique Practice"
 murim_technique_events.0001.desc: "Another day of diligent technique practice yields incremental progress."
 murim_technique_events.0001.a: "Continue the grind"

 # ===========================
 # DUEL SYSTEM
 # ===========================
 murim_duel.0005.t: "A Formal Challenge"
 murim_duel.0005.desc: "A letter arrives sealed with crimson wax — the mark of a formal martial challenge. Another cultivator has publicly declared their intention to test your strength. The martial world watches. To accept is to risk everything. To refuse is to lose face."
 murim_duel.0005.a: "Accept the challenge"
 murim_duel.0005.b: "Decline honorably"
 murim_duel.0005.c: "Set a trap instead"

 murim_duel.0100.t: "The Duel"
 murim_duel.0100.desc: "Dust rises from the fighting ground as two martial artists face each other. The crowd holds its breath. A leaf falls between you, and when it touches the ground, the battle begins."
 murim_duel.0100.a: "Decisive victory through overwhelming power"
 murim_duel.0100.b: "Narrow victory through superior technique"
 murim_duel.0100.c: "A draw — mutual respect earned"

 murim_duel.0200.t: "Death Match"
 murim_duel.0200.desc: "This is no ordinary duel. The terms are clear — only one walks away. A death match between cultivators is the ultimate test of martial prowess, and the loser pays with their life."
 murim_duel.0200.a: "Fight to the death"
 murim_duel.0200.b: "Refuse — this is madness"
 murim_duel.0200.c: "Propose first blood only"

 murim_duel_events.0001.t: "Duel Aftermath"
 murim_duel_events.0001.desc: "The dust settles after the duel. The martial world takes note of the outcome."
 murim_duel_events.0001.a: "Move on"

 # ===========================
 # TOURNAMENT EVENTS
 # ===========================
 murim_tournament.0020.t: "Tournament Advancement"
 murim_tournament.0020.desc: "You have defeated your opponent and advance to the next round of the tournament. The crowd roars its approval."
 murim_tournament.0020.a: "Press forward aggressively"
 murim_tournament.0020.b: "Conserve energy for later rounds"

 murim_tournament.0050.t: "Semi-Finals"
 murim_tournament.0050.desc: "Only four fighters remain. The semi-finals of the grand tournament — each opponent is a master in their own right. One mistake will end your run."
 murim_tournament.0050.a: "Give everything in the fight"
 murim_tournament.0050.b: "Fight with calculated precision"

 murim_tournament.0060.t: "The Grand Final"
 murim_tournament.0060.desc: "This is it — the final match of the grand tournament. The arena is packed to capacity, and every eye in the martial world watches. Your opponent stands across from you, equally determined. Only one can be champion."
 murim_tournament.0060.a: "Hold nothing back — all or nothing"
 murim_tournament.0060.b: "Fight with controlled precision"

 murim_training_events.0001.t: "Daily Training"
 murim_training_events.0001.desc: "Another day of disciplined training strengthens your martial foundation."
 murim_training_events.0001.a: "Keep training"
