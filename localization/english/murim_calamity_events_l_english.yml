l_english:
 murim_calamity.0001.t: "The First Omen: Qi Disturbance"
 murim_calamity.0001.desc: "A tremor passes through your meridians without warning -- not pain, but a deep wrongness, as though the very qi of heaven and earth has shifted off-axis. Birds fall silent. The wind dies. For one terrible heartbeat, the world holds its breath."
 murim_calamity.0001.desc_seer: "You felt it before anyone else -- a fracture in the flow of heaven's qi, invisible to ordinary senses. Your gift of foresight screams a warning that echoes through every fiber of your being. The cycle is turning. The end approaches."
 murim_calamity.0001.a: "Meditate on this disturbance."
 murim_calamity.0001.b: "It is nothing. Just a tremor."
 murim_calamity.0001.c: "Warn others -- something terrible approaches."
 murim_calamity.0002.t: "A Warning from a Fellow Martial Artist"
 murim_calamity.0002.desc: "A fellow martial artist arrives with urgency in their eyes and dread in their voice. They speak of a disturbance in the heavenly qi, of ancient cycles turning, of omens that match the records of past calamities. Whether truth or paranoia, their conviction is absolute."
 murim_calamity.0002.a: "Heed the warning and prepare."
 murim_calamity.0002.b: "Dismiss it as superstition."
 murim_calamity.0003.t: "Animals Flee the Land"
 murim_calamity.0003.desc: "The forests have gone silent. Deer, wolves, and birds flee in great waves toward the coast, as if driven by an instinct older than memory. Farmers report their livestock refusing to eat, standing motionless and trembling. Whatever approaches, the beasts sense it before we do."
 murim_calamity.0003.a: "Stockpile resources for dark days ahead."
 murim_calamity.0003.b: "Ignore the signs."
 murim_calamity.0004.t: "Vision of the End"
 murim_calamity.0004.desc: "In your dreams, you see it all -- the burning sects, the rivers of blood, the sky torn asunder by clashing qi. Masters fall like autumn leaves. Entire lineages are snuffed out in a single night. You wake screaming, drenched in sweat, knowing with absolute certainty that what you saw was not imagination, but prophecy."
 murim_calamity.0004.a: "Accept the vision. Prepare for what comes."
 murim_calamity.0004.b: "Fight fate. Try to prevent the calamity."
 murim_calamity.0010.t: "The Gathering Storm"
 murim_calamity.0010.desc: "The signs can no longer be denied. Clans arm themselves openly. Old grudges resurface with murderous intent. The martial world bristles with hostility as alliances fracture and rivalries ignite. The great calamity that the omens foretold is no longer a distant threat -- it is here, gathering like thunderheads on the horizon."
 murim_calamity.0010.a: "Rally our clan for war!"
 murim_calamity.0010.b: "Seek alliances -- strength in unity."
 murim_calamity.0010.c: "Hide and wait for the storm to pass."
 murim_calamity.0010.d: "Pray for deliverance."
 murim_calamity.0011.t: "Aggressive Clan Maneuver"
 murim_calamity.0011.desc: "As tensions mount, an aggressive clan makes hostile moves against a rival, testing boundaries and provoking confrontation."
 murim_calamity.0011.a: "Strike first."
 murim_calamity.0012.t: "Cunning Clan Machinations"
 murim_calamity.0012.desc: "In the shadows, a cunning clan weaves its web of intrigue -- forming secret alliances, gathering intelligence, and positioning assassins for the chaos to come."
 murim_calamity.0012.a: "Set our schemes in motion."
 murim_calamity.0013.t: "Honorable Clan Deliberation"
 murim_calamity.0013.desc: "The honorable clans gather to discuss the approaching storm, seeking peace where they can and preparing reluctantly for war where they must."
 murim_calamity.0013.a: "Seek the path of righteousness."
 murim_calamity.0014.t: "Border Skirmish"
 murim_calamity.0014.desc: "Blood has been spilled at the border between territories. What began as a tense standoff has erupted into open combat. Steel rings against steel as martial artists clash with killing intent. This is no longer posturing -- this is war in miniature, a harbinger of the greater conflict to come."
 murim_calamity.0014.a: "Fight!"
 murim_calamity.0014.a.success: "Victory -- your opponent falls before your superior technique."
 murim_calamity.0014.a.failure: "Defeat -- their blade finds its mark."
 murim_calamity.0014.b: "Retreat to fight another day."
 murim_calamity.0014.c: "Negotiate a temporary truce."
 murim_calamity.0019.t: "The Great War Begins"
 murim_calamity.0019.desc: "The heavens weep as the martial world tears itself apart. Every sect, every clan, every wandering master is drawn into the maelstrom. The Great War has begun -- a cataclysm that will reshape the world of martial arts forever. There is no neutrality. There is no escape. There is only survival."
 murim_calamity.0019.a: "Fight for our clan's survival!"
 murim_calamity.0019.b: "Protect the innocent and the weak."
 murim_calamity.0019.c: "Flee to the mountains and hide."
 murim_calamity.0020.t: "Battle to the Death"
 murim_calamity.0020.desc: "Amidst the chaos of the Great War, an enemy martial artist stands before you. There are no referees, no rules, no mercy. Only one of you will walk away from this clearing. The qi in the air crackles with killing intent as you take your stance."
 murim_calamity.0020.victory: "Your technique prevails -- your opponent falls."
 murim_calamity.0020.defeat: "Their blade is faster. You fall."
 murim_calamity.0020.a: "Face them in mortal combat."
 murim_calamity.0021.t: "Death Stalks the Battlefield"
 murim_calamity.0021.desc: "The war has become a meat grinder. Bodies litter the mountainsides. Former brothers in arms lie broken among the stones. Death does not discriminate between righteous and demonic -- it takes all with equal hunger. Your turn has come to face the reaper."
 murim_calamity.0021.a: "Fight to the last breath."
 murim_calamity.0021.b: "Try to escape the carnage."
 murim_calamity.0022.t: "Civilian Casualties"
 murim_calamity.0022.desc: "The martial war has spilled into the mortal world. Soldiers and cultivators alike rampage through towns and villages. As a ruler without martial training, you are a leaf in a hurricane -- powerless against forces that could level mountains. Your people look to you for salvation."
 murim_calamity.0022.a: "Barricade the castle. Hold the line."
 murim_calamity.0022.b: "Flee the province entirely."
 murim_calamity.0023.t: "Emergency Clan Succession"
 murim_calamity.0023.desc: "Our clan leader has fallen in battle, their blood staining the sect's banner. The surviving disciples look to you with desperate, hollow eyes. Someone must take command before the clan scatters to the winds. The weight of an entire lineage settles on your shoulders."
 murim_calamity.0023.a: "I accept the burden of leadership."
 murim_calamity.0023.b: "The clan is already dead..."
 murim_calamity.0024.t: "A Clan Falls Forever"
 murim_calamity.0024.desc: "It is over. An entire clan -- its teachings, its history, its bloodline -- has been erased from the martial world. Their training halls burn. Their scrolls are ash. Their disciples lie unburied on distant fields. A lineage stretching back centuries, extinguished in a single generation of madness."
 murim_calamity.0024.a: "Mourn the fallen. They deserved better."
 murim_calamity.0024.b: "Their techniques must be preserved."
 murim_calamity.0025.t: "The Emperor Under Siege"
 murim_calamity.0025.desc: "The martial war has reached the imperial palace. Cultivators fight on the golden rooftops while soldiers die in the courtyards below. The Dragon Throne itself trembles as forces beyond any army's strength clash within the Forbidden City. The emperor must act or fall."
 murim_calamity.0025.a: "Defend the throne to the death."
 murim_calamity.0025.b: "Abdicate and flee with the treasury."
 murim_calamity.0025.c: "Negotiate with the attackers."
 murim_calamity.0026.t: "War-Forged Breakthrough"
 murim_calamity.0026.desc: "In the crucible of battle, something awakens within you. The desperate fury of combat, the nearness of death, the qi of fallen warriors saturating the air -- it all converges into a single blinding moment of clarity. Your cultivation barrier shatters like glass, and power floods through your meridians like a river breaking a dam."
 murim_calamity.0026.a: "Embrace this terrible power."
 murim_calamity.0026.b: "Reject it -- too much blood was spilled."
 murim_calamity.0030.t: "The Silence Falls"
 murim_calamity.0030.desc: "And then... nothing. The fighting stops. The screaming stops. An unnatural silence blankets the world like a funeral shroud. The qi of heaven and earth has gone cold and still. Those who survived the war now face something worse: the absolute, crushing silence of a world that has consumed itself."
 murim_calamity.0030.a: "Accept death with dignity."
 murim_calamity.0030.b: "One last desperate fight for survival."
 murim_calamity.0031.t: "Survivor Awakens"
 murim_calamity.0031.desc: "You open your eyes. Ash drifts like snow across a landscape of ruin. You are alive -- somehow, impossibly alive. Around you, the remnants of the martial world lie shattered. Broken swords, burned scrolls, silent training halls. You may be the last of your kind. The old world is dead. What rises from its ashes depends on you."
 murim_calamity.0031.a: "Carry the legacy forward."
 murim_calamity.0031.b: "The old world deserved to die."
 murim_calamity.0040.t: "The Renewal Begins"
 murim_calamity.0040.desc: "Green shoots push through the ashes. A child laughs somewhere in the distance. The qi of heaven and earth stirs once more, faint as a newborn's breath but growing stronger. The cycle turns again -- from destruction, creation. From the silence, a new song. The martial world will be reborn."
 murim_calamity.0040.a: "Rebuild our clan from the ashes."
 murim_calamity.0040.b: "Found a new sect for a new era."
 murim_calamity.0040.c: "Wander and teach the next generation."
 murim_calamity.0041.t: "Rebuilding Path"
 murim_calamity.0041.desc: "The survivor chooses their path in the new world rising from the calamity's ashes."
 murim_calamity.0041.a: "Begin anew."
 murim_calamity.0042.t: "The Next Generation"
 murim_calamity.0042.desc: "A child is born into a world of ashes and renewal. They will never know the glory of the old martial world, nor its horrors. They are a blank page, a fresh start, a vessel for either redemption or repetition. How will you shape them?"
 murim_calamity.0042.a: "Train them in the old ways."
 murim_calamity.0042.b: "Let them find their own path."
 murim_calamity.0042.c: "The old ways died with the old world."
