l_english:
 murim_technique_mastery.0001.t: "Technique Perfection Breakthrough"
 murim_technique_mastery.0001.desc: "You have practiced this technique ten thousand times, and ten thousand times it has been the same. But now, at the very edge of mastery, you sense something beyond — a wall that, if shattered, would elevate the art to a level never before achieved. Perfection beckons from the other side."
 murim_technique_mastery.0001.a: "Push through with brute force cultivation"
 murim_technique_mastery.0001.b: "Seek enlightenment through meditation"
 murim_technique_mastery.0001.c: "Accept my current level — perfection is a dream"
 murim_technique_mastery.0002.t: "Forbidden Technique Fusion"
 murim_technique_mastery.0002.desc: "Two incompatible martial arts war within your meridians — fire and ice, destruction and creation, chaos and order. The orthodox masters say they cannot coexist. But you have glimpsed the thread that connects them, the impossible bridge that could fuse them into something entirely new."
 murim_technique_mastery.0002.a: "Fuse fire and ice into one art"
 murim_technique_mastery.0002.b: "Attempt a safer, gradual fusion over years"
 murim_technique_mastery.0002.c: "Abandon the fusion — the cost is too great"
 murim_technique_mastery.0003.t: "Creating an Original Technique"
 murim_technique_mastery.0003.desc: "Every technique in the martial world was created by someone, once. Now it is your turn. Within your mind, a new martial art takes shape — movements never performed, energies never channeled in quite this way. To create a peerless technique is the pinnacle of martial achievement."
 murim_technique_mastery.0003.a: "Pour everything into the ultimate technique"
 murim_technique_mastery.0003.b: "Test the technique in live combat first"
 murim_technique_mastery.0003.c: "Record the theory for future generations"
 murim_technique_mastery.0004.t: "Technique Theft Confrontation"
 murim_technique_mastery.0004.desc: "Your blood runs cold as you witness it — someone is using your unique technique, the art you created with your own sweat and blood. Every movement is unmistakably yours, stolen and wielded by unworthy hands. The thief must answer for this violation."
 murim_technique_mastery.0004.a: "Challenge the thief to a death match"
 murim_technique_mastery.0004.b: "Evolve my technique to surpass the stolen version"
 murim_technique_mastery.0004.c: "Let them spread a flawed version — it will destroy them"
 murim_technique_mastery.0005.t: "Heaven-Defying Ultimate Technique"
 murim_technique_mastery.0005.desc: "At the very summit of martial cultivation, where the air thins and the Dao itself becomes visible, you contemplate the impossible — creating a technique that defies natural law itself. The heavens will not permit it willingly. Lightning gathers in the distance, as though the sky already knows your intent."
 murim_technique_mastery.0005.a: "Challenge the heavens — create the ultimate technique"
 murim_technique_mastery.0005.b: "Prepare for decades before attempting"
 murim_technique_mastery.0005.c: "Accept mortal limits — no one should defy heaven"
