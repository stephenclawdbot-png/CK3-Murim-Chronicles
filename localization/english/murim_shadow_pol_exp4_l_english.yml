l_english:
 murim_shadow_pol_exp4.0001.t: "Installing the Puppet Emperor"
 murim_shadow_pol_exp4.0001.desc: "The imperial throne sits before you like an empty vessel waiting to be filled with your will. A weak ruler holds the seat — malleable, fearful, ripe for manipulation. The Heavenly Demon's shadow can stretch across the entire realm if you place the right puppet upon that gilded chair."
 murim_shadow_pol_exp4.0001.a: "Blackmail and install a puppet emperor."
 murim_shadow_pol_exp4.0001.b: "Assassinate the emperor and install my own candidate."
 murim_shadow_pol_exp4.0001.c: "Marry into the imperial family instead."
 murim_shadow_pol_exp4.0001.d: "Rule from the shadows without a puppet."
 murim_shadow_pol_exp4.0002.t: "The Puppet Resists"
 murim_shadow_pol_exp4.0002.desc: "Your puppet emperor has grown a spine. Secret meetings with loyalist ministers, whispered defiance behind closed doors — the marionette is trying to cut its own strings. This insolence cannot be tolerated, but crushing it too openly might expose the entire arrangement."
 murim_shadow_pol_exp4.0002.a: "Crush the rebellion brutally."
 murim_shadow_pol_exp4.0002.b: "Demonstrate my power subtly."
 murim_shadow_pol_exp4.0002.c: "Replace this puppet with a more compliant one."
 murim_shadow_pol_exp4.0002.d: "Grant the puppet some real power as compromise."
 murim_shadow_pol_exp4.0003.t: "Court of Shadows"
 murim_shadow_pol_exp4.0003.desc: "With the puppet emperor secured, the time has come to build the infrastructure of true power. A shadow court — invisible to the common eye but pulling every string in the realm. Spymasters, informants, and merchant networks all answering to the Heavenly Demon alone."
 murim_shadow_pol_exp4.0003.a: "Build a shadow cabinet of spymasters."
 murim_shadow_pol_exp4.0003.b: "Create an informant network in every clan."
 murim_shadow_pol_exp4.0003.c: "Establish control through commerce."
 murim_shadow_pol_exp4.0004.t: "The Orthodox Investigator"
 murim_shadow_pol_exp4.0004.desc: "An orthodox sect investigator has been asking uncomfortable questions. They've noticed the emperor's strange behavior, the unusual decrees, the disappearances. The trail leads dangerously close to you. This problem must be dealt with before it unravels everything."
 murim_shadow_pol_exp4.0004.a: "Eliminate the investigator."
 murim_shadow_pol_exp4.0004.b: "Discredit them publicly."
 murim_shadow_pol_exp4.0004.c: "Turn them into a double agent."
 murim_shadow_pol_exp4.0004.d: "Reveal myself and challenge them openly."
 murim_shadow_pol_exp4.0005.t: "Imperial Decree Under Shadow"
 murim_shadow_pol_exp4.0005.desc: "The puppet emperor's brush hovers over an imperial decree — one that you have drafted. This edict will reshape the martial world according to the Heavenly Demon's vision. The question is simply how far to push: a subtle shift in power, or a seismic upheaval?"
 murim_shadow_pol_exp4.0005.a: "Ban all orthodox martial arts."
 murim_shadow_pol_exp4.0005.b: "Tax all martial sects heavily."
 murim_shadow_pol_exp4.0005.c: "Name the Heavenly Demon as state protector."
 murim_shadow_pol_exp4.0006.t: "The Emperor's Secret Resistance"
 murim_shadow_pol_exp4.0006.desc: "Loyalists to the old emperor have organized an underground resistance. They smuggle messages, stockpile weapons, and dream of overthrowing the Heavenly Demon's puppet. Their network grows in the shadows — shadows that are supposed to belong to you."
 murim_shadow_pol_exp4.0006.a: "Root out the resistance network."
 murim_shadow_pol_exp4.0006.b: "Let them think they're winning."
 murim_shadow_pol_exp4.0006.c: "Execute the resistance leaders publicly."
 murim_shadow_pol_exp4.0006.d: "Address their grievances sincerely."
 murim_shadow_pol_exp4.0007.t: "Shadow Empire: Continental Control"
 murim_shadow_pol_exp4.0007.desc: "Your puppet controls one throne. But the continent holds many. The shadow court's network is mature enough to extend its invisible fingers into neighboring kingdoms. The question is whether to expand aggressively, consolidate what you hold, or invest in the next generation of loyal agents."
 murim_shadow_pol_exp4.0007.a: "Extend shadow control to neighboring kingdoms."
 murim_shadow_pol_exp4.0007.b: "Consolidate internal power first."
 murim_shadow_pol_exp4.0007.c: "Build a martial academy to train loyal agents."
 murim_shadow_pol_exp4.0008.t: "The Demon Emperor Revelation"
 murim_shadow_pol_exp4.0008.desc: "The time has come to choose: remain the invisible hand behind the throne, or step from the shadows and claim what is yours. The Heavenly Demon's power is unmatched, your network spans the continent. But revelation means war — every orthodox sect will rise against a demon upon the throne."
 murim_shadow_pol_exp4.0008.a: "Declare myself Demon Emperor openly."
 murim_shadow_pol_exp4.0008.b: "Stay in the shadows. The puppet is more useful."
 murim_shadow_pol_exp4.0008.c: "Abdicate shadow power. The burden is too great."
 murim_shadow_pol_exp4.0008.d: "Seize the imperial throne directly."
 murim_shadow_pol_exp4.0009.t: "Orthodox Coalition"
 murim_shadow_pol_exp4.0009.desc: "The orthodox sects have set aside their rivalries and formed a grand coalition. Shaolin, Wudang, Mount Hua — all march under a single banner of righteous fury. Their combined might could challenge even the Heavenly Demon. The final confrontation approaches."
 murim_shadow_pol_exp4.0009.a: "Crush the coalition with overwhelming force."
 murim_shadow_pol_exp4.0009.a.success: "The coalition shatters before the Demon Emperor's might."
 murim_shadow_pol_exp4.0009.a.failure: "The coalition's combined strength proves formidable."
 murim_shadow_pol_exp4.0009.b: "Divide and conquer. Turn them against each other."
 murim_shadow_pol_exp4.0009.c: "Offer terms. Share power with orthodox leaders."
 murim_shadow_pol_exp4.0010.t: "The Heavenly Demon's Legacy"
 murim_shadow_pol_exp4.0010.desc: "You have conquered, schemed, and ruled from both shadow and throne. Now age creeps upon even the Heavenly Demon. The legacy you leave behind will shape the martial world for centuries. Will you forge an eternal dynasty, dissolve the demon throne, or transcend mortality itself?"
 murim_shadow_pol_exp4.0010.a: "Establish an eternal demon dynasty."
 murim_shadow_pol_exp4.0010.b: "Dissolve the demon throne. Return to balance."
 murim_shadow_pol_exp4.0010.c: "Transcend into a martial god."
 murim_shadow_pol_exp4.0010.d: "Pass everything to the next generation and vanish."
