l_english:
 murim_wanderer.0001.t: "The Road Calls"
 murim_wanderer.0001.desc: "The weight of the world presses upon your shoulders -- failed bonds, shattered expectations, the stifling walls of obligation. Beyond the gate, the open road stretches endlessly, whispering of freedom and forgotten mountain paths where a martial artist might find their true self."
 murim_wanderer.0001.a: "I walk the wanderer's path."
 murim_wanderer.0001.b: "A brief journey, then I return."
 murim_wanderer.0001.c: "I will stay and endure."
 murim_wanderer.0002.t: "Tavern Encounter"
 murim_wanderer.0002.desc: "Smoke curls from cheap incense as you settle into a roadside tavern. A stranger at the corner table catches your eye -- the calluses on their hands, the controlled way they breathe. This is no ordinary traveler. The jianghu is full of hidden dragons in humble places."
 murim_wanderer.0002.a: "Share stories over wine."
 murim_wanderer.0002.b: "Challenge them to a friendly spar."
 murim_wanderer.0002.c: "Keep to myself in silence."
 murim_wanderer.0003.t: "Bandits on the Road"
 murim_wanderer.0003.desc: "A crude barricade blocks the mountain pass. Rough men with rusted blades emerge from the treeline, their leader sneering with the confidence of one who has never faced a true martial artist. They demand your coin and your sword. They have chosen poorly."
 murim_wanderer.0003.a: "Draw steel and fight."
 murim_wanderer.0003.b: "Release my killing intent to scatter them."
 murim_wanderer.0003.c: "Take a different path to avoid them."
 murim_wanderer.0004.t: "The Hidden Master"
 murim_wanderer.0004.desc: "In a remote mountain clearing, you discover an elderly figure practicing forms of breathtaking beauty and lethal precision. Each movement carries the weight of decades of cultivation. This is a master who has withdrawn from the martial world -- a living legend hidden among the peaks."
 murim_wanderer.0004.a: "Kneel and beg to become their disciple."
 murim_wanderer.0004.b: "Challenge them to test my skills."
 murim_wanderer.0004.c: "Observe from afar and learn in secret."
 murim_wanderer.0005.t: "The Master's Trial"
 murim_wanderer.0005.desc: "The hidden master has set a trial before you -- a test of body, mind, and spirit that will determine your worthiness. The mountain wind howls as you steel yourself. Many have attempted this trial before. Few have passed."
 murim_wanderer.0005.a: "Face the trial with all my strength."
 murim_wanderer.0005.b: "Use cunning to find a shortcut."
 murim_wanderer.0005.c: "Abandon the trial and move on."
 murim_wanderer.0006.t: "Village Under Threat"
 murim_wanderer.0006.desc: "Smoke rises from a small village nestled in the valley below. Cries of the desperate reach your ears -- an oppressor terrorizes the common folk, extorting grain and dignity alike. A wandering cultivator's sword was meant for moments like this."
 murim_wanderer.0006.a: "Defend the village with my blade."
 murim_wanderer.0006.b: "Train the villagers to fight back."
 murim_wanderer.0006.c: "Walk on. This is not my battle."
 murim_wanderer.0007.t: "Mountain Hermitage"
 murim_wanderer.0007.desc: "You have found a place of profound stillness -- a mountain sanctuary where qi flows thick as morning mist. Ancient pines frame a waterfall that thunders into a crystal pool. Here, far from the clamor of the jianghu, one might achieve true breakthrough."
 murim_wanderer.0007.a: "Sit and meditate for days on end."
 murim_wanderer.0007.b: "Practice combat forms against the elements."
 murim_wanderer.0007.c: "Explore the mountain for hidden secrets."
 murim_wanderer.0008.t: "The Wandering Healer"
 murim_wanderer.0008.desc: "A frail figure lies by the roadside, ravaged by illness that no common physician can cure. Your knowledge of qi meridians and internal energy whispers that you might save this life -- if your cultivation is deep enough. The martial path is not only about destruction."
 murim_wanderer.0008.a: "Channel qi to heal their ailment."
 murim_wanderer.0008.b: "Teach them self-healing breathing techniques."
 murim_wanderer.0008.c: "Move on. Healing is not my path."
 murim_wanderer.0009.t: "They Want You Back"
 murim_wanderer.0009.desc: "Word of your exploits has spread through the jianghu like wildfire. A sect recruiter appears bearing gifts and grand promises -- they want your sword, your name, and your loyalty. The organized martial world beckons once more, but the open road has become your home."
 murim_wanderer.0009.a: "Accept and rejoin the martial world."
 murim_wanderer.0009.b: "Decline. The road is my sect now."
 murim_wanderer.0009.c: "Join, but only on my own terms."
 murim_wanderer.0010.t: "Legend of the Road"
 murim_wanderer.0010.desc: "Your name is spoken in hushed reverence at every tea house from the southern coast to the northern passes. You have become more than a wandering martial artist -- you are a legend, a figure whose very presence shifts the balance of the jianghu. What legacy will you forge?"
 murim_wanderer.0010.a: "Become the legendary wandering swordsman."
 murim_wanderer.0010.b: "Establish a wandering school of my own."
 murim_wanderer.0010.c: "Disappear into myth and legend."
 murim_wanderer.0011.t: "The Great Calamity Calls"
 murim_wanderer.0011.desc: "The Great Calamity has descended upon the martial world. Scattered warriors and displaced cultivators roam the land like leaves in a storm. As a wanderer who knows every road and mountain pass, you are uniquely positioned to rally the lost or stand alone against the darkness."
 murim_wanderer.0011.a: "Rally scattered warriors to fight together."
 murim_wanderer.0011.b: "Face the calamity alone, as a true wanderer."
 murim_wanderer.0011.c: "Guide innocent civilians to safety."
 murim_wanderer.0012.t: "The Wanderer's End"
 murim_wanderer.0012.desc: "Years of dust and distance weigh upon your bones. The mountain trails you once climbed with ease now test your breath. The road has given you everything -- wisdom, scars, stories, solitude. Perhaps it is time to consider what comes after the wandering."
 murim_wanderer.0012.a: "Settle down and pass on my knowledge."
 murim_wanderer.0012.b: "One last journey into the unknown."
 murim_wanderer.0012.c: "Die on the road. A wanderer's true end."
