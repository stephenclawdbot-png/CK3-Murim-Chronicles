l_english:
 # ===========================
 # CLAN INTEGRATION EVENTS
 # ===========================
 murim_beggar_integration.0001.t: "The Beggar Sect's Hidden Network"
 murim_beggar_integration.0001.desc: "Word reaches you through the vast web of beggars and informants that spans every city and village. The Beggar Sect's network has grown powerful enough to influence events across the entire realm. As a senior member, you must decide how to wield this invisible power."
 murim_beggar_integration.0001.a: "Activate the full network — eyes and ears everywhere"
 murim_beggar_integration.0001.b: "Focus on personal cultivation instead"
 murim_beggar_integration.0001.c: "Remain humble — the sect endures through patience"

 murim_demon_integration.0001.t: "The Heart Demon Stirs"
 murim_demon_integration.0001.desc: "Deep within the Heavenly Demon Sect's forbidden chambers, you feel the pulse of dark qi resonating with your own cultivation. The shadow network that binds unorthodox cultivators together thrums with barely contained power. The Heart Demon within you whispers of greater heights — if you dare to listen."
 murim_demon_integration.0001.a: "Seize control of the shadow network"
 murim_demon_integration.0001.b: "Channel the Heart Demon for a breakthrough"
 murim_demon_integration.0001.c: "Withdraw and consolidate your power"

 murim_iron_fist_integration.0001.t: "The Iron Fist Resounds"
 murim_iron_fist_integration.0001.desc: "Your fists have grown harder than steel, your body tempered through countless hours of external cultivation. The Iron Fist Gate's reputation hinges on simple, undeniable strength. It is time to demonstrate that strength to the martial world."
 murim_iron_fist_integration.0001.a: "Challenge every ranked martial artist in the region"
 murim_iron_fist_integration.0001.b: "Focus on iron body tempering"
 murim_iron_fist_integration.0001.c: "Recruit promising fighters to the Gate"

 murim_mount_hua_integration.0001.t: "The Plum Blossom Blooms"
 murim_mount_hua_integration.0001.desc: "From the mist-shrouded peak of Mount Hua, you survey the martial world below. The sect's sword arts have reached a pinnacle under your generation's practice — the Plum Blossom Sword technique flows like poetry made steel. The time has come to show the world what Mount Hua can do."
 murim_mount_hua_integration.0001.a: "Demonstrate the Plum Blossom Sword publicly"
 murim_mount_hua_integration.0001.b: "Seek deeper understanding through meditation"
 murim_mount_hua_integration.0001.c: "Defend the sect's honor against slander"

 murim_phantom_blade_integration.0001.t: "Shadows Between Shadows"
 murim_phantom_blade_integration.0001.desc: "You are the blade that no one sees, the death that comes without warning. The Phantom Blade Sect has operated from darkness since its founding, but your network of assassins has grown beyond what any single master can control. It is time to expand — or to vanish entirely."
 murim_phantom_blade_integration.0001.a: "Expand the network of hidden blades"
 murim_phantom_blade_integration.0001.b: "Perfect the Vanishing Step technique"
 murim_phantom_blade_integration.0001.c: "Lie low — the best blade is the one unseen"

 murim_poison_flower_integration.0001.t: "A Thousand Petals of Venom"
 murim_poison_flower_integration.0001.desc: "The gardens of the Poison Flower Palace bloom with lethal beauty. Every petal, every stem, every dewdrop carries the potential for death — or for transcendence. Your mastery of toxins has reached a point where the line between poison and medicine blurs entirely."
 murim_poison_flower_integration.0001.a: "Distribute rare toxins through the underground"
 murim_poison_flower_integration.0001.b: "Cultivate the Thousand Petal Body"
 murim_poison_flower_integration.0001.c: "Forge alliances through the art of the banquet"

 murim_shaolin_integration.0001.t: "The Temple Bell Tolls"
 murim_shaolin_integration.0001.desc: "The ancient bell of Shaolin rings across the mountain, calling all disciples to assembly. As a senior monk of the temple, you have witnessed the ebb and flow of the martial world from behind these sacred walls. Now Shaolin must decide its role in the conflicts to come."
 murim_shaolin_integration.0001.a: "Open the Martial Hall for joint training"
 murim_shaolin_integration.0001.b: "Attempt the Eighteen Arhat Formation"
 murim_shaolin_integration.0001.c: "Meditate on the Diamond Sutra"

 murim_tang_integration.0001.t: "Blood of the Tang"
 murim_tang_integration.0001.desc: "The Tang Clan's ancestral hall is filled with the legacy of generations — hidden weapons, poison formulas, and the bloodline techniques that make the Tang family feared across the martial world. As a member of the blood, you have access to secrets that outsiders would kill to possess."
 murim_tang_integration.0001.a: "Unlock the clan's secret weapon cache"
 murim_tang_integration.0001.b: "Study the ancestral poison compendium"
 murim_tang_integration.0001.c: "Strengthen blood ties — clan is family"

 murim_wudang_integration.0001.t: "The Mountain's Breath"
 murim_wudang_integration.0001.desc: "Atop Wudang Mountain, the clouds part to reveal a world in turmoil below. Your Taoist cultivation has brought you closer to the Dao than most mortals will ever come. The mountain's qi flows through you like a river, and you must decide how to channel this tremendous power."
 murim_wudang_integration.0001.a: "Perform the Grand Tai Chi demonstration"
 murim_wudang_integration.0001.b: "Retreat into internal alchemy"
 murim_wudang_integration.0001.c: "Balance the mountain's qi"

 # ===========================
 # SCOUT INTEGRATION EVENTS
 # ===========================
 murim_clan_scout.0001.t: "A Hidden Prodigy"
 murim_clan_scout.0001.desc: "During your scouting mission, you discover a young person with extraordinary martial potential. Their movements betray an innate understanding of qi flow that most cultivators spend decades trying to achieve. This one could change the balance of power."
 murim_clan_scout.0001.a: "Recruit them immediately"
 murim_clan_scout.0001.b: "Test them further first"
 murim_clan_scout.0001.c: "Pass — not worthy of our clan"

 murim_clan_scout.0010.t: "The Candidate's Trial"
 murim_clan_scout.0010.desc: "You have put the candidate through a series of trials — endurance, combat intuition, qi sensitivity, and mental fortitude. The results are in, and you must render judgment on whether they are worthy of joining the clan."
 murim_clan_scout.0010.a: "They pass with flying colors"
 murim_clan_scout.0010.b: "Adequate, but needs more training"
 murim_clan_scout.0010.c: "They fail — send them away"

 murim_clan_scout.0020.t: "Foreign Martial Knowledge"
 murim_clan_scout.0020.desc: "Your journey through foreign lands has exposed you to martial arts traditions vastly different from those of the Middle Kingdom. Grappling holds, breathing techniques, weapon styles — some of these foreign methods could complement your clan's existing arts."
 murim_clan_scout.0020.a: "Integrate foreign techniques into clan training"
 murim_clan_scout.0020.b: "Reject foreign influence — purity of tradition"
 murim_clan_scout.0020.c: "Study privately before sharing"

 murim_clan_recruit.0001.t: "New Recruit Arrives"
 murim_clan_recruit.0001.desc: "A new recruit has arrived at the clan gates, eager to begin their martial journey. The scouting network has done its work."
 murim_clan_recruit.0001.a: "Welcome them to the clan"

 murim_scout.0020.t: "The Frontier Beckons"
 murim_scout.0020.desc: "You have reached the edge of explored territory. Beyond lies wilderness and unknown martial traditions. You must decide whether to press onward into the unknown or return home with what you have gathered."
 murim_scout.0020.a: "Continue into the frontier"
 murim_scout.0020.b: "Return home with your findings"

 murim_clan_scout_integration.0001.t: "Scout Report to Leadership"
 murim_clan_scout_integration.0001.desc: "You present your findings to the clan elders. The intelligence gathered during your scouting mission could shape the clan's strategy for years to come."
 murim_clan_scout_integration.0001.a: "Present a diplomatic assessment"
 murim_clan_scout_integration.0001.b: "Focus on martial intelligence"

 murim_clan_scout_integration.0002.t: "Rival Clan Activity Spotted"
 murim_clan_scout_integration.0002.desc: "Your scouts have observed unusual activity from a rival clan. They appear to be mobilizing their forces and recruiting aggressively in territories traditionally neutral."
 murim_clan_scout_integration.0002.a: "Prepare counter-intelligence measures"
 murim_clan_scout_integration.0002.b: "Report and monitor from a distance"

 murim_clan_scout_integration.0003.t: "Abandoned Training Ground"
 murim_clan_scout_integration.0003.desc: "Hidden in a remote valley, your scout discovers the remains of an ancient training ground. Stone markers inscribed with forgotten techniques still stand, and the qi in this place is remarkably dense."
 murim_clan_scout_integration.0003.a: "Study the ancient techniques"
 murim_clan_scout_integration.0003.b: "Salvage the materials"

 murim_clan_scout_integration.0004.t: "Encounter with a Wandering Master"
 murim_clan_scout_integration.0004.desc: "On a lonely mountain path, your scout encounters an elderly figure whose cultivation aura is immense. This wandering master offers to share a fragment of their knowledge — for a price."
 murim_clan_scout_integration.0004.a: "Learn from the wandering master"
 murim_clan_scout_integration.0004.b: "Invite them to visit the clan"

 murim_clan_scout_integration.0005.t: "Bandit Ambush"
 murim_clan_scout_integration.0005.desc: "Bandits — or perhaps rogue cultivators — have attacked your scouting party. Steel rings against steel in a narrow mountain pass. You must fight your way through or find another path."
 murim_clan_scout_integration.0005.a: "Fight through with martial arts"
 murim_clan_scout_integration.0005.b: "Use stealth to evade them"

 murim_clan_scout_integration.0006.t: "Secret Technique Scroll"
 murim_clan_scout_integration.0006.desc: "Buried beneath a collapsed pavilion, your scout discovers an ancient scroll. The characters are archaic but legible — this appears to be a lost technique manual from a sect that vanished centuries ago."
 murim_clan_scout_integration.0006.a: "Study the scroll carefully"
 murim_clan_scout_integration.0006.b: "Sell it to the highest bidder"

 murim_clan_scout_integration.0007.t: "Foreign Tournament Observed"
 murim_clan_scout_integration.0007.desc: "In a distant kingdom, your scout witnesses a martial arts tournament unlike anything practiced in the Middle Kingdom. The fighters use unfamiliar stances and bewildering footwork. There is much to learn here."
 murim_clan_scout_integration.0007.a: "Study their fighting styles"
 murim_clan_scout_integration.0007.b: "Focus on potential recruits"

 murim_clan_scout_integration.0008.t: "Foreign Power's Offer"
 murim_clan_scout_integration.0008.desc: "A foreign ruler has learned of your presence and offers generous compensation if you will serve as a martial instructor for their court. The gold is tempting, but your loyalty lies with your clan."
 murim_clan_scout_integration.0008.a: "Decline — loyalty above all"
 murim_clan_scout_integration.0008.b: "Accept temporarily for the gold"

 murim_clan_scout_integration.0009.t: "Medicinal Herbs Discovered"
 murim_clan_scout_integration.0009.desc: "In a hidden valley untouched by human hands, your scout discovers a grove of rare medicinal herbs. These plants, when properly prepared, can dramatically accelerate cultivation."
 murim_clan_scout_integration.0009.a: "Harvest for cultivation pills"
 murim_clan_scout_integration.0009.b: "Sell them at the market"

 murim_clan_scout_integration.0010.t: "New Trade Routes Mapped"
 murim_clan_scout_integration.0010.desc: "Your scout has mapped several new trade routes connecting distant regions. These paths could bring wealth and rare resources to the clan — or attract unwanted attention."
 murim_clan_scout_integration.0010.a: "Establish trade connections"
 murim_clan_scout_integration.0010.b: "Keep the routes secret"

 murim_clan_scout_integration.0011.t: "Demonic Cultivator in the Wilds"
 murim_clan_scout_integration.0011.desc: "Your scout has spotted a demonic cultivator practicing forbidden arts in a remote cave. Their dark qi sends chills down the spine. This is a threat — or an opportunity."
 murim_clan_scout_integration.0011.a: "Confront the demonic cultivator"
 murim_clan_scout_integration.0011.b: "Retreat and report"
 murim_clan_scout_integration.0011.c: "Observe and learn their techniques"

 murim_clan_scout_integration.0012.t: "Rising Clan in the Distance"
 murim_clan_scout_integration.0012.desc: "Reports indicate a new martial clan is rising in a distant province. Their techniques are unknown, their ambitions unclear. They could become allies or rivals."
 murim_clan_scout_integration.0012.a: "Assess them as a military threat"
 murim_clan_scout_integration.0012.b: "Investigate their connections"

 murim_clan_scout_integration.0013.t: "Celestial Phenomenon"
 murim_clan_scout_integration.0013.desc: "The sky blazes with strange lights — a celestial phenomenon that the old texts say presages great change in the martial world. Your scout watches in awe as qi in the surrounding area surges and swirls."
 murim_clan_scout_integration.0013.a: "Meditate under the celestial light"
 murim_clan_scout_integration.0013.b: "Record everything for the elders"

 murim_clan_scout_integration.0014.t: "Underground Martial Arena"
 murim_clan_scout_integration.0014.desc: "Hidden beneath an ordinary-looking teahouse, your scout discovers an underground fighting arena where cultivators battle for gold and glory. The fights are brutal and unsanctioned."
 murim_clan_scout_integration.0014.a: "Enter the arena for experience"
 murim_clan_scout_integration.0014.b: "Gather intelligence on the fighters"

 murim_clan_scout_integration.0015.t: "Injured Martial Artist"
 murim_clan_scout_integration.0015.desc: "By the roadside, your scout finds a martial artist gravely wounded from a recent battle. They clutch a broken sword and whisper of ambush by rivals. To help them is to risk involvement in someone else's war."
 murim_clan_scout_integration.0015.a: "Rescue and treat their wounds"
 murim_clan_scout_integration.0015.b: "Leave them — not your fight"

 murim_clan_scout_integration.0016.t: "Intercepted Coded Message"
 murim_clan_scout_integration.0016.desc: "Your scout intercepts a carrier pigeon bearing a coded message between two rival clans. The cipher is complex, but if decoded, the intelligence could be invaluable."
 murim_clan_scout_integration.0016.a: "Decode and exploit the intelligence"
 murim_clan_scout_integration.0016.b: "Deliver it to allied clans"

 murim_clan_scout_integration.0017.t: "Safe House Established"
 murim_clan_scout_integration.0017.desc: "After months of careful work, your scout has established a safe house in foreign territory. This hidden base can serve as a staging point for future operations."
 murim_clan_scout_integration.0017.a: "Fund and maintain the safe house"
 murim_clan_scout_integration.0017.b: "Abandon it — too risky"

 murim_clan_scout_integration.0018.t: "Cover Blown!"
 murim_clan_scout_integration.0018.desc: "Disaster! Your scout's identity has been discovered by hostile forces. They must fight their way out or use every trick in their arsenal to escape with their life — and their intelligence."
 murim_clan_scout_integration.0018.a: "Fight through the ambush"
 murim_clan_scout_integration.0018.b: "Use smoke and deception to escape"

 murim_clan_scout_integration.0019.t: "Comprehensive Regional Census"
 murim_clan_scout_integration.0019.desc: "After years of careful observation, your scout has compiled a comprehensive census of martial artists across multiple regions. This intelligence is worth its weight in gold."
 murim_clan_scout_integration.0019.a: "Present the full report to the elders"
 murim_clan_scout_integration.0019.b: "Sell selective information to allies"

 murim_clan_scout_integration.0020.t: "Grand Scout Briefing"
 murim_clan_scout_integration.0020.desc: "All scouts have returned. The clan leadership gathers in the great hall to hear the combined intelligence from every corner of the known world. This briefing will shape the clan's strategy for the coming decade."
 murim_clan_scout_integration.0020.a: "Deliver the strategic overview"
 murim_clan_scout_integration.0020.b: "Focus on immediate military threats"
